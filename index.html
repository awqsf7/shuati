<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fbfaf6" />
    <title>离线刷题</title>
    <style>
:root {
  color-scheme: light;
  --bg: #fbfaf6;
  --ink: #1f2933;
  --muted: #697386;
  --line: #dfd9cb;
  --panel: #ffffff;
  --panel-soft: #f3f7f1;
  --accent: #1f7a68;
  --accent-strong: #12594d;
  --accent-soft: #ddefe8;
  --warn: #bf5b2c;
  --danger: #be3b45;
  --success: #27764a;
  --shadow: 0 18px 45px rgba(31, 41, 51, 0.12);
  font-family:
    -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "Noto Sans CJK SC",
    sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: var(--bg);
}

body {
  min-height: 100%;
  margin: 0;
  color: var(--ink);
  background:
    linear-gradient(160deg, rgba(31, 122, 104, 0.12), transparent 34rem),
    linear-gradient(24deg, rgba(191, 91, 44, 0.1), transparent 36rem), var(--bg);
}

button,
input,
select {
  font: inherit;
}

button {
  -webkit-tap-highlight-color: transparent;
}

.app-shell {
  width: min(100%, 760px);
  min-height: 100dvh;
  margin: 0 auto;
  padding: max(18px, env(safe-area-inset-top)) 16px max(22px, env(safe-area-inset-bottom));
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 4px 2px 16px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--accent-strong);
  font-size: 0.78rem;
  font-weight: 700;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: 2.35rem;
  line-height: 1.02;
  letter-spacing: 0;
}

.workspace {
  display: grid;
  gap: 14px;
}

.subject-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  align-items: center;
  gap: 10px;
  padding: 10px;
  border: 1px solid rgba(31, 41, 51, 0.08);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.78);
  box-shadow: 0 10px 30px rgba(31, 41, 51, 0.06);
}

.subject-switcher,
.chapter-switcher {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: center;
  gap: 10px;
  width: 100%;
  color: var(--muted);
  font-size: 0.9rem;
  font-weight: 800;
}

.subject-switcher select,
.chapter-switcher select,
.text-input {
  min-width: 0;
  min-height: 44px;
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 12px;
  color: var(--ink);
  background: #ffffff;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}

.stat-card {
  min-width: 0;
  padding: 12px 10px;
  border: 1px solid rgba(31, 41, 51, 0.08);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.78);
  box-shadow: 0 10px 30px rgba(31, 41, 51, 0.06);
}

.stat-card span {
  display: block;
  color: var(--muted);
  font-size: 0.75rem;
}

.stat-card strong {
  display: block;
  margin-top: 4px;
  font-size: 1.5rem;
  line-height: 1;
}

.toolbar,
.bottom-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.toolbar {
  justify-content: space-between;
}

.mode-tabs {
  display: inline-grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 4px;
  width: min(100%, 320px);
  padding: 4px;
  border: 1px solid rgba(31, 41, 51, 0.08);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.78);
}

.mode-tab,
.ghost-button,
.primary-button,
.secondary-button,
.icon-button {
  border: 0;
  border-radius: 8px;
  cursor: pointer;
}

.mode-tab {
  min-height: 38px;
  color: var(--muted);
  background: transparent;
  font-weight: 700;
}

.mode-tab.is-active {
  color: #ffffff;
  background: var(--accent);
}

.ghost-button,
.secondary-button {
  min-height: 46px;
  padding: 0 16px;
  border: 1px solid var(--line);
  color: var(--ink);
  background: rgba(255, 255, 255, 0.84);
  font-weight: 700;
}

.primary-button {
  min-height: 50px;
  padding: 0 20px;
  color: #ffffff;
  background: var(--accent);
  font-weight: 800;
  box-shadow: 0 12px 26px rgba(31, 122, 104, 0.24);
}

.submit-button {
  width: 100%;
  margin-top: 14px;
}

.icon-button {
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  flex: 0 0 auto;
  color: var(--ink);
  background: rgba(255, 255, 255, 0.82);
  border: 1px solid rgba(31, 41, 51, 0.08);
}

.icon-button span {
  font-size: 1.35rem;
  line-height: 1;
}

.question-panel {
  padding: 18px;
  border: 1px solid rgba(31, 41, 51, 0.08);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.9);
  box-shadow: var(--shadow);
}

.question-meta,
.answer-line {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  color: var(--muted);
  font-size: 0.86rem;
  font-weight: 700;
}

.question-meta span:first-child {
  min-width: 0;
  overflow-wrap: anywhere;
}

.progress-track {
  height: 8px;
  margin: 12px 0 18px;
  overflow: hidden;
  border-radius: 999px;
  background: #ebe6da;
}

.progress-bar {
  width: 0%;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent), #83a93f);
  transition: width 180ms ease;
}

#questionText {
  margin-bottom: 18px;
  font-size: 1.32rem;
  line-height: 1.45;
  letter-spacing: 0;
}

.jump-control {
  display: grid;
  gap: 8px;
  margin: -4px 0 18px;
}

.jump-control input[type="range"] {
  width: 100%;
  accent-color: var(--accent);
}

.options {
  display: grid;
  gap: 10px;
}

.option-button {
  display: grid;
  grid-template-columns: 36px 1fr;
  align-items: start;
  gap: 10px;
  width: 100%;
  min-height: 54px;
  padding: 11px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  background: #ffffff;
  text-align: left;
}

.option-button:disabled {
  opacity: 1;
}

.option-key {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border-radius: 999px;
  background: #eef2f5;
  font-weight: 800;
}

.option-text {
  min-width: 0;
  padding-top: 4px;
  line-height: 1.45;
  overflow-wrap: anywhere;
}

.option-button.is-selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.option-button.is-correct {
  border-color: rgba(39, 118, 74, 0.7);
  background: #e9f6ec;
}

.option-button.is-wrong {
  border-color: rgba(190, 59, 69, 0.68);
  background: #fbebed;
}

.option-button.is-correct .option-key {
  color: #ffffff;
  background: var(--success);
}

.option-button.is-wrong .option-key {
  color: #ffffff;
  background: var(--danger);
}

.answer-panel {
  margin-top: 16px;
  padding: 14px;
  border-radius: 8px;
  background: var(--panel-soft);
}

.answer-panel p {
  margin: 8px 0 0;
  color: #334155;
  line-height: 1.55;
}

.bottom-actions {
  grid-template-columns: 1fr 1fr 1fr;
  padding: 8px;
  border: 1px solid rgba(31, 41, 51, 0.08);
  border-radius: 8px;
  background: rgba(251, 250, 246, 0.9);
}

.bottom-actions button {
  flex: 1 1 0;
  min-width: 0;
}

.settings-dialog {
  width: min(calc(100vw - 28px), 520px);
  border: 0;
  border-radius: 8px;
  padding: 0;
  color: var(--ink);
  background: var(--panel);
  box-shadow: var(--shadow);
}

.settings-dialog::backdrop {
  background: rgba(22, 28, 36, 0.42);
}

.settings-dialog form {
  display: grid;
  gap: 16px;
  padding: 18px;
}

.dialog-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.dialog-header h2 {
  margin: 0;
  font-size: 1.35rem;
}

.file-picker {
  display: grid;
  gap: 8px;
  padding: 14px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  background: #faf8f0;
  font-weight: 700;
}

.settings-field {
  display: grid;
  gap: 8px;
  color: var(--muted);
  font-weight: 800;
}

.file-picker input {
  width: 100%;
}

.dialog-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.hint {
  margin: 0;
  color: var(--muted);
  font-size: 0.9rem;
  line-height: 1.45;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

@media (max-width: 420px) {
  .app-shell {
    padding-inline: 12px;
  }

  h1 {
    font-size: 2rem;
  }

  .question-panel {
    padding: 15px;
  }

  .toolbar {
    align-items: stretch;
    flex-direction: column;
  }

  .subject-row {
    grid-template-columns: 1fr;
  }

  .mode-tabs {
    width: 100%;
  }

  .ghost-button {
    width: 100%;
  }

  .bottom-actions {
    gap: 6px;
  }

  .secondary-button,
  .primary-button {
    padding-inline: 10px;
  }

  .dialog-actions {
    grid-template-columns: 1fr;
  }
}

    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">离线题库</p>
          <h1 id="appTitle">离线刷题</h1>
        </div>
        <button class="icon-button" id="settingsButton" type="button" aria-label="设置">
          <span aria-hidden="true">⚙</span>
        </button>
      </header>

      <main class="workspace">
        <section class="subject-row" aria-label="学科选择">
          <label class="subject-switcher">
            <span>学科</span>
            <select id="subjectSelect"></select>
          </label>
          <label class="chapter-switcher">
            <span>章节</span>
            <select id="chapterSelect"></select>
          </label>
        </section>

        <section class="stats-grid" aria-label="刷题统计">
          <div class="stat-card">
            <span>总题数</span>
            <strong id="totalCount">0</strong>
          </div>
          <div class="stat-card">
            <span>已完成</span>
            <strong id="doneCount">0</strong>
          </div>
          <div class="stat-card">
            <span>正确率</span>
            <strong id="accuracy">0%</strong>
          </div>
        </section>

        <section class="toolbar" aria-label="刷题控制">
          <div class="mode-tabs" role="tablist" aria-label="刷题模式">
            <button class="mode-tab is-active" type="button" data-mode="all">全部</button>
            <button class="mode-tab" type="button" data-mode="wrong">错题</button>
            <button class="mode-tab" type="button" data-mode="starred">收藏</button>
          </div>
          <button class="ghost-button" id="shuffleButton" type="button">随机</button>
        </section>

        <section class="question-panel" aria-live="polite">
          <div class="question-meta">
            <span id="questionType">题目</span>
            <span id="questionPosition">0 / 0</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="jump-control">
            <input id="questionSlider" type="range" min="0" max="0" value="0" aria-label="题目进度" disabled />
          </div>
          <h2 id="questionText">正在读取题库...</h2>
          <div class="options" id="options"></div>
          <button class="primary-button submit-button" id="submitButton" type="button" hidden>
            提交答案
          </button>
          <div class="answer-panel" id="answerPanel" hidden>
            <div class="answer-line" id="answerLine"></div>
            <p id="explanation"></p>
          </div>
        </section>

        <section class="bottom-actions" aria-label="题目操作">
          <button class="secondary-button" id="prevButton" type="button">上一题</button>
          <button class="secondary-button" id="starButton" type="button">收藏</button>
          <button class="primary-button" id="nextButton" type="button">下一题</button>
        </section>
      </main>
    </div>

    <dialog class="settings-dialog" id="settingsDialog">
      <form method="dialog">
        <div class="dialog-header">
          <h2>题库设置</h2>
          <button class="icon-button" type="submit" aria-label="关闭">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <label class="settings-field">
          <span>新学科名称</span>
          <input class="text-input" id="subjectNameInput" type="text" placeholder="例如 医学心理学、免疫学" />
        </label>
        <label class="file-picker">
          <span>导入一个或多个 txt 题库到新学科</span>
          <input id="fileInput" type="file" accept=".txt,text/plain" multiple />
        </label>
        <div class="dialog-actions">
          <button class="secondary-button" id="resetProgressButton" type="button">清空当前进度</button>
          <button class="secondary-button" id="loadDefaultButton" type="button">恢复内置学科</button>
          <button class="secondary-button" id="deleteSubjectButton" type="button">删除当前学科</button>
        </div>
        <p class="hint" id="parseHint">支持 [章节]、[题目]、A：选项、[答案]、[解析] 这种格式；一次选择多个 txt 时会按文件名分章节。</p>
      </form>
    </dialog>

    <template id="optionTemplate">
      <button class="option-button" type="button">
        <span class="option-key"></span>
        <span class="option-text"></span>
      </button>
    </template>

    <script
      class="embedded-question-bank"
      data-subject-id="embedded-biochemistry"
      data-subject-name="生物化学"
      data-source-name="1.txt"
      type="text/plain"
    >
[单选题]
[题目] 1. 蛋白质合成后经化学修饰的氨基酸是（）
A：半胱氨酸
B：羟脯氨酸
C：甲硫氨酸
D：丝氨酸
E：酪氨酸
[答案] B
[解析] 蛋白质合成后经化学修饰的氨基酸为羟脯氨酸，其余选项均为蛋白质合成的基本氨基酸，故答案选 B。
[题目] 2. 参与合成人体蛋白质的氨基酸，不是 L-α 氨基酸的是（）
A：甘氨酸
B：丙氨酸
C：丝氨酸
D：亮氨酸
E：异亮氨酸
[答案] A
[解析] 甘氨酸的 α- 碳原子上连有两个氢原子，无手性碳原子，故无 L 型或 D 型之分，其余选项均为 L-α 氨基酸，答案选 A。
[题目] 3. 各种蛋白质的含氮量很接近，平均为（）
A：19%
B：18%
C：17%
D：16%
E：15%
[答案] D
[解析] 各种蛋白质的含氮量平均为 16%，这是蛋白质元素组成的重要特征，可用于蛋白质定量计算，答案选 D。
[题目] 4. 不存在于人体蛋白质分子中的氨基酸是（）
A：鸟氨酸
B：谷氨酸
C：甘氨酸
D：亮氨酸
E：丙氨酸
[答案] A
[解析] 鸟氨酸是尿素循环中的中间产物，不参与人体蛋白质的合成，其余选项均为人体蛋白质的组成氨基酸，答案选 A。
[题目] 5. 组成人体蛋白质多肽链的基本单位大多数是（）
A：L-α- 氨基酸
B：D-α- 氨基酸
C：L-β- 氨基酸
D：D-β- 氨基酸
E：以上都不是
[答案] A
[解析] 组成人体蛋白质多肽链的基本单位绝大多数是 L-α- 氨基酸，答案选 A。
[题目] 6. 下列氨基酸中无 L 型或 D 型之分的是（）
A：谷氨酸
B：甘氨酸
C：半胱氨酸
D：赖氨酸
E：组氨酸
[答案] B
[解析] 甘氨酸的 α- 碳上没有不对称碳原子，因此无 L 型或 D 型之分，其余氨基酸均有手性碳原子，存在 L 型和 D 型，答案选 B。
[题目] 7. 属于酸性氨基酸的是（）
A：半胱氨酸
B：苏氨酸
C：苯丙氨酸
D：谷氨酸
E：组氨酸
[答案] D
[解析] 酸性氨基酸包括谷氨酸和天冬氨酸，其侧链含有羧基，显酸性，答案选 D。
[题目] 8. 谷氨酸属于（）
A：含芳香环的氨基酸
B：非极性脂肪族氨基酸
C：酸性氨基酸
D：碱性氨基酸
E：极性中性氨基酸
[答案] C
[解析] 谷氨酸侧链含羧基，具有酸性，属于酸性氨基酸，答案选 C。
[题目] 9. 下列关于肽的叙述，错误的是（）
A：肽是两个或两个以上氨基酸通过肽键连接而成的化合物
B：组成肽的氨基酸分子都不完整
C：肽没有氨基末端和羧基末端
D：肽链中的氨基酸称为氨基酸残基
E：肽分为寡肽和多肽
[答案] C
[解析] 肽链有游离的氨基末端（N 端）和羧基末端（C 端），其余选项描述均正确，答案选 C。
[题目] 10. 含巯基的氨基酸是（）
A：半胱氨酸
B：丝氨酸
C：蛋氨酸 (甲硫氨酸)
D：脯氨酸
E：鸟氨酸
[答案] A
[解析] 半胱氨酸的侧链含有巯基（-SH），是其特征性基团，答案选 A。
[题目] 11. 蛋白质分子中 β- 转角属于蛋白质的（）
A：四级结构
B：三级结构
C：二级结构
D：一级结构
E：侧链结构
[答案] C
[解析] 蛋白质二级结构包括 α- 螺旋、β- 折叠、β- 转角和无规卷曲，答案选 C。
[题目] 12. 有关蛋白质亚基的描述，正确的是（）
A：一条多肽链卷曲成螺旋结构
B：两条以上多肽链卷曲形成的二级结构
C：两条以上多肽链与辅基结合成蛋白质
D：每个亚基都有各自的三级结构
E：一条多肽链就是一个亚基
[答案] D
[解析] 蛋白质亚基是指具有独立三级结构的多肽链，可通过非共价键聚合形成四级结构，答案选 D。
[题目] 13. 蛋白质分子的结构单元是（）
A：氢键
B：肽键平面
C：肽键
D：氨基酸残基
E：二硫键
[答案] B
[解析] 肽键平面（酰胺平面）是蛋白质分子的基本结构单元，氨基酸通过肽键连接形成肽键平面，答案选 B。
[题目] 14. 蛋白质四级结构形成时出现（）
A：亚基聚合
B：构象改变
C：二硫键形成
D：肽键断裂
E：蛋白质聚集
[答案] A
[解析] 蛋白质四级结构是多个具有三级结构的亚基通过非共价键聚合形成的结构，形成时主要发生亚基聚合，答案选 A。
[题目] 15. 蛋白质一级结构被破坏时出现（）
A：亚基聚合
B：构象改变
C：二硫键形成
D：肽键断裂
E：蛋白质聚集
[答案] D
[解析] 蛋白质一级结构是氨基酸残基的排列顺序，维系键为肽键和二硫键，一级结构破坏时会发生肽键断裂，答案选 D。
[题目] 16. 亚基解聚时（）
A：一级结构破坏
B：二级结构破坏
C：三级结构破坏
D：四级结构破坏
E：空间结构破坏
[答案] D
[解析] 四级结构是亚基间的聚合形式，亚基解聚时四级结构被破坏，其余结构不受影响，答案选 D。
[题目] 17. 维系蛋白质一级结构的化学键是（）
A：氢键
B：盐键
C：疏水键
D：二硫键
E：肽键
[答案] E
[解析] 维系蛋白质一级结构的主要化学键是肽键，二硫键是辅助维系键，答案选 E。
[题目] 18. β- 转角是（）
A：二级结构
B：模体
C：结构域
D：三级结构
E：四级结构
[答案] A
[解析]β- 转角是蛋白质二级结构的常见形式之一，答案选 A。
[题目] 19. 亚基间的空间排布是（）
A：二级结构
B：模体
C：结构域
D：三级结构
E：四级结构
[答案] E
[解析] 蛋白质四级结构描述的是亚基之间的空间排布和相互作用，答案选 E。
[题目] 20. 亮氨酸拉链是（）
A：二级结构
B：模体
C：结构域
D：三级结构
E：四级结构
[答案] B
[解析] 亮氨酸拉链是由两个 α- 螺旋组成的结构模体，属于蛋白质的超二级结构，答案选 B。
[题目] 21. 下列结构中不属于结构模体的是（）
A：锌指
B：Ω 环
C：螺旋 - 环 - 螺旋
D：碱性亮氨酸拉链
E：螺旋 - 转角 - 螺旋
[答案] B
[解析]Ω 环是二级结构的一种，不属于结构模体，其余选项均为常见的结构模体，答案选 B。
[题目] 22. 蛋白质分子中 α- 螺旋构象的特点有（）
A：螺旋方向与长轴垂直
B：为左手螺旋
C：肽键平面充分伸展
D：靠盐键维持稳定
E：氨基酸的侧链伸向于螺旋外侧
[答案] E
[解析]α- 螺旋为右手螺旋，螺旋方向与长轴平行，肽键平面折叠成螺旋状，靠氢键维持稳定，侧链伸向螺旋外侧，答案选 E。
[题目] 23. 稳定蛋白质分子中 α- 螺旋和 β- 折叠的化学键是（）
A：肽键
B：氢键
C：盐键
D：二硫键
E：疏水作用
[答案] B
[解析] 氢键是稳定蛋白质二级结构（α- 螺旋、β- 折叠）的主要化学键，答案选 B。
[题目] 24. 蛋白质分子一定具有（）
A：α- 螺旋
B：β- 折叠
C：三级结构
D：四级结构
E：亚基
[答案] C
[解析] 所有蛋白质都具有一级结构，球状蛋白质一般具有三级结构，部分蛋白质具有四级结构，α- 螺旋和 β- 折叠并非所有蛋白质都有，答案选 C。
[题目] 25. 蛋白质多肽链具有方向性，其正确描述是（）
A：3＇端→5＇端
B：5＇端→3＇端
C：N 端→C 端
D：C 端→N 端
E：羧基到氨基端
[答案] C
[解析] 蛋白质多肽链的方向性是从氨基末端（N 端）到羧基末端（C 端），答案选 C。
[题目] 26. 蛋白质的 α- 螺旋结构，每上升一圈需要的氨基酸残基数目是（）
A：4.5
B：2.5
C：2.7
D：3
E：3.6
[答案] E
[解析]α- 螺旋每上升一圈包含 3.6 个氨基酸残基，螺距为 0.54nm，答案选 E。
[题目] 27. 蛋白质分子中两个半胱氨酸残基可形成（）
A：肽键
B：二硫键
C：盐键
D：疏水键
E：氢键
[答案] B
[解析] 两个半胱氨酸残基的巯基（-SH）可氧化形成二硫键（-S-S-），答案选 B。
[题目] 28. 蛋白质分子中某些氨基酸的疏水侧链之间可形成（）
A：肽键
B：二硫键
C：盐键
D：疏水键
E：氢键
[答案] D
[解析] 疏水侧链具有疏水性，相互之间可通过疏水作用形成疏水键，答案选 D。
[题目] 29. 蛋白质分子中稳定 α- 螺旋的化学键主要是（）
A：肽键
B：二硫键
C：盐键
D：疏水键
E：氢键
[答案] E
[解析]α- 螺旋的稳定性主要依赖于氨基酸残基之间形成的氢键，答案选 E。
[题目] 30. 在多肽链中氨基酸之间链接的键是（）
A：肽键
B：二硫键
C：盐键
D：疏水键
E：氢键
[答案] A
[解析] 氨基酸之间通过肽键（酰胺键）连接形成多肽链，答案选 A。
[题目] 31. 蛋白质的一级结构及高级结构取决于（）
A：分子中的氢键
B：分子中的盐键
C：分子内部疏水键
D：氨基酸的组成及排列顺序
E：氨基酸残基的性质
[答案] D
[解析] 蛋白质的一级结构由氨基酸的组成及排列顺序决定，而高级结构（二、三、四级结构）的形成依赖于一级结构，答案选 D。
[题目] 32. 参与形成蛋白质一级结构的化学键有（）
A：二硫键、氢键
B：疏水键、氢键
C：范德华力、肽键
D：肽键、二硫键
E：氢键、盐键
[答案] D
[解析] 蛋白质一级结构的维系键包括肽键（主要）和二硫键（辅助），其余选项中的化学键参与高级结构的维系，答案选 D。
[题目] 33. 蛋白质分子中 α- 螺旋和 β- 折叠都属于（）
A：一级结构
B：二级结构
C：三级结构
D：四级结构
E：五级结构
[答案] B
[解析]α- 螺旋和 β- 折叠是蛋白质二级结构的主要类型，答案选 B。
[题目] 34. 下列关于肽键的叙述，错误的是（）
A：肽键属于一级结构
B：肽键中 C-N 键所连的四个原子处于同一平面
C：肽键具有部分双键性质
D：肽键旋转而形成了 β- 折叠
E：肽键中的 C-N 键长度比 N-C 单键短
[答案] D
[解析] 肽键具有部分双键性质，不能自由旋转，β- 折叠的形成是肽链主链折叠的结果，并非肽键旋转，答案选 D。
[题目] 35. 多肽链中肽键的本质是（）
A：疏水键
B：糖苷键
C：酰胺键
D：二硫键
E：磷酸二酯键
[答案] C
[解析] 肽键是由一个氨基酸的 α- 氨基与另一个氨基酸的 α- 羧基脱水缩合形成的酰胺键，答案选 C。
[题目] 36. 关于蛋白质二级结构的描述，错误的是（）
A：蛋白质局部或某一段肽链有规则的重复构象
B：蛋白质部分主链的空间构象
C：主链构象由每个肽键的两个二面角所确定
D：整条多肽链中全部氨基酸的位置
E：无规卷曲也属二级结构范畴
[答案] D
[解析] 蛋白质二级结构描述的是局部肽链的主链构象，不涉及整条多肽链中全部氨基酸的位置，答案选 D。
[题目] 37. 蛋白质的一级结构是指（）
A：N 端到 C 端氨基酸残基的排列顺序
B：C 端到 N 端氨基酸残基的排列顺序
C：多肽链的形状和大小
D：氨基酸种类的数目
E：分子中的共价键
[答案] A
[解析] 蛋白质一级结构是指多肽链中从 N 端到 C 端的氨基酸残基排列顺序，答案选 A。
[题目] 38. 蛋白质协同效应发生时可出现（）
A：亚基聚合
B：构象改变
C：二硫键形成
D：肽键断裂
E：蛋白质聚集
[答案] B
[解析] 蛋白质协同效应是指一个亚基结合配体后构象改变，影响其他亚基的结合能力，核心是构象改变，答案选 B。
[题目] 39. 蛋白质的一级结构是空间构象的基础，蛋白质的功能依赖特定的空间结构，如果蛋白质的折叠发生错误，尽管一级结构不变，但空间构象发生改变仍可影响其功能，严重时可导致疾病 —— 蛋白质构象病，例如（）
A：疯牛病
B：糖尿病
C：冠心病
D：脑中风
E：痛风症
[答案] A
[解析] 疯牛病是由于朊病毒蛋白构象异常导致的蛋白质构象病，其余选项均不属此类，答案选 A。
[题目] 40. 血红蛋白与肌红蛋白的结构，不同之处在于（）
A：血红素辅基不同
B：α- 螺旋结构不同
C：结合的配体不同
D：蛋白的空间结构不同
E：血红蛋白为球形，肌红蛋白为棒状结构
[答案] D
[解析] 血红蛋白具有四级结构（4 个亚基），肌红蛋白只有三级结构（1 条肽链），二者空间结构不同，其余选项描述错误，答案选 D。
[题目] 41. 镰刀形贫血患者，其血红蛋白 β 链 N 端第 6 个氨基酸残基谷氨酸被下列哪种氨基酸代替（）
A：缬氨酸
B：丙氨酸
C：丝氨酸
D：酪氨酸
E：色氨酸
[答案] A
[解析] 镰刀形贫血的分子机制是血红蛋白 β 链 N 端第 6 位谷氨酸被缬氨酸替代，导致血红蛋白构象异常，答案选 A。
[题目] 42. 患者，女，60 岁，最近记忆力下降，以前的事情回忆不起来，最近的事也总是很难记住，列述一类名词能力差，命名不能，情感淡漠，运动系统正常。经医生诊断为阿尔茨海默病（Alzheimer disease，AD）。与该疾病发生机制相关的是（）
A：分子病
B：DNA 的损伤修饰
C：蛋白质的构象病
D：翻译的异常启动
E：基因突变
[答案] C
[解析] 阿尔茨海默病与蛋白质构象异常相关，属于蛋白质构象病，答案选 C。
[题目] 43. 一黑人青年到医院就医，其症状是发热和肌肉疼痛，血液检测发现镰刀形红细胞，即镰刀型贫血，其发病的分子机制是（）
A：Hb 的 α 亚基的 N 端第六位氨基酸 Glu→Val
B：Hb 的 α 亚基的 N 端第六位氨基酸 Val→Glu
C：Hb 的 β 亚基的 N 端第六位氨基酸 Glu→Val
D：Hb 的 β 亚基 N 端的第六位氨基酸 Val→Glu
E：Hb 折叠错误导致的疾病
[答案] C
[解析] 镰刀型贫血是 Hbβ 亚基 N 端第 6 位 Glu 被 Val 替代导致，答案选 C。
[题目] 44. 关于谷胱甘肽的叙述，正确的是（）
A：是体内重要的氧化剂
B：含有胱氨酸
C：其中的谷氨酸 α- 羧基是游离的
D：C 端羧基是主要的功能基团
E：所含的肽键均为 α- 肽键
[答案] C
[解析] 谷胱甘肽是体内重要的还原剂，含半胱氨酸（而非胱氨酸），功能基团是巯基，谷氨酸的 α- 羧基游离，含有 γ- 肽键，答案选 C。
[题目] 45. 某一蛋白质分子中一个氨基酸发生了改变，这个蛋白质的（）
A：功能不一定改变
B：功能一定改变
C：二级结构一定改变
D：二级结构一定不变
E：三级结构一定改变
[答案] A
[解析] 氨基酸改变是否影响蛋白质功能取决于该氨基酸的位置和性质，功能不一定改变，二级和三级结构也不一定改变，答案选 A。
[题目] 46. 疯牛病发病的生化机制是（）
A：α- 螺旋变成了 β- 螺旋
B：α- 螺旋变成了 β- 转角
C：α- 螺旋变成了 β- 折叠
D：β- 折叠变成了 α- 螺旋
E：β- 转角变成了 β- 折叠
[答案] C
[解析] 疯牛病是由于朊病毒蛋白的 α- 螺旋构象转变为 β- 折叠构象，导致蛋白质聚集沉淀，答案选 C。
[题目] 47. 将蛋白质溶液的 pH 值调节到其等电点时（）
A：可使蛋白质稳定性增加
B：可使蛋白质溶液稳定性降低，易于沉出
C：可使蛋白质表面的净电荷不变
D：可使蛋白质表面的净电荷增加
E：对蛋白质表面水化膜无影响
[答案] B
[解析] 蛋白质在等电点时，表面净电荷为零，水化膜破坏，稳定性降低，易于沉淀，答案选 B。
[题目] 48. 蛋白质的等电点是（）
A：蛋白质溶液 pH 值为 7 时溶液的 pH 值
B：蛋白质溶液 pH 值为 7.4 时溶液 pH 值
C：蛋白质分子呈正离子状态时溶液 pH 值
D：蛋白质分子呈负离子状态时溶液 pH 值
E：蛋白质的正电荷与负电荷相等时溶液的 pH 值
[答案] E
[解析] 蛋白质等电点是指蛋白质分子正负电荷相等时溶液的 pH 值，答案选 E。
[题目] 49. 蛋白质变性是由于（）
A：蛋白质空间构象的破坏
B：蛋白质亚基的解聚
C：蛋白质的水解
D：蛋白质一级结构的改变
E：辅基的脱落
[答案] A
[解析] 蛋白质变性的本质是空间构象被破坏，一级结构不变，答案选 A。
[题目] 50. 含有 Ala，Asp，Lys，Cys 的混合液，其 pI 依次分别为 6.0，2.77，9.74，5.07，在 pH9 的溶液中电泳分离这四种氨基酸，自正极开始，电泳区带的顺序是（）
A：Ala，Cys，Lys，Asp
B：Asp，Cys，Ala，Lys
C：Asp，Ala，Lys，Cys
D：Cys，Lys，Ala，Asp
E：Lys，Ala，Cys，Asp
[答案] B
[解析] pH9 时，氨基酸 pI＜9 带负电，向正极移动；pI＞9 带正电，向负极移动。带负电越多，迁移速度越快。Asp（pI2.77）＞Cys（pI5.07）＞Ala（pI6.0）均带负电，Lys（pI9.74）带正电，故顺序为 Asp、Cys、Ala、Lys，答案选 B。
[题目] 51. 蛋白质被蛋白酶水解时会出现（）
A：亚基聚合
B：构象改变
C：二硫键形成
D：肽键断裂
E：蛋白质聚集
[答案] D
[解析] 蛋白酶的作用是水解蛋白质中的肽键，使蛋白质分解为多肽或氨基酸，答案选 D。
[题目] 52. 蛋白质在电场中移动的方向取决于（）
A：二级结构
B：三级结构
C：空间结构
D：等电点
E：电荷
[答案] E
[解析] 蛋白质在电场中移动方向由其表面所带电荷性质决定，带正电向负极移动，带负电向正极移动，答案选 E。
[题目] 53. pI 等于 5.6 的蛋白质在 pH 为 8.0 条件下电泳时（）
A：向负极移动
B：向正极移动
C：原处不动
D：呈电中性
E：带正电荷
[答案] B
[解析] pH8.0＞pI5.6，蛋白质带负电，电泳时向正极移动，答案选 B。
[题目] 54. 蛋白质在酶的作用下可完全水解成（）
A：多肽
B：脂蛋白
C：氨基酸
D：脂蛋白与氨基酸
E：氨基酸与多肽
[答案] C
[解析] 蛋白质在蛋白酶和肽酶的共同作用下完全水解，最终产物为氨基酸，答案选 C。
[题目] 55. 能使蛋白质沉淀而不变性的试剂是（）
A：浓盐酸
B：浓氢氧化钠溶液
C：硫酸铵溶液
D：生理盐水
E：蒸馏水
[答案] C
[解析] 硫酸铵溶液通过盐析作用使蛋白质沉淀，不破坏蛋白质空间构象，即不变性；浓酸、浓碱、重金属盐等会使蛋白质变性，答案选 C。
[题目] 56. 当溶液的 pH 值与某种氨基酸的 pI 一致时，该氨基酸在此溶液中的存在形式是（）
A：兼性离子
B：非兼性离子
C：带单价正电荷
D：带单价负电荷
E：疏水分子
[答案] A
[解析] 当溶液 pH 等于氨基酸 pI 时，氨基酸分子正负电荷相等，以兼性离子形式存在，答案选 A。
[题目] 57. 能使蛋白质溶液稳定的因素是（）
A：蛋白质不带电荷
B：蛋白质溶液的黏度大
C：蛋白质分子表面带有水化膜和电荷层
D：蛋白质分子表面的疏水基因相互排斥
E：蛋白质分子中的肽键
[答案] C
[解析] 蛋白质溶液稳定的关键因素是分子表面的水化膜和电荷层，可防止蛋白质分子聚集沉淀，答案选 C。
[题目] 58. 下列哪个因素不会破坏蛋白质的空间构象（）
A：盐析
B：加热
C：酸碱
D：β 巯基乙醇
E：重金属盐
[答案] A
[解析] 盐析仅使蛋白质沉淀，不破坏空间构象；加热、酸碱、β 巯基乙醇、重金属盐均会破坏蛋白质空间构象导致变性，答案选 A。
[题目] 59. 蛋白质变性不包括（）
A：氢键断裂
B：肽键断裂
C：盐键断裂
D：疏水键断裂
E：二硫键断裂
[答案] B
[解析] 蛋白质变性是空间构象破坏，维系空间构象的氢键、盐键、疏水键、二硫键等断裂，但肽键（一级结构）不变，答案选 B。
[题目] 60. 使蛋白质变性的因素是（）
A：透析
B：超滤
C：有机溶剂
D：离心
E：盐析
[答案] C
[解析] 有机溶剂（如乙醇、丙酮）可破坏蛋白质水化膜，导致蛋白质变性；透析、超滤、离心、盐析均不使蛋白质变性，答案选 C。
[题目] 61. 与蛋白质在电场中泳动的方向和速度无关的是（）
A：蛋白质分子的大小
B：蛋白质分子所带的电荷
C：蛋白质的等电点
D：蛋白质溶液的 pH
E：蛋白质溶液的温度
[答案] E
[解析] 蛋白质电泳的方向和速度与分子大小、带电量、等电点、溶液 pH 相关，与温度无关，答案选 E。
[题目] 62. 既可以分离蛋白质、也可以测定其分子量的实验技术是（）
A：亲和层析
B：超速离心
C：透析
D：离子交换层析
E：盐析
[答案] B
[解析] 超速离心法可根据蛋白质分子量和密度差异分离蛋白质，同时能测定蛋白质分子量，答案选 B。
[题目] 63. 下列蛋白质混合液通过凝胶过滤层析时，最先被洗脱下来的是（）
A：马肝过氧化氢酶（相对分子量 247500）
B：肌红蛋白（相对分子量 16900）
C：人血清蛋白（相对分子量 68500）
D：牛 G - 乳球蛋白（相对分子量 35000）
E：牛胰岛素（相对分子量 5733）
[答案] A
[解析] 凝胶过滤层析中，分子量大的蛋白质无法进入凝胶颗粒内部，流经路径短，最先被洗脱；分子量最小的最后洗脱，答案选 A。
[题目] 64. 盐析法沉淀蛋白质的原理是（）
A：降低蛋白质溶液的介电常数
B：无机盐与蛋白质结合成不溶性的沉淀复合物
C：破坏蛋白质的一级结构
D：调节蛋白质溶液的等电点
E：破坏蛋白质的水化膜、并中和其电荷
[答案] E
[解析] 盐析法通过加入大量中性盐，破坏蛋白质表面的水化膜并中和电荷，使蛋白质稳定性降低而沉淀，答案选 E。
[多选题]
[题目] 1. 血红蛋白（）
A：由 4 个亚基组成
B：辅基为血红素
C：其亚基间可发生负协同效应
D：具有四级结构
E：是亲水球状蛋白
[答案] ABDE
[解析] 血红蛋白由 2 个 α 亚基和 2 个 β 亚基组成（共 4 个亚基），辅基为血红素，具有四级结构，属于亲水球状蛋白，亚基间发生正协同效应，C 选项错误，其余选项正确。
[题目] 2. 谷胱甘肽（）
A：体内重要的还原剂
B：由谷氨酸、半胱氨酸和甘氨酸组成的三肽
C：功能基团是巯基
D：其中的谷氨酸 α- 羧基是游离的
E：各氨基酸之间均由 α- 氨基和 α- 羧基缩合而成
[答案] ABCD
[解析] 谷胱甘肽是体内重要还原剂，由谷氨酸、半胱氨酸、甘氨酸组成，功能基团是半胱氨酸的巯基，谷氨酸的 α- 羧基游离，其分子中存在 γ- 肽键（谷氨酸 γ- 羧基与半胱氨酸 α- 氨基连接），E 选项错误，其余选项正确。
[题目] 3. 谷胱甘肽是（）
A：由谷、半胱和甘氨酸组成的三肽
B：巯基是主要功能基团
C：体内还原型物质
D：体内传递信息的物质
E：体内调节代谢的物质
[答案] ABC
[解析] 谷胱甘肽是由谷氨酸、半胱氨酸、甘氨酸组成的三肽，巯基是其主要功能基团，属于体内重要的还原型物质，不参与信息传递和代谢调节，D、E 选项错误，其余选项正确。

  accuracy: document.querySelector("#accuracy"),
  questionType: document.querySelector("#questionType"),
  questionPosition: document.querySelector("#questionPosition"),
  questionSlider: document.querySelector("#questionSlider"),
  questionText: document.querySelector("#questionText"),
  options: document.querySelector("#options"),
  submitButton: document.querySelector("#submitButton"),
  answerPanel: document.querySelector("#answerPanel"),
  answerLine: document.querySelector("#answerLine"),
  explanation: document.querySelector("#explanation"),
  progressBar: document.querySelector("#progressBar"),
  prevButton: document.querySelector("#prevButton"),
  nextButton: document.querySelector("#nextButton"),
  starButton: document.querySelector("#starButton"),
  shuffleButton: document.querySelector("#shuffleButton"),
  settingsButton: document.querySelector("#settingsButton"),
  settingsDialog: document.querySelector("#settingsDialog"),
  subjectNameInput: document.querySelector("#subjectNameInput"),
  fileInput: document.querySelector("#fileInput"),
  resetProgressButton: document.querySelector("#resetProgressButton"),
  loadDefaultButton: document.querySelector("#loadDefaultButton"),
  deleteSubjectButton: document.querySelector("#deleteSubjectButton"),
  parseHint: document.querySelector("#parseHint"),
  optionTemplate: document.querySelector("#optionTemplate"),
  modeTabs: Array.from(document.querySelectorAll(".mode-tab")),
};

function normalizeText(text) {
  return text.replace(/\uFEFF/g, "").replace(/\r\n?/g, "\n").replace(/[：﹕]/g, ":");
}

function cleanLine(line) {
  return line.trim().replace(/\s+/g, " ");
}

function normalizeChapterName(name) {
  return cleanLine(name || "").replace(/[<>:"/\\|?*]/g, "") || DEFAULT_CHAPTER_NAME;
}

function parseChapterMarker(line) {
  const bracketMatch = line.match(/^\[(?:章节|章|Chapter)\]\s*(.+)$/i);
  if (bracketMatch) return normalizeChapterName(bracketMatch[1]);

  const markdownMatch = line.match(/^#{1,3}\s+(.+)$/);
  if (markdownMatch) return normalizeChapterName(markdownMatch[1]);

  return "";
}

function parseQuestions(rawText) {
  const text = normalizeText(rawText);
  const lines = text.split("\n");
  const questions = [];
  let currentType = "练习题";
  let currentChapter = DEFAULT_CHAPTER_NAME;
  let current = null;
  let section = null;

  const commitQuestion = () => {
    if (!current) return;
    current.question = cleanLine(current.question);
    current.answer = current.answer.replace(/\s+/g, "").toUpperCase();
    current.explanation = current.explanation.trim();
    current.options = current.options.filter((option) => option.text.trim());
    if (current.question && current.answer && current.options.length > 0) {
      current.id = `${current.type}-${current.number || questions.length + 1}-${hashText(
        current.question,
      )}`;
      questions.push(current);
    }
    current = null;
  };

  for (const originalLine of lines) {
    const line = originalLine.trim();
    if (!line) continue;

    const chapterName = parseChapterMarker(line);
    if (chapterName) {
      commitQuestion();
      currentChapter = chapterName;
      section = null;
      continue;
    }

    const typeMatch = line.match(/^\[(.+题)\]$/);
    if (typeMatch && !/题目|答案|解析/.test(typeMatch[1])) {
      commitQuestion();
      currentType = typeMatch[1];
      section = null;
      continue;
    }

    const questionMatch = line.match(/^\[题目\]\s*(.*)$/);
    if (questionMatch) {
      commitQuestion();
      const title = questionMatch[1].trim();
      const numberMatch = title.match(/^(\d+)[.、]\s*(.*)$/);
      current = {
        id: "",
        type: currentType,
        chapter: currentChapter,
        number: numberMatch ? Number(numberMatch[1]) : questions.length + 1,
        question: numberMatch ? numberMatch[2] : title,
        options: [],
        answer: "",
        explanation: "",
      };
      section = "question";
      continue;
    }

    if (!current) continue;

    const answerMatch = line.match(/^\[答案\]\s*(.*)$/);
    if (answerMatch) {
      current.answer = answerMatch[1].trim();
      section = "answer";
      continue;
    }

    const explanationMatch = line.match(/^\[解析\]\s*(.*)$/);
    if (explanationMatch) {
      current.explanation = explanationMatch[1].trim();
      section = "explanation";
      continue;
    }

    const optionMatch = line.match(/^([A-Z])\s*[:.、]\s*(.*)$/i);
    if (optionMatch) {
      current.options.push({
        key: optionMatch[1].toUpperCase(),
        text: optionMatch[2].trim(),
      });
      section = "options";
      continue;
    }

    if (section === "question") {
      current.question = `${current.question} ${line}`.trim();
    } else if (section === "answer") {
      current.answer += line;
    } else if (section === "explanation") {
      current.explanation = `${current.explanation}\n${line}`.trim();
    } else if (section === "options" && current.options.length) {
      const lastOption = current.options[current.options.length - 1];
      lastOption.text = `${lastOption.text} ${line}`.trim();
    }
  }

  commitQuestion();
  return questions;
}

function hashText(input) {
  let hash = 5381;
  for (let i = 0; i < input.length; i += 1) {
    hash = (hash * 33) ^ input.charCodeAt(i);
  }
  return (hash >>> 0).toString(36);
}

function loadJson(key, fallback) {
  try {
    const value = localStorage.getItem(key);
    return value ? JSON.parse(value) : fallback;
  } catch {
    return fallback;
  }
}

function saveJson(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (error) {
    els.parseHint.textContent = `保存失败：${error.message}`;
    return false;
  }
}

async function decodeTextFile(file) {
  const buffer = await file.arrayBuffer();
  const candidates = [
    ["utf-8", true],
    ["gb18030", false],
    ["gbk", false],
  ];

  for (const [encoding, fatal] of candidates) {
    try {
      const decoded = new TextDecoder(encoding, { fatal }).decode(buffer);
      if (looksLikeQuestionBank(decoded)) return decoded;
    } catch {
      continue;
    }
  }

  return new TextDecoder("utf-8").decode(buffer);
}

function looksLikeQuestionBank(text) {
  const sample = text.slice(0, 4000);
  return /\[题目\]|\[答案\]|\[解析\]/.test(sample) && !sample.includes("\uFFFD");
}

function guessSubjectName(fileName) {
  return (fileName || "")
    .replace(/\.[^.]+$/, "")
    .replace(/^\d+$/, "")
    .replace(/[_-]+/g, " ")
    .trim();
}

function normalizeSubjectName(name) {
  return cleanLine(name || "").replace(/[<>:"/\\|?*]/g, "");
}

function makeSubjectId(name) {
  return `subject-${Date.now().toString(36)}-${hashText(name).slice(0, 6)}`;
}

function createSubject({ id, name, sourceName, text, origin = "imported" }) {
  const questions = parseQuestions(text);
  if (!questions.length) {
    throw new Error("没有识别到题目，请检查 txt 格式");
  }
  const chapterCount = new Set(questions.map((question) => question.chapter)).size;

  return {
    id,
    name: normalizeSubjectName(name) || "未命名学科",
    sourceName: sourceName || "本地题库",
    text,
    questionCount: questions.length,
    chapterCount,
    origin,
    updatedAt: Date.now(),
  };
}

function readEmbeddedSubjects() {
  return Array.from(document.querySelectorAll(EMBEDDED_BANK_SELECTOR))
    .map((node, index) => {
      const text = node.textContent.trim();
      if (!text) return null;
      const name = normalizeSubjectName(node.dataset.subjectName) || `内置题库 ${index + 1}`;
      return createSubject({
        id: node.dataset.subjectId || `embedded-${hashText(name)}`,
        name,
        sourceName: node.dataset.sourceName || `${name}.txt`,
        text,
        origin: "embedded",
      });
    })
    .filter(Boolean);
}

function isSubjectSuppressed(subjectId) {
  return state.suppressedSubjectIds.includes(subjectId);
}

function suppressSubjectId(subjectId) {
  if (!subjectId || isSubjectSuppressed(subjectId)) return false;
  state.suppressedSubjectIds.push(subjectId);
  return true;
}

function unsuppressSubjectId(subjectId) {
  const before = state.suppressedSubjectIds.length;
  state.suppressedSubjectIds = state.suppressedSubjectIds.filter((id) => id !== subjectId);
  return state.suppressedSubjectIds.length !== before;
}

function loadLibrary() {
  const library = loadJson(STORAGE_KEYS.library, null);
  state.subjects = library?.subjects || {};
  state.currentSubjectId = library?.currentSubjectId || "";
  state.suppressedSubjectIds = Array.isArray(library?.suppressedSubjectIds)
    ? library.suppressedSubjectIds
    : [];

  let changed = installEmbeddedSubjects(false);
  changed = migrateLegacySubject() || changed;

  if (!state.currentSubjectId || !state.subjects[state.currentSubjectId]) {
    state.currentSubjectId =
      state.subjects[DEFAULT_SUBJECT_ID]?.id || Object.keys(state.subjects)[0] || "";
    changed = true;
  }

  if (changed) saveLibrary();
}

function installEmbeddedSubjects(forceReset) {
  let changed = false;
  for (const subject of readEmbeddedSubjects()) {
    if (forceReset) {
      changed = unsuppressSubjectId(subject.id) || changed;
    } else if (isSubjectSuppressed(subject.id)) {
      continue;
    }

    const existing = state.subjects[subject.id];
    if (forceReset || !existing || existing.origin === "embedded") {
      state.subjects[subject.id] = {
        ...subject,
        updatedAt: existing?.updatedAt || subject.updatedAt,
      };
      changed = true;
    }
  }
  return changed;
}

function migrateLegacySubject() {
  const savedBank = loadJson(LEGACY_KEYS.questions, null);
  if (!savedBank?.text || savedBank.sourceName === "默认题库") return false;

  const legacyId = `legacy-${hashText(savedBank.sourceName + savedBank.text)}`;
  if (isSubjectSuppressed(legacyId)) return false;
  if (state.subjects[legacyId]) return false;

  const name = guessSubjectName(savedBank.sourceName) || "导入题库";
  try {
    state.subjects[legacyId] = createSubject({
      id: legacyId,
      name,
      sourceName: savedBank.sourceName,
      text: savedBank.text,
      origin: "legacy",
    });

    const legacyProgress = loadJson(LEGACY_KEYS.progress, null);
    const legacySettings = loadJson(LEGACY_KEYS.settings, {});
    if (legacyProgress) {
      const store = loadJson(STORAGE_KEYS.progress, {});
      store[legacyId] = {
        questions: legacyProgress,
        positions: {},
        mode: legacySettings.mode || "all",
        chapter: ALL_CHAPTER_ID,
        shuffled: Boolean(legacySettings.shuffled),
      };
      saveJson(STORAGE_KEYS.progress, store);
    }
    return true;
  } catch {
    return false;
  }
}

function saveLibrary() {
  return saveJson(STORAGE_KEYS.library, {
    subjects: state.subjects,
    currentSubjectId: state.currentSubjectId,
    suppressedSubjectIds: state.suppressedSubjectIds,
  });
}

function loadProgressStore() {
  return loadJson(STORAGE_KEYS.progress, {});
}

function saveCurrentProgress() {
  if (!state.currentSubjectId || !state.subjectProgress) return;
  const store = loadProgressStore();
  store[state.currentSubjectId] = state.subjectProgress;
  saveJson(STORAGE_KEYS.progress, store);
}

function getSubjectProgress(subjectId) {
  const store = loadProgressStore();
  if (!store[subjectId]) {
    store[subjectId] = {
      questions: {},
      positions: {},
      mode: "all",
      chapter: ALL_CHAPTER_ID,
      shuffled: false,
    };
    saveJson(STORAGE_KEYS.progress, store);
  } else {
    store[subjectId].questions ||= {};
    store[subjectId].positions ||= {};
    store[subjectId].mode ||= "all";
    store[subjectId].chapter ||= ALL_CHAPTER_ID;
    store[subjectId].shuffled = Boolean(store[subjectId].shuffled);
    saveJson(STORAGE_KEYS.progress, store);
  }
  return store[subjectId];
}

function getQuestionProgress(questionId) {
  if (!state.subjectProgress.questions[questionId]) {
    state.subjectProgress.questions[questionId] = {
      selected: [],
      answered: false,
      correct: false,
      starred: false,
    };
  }
  return state.subjectProgress.questions[questionId];
}

function currentSubject() {
  return state.subjects[state.currentSubjectId];
}

function currentQuestion() {
  return state.visibleQuestions[state.index];
}

function isMultiQuestion(question) {
  return question.type.includes("多选") || question.answer.length > 1;
}

function isCorrectSelection(question, selected) {
  const expected = [...question.answer].sort().join("");
  const actual = [...selected].sort().join("");
  return expected === actual;
}

function subjectList() {
  return Object.values(state.subjects).sort((a, b) => {
    if (a.origin === "embedded" && b.origin !== "embedded") return -1;
    if (a.origin !== "embedded" && b.origin === "embedded") return 1;
    return a.name.localeCompare(b.name, "zh-Hans-CN");
  });
}

function chapterList() {
  const counts = new Map();
  for (const question of state.allQuestions) {
    const chapter = question.chapter || DEFAULT_CHAPTER_NAME;
    counts.set(chapter, (counts.get(chapter) || 0) + 1);
  }
  return [...counts.entries()].map(([name, count]) => ({
    id: hashText(name),
    name,
    count,
  }));
}

function selectedChapter() {
  return chapterList().find((chapter) => chapter.id === state.currentChapterId) || null;
}

function validChapterId(chapterId) {
  if (chapterId === ALL_CHAPTER_ID) return ALL_CHAPTER_ID;
  return chapterList().some((chapter) => chapter.id === chapterId) ? chapterId : ALL_CHAPTER_ID;
}

function currentChapterQuestions() {
  const chapter = selectedChapter();
  if (!chapter) return [...state.allQuestions];
  return state.allQuestions.filter((question) => hashText(question.chapter || DEFAULT_CHAPTER_NAME) === chapter.id);
}

function positionKey() {
  return `${state.mode}:${state.currentChapterId || ALL_CHAPTER_ID}`;
}

function savePosition() {
  if (!state.subjectProgress) return;
  const question = currentQuestion();
  state.subjectProgress.mode = state.mode;
  state.subjectProgress.chapter = state.currentChapterId;
  state.subjectProgress.shuffled = state.shuffled;
  if (question) {
    state.subjectProgress.positions[positionKey()] = {
      questionId: question.id,
      index: state.index,
    };
  }
  saveCurrentProgress();
}

function selectSubject(subjectId) {
  if (!state.subjects[subjectId]) {
    if (subjectList().length === 0) renderEmptyLibrary();
    return;
  }
  savePosition();
  state.currentSubjectId = subjectId;
  saveLibrary();

  const subject = currentSubject();
  state.allQuestions = parseQuestions(subject.text);
  state.subjectProgress = getSubjectProgress(subjectId);
  state.mode = state.subjectProgress.mode || "all";
  state.currentChapterId = validChapterId(state.subjectProgress.chapter || ALL_CHAPTER_ID);
  state.shuffled = Boolean(state.subjectProgress.shuffled);
  state.index = 0;

  renderSubjectSelect();
  renderChapterSelect();
  updateTitle();
  updateModeTabs();
  updateShuffleButton();
  rebuildVisibleQuestions({ useSavedPosition: true });
  const chapters = chapterList();
  els.parseHint.textContent = `${subject.name}：${subject.questionCount} 题，${chapters.length} 章`;
}

function rebuildVisibleQuestions({
  preferredQuestionId = "",
  fallbackIndex = state.index,
  useSavedPosition = false,
} = {}) {
  let questions = currentChapterQuestions();
  if (state.mode === "wrong") {
    questions = questions.filter((question) => {
      const progress = state.subjectProgress.questions[question.id];
      return progress?.answered && !progress.correct;
    });
  } else if (state.mode === "starred") {
    questions = questions.filter((question) => state.subjectProgress.questions[question.id]?.starred);
  }

  if (state.shuffled) {
    questions.sort((a, b) => hashText(`${b.id}-shuffle`) - hashText(`${a.id}-shuffle`));
  }

  state.visibleQuestions = questions;

  let nextIndex = -1;
  if (preferredQuestionId) {
    nextIndex = questions.findIndex((question) => question.id === preferredQuestionId);
  }

  if (nextIndex < 0 && useSavedPosition) {
    const saved =
      state.subjectProgress.positions[positionKey()] ||
      (state.currentChapterId === ALL_CHAPTER_ID ? state.subjectProgress.positions[state.mode] : null);
    if (saved?.questionId) {
      nextIndex = questions.findIndex((question) => question.id === saved.questionId);
    }
    if (nextIndex < 0 && Number.isInteger(saved?.index)) {
      nextIndex = saved.index;
    }
  }

  if (nextIndex < 0) nextIndex = fallbackIndex;
  state.index = Math.max(0, Math.min(nextIndex, Math.max(questions.length - 1, 0)));
  render();
  savePosition();
}

function updateTitle() {
  const subject = currentSubject();
  const title = subject?.name || "离线刷题";
  els.appTitle.textContent = title;
  document.title = `${title}刷题`;
}

function renderSubjectSelect() {
  els.subjectSelect.innerHTML = "";
  for (const subject of subjectList()) {
    const option = document.createElement("option");
    option.value = subject.id;
    const chapterText = subject.chapterCount > 1 ? ` / ${subject.chapterCount}章` : "";
    option.textContent = `${subject.name}（${subject.questionCount}题${chapterText}）`;
    option.selected = subject.id === state.currentSubjectId;
    els.subjectSelect.appendChild(option);
  }
  els.deleteSubjectButton.disabled = subjectList().length === 0;
}

function renderChapterSelect() {
  els.chapterSelect.innerHTML = "";

  const allOption = document.createElement("option");
  allOption.value = ALL_CHAPTER_ID;
  allOption.textContent = `全部章节（${state.allQuestions.length}题）`;
  allOption.selected = state.currentChapterId === ALL_CHAPTER_ID;
  els.chapterSelect.appendChild(allOption);

  for (const chapter of chapterList()) {
    const option = document.createElement("option");
    option.value = chapter.id;
    option.textContent = `${chapter.name}（${chapter.count}题）`;
    option.selected = chapter.id === state.currentChapterId;
    els.chapterSelect.appendChild(option);
  }
}

function renderEmptyLibrary(message = "没有可用题库，请在设置中导入 txt 文件。") {
  state.currentSubjectId = "";
  state.currentChapterId = ALL_CHAPTER_ID;
  state.allQuestions = [];
  state.visibleQuestions = [];
  state.subjectProgress = null;
  state.index = 0;

  updateTitle();
  renderSubjectSelect();
  renderChapterSelect();
  renderStats();

  els.options.innerHTML = "";
  els.questionType.textContent = "暂无题库";
  els.questionPosition.textContent = "0 / 0";
  els.questionText.textContent = message;
  els.answerPanel.hidden = true;
  els.submitButton.hidden = true;
  els.progressBar.style.width = "0%";
  els.questionSlider.min = "0";
  els.questionSlider.max = "0";
  els.questionSlider.value = "0";
  els.questionSlider.disabled = true;
  els.prevButton.disabled = true;
  els.nextButton.disabled = true;
  els.starButton.disabled = true;
}

function render() {
  renderStats();
  const question = currentQuestion();
  els.options.innerHTML = "";

  if (!question) {
    els.questionType.textContent = state.mode === "all" ? "暂无题目" : "没有匹配题目";
    els.questionPosition.textContent = "0 / 0";
    els.questionText.textContent =
      state.mode === "wrong"
        ? "还没有错题，回到全部继续刷。"
        : state.mode === "starred"
          ? "还没有收藏题，遇到重点题可以点收藏。"
          : "没有识别到题目。";
    els.answerPanel.hidden = true;
    els.submitButton.hidden = true;
    els.progressBar.style.width = "0%";
    els.questionSlider.min = "0";
    els.questionSlider.max = "0";
    els.questionSlider.value = "0";
    els.questionSlider.disabled = true;
    els.prevButton.disabled = true;
    els.nextButton.disabled = true;
    els.starButton.disabled = true;
    return;
  }

  const progress = getQuestionProgress(question.id);
  const multi = isMultiQuestion(question);
  const chapterLabel = question.chapter || DEFAULT_CHAPTER_NAME;
  els.questionType.textContent = `${chapterLabel} · ${question.type}${multi ? " · 多选" : " · 单选"}`;
  els.questionPosition.textContent = `${state.index + 1} / ${state.visibleQuestions.length}`;
  els.questionText.textContent = question.question;
  els.progressBar.style.width = `${((state.index + 1) / state.visibleQuestions.length) * 100}%`;
  els.questionSlider.disabled = false;
  els.questionSlider.min = "1";
  els.questionSlider.max = String(state.visibleQuestions.length);
  els.questionSlider.value = String(state.index + 1);
  els.prevButton.disabled = state.index === 0;
  els.nextButton.disabled = state.index >= state.visibleQuestions.length - 1;
  els.starButton.disabled = false;
  els.starButton.textContent = progress.starred ? "已收藏" : "收藏";
  els.submitButton.hidden = !multi || progress.answered;
  els.submitButton.disabled = progress.selected.length === 0;

  question.options.forEach((option) => {
    const fragment = els.optionTemplate.content.cloneNode(true);
    const button = fragment.querySelector(".option-button");
    const key = fragment.querySelector(".option-key");
    const text = fragment.querySelector(".option-text");
    key.textContent = option.key;
    text.textContent = option.text;
    button.dataset.key = option.key;
    button.disabled = progress.answered;

    if (progress.selected.includes(option.key)) {
      button.classList.add("is-selected");
    }

    if (progress.answered) {
      if (question.answer.includes(option.key)) {
        button.classList.add("is-correct");
      } else if (progress.selected.includes(option.key)) {
        button.classList.add("is-wrong");
      }
    }

    button.addEventListener("click", () => handleOptionClick(question, option.key));
    els.options.appendChild(fragment);
  });

  if (progress.answered) {
    els.answerPanel.hidden = false;
    els.answerLine.textContent = `${progress.correct ? "回答正确" : "回答错误"} · 答案 ${question.answer}`;
    els.explanation.textContent = question.explanation || "这道题没有解析。";
  } else {
    els.answerPanel.hidden = true;
    els.answerLine.textContent = "";
    els.explanation.textContent = "";
  }
}

function renderStats() {
  const scopedQuestions = currentChapterQuestions();
  const total = scopedQuestions.length;
  const progressList = Object.entries(state.subjectProgress?.questions || {}).filter(([id]) =>
    scopedQuestions.some((question) => question.id === id),
  );
  const answered = progressList.filter(([, item]) => item.answered);
  const correct = answered.filter(([, item]) => item.correct);
  els.totalCount.textContent = String(total);
  els.doneCount.textContent = String(answered.length);
  els.accuracy.textContent = answered.length
    ? `${Math.round((correct.length / answered.length) * 100)}%`
    : "0%";
}

function handleOptionClick(question, key) {
  const progress = getQuestionProgress(question.id);
  if (progress.answered) return;

  if (isMultiQuestion(question)) {
    progress.selected = progress.selected.includes(key)
      ? progress.selected.filter((item) => item !== key)
      : [...progress.selected, key].sort();
  } else {
    progress.selected = [key];
    progress.answered = true;
    progress.correct = isCorrectSelection(question, progress.selected);
  }

  saveCurrentProgress();
  render();
}

function submitCurrentAnswer() {
  const question = currentQuestion();
  if (!question) return;
  const progress = getQuestionProgress(question.id);
  if (!progress.selected.length || progress.answered) return;
  progress.answered = true;
  progress.correct = isCorrectSelection(question, progress.selected);
  saveCurrentProgress();
  render();
}

function goToQuestion(delta) {
  jumpToQuestion(state.index + delta);
}

function jumpToQuestion(index) {
  state.index = Math.max(0, Math.min(state.visibleQuestions.length - 1, index));
  render();
  savePosition();
}

function setChapter(chapterId) {
  const nextChapterId = validChapterId(chapterId);
  if (state.currentChapterId === nextChapterId) return;
  savePosition();
  state.currentChapterId = nextChapterId;
  state.subjectProgress.chapter = nextChapterId;
  renderChapterSelect();
  rebuildVisibleQuestions({ useSavedPosition: true, fallbackIndex: 0 });
}

function setMode(mode) {
  if (state.mode === mode) return;
  savePosition();
  state.mode = mode;
  state.subjectProgress.mode = mode;
  updateModeTabs();
  rebuildVisibleQuestions({ useSavedPosition: true, fallbackIndex: 0 });
}

function updateModeTabs() {
  els.modeTabs.forEach((button) => {
    button.classList.toggle("is-active", button.dataset.mode === state.mode);
  });
}

function updateShuffleButton() {
  els.shuffleButton.textContent = state.shuffled ? "顺序" : "随机";
}

function importSubject(text, sourceName, requestedName) {
  const name = normalizeSubjectName(requestedName) || guessSubjectName(sourceName) || "导入题库";
  const existing = subjectList().find((subject) => subject.name === name);
  let subjectId = existing?.id || makeSubjectId(name);

  if (existing && !window.confirm(`学科“${name}”已存在，要用这个文件更新它吗？`)) {
    subjectId = makeSubjectId(name);
  }

  const subject = createSubject({
    id: subjectId,
    name,
    sourceName,
    text,
    origin: "imported",
  });
  state.subjects[subjectId] = subject;
  state.currentSubjectId = subjectId;
  saveLibrary();
  selectSubject(subjectId);
  els.parseHint.textContent = `已导入 ${subject.name}：${subject.questionCount} 题，${subject.chapterCount} 章`;
}

function deleteCurrentSubject() {
  const subject = currentSubject();
  if (!subject) return;
  if (!window.confirm(`确定删除学科“${subject.name}”吗？做题进度也会一起删除。`)) return;

  suppressSubjectId(subject.id);
  delete state.subjects[subject.id];
  const store = loadProgressStore();
  delete store[subject.id];
  saveJson(STORAGE_KEYS.progress, store);
  state.currentSubjectId = Object.keys(state.subjects)[0] || "";
  saveLibrary();
  if (state.currentSubjectId) {
    selectSubject(state.currentSubjectId);
  } else {
    renderEmptyLibrary("没有可用题库，请在设置中导入 txt 文件，或恢复内置学科。");
  }
  els.parseHint.textContent = `已删除 ${subject.name}。`;
}

function bindEvents() {
  els.subjectSelect.addEventListener("change", (event) => selectSubject(event.target.value));
  els.chapterSelect.addEventListener("change", (event) => setChapter(event.target.value));
  els.prevButton.addEventListener("click", () => goToQuestion(-1));
  els.nextButton.addEventListener("click", () => goToQuestion(1));
  els.questionSlider.addEventListener("input", () => {
    jumpToQuestion(Number(els.questionSlider.value) - 1);
  });
  els.submitButton.addEventListener("click", submitCurrentAnswer);
  els.starButton.addEventListener("click", () => {
    const question = currentQuestion();
    if (!question) return;
    const progress = getQuestionProgress(question.id);
    progress.starred = !progress.starred;
    saveCurrentProgress();
    rebuildVisibleQuestions({
      preferredQuestionId: question.id,
      fallbackIndex: state.index,
      useSavedPosition: false,
    });
  });
  els.shuffleButton.addEventListener("click", () => {
    const keepId = currentQuestion()?.id;
    state.shuffled = !state.shuffled;
    state.subjectProgress.shuffled = state.shuffled;
    updateShuffleButton();
    rebuildVisibleQuestions({
      preferredQuestionId: keepId,
      fallbackIndex: state.index,
      useSavedPosition: false,
    });
  });
  els.modeTabs.forEach((button) => {
    button.addEventListener("click", () => setMode(button.dataset.mode));
  });
  els.settingsButton.addEventListener("click", () => {
    els.subjectNameInput.value = "";
    els.settingsDialog.showModal();
  });
  els.resetProgressButton.addEventListener("click", () => {
    const subject = currentSubject();
    if (!subject || !window.confirm(`确定清空“${subject.name}”的做题进度吗？`)) return;
    state.subjectProgress = {
      questions: {},
      positions: {},
      mode: state.mode,
      chapter: state.currentChapterId,
      shuffled: state.shuffled,
    };
    saveCurrentProgress();
    rebuildVisibleQuestions({ fallbackIndex: 0, useSavedPosition: false });
    els.parseHint.textContent = `${subject.name} 的进度已清空。`;
  });
  els.loadDefaultButton.addEventListener("click", () => {
    installEmbeddedSubjects(true);
    if (!state.currentSubjectId || !state.subjects[state.currentSubjectId]) {
      state.currentSubjectId =
        state.subjects[DEFAULT_SUBJECT_ID]?.id || Object.keys(state.subjects)[0] || "";
    }
    saveLibrary();
    if (state.currentSubjectId) {
      selectSubject(state.currentSubjectId);
    } else {
      renderEmptyLibrary();
    }
    els.parseHint.textContent = "内置学科已恢复。";
  });
  els.deleteSubjectButton.addEventListener("click", deleteCurrentSubject);
  els.fileInput.addEventListener("change", async () => {
    const files = Array.from(els.fileInput.files || []);
    if (!files.length) return;
    try {
      const decoded = await Promise.all(
        files.map(async (file) => ({
          file,
          text: await decodeTextFile(file),
        })),
      );
      const text =
        decoded.length === 1
          ? decoded[0].text
          : decoded
              .map(({ file, text: fileText }) => {
                const chapterName = guessSubjectName(file.name) || file.name;
                return `[章节] ${chapterName}\n${fileText}`;
              })
              .join("\n\n");
      const sourceName = decoded.length === 1 ? decoded[0].file.name : `${decoded.length} 个章节文件`;
      importSubject(text, sourceName, els.subjectNameInput.value);
      els.settingsDialog.close();
    } catch (error) {
      els.parseHint.textContent = error.message;
    } finally {
      els.fileInput.value = "";
    }
  });
}

function boot() {
  bindEvents();
  loadLibrary();
  if (!state.currentSubjectId) {
    renderEmptyLibrary();
    return;
  }
  selectSubject(state.currentSubjectId);
}

boot();

    </script>
  </body>
</html>
