[解析] 【正解E】Bruton病（XLA）因Btk基因缺陷导致B细胞在pro-B至pre-B阶段发育阻滞，淋巴结和外周淋巴器官中缺乏生发中心和淋巴滤泡——生发中心是B细胞增殖、体细胞高频突变和类别转换的场所，XLA患者B细胞严重缺乏，不能形成生发中心和淋巴滤泡。【排除】A.XLA患者T细胞数量和功能正常（非降低或缺乏） B.XLA患者B细胞数量和功能严重缺陷 C.XLA患者血清IgG含量显著降低 D.XLA患者淋巴组织中缺乏浆细胞。 
[题目] 1064. 原发性免疫缺陷病的最主要临床特点是
A. 胸腺缺如
B. 肝脾大
C. 消瘦
D. 反复和慢性感染
E. 淋巴结肿大
[答案] D
[解析] 【正解D】原发性免疫缺陷病（PID）的最主要临床特点是反复和慢性感染——患者常在婴幼儿期起病，表现为反复发生的严重感染（呼吸道、消化道和皮肤等）、感染难以治愈、易由机会性病原体和低毒力微生物引起，生长发育迟缓，是PID最突出和最常见的临床表现。【排除】A.胸腺缺如仅见于DiGeorge综合征等特定PID，非普遍特征 B.肝脾大也仅见于部分PID（如CGD伴慢性感染时） C.消瘦和体重下降是严重感染的后果而非PID最主要临床特点 E.淋巴结肿大可见于某些PID（如高IgM综合征），但许多PID表现为淋巴结和扁桃体缺如或发育不良（如XLA）。 
[题目] 1065. 诱发获得性免疫缺陷病的因素不包括
A. 恶性肿瘤
B. 营养不良
C. 免疫抑制药物
D. 某些病毒感染
E. C1INH缺陷
[答案] E
[解析] 【正解E】C1INH（C1酯酶抑制剂）缺陷是遗传性原发性补体缺陷——属于原发性（先天性）免疫缺陷病，由SERPING1基因突变引起，非获得性（继发性）免疫缺陷的因素。【排除】A.恶性肿瘤（如淋巴瘤、多发性骨髓瘤）可通过直接侵犯骨髓和免疫器官导致继发性免疫缺陷 B.营养不良（特别是蛋白质-能量营养不良）可导致T细胞免疫功能低下和抗体产生减少 C.免疫抑制药物（如糖皮质激素、环孢素A、化疗药物）是医源性获得性免疫缺陷的常见原因 D.某些病毒感染（HIV导致AIDS、麻疹病毒引起一过性免疫抑制）可引起获得性免疫缺陷。 
[题目] 1066. 关于X连锁无丙种球蛋白血症，不正确的是
A. 是最常见的先天性
B. 细胞免疫缺陷病 B.是原发性T细胞缺陷病
C. 患儿生后数月才出现症状
D. 临床表现为反复化脓性细菌感染
E. T细胞数量及功能正常
[答案] B
[解析] 【正解B】X连锁无丙种球蛋白血症（XLA）为原发性B细胞缺陷病——由Btk（Bruton酪氨酸激酶）基因突变导致，B细胞发育阻滞在前B细胞阶段，造成成熟B细胞和各类Ig严重缺乏，是原发性B细胞缺陷病的代表性疾病，非T细胞缺陷病。T细胞数量和功能均正常。【排除】A.XLA是最常见的先天性抗体缺陷综合征之一（不完整但部分正确） C.患儿出生后数月（约6-9个月）才出现症状是正确的——这是因为出生后数月的婴儿体内有来自母体的IgG保护 D.临床表现为反复化脓性细菌感染是正确的 E.T细胞数量及功能正常是正确的。 
[题目] 1067. 关于慢性肉芽肿病，下述哪项不正确
A. 多数为性联隐性遗传
B. 以抗体缺陷为主的免疫缺陷病
C. CD4+ T细胞受到持续刺激而形成肉芽肿
D. 患者对低毒力的过氧化氢酶阳性菌易感
E. 患者淋巴结、皮肤、肝等有慢性化脓性肉芽肿
[答案] B
[解析] 【正解B】慢性肉芽肿病（CGD）是以吞噬细胞功能缺陷为主的免疫缺陷病，非以抗体缺陷为主的免疫缺陷病——CGD因NADPH氧化酶复合物（gp91phox/p22phox/p47phox/p67phox）基因突变导致中性粒细胞和巨噬细胞不能产生活性氧中间体（ROI），细胞内杀菌功能严重缺陷，对过氧化氢酶阳性菌易感。【排除】A.多数CGD为X连锁隐性遗传（gp91phox/CYBB基因突变）（正确） C.CD4+T细胞受到持续刺激而形成肉芽肿（正确）——因吞噬细胞不能彻底清除微生物，T细胞持续受刺激形成肉芽肿 D.患者对低毒力的过氧化氢酶阳性菌易感（正确） E.淋巴结、皮肤、肝等有慢性化脓性肉芽肿（正确）。 
[题目] 1068. AIDS的主要传播途径包括
A. 性接触、血液传播、消化道传播
B. 性接触、呼吸道传播、注射途径
C. 性接触、注射途径、消化道传播
D. 血液传播、呼吸道传播、消化道传播
E. 性接触、血液传播、垂直传播
[答案] E
[解析] 【正解E】AIDS的主要传播途径为性接触传播、血液传播和垂直传播（母婴传播）——HIV存在于血液、精液、阴道分泌物和母乳中，通过黏膜破损或直接进入血液循环传播，母婴垂直传播可在妊娠期、分娩过程中和哺乳时发生。【排除】A.消化道传播非AIDS主要传播途径 B.呼吸道传播非HIV传播途径 C.消化道传播非AIDS主要传播途径 D.呼吸道传播和消化道传播均非HIV主要传播途径。 
[题目] 1069. 关于Wiskott-Aldrich综合征不正确的是
A. WAS蛋白基因缺陷
B. X连锁遗传
C. 造血细胞移动功能及形态学改变
D. 患者体内IgG和IgA水平升高
E. 临床特征为反复细菌感染、血小板减少症和皮肤湿疹
[答案] D
[解析] 【正解D】Wiskott-Aldrich综合征（WAS）患者体内IgG水平正常或降低，IgA和IgE可升高而IgM降低——WAS蛋白（WASP）基因缺陷导致造血细胞骨架重组障碍，T细胞和B细胞功能异常。典型免疫学特征为IgM降低、IgG正常或降低、IgA和IgE升高，患者对多糖抗原（如肺炎链球菌荚膜多糖）的抗体应答能力严重缺陷。【排除】A.WAS蛋白基因缺陷为WAS的病因（正确） B.X连锁隐性遗传（正确）——WAS基因位于Xp11.22-23 C.造血细胞移动功能和形态学改变（正确）——WASP缺陷影响肌动蛋白聚合导致细胞运动和形态异常 E.临床特征为反复细菌感染、血小板减少症和皮肤湿疹（正确）。 
[题目] 1070. 与X连锁无丙种球蛋白血症不符的是
A. 又称Bruton低丙种球蛋白症
B. 多见于男性婴幼儿
C. 患儿反复发生化脓性感染
D. 患儿T细胞数目相对较低
E. 患儿血清Ig水平很低，甚至测不出
[答案] D
[解析] 【正解D】X连锁无丙种球蛋白血症（Bruton病/XLA）为B细胞缺陷病——患儿T细胞数目和功能均正常，缺陷仅限于B细胞谱系，因此T细胞相对较低的说法是不正确的。【排除】A.又称Bruton低丙种球蛋白症（正确） B.多见于男性婴幼儿（X连锁隐性遗传）（正确） C.患儿反复发生化脓性感染（正确）——抗体缺乏导致对化脓性细菌（肺炎链球菌、流感嗜血杆菌等）易感 E.患儿血清Ig水平很低甚至测不出（正确）。 
[题目] 1071. 下列哪种免疫缺陷性疾病与体液免疫缺陷无关
A. Bruton病
B. 选择性IgA缺乏
C. 慢性肉芽肿病
D. 重症联合免疫缺陷病
E. X连锁无丙种球蛋白血症
[答案] C
[解析] 【正解C】慢性肉芽肿病（CGD）是吞噬细胞杀菌功能缺陷病——NADPH氧化酶缺陷导致中性粒细胞和巨噬细胞不能产生超氧阴离子进行呼吸爆发杀菌，属于吞噬细胞功能缺陷，与体液免疫缺陷无关。【排除】A.Bruton病（XLA）为B细胞发育缺陷，属体液免疫缺陷 B.选择性IgA缺乏为B细胞类别转换缺陷，属体液免疫缺陷 D.SCID为T、B细胞均缺陷，涉及体液免疫缺陷 E.X连锁无丙种球蛋白血症（XLA）为B细胞缺陷，属体液免疫缺陷。 
[题目] 1072. HIV攻击的主要靶细胞为
A. CD4+T细胞
B. CD8+T细胞
C. 巨噬细胞
D. 树突状细胞
E. B细胞
[答案] A
[解析] 【正解A】HIV通过病毒包膜糖蛋白gp120与CD4分子高亲和力结合，经CCR5或CXCR4共受体介导病毒包膜与宿主细胞膜融合进入CD4+T细胞——HIV在CD4+T细胞内复制导致CD4+T细胞进行性减少（从约800-1200/mcL降至<200/mcL甚至<50/mcL），CD4+T细胞耗竭是AIDS免疫缺陷的核心病理机制。【排除】B.HIV不直接感染CD8+T细胞 C.HIV可感染巨噬细胞（通过CCR5）但非主要靶细胞 D.HIV可感染树突状细胞但非主要靶细胞 E.HIV不直接感染B细胞。 
[题目] 1073. 下列不属于原发性B细胞缺陷病的是
A. X连锁无丙种球蛋白血症
B. 选择性IgA缺陷
C. DiGeorge综合征
D. 普通变异型免疫缺陷病
E. X连锁高IgM综合征
[答案] C
[解析] 【正解C】DiGeorge综合征（先天性胸腺发育不全）属于原发性T细胞缺陷病，非原发性B细胞缺陷病——因22q11.2染色体微缺失导致第三和第四咽囊发育障碍，胸腺发育不全或缺失造成T细胞发育严重缺陷，而B细胞数量和免疫球蛋白水平可正常或仅因T辅助缺乏而轻度异常。【排除】A.X连锁无丙种球蛋白血症（XLA/Bruton病）为原发性B细胞缺陷 B.选择性IgA缺陷为原发性B细胞/抗体缺陷 D.普通变异型免疫缺陷病（CVID）为原发性B细胞/抗体缺陷 E.X连锁高IgM综合征为原发性B细胞功能缺陷（CD40L缺陷影响B细胞类别转换）。 
[题目] 1074. 关于T-B+ SCID，下列不正确的是
A. 可由γc链缺陷引起
B. 部分表现为常染色体隐性遗传
C. 患者T细胞显著减少，NK细胞减少或正常
D. 患者B细胞数量和抗体产生均正常
E. 临床可表现为出生后不久即发生严重呼吸道感染、慢性腹泻和夭折
[答案] D
[解析] 【正解D】T-B+SCID患者B细胞数目正常甚至增高，但因缺乏T细胞辅助，抗体产生严重缺陷（非正常）——B细胞虽然存在但不能接受T细胞提供的CD40L-CD40信号和IL-4/IL-5等细胞因子辅助，无法进行类别转换和产生高亲和力特异性抗体。【排除】A.可由gammac链缺陷引起（X-SCID，T-B+NK-型）（正确） B.部分T-B+SCID表现为常染色体隐性遗传（如JAK3缺陷）（正确） C.患者T细胞显著减少，NK细胞减少或正常（X-SCID NK减少，JAK3缺陷NK也减少）（正确） E.临床可表现为出生后不久即发生严重呼吸道感染、慢性腹泻和夭折（正确）。 
[题目] 1075. 胸腺发育不全的患者可表现为
A. 只存在细胞免疫功能低下
B. 细胞及体液免疫功能低下
C. 只存在体液免疫功能低下
D. 巨噬细胞缺陷
E. NK细胞活性低下
[答案] B
[解析] 【正解B】胸腺发育不全（DiGeorge综合征）的患者表现为细胞免疫及体液免疫功能均低下——胸腺发育不全导致T细胞（特别是CD4+Th细胞）严重缺乏引起细胞免疫功能低下，同时由于T细胞辅助缺失，B细胞产生抗体（特别是T细胞依赖性抗原的抗体应答）功能也低下，因此体液免疫功能也受损。【排除】A.不仅细胞免疫功能低下，体液免疫也低下 C.不仅体液免疫功能低下，细胞免疫也低下 D.DiGeorge为T细胞缺陷病，不直接涉及巨噬细胞缺陷 E.NK细胞活性一般正常或仅轻度受影响。 
[题目] 1076. 关于X连锁重症联合免疫缺陷病，下列描述正确的是
A. 患者可表现为外周T细胞数减少
B. 患者可表现为B细胞数目和功能均正常
C. CD40L基因突变是其发病机制之一
D. 常染色体遗传缺陷是其发病机制之一
E. IL-2受体γ链基因突变与其发病机制无关
[答案] A
[解析] 【正解A】X连锁重症联合免疫缺陷病（X-SCID，gammac链缺陷）患者可表现为外周血T细胞数显著减少——gammac链是IL-7受体的关键亚基，IL-7信号对T细胞在胸腺中的早期发育至关重要，gammac链缺陷导致T细胞发育严重障碍，外周T细胞极少甚至缺乏。【排除】B.X-SCID患者B细胞数目可正常但功能严重缺陷，非数目和功能均正常 C.CD40L基因突变是X连锁高IgM综合征的病因，非X-SCID D.X-SCID为X连锁隐性遗传，非常染色体遗传 E.IL-2受体gammac链基因突变正是X-SCID的发病机制（直接影响病因关联）。 
[题目] 1077. 关于原发性免疫缺陷的正确说法是
A. 多见于儿童
B. 均由免疫遗传缺陷所致
C. 分为B细胞缺陷和T细胞缺陷两大类
D. AIDS是原发性T细胞缺陷的代表性疾病
E. 不伴有其它组织器官的发育不全或畸形
[答案] A
[解析] 【正解A】原发性免疫缺陷病（PID）多见于儿童——大多数PID在婴幼儿期（特别是出生后数月内）即出现症状，以反复严重感染为主要表现，PID多为先天遗传性缺陷，约80%在20岁前被诊断。【排除】B.PID主要由免疫遗传缺陷所致，但也有部分PID的遗传基础尚未完全明确 C.PID分为多种类型——包括联合免疫缺陷、抗体缺陷为主、T细胞缺陷为主、吞噬细胞缺陷、补体缺陷等，非仅B和T两大类 D.AIDS是获得性（继发性）免疫缺陷，非原发性T细胞缺陷的代表 E.部分PID伴有其他组织器官的发育不全或畸形（如DiGeorge综合征伴心脏大血管畸形和低钙抽搐）。 
[题目] 1078. 最常见的选择性Ig缺陷是
A. 选择性IgM缺陷
B. 选择性IgA缺陷
C. 选择性IgG缺陷
D. 选择性IgD缺陷
E. 选择性IgE缺陷
[答案] B
[解析] 【正解B】选择性IgA缺陷（SIgAD）是最常见的选择性Ig缺陷——发病率在西方人群中约1/600~1/300，是最常见的原发性免疫缺陷病，定义为血清IgA<0.07g/L而IgG和IgM正常，患者可无症状或表现为反复呼吸道和消化道感染，易伴发自身免疫病和过敏性疾病。【排除】A.选择性IgM缺陷极为罕见 C.选择性IgG缺陷相对少见，通常为IgG亚类缺陷 D.选择性IgD缺陷极为罕见 E.选择性IgE缺陷极为罕见。 
[题目] 1079. 造成遗传性血管神经性水肿的补体缺陷是
A. C1抑制因子(C1INH)基因缺陷
B. Ⅰ因子基因缺陷
C. C1q、C1r、C2或C4基因缺陷
D. C3基因缺陷
E. B因子功能缺陷
[答案] A
[解析] 【正解A】遗传性血管神经性水肿由C1抑制因子（C1INH）基因缺陷引起——C1INH是丝氨酸蛋白酶抑制剂（serpin），正常情况下抑制C1r/C1s的自发活化和激肽释放酶-激肽系统，C1INH缺乏导致C4/C2被不断消耗裂解和缓激肽过度产生，缓激肽介导血管通透性增高，导致反复发作的皮下和黏膜下水肿。【排除】B.I因子缺陷导致C3过度消耗和C3缺乏 C.C1q、C1r、C2或C4基因缺陷分别导致各自成分缺乏，临床表现多为SLE样综合征和感染而非血管神经性水肿 D.C3基因缺陷导致严重反复化脓性感染 E.B因子功能缺陷影响补体旁路途径活化。 
[题目] 1080. 中性粒细胞、单核细胞杀菌活性受阻见于
A. 遗传性血管神经性水肿
B. X连锁无丙种球蛋白血症
C. 重症联合免疫缺陷病
D. X连锁慢性肉芽肿病
E. Wiskott-Aldrich综合征
[答案] D
[解析] 【正解D】X连锁慢性肉芽肿病（CGD）因NADPH氧化酶复合物（最常见gp91phox/CYBB基因突变）缺陷导致中性粒细胞和单核细胞不能产生活性氧中间体（ROI），细胞内杀菌活性严重受阻——吞噬细胞能正常吞噬细菌，但不能在吞噬溶酶体内进行呼吸爆发产生超氧阴离子（O2-）、过氧化氢（H2O2）和次氯酸（HOCl），对过氧化氢酶阳性菌（金黄色葡萄球菌、黏质沙雷菌等）杀伤能力严重缺陷。【排除】A.遗传性血管神经性水肿为补体C1INH缺陷 B.XLA为B细胞缺陷，吞噬细胞功能正常 C.SCID为T和B细胞联合免疫缺陷 E.Wiskott-Aldrich综合征为造血细胞骨架缺陷，吞噬细胞吞噬和趋化有障碍但非NADPH氧化酶缺陷所致。 
[题目] 1081. 患儿，男，出生后表现持续性鹅口疮，9个月后因真菌性肺炎死亡。尸检发现其胸腺发育不全，此患儿发生持续感染主要由于
A. 继发性免疫缺陷
B. 细胞免疫缺陷
C. 体液免疫缺陷
D. 细胞和体液免疫缺陷
E. 补体系统缺陷
[答案] D
[解析] 【正解D】胸腺发育不全（DiGeorge综合征）导致细胞免疫和体液免疫均缺陷——胸腺发育不全导致T细胞（CD4+Th和CD8+CTL）严重缺乏引起细胞免疫功能低下（真菌感染、持续性鹅口疮），同时T细胞辅助缺乏导致B细胞对TD抗原的抗体应答障碍（体液免疫缺陷），故表现为联合免疫缺陷。【排除】A.胸腺发育不全为原发性免疫缺陷，非继发性 B.仅有细胞免疫缺陷但体液免疫也受累 C.仅有体液免疫缺陷但细胞免疫也受累 E.胸腺发育不全主要影响T细胞，补体系统一般不直接受累。 
[题目] 1082. 患者，男性，35岁。低热，乏力，腹泻2月余。体重下降约5kg。检查体温37.4℃，颈、腋淋巴结肿，无痛，活动性好，心肺功能正常。考虑为AIDS，下列哪一项与该诊断无关
A. 反复输血
B. 注射吸毒
C. 蚊虫叮咬
D. 同性恋
E. 双性恋
[答案] C
[解析] 【正解C】HIV/AIDS不通过蚊虫叮咬传播——HIV不能在蚊虫体内复制，蚊虫叮咬时注入唾液而非血液，口器残留的微量血液不足以构成HIV感染剂量。HIV传播途径限于性接触传播、血液传播和垂直传播（母婴传播）。【排除】A.反复输血为HIV血液传播途径之一（特别是1990年代以前） B.注射吸毒通过共用注射器为HIV血液传播的高危途径 D.同性恋性行为（特别是男男性行为）为HIV性接触传播的高危因素 E.双性恋性行为同样为HIV性接触传播的高危因素。 
[题目] 1083. 患者，男性，40岁。因反复机会性感染入院，检查发现患者伴发卡波西肉瘤，该患者最可能的诊断是
A. 选择性IgA缺陷症
B. X连锁无丙种球蛋白血症
C. AIDS
D. 先天性胸腺发育不全
E. 重症联合免疫缺陷病
[答案] C
[解析] 【正解C】反复机会性感染合并卡波西肉瘤为AIDS的典型临床特征——HIV感染导致CD4+T细胞进行性耗竭，当CD4+T细胞计数<200/mcL时出现AIDS定义性疾病：反复机会性感染（如卡氏肺孢子虫肺炎PCP、CMV视网膜炎、念珠菌食管炎等）和HIV相关肿瘤（卡波西肉瘤——HHV-8/KSHV驱动、非霍奇金B细胞淋巴瘤等），本例患者临床表现与AIDS高度吻合。【排除】A.选择性IgA缺陷主要表现为呼吸道和消化道反复感染，不伴卡波西肉瘤 B.XLA主要表现为反复化脓性细菌感染，不伴卡波西肉瘤 D.先天性胸腺发育不全（DiGeorge）在婴幼儿期即发病，罕见活至40岁 E.SCID在婴幼儿早期即发病并多死于1岁以内，活至40岁几乎不可能。

[解析] 正确答案为C。会谈法是心理评估中最基本的方法，通过面对面的言语交流获取信息，适合该主动求医的来访者。A调查法主要通过问卷进行，不适合深入探究个体心理；B观察法需在自然或控制条件下观察行为表现，不适合直接获取主观体验；D心理测验法使用标准化量表，适用于量化评估但不适合初步探索；E作品分析法分析个人作品，不是首选方法。本题考察心理评估方法的选择原则。

[题目] 2. (共用题干)女咨询者,32岁,大学教师。3个月前因职称晋升失败与领导争吵,而后逐渐出现失眠,早醒,情绪低落,兴趣减退,对未来悲观失望,认为领导有意不让她晋升,能主动求医,接触良好。其主要的情绪反应是(  )。
A. 焦虑
B. 抑郁
C. 恐惧
D. 愤怒
E. 痛苦
[答案] B
[解析] 正确答案为B。患者情绪低落、兴趣减退、失眠早醒、对未来悲观失望，是典型的抑郁反应核心表现。A焦虑以紧张、担心、坐立不安为主；C恐惧指向特定对象或情境的回避；D愤怒是对挫折的攻击性反应；E痛苦是丧失后的情感体验，但综合症状群更符合抑郁。本题考察情绪反应类型的鉴别诊断。

[题目] 3. (共用题干)女咨询者,32岁,大学教师。3个月前因职称晋升失败与领导争吵,而后逐渐出现失眠,早醒,情绪低落,兴趣减退,对未来悲观失望,认为领导有意不让她晋升,能主动求医,接触良好。目前最合适的干预方法是(  )。
A. 门诊心理咨询
B. 门诊神经科咨询
C. 门诊精神科治疗
D. 精神病院住院治疗
E. 家庭心理治疗
[答案] A
[解析] 正确答案为A。患者主动求医，接触良好，有现实诱因（职称晋升失败），情绪反应尚在正常范围内，首选门诊心理咨询。B神经科针对神经系统器质性疾病；C精神科治疗适用于重性精神障碍；D住院治疗适用于有自伤自杀风险或精神症状严重者；E家庭心理治疗需家庭成员共同参与。本题考察心理干预的级别选择。

[题目] 4. (共用题干)女咨询者,32岁,大学教师。3个月前因职称晋升失败与领导争吵,而后逐渐出现失眠,早醒,情绪低落,兴趣减退,对未来悲观失望,认为领导有意不让她晋升,能主动求医,接触良好。初次接触首选的干预手段是(  )。
A. 宣泄
B. 领悟
C. 强化自我控制
D. 增强自信心
E. 自由联想
[答案] A
[解析] 正确答案为A。初次接触时，患者有明确的情绪压抑和挫折经历，首选宣泄疗法帮助其释放负面情绪，建立治疗关系。B领悟是在充分了解后才能达到的深度；C强化自我控制和D增强自信心是后续步骤；E自由联想是精神分析技术，不适用于初次接触。本题考察初始干预策略的排列次序。

[题目] 5. (共用题干)一位20多岁女青年因情绪低落,兴趣减退,失眠,对未来失去希望,来心理门诊就医。如果给她做临床心理症状评估。首先考虑的是(  )。
A. MMPI
B. SAS
C. HAMA
D. H.R.神经心理成套测验
E. HAMD
[答案] E
[解析] 正确答案为E。患者表现为情绪低落、兴趣减退、失眠、悲观，首先需要评估抑郁症状的严重程度，HAMD（汉密尔顿抑郁量表）是临床评估抑郁的金标准。A MMPI是人格测验；B SAS是焦虑自评量表；C HAMA是汉密尔顿焦虑量表；D H.R.神经心理成套测验评估脑功能。本题考察心理评估量表的选用。

[题目] 6. (共用题干)一位20多岁女青年因情绪低落,兴趣减退,失眠,对未来失去希望,来心理门诊就医。如果给她做临床心理症状评估。如果给她做人格测定,首先考虑的是(  )。
A. MMPI
B. 16-PF
C. TAT
D. EPQ
E. 洛夏测验
[答案] A
[解析] 正确答案为A。该患者有情绪低落等抑郁表现，临床人格评估首选MMPI（明尼苏达多项人格测验），因其包含效度量表和多个临床量表，能同时筛查精神病理学特征。B 16-PF用于正常人格维度测定；C TAT和E洛夏测验是投射测验，信效度较低；D EPQ测量人格维度较单一。本题考察临床人格评估工具的选择。

[题目] 7. (共用题干)《水浒传》中的林冲，其动作缓慢，隐忍克制，沉着缜密，内向寡言，因循守旧，可塑性低。林冲的气质类型为(  )。
A. 黏液质
B. 多血质
C. 胆汁质
D. 抑郁质
E. 兴奋质
[答案] A
[解析] 正确答案为A。黏液质的典型特征：动作缓慢、隐忍克制、沉着缜密、内向寡言、因循守旧、可塑性低，与林冲性格完全吻合。B多血质活泼好动、反应迅速；C胆汁质急躁易怒、冲动；D抑郁质敏感多虑、体验深刻；E兴奋质不是标准气质类型。本题考察气质类型及其典型特征。

[题目] 8. (共用题干)《水浒传》中的林冲，其动作缓慢，隐忍克制，沉着缜密，内向寡言，因循守旧，可塑性低。根据希波克拉底的体液学说，林冲体内占优势的体液为(  )。
A. 黄胆汁
B. 血液
C. 黏液
D. 胃液
E. 黑胆汁
[答案] C
[解析] 正确答案为C。希波克拉底认为黏液质对应体内占优势的体液是黏液（来自脑），其性质是冷而湿，对应动作缓慢、沉稳冷静的性格。A黄胆汁对应胆汁质（急躁）；B血液对应多血质（活泼）；E黑胆汁对应抑郁质（忧郁）。D胃液不属体液学说范畴。本题考察体液学说与气质类型的对应关系。

[题目] 9. (共用题干)《水浒传》中的林冲，其动作缓慢，隐忍克制，沉着缜密，内向寡言，因循守旧，可塑性低。根据巴甫洛夫高级神经活动类型学说，林冲的神经活动类型属于(  )。
A. 抑制型
B. 安静型
C. 活泼型
D. 兴奋型
E. 均衡型
[答案] B
[解析] 正确答案为B。巴甫洛夫将高级神经活动类型分为四种：安静型（强、平衡、不灵活）对应黏液质，符合林冲的特征。A抑制型对应抑郁质；C活泼型对应多血质；D兴奋型对应胆汁质；E均衡型不是巴甫洛夫分类中的标准类型。本题考察高级神经活动类型学说的分类。

[题目] 10. (共用题干)一女性,55岁,丧偶8年,现独居,嗜烟酒,不爱运动。平时性情抑郁,过分容忍,办事无主见,常顺从于别人。1月前行胃癌切除,术中及术后情绪低落,兴趣下降,独自流泪,有轻生之念。患者病前的行为特征属于(  )。
A. A型
B. B型
C. C型
D. D型
E. 混合型
[答案] C
[解析] 正确答案为C。C型行为特征：抑郁、过分容忍、顺从、无主见、回避冲突，与癌症发生相关，符合该患者表现。A A型行为急躁、好胜、时间紧迫感，与冠心病相关；B B型行为悠闲、随和；D D型行为又称忧伤型人格，以负性情感和社交抑制为特征；E混合型不特异。本题考察C型行为特征及其与癌症的关系。

[题目] 11. (共用题干)一女性,55岁,丧偶8年,现独居,嗜烟酒,不爱运动。平时性情抑郁,过分容忍,办事无主见,常顺从于别人。1月前行胃癌切除,术中及术后情绪低落,兴趣下降,独自流泪,有轻生之念。病人术后的情绪反应属于(  )。
A. 恐惧
B. 抑郁
C. 焦虑
D. 痛苦
E. 内疚
[答案] B
[解析] 正确答案为B。患者术后情绪低落、兴趣下降、独自流泪、有轻生之念，是典型的抑郁反应。A恐惧指向具体的威胁；C焦虑以紧张担忧为主；D痛苦是短暂情感；E内疚是自责体验。综合症状群符合抑郁反应诊断。本题考察术后情绪反应的鉴别。

[题目] 12. (共用题干)一女性,55岁,丧偶8年,现独居,嗜烟酒,不爱运动。平时性情抑郁,过分容忍,办事无主见,常顺从于别人。1月前行胃癌切除,术中及术后情绪低落,兴趣下降,独自流泪,有轻生之念。病人患胃癌主要是因为(  )。
A. 易感性人格特征
B. 生活事件
C. 情绪因素
D. 不良生活习惯
E. 以上都是
[答案] E
[解析] 正确答案为E。胃癌的发生是多因素综合作用的结果：C型人格（易感性人格特征）是心理因素，丧偶（生活事件）是社会因素，情绪抑郁是情绪因素，嗜烟酒、不爱运动是不良生活习惯，故以上均正确。本题考察心身疾病的多因素发病观。

[题目] 13. (共用题干)一女性,55岁,丧偶8年,现独居,嗜烟酒,不爱运动。平时性情抑郁,过分容忍,办事无主见,常顺从于别人。1月前行胃癌切除,术中及术后情绪低落,兴趣下降,独自流泪,有轻生之念。对这种病人临床上应采取的措施为(  )。
A. 认知疗法
B. 支持性心理治疗
C. 精神分析疗法
D. 药物治疗
E. 以上都是
[答案] E
[解析] 正确答案为E。该患者存在C型人格、术后抑郁、轻生念头，需要综合干预：认知疗法调整歪曲认知，支持性心理治疗提供情感支持，精神分析疗法探索潜意识冲突，药物治疗改善抑郁症状，因此以上方法均可选用。本题考察心身疾病综合治疗原则。

[题目] 14. (共用题干)一男性,某省厅干部,平时不嗜烟酒,生活规律;但性情急躁,易激动,工作认真,争强好胜,雄心勃勃。1年前单位减员时调⼊某厂工作,常因⼩事上火,发脾气。3日前因心绞痛⼊院,诊断为冠心病。病前病人的人格类型属于(  )。
A. A型
B. 混合型
C. C型
D. B型
E. D型
[答案] A
[解析] 正确答案为A。A型行为特征：性情急躁、易激动、争强好胜、雄心勃勃、时间紧迫感，与冠心病密切相关，符合该患者表现。B混合型非标准分类；C C型与癌症相关；D B型悠闲随和；E D型忧伤、社交抑制。本题考察A型行为与冠心病的关系。

[题目] 15. (共用题干)一男性,某省厅干部,平时不嗜烟酒,生活规律;但性情急躁,易激动,工作认真,争强好胜,雄心勃勃。1年前单位减员时调⼊某厂工作,常因⼩事上火,发脾气。3日前因心绞痛⼊院,诊断为冠心病。以下选项属于发病的明显原因的是(  )。
A. 化学性因素
B. 物理性因素
C. 生物性因素
D. 心理社会因素
E. 文化性因素
[答案] D
[解析] 正确答案为D。该患者A型人格、工作变动（调厂）等心理社会因素是其冠心病发病的明显原因。A化学性、B物理性、C生物性因素在本题中无明显关联；E文化性因素虽有一定影响但不是主因。本题考察冠心病发病的心理社会因素。

[题目] 16. (共用题干)一男性,某省厅干部,平时不嗜烟酒,生活规律;但性情急躁,易激动,工作认真,争强好胜,雄心勃勃。1年前单位减员时调⼊某厂工作,常因⼩事上火,发脾气。3日前因心绞痛⼊院,诊断为冠心病。病人的情绪反应属于(  )。
A. 恐怖反应
B. 抑郁反应
C. 厌恶反应
D. 愤怒反应
E. 焦虑反应
[答案] E
[解析] 正确答案为E。患者确诊冠心病后，出现心绞痛症状，担心疾病预后，其情绪反应以焦虑为主，表现为紧张、担忧、对未来不确定。A恐怖有明确对象；B抑郁以兴趣丧失为核心；C厌恶是排斥反应；D愤怒指向他人。本题考察疾病情景下的情绪反应类型。

[题目] 17. (共用题干)一男性,某省厅干部,平时不嗜烟酒,生活规律;但性情急躁,易激动,工作认真,争强好胜,雄心勃勃。1年前单位减员时调⼊某厂工作,常因⼩事上火,发脾气。3日前因心绞痛⼊院,诊断为冠心病。对于病人应采取的干预措施为(  )。
A. 药物疗法
B. 认知疗法
C. 生物反馈疗法
D. 放松疗法
E. 以上都是
[答案] E
[解析] 正确答案为E。对冠心病伴焦虑的患者，应综合干预：药物疗法控制症状，认知疗法纠正错误认知，生物反馈疗法和放松疗法降低生理唤醒水平，故以上方法均可选用。本题考察心身疾病的综合干预策略。

[题目] 18. (共用题干)张某,女性,35岁。一个月前因多发性子宫肌瘤行子宫切除术,术后恢复良好,但病人情绪低落,常常独自流泪,各种兴趣下降,整夜难眠,经常出现轻生的念头。病人的这种情绪状态是(  )。
A. 焦虑反应
B. 愤怒反应
C. 恐怖反应
D. 抑郁反应
E. 躁狂反应
[答案] D
[解析] 正确答案为D。患者子宫切除术后出现情绪低落、兴趣下降、失眠、轻生念头，典型抑郁反应。A焦虑以紧张不安为主；B愤怒是攻击性情绪；C恐怖指向具体对象；E躁狂表现为情绪高涨。本题考察抑郁反应的核心症状。

[题目] 19. (共用题干)张某,女性,35岁。一个月前因多发性子宫肌瘤行子宫切除术,术后恢复良好,但病人情绪低落,常常独自流泪,各种兴趣下降,整夜难眠,经常出现轻生的念头。病人这种情绪反应强度主要取决于(  )。
A. 病人疾病的痛苦程度

[解析] 正确答案为E。患者术后抑郁的强度主要取决于她赋予子宫（女性特征、生育能力）的主观价值，即个人对丧失事物的心理意义。A疾病痛苦程度、B生活影响、C前途影响、D经济损失均为客观因素，而心理反应强度由主观价值决定。本题考察心理应激反应强度的决定因素。

[题目] 20. (共用题干)张某,女性,35岁。一个月前因多发性子宫肌瘤行子宫切除术,术后恢复良好,但病人情绪低落,常常独自流泪,各种兴趣下降,整夜难眠,经常出现轻生的念头。对于这种病人,临床上一般采取的干预措施有(  )。

[题目] 21. (共用题干)李某,女性,50岁。一个月前因胃癌进行大部切除术,术后一般情况良好,但患者情绪低落,常常独自流泪,对自己的生存非常悲观,各类兴趣下降,整夜难眠,常出现轻生的念头。患者的这种情绪状态是(  )。

B. 抑郁反应
C. 恐怖反应

E. 厌恶反应
[答案] B
[解析] 正确答案为B。患者胃癌术后情绪低落、悲观、兴趣下降、失眠、轻生念头，符合抑郁反应的诊断标准。A焦虑以担心紧张为主；C恐怖指向具体对象；D愤怒是攻击性情绪；E厌恶是排斥反应。本题考察抑郁反应的临床表现。

[题目] 22. (共用题干)李某,女性,50岁。一个月前因胃癌进行大部切除术,术后一般情况良好,但患者情绪低落,常常独自流泪,对自己的生存非常悲观,各类兴趣下降,整夜难眠,常出现轻生的念头。患者这种情绪反应强度主要取决于(  )。
A. 患者疾病的痛苦程度
B. 患者可能的生存期长短
C. 患者对前途的影响
D. 患者经济上的损失
E. 患者赋予所失去东西的主观价值
[答案] E
[解析] 正确答案为E。患者术后情绪反应的强度主要取决于患者赋予所失去东西（胃、健康、生存希望）的主观价值，即个人对丧失的认知评价。A痛苦程度、B生存期、C前途影响、D经济损失均为客观因素，心理反应强度由主观价值判断决定。本题考察应激反应强度的认知评价机制。

[题目] 23. (共用题干)李某,女性,50岁。一个月前因胃癌进行大部切除术,术后一般情况良好,但患者情绪低落,常常独自流泪,对自己的生存非常悲观,各类兴趣下降,整夜难眠,常出现轻生的念头。对于这种患者,临床上一般采用的干预措施是(  )。
A. 支持性心理治疗
B. 放松疗法
C. 药物治疗
D. 认知疗法
E. 以上都是
[答案] E
[解析] 正确答案为E。对癌症术后抑郁患者应采用综合干预：支持性心理治疗提供情感支持，放松疗法缓解焦虑，药物治疗改善抑郁，认知疗法调整负性认知，故以上均是。本题考察综合心理干预在肿瘤患者中的应用。

[题目] 24. (共用题干)心理医生通过自由联想来收集资料,运用医患关系.追溯童年经历和梦的解析等方法,从不同的角度去解析早年的问题是如何反映在当前面临的心理问题中,通过人格的改变和从童年的压抑中解脱来达到改善精神症状的治疗效果。这种心理治疗技术称为()。
A. 行为治疗
B. 精神治疗
C. 人本主义治疗
D. 支持性心理治疗
E. 认知治疗
[答案] B
[解析] 正确答案为B。题干描述的技术包括自由联想、梦的解析、追溯童年经历、关注医患关系，这些是精神分析（精神治疗）的经典技术。A行为治疗关注可观察的行为；C人本主义治疗强调无条件积极关注；D支持性心理治疗提供情感支持；E认知治疗调整功能失调性认知。本题考察精神分析治疗的核心技术。

[题目] 25. (共用题干)心理医生通过自由联想来收集资料,运用医患关系.追溯童年经历和梦的解析等方法,从不同的角度去解析早年的问题是如何反映在当前面临的心理问题中,通过人格的改变和从童年的压抑中解脱来达到改善精神症状的治疗效果。这种心理治疗属于()。
A. 个别短程治疗
B. 个别长程治疗
C. 集体短程治疗
D. 集体长程治疗
E. 人际关系治疗
[答案] B
[解析] 正确答案为B。精神分析治疗通常需要长期、高频次的会谈（每周数次，持续数月至数年），属于个别长程治疗。A个别短程治疗时间短（通常少于20次）；C集体短程和D集体长程是团体形式；E人际关系治疗是短程治疗的一种。本题考察精神分析治疗的设置特点。

[题目] 26. (共用题干)人格的形成都有一个有序的发展过程,每个阶段都与儿童期某些躯体上产生快感部位的满足程度有关,每个人在儿童期获得的经验会影响到成年后的人格问题获人格障碍。这个观点是哪种心理学的理论观点(  )。
A. 精神分析
B. 心理生理学
C. 行为主义
D. 人本主义
E. 认知学派
[答案] A
[解析] 正确答案为A。题干强调人格发展的阶段性、与躯体快感部位（口唇期、肛门期等）的关系、童年经验对成年人格的影响，这是精神分析心理学的核心观点。B心理生理学研究心身关系；C行为主义关注刺激-反应联结；D人本主义强调自我实现；E认知学派关注信息加工过程。本题考察精神分析的人格发展理论。

[题目] 27. (共用题干)人格的形成都有一个有序的发展过程,每个阶段都与儿童期某些躯体上产生快感部位的满足程度有关,每个人在儿童期获得的经验会影响到成年后的人格问题获人格障碍。这个观点的主要创始人是(  )。
A. 斯金纳
B. 弗洛伊德
C. 贝克
D. 班杜拉
E. 罗杰斯
[答案] B
[解析] 正确答案为B。弗洛伊德是精神分析学派的创始人，提出了人格发展的心理性欲阶段理论（口唇期、肛门期、性器期、潜伏期、生殖期）。A斯金纳是行为主义代表人物；C贝克是认知治疗创始人；D班杜拉是社会学习理论代表；E罗杰斯是人本主义代表。本题考察精神分析理论的创始人。

[题目] 28. (共用题干)李阿姨,58岁。与儿媳常年不合,每每被儿媳动辄打骂.指责落泪,李阿姨只独自哭泣,从不与人交谈,对儿媳一再忍让,终日郁郁寡欢。近日体检发现肺部有不明阴影后医生确诊为肺癌,建议手术。术后李阿姨恢复良好,但性情大变,办事急躁,时不时与人争吵,时间感紧迫,对人有莫名的敌意。李阿姨手术前的行为特征属于(  )。
A. A型
B. B型
C. C型
D. D型
E. E型
[答案] C
[解析] 正确答案为C。患者术前表现：独自哭泣、忍让、不与人交谈、郁郁寡欢，是典型C型行为特征（抑郁、容忍、回避冲突），与肺癌发生相关。A A型行为急躁好胜；B B型悠闲；D D型忧伤加社交抑制；E E型非标准分类。本题考察C型行为与癌症的关系。

[题目] 29. (共用题干)李阿姨,58岁。与儿媳常年不合,每每被儿媳动辄打骂.指责落泪,李阿姨只独自哭泣,从不与人交谈,对儿媳一再忍让,终日郁郁寡欢。近日体检发现肺部有不明阴影后医生确诊为肺癌,建议手术。术后李阿姨恢复良好,但性情大变,办事急躁,时不时与人争吵,时间感紧迫,对人有莫名的敌意。李阿姨患病前的情绪状态属于(  )。
A. 恐惧
B. 悲伤
C. 猜疑
D. 焦虑
E. 抑郁
[答案] E
[解析] 正确答案为E。患者术前终日郁郁寡欢、独自哭泣、忍让不争，情绪状态以抑郁为主。A恐惧有明确对象；B悲伤是短暂情感；C猜疑是认知偏差；D焦虑以紧张为主。本题考察抑郁情绪的临床识别。

[题目] 30. (共用题干)李阿姨,58岁。与儿媳常年不合,每每被儿媳动辄打骂.指责落泪,李阿姨只独自哭泣,从不与人交谈,对儿媳一再忍让,终日郁郁寡欢。近日体检发现肺部有不明阴影后医生确诊为肺癌,建议手术。术后李阿姨恢复良好,但性情大变,办事急躁,时不时与人争吵,时间感紧迫,对人有莫名的敌意。李阿姨手术后的行为特征属于(  )。
A. A型
B. B型
C. C型
D. D型
E. E型
[答案] A
[解析] 正确答案为A。患者术后性情大变，变得急躁、与人争吵、时间紧迫感、有敌意，这些是A型行为的典型特征。B B型悠闲随和；C C型隐忍抑郁；D D型忧伤抑制；E E型非标准分类。本题考察A型行为的特征表现。

[题目] 31. (共用题干)患者李某,男,57岁。平时性格急躁,易与人起冲突。近日身体不适入院检查,并与医生争执不下,认为医生从头到尾没有正眼看过自己,是看不起自己。后诊断为高血压,遗嘱服用降压药,戒烟戒酒,低盐饮食,减少脂肪摄入,增强运动等。几周后,李某急诊入院,询问得知李某自从确诊后,不吃盐.不吃肉,并大量运动,导致机体受损急诊入院。转醒后,李某大喊大叫,面红耳赤,控诉医生专业技术差,欺骗自己,并投诉该医生。诊疗中李某与医生起冲突的原因主要是(  )。
A. 医生缺乏与患者的言语沟通
B. 医生不尊重患者
C. 医生不能体会患者的感受
D. 医生诊疗能力不足
E. 医生没有注意患者非言语沟通
[答案] E
[解析] 正确答案为E。患者认为医生从头到尾没有正眼看过自己，这说明医生忽视了非言语沟通（眼神接触），导致患者感到不被尊重。A言语沟通的内容文中未提及有问题；B医生未必不尊重患者，而是非言语行为传递了错误信息；C和D在题干中缺乏依据。本题考察医患沟通中非言语沟通的重要性。

[题目] 32. (共用题干)患者李某,男,57岁。平时性格急躁,易与人起冲突。近日身体不适入院检查,并与医生争执不下,认为医生从头到尾没有正眼看过自己,是看不起自己。后诊断为高血压,遗嘱服用降压药,戒烟戒酒,低盐饮食,减少脂肪摄入,增强运动等。几周后,李某急诊入院,询问得知李某自从确诊后,不吃盐.不吃肉,并大量运动,导致机体受损急诊入院。转醒后,李某大喊大叫,面红耳赤,控诉医生专业技术差,欺骗自己,并投诉该医生。患者二次入院,投诉医生主要是由于(  )。
A. 医生漠视患者
B. 沟通方式有误
C. 患者记不住遗嘱
D. 医生没有同情心
E. 患者依从性差
[答案] B
[解析] 正确答案为B。患者二次入院是因为对医嘱理解偏差（不吃盐、不吃肉、过量运动），说明医生在沟通医嘱时方式不当，未能确保患者正确理解。A漠视患者不准确；C记不住医嘱是现象而非原因；D没有同情心缺乏依据；E依从性差是结果而非原因。本题考察医患沟通中信息传达的清晰性。

[题目] 33. (共用题干)患者李某,男,57岁。平时性格急躁,易与人起冲突。近日身体不适入院检查,并与医生争执不下,认为医生从头到尾没有正眼看过自己,是看不起自己。后诊断为高血压,遗嘱服用降压药,戒烟戒酒,低盐饮食,减少脂肪摄入,增强运动等。几周后,李某急诊入院,询问得知李某自从确诊后,不吃盐.不吃肉,并大量运动,导致机体受损急诊入院。转醒后,李某大喊大叫,面红耳赤,控诉医生专业技术差,欺骗自己,并投诉该医生。李某转醒后的情绪属于(  )。
A. 快乐
B. 恐惧
C. 愤怒
D. 悲哀
E. 焦虑
[答案] C
[解析] 正确答案为C。患者转醒后大喊大叫、面红耳赤、控诉医生、投诉，这是愤怒情绪的表现。A快乐与情境不符；B恐惧是害怕反应；D悲哀是悲伤；E焦虑是紧张不安。患者的行为指向他人进行攻击性表达，符合愤怒的特征。本题考察愤怒情绪的表现形式。

[题目] 34. (共用题干)一位20多岁女青年因情绪低落,兴趣减退,失眠,对未来失去希望,来心理门诊就医。如果给她做人格测定,首先考虑的是(  )。
A. MMPI
B. 16-PF
C. TAT
D. EPQ
E. 洛夏测验
[答案] A
[解析] 正确答案为A。MMPI是临床最常用的人格测验，含效度量表和多个临床量表，适用于精神病理学筛查，对抑郁患者首选。B 16-PF用于正常人格维度；C TAT和E洛夏测验是投射测验；D EPQ测量人格维度较少。本题考察临床人格测验的选用原则。

[题目] 35. (共用题干)刘某是某公司经理,因被怀疑贪污,突然被检察院传讯,并拘留24⼩时,导致他精神极度紧张,大哭大闹,但第二天突然表情呆滞,问话不答,两眼凝视,全身肌⾁紧张,四肢抖动。两个月之后一直自觉乏力,头昏.头痛,心慌.胸闷,严重时甚至要昏倒,睡眠差,情绪不稳定,不愿出门,不愿与人交往。以下关于刘某出现的应激反应的说法,不正确的是(  )。
A. 出现激情爆发
B. 只出现急性应激反应
C. 存在情感障碍
D. 出现生活习惯和行为模式的改变
E. 有暂时的心理休克
[答案] B
[解析] 正确答案为B。患者经历了两个阶段：初期激情爆发（大哭大闹）、心理休克（表情呆滞、不语），2个月后持续出现应激后症状（乏力、头痛、心慌、社交回避等），出现了慢性应激反应而非仅急性应激。因此只出现急性应激反应的说法不正确。ACDE均为正确描述。本题考察应激反应的时间进程。

[题目] 36. (共用题干)刘某是某公司经理,因被怀疑贪污,突然被检察院传讯,并拘留24⼩时,导致他精神极度紧张,大哭大闹,但第二天突然表情呆滞,问话不答,两眼凝视,全身肌⾁紧张,四肢抖动。两个月之后一直自觉乏力,头昏.头痛,心慌.胸闷,严重时甚至要昏倒,睡眠差,情绪不稳定,不愿出门,不愿与人交往。对于他的问题的治疗,下列选项不正确的是(  )。
A. 先用药物改善他的情绪再进行认知疏导
B. 增强社会支持
C. 先让他参加社会活动,改善人际关系
D. 放松治疗
E. 在他恢复后进行应对技能的学习和训练
[答案] C
[解析] 正确答案为C。患者目前存在明显的社交回避、情绪不稳定，治疗应循序渐进：先药物改善情绪（A正确），再认知疏导，增强社会支持（B正确），放松治疗（D正确），恢复后进行应对技能训练（E正确）。但C直接让其参加社会活动可能加重回避行为，应先在安全环境中建立治疗关系后再逐步暴露。本题考察创伤后应激障碍的治疗原则。

[题目] 37. (共用题干)男性,68岁,退休人员。患有高血压.冠心病,喜欢喝浓茶,喜欢看书,看书常常看到凌晨。白天总是打瞌睡,爱发脾气,到了晚上临睡前精神好,不愿意入睡。患者所患“冠心病”“高血压”属于医学心理学中的( )。
A. 躯体疾病
B. 心身疾病
C. 心理疾病
D. 功能性疾病
E. 病理性疾病
[答案] B
[解析] 正确答案为B。高血压、冠心病是典型的心理社会因素参与发病的躯体疾病，属于心身疾病。A躯体疾病不强调心理因素；C心理疾病以精神症状为主；D功能性疾病无器质性改变；E病理性疾病不是规范分类。本题考察心身疾病的概念识别。

[题目] 38. (共用题干)男性,68岁,退休人员。患有高血压.冠心病,喜欢喝浓茶,喜欢看书,看书常常看到凌晨。白天总是打瞌睡,爱发脾气,到了晚上临睡前精神好,不愿意入睡。根据上述诊断,不属于该疾病诊断要点的是( )。
A. 确定心理社会因素存在,其与患者的躯体症状有明确的时间关系
B. 进行严格的体格检查
C. 排除神经症或精神病
D. 躯体症状有明确的器质性病理改变,获存在已知的病理生理学变化
E. 病情的加剧和缓解与情绪因素密切相关
[答案] B
[解析] 正确答案为B。心身疾病的诊断要点包括：确定心理社会因素与躯体症状有时间关系（A正确），排除神经症或精神病（C正确），有明确的器质性病理改变（D正确），病情与情绪因素密切相关（E正确）。严格体格检查是所有疾病诊断的基础，不是心身疾病特有的诊断要点。本题考察心身疾病的诊断标准。

[题目] 39. (共用题干)患者,女,25岁。每次碰到物体时总会觉得手脏而去洗手,她知道没必要,但不洗就觉得不适,在医生的治疗中医生让患者回忆从童年起关于自己经历的一些挫折和困惑,从不同的角度去解析早年的问题是如何反映在当前面临的心理问题中,通过人格的改变和从童年的压抑中解脱来达到改善精神症状的治疗效果。这种治疗方法属于( )。
A. 梦的解析
B. 自由联想
C. 脱敏疗法
D. 冲击疗法
E. 厌恶疗法
[答案] B
[解析] 正确答案为B。医生让患者回忆童年挫折和困惑，从不同角度解析早年问题如何反映在当前问题中，这是自由联想技术的应用。A梦的解析是分析梦境；C脱敏疗法用于恐惧症；D冲击疗法是快速暴露；E厌恶疗法用于成瘾行为。本题考察自由联想技术的识别。

[题目] 40. (共用题干)患者,女,25岁。每次碰到物体时总会觉得手脏而去洗手,她知道没必要,但不洗就觉得不适,在医生的治疗中医生让患者回忆从童年起关于自己经历的一些挫折和困惑,从不同的角度去解析早年的问题是如何反映在当前面临的心理问题中,通过人格的改变和从童年的压抑中解脱来达到改善精神症状的治疗效果。在一次学术交流中,该医生未做任何措施讲述了此患者的详细情况,该医生违背了( )。
A. 真诚
B. 中立
C. 回避
D. 保密
E. 尊重
[答案] D
[解析] 正确答案为D。医生在未做任何措施（未获患者同意、未匿名化）的情况下，在学术交流中讲述患者详细情况，违反了心理治疗的保密原则。A真诚、B中立、C回避、E尊重是治疗过程中的态度原则，但公开患者信息直接违背保密原则。本题考察心理治疗的伦理原则。

[题目] 41. (共用题干)患者,女,25岁。每次碰到物体时总会觉得手脏而去洗手,她知道没必要,但不洗就觉得不适,在医生的治疗中医生让患者回忆从童年起关于自己经历的一些挫折和困惑,从不同的角度去解析早年的问题是如何反映在当前面临的心理问题中,通过人格的改变和从童年的压抑中解脱来达到改善精神症状的治疗效果。这种心理治疗属于(  )。
A. 个别短程治疗
B. 个别长程治疗
C. 集体短程治疗
D. 集体长程治疗
E. 人际关系治疗
[答案] B
[解析] 正确答案为B。精神分析治疗通常需要长期、高频次的会谈，从童年经历入手深入探索潜意识冲突，属于个别长程治疗。A短程治疗时间较短；C和D是集体形式；E人际关系治疗是短程。本题考察精神分析治疗的疗程分类。

[题目] 42. (共用题干)人们早年的经历形成的“功能失调性认知假设或图式”,这决定着人们对事物的评价,成为支配人们行为的规则,而不为人们所察觉。一旦被某种社会生活事件所激活,脑中就会涌现出许多功能失调的“负性自动想法”,由此构成了情绪和行为障碍。这是哪位学者的心理治疗的理论(       )
A. Rogers
B. Beck
C. Erikson
D. Freud
E. Ellis
[答案] B
[解析] 正确答案为B。题干描述的功能失调性认知假设或图式和负性自动想法是Beck认知治疗的核心概念。A Rogers是人本主义代表；C Erikson是发展心理学家；D Freud是精神分析创始人；E Ellis是理性情绪疗法创始人（ABC理论）。本题考察认知治疗理论的代表人物。

[题目] 43. (共用题干)人们早年的经历形成的“功能失调性认知假设或图式”,这决定着人们对事物的评价,成为支配人们行为的规则,而不为人们所察觉。一旦被某种社会生活事件所激活,脑中就会涌现出许多功能失调的“负性自动想法”,由此构成了情绪和行为障碍。这种心理治疗方法能最有效地治疗的心理障碍是(        )
A. 焦虑障碍
B. 抑郁障碍
C. 神经性厌食和贪食
D. 性心理障碍
E. 人格障碍和适应不良行为
[答案] B
[解析] 正确答案为B。Beck的认知治疗最初正是用于治疗抑郁障碍，通过识别和修正负性自动想法和功能失调性图式来改善抑郁症状，其疗效在大量研究中得到证实。A焦虑障碍更多用行为治疗或认知行为治疗；C神经性厌食和贪食、D性心理障碍、E人格障碍的治疗效果相对有限。本题考察认知治疗的最佳适应证。

[题目] 44. (共用题⼲)⼀位新⼊院的病人正等候检查(或手术)。术前准备应当是()。
A. 放松疗法
B. 药物治疗
C. 集体心理治疗
D. 认知疗法
E. 综合运用以上方法
[答案] E
[解析] 正确答案为E。术前患者存在焦虑、恐惧等情绪反应，需要综合运用放松疗法缓解紧张，药物治疗改善焦虑，认知疗法纠正错误认知，集体心理治疗提供社会支持，故以上均可选用。本题考察术前心理准备的综合策略。

[题目] 45. (共用题⼲)⼀位新⼊院的病人正等候检查(或手术)。⼴义的心理治疗由以下哪些人员进行()。
A. 心理医生
B. 临床医生
C. 临床护⼠
D. 医院全体⼯作人员
E. 咨询人员
[答案] D
[解析] 正确答案为D。广义的心理治疗是指医院全体工作人员（医生、护士、行政人员等）通过言行举止对患者产生积极心理影响的过程。A心理医生、B临床医生、C临床护士、E咨询人员都是广义心理治疗的参与主体之一，但完整的定义包含全体工作人员。本题考察广义心理治疗的概念。

[题目] 46. (共⽤题⼲)异常行为是持久性学习或环境适应不良的结果,因此,可以通过消除条件反射的⽅法或通过改变学习的⽅法来矫正。行为是机体在与环境相互作⽤下的学习过程,异常行为和病理.生理变化既可通过各种条件反射习得和消除外,也可借助于观察.模仿或⽰范的学习⽅式获得或消除。这个心理治疗理论被称为()。
A. 来谈者中心治疗理论
B. 精神分析治疗理论
C. 行为治疗理论
D. 交互抑制理论
E. 理性情绪疗法理论
[答案] C
[解析] 正确答案为C。题干强调异常行为是学习或环境适应不良的结果，可通过条件反射的消除或改变学习来矫正，这是行为治疗理论的核心观点。A来谈者中心治疗强调自我实现；B精神分析关注潜意识冲突；D交互抑制理论是行为治疗中的一个机制；E理性情绪疗法关注不合理信念。本题考察行为治疗理论的基本观点。

[题目] 47. (共⽤题⼲)异常行为是持久性学习或环境适应不良的结果,因此,可以通过消除条件反射的⽅法或通过改变学习的⽅法来矫正。行为是机体在与环境相互作⽤下的学习过程,异常行为和病理.生理变化既可通过各种条件反射习得和消除外,也可借助于观察.模仿或⽰范的学习⽅式获得或消除。在此心理治疗的理论中,决定治疗效果的因素是( )。
A. 适应性条件反射的形成
B. 移情过程
C. ⽆条件积极关注
D. 领悟
E. 以上都不是
[答案] A
[解析] 正确答案为A。行为治疗认为决定治疗效果的关键因素是适应性条件反射的形成——通过经典条件反射、操作性条件反射或观察学习建立新的适应性行为。B移情是精神分析的概念；C无条件积极关注是人本主义的概念；D领悟是精神分析或认知治疗的要素。本题考察行为治疗的核心机制。

[题目] 48. (共⽤题⼲)在治疗过程中,心理治疗师让患者将脑⼦⾥想到的东西都说出来,不管有没有价值,然后对患者讲出来的内容进行阐释。这种心理治疗技术称为()。
A. 行为疗法
B. 精神分析疗法
C. 人本主义疗法
D. ⽀持性心理治疗
E. 以上都不对
[答案] B
[解析] 正确答案为B。让患者将脑中想到的东西都说出来（自由联想），然后进行阐释，这是精神分析疗法的核心技术。A行为疗法关注行为改变；C人本主义疗法强调共情、真诚；D支持性心理治疗提供情感支持。本题考察精神分析疗法的技术识别。

[题目] 49. (共⽤题⼲)在治疗过程中,心理治疗师让患者将脑⼦⾥想到的东西都说出来,不管有没有价值,然后对患者讲出来的内容进行阐释。该治疗师所使⽤的技术是()。
A. 移情
B. 反移情
C. 自由联想
D. 释梦
E. 共情
[答案] C
[解析] 正确答案为C。题干描述的让患者将脑子里想到的东西都说出来、不管有没有价值，是自由联想技术的标准定义。A移情是患者将过去情感投射到治疗师身上；B反移情是治疗师对患者的情感反应；D释梦是分析梦境；E共情是理解和体验他人的情感。本题考察自由联想技术的定义。

[题目] 50. (共用题干)一女大学生,19岁。病前有强迫性人格特征。在一次动物实验中,因抓大白鼠的方法不对而被鼠咬,引起焦虑和恐惧发作。而后表现为见鼠就惊叫.害怕.心跳剧烈,发展到有人谈到鼠也出现焦虑、紧张、出汗症状。病人主动求医,要求治疗。对这例病人心理评估的最佳方法是()
A. 调查法
B. 观察法
C. 会谈法
D. 作品分析法
E. 心理测验法
[答案] B
[解析] 正确答案为B。该患者恐惧大白鼠，通过观察法可以直接评估其面对鼠或谈论鼠时的行为反应（惊叫、害怕、心跳剧烈、出汗等），是最直接的评估方法。A调查法不适合行为观察；C会谈法获取主观报告，但恐惧反应需要行为观察；D作品分析法不适用；E心理测验可辅助但不是最佳。本题考察恐惧症的心理评估方法选择。

[题目] 51. (共用题干)一女大学生,19岁。病前有强迫性人格特征。在一次动物实验中,因抓大白鼠的方法不对而被鼠咬,引起焦虑和恐惧发作。而后表现为见鼠就惊叫.害怕.心跳剧烈,发展到有人谈到鼠也出现焦虑、紧张、出汗症状。病人主动求医,要求治疗。根据临床表现,应诊断为( )
A. 焦虑性神经症
B. 疑病性神经症
C. 恐怖性神经症
D. 抑郁性神经症
E. 强迫性神经症
[答案] C
[解析] 正确答案为C。患者对特定对象（大白鼠）产生强烈的恐惧反应，伴有自主神经症状，且出现泛化（谈到鼠也恐惧），符合恐怖性神经症的诊断。A焦虑性神经症无特定恐惧对象；B疑病性神经症担忧患病；D抑郁性神经症以情绪低落为主；E强迫性神经症以强迫思维或行为为主。本题考察恐怖性神经症的诊断。

[题目] 52. (共用题干)一女大学生,19岁。病前有强迫性人格特征。在一次动物实验中,因抓大白鼠的方法不对而被鼠咬,引起焦虑和恐惧发作。而后表现为见鼠就惊叫.害怕.心跳剧烈,发展到有人谈到鼠也出现焦虑、紧张、出汗症状。病人主动求医,要求治疗。心理治疗方法应首选()
A. 自由联想
B. 厌恶疗法
C. 奖励方法
D. 系统脱敏疗法
E. 生物反馈疗法
[答案] D
[解析] 正确答案为D。系统脱敏疗法是治疗特定恐惧症的首选方法，通过建立焦虑等级层次，结合放松训练，逐步消除恐惧反应。A自由联想是精神分析技术；B厌恶疗法用于成瘾行为；C奖励方法用于行为塑造；E生物反馈疗法用于心身疾病。本题考察恐惧症的行为治疗选择。

[题目] 53. （共用题干）人格的形成都有一个有序的发展过程,每个阶段都与儿童期某些躯体上产生快感部位的满足程度有关,每个人在儿童期获得的经验会影响到成年后的人格问题获人格障碍。这个观点是哪种心理学的理论观点（  ）。42.这个观点的主要创始人是（  ）。A.斯金纳 B.弗洛伊德 C.贝克 D.班杜拉 E.罗杰斯
A. 精神分析
B. 心理生理学
C. 行为主义
D. 人本主义
E. 认知学派
[答案] A
[解析] 正确答案为A。题干描述的人格发展阶段性理论与躯体快感部位有关，是精神分析理论的核心观点（心理性欲发展阶段理论）。B心理生理学研究心身关系；C行为主义关注学习过程；D人本主义强调自我实现；E认知学派关注认知加工。本题考察精神分析的人格发展理论识别。

[题目] 54. （共用题干）人格的形成都有一个有序的发展过程,每个阶段都与儿童期某些躯体上产生快感部位的满足程度有关,每个人在儿童期获得的经验会影响到成年后的人格问题获人格障碍。这个观点的主要创始人是（  ）
A. 斯金纳
B. 弗洛伊德
C. 贝克
D. 班杜拉
E. 罗杰斯
[答案] B
[解析] 正确答案为B。弗洛伊德是精神分析学派的创始人，提出了人格发展的心理性欲阶段理论。A斯金纳是行为主义代表（操作条件反射）；C贝克是认知治疗创始人；D班杜拉是社会学习理论代表（观察学习）；E罗杰斯是人本主义代表（以人为中心治疗）。本题考察精神分析理论创始人的识别。

[题目] 55. (共用题干)一位20多岁女青年因情绪低落，兴趣减退，失眠，对未来失去希望，来心理门诊就医。如果给她做临床心理症状评估。首先考虑的是（  ）
A. MMPI
B. SAS
C. HAMA
D. H.R.
E. HAMD
[答案] E
[解析] 正确答案为E。患者情绪低落、兴趣减退、失眠、悲观，临床心理症状评估首先选用HAMD（汉密尔顿抑郁量表）评估抑郁严重程度。A MMPI是人格测验；B SAS是焦虑自评量表；C HAMA是汉密尔顿焦虑量表；D H.R.评估脑功能。本题考察抑郁评估工具的选择。

[题目] 56. (共用题干)一位20多岁女青年因情绪低落，兴趣减退，失眠，对未来失去希望，来心理门诊就医。如果给她做临床心理症状评估。该患者所属心理异常类型，结合医学心理学临床工作范畴，此病例主要属于以下哪类服务范畴（  ）
A. A.健康心理学
B. 临床心理学
C. 神经心理学
D. 咨询心理学
E. 康复心理学
[答案] B
[解析] 正确答案为B。该患者存在明显的抑郁症状，属于心理异常范畴，临床心理学主要负责心理障碍的评估、诊断和治疗。A健康心理学关注健康促进与疾病预防；C神经心理学研究脑与行为关系；D咨询心理学侧重发展性、适应性问题；E康复心理学关注残疾康复。本题考察医学心理学各分支的服务范畴。

[题目] 57. (共用题干)一位20多岁女青年因情绪低落，兴趣减退，失眠，对未来失去希望，来心理门诊就医。如果给她做临床心理症状评估。关于本题所用各类心理测验的理论与用途，下列说法错误的是（  ）
A. HAMA主要用于评估焦虑严重程度
B. SAS、SDS 为自评量表，适用于门诊患者初步筛查焦虑、抑郁
C. EPQ侧重测定正常人格维度，多用于普通人群
D. TAT属于客观人格测验，临床首选用于病理人格筛查
E. H.R.神经心理成套测验主要评估脑功能、神经心理损伤
[答案] D
[解析] 正确答案为D。TAT（主题统觉测验）属于投射测验（主观人格测验），而非客观人格测验。客观人格测验如MMPI采用标准化条目和计分。A HAMA评估焦虑正确；B SAS/SDS为自评量表正确；C EPQ测定正常人格维度正确；E H.R.评估脑功能正确。本题考察心理测验的性质分类。

[题目] 58. （共用题干）患者，男性，38岁，因“神经衰弱、睡眠障碍1月”就诊。患者自诉近1个月工作压力大，自觉视物辨识能力下降，经常将相似的文字、物品认错；做事难以集中精神，极易被环境中细微声响打断。患者自觉记忆力减退，刚告知的医嘱、电话号码转瞬即忘，但对多年前的工作、生活经历记忆清晰。神经系统查体无阳性体征，无脑器质性病变。患者经常认错相似文字与物品，主要反映的心理过程异常是（  ）
A. 感觉
B. 知觉
C. 记忆
D. 情绪
E. 意志
[答案] B
[解析] 正确答案为B。患者经常将相似的文字、物品认错，这是知觉过程异常（不能正确辨识和解释刺激），而非单纯的感觉障碍。A感觉是对刺激的原始检测；C记忆障碍表现为遗忘；D情绪和E意志不属于认知过程。视物辨识能力下降反映的是知觉整合和辨识功能受损。本题考察知觉与感觉的区别。

[题目] 59. （共用题干）患者，男性，38岁，因“神经衰弱、睡眠障碍1月”就诊。患者自诉近1个月工作压力大，自觉视物辨识能力下降，经常将相似的文字、物品认错；做事难以集中精神，极易被环境中细微声响打断。患者自觉记忆力减退，刚告知的医嘱、电话号码转瞬即忘，但对多年前的工作、生活经历记忆清晰。神经系统查体无阳性体征，无脑器质性病变。患者极易被外界细微刺激干扰、难以持续专注，提示其注意的哪项品质降低（  ）
A. 广度
B. 稳定性
C. 分配性
D. 转移性
E. 整体性
[答案] B
[解析] 正确答案为B。注意的稳定性是指在同一对象或活动上注意所能持续的时间，患者极易被外界细微刺激干扰、难以持续专注，正是注意力稳定性降低的表现。A注意广度指同一时间注意到的对象数量；C注意分配指同时注意多个任务；D注意转移指主动转移注意力。本题考察注意品质的鉴别。

[章节] B1

[单选题]

[题目] 1. (共用选项)儿童病人的求医行为属于(  )
A. 主动型
B. 被动型
C. 强制型
D. 参与型
E. 合作型
[答案] B
[解析] 正确答案为B。儿童病人缺乏自主判断能力和就医意识，需由家长或监护人代其就诊，属于被动型求医行为。A主动型需患者自行决定就医，儿童无法做到；C强制型适用于传染病强制隔离等；D参与型和E合作型指医患互动关系，非求医行为分类。

[题目] 2. (共用选项)重症传染病病人的求医行为属于(  )
A. 主动型
B. 被动型
C. 强制型
D. 参与型
E. 合作型
[答案] C
[解析] 正确答案为C。重症传染病患者可能因缺乏自知力或不愿隔离而不主动就医，需依法采取强制措施送诊，故为强制型求医行为。A主动型是自愿就医；B被动型由他人陪同但非强制；D参与型和E合作型不适用于求医行为分类。

[题目] 3. (共用选项)昏迷⼊院的病人抢救时医患关系模式为(  )。
A. 主动-被动型
B. 指导-合作型
C. 共同参与型
D. 患者至上型
E. 互惠型
[答案] A
[解析] 正确答案为A。昏迷病人无自主意识，完全依赖医生处置，医患关系模式为主动-被动型，医生处于绝对主导地位。B指导-合作型适用于清醒病人；C共同参与型用于慢性病长期管理；D和E非标准医患关系模式分类。

[题目] 4. (共用选项)经抢救意识逐渐恢复,此时的医患关系模式是(  )。
A. 主动-被动型
B. 指导-合作型
C. 共同参与型
D. 患者至上型
E. 互惠型
[答案] B
[解析] 正确答案为B。患者意识逐渐恢复但尚不能完全自主决策，医生仍占主导但需要患者配合，因此属于指导-合作型。A主动-被动型适用于无意识状态；C共同参与型需患者积极参与决策，此时患者条件尚不具备。

[题目] 5. (共用选项)处于恢复期时最理想的医患关系模式为(  )。
A. 主动-被动型
B. 指导-合作型
C. 共同参与型
D. 患者至上型
E. 互惠型
[答案] C
[解析] 正确答案为C。恢复期患者具备自主决策能力，最理想的模式是共同参与型，医患双方共同制定康复方案，体现患者主体性。A主动-被动型和B指导-合作型在恢复期不利于调动患者积极性；D、E非标准分类。

[题目] 6. (共用选项)上述哪项为以人本主义理论为基础的疗法(  )
A. 自由联想疗法
B. 森田疗法
C. 询者中心疗法
D. 系统脱敏疗法
E. 支持疗法
[答案] C
[解析] 正确答案为C。询者中心疗法（来访者中心疗法）由罗杰斯创立，强调无条件积极关注、共情和真诚，属于人本主义理论基础的疗法。A自由联想属精神分析；B森田疗法源自东方哲学；D系统脱敏属行为主义；E支持疗法为综合性疗法。

[题目] 7. (共用选项)上述哪项为以行为主义理论为基础的疗法(  )
A. 自由联想疗法
B. 森田疗法
C. 询者中心疗法
D. 系统脱敏疗法
E. 支持疗法
[答案] D
[解析] 正确答案为D。系统脱敏疗法由沃尔普创立，基于经典条件反射和操作条件反射原理，属于行为主义疗法。A自由联想属精神分析；B森田疗法融合东方思想；C询者中心属人本主义；E支持疗法综合各学派。

[题目] 8. (共用选项)上述哪项为以精神分析理论为基础的疗法(  )
A. 自由联想疗法
B. 森田疗法
C. 询者中心疗法
D. 系统脱敏疗法
E. 支持疗法
[答案] A
[解析] 正确答案为A。自由联想疗法是弗洛伊德精神分析的核心技术，通过让患者自由表达潜意识内容来治疗心理障碍，以精神分析理论为基础。B森田疗法属东方心理治疗；C询者中心属人本主义；D系统脱敏属行为主义；E支持疗法综合取向。

[题目] 9. (共用选项)评估人格用(  )。
A. MMPI
B. SAS
C. SDS
D. SCL-90
E. TAT
[答案] A
[解析] 正确答案为A。MMPI（明尼苏达多项人格调查表）是常用的人格评估量表，用于测量人格特征和心理障碍。B SAS是焦虑量表；C SDS是抑郁量表；D SCL-90评估心理健康症状；E TAT是主题统觉测验（投射测验）。

[题目] 10. (共用选项)评定抑郁用(  )。
A. MMPI
B. SAS
C. SDS
D. SCL-90
E. TAT
[答案] C
[解析] 正确答案为C。SDS（抑郁自评量表）由Zung编制，专门用于评定抑郁程度。A MMPI测人格；B SAS测焦虑；D SCL-90测广泛心理健康症状；E TAT是投射测验评估人格。

[题目] 11. (共用选项)评估心理健康状况用(  )。
A. MMPI
B. SAS
C. SDS
D. SCL-90
E. TAT
[答案] D
[解析] 正确答案为D。SCL-90（症状自评量表）涵盖九大症状因子，全面评估心理健康状况和精神病性症状。A MMPI测人格；B SAS测焦虑；C SDS测抑郁；E TAT是投射测验。

[题目] 12. (共用选项)评定焦虑用(  )。
A. MMPI
B. SAS
C. SDS
D. SCL-90
E. TAT
[答案] B
[解析] 正确答案为B。SAS（焦虑自评量表）由Zung编制，专门用于评定焦虑程度。A MMPI测人格；C SDS测抑郁；D SCL-90测广泛心理健康症状；E TAT是投射测验评估人格。

[题目] 13. (共用选项)属于病人角色行为异常的是(  )。
A. 病人否认自己有病
B. 病人角色与其他角色发生心理冲突
C. 病人疾病已康复,仍不愿意脱离病人角色
D. 病人从事了不应承担的活动
E. 病人因疾病痛苦而自杀
[答案] E
[解析] 正确答案为E。病人角色行为异常指病人因疾病痛苦出现自杀等极端行为，超出了正常病人角色的范畴。A是角色缺如；B是角色冲突；C是角色强化；D是角色减退。

[题目] 14. (共用选项)属于病人角色行为减退的是(  )。
A. 病人否认自己有病
B. 病人角色与其他角色发生心理冲突
C. 病人疾病已康复,仍不愿意脱离病人角色
D. 病人从事了不应承担的活动
E. 病人因疾病痛苦而自杀
[答案] D
[解析] 正确答案为D。病人角色行为减退指病人在疾病尚未康复时，从事不应承担的活动（如工作），忽视了病人角色责任。A是角色缺如；B是角色冲突；C是角色强化；E是角色异常。

[题目] 15. (共用选项)属于病人角色行为缺如的是(  )。
A. 病人否认自己有病
B. 病人角色与其他角色发生心理冲突
C. 病人疾病已康复,仍不愿意脱离病人角色
D. 病人从事了不应承担的活动
E. 病人因疾病痛苦而自杀
[答案] A
[解析] 正确答案为A。病人角色行为缺如指患者否认自己有病，不承认病人角色，拒绝就医或治疗。B是角色冲突；C是角色强化；D是角色减退；E是角色异常。

[题目] 16. (共用选项)心理咨询与心理治疗的主要相同点是(  )。
A. 工作的对象都是病人
B. 两者均需心理医生担任
C. 应用心理学的理论与方法
D. 两者的差异是非本质性的
E. 两者的差异是本质性的
[答案] C
[解析] 正确答案为C。心理咨询与心理治疗都应用心理学的理论和方法，这是两者的核心相同点。A错在咨询对象不完全是病人（也包括正常人）；B心理医生并非唯一承担者；D和E是对差异性质的判断而非相同点。

[题目] 17. (共用选项)心理咨询与心理治疗的主要不同点是(  )。
A. 工作的对象都是病人
B. 两者均需心理医生担任
C. 应用心理学的理论与方法
D. 两者的差异是非本质性的
E. 两者的差异是本质性的
[答案] D
[解析] 正确答案为D。心理咨询与心理治疗的根本差异是非本质性的，两者在理论方法上基本相同，仅在服务对象、深度、场景等方面存在程度差异。A、B、C是相同点而非不同点；E说本质差异是错误的。

[题目] 18. (共用选项)以上各类心理学中,研究脑和行为关系的是(   )。
A. 生理心理学
B. 健康心理学
C. 神经心理学
D. 临床心理学
E. 变态心理学
[答案] C
[解析] 正确答案为C。神经心理学研究脑结构与功能和行为的关系，探索大脑如何实现心理活动。A生理心理学研究心理的生理基础但不限于脑；B健康心理学关注疾病预防；D临床心理学侧重诊断和治疗；E变态心理学研究心理异常。

[题目] 19. (共用选项)以上各类心理学中,研究促进心身疾病康复和预防的属于(   )。
A. 生理心理学
B. 健康心理学
C. 神经心理学
D. 临床心理学
E. 变态心理学
[答案] B
[解析] 正确答案为B。健康心理学研究如何促进健康、预防疾病，包括心身疾病的康复和预防策略。A生理心理学研究生理基础；C神经心理学研究脑与行为；D临床心理学侧重诊断治疗；E变态心理学研究异常心理。

[题目] 20. (共用选项)以上各类心理学中,研究心理咨询.心理诊断的属于(   )。
A. 生理心理学
B. 健康心理学
C. 神经心理学
D. 临床心理学
E. 变态心理学
[答案] D
[解析] 正确答案为D。临床心理学是研究心理咨询、心理诊断、心理治疗等临床应用的心理学分支。A生理心理学研究生理基础；B健康心理学侧重预防；C神经心理学研究脑功能；E变态心理学研究异常心理。

[题目] 21. (共用选项)不需要理解的“死记硬背”属于(  )。
A. 有意识记
B. 无意识记
C. 意义识记
D. 联想识记
E. 机械识记
[答案] E
[解析] 正确答案为E。机械识记指在不理解材料意义的情况下，依靠重复记忆进行的识记，即“死记硬背”。A有意识记强调目的性；B无意识记强调无目的性；C意义识记强调理解；D联想识记非标准分类。

[题目] 22. (共用选项)有明确目的.要付出意志努力的识记是(  )。
A. 有意识记
B. 无意识记
C. 意义识记
D. 联想识记
E. 机械识记
[答案] A
[解析] 正确答案为A。有意识记是有明确记忆目的，并需要付出意志努力的识记方式，如考试前的复习。B无意识记无明确目的；C意义识记强调理解；D联想识记非标准分类；E机械识记不强调理解。

[题目] 23. (共用选项)无明确目的.不需要意志努力的识记是(  )。
A. 有意识记
B. 无意识记
C. 意义识记
D. 联想识记
E. 机械识记
[答案] B
[解析] 正确答案为B。无意识记指没有预定目的、不需要意志努力的识记，如不经意间记住某广告。A有意识记有明确目的；C意义识记需理解；D联想识记非标准分类；E机械识记虽不强调理解但有目的。

[题目] 24. (共用选项)需要在理解的基础上识记属于(  )。
A. 有意识记
B. 无意识记
C. 意义识记
D. 联想识记
E. 机械识记
[答案] C
[解析] 正确答案为C。意义识记是在理解材料内在含义和逻辑关系基础上进行识记，相比机械识记效果更好。A有意识记强调目的性；B无意识记无目的；D联想识记非标准分类；E机械识记不依赖理解。

[题目] 25. (共用选项)上述选项智力水平为平常的智商范围是(  )。
A. ≥130
B. 120~129
C. 80~119
D. 70~79
E. <69
[答案] C
[解析] 正确答案为C。韦氏智力分级中，智商80~119为平常（中等）智力水平，占总人口约68%。A≥130为超常；B120~129为优秀；D70~79为边缘；E<69为智力低下。

[题目] 26. (共用选项)上述选项智力水平为边缘的智商范围是(  )。
A. ≥130
B. 120~129
C. 80~119
D. 70~79
E. <69
[答案] D
[解析] 正确答案为D。智商70~79为边缘智力水平，介于平常与智力低下之间。A≥130超常；B120~129优秀；C80~119平常；E<69智力低下（智力障碍）。

[题目] 27. (共用选项)主张人的本性一方面是受本能驱使的,另一方面又受现实和社会文化的制约(  )。
A. 精神分析理论
B. 人本主义理论
C. 社会学习理论
D. 人格特质理论
E. 行为主义理论
[答案] A
[解析] 正确答案为A。精神分析理论认为人的本性受本能（尤其是性本能和攻击本能）驱使，同时受现实和社会文化制约，形成本我、自我、超我的人格结构。B人本主义强调自我实现；C社会学习强调观察学习；D特质理论强调特质结构；E行为主义强调环境决定。

[题目] 28. (共用选项)主张人格结构可区分为相对独立的不同组成部分(  )。
A. 精神分析理论
B. 人本主义理论
C. 社会学习理论
D. 人格特质理论
E. 行为主义理论
[答案] D
[解析] 正确答案为D。人格特质理论（如奥尔波特、卡特尔、大五人格）主张人格由一系列相对独立的特质组成。A精神分析理论强调本我、自我、超我结构但重点不在特质独立性；B人本主义强调自我实现；C社会学习强调环境；E行为主义侧重行为。

[题目] 29. (共用选项)主张自我实现是人格形成的主要动力(  )。
A. 精神分析理论
B. 人本主义理论
C. 社会学习理论
D. 人格特质理论
E. 行为主义理论
[答案] B
[解析] 正确答案为B。人本主义理论（马斯洛、罗杰斯）认为自我实现是人格发展的根本动力，每个人都有自我完善的潜能。A精神分析强调本能；C社会学习强调观察学习；D特质理论强调特质分类；E行为主义强调环境塑造。

[题目] 30. (共用选项)主张人格的形成主要取决于后天的生活环境(  )。
A. 精神分析理论
B. 人本主义理论
C. 社会学习理论
D. 人格特质理论
E. 行为主义理论
[答案] E
[解析] 正确答案为E。行为主义理论（华生、斯金纳）认为人格是后天环境塑造的产物，强调刺激-反应联结和强化作用。A精神分析强调本能；B人本主义强调潜能；C社会学习强调认知中介；D特质理论强调内在特质。

[题目] 31. (共用选项)主张人格的形成主要是通过对社会环境的适应(  )。
A. 精神分析理论
B. 人本主义理论
C. 社会学习理论
D. 人格特质理论
E. 行为主义理论
[答案] C
[解析] 正确答案为C。社会学习理论（班杜拉）强调人格形成是通过观察学习、模仿和社会适应而完成的，注重社会环境因素。A精神分析强调本能；B人本主义强调自我实现；D特质理论强调特质；E行为主义虽重环境但不强调社会认知中介。

[题目] 32. (共用选项)医务人员对病人的态度首先会成为(  )。
A. 影响对症状评价的因素
B. 影响求医行为的因素
C. 影响遵医行为的因素
D. 影响疾病诊断的因素
E. 影响疾病预后的因素
[答案] C
[解析] 正确答案为C。医务人员对病人的态度直接影响病人的信任感和合作意愿，是影响遵医行为的重要因素。A症状评价受病人自身认知影响；B求医行为受病人动机影响；D诊断受技术水平影响；E预后受病情和治疗影响。

[题目] 33. (共用选项)病人对其疾病的认识和态度也会成为(  )。
A. 影响对症状评价的因素
B. 影响求医行为的因素
C. 影响遵医行为的因素
D. 影响疾病诊断的因素
E. 影响疾病预后的因素
[答案] B
[解析] 正确答案为B。病人对疾病的认识和态度（如是否认为病情严重）直接决定其是否会选择就医，是影响求医行为的关键因素。A症状评价是认知过程；C遵医行为发生在就医后；D诊断依赖医生；E预后依赖治疗。

[题目] 34. (共用选项)医疗条件及医务人员的技术水平主要会成为(  )。
A. 影响对症状评价的因素
B. 影响求医行为的因素
C. 影响遵医行为的因素
D. 影响疾病诊断的因素
E. 影响疾病预后的因素
[答案] D
[解析] 正确答案为D。医疗条件和技术水平直接关系到诊断的准确性和可靠性，是影响疾病诊断的主要因素。A症状评价受病人认知影响；B求医行为受病人动机影响；C遵医行为受医患关系影响；E预后受多种因素综合影响。

[题目] 35. (共用选项)可以免除或部分免除健康时的社会责任是(  )。
A. 病人的权力
B. 病人的义务
C. 病人角色行为异常
D. 病人角色行为强化
E. 病人角色行为缺如
[答案] A
[解析] 正确答案为A。病人的权利包括因病免除或部分免除健康时的社会责任（如请假、免于工作等）。B病人的义务包括配合治疗；C角色异常是极端行为；D角色强化指固守病人角色；E角色缺如否认有病。

[题目] 36. (共用选项)病人的疾病已康复,但仍不愿意脱离病人角色是(  )。
A. 病人的权力
B. 病人的义务
C. 病人角色行为异常
D. 病人角色行为强化
E. 病人角色行为缺如
[答案] D
[解析] 正确答案为D。病人角色行为强化指疾病已康复但患者仍不愿脱离病人角色，继续寻求照顾和关注。A病人权利；B病人义务；C角色异常（如攻击行为）；E角色缺如（否认有病）。

[题目] 37. (共用选项)及时就医并遵守医嘱及医院的各项规章制度是(  )。
A. 病人的权力
B. 病人的义务
C. 病人角色行为异常
D. 病人角色行为强化
E. 病人角色行为缺如
[答案] B
[解析] 正确答案为B。及时就医、遵守医嘱及医院规章制度是病人的基本义务，体现了患者对自身健康和社会负责的态度。A病人权利；C角色异常；D角色强化（固守病人角色）；E角色缺如（否认有病）。

[题目] 38. (共用选项)属于心理性应激源的是( )。
A. 疾病
B. 认知障碍
C. 职业变动
D. 高温或低温
E. 风俗习惯造成的刺激
[答案] B
[解析] 正确答案为B。心理性应激源指个体认知、信念等心理因素导致的压力，认知障碍（如错误认知）属于心理性应激源。A疾病属生理性；C职业变动属社会性；D高温低温属物理性；E风俗习惯属文化性。

[题目] 39. (共用选项)属于社会性应激源的是( )。
A. 疾病
B. 认知障碍
C. 职业变动
D. 高温或低温
E. 风俗习惯造成的刺激
[答案] C
[解析] 正确答案为C。社会性应激源指社会环境和生活事件带来的压力，职业变动（如失业、调岗）属于此类。A疾病属生物性；B认知障碍属心理性；D高温低温属物理性；E风俗习惯属文化性。

[题目] 40. (共用选项)属于文化性应激源的是( )。
A. 疾病
B. 认知障碍
C. 职业变动
D. 高温或低温
E. 风俗习惯造成的刺激
[答案] E
[解析] 正确答案为E。文化性应激源指文化环境变化带来的压力，风俗习惯造成的刺激（如移民适应新文化）属于此类。A疾病属生物性；B认知障碍属心理性；C职业变动属社会性；D高温低温属物理性。

[题目] 41. (共用选项)首次意识到病情严重,初次感到死亡的威胁经历的是( )。
A. 否认与隔离期
B. 接受期
C. 抑郁期
D. 愤怒期
E. 协议期
[答案] A
[解析] 正确答案为A。库伯勒-罗斯提出临终心理五阶段：否认与隔离期是第一阶段，患者初次意识到病情严重时否认现实以自我保护。B接受期是最后阶段；C抑郁期伴有悲伤；D愤怒期表现愤怒；E协议期试图讨价还价。

[题目] 42. (共用选项)常常在后期要与医护人员商讨,提出一些挽回“失落感”的条件是( )。
A. 否认与隔离期
B. 接受期
C. 抑郁期
D. 愤怒期
E. 协议期
[答案] E
[解析] 正确答案为E。协议期（讨价还价期）中，患者尝试与医护人员或命运协商，提出一些条件以换取生命延续或减少痛苦。A否认期否认现实；B接受期平静面对；C抑郁期悲伤无助；D愤怒期烦躁愤怒。

[题目] 43. (共用选项)是在来之不易的认识水平的前提下达到的,面对死亡者带着期望和平和的心情思考即将到来的死亡的是( )。
A. 否认与隔离期
B. 接受期
C. 抑郁期
D. 愤怒期
E. 协议期
[答案] B
[解析] 正确答案为B。接受期是临终心理的最后阶段，患者以平和的心态接受死亡将至的事实，带着期望和宁静思考生命的意义。A否认期拒绝面对；C抑郁期充满悲伤；D愤怒期烦躁不安；E协议期试图谈判。

[题目] 44. (共用选项)病人开始理智一些地处理问题,对生命抱有希望的是( )。
A. 否认与隔离期
B. 接受期
C. 抑郁期
D. 愤怒期
E. 协议期
[答案] E
[解析] 正确答案为E。协议期中患者比愤怒期稍理智，开始与医护人员商讨条件，对生命抱有希望，试图通过承诺来换取时间或更好的治疗。A否认期否认现实；B接受期平静接纳；C抑郁期悲伤；D愤怒期怨天尤人。

[题目] 45. (共用选项)病人感到孤立无助,常向医生.家属提出无休止的要求,烦躁不安,认为照顾不周的是( )。
A. 否认与隔离期
B. 接受期
C. 抑郁期
D. 愤怒期
E. 协议期
[答案] D
[解析] 正确答案为D。愤怒期患者感到命运不公，出现烦躁不安、向医护人员或家属发脾气、提出无休止要求等表现。A否认期否认现实；B接受期平静；C抑郁期悲伤；E协议期讨价还价。

[题目] 46. (共用选项)健康心理学是(  )。
A. 对心理障碍的机制进行研究
B. 运用心理手段调整心理障碍
C. 强调预防,主张用心理方法矫正不良生活方式获习惯
D. 以研究心理因素为引导躯体生理学改变为主要方向的学科
E. 研究脑与行为的关系
[答案] C
[解析] 正确答案为C。健康心理学强调预防为主，运用心理学方法帮助人们建立健康生活方式、矫正不良行为习惯。A研究心理障碍机制是变态心理学；B运用心理手段调整障碍是临床心理学；D研究心理因素致躯体变化是心理生理学；E研究脑与行为是神经心理学。

[题目] 47. (共用选项)临床心理学是(  )。
A. 对心理障碍的机制进行研究
B. 运用心理手段调整心理障碍
C. 强调预防,主张用心理方法矫正不良生活方式获习惯
D. 以研究心理因素为引导躯体生理学改变为主要方向的学科
E. 研究脑与行为的关系
[答案] B
[解析] 正确答案为B。临床心理学是运用心理学理论和技术对心理障碍进行评估、诊断和治疗的学科。A研究异常心理机制是变态心理学；C强调预防是健康心理学；D研究心身关系是心理生理学；E研究脑与行为是神经心理学。

[题目] 48. (共用选项)变态心理学是(  )。
A. 对心理障碍的机制进行研究
B. 运用心理手段调整心理障碍
C. 强调预防,主张用心理方法矫正不良生活方式获习惯
D. 以研究心理因素为引导躯体生理学改变为主要方向的学科
E. 研究脑与行为的关系
[答案] A
[解析] 正确答案为A。变态心理学（异常心理学）研究心理障碍的发生机制、临床表现和发展规律。B临床心理学侧重治疗干预；C健康心理学侧重预防；D心理生理学研究心身关系；E神经心理学研究脑与行为。

[题目] 49. (共用选项)心理生理学是(  )。
A. 对心理障碍的机制进行研究
B. 运用心理手段调整心理障碍
C. 强调预防,主张用心理方法矫正不良生活方式获习惯
D. 以研究心理因素为引导躯体生理学改变为主要方向的学科
E. 研究脑与行为的关系
[答案] D
[解析] 正确答案为D。心理生理学（心身医学）研究心理因素如何通过生理机制导致躯体疾病，关注心理与躯体的交互作用。A变态心理学研究心理障碍机制；B临床心理学侧重干预；C健康心理学强调预防；E神经心理学研究脑与行为。

[题目] 50. (共用选项)神经生理学是(  )。
A. 对心理障碍的机制进行研究
B. 运用心理手段调整心理障碍
C. 强调预防,主张用心理方法矫正不良生活方式获习惯
D. 以研究心理因素为引导躯体生理学改变为主要方向的学科
E. 研究脑与行为的关系
[答案] E
[解析] 正确答案为E。神经生理学研究神经系统的功能活动与行为的关系，聚焦脑与行为之间的关联。A变态心理学研究异常心理；B临床心理学侧重治疗；C健康心理学强调预防；D心理生理学研究心身关系。

[题目] 51. (共用选项)表示情绪是否稳定( )。
A. P量表
B. E量表
C. N量表
D. L量表
E. K量表
[答案] C
[解析] 正确答案为C。艾森克人格问卷中N量表（神经质）评估情绪稳定性，高分者情绪不稳定、焦虑敏感、易激惹。A P量表测精神质；B E量表测内外向；D L量表测掩饰性；E K量表为校正量表（MMPI）。

[题目] 52. (共用选项)表示精神状态是否正常( )。
A. P量表
B. E量表
C. N量表
D. L量表
E. K量表
[答案] A
[解析] 正确答案为A。艾森克人格问卷中P量表（精神质）评估被试的精神病倾向和异常精神状态。B E量表测内外向；C N量表测情绪稳定性；D L量表测掩饰性；E K量表校正（MMPI）。

[题目] 53. (共用选项)测定被试的掩饰程度( )。
A. P量表
B. E量表
C. N量表
D. L量表
E. K量表
[答案] D
[解析] 正确答案为D。艾森克人格问卷中L量表（说谎量表）用于测定被试的掩饰程度和社会赞许倾向。A P量表测精神质；B E量表测内外向；C N量表测情绪稳定性；E K量表校正（MMPI）。

[题目] 54. (共用选项)表示性格的内外倾向( )。
A. P量表
B. E量表
C. N量表
D. L量表
E. K量表
[答案] B
[解析] 正确答案为B。艾森克人格问卷中E量表（内外向量表）评估性格的内向或外向倾向。A P量表测精神质；C N量表测情绪稳定性；D L量表测掩饰性；E K量表校正（MMPI）。

[题目] 55. (共用选项)人本主义注重(  )。
A. 认知与评价
B. 自我实现
C. 不注意对人本性的研究
D. 习得的行为
E. 人的本性是恶的
[答案] B
[解析] 正确答案为B。人本主义心理学强调人的潜能和自我实现，认为每个人都有自我完善的内在驱动力。A认知与评价属于认知理论；C忽视人性不符合人本主义主张；D习得行为属于行为主义；E人性本恶属于精神分析的性恶论倾向。

[题目] 56. (共用选项)行为学派注重(  )。
A. 认知与评价
B. 自我实现
C. 不注意对人本性的研究
D. 习得的行为
E. 人的本性是恶的
[答案] D
[解析] 正确答案为D。行为学派注重研究个体通过学习（条件反射、强化等）获得的行为，关注刺激-反应联结。A认知与评价属认知理论；B自我实现属人本主义；C忽视人性不符合行为主义；E性恶论属精神分析。

[题目] 57. (共用选项)认知理论注重(  )。
A. 认知与评价
B. 自我实现
C. 不注意对人本性的研究
D. 习得的行为
E. 人的本性是恶的
[答案] A
[解析] 正确答案为A。认知理论关注个体的认知过程（信念、评价、归因等）对情绪和行为的影响，强调认知中介作用。B自我实现是人本主义；C忽视人性不符合认知理论；D习得行为是行为主义；E性恶论是精神分析。

[题目] 58. (共用选项)恐惧的对象⽆指向性( )。
A. ⼴泛性焦虑
B. 惊恐障碍
C. 社交恐怖
D. ⼴场恐怖
E. 单纯恐怖
[答案] A
[解析] 正确答案为A。广泛性焦虑障碍的焦虑对象不固定、无明确指向性，表现为持续过度担忧。B惊恐障碍有突然的惊恐发作；C社交恐怖针对社交情境；D广场恐怖针对特定场所；E单纯恐怖针对特定物体或情境。

[题目] 59. (共用选项)恐惧动物(  )。
A. ⼴泛性焦虑
B. 惊恐障碍
C. 社交恐怖
D. ⼴场恐怖
E. 单纯恐怖
[答案] E
[解析] 正确答案为E。单纯恐怖（特定恐怖症）指对特定对象或情境（如动物、高处）的过度恐惧。A广泛性焦虑无固定对象；B惊恐障碍有惊恐发作；C社交恐怖针对社交；D广场恐怖针对开阔场所。

[题目] 60. (共用选项)恐惧⼩组讨论发⾔(  )。
A. ⼴泛性焦虑
B. 惊恐障碍
C. 社交恐怖
D. ⼴场恐怖
E. 单纯恐怖
[答案] C
[解析] 正确答案为C。社交恐怖（社交焦虑障碍）患者害怕在社交场合被审视，小组讨论发言是典型的社交情境。A广泛性焦虑无固定对象；B惊恐障碍有惊恐发作；D广场恐怖针对开阔场所；E单纯恐怖针对特定事物。

[题目] 61. (共用选项)常用的智力测验量表为(       )
A. WAIS
B. MMPI
C. SCL-90
D. SDS
E. SAS
[答案] A
[解析] 正确答案为A。WAIS（韦氏成人智力量表）是国际上最通用的智力测验量表。B MMPI是人格测验；C SCL-90是心理健康症状自评量表；D SDS是抑郁自评量表；E SAS是焦虑自评量表。

[题目] 62. (共用选项)常用的人格测验量表为(      )
A. WAIS
B. MMPI
C. SCL-90
D. SDS
E. SAS
[答案] B
[解析] 正确答案为B。MMPI（明尼苏达多项人格调查表）是常用的人格测验量表，用于评估人格特征和心理障碍。A WAIS是智力测验；C SCL-90是症状量表；D SDS是抑郁量表；E SAS是焦虑量表。

[题目] 63. (共用选项)常用的抑郁症状自评量表为(     )
A. WAIS
B. MMPI
C. SCL-90
D. SDS
E. SAS
[答案] D
[解析] 正确答案为D。SDS（抑郁自评量表）由Zung编制，专门用于抑郁症状的自评筛查。A WAIS是智力测验；B MMPI是人格测验；C SCL-90是症状量表；E SAS是焦虑量表。

[题目] 64. (共用选项)心身疾病的诊断原则之⼀是()
A. 培养健全人格,锻炼应对能⼒,获取社会⽀持
B. 药物治疗
C. 病情变化与心理社会因素有关
D. 心身相结合的原则
E. 心理治疗
[答案] C
[解析] 正确答案为C。心身疾病的诊断原则之一是确定病情变化与心理社会因素密切相关，即心理因素在疾病发生发展中起重要作用。A属预防措施；B属治疗手段；D属治疗原则；E属治疗手段。

[题目] 65. (共用选项)心身疾病的治疗原则是()
A. 培养健全人格,锻炼应对能⼒,获取社会⽀持
B. 药物治疗
C. 病情变化与心理社会因素有关
D. 心身相结合的原则
E. 心理治疗
[答案] D
[解析] 正确答案为D。心身疾病的治疗原则是心身相结合的原则，即同时采用心理治疗和躯体治疗的综合干预策略。A属预防措施；B仅药物治疗不全面；C属诊断依据；E仅心理治疗不全面。

[题目] 66. (共用选项)病人对医务人员出现攻击性行为属于( )。
A. 病人角色强化
B. 病人角色异常
C. 病人角色减退
D. 病人角色冲突
E. 病人角色缺如
[答案] B
[解析] 正确答案为B。病人角色异常指病人在疾病状态下出现攻击性行为、自杀等极端异常表现。A角色强化指固守病人角色；C角色减退指忽视疾病；D角色冲突指角色责任冲突；E角色缺如指否认有病。

[题目] 67. (共用选项)医生诊断为有病但本人否认属于( )。
A. 病人角色强化
B. 病人角色异常
C. 病人角色减退
D. 病人角色冲突
E. 病人角色缺如
[答案] E
[解析] 正确答案为E。病人角色缺如指医生已诊断患病，但患者本人否认有病，拒绝接受病人角色。A角色强化指过度依赖病人角色；B角色异常指极端行为；C角色减退指忽视疾病；D角色冲突指责任冲突。

[题目] 68. (共用选项)不把自⼰当病人,仍坚持带病⼯作是病人⾓⾊的( )。
A. 病人角色强化
B. 病人角色异常
C. 病人角色减退
D. 病人角色冲突
E. 病人角色缺如
[答案] C
[解析] 正确答案为C。病人角色减退（角色行为消退）指患者不把自己当病人，仍坚持从事不应承担的工作活动。A角色强化指固守角色；B角色异常指极端行为；D角色冲突指责任冲突；E角色缺如指否认有病。

[题目] 69. (共用选项)表现为心理活动的动⼒特征( )
A. 能⼒
B. ⽓质
C. 性格
D. 人格
E. 行为
[答案] B
[解析] 正确答案为B。气质是心理活动的动力特征，包括强度、速度、灵活性和稳定性等先天属性。A能力是活动效率特征；C性格是社会态度特征；D人格是综合心理特征；E行为是外在表现。

[题目] 70. (共用选项)人的各种稳定的心理特征的总和( )
A. 能⼒
B. ⽓质
C. 性格
D. 人格
E. 行为
[答案] D
[解析] 正确答案为D。人格是人的各种稳定心理特征的总和，包括气质、性格、能力等成分。A能力仅涉及活动效率；B气质是动力特征；C性格是社会态度；E行为是外在表现。

[题目] 71. (共用选项)人对现实稳定的态度及与之相应的行为模式()
A. 能⼒
B. ⽓质
C. 性格
D. 人格
E. 行为
[答案] C
[解析] 正确答案为C。性格是人对现实稳定的态度及与之相适应的行为模式，是人格的核心成分。A能力是效率特征；B气质是先天动力特征；D人格是更广义的概念；E行为是外在表现。

[题目] 72. (共用选项)直接影响活动效率的个性心理特征( )
A. 能⼒
B. ⽓质
C. 性格
D. 人格
E. 行为
[答案] A
[解析] 正确答案为A。能力是直接影响活动效率、使活动顺利完成的个性心理特征。B气质是动力特征；C性格是社会态度特征；D人格是综合概念；E行为是外在表现。

[题目] 73. (共用选项)感受性低,耐受性高,速度快⽽灵活()
A. 胆汁质
B. 抑郁质
C. 多⾎质
D. 粘液质
E. 抑制质
[答案] C
[解析] 正确答案为C。多血质气质特点：感受性低、耐受性高、反应速度快而灵活，情绪兴奋性高且可塑性强。A胆汁质快但不灵活；B抑郁质感受性高；D粘液质速度慢但稳定；E抑制质非标准分型。

[题目] 74. (共用选项)感受性低,耐受性高,速度快但不灵活()
A. 胆汁质
B. 抑郁质
C. 多⾎质
D. 粘液质
E. 抑制质
[答案] A
[解析] 正确答案为A。胆汁质气质特点：感受性低、耐受性高、反应速度快但不灵活，情绪冲动、难以自控。C多血质速度快且灵活；D粘液质速度慢；B抑郁质感受性高；E抑制质非标准分型。

[题目] 75. (共用选项)感受性低,耐受性高,速度慢具有稳定性( )
A. 胆汁质
B. 抑郁质
C. 多⾎质
D. 粘液质
E. 抑制质
[答案] D
[解析] 正确答案为D。粘液质气质特点：感受性低、耐受性高、反应速度慢、稳定性好，情绪不易外露。A胆汁质速度快不灵活；B抑郁质感受性高；C多血质灵活但稳定性不足；E抑制质非标准分型。

[题目] 76. (共用选项)感受性高,耐受性低,速度慢且不灵活具有刻板性( )
A. 胆汁质
B. 抑郁质
C. 多⾎质
D. 粘液质
E. 抑制质

[解析] 正确答案为B。抑郁质气质特点：感受性高、耐受性低、反应速度慢且不灵活、刻板性强，情绪敏感易受挫。A胆汁质感受性低；C多血质灵活；D粘液质耐受性高；E抑制质非标准分型。

[题目] 77. (共用选项)正强化( )
A. 行为出现的频率增加,给予正性强化物
B. 行为出现的频率增加,给予负性强化物
C. 行为出现的频率增加,撤销负性强化物
D. 行为出现的频率减少,给予负性强化物
E. 行为出现的频率减少,不给予强化
[答案] A
[解析] 正确答案为A。正强化是指行为之后给予正性强化物（奖励），导致该行为出现的频率增加。B负强化是撤销负性刺激；C也是负强化的定义；D惩罚是给予厌恶刺激；E消退是不给予强化。

[题目] 78. (共用选项)负强化 ( )
A. 行为出现的频率增加,给予正性强化物
B. 行为出现的频率增加,给予负性强化物
C. 行为出现的频率增加,撤销负性强化物
D. 行为出现的频率减少,给予负性强化物
E. 行为出现的频率减少,不给予强化
[答案] C
[解析] 正确答案为C。负强化是指行为之后撤销负性刺激，从而增加该行为出现的频率。A是正强化；B描述混乱；D是惩罚；E是消退。负强化与惩罚不同：负强化是增加行为频率，惩罚是减少行为频率。

[题目] 79. (共用选项)惩罚 ( )
A. 行为出现的频率增加,给予正性强化物
B. 行为出现的频率增加,给予负性强化物
C. 行为出现的频率增加,撤销负性强化物
D. 行为出现的频率减少,给予负性强化物
E. 行为出现的频率减少,不给予强化
[答案] D
[解析] 正确答案为D。惩罚是指行为之后给予负性刺激（厌恶刺激），导致该行为出现的频率减少。A是正强化；B和C是负强化（增加行为频率）；E是消退（不给予强化）。

[题目] 80. (共用选项)消退 ( )
A. 行为出现的频率增加,给予正性强化物
B. 行为出现的频率增加,给予负性强化物
C. 行为出现的频率增加,撤销负性强化物
D. 行为出现的频率减少,给予负性强化物
E. 行为出现的频率减少,不给予强化
[答案] E
[解析] 正确答案为E。消退是指行为之后不给予任何强化，使该行为出现的频率逐渐减少。A是正强化；B和C是负强化（均增加行为频率）；D是惩罚（给予厌恶刺激）。

[题目] 81. (共用选项)第⼀反抗期出现于()
A. 青少年期
B. ⼉童期
C. 中年期
D. 婴⼉期
E. 幼⼉期
[答案] E
[解析] 正确答案为E。第一反抗期出现在幼儿期（约3~4岁），儿童开始有了自主意识，出现对父母权威的反抗。A青少年期是第二反抗期；B儿童期（6~12岁）相对平稳；C中年期无典型反抗期；D婴儿期尚无明显自主意识。

[题目] 82. (共用选项)第⼆反抗期出现于()
A. 青少年期
B. ⼉童期
C. 中年期
D. 婴⼉期
E. 幼⼉期
[答案] A
[解析] 正确答案为A。第二反抗期出现在青少年期（青春期），个体追求独立自主，出现逆反心理和反抗行为。B儿童期（6~12岁）相对平稳；C中年期无典型反抗期；D婴儿期无自主意识；E幼儿期是第一反抗期。

[题目] 83. (共用选项)属于期待性焦虑(  )。
A. 病人对每天必须吃药感到痛苦
B. 病人对自己的病不能马上确诊而心烦
C. 病人很害怕手术造成的疼痛
D. 病人因住院不能常与亲人见面而心烦
E. 病人害怕手术会对自己身体的完整性造成伤害
[答案] B
[解析] 正确答案为B。期待性焦虑源于对未知结果的不确定，患者因不能马上确诊而心烦正是对未来不确定性的焦虑。A是对日常治疗的痛苦；C是对疼痛的恐惧；D是因分离而焦虑；E是对身体完整性受损害的恐惧（阉割性焦虑）。

[题目] 84. (共用选项)属于分离性焦虑(  )。
A. 病人对每天必须吃药感到痛苦
B. 病人对自己的病不能马上确诊而心烦
C. 病人很害怕手术造成的疼痛
D. 病人因住院不能常与亲人见面而心烦
E. 病人害怕手术会对自己身体的完整性造成伤害
[答案] D
[解析] 正确答案为D。分离性焦虑源于与亲人分离、缺乏情感支持，患者因住院不能与亲人见面而感到心烦。A是对治疗的痛苦；B是期待性焦虑；C是对疼痛的恐惧；E是阉割性焦虑（害怕身体受损）。

[题目] 85. (共用选项)属于阉割性焦虑(  )。
A. 病人对每天必须吃药感到痛苦
B. 病人对自己的病不能马上确诊而心烦
C. 病人很害怕手术造成的疼痛
D. 病人因住院不能常与亲人见面而心烦
E. 病人害怕手术会对自己身体的完整性造成伤害
[答案] E
[解析] 正确答案为E。阉割性焦虑（精神分析术语）指害怕身体完整性遭到破坏，患者害怕手术伤害自身器官或身体结构。A是对治疗的痛苦；B是期待性焦虑；C是对疼痛恐惧；D是分离性焦虑。

[题目] 86. (共用选项)严重外伤(  )。
A. 主动-被动型医患关系
B. 稳定型医患关系
C. 指导-合作型医患关系
D. 共同参与型医患关系
E. 对立型医患关系
[答案] A
[解析] 正确答案为A。严重外伤患者意识不清或无法自主决策，需医生完全主导抢救，医患关系模式为主动-被动型。B非标准分类；C指导-合作型适用于清醒患者；D共同参与型用于慢性病；E对立型是冲突关系。

[题目] 87. (共用选项)慢性疼痛(  )。
A. 主动-被动型医患关系
B. 稳定型医患关系
C. 指导-合作型医患关系
D. 共同参与型医患关系
E. 对立型医患关系
[答案] D
[解析] 正确答案为D。慢性疼痛患者长期与疾病共存，需积极参与自我管理，最适合共同参与型医患关系模式。A主动-被动型用于急救；C指导-合作型用于急性病；B稳定型非标准分类；E对立型是冲突关系。

[题目] 88. (共用选项)急性感染(  )。
A. 主动-被动型医患关系
B. 稳定型医患关系
C. 指导-合作型医患关系
D. 共同参与型医患关系
E. 对立型医患关系
[答案] C
[解析] 正确答案为C。急性感染患者意识清楚但缺乏专业判断能力，需医生指导、患者配合，属于指导-合作型。A主动-被动型用于昏迷或严重创伤；D共同参与型用于慢性病；B和E非标准分类。

[题目] 89. (共用选项)测验取样的平均值,即正常或平均的成绩称为(   )。
A. 信度
B. 效度
C. 常模
D. 标准化原则
E. 客观性原则
[答案] C
[解析] 正确答案为C。常模是测验取样的平均值，代表正常或平均成绩，是解释个体测验分数的参照标准。A信度指测量一致性；B效度指测量准确性；D标准化是测验原则；E客观性也是原则。

[题目] 90. (共用选项)⼀个测验⼯具对同⼀对象在⼏次测量中所得结果的⼀致程度,反映测验⼯具的可靠性.稳定性称为(   )。
A. 信度
B. 效度
C. 常模
D. 标准化原则
E. 客观性原则
[答案] A
[解析] 正确答案为A。信度反映测验工具的一致性和稳定性，即多次测量同一对象结果的一致性程度。B效度指准确性；C常模是参照标准；D标准化是测验原则；E客观性也是测验原则。

[题目] 91. (共用选项)对测验结果的解释要符合受试者的实验情况,评估应综合各⽅⾯材料作全⾯参考称为(   )。
A. 信度
B. 效度
C. 常模
D. 标准化原则
E. 客观性原则
[答案] E
[解析] 正确答案为E。客观性原则要求对测验结果的解释必须符合受测者的实际情境，综合多方面材料全面评估。A信度指一致性；B效度指准确性；C常模是参照标准；D标准化是测验的统一程序原则。

[题目] 92. (共用选项)⼀个测验⼯具能够测量出其所要测东西的真实程度,反映⼯具的正确性称为(   )。
A. 信度
B. 效度
C. 常模
D. 标准化原则
E. 客观性原则
[答案] B
[解析] 正确答案为B。效度指测验工具能够测量出其所要测内容的真实程度，反映测验的正确性和有效性。A信度是一致性；C常模是参照标准；D标准化是程序原则；E客观性是解释原则。

[题目] 93. (共用选项)不良行为主要是通过学习获得的是哪个学派的观点  (  )
A. 精神分析学派
B. 行为主义学派
C. 人本主义学派
D. 心理生理学理论
E. 完形学派
[答案] B
[解析] 正确答案为B。行为主义学派认为不良行为是通过学习（条件反射、观察学习等）获得的，因此也可以通过行为矫正技术来改变。A精神分析强调潜意识冲突；C人本主义强调自我实现受阻；D心理生理学强调心身关系；E完形学派强调整体知觉。

[章节] 心理发展与心理健康

[单选题]

[题目] 1. 婴儿的动作发展以下哪项是不正确的(  )。
A. 头尾原则:从头到脚的发展
B. 近远原则:从身体中心向周边部位转移
C. 大小原则:从大肌肉动作到精细动作
D. 细粗原则:婴儿首先掌握的是手部众多的精细动作
E. 高低原则:观察事物从视线水平到其他地方
[答案] D
[解析] 正确答案为D。婴儿动作发展遵循头尾原则、近远原则和大小原则，即从头到脚、从身体中心到外周、从大肌肉粗大动作到小肌肉精细动作。细粗原则不属于经典动作发展原则。D项说婴儿首先掌握手部精细动作，违背了大小原则，故错误。

[题目] 2. 哪项不是儿童期应注意的心理卫生问题(   )。
A. 不要按大人的意图培养儿童
B. 注意培养孩子各种认知能力
C. 培养儿童良好的习惯
D. 注意性心理的形成
E. 纠正不良行为
[答案] D
[解析] 正确答案为D。儿童期（6~12岁）心理卫生重点包括：不按大人意图强行塑造儿童、培养认知能力、养成良好习惯、纠正不良行为等。性心理的形成主要在青春期，儿童期尚未进入性心理活跃期，故D不是儿童期应注意的问题。

[题目] 3. 中年人心理健康的常见问题不包括(  )。
A. 渴望健康与追求成就的矛盾
B. 反应速度与记忆能力下降
C. 人际关系错综复杂
D. 家庭与事业的双趋冲突
E. 主观健康水平评价差
[答案] E
[解析] 正确答案为E。中年人常见心理卫生问题包括：渴望健康与追求成就的矛盾、反应速度与记忆力下降、人际关系复杂、家庭与事业的双趋冲突等。E项主观健康水平评价差更常见于老年期，不属于中年期典型问题，故排除。

[题目] 4. 下述哪一项不是维护心理健康的原则(   )。
A. 认识自己,悦纳自己
B. 面对现实,适应环境
C. 结交知己,与人为善
D. 严格要求,永不满足
E. 挫折磨砺,积极进取
[答案] D
[解析] 正确答案为D。维护心理健康的原则包括认识自己并悦纳自己、面对现实适应环境、结交知己与人为善、挫折磨砺积极进取等。D项严格要求，永不满足容易导致自我苛责和心理压力，不利于心理健康，故不属于心理健康维护原则。

[题目] 5. 心理卫生工作的特点是(  )。
A. 内容的广涵盖性
B. 对象的局限性
C. 途径的单调性
D. 目标的狭窄性
E. 理论复杂性
[答案] A
[解析] 正确答案为A。心理卫生工作的特点是内容涵盖面广，涉及不同年龄阶段、不同人群的心理健康促进和预防。B对象局限性、C途径单调性、D目标狭窄性均与心理卫生工作的广泛性相悖。E理论复杂性虽有一定道理，但并非最核心特点。

[题目] 6. 不属于青少年心理健康教育的主要内容为(   )。
A. 世界观、价值观、人生观教育
B. 友谊观和恋爱观教育
C. 自我意识形成教育
D. 性生理和性心理、性道德教育
E. 学习策略和方法的教育
[答案] E
[解析] 正确答案为E。青少年心理健康教育主要内容包括世界观/价值观/人生观教育、友谊观和恋爱观教育、自我意识形成教育、性生理/性心理/性道德教育。E学习策略和方法的教育属于学习心理指导范畴，是学习方法问题，而非心理健康教育核心内容。

[题目] 7. 乳儿期良好习惯包括(   )。
A. 吮指甲
B. 昼夜颠倒
C. 口吃
D. 单独睡眠
E. 拒食
[答案] D
[解析] 正确答案为D。乳儿期（出生至1岁）良好习惯包括单独睡眠、规律喂养、定时排便等。吮指甲、昼夜颠倒、口吃、拒食均为不良习惯或问题行为，需要纠正。单独睡眠有助于培养婴儿的独立性和良好的睡眠卫生习惯。

[题目] 8. 中老年期心理卫生工作重点主要在于帮助中老年人(   )。
A. 认识心身变化是自然规律
B. 保持良好生活习惯
C. 自尊自立保持良好的社会功能
D. 保持家庭与婚姻的稳定
E. 维持良好的家庭关系
[答案] A
[解析] 正确答案为A。中老年期心理卫生工作的重点首先是帮助中老年人认识心身变化是自然规律，从而坦然接受衰老带来的各种变化。B生活习惯、C自尊自立、D婚姻稳定、E家庭关系虽也重要，但均以接受自然规律为前提，故A最核心。

[题目] 9. 童年期应特别注意以下心理培养,除了(   )。
A. 学习环境适应
B. 学习模式学习
C. 感知觉训练
D. 良好行为习惯塑造
E. 非智力品质培养
[答案] C
[解析] 正确答案为C。童年期（学龄期）心理培养重点包括学习环境适应、学习模式学习、良好行为习惯塑造、非智力品质培养等。感知觉训练主要针对婴儿期和幼儿早期，童年期儿童感知觉已基本成熟，不再是重点培养内容。

[题目] 10. 童年期应特别注意以下心理培养,除了( )。
A. 学习环境适应
B. 学习模式学习
C. 感知觉训练
D. 良好行为习惯塑造
E. 非智力品质培养
[答案] C
[解析] 正确答案为C。本题与第9题相同。童年期儿童已进入学校系统，重点在于适应学习环境和培养学习习惯，感知觉训练在婴幼儿期已完成。故感知觉训练不是童年期应特别注重的心理培养内容。

[题目] 11. 关于胎儿期的心理卫生以下正确的是(  )。
A. 孕妇的情绪是否乐观,是否稳定无关紧要
B. 科学的胎教无助于激起胎儿活动的积极性
C. 孕妇要有全面合理的营养和避免摄入有害的物质
D. 遗传因素与胎儿的身心健康没有重大的关系
E. 孕妇的身心健康与胎儿的发展无关紧要
[答案] C
[解析] 正确答案为C。胎儿期心理卫生强调：孕妇保持乐观稳定情绪、科学胎教、全面合理营养、避免有害物质、重视遗传因素等。A孕妇情绪无关紧要、B胎教无助于激起胎儿活动、D遗传无关、E孕妇身心健康无关均错误，只有C表述正确。

[题目] 12. 女婴,10月龄。由母亲抱至儿童保健门诊接受常规体检。护士教其母亲抚爱孩子的方法和频率,并告知建立依恋关系和防止分离焦虑的重要性。此时护士所依据的婴幼儿期心理卫生的原则是()。
A. 促进运动能力
B. 促进大脑发育
C. 增进母爱
D. 母乳喂养
E. 启迪原则
[答案] C
[解析] 正确答案为C。10月龄婴儿处于依恋形成关键期，护士指导母亲抚爱孩子并建立依恋关系，体现了增进母爱、促进安全依恋的心理卫生原则。A运动能力、B大脑发育、D母乳喂养、E启迪原则均未切中依恋关系和分离焦虑这一核心。

[题目] 13. 个体自我意识发展的开始时期是(   )。
A. 胎儿期
B. 婴儿期
C. 幼儿期
D. 学龄期
E. 青春期
[答案] C
[解析] 正确答案为C。自我意识是指个体对自己身心状态的认识和体验。幼儿期（3~6岁）是自我意识开始形成的时期，主要表现为自我评价、自我体验和自我控制的发展。婴儿期尚无明确自我概念，学龄期和青春期则是自我意识进一步发展的阶段。

[题目] 14. 不符合个体早期发育年龄阶段的是(   )。
A. 乳儿是指出生至满1周岁的儿童
B. 婴儿是指周岁至满3周岁的儿童
C. 幼儿指3-6岁的儿童
D. 儿童期是指6-12岁的儿童
E. 少年期是指17-29岁
[答案] E
[解析] 正确答案为E。个体早期发育年龄阶段划分：乳儿期（出生~1岁）、婴儿期（1~3岁）、幼儿期（3~6岁）、儿童期（6~12岁）、少年期（12~17岁）。E将少年期定为17~29岁错误，17~29岁已进入青年期，故不符合。

[题目] 15. 更年期心理保健中应注意的方面是(   )。
A. 对更年期无所谓
B. 无病要呻吟
C. 重视自我意识
D. 完善人格
E. 保持精神愉快
[答案] E
[解析] 正确答案为E。更年期心理保健应注意保持精神愉快、情绪稳定。A无所谓态度消极，不利于积极应对更年期变化；B无病呻吟不利于健康应对；C重视自我意识和D完善人格虽有一定道理，但保持精神愉快（E）是最直接、最核心的心理保健措施。

[题目] 16. 青少年期心理卫生工作重点在于如何处理或正确对待(  )。
A. 自我意识的建立和社会化问题
B. 认知功能的全面和均衡发展问题
C. 友谊与对异性情感的问题
D. 考试焦虑和对学校环境适应问题
E. 自我否定和人际关系问题
[答案] A
[解析] 正确答案为A。青少年期心理卫生工作的核心在于帮助青少年建立自我同一性，正确认识自我，完成社会化过程。B认知功能均衡发展、C友谊与异性情感、D考试焦虑适应、E自我否定与人际关系均为具体问题，A自我意识的建立和社会化是最具概括性的重点。

[题目] 17. 哪一时期是人一生中心理健康的基础(  )。
A. 婴儿期
B. 幼儿期
C. 儿童期
D. 青年期
E. 成年期
[答案] C
[解析] 正确答案为C。儿童期（6~12岁）是心理发展的关键阶段，此时期儿童进入学校系统，学习系统的知识和技能，形成良好的行为习惯和道德品质，人格逐渐定型，是一生心理健康的重要基础。婴儿期和幼儿期是基础铺垫，但儿童期的社会化影响更为关键。

[题目] 18. 培养自制力的关键期(   )。
A. 0~1岁
B. 1~3岁
C. 2~3岁
D. 3~7岁
E. 7岁以前
[答案] C
[解析] 正确答案为C。培养自制力的关键期是2~3岁。这一阶段幼儿开始形成自我意识，出现第一反抗期，是学习自我控制和延迟满足的重要窗口期。0~1岁主要建立安全依恋，3岁以上自制力继续发展但关键窗口期已过。

[题目] 19. 不属于心理健康的典型表现是(  )。
A. 情绪良好
B. 人际和谐
C. 人格完美
D. 智力正常
E. 适应环境
[答案] C
[解析] 正确答案为C。心理健康的典型表现包括：智力正常、情绪良好、人际和谐、适应环境、人格完整（而非完美）。人格完美是绝对化表述，心理健康追求的是人格的相对完整与协调，而非十全十美，故C不属于典型表现。

[题目] 20. 关于幼儿期培养良好习惯正确的是(   )。
A. 培养独立性
B. 养成乐意助人的好习惯
C. 培养交际能力
D. 矫正口吃
E. 四个选项都正确
[答案] E
[解析] 正确答案为E。幼儿期（3~6岁）是良好习惯形成的关键期，包括培养独立性（自己穿衣、吃饭等）、养成乐意助人的好习惯、培养人际交往能力、矫正口吃等语言问题。A、B、C、D四项均为幼儿期心理卫生的重要内容，故全选。

[题目] 21. 哪项是青年期常见的性冲动心理困扰(   )。
A. 易装癖
B. 性幻想
C. 同性恋
D. 易性癖
E. 性虐待
[答案] B
[解析] 正确答案为B。青年期常见的性冲动心理困扰是性幻想，这是性心理发展过程中的正常现象。易装癖、同性恋、易性癖、性虐待均属于性心理障碍或性取向问题，而非普通青年常见的性冲动困扰。性幻想是多数青年皆有的正常心理活动。

[题目] 22. 关于青少年情绪.情感的特点,以下说法不正确的是( )。
A. 情绪敏感
B. 情绪反应强烈
C. 情绪心境化
D. 情感丰富
E. 情绪稳定
[答案] E
[解析] 正确答案为E。青少年情绪情感的特点包括：情绪敏感、反应强烈、情绪心境化（即情绪容易持续影响心境）、情感丰富且深刻。但青少年情绪不稳定、起伏波动大是典型特征，故E情绪稳定描述不符合青少年情绪特点。

[题目] 23. 对于大多数在小学学习成绩中等的孩子而言,可以判断其智力水平处于正常范围。这一心理健康判断的角度为(     )。
A. 文化学角度
B. 社会学角度
C. 人类学角度
D. 统计学角度
E. 病理学角度
[答案] D
[解析] 正确答案为D。大多数小学成绩中等的孩子智力处于正常范围，是基于统计学的判断——以智力测验常模为参照，大多数人的智力处于平均水平。从统计学角度看，成绩中等代表智力处于群体平均水平，故属于统计学角度的判断。

[题目] 24. 流体智力逐渐下降,但晶体智力仍可保持的人群是()。
A. 婴儿
B. 儿童
C. 青年
D. 中年
E. 老年
[答案] E
[解析] 正确答案为E。根据卡特尔智力理论，流体智力（如反应速度、记忆、推理）随年龄增长在成年后期逐渐下降，而晶体智力（如知识经验、语言能力）可保持甚至增长。这一特点在老年期表现最为明显，故E正确。中年期流体智力下降尚不显著。

[题目] 25. 智力发展的关键期在(   )。
A. 1岁前
B. 3岁前
C. 5岁前
D. 7岁前
E. 9岁前
[答案] D
[解析] 正确答案为D。智力发展的关键期在7岁以前。大量研究表明，学龄前期（尤其是0~7岁）是大脑发育和智力发展的关键阶段，神经突触连接最丰富、可塑性最强，是智力潜能开发的最佳时期。3岁前虽重要，但7岁前是整个关键期。

[题目] 26. 老年人心理卫生保健主要包括( )。
A. 确立生存意义
B. 加强人际交往
C. 保持乐观情绪
D. 修养个性
E. 包括四个选项
[答案] E
[解析] 正确答案为E。老年人心理卫生保健主要包括：确立生存意义（如发挥余热、传承经验）、加强人际交往（预防孤独）、保持乐观情绪（调节失落感）、修养个性（适应角色转变）。A、B、C、D四项均是老年心理健康的重要内容，故应全部选择。

[题目] 27. 比较完整的心理健康概念是指()。
A. 十全十美的心理状态
B. 适应环境和适应自我
C. 没有疾病
D. 适应自我
E. 适应环境
[答案] B
[解析] 正确答案为B。比较完整的心理健康概念强调个体既能适应外部环境（自然与社会），又能适应自我（认识自己、悦纳自己、保持内在平衡）。A十全十美过于理想化；C没有疾病是消极定义；D和E都只强调了其中一个方面，不够完整。

[题目] 28. 老年期容易发生心理变化的方面包括(  )。
A. 记忆力
B. 智力
C. 情绪
D. 性格
E. 四个选项都有
[答案] E
[解析] 正确答案为E。老年期心理变化涉及多方面：记忆力减退（尤其是近期记忆）、智力（流体智力下降）、情绪（易产生孤独、焦虑、抑郁）、性格（可能变得固执、依赖）。A记忆力、B智力、C情绪、D性格均会发生变化，故E正确。

[题目] 29. 心理卫生应从(   )抓起。
A. 胎儿期
B. 婴儿期
C. 乳儿期
D. 新生儿期
E. 幼儿期
[答案] A
[解析] 正确答案为A。心理卫生应从胎儿期抓起。胎儿期的环境刺激和母体身心状态直接影响大脑发育和心理发展基础。现代心理卫生强调优生优育、胎教和孕妇心理保健，从胎儿期开始进行心理卫生干预，对个体一生心理健康具有基础性意义。

[题目] 30. 哪项不是乳儿期应注意的心理卫生问题(   )。
A. 培养独立性
B. 保证生长发育的营养
C. 重视情感需求
D. 给予感官刺激
E. 注意断奶的心身反应
[答案] A
[解析] 正确答案为A。乳儿期（出生至1岁）心理卫生重点包括保证营养、重视情感需求（建立安全依恋）、提供感官刺激、注意断奶心身反应等。培养独立性是幼儿期（约3岁）才开始的发展任务，乳儿期尚不具备发展独立性的身心基础，故A不是乳儿期应注意的问题。

[题目] 31. 乳⼉期心理问题须注意(   )。
A. 满足生理需要
B. 加强母婴联结
C. 注重三大训练
D. 创造丰富的感知环境
E. 注重人际关系
[答案] B
[解析] 正确答案为B。乳儿期心理问题的核心是建立安全依恋，加强母婴联结是保障婴儿心理健康的基础。满足生理需要（A）是基本前提但非心理问题核心；三大训练（C）和感知环境（D）虽重要但层次不同；人际关系（E）对乳儿而言主要指母婴关系。

[题目] 32. 哪项不是婴儿期应注意的心理卫生问题(   )。
A. 口头言语训练
B. 组织游戏活动
C. 运动技能训练
D. 智力开发
E. 培养良好的习惯
[答案] B
[解析] 正确答案为B。婴儿期（1~3岁）心理卫生重点包括口头言语训练、运动技能训练、智力开发、培养良好习惯等。组织游戏活动更适合幼儿期（3~6岁），因婴儿期儿童认知和社交能力有限，有组织的游戏活动并非此阶段的核心卫生问题。

[题目] 33. 关于心理健康与心理卫生错误的观点是(   )。
A. 心理健康是指个体心理在本身及环境条件许可范围内所能达到的最佳功能状态
B. 心理卫生包括一切旨在改进及保持上述状态的措施
C. 心理健康是一种绝对的十全十美状态,是现实中的理想状态
D. 心理卫生可以理解为:以积极.有效的心理活动,平稳.正常的心理状态对当前和
E. 讲究心理健康及社会功能良好之道,即心理卫生
[答案] C
[解析] 正确答案为C。心理健康是指在环境许可范围内所能达到的最佳功能状态，是相对的、动态的，而非绝对的十全十美。心理卫生包括一切保持和改进心理健康的措施。C项将心理健康描述为绝对的十全十美状态是错误观点。

[题目] 34. 哪项不是婴儿期常见的不良习惯(   )。
A. 喂食
B. 与父母共睡
C. 随地大小便
D. 拒食
E. 自私
[答案] E
[解析] 正确答案为E。婴儿期常见不良习惯包括喂食困难、与父母共睡（不利于独立睡眠习惯养成）、随地大小便、拒食等。自私属于道德品质层面的评价，婴儿期儿童尚处于前道德阶段，不具备理解自私概念的心理基础，故不属于婴儿期不良习惯。

[题目] 35. 中老年期心理卫生工作重点主要在于帮助中老年人(  )。
A. 认识心身变化是自然规律
B. 保持良好生活习惯
C. 自尊自立保持良好的社会功能
D. 保持家庭与婚姻的稳定
E. 维持良好的家庭关系
[答案] A
[解析] 正确答案为A。本题与第8题相同。中老年期心理卫生核心是帮助个体认识、接受心身变化的自然规律，在此基础上才能做好其他方面的心理调适。B生活习惯、C自尊自立、D家庭婚姻稳定、E家庭关系均以接受自然规律为认知前提。

[题目] 36. 男性老人除了躯体健康的重视,在心理健康的维护上不合理的是(  )。
A. 继续进行人生的追求
B. 保持乐观的情绪
C. 养成健康的行为习惯
D. 丰富自己的精神生活
E. 改变不良的气质特征
[答案] E
[解析] 正确答案为E。男性老年人心理健康维护应包括继续人生追求、保持乐观情绪、养成健康行为习惯、丰富精神生活等。改变不良的气质特征不合理，因为气质主要由先天遗传决定，具有稳定性，老年期试图改变气质特征既不现实也无必要。

[题目] 37. 青少年阶段的常见心理健康问题不包括(   )。
A. 学习问题
B. 情绪情感问题
C. 恋爱问题
D. 人际关系问题
E. 性的问题
[答案] D
[解析] 正确答案为D。青少年阶段常见心理健康问题包括学习问题（考试焦虑、学业压力）、情绪情感问题（情绪波动、抑郁焦虑）、恋爱问题（早恋、失恋）和性的问题（性困惑、性焦虑）。人际关系问题虽青少年也会遇到，但并非该阶段最具代表性的心理问题，故D为答案。

[题目] 38. 人们以积极有效的心理活动.平稳正常的心理状态对当前和发展着的自然与社会环境保持良好的适应。该表述的定义是指(   )。
A. 心理健康
B. 心身和谐
C. 健康促进
D. 心理适应
E. 健康人格
[答案] A
[解析] 正确答案为A。题干描述以积极有效的心理活动、平稳正常的心理状态对当前和发展着的自然与社会环境保持良好的适应，这正是心理健康的标准定义。B心身和谐强调心身统一；C健康促进是行动策略；D心理适应是能力之一；E健康人格是理想目标。

[题目] 39. 下列哪项是幼儿期应注意的心理卫生问题是(   )。
A. 言语的训练和培养
B. 培养阅读、观察、写作能力
C. 培养推理思维能力
D. 培养社会化能力
E. 入学前心理准备
[答案] D
[解析] 正确答案为D。幼儿期（3~6岁）心理卫生应注意培养社会化能力，如同伴交往、角色扮演、规则意识等。言语训练（A）在婴儿期已完成基础；阅读写作（B）和推理思维（C）主要在学龄期培养；入学前准备（E）是学前末期的任务。社会化能力是幼儿期核心发展任务。

[题目] 40. 哪项不符合青年时代自我意识的特点(   )。
A. 孤独感与强烈交往需要的矛盾
B. 独立性与依赖性的矛盾
C. 幻想与现实的矛盾
D. 求知欲强与识别力低的矛盾
E. 希望健康与忽视健康的矛盾
[答案] E
[解析] 正确答案为E。青年时代自我意识的特点表现为多种矛盾：孤独感与强烈交往需要的矛盾、独立性与依赖性的矛盾、幻想与现实的矛盾、求知欲强与识别力低的矛盾等。希望健康与忽视健康的矛盾是行为层面的问题，不属于自我意识（自我认识、自我体验、自我调控）范畴的矛盾。

[章节] 心理学基础

[单选题]

[题目] 1. 情绪与情感的区别是(   )。
A. 情感伴有生理性变化
B. 情感冲动性较大
C. 情感的产生有较大的情境性
D. 情感表现外露
E. 情感的产生多与社会需要的满足有关
[答案] E
[解析] 正确答案为E。情绪多与生理需要满足有关，情感多与社会需要满足有关，是核心区别。A情感常伴有生理性变化，实为情绪特点；B情感冲动性较大，实为情绪特点；C情感产生有较大情境性，实为情绪特点；D情感表现外露，实为情绪更外露。本题考察情绪与情感的区别。

[题目] 2. 已获得的知识.技能和方法对解决新问题会产生影响的心理现象称为(  )。
A. 暗示
B. 功能固着
C. 保持
D. 迁移
E. 创造
[答案] D
[解析] 正确答案为D。迁移指已获得的知识技能对解决新问题产生的影响。A暗示指在无对抗条件下影响他人；B功能固着指把功能固着于某物；C保持是记忆过程环节；E创造是产生新颖独特的产物。本题考察迁移的概念。

[题目] 3. 在墙上的钟,不论我们从正面看.侧面看.向上看,它的大小和形状都是一样的，这是知觉的(   )。
A. 选择性
B. 恒常性
C. 整体性
D. 理解性
E. 适应性
[答案] B
[解析] 正确答案为B。知觉恒常性指知觉条件变化时知觉映像保持相对不变，从不同角度看钟大小形状不变是恒常性。A选择性指优先知觉某些对象；C整体性指知觉整体优先部分；D理解性指用已有知识经验理解对象；E适应性属于感觉范畴。本题考察知觉的恒常性。

[题目] 4. 某病人,由于急性胰腺炎被送⼊监护病房,⼊监护病房后病人得了“ICU综合征”。所谓的“ICU综合征”是指病人进⼊监护病房后所产生的(   )。
A. 情绪反应和意志改变
B. 认知改变和情绪反应
C. 感觉异常和知觉异常
D. 意识改变和行为异常
E. 认知改变和行为异常
[答案] B
[解析] 正确答案为B。ICU综合征指患者进入监护病房后产生认知改变和情绪反应。A情绪反应和意志改变不全面；C感觉异常和知觉异常是感知觉障碍；D意识改变和行为异常不准确；E认知改变和行为异常缺少情绪反应。本题考察ICU综合征的概念。

[题目] 5. 毕业多年后对当初毕业时聚会情景的记忆属于( )。
A. 形象记忆
B. 运动记忆
C. 情绪记忆
D. 逻辑记忆
E. 短时记忆
[答案] A
[解析] 正确答案为A。形象记忆以感知过的事物形象为内容，对毕业聚会情景的记忆属于形象记忆。B运动记忆是对动作的记忆；C情绪记忆是对情绪体验的记忆；D逻辑记忆是对语词逻辑的记忆；E短时记忆是时程分类。本题考察记忆的分类。

[题目] 6. 以下对动机的理解错误的是(  )。
A. 是行为的源动力
B. 是在外界诱因下产生的
C. 是推动个体行动的心理动力
D. 以需要为基础
E. 可分为内部动机和外部动机
[答案] A
[解析] 正确答案为A。动机是推动个体行动的心理动力，以需要为基础，在外界诱因下产生，分为内部和外部动机。A"行为的源动力"不准确，需要才是源动力，动机是直接动力。本题考察动机的概念。

[题目] 7. 人从光亮处进入黑的地方,要过⼀会才能看得清楚,这种现象叫做暗适应。其原理为(   )。
A. 感觉阈限升高,感受性增强
B. 感觉阈限升高,感受性减弱
C. 感觉阈限降低,感受性增强
D. 感觉阈限降低,感受性减弱
E. 感觉阈限和感受性无规律变化
[答案] C
[解析] 正确答案为C。暗适应过程中感觉阈限降低，感受性增强，才能看清黑暗中的物体。A阈限升高感受性增强矛盾；B阈限升高感受性减弱是明适应；D阈限降低感受性减弱错误。本题考察暗适应的感觉规律。

[题目] 8. 皑皑白雪,在晚霞的映照下呈现出一片红色,但是我们对雪地的知觉仍然是白色。这是因为人的知觉具有(   )。
A. 理解性
B. 对比性
C. 整体性
D. 选择性
E. 恒常性
[答案] E
[解析] 正确答案为E。知觉恒常性包括颜色恒常性，雪地在晚霞映照下虽呈红色但仍被知觉为白色。A理解性指用知识经验解释对象；B对比性不属于知觉基本特性；C整体性指知觉整体；D选择性指优先知觉某些对象。本题考察颜色恒常性。

[题目] 9. 能力分为⼀般能力和特殊能力,以下属于特殊能力的是(   )。
A. 记忆能力
B. 学习能力
C. 数学能力
D. 观察能力
E. 想象能力
[答案] C
[解析] 正确答案为C。特殊能力是在某些专业活动中表现出来的能力，如数学能力。A记忆能力、B学习能力、D观察能力、E想象能力均属于一般能力，为完成各种活动所必备。本题考察一般能力与特殊能力的区分。

[题目] 10. 以下对挫折的理解错误的是(   )。
A. 挫折是需要不能满足而产生的
B. 挫折是负性情绪状态
C. 挫折是动机受到干扰而产生的
D. 遭受挫折过大可导致心身疾病
E. 挫折是行为达到预定目标而产生的
[答案] E
[解析] 正确答案为E。挫折是需要不能满足、动机受干扰时产生的负性情绪状态，而非行为达到预定目标时产生。E说挫折是行为达到预定目标而产生，显然错误。本题考察挫折的概念。

[题目] 11. 知觉过程中,根据过去的知识经验,力求对知觉对象作出某种解释,使其具有一定的意义,这是知觉的(   )。
A. 相对性
B. 整体性
C. 理解性
D. 恒常性
E. 可知性
[答案] C
[解析] 正确答案为C。知觉理解性指根据过去知识经验对知觉对象作出解释赋予意义。A相对性不是知觉基本特性；B整体性指知觉整体；D恒常性指知觉条件变化时知觉不变；E可知性不是知觉特性。本题考察知觉的理解性。

[题目] 12. 与易冲动、易激惹、感情用事等相反的意志品质是( )。
A. 自觉性
B. 果断性
C. 坚韧性
D. 自制性
E. 随意性
[答案] D
[解析] 正确答案为D。意志自制性指善于控制和支配自己言行的品质，与之相反的是易冲动、易激惹、感情用事。A自觉性相反是盲从；B果断性相反是优柔寡断；C坚韧性相反是动摇。本题考察意志品质的自制性。

[题目] 13. 注意力容易转移,志趣容易变化,灵活好动,有较生动的面部表情和语言表达能力,染力较强,直爽热情,容易适应环境的变化,活动中行动敏捷精力充沛。这是()气质类型的典型特点。
A. 多血质
B. 胆汁质
C. 黏液质
D. 抑郁质
E. 活泼质
[答案] A
[解析] 正确答案为A。多血质特点：注意力易转移、志趣易变化、灵活好动、表情生动、语言表达能力强、直爽热情、适应环境快、行动敏捷精力充沛。B胆汁质冲动急躁；C黏液质安静稳重；D抑郁质敏感多虑。本题考察气质类型。

[题目] 14. 个体对识记的内容和数量会随时间发生变化,遗忘具有一定的规律,它们是(  )。
A. 先快后慢形式,之后保持在一定水平
B. 先慢后快形式,之后保持存一定水平
C. 均衡形式遗忘,之后保持在一定水平
D. 均衡形式增加,之后保持在一定水平
E. 断续形式遗忘,之后保持在一定水平
[答案] A
[解析] 正确答案为A。艾宾浩斯遗忘曲线揭示遗忘先快后慢，之后保持在一定水平。B先慢后快错误；C均衡形式错误；D均衡形式增加错误；E断续形式错误。本题考察遗忘规律。

[题目] 15. 李同学大学毕业已有机会就业,可是又想考硕士研究生,举棋不定,难以决断,心情焦虑。这属于(  )。
A. 趋避冲突
B. 双趋冲突
C. 双避冲突
D. 情感冲突
E. 行为冲突
[答案] B
[解析] 正确答案为B。双趋冲突指两个都想要但只能选其一的冲突。就业与考研都是想要的，举棋不定。A趋避冲突指同一目标既想又怕；C双避冲突指两个都想避；D、E不属于动机冲突分类。本题考察动机冲突类型。

[题目] 16. “先吃糖,再吃西瓜,就吃不出西瓜的甜味来”,这⼀现象属于( )。
A. 感觉适应
B. 感觉对比
C. 感觉后象
D. 感觉融合
E. 感觉补偿
[答案] B
[解析] 正确答案为B。感觉对比指同一感受器接受不同刺激后感受性发生变化的現象，先吃糖再吃西瓜感觉不甜是先后对比。A感觉适应是刺激持续作用使感受性变化；C感觉后像指刺激消失后感觉仍存；D感觉融合指多种感觉融合。本题考察感觉对比。

[题目] 17. 人类能创造出“猪八戒”这一并不客观存在的文学形象,这恰好说明了(   )。
A. 心理是对客观现实的反映
B. 心理是脑的功能
C. 心理是极其复杂的
D. 心理是客观现实在人脑中的主观能动的反映
E. 动物进化中产生了神经结构这一物质基础之后才有了心理功能
[答案] D
[解析] 正确答案为D。心理是客观现实在人脑中的主观能动的反映，人创造"猪八戒"说明心理不是被动反映而是能动的。A只强调反映客观现实；B只强调脑的功能；C只说复杂；E说进化过程。本题考察心理的实质。

[题目] 18. 人类产生心理障碍及心身疾病的主要的认知心理因素错误的是()。
A. 感觉
B. 信念
C. 记忆
D. 言语
E. 情感
[答案] E
[解析] 正确答案为E。产生心理障碍及心身疾病的认知心理因素包括感觉、信念、记忆、思维、言语等认知过程，情感属于情绪过程而非认知因素。本题考察认知心理因素。

[题目] 19. 以下关于意志品质的描述不包括(   )。
A. 自觉性
B. 坚韧性
C. 整体性
D. 果断性
E. 自制性
[答案] C
[解析] 正确答案为C。意志品质包括自觉性、果断性、坚韧性和自制性。整体性属于人格特性，而非意志品质。本题考察意志品质的组成。

[题目] 20. 以下对需要的理解错误的是(  )。
A. 是对某种目标的渴求
B. 是行为的直接动力
C. 是客观需求在脑中的反映
D. 包括生理性需要和社会性需要
E. 是对某种目标的欲望
[答案] B
[解析] 正确答案为B。需要是行为的源动力而非直接动力，动机才是行为的直接动力。A对某种目标的渴求正确；C客观需求在脑中的反映正确；D包括生理性和社会性正确；E对某种目标的欲望正确。本题考察需要与动机的关系。

[题目] 21. 自觉地确定目的,并根据目的支配自己的行为.克服困难以实现目的的心理过程是(   )。
A. 情感
B. 意志
C. 认识
D. 感知
E. 思维
[答案] B
[解析] 正确答案为B。意志是自觉地确定目的，根据目的支配行为、克服困难以实现目的的心理过程。A情感是对客观事物的态度体验；C认识包括感觉知觉等；D感知是感觉知觉合称；E思维是间接概括反映。本题考察意志的概念。

[题目] 22. 人的社会性需要不包括()。
A. 劳动
B. 求知
C. 排泄
D. 交往
E. 尊重
[答案] C
[解析] 正确答案为C。社会性需要包括劳动、求知、交往、尊重等，排泄属于生理性需要（维持生存的基本需要）。本题考察社会性需要与生理性需要的区别。

[题目] 23. 某心外科医生在实施一例先天性心脏病手术之前的晚上,在自己的脑海中反复想象手术的过程以及手术以外的应对措施等。这种思维方式是()。
A. 聚合思维
B. 形象思维
C. 发散思维
D. 抽象思维
E. 创造思维
[答案] B
[解析] 正确答案为B。形象思维以具体表象为思维材料，医生在脑海中想象手术过程属于形象思维。A聚合思维指向唯一答案；C发散思维向多方向发散；D抽象思维以概念判断推理进行；E创造思维有独创性。本题考察思维的类型。

[题目] 24. 对心理实质正确全面的理解是(   )。
A. 是人脑对客观现实的主观能动的反映
B. 心理是客观现实的反映
C. 心理是主观想象的反映
D. 心理是客观现实的主观反映
E. 心理是想什么就反映什么
[答案] A
[解析] 正确答案为A。"人脑对客观现实的主观能动的反映"是对心理实质最全面的理解。B缺少主观能动性；C主观想象反映错误；D缺少能动性；E想什么就反映什么过于机械。本题考察心理的实质。

[题目] 25. 动机强度与解决问题的效率密切相关,解决问题效率最佳的动机强度应是(   )。
A. 最强
B. 极强
C. 适中
D. 较弱
E. 最弱
[答案] C
[解析] 正确答案为C。耶克斯-多德森定律表明动机强度与解决问题的效率呈倒U型曲线，中等强度动机最有利于解决问题。A最强、B极强、D较弱、E最弱均不利于达到最佳效率。本题考察动机强度与效率的关系。

[题目] 26. “人心不同,各如其面”,说明人格具有( )。
A. 独特性
B. 稳定性
C. 社会性
D. 整体性E.生物性
[答案] A
[解析] 正确答案为A。"人心不同，各如其面"说明每个人的心理面貌各不相同，体现了人格的独特性。B稳定性指人格持久不变；C社会性指社会化影响；D整体性指人格各成分协调一致。本题考察人格的特性。

[题目] 27. 情绪是与(   )相联系。
A. 生理需要
B. 安全需要
C. 认知需要
D. 交际需要
E. 自我实现需要
[答案] A
[解析] 正确答案为A。情绪多与生理需要（如饥渴、安全）相联系，情感多与社会需要相联系。B安全需要、C认知需要、D交际需要、E自我实现需要多属社会性需要。本题考察情绪与需要的联系。

[题目] 28. 安静稳重,注意力稳定但难以转移,喜怒不形于色。动作慢,不灵活,对工作有理,易于因循守旧,缺乏创新。这是(  )气质类型的典型特点。
A. 多血质
B. 胆汁质
C. 黏液质
D. 抑郁质
E. 活泼质
[答案] C
[解析] 正确答案为C。黏液质特点：安静稳重、注意力稳定难转移、喜怒不形于色、动作慢不灵活、因循守旧。A多血质活泼好动；B胆汁质冲动易怒；D抑郁质敏感多愁善感。本题考察气质类型特点。

[题目] 29. 既想参赛锻炼自己,又怕成绩不好被人讥笑,此时的动机冲突为(   )。
A. 双趋冲突
B. 双避冲突
C. 趋避冲突
D. 双重趋避冲突
E. 双重趋避冲突
[答案] C
[解析] 正确答案为C。趋避冲突指同一目标既有好的一面又有不好的一面，既想参赛又怕成绩不好是趋避冲突。A双趋两个都想要；B双避两个都想避；D双重趋避冲突更复杂。本题考察趋避冲突。

[题目] 30. 在知觉的基本特性中不包括(   )。
A. 整体性
B. 理解性
C. 选择性
D. 恒常性
E. 准确性
[答案] E
[解析] 正确答案为E。知觉的基本特性包括选择性、整体性、理解性、恒常性。准确性不属于知觉的基本特性。本题考察知觉的基本特性。

[题目] 31. 下列选项为思维的重要特征的是(   )。
A. 深刻性和观念性
B. 抽象性和创造性
C. 上升性和决策性
D. 分析性和综合性
E. 间接性和概括性
[答案] E
[解析] 正确答案为E。思维的重要特征是间接性和概括性。间接性指借助媒介认识事物；概括性指反映一类事物的共同本质。A、B、C、D均不是思维最重要特征。本题考察思维的特征。

[题目] 32. 人正常生活的最基本的心理条件是()。
A. 人际和谐
B. 情绪稳定
C. 人格完整
D. 智力正常
E. 适应环境
[答案] D
[解析] 正确答案为D。智力正常是人正常生活的最基本的心理条件，是心理健康的首要标准。A人际和谐、B情绪稳定、C人格完整、E适应环境也重要，但最基本的是智力正常。本题考察心理健康标准。

[题目] 33. 条件反射是通过认识过程中哪个部分获得的(   )。
A. 学习
B. 思维
C. 感觉
D. 知觉
E. 记忆
[答案] A
[解析] 正确答案为A。条件反射是通过学习获得的，学习是条件反射建立的基本途径。B思维、C感觉、D知觉、E记忆均不是条件反射获得的直接途径。本题考察条件反射与学习的关系。

[题目] 34. 人类的认知过程不包括(   )。
A. 感觉
B. 知觉
C. 信念
D. 注意
E. 思维
[答案] C
[解析] 正确答案为C。认知过程包括感觉、知觉、注意、记忆、思维等，信念属于人格倾向中的价值观范畴，不属于认知过程。本题考察认知过程的内容。

[题目] 35. 下列哪两个既有区别又密切联系的方面属于人的心理现象(   )。
A. 认识过程和人格
B. 认识过程和意志过程
C. 心理过程和人格
D. 心理过程和情感过程
E. 情感过程和意志过程
[答案] C
[解析] 正确答案为C。人的心理现象包括心理过程和人格两大部分，二者既有区别又密切联系。A认识过程和人格不全面；B认识过程和意志过程不全面；D心理过程和情感过程不全面；E情感过程和意志过程不全面。本题考察心理现象的结构。

[题目] 36. 对于情绪情感概念的理解不正确的是(   )。
A. 是人对客观事物是否符合自身需要而产生的态度体验
B. 人本身的生理状态也可以成为情绪情感的来源
C. 在情绪和情感的产生过程中,需要起着关键性作用
D. 情绪情感从本质上来讲是一种态度
E. 两极性是情绪情感的重要性质
[答案] D
[解析] 正确答案为D。情绪情感是人对客观事物是否符合自身需要而产生的态度体验，但本质上是一种体验而非态度。A定义正确；B生理状态可成为来源正确；C需要关键作用正确；E两极性正确。本题考察情绪情感的概念。

[题目] 37. 对于情绪情感作用的表述不正确的是(   )。
A. 积极的情绪情感有助于工作效率的提高
B. 消极的情绪情感会影响工作效率
C. 只有在身心放松的状态下才能发挥最佳工作效率
D. 情绪是心身联系的纽带,临床上许多常见病都与不良情绪有关
E. 人际情感一旦形成就不易改变
[答案] C
[解析] 正确答案为C。并非只有在身心放松状态才能发挥最佳工作效率，适度的紧张和焦虑有助于提高工作效率。A、B、D、E均是对情绪情感作用的正确表述。本题考察情绪情感与工作效率的关系。

[题目] 38. “江山易改,本性难移”,说明人格具有()。
A. 独特性
B. 社会性
C. 稳定性
D. 整体性
E. 生物性
[答案] C
[解析] 正确答案为C。"江山易改，本性难移"说明人格一旦形成便难以改变，体现了人格的稳定性。A独特性是人心不同；B社会性是社会影响；D整体性是各成分协调；E生物性是遗传基础。本题考察人格的稳定性。

[题目] 39. 与意志的自觉性相反的特征是(   )。
A. 果断性
B. 草率从事
C. 感情用事
D. 受暗示性
E. 自制力差
[答案] D
[解析] 正确答案为D。意志自觉性指对行动目的有明确认识，与之相反的是受暗示性（动摇性、随波逐流）。A果断性相反是优柔寡断；B草率从事是果断性的相反；C感情用事是自制性的相反；E自制力差是自制性的相反。本题考察意志品质。

[题目] 40. 人的社会性需要不包括()。
A. 劳动
B. 求知
C. 饮食
D. 交往
E. 尊重
[答案] C
[解析] 正确答案为C。社会性需要包括劳动、求知、交往、尊重等，饮食属于生理性需要（维持生存的基本需要）。本题考察社会性需要与生理性需要的区分。

[题目] 41. 人的心理实质是(  )。
A. 心脏的功能
B. 思维的结果
C. 脑的机能
D. 个性的反映
E. 对事物整体属性的反映
[答案] C
[解析] 正确答案为C。心理的实质是脑的机能（功能），脑是心理的器官。A心脏的功能是错误观点；B思维的结果不全面；D个性的反映不准确；E对事物整体属性的反映是知觉的概念。本题考察心理实质。

[题目] 42. 需要属于心理现象中的(   )。
A. 认识过程
B. 意志过程
C. 情感过程
D. 人格特征
E. 人格倾向
[答案] E
[解析] 正确答案为E。需要属于心理现象中的人格倾向（个性倾向性），包括需要、动机、兴趣等。A认识过程、B意志过程、C情感过程是心理过程；D人格特征包括能力气质性格。本题考察需要所属范畴。

[题目] 43. 下面是世界精神卫生协会提出的心理健康标准,除了(   )。
A. 身体.智力.情绪十分调和
B. 没有躯体疾病
C. 适应环境,人际关系中彼此以谦让
D. 有幸福感
E. 在工作和职业中能充分发挥自己的能⼒,过着有效率的生活
[答案] B
[解析] 正确答案为B。世界精神卫生协会心理健康标准包括身体智力情绪调和、适应环境、人际关系谦让、有幸福感、工作中发挥能力，不包括"没有躯体疾病"。本题考察心理健康标准。

[题目] 44. 个体对识记的内容和数量会随时间发生变化,遗忘具有一定的规律,它们是(   )。
A. 先快后慢形式,之后保持在一定水平
B. 先慢后快形式,之后保持存一定水平
C. 均衡形式遗忘,之后保持在一定水平
D. 均衡形式增加,之后保持在一定水平
E. 断续形式遗忘,之后保持在一定水平
[答案] A
[解析] 正确答案为A。艾宾浩斯遗忘曲线揭示遗忘先快后慢，之后保持在一定水平。B先慢后快错误；C均衡形式遗忘错误；D均衡形式增加错误；E断续形式错误。本题考察遗忘规律。

[题目] 45. 马斯洛需要层次从低到高的排列顺序是(   )。
A. 生理、尊重、安全、爱与被爱、自我实现
B. 生理、尊重、爱与被爱、安全、自我实现
C. 生理、爱与被爱、安全、尊重、自我实现
D. 生理、安全、爱与被爱、尊重、自我实现
E. 生理、安全、尊重、爱与被爱、自我实现
[答案] D
[解析] 正确答案为D。马斯洛需要层次从低到高：生理需要→安全需要→爱与归属需要→尊重需要→自我实现需要。A顺序错误；B顺序错误；C顺序错误；E顺序错误。本题考察需要层次理论。

[题目] 46. 流体智力逐渐下降,但晶体智力仍可保持的人群是()。
A. 婴儿
B. 儿童
C. 青年
D. 中年
E. 老年
[答案] E
[解析] 正确答案为E。老年人流体智力（如记忆、思维敏捷性）逐渐下降，但晶体智力（如知识经验）仍可保持。A婴儿、B儿童、C青年、D中年流体智力均在上升或维持较高水平。本题考察流体智力和晶体智力。

[题目] 47. 与神经过程的特性相联系的行为特征称为(   )。
A. 人格
B. 能力
C. 性格
D. 气质
E. 行为方式
[答案] D
[解析] 正确答案为D。气质是不以活动目的和内容为转移的典型的稳定的心理活动的动力特征，与神经过程的特性相联系。A人格范围更广；B能力是完成任务的心理特征；C性格是核心；E行为方式不是。本题考察气质的定义。

[题目] 48. “入芝兰之室,久闻而不知其香”说明了(  )。
A. 感觉过敏
B. 感觉适应
C. 感觉相互作用
D. 感觉减退
E. 感受性补偿
[答案] B
[解析] 正确答案为B。感觉适应指刺激持续作用使感受性发生变化。"入芝兰之室久而不闻其香"是嗅觉适应。A感觉过敏是过敏感；C感觉相互作用是相互影响；D感觉减退；E补偿是一种感觉代偿另一缺陷。本题考察感觉适应。

[题目] 49. 情感主要指(  )。
A. 与生理需要是否获得满足相联系的体验
B. 受情境影响而产生的体验
C. 与人的社会性需要相联系的体验
D. 与人的饥饿相联系的体验
E. 与人的安全性需要相联系的体验
[答案] C
[解析] 正确答案为C。情感是与人的社会性需要相联系的体验，如道德感、理智感、美感。A与生理需要相联系的体验是情绪；B受情境影响是情绪特点；D与饥饿相联系是情绪；E与安全性需要相联系也是情绪。本题考察情感的定义。

[题目] 50. 按照需要起源,可把需要分为(   )。
A. 生理性需要和社会性需要
B. 物质需要和精神需要
C. 自然需要和精神需要
D. 生理性需要和心理性需要
E. 物质需要和心理需要
[答案] A
[解析] 正确答案为A。按需要起源分为生理性需要（自然性需要）和社会性需要。B物质需要和精神需要是按需要对象划分；C自然需要和精神需要对象划分；D、E也是按其他标准。本题考察需要的分类。

[题目] 51. “鱼与熊掌不能兼得”的动机冲突属于()。
A. 双趋冲突
B. 双避冲突
C. 趋避冲突
D. 双重趋避冲突
E. 双趋双避冲突
[答案] A
[解析] 正确答案为A。双趋冲突指两个都想得到但只能选其一的冲突。"鱼与熊掌不能兼得"是典型双趋冲突。B双避两个都想避；C趋避同一目标有好有坏；D双重趋避更复杂。本题考察双趋冲突。

[题目] 52. 病人最重要.最优先的需要常常是(   )。
A. 生理的需要
B. 爱和归属的需要
C. 安全的需要
D. 尊重的需要
E. 获取信息的需要
[答案] C
[解析] 正确答案为C。病人最重要、最优先的需要是安全的需要，包括生命安全和健康保障。A生理需要在正常情况下最优先，但病人因疾病威胁安全，安全需要成为最优先。本题考察病人需要层次。

[题目] 53. 某初中生,特别喜欢玩电子游戏,也常常因贪玩完不成作业而叹息,但就是管不住自己,这表明他(     )。
A. 情绪不稳定
B. 兴趣太广泛
C. 耐受力差
D. 自制力差
E. 理智感差
[答案] D
[解析] 正确答案为D。自制力指善于控制和支配自己言行的意志品质。管不住自己、明知该做而不做是自制力差的表现。A情绪不稳定不是核心；B兴趣太广泛不准确；C耐受力差不直接；E理智感差不具体。本题考察意志品质的自制性。

[题目] 54. 汽车正在行驶中,一名⼉童突然冲向马路对面。司机急刹车,汽车在发出刺耳的刹车声后停住,⼉童在车前的半米处跑过。这时司机顿感心跳加快,头上冒汗,手脚无力,这种情绪状态为(  )。
A. 激情
B. 心境
C. 情感
D. 应激
E. 情操
[答案] D
[解析] 正确答案为D。应激是出乎意料的紧急情况引起的急速而高度紧张的情绪状态。司机突遇儿童冲上马路，心跳加快、头上冒汗是应激反应。A激情强烈爆发短暂；B心境弥漫持久；C情感社会性；E情操社会情感。本题考察情绪状态分类。

[题目] 55. 红.橙.黄色,往往使人产生温暖的感觉,被称为“暖色调”。这种心理现象是感觉的(   )。
A. 适应
B. 后像
C. 补偿
D. 联觉
E. 感受性
[答案] D
[解析] 正确答案为D。联觉指一种感觉引起另一种感觉，红橙黄引起温暖感是视觉引起温度觉。A适应刺激持续作用感受性变化；B后像刺激消失后感觉仍存；C补偿一种感觉代偿另一缺陷；E感受性是感觉能力。本题考察联觉。

[题目] 56. 我自横刀向天笑,去留肝胆两昆仑。这种情绪状态是( )。
A. 心境
B. 激情
C. 情感
D. 应激
E. 情操
[答案] B
[解析] 正确答案为B。激情是强烈爆发短暂的情绪状态。"我自横刀向天笑"表达了慷慨赴死的强烈情感，属于激情。A心境弥漫持久；C情感社会性；D应激突发紧张；E情操社会情感。本题考察激情。

[题目] 57. 我国学者提出的心理健康标准,不包括(   )。
A. 智力正常
B. 情绪稳定而愉快
C. 工作有效率
D. 适应环境
E. 人际和谐
[答案] C
[解析] 正确答案为C。我国学者提出的心理健康标准包括智力正常、情绪稳定愉快、适应环境、人际和谐等。"工作有效率"是西方标准强调的内容。本题考察心理健康标准。

[题目] 58. 直接影响活动效率,使活动顺利完成的个性心理特征称为(   )。
A. 意志
B. 能力
C. 人格
D. 气质
E. 动机
[答案] B
[解析] 正确答案为B。能力是直接影响活动效率、使活动顺利完成的个性心理特征。A意志是心理过程；C人格范围更广；D气质是动力特征；E动机是行为动力。本题考察能力的定义。

[题目] 59. 患者知觉体验中表现为错觉的是()。
A. 看见面前的高楼变矮
B. 将草绳看成一条蛇
C. 感觉周围的事物变大
D. 听见汽车喇叭里有骂她的声
E. 感觉皮肤上有蚂蚁
[答案] B
[解析] 正确答案为B。错觉是对客观事物歪曲的知觉，将草绳看成蛇是典型错觉。A视物显小症是感知觉障碍；C视物显大症；D听见骂人是幻听；E感觉蚂蚁爬是幻触。本题考察错觉与幻觉的区别。

[题目] 60. 某冠心病患者想接受冠脉搭桥治疗,但又担心术中出现意外,属于(  )。
A. 双趋冲突
B. 双避冲突
C. 趋避冲突
D. 双重趋避冲突
E. 多重趋避冲突
[答案] C
[解析] 正确答案为C。趋避冲突指同一目标既有好的一面又有不好的一面。想接受治疗（趋）又担心意外（避）是典型的趋避冲突。A双趋两个都想要；B双避两个都想避；D双重趋避更复杂。本题考察趋避冲突。

[题目] 61. 情绪的组成部分有(  )。
A. 主观体验
B. 生理唤醒
C. 行为表现
D. 对情绪刺激的认知
E. 以上都是
[答案] E
[解析] 正确答案为E。情绪由三部分组成：主观体验、生理唤醒、外部行为表现，还包括对情绪刺激的认知。A、B、C、D都是情绪的组成部分。本题考察情绪的结构。

[题目] 62. 人类的认知过程不包括()。
A. 感觉
B. 知觉
C. 信念
D. 记忆
E. 思维
[答案] C
[解析] 正确答案为C。认知过程包括感觉、知觉、记忆、思维、注意等。信念属于人格倾向中价值观的部分，不属于认知过程。本题考察认知过程的内容。

[题目] 63. 一女子外出旅游,回家后向家人描述旅游时遇到的风景。这属于()。
A. 形象记忆
B. 运动记忆
C. 情绪记忆
D. 逻辑记忆
E. 短时记忆
[答案] A
[解析] 正确答案为A。形象记忆以感知过的事物形象为内容。女子描述旅游风景是回忆旅游时的视觉形象，属于形象记忆。B运动记忆是动作记忆；C情绪记忆是情绪体验；D逻辑记忆是语词逻辑；E短时记忆是时程分类。本题考察记忆分类。

[题目] 64. 不属于心理健康标准的是(   )。
A. 人格健全
B. 思想内容健康
C. 情绪乐观稳定
D. 行为和生活方式健康
E. 智力正常
[答案] B
[解析] 正确答案为B。心理健康标准通常包括人格健全、情绪乐观稳定、行为健康、智力正常等。"思想内容健康"属于思想品德范畴而非心理健康标准。本题考察心理健康标准。

[题目] 65. 患者对自然界中的声、光、温度敏感,表现了患者的心理异常是()。
A. 人格异常
B. 情绪异常
C. 记忆异常
D. 感知觉异常
E. 思维异常
[答案] D
[解析] 正确答案为D。对自然界声、光、温度敏感，属于感知觉异常（感觉过敏）。A人格异常涉及人格改变；B情绪异常是情绪问题；C记忆异常是记忆障碍；E思维异常是思维障碍。本题考察感知觉障碍。

[题目] 66. 一个人同时面临着两件令人讨厌的事物,产生同等的逃避动机,要回避其一就必然遭遇另一事物。此时产生的心理冲突称为(   )。
A. 双趋冲突
B. 双避冲突
C. 趋避冲突
D. 双重趋避冲突
E. 多重趋避冲突
[答案] B
[解析] 正确答案为B。双避冲突指两个都想避开的威胁情境，回避其一必遭遇另一。A双趋两个都想要；C趋避同一目标有好有坏；D双重趋避更复杂。本题考察双避冲突。

[题目] 67. 动机强度与解决问题的效率密切相关,解决问题效率最佳的动机强度是( )。
A. 最强
B. 极强
C. 适中
D. 较弱
E. 最弱
[答案] C
[解析] 正确答案为C。耶克斯-多德森定律：动机强度与解决问题的效率呈倒U型曲线关系，中等强度动机效率最佳。A最强、B极强、D较弱、E最弱均不能达到最佳效率。本题考察动机与效率关系。

[题目] 68. 思维过程主要体现在(   )。
A. 对事物的分析过程中
B. 对事物的综合过程中
C. 对事物的⽐较过程中
D. 对事物的概括过程中
E. 解决问题的活动中
[答案] E
[解析] 正确答案为E。思维过程主要体现在解决问题的活动中，通过分析与综合、比较与分类、抽象与概括等思维操作解决问题。A分析、B综合、C比较、D概括都是思维的具体操作。本题考察思维过程的体现。

[题目] 69. 心理学家曾做过这样的试验:在黑板上画一个圆圈,问在座学生这是什么其中大学生回答很一致:“这是一个圆。”而幼儿园的小朋友则给出了各种各样的答案:“太阳”“球”“镜子”可谓五花八门。这种思维方式是()。
A. 聚合思维
B. 形象思维
C. 发散思维
D. 抽象思维
E. 创造思维
[答案] C
[解析] 正确答案为C。发散思维指从已有信息出发沿不同方向思考，产生多种答案。小朋友们对圆圈给出多种答案是发散思维。A聚合思维指向唯一正确答案，大学生回答相同是聚合思维。本题考察发散思维与聚合思维的区分。

[题目] 70. 与动摇性.易受暗示性.随波逐流等相反的意志品质是()。
A. 自觉性
B. 果断性
C. 坚韧性
D. 自制性
E. 随意性
[答案] A
[解析] 正确答案为A。意志自觉性指对行动目的有明确认识并主动采取行动，与之相反的是动摇性、易受暗示性、随波逐流。B果断性相反是优柔寡断；C坚韧性相反是虎头蛇尾；D自制性相反是冲动。本题考察意志的自觉性。

[题目] 71. 前有狼,后有虎”的动机冲突属于( )。
A. 双趋冲突
B. 双避冲突
C. 趋避冲突
D. 双重趋避冲突
E. 双趋双避冲突
[答案] B
[解析] 正确答案为B。双避冲突指两个都想避开的威胁同时存在。"前有狼后有虎"是典型的双避冲突。A双趋两个都想要；C趋避同一目标有好有坏；D双重趋避更复杂。本题考察双避冲突。

[题目] 72. 一位运动员即将参加一场重要的比赛,下列是正确的调整他的情绪状态的是()。
A. 要比平常训练更加紧张、兴奋
B. 彻底放松,就像没有比赛一样
C. 努力保持持续兴奋状态
D. 根据自己的情况,适当提高兴奋性
E. 和平常一样
[答案] D
[解析] 正确答案为D。根据耶克斯-多德森定律，运动员应根据比赛难度和自身情况适当提高兴奋性，保持适度紧张。A过于紧张不利；B彻底放松不利发挥；C持续兴奋过度消耗；E和平常一样可能缺乏最佳状态。本题考察情绪调节与绩效关系。

[题目] 73. 马斯洛需要层次论中的最低层次需要是(   )。
A. 生理需要
B. 安全需要
C. 尊重需要
D. 爱与归属需要
E. 自我实现需要
[答案] A
[解析] 正确答案为A。马斯洛需要层次理论中最低层次是生理需要（食物、水、睡眠等），是维持生存最基本的需要。B安全、C尊重、D爱与归属、E自我实现都是更高层次的需要。本题考察需要层次。

[题目] 74. 个体把识记过的对象以一定的形式储存在头脑中的过程,是记忆过程中的(  )环节。
A. 识记
B. 遗忘
C. 提取
D. 保持
E. 回忆
[答案] D
[解析] 正确答案为D。保持是把识记过的对象以一定形式储存在头脑中的过程，是记忆的三个基本环节（识记、保持、回忆/再认）之一。A识记是识别记住；B遗忘是记忆丧失；C提取是回忆；E回忆是提取过程。本题考察记忆过程。

[题目] 75. 下列哪项为顺利完成各种活动所必备的基本能力(   )。
A. 想象能力
B. 语言能力
C. 辨别能力
D. 特殊能力
E. 一般能力
[答案] E
[解析] 正确答案为E。一般能力是顺利完成各种活动所必备的基本能力，如观察力、记忆力、思维力等。A想象、B语言、C辨别都属于一般能力范畴，D特殊能力是完成专业活动所需的。本题考察一般能力。

[题目] 76. 小强是个初中学生,从小喜欢田径运动,经测验小强属于比较典型的粘液质,从气质特征的角度看,小强比较容易成功的项目是(   )。
A. 长跑
B. 跳高
C. 跨栏
D. 跳远
E. 短跑
[答案] A
[解析] 正确答案为A。黏液质特点：安静稳重、持久有耐心。长跑需要耐力和持久性，最适合黏液质。B跳高、C跨栏、D跳远、E短跑需爆发力和灵活，更适合多血质或胆汁质。本题考察气质类型与运动匹配。

[题目] 77. 关于青少年情绪.情感的特点,以下说法不正确的是()。
A. 情绪敏感
B. 情绪反应强烈
C. 情绪心境化
D. 情感丰富
E. 情绪稳定
[答案] E
[解析] 正确答案为E。青少年情绪情感特点：情绪敏感、反应强烈、心境化、情感丰富但不稳定。E"情绪稳定"不符合青少年情绪特点，青少年情绪波动大不稳定。本题考察青少年情绪特点。

[题目] 78. 关于性格的说法不正确的是()。
A. 是人格的核心
B. 主要由遗传决定
C. 受人的意识倾向性制约
D. 反映一个人的生活经历
E. 有肯定和否定的性质
[答案] B
[解析] 正确答案为B。性格是人格的核心，受后天环境和社会实践影响较大，并非主要由遗传决定。遗传对气质的影响更大。A正确；C正确；D正确；E正确。本题考察性格的概念和决定因素。

[题目] 79. 根据沙赫特有关情绪研究的观点,对个体情绪的性质和程度起决定性作用的是()。
A. 心理应对方式
B. 认知的方式
C. 人格的特点
D. 社会支持程度
E. 智力的水平
[答案] B
[解析] 正确答案为B。沙赫特的情绪认知理论强调认知在情绪产生中的决定作用，对情绪的性质和程度起决定性作用的是认知方式。A应对方式、C人格特点、D社会支持、E智力水平都不是决定因素。本题考察情绪认知理论。

[题目] 80. 心理健康的标准不包括()。
A. 人际和谐
B. 人格完整
C. 社会适应
D. 信仰坚定
E. 情绪良好
[答案] D
[解析] 正确答案为D。心理健康的标准包括人际和谐、人格完整、社会适应、情绪良好等。"信仰坚定"属于价值观范畴，不是心理健康的标准。本题考察心理健康标准。

[题目] 81. 反映直接作用在感觉器官的客观事物个别属性的心理现象是(  )。
A. 感觉
B. 情绪
C. 记忆
D. 思维
E. 知觉
[答案] A
[解析] 正确答案为A。感觉是对直接作用于感觉器官的客观事物的个别属性的反映。B情绪是态度体验；C记忆是经验保持；D思维是间接概括反映；E知觉是对事物整体属性的反映。本题考察感觉的定义。

[题目] 82. 人们以积极有效的心理活动.平稳正常的心理状态对当前和发展着的自然与社会环境保持良好的适应。该表述的定义是指(  )。
A. 心理健康
B. 心身和谐
C. 健康促进
D. 心理适应
E. 健康人格
[答案] A
[解析] 正确答案为A。该表述是心理健康的定义：以积极有效的心理活动、平稳正常的心理状态保持良好适应。B心身和谐、C健康促进、D心理适应、E健康人格均不完整。本题考察心理健康的定义。

[题目] 83. “需要层次理论”,人际交流的需要应属于(   )。
A. 尊重的需要
B. 生理的需要
C. 自我实现的需要
D. 爱与被爱的需要
E. 安全的需要
[答案] D
[解析] 正确答案为D。马斯洛需要层次中，人际交流的需要属于爱与被爱的需要（归属与爱的需要）。A尊重需要是自尊他尊；B生理需要最基本；C自我实现最高；E安全需要安全感。本题考察需要层次的内容。

[题目] 84. 动作迅速,情绪易于冲动,自我控制能力较差心境变化大,活动中缺乏耐心,可塑差。这是( )气质类型的典型特点。
A. 多血质
B. 胆汁质
C. 黏液质
D. 抑郁质
E. 活泼质
[答案] B
[解析] 正确答案为B。胆汁质特点：动作迅速、情绪易冲动、自我控制差、心境变化大、缺乏耐心、可塑性差。A多血质活泼灵活；C黏液质安静稳重；D抑郁质敏感多虑。本题考察胆汁质特点。

[题目] 85. “先吃糖,再吃西瓜,就吃不出西瓜的甜味来”,这⼀现象属于(   )。
A. 感觉适应
B. 感觉对比
C. 感觉后象
D. 感觉融合
E. 感觉补偿
[答案] B
[解析] 正确答案为B。感觉对比指同一感受器接受不同刺激后感受性发生变化。先吃糖再吃西瓜感觉不甜是先后对比。A感觉适应是刺激持续作用；C后像刺激消失后感觉仍存；D融合多种感觉结合；E补偿代偿。本题考察感觉对比。

[题目] 86. 关于遗忘的规律,以下错误的是(   )。
A. 无意义的材料容易遗忘
B. 抽象的材料容易遗忘
C. 过度学习达150%容易遗忘
D. 集中学习容易遗忘
E. 较长的材料中间遗忘多
[答案] C
[解析] 正确答案为C。过度学习达150%时记忆效果最佳，不容易遗忘。A无意义材料容易遗忘正确；B抽象材料易遗忘正确；D集中学习易遗忘正确；E较长材料中间遗忘多正确。本题考察遗忘规律。

[题目] 87. 下列说法错误的是(   )。
A. 心理是脑的功能
B. 脑是心理的器官
C. 心理是对事物的主观反应
D. 客观现实是心理的源泉
E. 心理能客观地反映事物
[答案] E
[解析] 正确答案为E。心理是对事物的主观反映而非客观反映，因为心理具有主观能动性。A心理是脑的功能正确；B脑是心理的器官正确；C主观反映正确；D客观现实是源泉正确。本题考察心理实质。

[题目] 88. 马斯洛把完善自己,充分发挥自己的潜能,完成自身使命的需要称为(   )。
A. 尊重需要
B. 完善自我需要
C. 潜能发挥需要
D. 自我实现需要
E. 个人成长需要
[答案] D
[解析] 正确答案为D。马斯洛认为自我实现需要是最高层次的需要，即完善自己、充分发挥潜能、完成自身使命的需要。A尊重需要、B完善自我需要非正式名称、C潜能发挥需要非正式、E个人成长需要非正式。本题考察自我实现需要。

[题目] 89. 影响个性形成的因素包括(   )。
A. 生物因素
B. 环境因素
C. 个人因素
D. A+B
E. A+B+C
[答案] E
[解析] 正确答案为E。影响个性形成的因素包括生物因素（遗传、生理）、环境因素（家庭、学校、社会）和个人因素（主观能动性）。A、B、C均不全面，D也不全面。本题考察个性形成的影响因素。

[题目] 90. 男,22岁,大学生。平常乐于助人.尊师爱友。不仅在学习上经常帮助同学,而且在生活上也常常照顾他人,并能积极组织班级的集体活动。这种行为方式在性格的特征中属于(  )。
A. 行为特征
B. 意志特征
C. 态度特征
D. 情绪特征
E. 理智特征
[答案] C
[解析] 正确答案为C。态度特征指人对现实的态度方面的特征，乐于助人、尊师爱友、照顾他人、组织活动体现了对他人和集体的态度。A行为特征太笼统；B意志特征涉及自觉性等；D情绪特征涉及稳定性；E理智特征涉及认知风格。本题考察性格的态度特征。

[题目] 91. “人际和谐”的特点一般不包括()。
A. 乐于助人
B. 乐于交往
C. 宽以待人
D. 自我完善
E. 不卑不亢
[答案] D
[解析] 正确答案为D。人际和谐的特点包括乐于助人、乐于交往、宽以待人、不卑不亢等。"自我完善"属于个人成长范畴，不是人际和谐的特点。本题考察人际和谐的含义。

[题目] 92. 某一参加抗洪的战士,父亲打电话说母亲病重,他说自古忠孝两难全。此时这个战士的心理是()。
A. 双避冲突
B. 双趋冲突
C. 趋避冲突
D. 多重趋避冲突
E. 双趋双避冲突
[答案] B
[解析] 正确答案为B。双趋冲突指两个都想做的目标只能选其一。战士既想忠（抗洪）又想孝（回家），但只能选一个，是典型的双趋冲突。A双避两个都想避；C趋避有好有坏；D多重趋避多个目标。本题考察双趋冲突。

[题目] 93. 思维的最大特征是(   )。
A. 逻辑性和层次性
B. 抽象性和综合性
C. 概括性和间接性
D. 比较性和判断性
E. 分析性和证明性
[答案] C
[解析] 正确答案为C。思维的最大特征是概括性和间接性。概括性反映一类事物共同本质，间接性借助媒介认识事物。A逻辑性和层次性不是最大特征；B抽象性和综合性不准确；D、E也不是最大特征。本题考察思维的特征。

[题目] 94. 下列不属于感知觉障碍综合症的是( )。
A. 感觉桌子在10米的距离离自己很近,放杯子时掉在地上
B. 看到自己母亲的眼睛有时很大,有时又变小了
C. 听到汽车的声音就听到自己被骂
D. 感觉自己的手一会变细,一会变大
E. 感觉周围的房屋会大,一会又变小
[答案] C
[解析] 正确答案为C。听到汽车声就听到自己被骂属于幻听（听幻觉），是幻觉而非感知觉综合障碍。A、B、D、E都属于感知觉综合障碍（视物显大/小、自身感知综合障碍等）。本题考察感知觉综合障碍与幻觉的区别。

[题目] 95. 人脑不仅反映当前所看到.听到的事物,还能反映过去经历过的事物和想象出来从未见到过的事物,这说明人脑对现实的反映具有什么特点(   )。
A. 系统整体性
B. 客观真实性
C. 抽象概括性
D. 间接创造性
E. 主观能动性
[答案] E
[解析] 正确答案为E。人脑不仅能反映当前事物，还能反映过去和想象从未见过的事物，体现了心理的主观能动性。A系统整体性、B客观真实性、C抽象概括性、D间接创造性均不能全面概括。本题考察心理的主观能动性。

[题目] 96. 关于记忆的理解,不正确的是(  )。
A. 是一种很重要的心理过程,贯穿在人的各种心理活动之中
B. 包括识记.保持.再认和回忆三个基本环节
C. 保持过程体现了人脑对识记材料的主动加⼯
D. 对识记的事物不能再认或回忆,只有通过重新学习才能再认或回忆的现
E. 直观的.形象的.有意义的材料⽐抽象的.枯燥的材料识记效果好
[答案] D
[解析] 正确答案为D。对识记的事物不能再认或回忆，但通过重新学习再认或回忆的现象叫再认或回忆，并非只有重新学习才能再认或回忆。A、B、C、E均是对记忆的正确理解。本题考察记忆的概念。

[题目] 97. 人的心理实质是(   )。
A. 心脏的功能
B. 思维的结果
C. 脑的机能
D. 个性的反映
E. 对事物整体属性的反映
[答案] C
[解析] 正确答案为C。心理的实质是脑的机能（功能），脑是心理的器官。A心脏的功能是错误观点；B思维的结果不全面；D个性的反映不准确；E对事物整体属性的反映是知觉。本题考察心理实质。

[题目] 98. 人的感觉适应是指由于刺激物的持续作用而使感受性(   )。
A. 提高
B. 降低
C. 不变
D. 改变
E. 丧失
[答案] D
[解析] 正确答案为D。感觉适应指刺激持续作用使感受性发生改变（提高或降低）。A提高（如暗适应）或B降低（如明适应）仅是其中之一，C不变和E丧失均不正确。本题考察感觉适应的定义。

[题目] 99. 培养自制力的关键期(   )。
A. 0~1岁
B. 1~3岁
C. 2~3岁
D. 3~7岁
E. 7岁以前
[答案] C
[解析] 正确答案为C。培养自制力的关键期是2~3岁，这一阶段儿童开始发展自我控制能力。A0~1岁、B1~3岁范围太大、D3~7岁、E7岁以前均不如2~3岁更精确。本题考察心理发展的关键期。

[题目] 100. 患者知觉体验中表现为错觉的是()。
A. 看见面前的高楼变矮
B. 将输液管看成一条蛇
C. 感觉周围的事物变大
D. 听见汽车喇叭里有骂她的声
E. 感觉皮肤上有蚂蚁
[答案] B
[解析] 正确答案为B。错觉是对客观事物歪曲的知觉，将输液管看成蛇是错觉。A看见高楼变矮是视物显小症；C感觉事物变大是视物显大症；D听见骂人是幻听；E感觉蚂蚁爬是幻触。本题考察错觉与幻觉的区别。

[题目] 101. 积极的心态像太阳,照到哪里哪里亮,消极的心态像月亮,初一十五不一样。这种情绪状态是()。
A. 心境
B. 激情
C. 情感
D. 应激
E. 情操
[答案] A
[解析] 正确答案为A。心境是微弱持久弥漫性的情绪状态，"积极的心态像太阳"和"消极的心态像月亮"形容心境的持久性和弥散性。B激情强烈短暂；C情感社会性；D应激突发紧张；E情操社会情感。本题考察心境。

[题目] 102. 人格的核心是(   )。
A. 能力
B. 性格
C. 智力
D. 气质
E. 理想
[答案] B
[解析] 正确答案为B。性格是人格的核心，体现了一个人对现实的稳定态度和习惯化的行为方式。A能力是直接影响效率；C智力是一般能力；D气质是动力特征；E理想是人格倾向之一。本题考察人格结构。

[题目] 103. 男,35岁。已婚。因尿道口有脓性分泌物到医院就诊,被诊断为淋病。如果患者拒绝将病情如实告知其妻子,医师所面对的境况属于()。
A. 多重趋避冲突
B. 趋避冲突
C. 双趋冲突
D. 双重趋避冲突
E. 双避冲突
[答案] B
[解析] 正确答案为B。趋避冲突指同一目标既有趋近的一面又有回避的一面。医生既想告知患者妻子（履行义务→趋），又担心患者拒绝（后果→避）是趋避冲突。A多重趋避多个目标；C双趋两个都想要；D双重趋避；E双避。本题考察趋避冲突在医学情境中的应用。

[题目] 104. 个体在试图逃避某种威胁情境时,在明确预知某种危险即将发生而又无法应对时,会产生的基本情绪是( )。
A. 悲哀
B. 苦闷
C. 恐惧
D. 焦虑
E. 愤怒
[答案] C
[解析] 正确答案为C。恐惧是预知危险即将发生又无法应对时产生的基本情绪，是面对威胁时的原始情绪反应。A悲哀是丧失引起；B苦闷是复合情绪；D焦虑是担忧不安；E愤怒是遭受阻碍。本题考察恐惧情绪。

[题目] 105. 心理过程不包括(   )。
A. 认知过程
B. 情绪过程
C. 意志过程
D. 个性特征
E. 思维过程
[答案] D
[解析] 正确答案为D。心理过程包括认知过程（认识过程）、情绪情感过程和意志过程三个方面。个性特征（人格特征）属于人格范畴，不属于心理过程。本题考察心理过程的构成。

[题目] 106. 男,22岁,大学生。平常乐于助人尊师爱校。不仅在学习上经常帮助同学,而目在生活上也常常照顾他人,并能积极组织班级的集体活动。这种行为方式在性格的特征中属( )。
A. 行为特征
B. 意志特征
C. 态度特征
D. 情绪特征
E. 理智特征
[答案] C
[解析] 正确答案为C。态度特征指人对现实的态度方面的特征，乐于助人、尊师爱校、照顾他人、组织活动体现了积极的社会态度。A行为特征太宽泛；B意志特征涉及是否果断等；D情绪特征涉及稳定性；E理智特征涉及认知风格。本题考察性格的态度特征。

[题目] 107. 个性不包括(   )。
A. 性格
B. 气质
C. 能力
D. 情感
E. 价值观
[答案] D
[解析] 正确答案为D。个性（人格）包括性格、气质、能力、价值观等。情感属于心理过程（情绪情感过程），不属于人格范畴。本题考察个性的结构。

[题目] 108. 记忆.思维.想象是属于一个人的()。
A. 认知过程
B. 人格特征
C. 情绪过程
D. 人格倾向
E. 意志过程
[答案] A
[解析] 正确答案为A。记忆、思维、想象都属于认知过程（认识过程）。B人格特征包括气质性格；C情绪过程是情绪情感；D人格倾向包括需要动机；E意志过程是意志。本题考察认知过程的内容。

[题目] 109. 下列不属于感知觉障碍综合症的是()。
A. 感觉桌子在10米的距离离自己很近,放杯子时掉在地上
B. 看到自己母亲的眼睛有时很大,有时又变小了
C. 听到汽车的声音就听到自己被骂
D. 感觉自己的手一会变细,一会变大
E. 感觉周围的房屋一会变大,一会又变小
[答案] C
[解析] 正确答案为C。听到汽车声听到自己被骂是幻听（听幻觉），属于幻觉而非感知觉综合障碍。A、B、D、E都属于感知觉综合障碍。本题考察感知觉综合障碍与幻觉的区分。

[题目] 110. 心理过程包括(   )。
A. 认识过程、情感过程、意志过程
B. 感觉、知觉、记忆
C. 人格倾向性、人格特征、自我意识系统
D. 自我认识、自我体验、自我调控
E. 能力、气质、性格
[答案] A
[解析] 正确答案为A。心理过程包括认识过程（感觉知觉记忆思维等）、情感过程（情绪情感）和意志过程。B是认知过程的部分；C是人格结构；D是自我意识；E是人格特征。本题考察心理过程的内容。

[题目] 111. 与虎头蛇尾.见异思迁.急躁.执拗等相反的意志品质是()。
A. 自觉性
B. 果断性
C. 坚韧性
D. 自制性
E. 随意性
[答案] C
[解析] 正确答案为C。意志的坚韧性指坚持决定、克服困难的品质，与之相反的是虎头蛇尾、见异思迁、急躁、执拗。A自觉性相反是盲目；B果断性相反是优柔寡断；D自制性相反是冲动。本题考察意志的坚韧性。

[题目] 112. 人的社会性需要不包括( )。
A. 劳动
B. 求知
C. 睡眠
D. 交往
E. 尊重
[答案] C
[解析] 正确答案为C。社会性需要包括劳动、求知、交往、尊重等。睡眠属于生理性需要（维持生存的基本需要）。本题考察社会性需要与生理性需要的区分。

[题目] 113. 无论对错都盲目地拒绝他人的意见和劝告,坚持自己的决定,是因为其意志活动缺乏(  )。
A. 自觉性
B. 果断性
C. 坚韧性
D. 自制性
E. 整体性
[答案] A
[解析] 正确答案为A。意志自觉性指对行动目的有明确认识。无论对错盲目拒绝他人意见、固执己见是缺乏自觉性的表现（独断性）。B果断性相反是优柔寡断；C坚韧性相反是动摇；D自制性相反是冲动。本题考察意志品质。

[题目] 114. 许多心理特征之间相互影响相互制约,使人的内心世界.个体动机和外显行为之间保持和谐一致,这说明人格具有( )。
A. 独特性
B. 社会性
C. 稳定性
D. 整体性
E. 生物性
[答案] D
[解析] 正确答案为D。人格整体性指各种心理特征相互影响相互制约，保持内心世界动机和行为之间的和谐一致。A独特性指每个人不同；B社会性指社会影响；C稳定性指持久不变。本题考察人格的整体性。

[题目] 115. 关于性格的说法不正确的是(  )。
A. 是人格的核心
B. 主要由遗传决定
C. 受人的意识倾向性制约
D. 反映一个人的生活经历
E. 有肯定和否定的性质
[答案] B
[解析] 正确答案为B。性格是人格的核心，主要受后天环境和社会实践影响，而非主要由遗传决定。遗传对气质影响更大。A正确；C正确；D正确；E正确。本题考察性格的概念。

[题目] 116. 汽车正在行驶中,一名儿童突然冲向马路对面,司机急刹车,汽车在发出刺耳的刹车声后停住,儿童在车前的半米处跑过。这时司机顿感心跳加快,头上冒汗,手脚无力,这种情绪状态是()。
A. 心境
B. 激情
C. 情感
D. 应激
E. 情操
[答案] D
[解析] 正确答案为D。应激是出乎意料的紧急情况引起的急速高度紧张的情绪状态。司机突遇儿童冲上马路产生心跳加快冒汗等反应是应激。A心境弥漫持久；B激情强烈短暂；C情感社会性；E情操社会情感。本题考察应激。

[题目] 117. 关于遗忘的规律,以下错误的是( )。
A. 无意义的材料容易遗忘
B. 抽象的材料容易遗忘
C. 过度学习达150%容易遗忘
D. 集中学习容易遗忘
E. 较长的材料中间遗忘多
[答案] C
[解析] 正确答案为C。过度学习达150%时记忆效果最佳，不易遗忘，故C错误。A无意义材料容易遗忘正确；B抽象材料易遗忘正确；D集中学习易遗忘正确；E较长材料中间遗忘多正确。本题考察遗忘规律。

[题目] 118. 不属于心理健康的典型表现是()。
A. 智力正常
B. 健康行为
C. 情绪乐观
D. 意识清晰
E. 人格健全
[答案] D
[解析] 正确答案为D。心理健康的典型表现包括智力正常、健康行为、情绪乐观、人格健全等。意识清晰是意识状态基本要求，不专属心理健康范畴。本题考察心理健康表现。

[题目] 119. 下列关于意志说法错误的是()。
A. 随意运动是意志行动的基础
B. 克服困难是意志行动的核心
C. 目的是意志行动的前提
D. 意志是绝对自由的
E. 意志是自觉地确定目的
[答案] D
[解析] 正确答案为D。意志不是绝对自由的，受到客观规律和现实条件的制约。A随意运动是意志行动的基础正确；B克服困难是核心正确；C目的是前提正确；E自觉确定目的正确。本题考察意志的概念。

[题目] 120. 个体在试图逃避某种威胁情境,或在明确预知某种危险即将发生而又无法应对时,会产生的基本情绪是()。
A. 悲哀
B. 苦闷
C. 恐惧
D. 焦虑
E. 愤怒
[答案] C
[解析] 正确答案为C。恐惧是预知危险即将发生又无法应对时产生的基本情绪，是面对威胁时的原始情绪反应。A悲哀是丧失；B苦闷是复合；D焦虑是担忧；E愤怒是遭受阻碍。本题考察恐惧情绪。

[题目] 121. 健康是指(   )。
A. 身体处于良好状态
B. 身体和道德品质处于良好状态
C. 身体和心理处于良好状态
D. 身体.心理和社会适应处于良好状态
E. 身体.心理.社会适应和道德品质处于良好状态
[答案] E
[解析] 正确答案为E。WHO定义健康：身体、心理、社会适应和道德品质均处于良好状态。A仅身体；B身体+道德；C身体+心理；D身体+心理+社会适应，均不全面。本题考察健康的概念。

[题目] 122. 在生物实验中,生物学家要从各种已知的材料.数据和信息中总结出科学结论;企业改革要合理化,要从众多方案中选出最佳方案;警察在破案时,必须从各种迹象和嫌疑人等中找出作案人和犯罪事实。这种思维方式是( )。
A. 聚合思维
B. 形象思维
C. 发散思维
D. 抽象思维
E. 创造思维
[答案] A
[解析] 正确答案为A。聚合思维（辐合思维）指向唯一正确的答案，从众多信息中找出最佳方案。生物学总结结论、企业选最优方案、警察破案均使用聚合思维。B形象思维表象性；C发散思维求异；D抽象思维概念性。本题考察聚合思维。

[题目] 123. 不属于马斯洛需要层次理论的内容是(   )。
A. 生理的需要
B. 安全的需要
C. 尊重的需要
D. 精神的需要
E. 自我实现的需要
[答案] D
[解析] 正确答案为D。马斯洛需要层次理论包括：生理需要、安全需要、爱与归属需要、尊重需要、自我实现需要。"精神需要"不是马斯洛理论中的正式分类。本题考察需要层次内容。

[题目] 124. 个体为维持自己生存和种族延续适应不断变化的复杂环境所做出的各种反应,称为(   )。
A. 应激
B. 学习
C. 行为
D. 动机
E. 需要
[答案] C
[解析] 正确答案为C。行为是个体为维持生存和种族延续、适应复杂环境所做出的各种反应。A应激是情绪状态；B学习是获取经验；D动机是推动力；E是需要是缺乏状态。本题考察行为的概念。

[题目] 125. 下列说法错误的是()。
A. 心理是脑的功能
B. 脑是心理的器官
C. 心理是对事物的主观反映
D. 客观现实是心理的源泉
E. 心理能客观地反映事物
[答案] E
[解析] 正确答案为E。心理是对事物的主观反映而非客观反映，具有主观能动性。A心理是脑的功能正确；B脑是心理器官正确；C主观反映正确；D客观现实是源泉正确。本题考察心理的实质。

[题目] 126. 动作迅速,情绪易于冲动,自我控制能力较差心境变化大。活动中缺乏耐心,可塑差。这是(  )气质类型的典型特点。
A. 多血质
B. 胆汁质
C. 黏液质
D. 抑郁质
E. 活泼质
[答案] B
[解析] 正确答案为B。胆汁质特点：动作迅速、情绪易于冲动、自我控制能力差、心境变化大、缺乏耐心、可塑性差。A多血质活泼灵活；C黏液质安静稳重；D抑郁质敏感多虑。本题考察气质类型特点。

[题目] 127. 彩色的视觉后像是(   )。
A. 与原像明暗相同
B. 比原像光度暗淡
C. 原像颜色的补色
D. 与原像颜色相同
E. 比原像更明亮些
[答案] C
[解析] 正确答案为C。彩色的视觉后像是原像颜色的补色，如看红色后看白色会呈现绿色。A明暗相同错误；B更暗淡不准确；D相同颜色错误；E更明亮错误。本题考察视觉后像的规律。

[题目] 128. 情绪的特点不包括(   )。
