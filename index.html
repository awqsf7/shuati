D. 肩胛骨下角
E. 肩胛冈
[答案] D
[解析] 肩胛骨下角平对第7肋或第7肋间隙，是临床计数肋骨和肋间隙的重要骨性标志。A、B、C、E均不用于计数肋骨：肩胛骨上角平对第2肋，肩峰和喙突不用于计数，肩胛冈平对第3胸椎。
[题目] 368. 男,67岁,吸烟40余年,每日20余支。咳嗽,气喘,黏痰间有脓性痰,疑为肺癌。X线胸片检查示有肺门块影伴右肺上叶阻塞性炎症。为了明确诊断, 拟行纤维支气管镜检查及病理活检,试问纤维支气管镜检的定位标志是 ()
A. 气管杈
B. 气管平滑肌
C. 气管膜壁
D. 气管隆嵴
E. 气管软骨环
[答案] D
[解析] 气管隆嵴是气管杈内面呈矢状位的半月形隆起，为纤维支气管镜检查的重要定位标志，借此可辨认左、右主支气管开口。A为气管分叉处但非内镜直视下的定位标志，B、C、E均非定位标志。
[题目] 369. 男孩,6岁,一边笑一边吃蚕豆,突感胸闷,气促。X线检查示右主支气管内一椭圆形阴影,诊断为“右主支气管内异物”,试问:气管内异物坠入右主支气管的原因错误的是()
A. 右主支气管与气管中线延长线的夹角比左主支气管形成的夹角小
B. 右主支气管的气管软骨呈环形
C. 右主支气管粗短
D. 右主支气管走向陡直
E. 右主支气管是由气管分出的一级支气管
[答案] B
[解析] 右主支气管的软骨结构并非完整的环形（与气管一样呈C形，后方为膜壁）。A、C、D、E均正确解释了异物易坠入右侧的原因：夹角小、粗短、走向陡直，且右主支气管为一级支气管。
[题目] 370. 男,38岁,因车祸挤压右侧胸背部,急诊入院。X线检查:右侧第6肋骨折断端刺入胸腔,右肺上叶明显塌陷,显示气胸征,右肋膈隐窝变钝,诊断为高压性气胸、血胸。拟以粗针头插入胸膜腔,进行排气、抽液处理,有关说法错误的是()
A. 进针依次穿过皮肤、浅筋膜、肌层、胸内筋膜、肋胸膜到达胸膜腔
B. 抽液应在右腋中线与腋后线之间的第8或第9肋的上缘进针
C. 抽液应在右锁骨中线第2肋间隙进针
D. 抽液应在右腋中线与右腋后线之间的第7或第8肋间隙的下缘进针
E. 排气应在右锁骨中线第2肋间隙进针
[答案] C
[解析] 锁骨中线第2肋间隙进针是排气部位（气胸），而非抽液部位；抽液应在腋中线与腋后线之间第7~9肋间沿肋骨上缘进针，因积液沉于胸膜腔低处。该患者同时有气胸和血胸，抽液应在低位进行。
[题目] 371. 乳癌转移最早而常见的淋巴结是()
A. 腋窝淋巴结
B. 胸骨旁淋巴结
C. 对侧腋窝淋巴结
D. 锁骨上淋巴结
E. 锁骨下淋巴结
[答案] A
[解析] 约75%的乳腺淋巴回流至腋窝淋巴结，乳腺癌淋巴转移最常见和最早累及的就是腋窝淋巴结。B为内侧部淋巴引流，C为晚期表现，D和E为远处转移。
[题目] 372. 开放性气胸的患者,常引起纵隔摆动,严重影响肺的正常呼吸功能,其原因是()
A. 两侧胸膜腔不相通
B. 外伤使双侧胸膜腔不等压
C. 两侧胸膜腔相通
D. 损伤纵隔
E. 外伤破坏双侧胸膜腔负压
[答案] B
[解析] 开放性气胸使伤侧胸膜腔与大气相通，双侧压力不等，呼吸时因压力差引起纵隔摆动，严重影响心肺功能。A描述的是正常解剖，C与事实相反，D和E不是直接原因——外伤破坏负压导致压差才是根本。
[题目] 373. 某心跳突然停止的患者,医生决定在胸骨左缘第4肋间隙做心内注射以抢救患者,是因为此处无()
A. 血管
B. 肋间肌
C. 神经
D. 心包
E. 胸膜
[答案] E
[解析] 胸骨左缘第4肋间隙处为心包裸区，此处壁胸膜反折，无胸膜覆盖，故心内注射可经此直接入心包而不经过胸膜腔。此处仍有皮肤、浅筋膜、肋间肌和心包等结构。
[题目] 374. 一产妇在产后25天,自觉乳房疼痛,全身发热,经医生检查发现:患处有硬块且有压痛,体温38.9℃, 初步诊断为急性化脓性乳房炎且有脓肿(靠近乳头)形成。医生决定实施切开排脓,拟做放射状切口引流,其原因是()
A. 以免损伤血管、神经
B. 以免损伤Cooper韧带
C. 便于脓液引流
D. 以免损伤输乳管
E. 以免损伤乳腺
[答案] D
[解析] 输乳管以乳头为中心呈放射状排列，故乳腺脓肿切开引流需做放射状切口，以避免切断输乳管。A、B非主要原因，C（便于引流）非放射状切口的特异性原因，E过于笼统。
[题目] 375. 女性,50岁,右侧乳房增大,检查发现:乳房外侧有一肿块,较坚硬且边界不太清楚,活动度小但无明显疼痛,怀疑为乳腺癌,需取淋巴结做病理学检查,应当取的淋巴结是()
A. 腋动、静脉远侧段的腋外侧淋巴结
B. 锁骨下动脉附近的锁骨上淋巴结
C. 胸骨旁淋巴结
D. 肩胛下动、静脉周围的肩胛下淋巴结
E. 胸外侧动、静脉周围的胸肌淋巴结
[答案] E
[解析] 乳房外侧部的淋巴首先引流至胸肌淋巴结（前群腋窝淋巴结，沿胸外侧动静脉排列），是乳腺癌外侧象限转移的第一站淋巴结。A为腋外侧淋巴结非第一站，B和C引流乳房内侧部，D引流肩胛区。
[题目] 376. 女性,41岁,6月前发现右乳房内有一肿物,入院检查,诊断为乳腺癌,实行右侧乳房切除术,术后数月 后发现右侧肩胛骨内侧缘向后突起,并且右臂向前推送能力下降。其原因可能是手术时损伤了()
A. 胸长神经
B. 胸背神经
C. 肌皮神经
D. 肩胛上神经
E. 腋神经
[答案] A
[解析] 胸长神经支配前锯肌，损伤后前锯肌瘫痪，表现为翼状肩（肩胛骨内侧缘向后突起）及上臂前推能力减弱。B支配背阔肌，C支配屈肘肌和前臂肌，D支配冈上、下肌，E支配三角肌和小圆肌。
[题目] 377. 女,56岁,半年前发现左侧乳房内肿块,乳头分泌“乳汁”,入院诊断为“乳腺癌”。实行左侧乳房根治手术。术后数月发现左侧腋窝不能夹持物品,左肩关节后伸减弱,左上肢不能向上攀登。其原因可能是手术时损伤了()
A. 肩胛背神经
B. 胸长神经
C. 胸背神经
D. 腋神经
E. 肌皮神经
[答案] C
[解析] 胸背神经支配背阔肌，损伤后背阔肌瘫痪，导致肩关节后伸、内收和内旋无力，表现为腋窝不能夹持物品、不能向上攀登等。A支配菱形肌，B支配前锯肌（翼状肩），D支配三角肌，E支配屈肘肌。
[题目] 378. 乳腺癌根治术时,要保护好腋静脉,是因为()
A. 损伤后易发生上肢淋巴回流受阻
B. 损伤后上肢静脉回流会严重受阻
C. 损伤后无法修补
D. 损伤后促进了癌细胞的血行转移
E. 损伤后促进了癌细胞的淋巴转移
[答案] B
[解析] 腋静脉是上肢静脉回流的主要通道，损伤后上肢静脉回流严重受阻，可导致上肢严重水肿。A错误（腋窝淋巴结可切除，淋巴回流可由其他路径代偿），C、D、E均非保护腋静脉的主要原因。
[题目] 379. 患者,男性,58岁。因呼吸困难1周,颈部变粗1个月入院。患者自诉一个月前发现颈部变粗,3周前出现鼻塞和声⾳嘶哑。检查发现患者双侧颈静脉扩张,面部肿胀发红。经进一步检查诊断为右上叶支⽓管中央型肺癌。 此患者目前明显受累的结构中哪个除外()
A. 上腔静脉
B. 颈交感干
C. 气管
D. 右膈神经
E. 右喉返神经
[答案] D
[解析] 患者有双侧颈静脉扩张和面部肿胀（上腔静脉综合征）、声音嘶哑（喉返神经受累）、鼻塞（颈交感干Horner综合征表现），表明上腔静脉、颈交感干、气管和右喉返神经均已受累。右膈神经在此病例中未受累，故除外。
[题目] 380. 患者,男性,55岁。因主动脉瓣关闭不全需实施换瓣手术。术中为完成心脏与人工心肺机(体外循环)的连接,外科医生需暴露心包斜窦,在此窦内可直接触摸到的结构不包括()
A. 上腔静脉
B. 左心房后壁
C. 右下肺静脉
D. 下腔静脉
E. 右心房
[答案] A
[解析] 心包斜窦位于左心房后壁与心包后壁之间，在此窦内可触摸到左心房后壁、右下肺静脉、下腔静脉和右心房，而上腔静脉位于心包上部（心包横窦后方），不在心包斜窦范围内。
[题目] 381. 患者,男性,29岁。交通事故受伤后出现严重呼吸困难急诊入院。X线检查未见骨折和纵隔改变。体格检查也未发现体表外伤体征,但患者呼吸困难进行性加重。结合胸部平片,最符合此患者情况的是()
A. 连枷胸伴反常呼吸
B. 肺气肿
C. 张力性气胸
D. 血胸
E. 自发性气胸
[答案] C
[解析] 张力性气胸形成单向活瓣，气体只进不出，胸膜腔压力进行性增高，导致呼吸困难进行性加重；X线未见骨折排除了连枷胸。A需多根多处肋骨骨折，B为慢性病程，D需有积血表现，E可有气胸但非进行性加重。
[题目] 382. 体检时医⽣发现2岁男孩的左侧胸壁第2肋间近胸骨角处有机械样杂音,收缩期末最响并伴有震颤。其他检查正常,患者自述既往活动时易疲劳,耐力较其他男孩低。胸部增强CT扫描、MPR重建后显示:左肺动脉起始部与主动脉弓部间可见一细管状结构相互沟通。诊断为动脉导管未闭。关于动脉导管的描述,错误的是()
A. 动脉导管三角前界为左膈神经、后界为左迷走神经、下界为左肺动脉
B. 主动脉弓左前方的一个三角形区称为动脉导管三角,该三角是临床手术寻找动脉导管的标志
C. 出生后1年内动脉导管闭锁成为动脉韧带
D. 动脉导管是连于左肺动脉起始部与升主动脉之间
E. 动脉导管在胎儿血液循环中起重要作用
[答案] D
[解析] 动脉导管连接左肺动脉起始部与主动脉弓（降主动脉起始部）之间，而非升主动脉。D选项错在升主动脉。A为正确解剖描述，B和C正确，E正确（胎儿期动脉导管将肺动脉血导入主动脉）。
[题目] 383. 胸外科医生在对先心病动脉导管未闭症患者实施动脉导管结扎术,术后发现患者声音嘶哑,下列何神经受损()
A. 左喉上神经
B. 右喉上神经
C. 右喉返神经
D. 左喉返神经
E. 左膈神经
[答案] D
[解析] 左喉返神经勾绕主动脉弓和动脉韧带后上行，动脉导管结扎术中最易损伤此神经，导致左侧声带麻痹引起声音嘶哑。左喉上神经不在此区走行，右侧神经不受影响。
[多选题]
[题目] 384. 关于胸骨角,下列叙述哪些正确()
A. 上腔静脉于此平面开口于右心房
B. 两侧与第2肋软骨相连
C. 是上纵隔和下纵隔的分界平面
D. 是气管分叉的标志
E. 平主动脉弓的起始平面
[答案] BCDE
[解析] 胸骨角平对第2肋软骨、T4椎体下缘，是上、下纵隔分界、气管分叉平面、主动脉弓起始和终止平面。A错误：上腔静脉开口于右心房平第3肋软骨处，非胸骨角平面。
[题目] 385. 关于乳房的淋巴回流,下列哪些是正确的()
A. 深部入Rotter结或尖淋巴结
B. 内侧部入胸骨旁淋巴结
C. 内下部入膈上淋巴结
D. 浅淋巴管网吻合广泛,两侧相互交通
E. 外侧部和中央部入胸肌淋巴结
[答案] ABCDE
[解析] 全部选项均正确。乳房外侧部和中央部入胸肌淋巴结；内侧部入胸骨旁淋巴结；内下部入膈上淋巴结；深部入胸肌间淋巴结（Rotter结）或尖淋巴结；浅淋巴管网吻合广泛，两侧可相互交通。
[题目] 386. 关于胸膜顶,下列叙述哪些正确()
A. 胸导管通过其后方
B. 在锁骨内侧1/3上缘高出2~3cm
C. 伸入颈根部,又称颈胸膜
D. 为脏胸膜的一部分
E. 在锁骨下动脉的前方
[答案] BC
[解析] 胸膜顶在锁骨内侧1/3上缘高出2~3cm，伸入颈根部，又称颈胸膜。A错误（胸导管经胸膜顶左侧后方而非通过其后方），D错误（胸膜顶为壁胸膜的一部分），E错误（锁骨下动脉从前方越过胸膜顶，胸膜顶在锁骨下动脉后方）。
[题目] 387. 关于心包裸区,下列叙述哪些正确()
A. 此处穿刺可伤及肺
B. 贴在胸骨体左半及左侧第4~5肋后面
C. 经此处做心包穿刺可不经胸膜腔
D. 位于下胸膜间区(心包区)
E. 无纤维心包
[答案] BCD
[解析] 心包裸区位于下胸膜间区（心包区），贴在胸骨体左半及左侧第4~5肋软骨后面，经此处做心包穿刺可不经胸膜腔。A错误（此处无胸膜覆盖故穿刺不伤肺），E错误（心包裸区仍有纤维心包，只是无胸膜覆盖）。
[题目] 388. 下列哪些结构通过食管裂孔()
A. 食管
B. 迷走神经
C. 下腔静脉
D. 胸主动脉
E. 胸导管
[答案] AB
[解析] 食管裂孔（平T10）有食管和迷走神经前、后干通过。C错误（下腔静脉通过腔静脉孔平T8），D错误（胸主动脉通过主动脉裂孔平T12），E错误（胸导管通过主动脉裂孔）。
[单选题]
[题目] 389. 患者,女,56岁,因“气短、胸痛2周”就诊,心脏超声检查示心包积液。心包积液常先积聚的位置是()
A. 心包后窦
B. 心包斜窦
C. 心包横窦
D. 心包前下窦
E. 心包侧窦
[答案] D
[解析] 心包前下窦是心包前壁与下壁移行处的间隙，为直立位时心包腔最低处，心包积液常先积聚于此。B位于后方，C位于上方，A和E非标准心包窦名称。
[题目] 390. 患者,男,68岁,因咳嗽20余天入院,CT检查显示右肺尖有高密度影,肺尖的位置是()
A. 纵隔内
B. 锁骨内侧1/3以上2-3cm
C. 锁骨中间1/3以上2-3cm
D. 锁骨外侧1/3以上2-3cm
E. 胸腔内
[答案] B
[解析] 肺尖（及胸膜顶）在锁骨内侧1/3上缘向上突出2~3cm，伸入颈根部。A错误（肺尖不在纵隔内），C和D部位不对，E不精确。
[题目] 391. 某战士胸前右侧锁骨中线第4肋间隙处被枪弹射入,出现呼吸困难与发绀等,立即送往后方医院抢救。枪弹依次穿过的层次是()
A. 皮肤、浅筋膜、肋间肌、胸膜
B. 皮肤、浅筋膜、胸大肌、胸小肌、胸膜
C. 皮肤、浅筋膜、腹外斜肌、肋间肌、胸膜
D. 皮肤、浅筋膜、前锯肌、肋间肌、胸膜
E. 皮肤、浅筋膜、胸大肌、胸小肌、肋间肌、胸内筋膜、胸膜
[答案] E
[解析] 胸前区锁骨中线第4肋间隙由浅入深依次为：皮肤、浅筋膜、胸大肌、胸小肌、肋间肌（肋间外肌和肋间内肌）、胸内筋膜、壁胸膜。A、B、C、D均遗漏层次。
[题目] 392. 13岁女性,患者,因骑马时摔落地⾯受伤急诊入院。入院査脉搏120次/分;血压90/60mmHg,呼吸30次/分。体查发现患者左侧腋后线第8肋附近皮肤软组织挫伤,伴第9、10肋骨骨折。此患者最有可能受损的器官是()
A. 脾
B. 肝
C. 肺
D. 肾
E. 胃
[答案] A
[解析] 脾位于左季肋区第9~11肋深面，左第9~10肋骨骨折最可能伤及脾。B肝在右侧，C肺虽可受伤但非最可能（骨折位置较低），D肾位置更深也较低，E胃在第9~10肋骨折时也可受伤但不如脾常见。
[题目] 393. 患者,女,35岁,行乳腺癌根治术后出现了胸大、小肌的萎缩及肩部运动障碍,可能损伤到的神经是 ()
A. 肩胛上神经
B. 肋间臂神经
C. 胸外侧神经
D. 肩胛下神经
E. 胸背神经
[答案] C
[解析] 胸外侧神经支配胸大肌，胸内侧神经支配胸小肌及胸大肌下部；乳腺癌根治术可能损伤这些神经。本题中胸外侧神经损伤可导致胸大、小肌萎缩和肩部运动障碍。A、B、D、E损伤表现不同。
[题目] 394. 患儿,男,3岁,因“反复咳嗽,憋气”就诊,临床诊断为动脉导管未闭,需手术结扎,请问结扎时,须保护的神经是()
A. 心深丛
B. 左迷走神经
C. 左喉返神经
D. 左膈神经
E. 右喉返神经
[答案] C
[解析] 左喉返神经勾绕主动脉弓和动脉韧带，是动脉导管结扎术中最需要保护的神经，损伤后导致声音嘶哑。A为自主神经丛，B和D与动脉导管有一定距离，E在右侧。
[题目] 395. 开胸操作时,发现右侧肋胸膜与胸壁紧密粘连,不易分开,同侧胸膜腔大量积液。胸膜腔积液临床上常用的穿刺部位是腋后线()
A. 第9、10肋间隙中部
B. 第5、6肋间隙中部
C. 第3、4肋间隙中部
D. 第7、8肋间隙下部
E. 第1、2肋间隙中部
[答案] D
[解析] 胸膜腔穿刺抽液常在腋后线第7~8肋间隙下部（或肩胛线第7~8肋间），于肋骨上缘进针以免损伤肋间血管神经。A太低，B、C位置偏高，E为排气部位。
[题目] 396. 患者,女,55岁,风湿性心脏病史15年,行二尖瓣置换术,请问在心脏手术中,阻断动脉血流时常用部位()
A. 右心耳处
B. 心包横窦
C. 心包斜窦
D. 心包前下窦
E. 左心耳处
[答案] B
[解析] 心包横窦位于升主动脉和肺动脉后方与上腔静脉和左心房前方之间，心脏手术时常经此阻断主动脉和肺动脉血流。A和E用于其他手术操作，C为心包斜窦非阻断部位，D为积液积聚处。
[题目] 397. 乳房上半部分的恶性肿瘤需要清除的淋巴结是()
A. 尖淋巴结
B. 锁骨下淋巴结和胸骨旁淋巴结
C. 全部腋窝淋巴结
D. 中央淋巴结
E. 全部腋窝淋巴结和胸骨旁淋巴结
[答案] E
[解析] 乳房上半部分的淋巴引流至腋窝淋巴结和胸骨旁淋巴结，根治性切除时需要清除全部腋窝淋巴结和胸骨旁淋巴结以确保彻底清除可能转移的淋巴组织。A、B、C、D均不全面。
[题目] 398. 患儿,女,7岁,剧烈运动时气促明显,偶有腹痛,听诊左下肺可闻及肠鸣音,胸部CT诊断为左侧膈疝,其发生的部位是()
A. 膈的腰肋三角
B. 膈的食管裂孔
C. 膈的主动脉裂孔
D. 膈的腔静脉孔
E. 膈的胸肋三角
[答案] A
[解析] 腰肋三角是膈腰部和肋部之间的薄弱区，前方与肾和肾上腺后面相邻，是膈疝的好发部位，也是左侧膈疝最常见的发生位置。B、C、D为膈的正常裂孔，E为膈的胸肋三角（易发生Morgagni疝，位置在前方）。
[题目] 399. 患者,女,50岁,因“胸闷、喘憋1周,加重1日”就诊,超声检查示大量心包积液,拟行心包穿刺进针,请问心包穿刺的部位是()
A. 常在左剑肋角处
B. 常在右侧肋角处
C. 在右侧第4肋间隙乳头下方
D. 在左侧第4肋间隙乳头下方
E. 沿胸骨左缘第6肋间隙
[答案] A
[解析] 心包穿刺常在左剑肋角（剑突与左肋弓夹角处）进针，经膈向心包腔穿刺，可避免损伤胸膜。B不在左侧，C和D可能伤及胸膜，E位置偏远。
[题目] 400. 某患者因为急性阑尾炎行手术治疗,麻醉医师给该患者做了椎管内麻醉,然后测麻醉平面,结果剑突部位痛觉消失,因此可以认为麻醉平面达到哪一神经节段()
A. T2
B. T10
C. T8
D. T4
E. T6
[答案] E
[解析] 剑突皮肤感觉由T6神经节段支配，剑突部位痛觉消失表明椎管内麻醉平面达到T6水平。A=T2（胸骨角），B=T10（脐），C=T8（季肋部），D=T4（乳头）。
[题目] 401. 某青年农民胸部受伤后,发现有心包积血,需进行心包穿刺术,其进针部位应在()
A. 胸骨右缘第5肋间隙
B. 经右侧剑肋角向右上方
C. 经左侧剑肋角向左上方
D. 经右侧剑肋角向左上方
E. 胸骨左缘第5肋间隙
[答案] C
[解析] 心包穿刺术常在左剑肋角处向左上方进针，经膈穿刺心包，可避免伤及胸膜。A和E不经剑肋角，B和D在右侧操作不正确。
[题目] 402. 患者,女,40岁,因胸痛、咳嗽入院,诊断为胸膜炎,听诊有胸膜摩擦音。胸膜摩擦音是由()引起
A. 壁胸膜和胸壁相互摩擦
B. 膈胸膜和膈相互摩擦
C. 脏胸膜和肺相互摩擦
D. 肋胸膜和肋相互摩擦
E. 脏胸膜、壁胸膜相互摩擦
[答案] E
[解析] 胸膜摩擦音是由于胸膜炎时脏胸膜与壁胸膜因炎性渗出而变得粗糙，呼吸时两层胸膜相互摩擦产生的声音。A、B、C、D描述错误（胸膜不与胸壁、膈、肺直接摩擦产生摩擦音）。
[题目] 403. 患者,女,25岁,因气短、胸痛入院检查,超声显示心包积液,心包穿刺部位常选择()
A. 左侧第4胸肋关节处
B. 剑突右侧
C. 左剑肋角
D. 胸骨体下端
E. 右剑肋角
[答案] C
[解析] 心包穿刺部位常选择左剑肋角，经膈向心包腔穿刺，可避免伤及胸膜。A可能伤及胸膜，B和E不在最佳位置，D不精确。
[题目] 404. 乳腺癌根治术损伤肋间臂神经,可表现为()
A. 上肢水肿
B. 臂部后内侧皮肤麻木
C. 背阔肌瘫痪
D. 前锯肌瘫痪
E. 胸大肌瘫痪
[答案] B
[解析] 肋间臂神经为第2肋间神经的外侧皮支，分布于臂后内侧皮肤，损伤后导致该区域皮肤麻木。A为腋静脉损伤表现，C为胸背神经损伤，D为胸长神经损伤，E为胸外侧神经损伤。
[题目] 405. 乳腺癌根治术损伤胸背神经,可表现为()
A. 背阔肌瘫痪
B. 臂部后内侧皮肤麻木
C. 上肢水肿
D. 前锯肌瘫痪
E. 胸大肌瘫痪
[答案] A
[解析] 胸背神经支配背阔肌，损伤后背阔肌瘫痪，导致肩关节后伸、内收、内旋无力。B为肋间臂神经损伤，C为腋静脉损伤，D为胸长神经损伤，E为胸外侧神经损伤。
[题目] 406. 乳腺癌根治术损伤胸外侧神经,可表现为()
A. 上肢水肿
B. 臂部后内侧皮肤麻木
C. 背阔肌瘫痪
D. 前锯肌瘫痪
E. 胸大肌瘫痪
[答案] E
[解析] 胸外侧神经支配胸大肌，损伤后胸大肌瘫痪。A为腋静脉损伤，B为肋间臂神经损伤，C为胸背神经损伤，D为胸长神经损伤。
[题目] 407. 在锁骨中线,与胸膜下界相交的是()
A. 第10肋
B. 第6肋
C. 第9肋
D. 第8肋
E. 第11肋
[答案] D
[解析] 胸膜下界在锁骨中线处与第8肋相交（肺下界在第6肋）。A、C、D、E的数字不对：锁骨中线胸膜下界接触的是第8肋。
[题目] 408. 在腋中线,与胸膜下界相交的是()
A. 第11肋
B. 第6肋
C. 第9肋
D. 第8肋
E. 第10肋
[答案] E
[解析] 胸膜下界在腋中线处与第10肋相交（肺下界在第8肋）。A=11肋（肩胛线），B=6肋（锁骨中线肺下界），C=9肋不对，D=8肋（锁骨中线胸膜下界）。
[题目] 409. 在肩胛线,与胸膜下界相交的是()
A. 第10肋
B. 第6肋
C. 第9肋
D. 第8肋
E. 第11肋
[答案] E
[解析] 胸膜下界在肩胛线处与第11肋相交（肺下界在第10肋）。A=10肋（腋中线胸膜下界或肩胛线肺下界），B、C、D的数字不对。
[题目] 410. 乳房内侧部的淋巴管注入()
A. 膈下淋巴结
B. 尖群淋巴结和锁骨上淋巴结
C. 胸肌淋巴结
D. 胸肌间淋巴结
E. 胸骨旁淋巴结
[答案] E
[解析] 乳房内侧部的淋巴管注入胸骨旁淋巴结（沿胸廓内血管排列）。A为内下部引流，B为尖部引流，C为外侧部和中央部引流，D为深部引流。
[题目] 411. 乳房深部的淋巴管注入()
A. 尖群淋巴结和锁骨上淋巴结
B. 胸肌淋巴结
C. 胸骨旁淋巴结
D. 胸肌间淋巴结
E. 膈下淋巴结
[答案] D
[解析] 乳房深部（胸大肌深面）的淋巴管注入胸肌间淋巴结（Rotter淋巴结）。A为尖部引流，B为外侧部引流，C为内侧部引流，E为内下部引流。
[题目] 412. 乳房外侧部和中央部的淋巴管注入()
A. 胸肌淋巴结
B. 尖群淋巴结和锁骨上淋巴结
C. 胸骨旁淋巴结
D. 膈下淋巴结
E. 胸肌间淋巴结
[答案] A
[解析] 乳房外侧部和中央部的淋巴管注入胸肌淋巴结（前群腋窝淋巴结，沿胸外侧血管排列）。B为尖部引流，C为内侧部引流，D为内下部引流，E为深部引流。
[题目] 413. 膈的腔静脉孔平对()
A. 第7胸椎
B. 第8胸椎
C. 第9胸椎
D. 第12胸椎
E. 第10胸椎
[答案] B
[解析] 膈的腔静脉孔平对第8胸椎，有下腔静脉和右膈神经通过。A=T7不对，C=T9不对，D=T12（主动脉裂孔），E=T10（食管裂孔）。
[题目] 414. 膈的食管裂孔平对()
A. 第8胸椎
B. 第7胸椎
C. 第9胸椎
D. 第10胸椎
E. 第12胸椎
[答案] D
[解析] 膈的食管裂孔平对第10胸椎，有食管和迷走神经前、后干通过。A=T8（腔静脉孔），B=T7不对，C=T9不对，E=T12（主动脉裂孔）。
[题目] 415. 膈的主动脉裂孔平对()
A. 第10胸椎
B. 第8胸椎
C. 第7胸椎
D. 第12胸椎
E. 第9胸椎
[答案] D
[解析] 膈的主动脉裂孔平对第12胸椎，有胸主动脉和胸导管通过。A=T10（食管裂孔），B=T8（腔静脉孔），C=T7不对，E=T9不对。
[题目] 416. 浆膜性心包脏、壁两层所围成的潜在的腔隙是()
A. 心包腔
B. 心包横窦
C. 心包斜窦
D. 心包前下窦
E. 心包裸区
[答案] A
[解析] 浆膜心包的脏、壁两层之间围成的潜在腔隙即为心包腔，内含少量浆液。B、C、D均为心包腔的隐窝或窦，E为心包直接接触胸壁的区域，非腔隙。
[题目] 417. 进行心包穿刺或心内注射一般不会伤及胸膜的部位是()
A. 心包前下窦
B. 心包横窦
C. 心包斜窦
D. 心包裸区
E. 心包腔
[答案] D
[解析] 心包裸区是心包直接与胸骨后面相贴、无胸膜覆盖的区域，经此处行心包穿刺或心内注射可不经过胸膜腔从而避免伤及胸膜。A、B、C均为心包腔的一部分，E为整个心包腔。
[题目] 418. 位于左、右肺静脉、下腔静脉、左心房后壁与心包后壁之间的是()
A. 心包前下窦
B. 心包横窦
C. 心包斜窦
D. 心包裸区
E. 心包腔
[答案] C
[解析] 心包斜窦位于左、右肺静脉、下腔静脉、左心房后壁与心包后壁之间的心包腔隐窝。A位于心包前壁与下壁移行处，B位于升主动脉和肺动脉后方，D为无胸膜覆盖区域，E为整个心包腔。
[章节] 脊柱
[单选题]
[题目] 419. 听诊三角()
A. 三角的底为薄层脂肪组织、筋膜和第7肋间隙
B. 内上界为竖脊肌
C. 下界为斜方肌
D. 又称肩胛下三角
E. 外侧界为肩胛骨的内侧缘
[答案] E
[解析] 听诊三角上界为斜方肌，下界为背阔肌，外侧界为肩胛骨内侧缘，底为第7肋间隙。A错在底并非薄层脂肪组织，B错在内上界应为斜方肌，C错在下界应为背阔肌，D错在又名肩胛旁三角而非肩胛下三角。
[题目] 420. 枕下三角()
A. 底为后纵韧带和寰枕后弓
B. 外下界为半棘肌和夹肌
C. 内有椎动脉和枕下神经经过
D. 外上界为头后大直肌
E. 内上界为头后小直肌
[答案] C
[解析] 枕下三角内上界为头后大直肌，外上界为头上斜肌，外下界为头下斜肌，底为寰枕后膜和寰椎后弓。三角内有椎动脉和枕下神经经过，故C正确。A、B、D、E描述的边界均不符合枕下三角的构成。
[题目] 421. 腰下三角()
A. 内上界为腹内斜肌
B. 有竖脊肌参与构成其边界
C. 底为腹横肌
D. 下界为髂嵴
E. 外上界为后锯肌前下缘
[答案] D
[解析] 腰下三角由腹外斜肌后缘（外上界）、背阔肌前缘（内上界）和髂嵴（下界）围成，底为腹内斜肌。D正确描述了下界为髂嵴。A错在内上界为背阔肌，B错在无竖脊肌参与，C错在底为腹内斜肌，E错在外上界为腹外斜肌后缘。
[题目] 422. 腰区的薄弱区位于()
A. 肩胛下三角
B. 脊肋角
C. 肩胛旁三角
D. 腰上三角
E. 听诊三角
[答案] D
[解析] 腰上三角位于下后锯肌下缘、腹内斜肌后缘和竖脊肌外缘之间，其底为腹横肌腱膜，缺乏肌层保护，是腰区薄弱处，易发生腰疝。其他三角均非腰区公认的薄弱区。
[题目] 423. 胸腰筋膜()
A. 后层附于背阔肌的后面
B. 前层又称腰方肌筋膜
C. 中层向下附于腰椎横突末端
D. 前层形成腰肋韧带
E. 腰区较胸背区的薄
[答案] B
[解析] 胸腰筋膜分三层：后层覆于竖脊肌后面，中层附于腰椎横突末端，前层覆盖腰方肌前面，故前层又称腰方肌筋膜，B正确。A错在后层覆于竖脊肌后面而非背阔肌，C描述的是中层，D错在前层形成外侧弓状韧带，E错在腰区胸腰筋膜较胸背区厚。
[题目] 424. 成人蛛网膜下隙穿刺常选择()
A. 骶管裂孔
B. 骶角
C. 第3-4腰椎棘突之间
D. 第2-3腰椎之间
E. 第1-2腰椎棘突之间
[答案] C
[解析] 成人脊髓末端约平第1腰椎下缘，在第3-4腰椎棘突间穿刺可避免损伤脊髓。该间隙蛛网膜下隙较宽，马尾神经漂浮于脑脊液中可被推开，穿刺较安全。
[题目] 425. 某舞蹈演员因胸腰筋膜劳损而出现慢性腰痛,其可能损伤的结构是()
A. 臀中皮神经
B. 第2骶神经后支
C. 臀上皮神经
D. 第3骶神经后支
E. 臀下皮神经
[答案] C
[解析] 臀上皮神经由L1-L3脊神经后支组成，穿过胸腰筋膜浅出至皮下。胸腰筋膜劳损时易卡压臀上皮神经，导致慢性腰痛。A、B、D、E均为骶神经后支，不经过胸腰筋膜，与本病无关。
[题目] 426. 28岁女性，足月待产，产科实施硬膜外麻醉可经的孔裂是()
A. 骶管裂孔
B. 骶后孔
C. 椎孔
D. 椎间孔
E. 骶前孔
[答案] A
[解析] 骶管裂孔是骶管下端的开口，硬膜外麻醉可经此孔穿刺，将麻醉药注入骶管硬膜外隙（骶管麻醉），常用于会阴部手术和分娩镇痛。骶后孔、椎间孔等不是硬膜外麻醉的常用入路。
[题目] 427. 一患者车祸致使骶骨骨折，最有可能受影响的是()
A. 臂丛
B. 胸神经
C. 颈丛
D. 腰丛
E. 骶丛
[答案] E
[解析] 骶丛（L4-S4）紧贴骶骨前外侧（骨盆后壁），骶骨骨折易直接损伤骶丛神经。臂丛位于颈根部，胸神经走行于肋间隙，颈丛在颈部，腰丛位于腰大肌深面，均不经过骶骨区域。
[题目] 428. C2~C3椎间孔骨质增生压迫颈神经根，最可能受累骨骼肌()
A. 冈上肌
B. 背阔肌
C. 膈肌
D. 前锯肌
E. 大菱形肌
[答案] C
[解析] C2-C3椎间孔压迫C3神经根，C3参与膈神经（C3-C5）的组成，膈神经支配膈肌。C3受压可影响膈肌功能。冈上肌、背阔肌、前锯肌、大菱形肌分别由臂丛分支支配，不直接受C3压迫影响。
[题目] 429. L3、L4棘突间偏外侧硬膜外穿刺，进针前最后穿过结构()
A. 棘间韧带
B. 黄韧带
C. 棘上韧带
D. 后纵韧带
E. 横突间韧带
[答案] B
[解析] 硬膜外穿刺由浅入深依次穿过皮肤、浅筋膜、深筋膜、棘上韧带、棘间韧带、黄韧带，进入硬膜外隙。黄韧带连接相邻椎弓板，是进入硬膜外隙前最后穿过的结构。棘上韧带在浅层，后纵韧带在椎管前壁，横突间韧带在横突间。
[题目] 430. 第2~3腰椎硬膜外麻醉进针不需经过()
A. 皮肤和皮下脂肪
B. 棘上韧带
C. 黄韧带
D. 横突间韧带
E. 深筋膜
[答案] D
[解析] L2-L3棘突间正中入路硬膜外穿刺依次穿过皮肤、皮下脂肪、深筋膜、棘上韧带、棘间韧带、黄韧带。横突间韧带位于相邻横突之间，正中入路穿刺不经过该结构，故D为不需经过的结构。
[题目] 431. 疑似脑膜炎需腰穿，骨性标志()
A. 肩胛下角
B. 两侧髂嵴最高点连线
C. 第7颈椎棘突
D. 髂后上棘
E. 第2腰椎棘突
[答案] B
[解析] 两侧髂嵴最高点连线约平第4腰椎棘突（或L3-L4间隙），是腰椎穿刺定位的可靠骨性标志，用于确定穿刺间隙。其余选项均非腰椎穿刺的首选定位标志。
[题目] 432. 脊柱骨折，脐平面以下深浅感觉消失，脊髓损伤节段()
A. 胸髓第7节段
B. 腰髓第1节段
C. 胸髓第8节段
D. 腰髓第2节段
E. 胸髓第10节段
[答案] E
[解析] 脐平面由T10脊神经支配，脐平面以下深浅感觉消失提示T10脊髓节段损伤。T7支配剑突平面，T8支配肋弓平面，L1支配腹股沟区，L2支配大腿前上部，均与脐平面定位不符。
[题目] 433. 腰椎穿刺进入蛛网膜下隙最后穿过的结构()
A. 棘上韧带
B. 蛛网膜
C. 硬脊膜
D. 棘间韧带
E. 黄韧带
[答案] B
[解析] 腰椎穿刺进入蛛网膜下隙的层次顺序为：皮肤→浅筋膜→深筋膜→棘上韧带→棘间韧带→黄韧带→硬膜外隙→硬脊膜→蛛网膜→蛛网膜下隙。蛛网膜紧贴硬脊膜内面，是最后穿过的结构，故B正确。
[题目] 434. L5、S1椎间盘突出髓核摘除，不必切开()
A. 竖脊肌
B. 黄韧带
C. 前纵韧带
D. 胸腰筋膜
E. 椎弓板
[答案] C
[解析] L5-S1椎间盘突出髓核摘除采用后入路，依次切开皮肤、胸腰筋膜、竖脊肌、椎弓板、黄韧带等后部结构。前纵韧带位于椎体前方，后路手术不涉及，故不必切开。A、B、D、E均为后路手术需经过的结构。
[题目] 435. 头部与颈部的分界是()
A. 下颌骨下缘、下颌角、耳垂、下项线与枕外隆凸的连线
B. 下颌骨下缘、下颌角、乳突尖端、上项线与枕外隆凸的连线
C. 下颌骨下缘、下颌角、乳突尖端、下项线与枕外隆凸的连线
D. 下颌骨下缘、下颌角、耳垂、上项线与枕外隆凸的连线
E. 下颌骨下缘、下颌角、外耳门、上项线与枕外隆凸的连线
[答案] B
[解析] 头部与颈部的分界为下颌骨下缘、下颌角、乳突尖端、上项线与枕外隆凸的连线。上项线是枕骨外面横行骨嵴，为头颈后部分界标志；下项线位置偏低，耳垂和外耳门均非解剖学分界标志。故A、C、D、E均错误。
[章节] 腹部解剖练习题
[单选题]
[题目] 436. 腹部局部解剖（选择） 一患胃溃疡数年的年轻病人,饮酒后诱发胃后壁穿孔,胃内容物流入网膜囊,造成胃后壁及相关结构大片粘连,此时不易累及的器官是()
A. 横结肠及系膜
B. 右肾
C. 脾
D. 左肾
E. 胰
[答案] B
[解析] 胃后壁穿孔后，胃内容物流入网膜囊。网膜囊右侧经网膜孔与腹膜腔相通，右肾位于腹膜后间隙，与网膜囊无直接毗邻关系，故最不易受累。横结肠、脾、左肾、胰均与网膜囊密切相邻。
[题目] 437. 患者,男,48岁,患胃溃疡多年,经内科治疗效果欠佳,拟行“高选择性迷走神经切断术”。术中应切断的迷走神经的分支是()
A. “鸦爪”形分支
B. 肝支
C. 胃壁分支
D. 胃前支
E. 腹腔支
[答案] C
[解析] 高选择性迷走神经切断术切断支配胃壁的迷走神经分支（胃壁分支），保留支配胃窦的"鸦爪"形分支（Latarjet神经）和肝支、腹腔支等肝外分支。此术式在减少胃酸分泌的同时保留胃排空功能。
[题目] 438. 22岁男性患者,与人争吵中被刀刺伤腹部,伤口位于左侧腋前线肋缘下,下列器官与结构中最不可能受损的是()
A. 膈
B. 肝左外叶
C. 胸膜
D. 左肾
E. 脾
[答案] B
[解析] 左侧腋前线肋缘下（剑突下偏左）的刺伤，最可能损伤膈、脾、左肾、胸膜等左侧结构。肝左外叶位于右侧肋缘下较深处，受左侧肋缘下刺伤的路径远离，故最不可能受损。
[题目] 439. 患者男,46岁,10天前于医院B超检查发现右肾占位性病变,CT检查提示右肾癌,拟行右肾根治性切除术,请问术中下列最不可能损伤的结构是()
A. 胰体
B. 下腔静脉
C. 肝
D. 胸膜
E. 十二指肠降部
[答案] A
[解析] 右肾根治性切除术涉及右肾周结构。胰体位于左侧腹膜后间隙，跨越腹主动脉前方，距离右肾较远。下腔静脉、肝、胸膜、十二指肠降部均与右肾密切相邻，术中容易受损。
[题目] 440. 51岁男性,患者因急性腹痛入院。入院检查发现胃底部溃疡穿孔并发进行性腹内出血。最可能是下列哪条动脉受损导致此患者腹内出血()
A. 肝总动脉
B. 脾动脉
C. 胃左动脉
D. 胃短动脉
E. 膈下动脉
[答案] D
[解析] 胃底部溃疡穿孔致出血，最可能损伤供应胃底的胃短动脉。胃短动脉起自脾动脉，行经胃脾韧带至胃底，位置恰在胃底溃疡好发处。肝总动脉、脾动脉、胃左动脉、膈下动脉均不直接供应胃底区域。
[题目] 441. 男性,35岁,剧烈腹痛伴呕血,未就医,2天后患者死亡。尸检发现患者十二指肠第一段后壁溃疡穿孔伴邻近动脉受损出血,最有可能是下列哪条动脉损伤所致()
A. 胃右动脉
B. 胃左动脉
C. 胃十二指肠动脉
D. 胃短动脉
E. 脾动脉
[答案] C
[解析] 十二指肠第一段（球部）后壁溃疡穿孔，最可能侵蚀胃十二指肠动脉。该动脉在十二指肠第一段后方下行，与十二指肠球部后壁紧密相贴，是球部后壁溃疡大出血最常见的血管来源。
[题目] 442. 13岁女性,患者,因骑马时摔落地⾯受伤急诊入院。入院査脉搏120次/分;血压90/60mmHg,呼吸30次/分。体查发现患者左侧腋后线第8肋附近皮肤软组织挫伤,伴第9、10肋骨骨折。此患者最有可能受损的器官是()
A. 胃
B. 脾
C. 肺
D. 肝
E. 肾
[答案] B
[解析] 左侧第9、10肋骨骨折，最可能损伤脾脏。脾位于左季肋区第9-11肋深面，与左侧下位肋骨关系密切，肋骨骨折碎片可直接刺破脾实质，导致腹腔内大出血和失血性休克。
[题目] 443. 患者,男,46岁,右腹股沟处有一包块,诊断为腹股沟斜疝。手术治疗后出现腹股沟区灼痛,灼痛部位在阴茎根部和阴囊上部。此灼痛可能与下列何结构有关()
A. 髂腹股沟神经
B. 闭孔神经
C. 髂腹下神经
D. 肋下神经
E. 股神经
[答案] A
[解析] 髂腹股沟神经经腹股沟管出皮下环，支配阴茎根部和阴囊上部（或大阴唇）皮肤感觉。腹股沟斜疝手术中若损伤此神经，可导致其分布区灼痛或麻木。髂腹下神经支配耻骨上区；闭孔神经支配股内侧；股神经支配股前区。
[题目] 444. 患者,男,在胃大弯部发现肿瘤,该肿瘤首先转移侵犯的结构最可能是()
A. 肝左叶
B. 肝右叶
C. 胰腺
D. 脾
E. 横结肠
[答案] E
[解析] 胃大弯部肿瘤首先直接侵犯横结肠及其系膜，因为胃大弯通过胃结肠韧带与横结肠相连。肝、胰腺、脾距离胃大弯较远，非首站转移部位。
[题目] 445. 一44岁男性患者因大量呕吐伴脱水入院。影像学检查发现钡剂在第1、2腰椎前方,肠系膜上动脉后方的消化道聚积。此患者症状最可能是下列哪段肠管受压所致()
A. 十二指肠降部
B. 十二指肠上部
C. 十二指肠水平部
D. 十二指肠升部
E. 横结肠
[答案] C
[解析] 钡剂在L1-L2前方、肠系膜上动脉后方积聚，诊断为肠系膜上动脉综合征，受压肠管为十二指肠水平部。该部位恰在腹主动脉与肠系膜上动脉之间穿过，当夹角过小时可压迫水平部导致梗阻。
[题目] 446. 43岁男性,右侧下腹触及一肿块,还纳后,压住腹股沟管深环,嘱患者咳嗽,肿块再次出现,提示()
A. 腹股沟直疝
B. 腹腔内肿块
C. 股疝
D. 腹股沟斜疝
E. 腰疝
[答案] A
[解析] 按压腹股沟管深环后咳嗽肿块仍出现，提示疝内容物不经过深环，为腹股沟直疝。直疝从海氏三角（腹壁下动脉内侧）直接向前突出，不进入腹股沟管深环。斜疝按压深环后肿块不会出现。
[题目] 447. 65岁男性患者,因腹股沟区疼痛入院。入院检查发现站立时可在耻骨结节外上方触及一包块,进一步检查诊断为腹股沟直疝。此患者的疝囊()
A. 位于腹壁下动脉外侧
B. 被精索的三层被膜包裹
C. 经过深环口
D. 被精索内筋膜包裹
E. 被腹横筋膜包裹
[答案] E
[解析] 腹股沟直疝疝囊从海氏三角膨出，推送腹横筋膜向前，故疝囊由腹横筋膜包裹。直疝不经过腹股沟管深环，不被精索筋膜包裹，位于腹壁下动脉内侧而非外侧。
[题目] 448. 70岁男性患者,因胃窦部严重溃疡拟行胃大部分切除术,术中需结扎的血管应除外()
A. 胃网膜左血管
B. 胃左血管
C. 胃右血管
D. 胃网膜右血管
E. 胃短血管
[答案] E
[解析] 胃窦部胃大部分切除术需结扎胃窦区域的血管（胃左、胃右、胃网膜左、胃网膜右血管）。胃短血管供应胃底，远离胃窦切除区，无需结扎。
[题目] 449. 54岁男性患者,因乙状结肠癌拟行乙状结肠癌根治术,手术选择硬膜外麻醉,麻醉平面T8-S4。注药后应于何平面检查患者麻醉已达T8节段()
A. 耻骨联合平面
B. 肋弓平面
C. 乳头平面
D. 脐平面
E. 剑突平面
[答案] B
[解析] 肋弓平面相当于T8脊髓节段支配区。耻骨联合平面约T12-L1，脐平面约T10，乳头平面约T4，剑突平面约T6。
[题目] 450. 49岁女性患者,因上腹部剧痛1天就诊,入院检查诊断为胰腺假性囊肿,此囊肿位于()
A. 左肝下前间隙
B. 右肝下间隙
C. 网膜囊
D. 腹膜后间隙
E. 肝肾隐窝
[答案] D
[解析] 胰腺为腹膜后位器官，位于腹膜后间隙。胰腺假性囊肿系胰液外渗积聚所致，位于腹膜后间隙而非腹膜腔内。网膜囊虽在胰腺前方，但假性囊肿在胰腺实质后方/周围形成。
[题目] 451. 32岁男性患者因左侧腹股沟区疼痛就诊。入院诊断为左侧腹股沟斜疝。患者的疼痛可能因为疝结构压迫腹股沟管内的()
A. 阴部神经
B. 髂腹下神经
C. 髂腹股沟神经
D. 肋下神经
E. 股外侧皮神经
[答案] C
[解析] 腹股沟管内走行髂腹股沟神经，疝内容物压迫此神经导致腹股沟区及阴囊/大阴唇放射痛。阴部神经不在腹股沟管内走行；髂腹下神经在腹股沟管上方走行。
[题目] 452. 为47岁男性患者实施胃窦部溃疡穿孔修补术时,外科医生结扎了胃网膜右动脉。此动脉走行于()
A. 肝十二指肠韧带
B. 肝胃韧带
C. 胃脾韧带
D. 胃膈韧带
E. 胃结肠韧带
[答案] E
[解析] 胃网膜右动脉走行于胃结肠韧带内（大网膜两层之间），自胃十二指肠动脉分出后沿胃大弯向左走行。肝十二指肠韧带内含肝固有动脉、门静脉和胆总管；肝胃韧带内含胃左、右动脉。
[题目] 453. 女,37岁,孕32周,一产妇因难产紧急施行剖宫产,采用下腹部横切口行腹膜外剖宫产。不需要切的结构是()
A. 皮肤
B. 深筋膜
C. 壁腹膜
D. 浅筋膜
E. 腹膜外组织
[答案] C
[解析] 腹膜外剖宫产术式在壁腹膜外进行操作，不切开壁腹膜进入腹膜腔。需切开皮肤、浅筋膜、深筋膜和腹膜外组织，仅在腹膜外间隙暴露子宫下段。
[题目] 454. 患者,男,48岁,患胃溃疡多年,经内科治疗效果欠佳,拟行“高选择性迷走神经切断术”。术中应切断的迷走神经的分支是()
A. 胃壁分支
B. “鸦爪”形分支
C. 腹腔支
D. 肝支
E. 胃前支
[答案] A
[解析] 高选择性迷走神经切断术仅切断支配胃体、胃底的胃壁分支（壁细胞区），保留"鸦爪"形分支（胃窦支）、腹腔支和肝支等，以减少胃酸分泌同时保留胃窦运动和幽门功能。
[题目] 455. 患者,女,50岁,因右上腹阵发性绞痛就诊,经检查后诊断为胆总管结石,需做胆总管探查术。结石比较容易嵌顿胆总管的哪个部位()
A. 十二指肠前部
B. 十二指肠大乳头处
C. 十二指肠后部
D. 胰腺段
E. 十二指肠上部
[答案] B
[解析] 胆总管结石最易嵌顿于十二指肠大乳头处，因为此处管腔最狭窄，Oddi括约肌环绕，结石通过困难。胆总管可分为十二指肠上段、十二指肠后段、胰腺段和十二指肠壁段，壁内段开口处（大乳头）最窄。
[题目] 456. 一2岁小孩因起因不明的哭闹,发热,腹部隐痛伴呕吐至当地医院就诊,以急性胃肠炎对症治疗,三天后患儿腹痛突然加剧,而送至上级急诊,经查诊断为穿孔性阑尾炎。下列关于小儿阑尾的解剖学基础描述错误的是()
A. 婴幼儿阑尾呈漏斗状,阑尾口小,引流不畅
B. 小儿大网膜短,阑尾发生炎症时不易及时包裹阑尾,局限炎症
C. 年龄越小,阑尾腔越大
D. 小儿阑尾肌层较成人薄
E. 小儿阑尾肌层不完整
[答案] A
[解析] 婴幼儿阑尾腔呈漏斗状，阑尾口大（而非小），引流相对通畅，故幼儿阑尾炎发病率低于成人。A选项说"阑尾口小"与解剖事实相反。其余选项均正确：小儿大网膜短、阑尾腔相对大、肌层薄且不完整。
[题目] 457. 患者,女,65岁,左大腿根部肿胀,并出现一半球形包块,质软有压痛,入院诊断为“股疝”,请问股疝时内容物落入什么结构()
A. 股管
B. 腹直肌鞘
C. 海氏三角
D. 腹股沟管
E. 股三角
[答案] A
[解析] 股疝时腹腔内容物经股环进入股管。股管是股鞘内侧的一个小间隙，上口为股环，下口为隐静脉裂孔。股疝的疝囊位于股管而非股三角、腹股沟管或海氏三角。
[题目] 458. 患者,男,22岁,饭后运动突发腹痛,至医院就诊确诊为阑尾炎。医生对该患者进行体格检查时,发现患者有腹部压痛及反跳痛,问该压痛的具体位置位于何处()
A. 耻骨联合上方
B. 脐周
C. 右侧锁骨中线与肋弓交界处
D. 脐与右髂前上棘连线中外1/3点
E. 上腹部
[答案] D
[解析] 阑尾根部体表投影即麦氏点（McBurney点），为脐与右髂前上棘连线的中外1/3交点处。这是急性阑尾炎最典型的压痛点位置。
[题目] 459. 医生在给一位疑似急性阑尾炎患者查体时发现,该患者腰大肌征及闭孔内肌征均为阳性,患者自述伴有大便次数增多,肛门坠胀,及尿频和尿急症状。综上考虑,该患者的阑尾位置最可能的是()
A. 盲肠下位
B. 盲肠后位
C. 盆位
D. 回肠前位
E. 回肠后位
[答案] C
[解析] 腰大肌征阳性提示阑尾位于腰大肌前方（盲肠后位），闭孔内肌征阳性提示阑尾靠近闭孔内肌（盆位），加上大便次数增多、肛门坠胀、尿频尿急（盆位阑尾刺激直肠膀胱），综合判断为盆位阑尾。
[题目] 460. 患者,男,42岁,肥胖,因腹股沟区急性疼痛而至急诊。接诊医生检查发现嘱患者屏气增加负压时,腹股沟区可看见一明显凸出物,患者仰卧平躺后可消失,但当患者起立咳嗽时凸出又复现,医生初步诊断为腹股沟疝。那么在术中下列哪个结构可帮助医生判断此为直疝或斜疝()
A. 脐
B. 腹股沟韧带
C. 耻骨结节
D. 髂前上棘
E. 腹壁下动脉
[答案] E
[解析] 腹壁下动脉是区分直疝与斜疝的关键解剖标志。斜疝疝囊位于腹壁下动脉外侧（经深环），直疝疝囊位于腹壁下动脉内侧（经海氏三角）。
[题目] 461. 患者,男,52岁,患十二指肠球部溃疡20余年。近来渐感上腹部闷胀,食后尤甚。经常发生呕吐,呕吐后自觉胃部舒适。经检查诊断胃瘢痕性幽门梗阻,拟手术治疗。下列哪个结构可在手术中帮助辨认幽门()
A. 胃十二指肠动脉
B. 幽门前静脉
C. 胃冠状静脉
D. 胃右动脉起始处
E. 十二指肠球部
[答案] B
[解析] 幽门前静脉（Mayo静脉）是辨认幽门与十二指肠分界的重要标志。该静脉横跨幽门前方，手术中可见此静脉即表明已达幽门。角切迹是胃大小弯分界的体表标志，但不能术中精确定位幽门。
[题目] 462. 患者,男,22岁,因剧烈上腹痛4小时急诊入院,诊断急性阑尾炎,拟开腹阑尾切除术。下列描述错误的是()
A. 切口选择麦氏切口
B. 可于小肠系膜内分离结扎阑尾静动脉
C. 进入腹膜腔后先寻找盲肠
D. 切开Scarpa筋膜后可见腹外斜肌及其腱膜
E. 可沿结肠带寻找阑尾尾根部
[答案] B
[解析] 阑尾动脉是回结肠动脉的分支，走行于阑尾系膜游离缘，不在小肠系膜内。应在阑尾系膜内分离结扎阑尾动脉，而非小肠系膜内。其余描述均正确。
[题目] 463. 患者,男,12岁,腹股沟斜疝修补术,将腹内斜肌下缘和联合腱缝合于耻骨梳韧带上,此手术加强的是()
A. 后壁
B. 浅环口
C. 下壁
D. 前壁
E. 上壁
[答案] A
[解析] 将腹内斜肌下缘和联合腱缝合于耻骨梳韧带（Cooper韧带），是McVay修补法，用于加强腹股沟管后壁。Bassini法加强后壁但缝于腹股沟韧带，而McVay缝于耻骨梳韧带。
[题目] 464. 患者,男,42岁,因脾破裂行脾切除术。手术中处理脾门结构时,下列何结构较易受损()
A. 左肾上极
B. 结肠左曲
C. 胰尾
D. 胃大弯
E. 左肾上腺
[答案] C
[解析] 胰尾伸入脾肾韧带，紧邻脾门。脾切除处理脾门血管时，若操作不慎可损伤胰尾，引起胰瘘等并发症。左肾与脾之间有脾肾韧带间隔；结肠左曲位于脾下方。
[题目] 465. 患者,女性66岁,拟左半肝切除术,右半肝功能性血管是()
A. 肝门静脉右支
B. 肝右静脉
C. 肝右动脉右侧分支
D. 右肝管右侧分支
E. 肝短静脉
[答案] A
[解析] 肝脏的功能性血管系统为门静脉系统，右半肝的功能性血管为肝门静脉右支。肝右静脉为肝静脉属支，属于出肝血管系统；肝右动脉为营养性血管。
[题目] 466. 胰腺肿瘤压迫胆总管,肿瘤多位于()
A. 胰颈
B. 胰管
C. 胰体
D. 胰尾
E. 胰头
[答案] E
[解析] 胆总管在胰头后方下行，胰头肿瘤可压迫胆总管导致梗阻性黄疸。胰头与胆总管解剖关系密切，胰体、胰尾肿瘤距离胆总管较远，一般不引起胆道压迫。
[题目] 467. 与门静脉汇合处相关的部位是()
A. 胰体
B. 胰尾
C. 胰颈
D. 胰管
E. 胰头
[答案] C
[解析] 肠系膜上静脉与脾静脉在胰颈后方汇合形成肝门静脉。胰颈是胰头与胰体之间的狭窄部，位于门静脉起始部的前方，是门静脉汇合处的重要解剖标志。
[题目] 468. 左肾上端平对()
A. 第12胸椎体上缘
B. 第3腰椎体上缘
C. 第1腰椎体
D. 第11胸椎体下缘
E. 第2腰椎体下缘
[答案] D
[解析] 左肾位置高于右肾（因肝脏占据右侧），左肾上端平第11胸椎体下缘，下端平第2腰椎体下缘。肾门约平第1腰椎体。
[题目] 469. 右肾上端平对()
A. 第1腰椎体
B. 第3腰椎体上缘
C. 第12胸椎体上缘
D. 第2腰椎体下缘
E. 第11胸椎体下缘
[答案] C
[解析] 右肾受肝脏影响位置较左肾低约半个椎体，右肾上端平第12胸椎体上缘，下端平第3腰椎体上缘。
[题目] 470. 右肾下端平对()
A. 第2腰椎体下缘
B. 第11胸椎体下缘
C. 第1腰椎体
D. 第3腰椎体上缘
E. 第12胸椎体上缘
[答案] D
[解析] 右肾下端平第3腰椎体上缘。右肾位置低于左肾，上端平T12上缘，下端平L3上缘。
[题目] 471. 左肾下端平对()
A. 第3腰椎体上缘
B. 第2腰椎体下缘
C. 第1腰椎体
D. 第11胸椎体下缘
E. 第12胸椎体上缘
[答案] B
[解析] 左肾下端平第2腰椎体下缘。左肾上端平T11下缘，下端平L2下缘，整体位置较右肾高一椎体。
[题目] 472. 门脉高压引起食管静脉丛曲张会导致()
A. 腹痛
B. 海蛇头样改变
C. 腹胀
D. 便血
E. 呕血
[答案] E
[解析] 门脉高压时，食管胃底静脉丛（门静脉通过胃左静脉与奇静脉的吻合）曲张破裂，导致上消化道大出血，表现为呕血。食管静脉丛曲张破裂是最危险的门脉高压并发症，血液经食管呕出。
[题目] 473. 门脉高压引起的直肠静脉丛曲张会导致()
A. 海蛇头样改变
B. 便血
C. 腹痛
D. 腹胀
E. 呕血
[答案] B
[解析] 门脉高压时直肠静脉丛（门静脉通过肠系膜下静脉与髂内静脉的吻合）曲张形成痔，破裂后出现便血。直肠上静脉汇入门静脉系统，直肠中下静脉汇入腔静脉系统，形成门-腔静脉吻合。
[题目] 474. 门脉高压引起的脐周静脉网曲张会导致()
A. 腹痛
B. 海蛇头样改变
C. 腹胀
D. 便血
E. 呕血
[答案] B
[解析] 门脉高压时脐周静脉网（附脐静脉与腹壁浅静脉的吻合）曲张，表现为脐周放射状曲张静脉，外观像海蛇头（Caput Medusae）。这是门静脉通过附脐静脉与腹壁静脉形成侧支循环的典型体征。
[题目] 475. 男性腹膜腔最低部位是()
A. 直肠子宫陷凹
B. 坐骨直肠窝
C. 直肠膀胱陷凹
D. 膀胱旁窝
E. 膀胱子宫陷凹
[答案] C
[解析] 男性骨盆腔腹膜在直肠与膀胱之间返折形成直肠膀胱陷凹，是男性站立或坐位时腹膜腔最低部位。直肠子宫陷凹仅存在于女性；膀胱子宫陷凹为女性结构；坐骨直肠窝不在腹膜腔内。
[题目] 476. 女性腹膜腔最低部位是()
A. 直肠膀胱陷凹
B. 直肠子宫陷凹
C. 膀胱子宫陷凹
D. 膀胱旁窝
E. 坐骨直肠窝
[答案] B
[解析] 女性骨盆腔腹膜在直肠与子宫之间返折形成直肠子宫陷凹（Douglas窝），是女性站立或坐位时腹膜腔最低部位。膀胱子宫陷凹较浅；坐骨直肠窝为会阴部窝，不属于腹膜腔。
[题目] 477. 位于直肠和肛管两侧的是()
A. 直肠子宫陷凹
B. 直肠膀胱陷凹
C. 坐骨直肠窝
D. 膀胱子宫陷凹
E. 膀胱旁窝
[答案] C
[解析] 坐骨直肠窝位于肛管和直肠两侧，为肛提肌下方、坐骨内侧和闭孔内肌之间的楔形间隙，内含大量脂肪组织和血管神经。直肠子宫陷凹和直肠膀胱陷凹均为腹膜返折形成的盆腔隐窝。
[题目] 478. 属于肾皮质的结构是()
A. 肾柱
B. 肾盂
C. 肾筋膜
D. 肾乳头
E. 肾锥体
[答案] A
[解析] 肾柱是肾皮质伸入肾锥体之间的部分，属于肾皮质结构。肾锥体、肾乳头属于肾髓质；肾盂为集合系统；肾筋膜为肾的被膜。
[题目] 479. 出入肾门的结构是()
A. 肾盂
B. 肾柱
C. 肾筋膜
D. 肾锥体
E. 肾乳头
[答案] A
[解析] 肾盂是出入肾门的结构，收集肾大盏汇合的尿液经输尿管排出。肾柱为肾皮质成分，肾锥体和肾乳头为肾髓质，肾筋膜为被膜，均不出入肾门。
[题目] 480. 贴下腔静脉前方下行的是胆总管的()
A. 十二指肠壁段
B. 十二指肠上段
C. 十二指肠后段
D. 胰腺段
E. 肝胰壶腹
[答案] C
[解析] 胆总管十二指肠后段位于十二指肠第一段后方，紧贴下腔静脉前方下行，与门静脉伴行。十二指肠上段在肝十二指肠韧带内；胰腺段在胰头后方；十二指肠壁段穿行十二指肠壁。
[题目] 481. 在肝十二指肠韧带内行走的是胆总管的()
A. 胰腺段
B. 十二指肠上段
C. 肝胰壶腹
D. 十二指肠壁段
E. 十二指肠后段
[答案] B
[解析] 胆总管十二指肠上段走行于肝十二指肠韧带游离缘内，位于肝固有动脉右侧、门静脉前方。此段是胆总管探查术最常暴露的部分。
[题目] 482. 增厚的环形括约肌出现在()
A. 十二指肠壁段
B. 十二指肠上段
C. 肝胰壶腹
D. 十二指肠后段
E. 胰腺段
[答案] C
[解析] 肝胰壶腹（Vater壶腹）周围有肝胰壶腹括约肌（Oddi括约肌），是增厚的环形平滑肌结构，控制胆汁和胰液向十二指肠的排放。
[题目] 483. 对于腹壁扁肌的形成物,下列哪项描述错误()
A. 腹内斜肌和腹横肌下缘纤维移行为提睾肌
B. 腹股沟深环由腹横肌腱膜形成
C. 腹股沟管浅环由腹外斜肌腱膜形成
D. 联合腱由腹内斜肌和腹横肌共同形成
E. 扁肌腱膜参与形成腹白线
[答案] B
[解析] B描述错误：腹股沟管深环（腹环）由腹横筋膜向外突出形成，而非腹横肌腱膜形成。腹横筋膜是腹内筋膜的一部分，形成精索内筋膜并参与深环的构成。
[题目] 484. 腹外斜肌腱膜形成的结构不包括()
A. 腔隙韧带
B. 腹股沟镰
C. 反转韧带
D. 腹股沟韧带
E. 腹股沟管外口
[答案] B
[解析] 腹股沟镰（联合腱）由腹内斜肌腱膜和腹横肌腱膜汇合形成，并非腹外斜肌腱膜形成的结构。腔隙韧带、反转韧带、腹股沟韧带和腹股沟管外口（皮下环）均来源于腹外斜肌腱膜。
[题目] 485. 关于腹直肌鞘的叙述哪项错误()
A. 脐以下4〜5cm处鞘的后层形成弓状线
B. 鞘的前、后层在正中线融合形成(腹)白线
C. 脐以上平面腹横肌参与构成鞘的后层
D. 鞘外侧缘构成弓状线
E. 腹外斜肌腱膜参与构成鞘的前层
[答案] D
[解析] D描述错误：弓状线是腹直肌鞘后层在脐下4-5cm处形成的下缘游离弧形线，由腹直肌鞘后层下缘形成，而非由鞘外侧缘构成。
[题目] 486. 脐下6cm处,腹直肌后方紧贴()
A. 腹膜
B. 弓状线
C. 腹横肌腱膜
D. 腹横筋膜
E. 腹直肌鞘后层
[答案] D
[解析] 脐下约4-5cm处弓状线以下，腹直肌鞘后层缺如，腹直肌后方直接紧贴腹横筋膜。腹横筋膜深面是腹膜外脂肪和腹膜。
[题目] 487. 关于腹前外侧壁浅筋膜的描述,下列哪项是错误的()
A. 浅筋膜可分为浅层的Camper和深层的Scarpa筋膜
B. Scarpa筋膜越过腹股沟韧带附着于阔筋膜
C. 在男性,Scarpa筋膜可与Colles筋膜相续
D. 浅筋膜浅、深两层在脐平面愈合成一层
E. 浅筋膜深层向内附着于白线
[答案] D
[解析] D描述错误：浅筋膜的Camper层（浅层）和Scarpa层（深层）不会愈合成一层，两者始终保持分界。Camper层含脂肪，Scarpa层为膜性层，两者在脐平面以下结构分明，仅在阴囊等处有特殊延续。
[题目] 488. 脐内侧襞浅层腹膜外脂肪中经过的结构是()
A. 输精管
B. 脐动脉索
C. 旋髂深动脉
D. 脐尿管索
E. 腹壁下动脉
[答案] B
[解析] 脐内侧襞是腹膜皱襞，其深面腹膜外脂肪中包含脐动脉索（闭锁的脐动脉）。脐正中襞内含脐尿管索；脐外侧襞内含腹壁下动脉。
[题目] 489. 不通过腹股沟管的结构是()
A. 子宫圆韧带
B. 髂腹股沟神经
C. 精索
D. 髂腹下神经
E. 提睾肌
[答案] D
[解析] 髂腹下神经在腹股沟管上方走行于腹内斜肌和腹横肌之间，不进入腹股沟管。髂腹股沟神经通过腹股沟管；精索/子宫圆韧带、提睾肌均通过腹股沟管。
[题目] 490. 关于腹股沟镰(联合腱)的描述,正确的是()
A. 仅由腹横肌腱膜构成
B. 仅由腹股沟韧带构成
C. 仅由腹外斜肌腱膜构成
D. 参与腹股沟管后壁的组成
E. 仅由腹内斜肌腱膜构成
[答案] D
[解析] 腹股沟镰（联合腱）由腹内斜肌腱膜和腹横肌腱膜联合形成，止于耻骨梳，参与构成腹股沟管后壁的内侧部。它不是由单一肌肉的腱膜构成。
[题目] 491. 精索内筋膜来自()
A. 腹膜
B. 腹横肌
C. 腹外斜肌腱膜
D. 腹内斜肌
E. 腹横筋膜
[答案] E
[解析] 精索内筋膜是腹横筋膜在腹股沟管深环处向外延续形成的筋膜。腹外斜肌腱膜形成精索外筋膜；腹内斜肌和腹横肌形成提睾肌和提睾筋膜。
[题目] 492. 有关腹股沟区薄弱的原因,下列错误的是()
A. 腹内斜肌与腹横肌下缘游离,与腹股沟韧带之间有距离
B. 腹横筋膜形成深环口
C. 腹外斜肌在此区移行为腱膜
D. 腹外斜肌腱膜形成浅环口
E. 腹股沟韧带与髂骨之间存在肌腔隙和血管腔隙
[答案] E
[解析] E描述错误：腹股沟韧带与髂骨之间的肌腔隙和血管腔隙是正常解剖结构，容纳髂腰肌、股神经和股血管通过，并非腹股沟区薄弱的原因。真正的薄弱原因包括：腹内斜肌与腹横肌下缘与腹股沟韧带间有间隙、深环和浅环的存在、腹外斜肌移行为腱膜等。
[题目] 493. 坐位或直立时,女性腹膜腔最低部位是()
A. 直肠子宫陷凹
B. 十二指肠空肠曲上隐窝
C. 网膜
D. 直肠膀胱陷凹
E. 肝肾隐
[答案] A
[解析] 坐位或直立时，女性腹膜腔最低部位为直肠子宫陷凹（Douglas窝），盆腔积液和积脓常首先积聚于此。仰卧位时肝肾隐窝成为最低点。
[题目] 494. 仰卧位时腹膜腔最低的部位是()
A. 十二指肠旁隐窝
B. 肝肾隐窝
C. 网膜囊
D. 左肝下前间隙
E. 左肝下前间隙
[答案] B
[解析] 仰卧位时肝肾隐窝（Morison窝）为腹膜腔最低部位，是腹腔积液最易积聚之处。半卧位或直立时盆腔陷凹（直肠子宫陷凹或直肠膀胱陷凹）成为最低点。
[题目] 495. 腹膜后间隙()
A. 内有升、降结肠
B. 肠系膜上动脉主干位于其内
C. 位于腹膜壁层与胸腰筋膜之间
D. 与肾筋膜前、后层之间的间隙在同一层次
E. 与腹膜外脂肪在同一个层次
[答案] E
[解析] 腹膜后间隙与腹膜外脂肪在解剖层次上属于同一层次，腹膜外脂肪是腹膜后间隙的组成部分，位于腹横筋膜与壁腹膜之间。升、降结肠虽为腹膜后位器官但具有独立系膜结构；肠系膜上动脉主干在腹膜腔内。
[题目] 496. 患者举重后斜疝修补,将腹内斜肌下缘和联合腱缝于耻骨梳韧带,加强()
A. 浅环口
B. 上壁
C. 前壁
D. 下壁
E. 后壁
[答案] E
[解析] 将腹内斜肌下缘和联合腱缝合于耻骨梳韧带即McVay法疝修补术，主要加强腹股沟管后壁。该术式将联合腱与耻骨梳韧带缝合，闭合股管上口并加强管后壁。
[题目] 497. 构成腹股沟管下壁的结构是()
A. 腹外斜肌腱膜
B. 反转韧带
C. 腹股沟韧带
D. 腔隙韧带
E. 耻骨梳韧带
[答案] C
[解析] 腹股沟韧带（腹股沟弓）构成腹股沟管下壁。腹股沟管上壁为腹内斜肌和腹横肌下缘；前壁为腹外斜肌腱膜；后壁为腹横筋膜和联合腱。
[题目] 498. 脐正中襞内有()
A. 脐静脉索
B. 旋髂深动脉
C. 脐动脉索
D. 腹壁下动脉
E. 脐尿管索
[答案] E
[解析] 脐正中襞为腹膜皱襞，内含脐尿管索（闭锁的脐尿管）。脐内侧襞内含脐动脉索；脐外侧襞内含腹壁下动脉。脐静脉索位于肝圆韧带内。
[多选题]
[题目] 499. 下列投影于右髂区内有()
A. 盲肠
B. 阑尾
C. 左肾下部
D. 回肠末端
E. 膀胱
[答案] ABD
[解析] 右髂区（右下腹）内投影的器官包括盲肠、阑尾和回肠末端。左肾下部位于左腰部；膀胱位于骨盆内耻骨后方，充盈时可超出骨盆但不在右髂区。
[题目] 500. 下列哪些结构不是腹外斜肌腱膜形成()
A. 腹股沟韧带
B. 陷窝韧带
C. 联合腱
D. 腹股沟管腹环
E. 腹股沟管皮下环
[答案] CD
[解析] 联合腱（腹股沟镰）由腹内斜肌和腹横肌腱膜形成；腹股沟管腹环（深环）由腹横筋膜形成——两者均非腹外斜肌腱膜形成。腹股沟韧带、陷窝韧带和皮下环则由腹外斜肌腱膜形成。
[题目] 501. 腹横筋膜()
A. 构成精索内筋膜
B. 是腹内筋膜的组成部分
C. 构成腹股沟管深环
D. 构成腹股沟管后壁
E. 半环线之下紧贴腹直肌后面
[答案] ABCDE
[解析] 腹横筋膜各方面描述均正确：构成精索内筋膜，是腹内筋膜的一部分，参与形成腹股沟管深环和后壁，在弓状线（半环线）以下紧贴腹直肌后面。
[题目] 502. 腹直肌鞘内有()
A. 腹壁下血管
B. 脐环
C. 腱划
D. 下6对肋间神经
E. 髂腹股沟神经
[答案] ACD
[解析] 腹直肌鞘内容纳腹直肌、腹壁下血管、腱划和下6对肋间神经（T7-T12肋间神经前皮支穿行）。脐环不在腹直肌鞘内；髂腹股沟神经走行于腹股沟管而非腹直肌鞘。
[题目] 503. 腹股沟三角(海氏三角)()
A. 外侧界为腹壁浅血管
B. 腹股沟斜疝的疝囊由此脱出
C. 下界是腹股沟韧带
D. 内侧界为腹直肌外缘
E. 腹股沟直疝的疝囊由此脱出
[答案] CDE
[解析] 海氏三角（腹股沟三角）下界为腹股沟韧带，内侧界为腹直肌外缘，外侧界为腹壁下动脉。腹股沟直疝疝囊经此三角直接向前膨出。斜疝经腹环进入腹股沟管，不经过此三角。
[题目] 504. 腹股沟斜疝的疝囊可经过()
A. 股环
B. 腹股沟内侧窝
C. 腹环
D. 腹股沟管
E. 皮下环
[答案] CDE
[解析] 腹股沟斜疝疝囊依次经过腹环（深环）→腹股沟管→皮下环（浅环）脱出入阴囊。斜疝不经过股环；腹股沟内侧窝是腹前壁内面腹膜凹陷，不是疝囊经过的结构。
[题目] 505. 腹股沟三角为腹前外侧壁的薄弱部位,因为()
A. 半环线以下没有腹直肌鞘后层
B. 浅筋膜内无膜性层
C. 腹外斜肌腱膜上出现皮下环
D. 腹横筋膜不同
E. 缺乏肌纤维
[答案] CE
[解析] 腹股沟三角薄弱原因：该区域缺乏腹内斜肌和腹横肌肌纤维覆盖（仅由腱膜构成），以及腹外斜肌腱膜上形成皮下环（浅环），造成腹壁缺损。
[题目] 506. 由腹内斜肌和腹横肌共同形成的结构是()
A. 腹股沟镰
B. 提睾肌
C. 腹股沟韧带
D. 耻骨梳韧带
E. 腹直肌鞘后层
[答案] ABE
[解析] 腹内斜肌和腹横肌共同形成：腹股沟镰（联合腱）、提睾肌（下缘肌纤维）和腹直肌鞘后层。腹股沟韧带仅由腹外斜肌腱膜形成；耻骨梳韧带为耻骨梳骨膜增厚。
[单选题]
[题目] 507. 胆囊三角的边界()
A. 肝脏面、肝总管、胆囊动脉
B. 肝左动脉、肝右动脉、肝脏面
C. 左肝管、右肝管、肝脏面
D. 肝脏面、肝总管、胆总管
E. 胆囊管、肝总管、肝脏面
[答案] E
[解析] 胆囊三角（Calot三角）由胆囊管、肝总管和肝脏面三者围成。三角内有胆囊动脉和肝右动脉的胆囊支通过，是胆囊切除术中寻找胆囊动脉的解剖标志。
[题目] 508. 下列结构中经过Calot三角的是()
A. 肝左动脉、胆囊动脉
B. 肝左动脉、肝右动脉、胆囊动脉
C. 胆总管、右肝管
D. 肝门静脉及其分支
E. 肝右动脉、胆囊动脉
[答案] E
[解析] Calot三角内走行的结构为肝右动脉发出的胆囊动脉及肝右动脉本身。胆总管位于三角下方；肝左动脉在肝门左侧；门静脉在胆总管和肝动脉后方。
[题目] 509. 出入第二肝门的结构是()
A. 肝左、右动脉
B. 肝左、中、右静脉
C. 门静脉左右支
D. 肝淋巴管
E. 肝左、右管
[答案] B
[解析] 第二肝门为肝静脉汇入下腔静脉处，肝左、中、右静脉于此出肝汇入下腔静脉。第一肝门出入肝动脉、门静脉和肝管。肝淋巴管和肝管不走第二肝门。
[题目] 510. 肝脏面横沟内出入的结构不包括()
A. 肝左、右静脉
B. 肝左、右动脉
C. 肝淋巴管
D. 肝左、右管
E. 门静脉左、右支
[答案] A
[解析] 肝脏面横沟即第一肝门，出入结构包括肝左、右动脉，门静脉左、右支，肝左、右管及肝淋巴管和神经。肝左、中、右静脉经第二肝门（肝后缘）出肝，不经过第一肝门。
[题目] 511. 无黄疸型的胆道阻塞,阻塞部位可能在()
A. 肝总管
B. 胆囊管
C. 胆总管
D. 肝左管
E. 肝右管
[答案] B
[解析] 胆囊管单独阻塞时，胆汁仍可通过肝总管和胆总管排入十二指肠，不引起梗阻性黄疸（无黄疸型胆道阻塞）。肝总管或胆总管阻塞则导致全部胆汁排出受阻，出现黄疸。
[题目] 512. 下列对肝脏体表投影的描述,哪一条是错误的()
A. 肝大部分位于右季肋区及腹上区
B. 幼儿的肝下界比成人的低2〜3cm
C. 肝下界不超过右侧肋弓下缘
D. 肝下界在剑突下可达5cm
E. 肝上界在右锁骨中线平第5肋
[答案] D
[解析] D描述错误：成人肝下界在剑突下通常不超过3cm，而非5cm。肝下界正常不超过右侧肋弓下缘（深吸气时可触及），幼儿肝下界较成人低2-3cm，肝上界在右锁骨中线平第5肋。
[题目] 513. 下列哪个器官没有参与组成肝外胆道()
A. 副胰管
B. 胆囊
C. 肝总管
D. 肝左管
E. 肝右管
[答案] A
[解析] 肝外胆道由肝左管、肝右管、肝总管、胆囊、胆囊管和胆总管组成。副胰管属于胰腺导管系统，不参与肝外胆道的组成。
[题目] 514. 脾门紧邻()
A. 肝左叶
B. 胰尾
C. 胃体
D. 结肠右曲
E. 胃底
[答案] B
[解析] 胰尾伸入脾肾韧带，紧邻脾门，是脾切除时易被损伤的结构。胃底位于脾门上方；结肠右曲在右侧与脾无关；肝左叶在右上方远离脾。
[题目] 515. 对十二指肠的描述,错误的是()
A. 降部后内侧壁有十二指肠大乳头,是胆总管的开口
B. 十二指肠悬肌固定十二指肠空肠曲于腹后壁
C. 球部为溃疡好发部位
D. 除始、末两端外,为腹膜外位器官
E. 分上部、降部、水平部和升部
[答案] A
[解析] A描述错误：十二指肠大乳头是胆总管和胰管（主胰管）的共同开口，而非仅胆总管的开口。十二指肠降部后内侧壁的大乳头为肝胰壶腹的开口处，收纳胆汁和胰液。
[题目] 516. 关于十二指肠悬韧带,下列错误的是()
A. 此韧带过短可使十二指肠水平部易受肠系膜上动脉压迫产生梗阻
B. 又称十二指肠悬肌或Treitz韧带
C. 是上、下消化道的分界标志
D. 是小肠起始部的标志
E. 由腹膜覆盖肌和纤维组织形成
[答案] D
[解析] D描述错误：十二指肠悬韧带（Treitz韧带）是上、下消化道的分界标志（十二指肠与空肠分界），但它不是小肠起始部的标志——十二指肠本身是小肠的起始部，悬韧带标记的是十二指肠空肠曲而非起始部。
[题目] 517. 下列结构中,前方有肠系膜上动、静脉跨过()
A. 十二指肠空肠曲
B. 十二指肠升部
C. 十二指肠降部
D. 十二指肠上部
E. 十二指肠水平部
[答案] E
[解析] 肠系膜上动、静脉从胰颈下缘穿出后，跨过十二指肠水平部前方进入小肠系膜根。十二指肠水平部夹在肠系膜上动脉与腹主动脉之间，当夹角过小可致肠系膜上动脉综合征。
[题目] 518. 关于十二指肠上部的毗邻,哪个是错误的()
A. 后方还有胃十二指肠动脉
B. 前方有胆囊
C. 下方为胰头
D. 后方有门静脉和胆总管
E. 上方为肝尾叶和肝十二指肠韧带
[答案] E
[解析] E描述错误：十二指肠上部上方为肝尾叶和肝十二指肠韧带，这是正确的解剖关系。题目问"哪个是错误的"，实际E项描述正确，故为错误选项。十二指肠上部后方有门静脉、胆总管和胃十二指肠动脉；前方毗邻胆囊；下方为胰头。
[题目] 519. 手术时确认幽门位置的重要标志是()
A. 幽门括约肌
B. 幽门前静脉
C. 胃十二指肠动脉
D. 胃右动脉起始处
E. 角切迹
[答案] B
[解析] 幽门前静脉（Mayo静脉）横跨幽门前方，是手术中确认幽门位置最可靠的重要标志。角切迹为胃小弯上的切迹，是胃体和幽门部的大体分界，但不如幽门前静脉精确。
[题目] 520. 胃短动脉行经()
A. 肝胃韧带
B. 胃脾韧带
C. 胃膈韧带
D. 肝十二指肠韧带
E. 胃胰韧带
[答案] B
[解析] 胃短动脉（4-5支）起自脾动脉或其脾支，行经胃脾韧带至胃底大弯侧。肝胃韧带内含胃左、右动脉；胃结肠韧带内含胃网膜左、右动脉。
[题目] 521. 胃床应除外()
A. 左肾上腺
B. 左肾
C. 肝尾状叶
D. 横结肠及其系膜
E. 胰
[答案] C
[解析] 胃床为胃后壁所贴靠的结构，包括膈、脾、胰、左肾、左肾上腺和横结肠及其系膜。肝尾状叶位于胃小弯上方，不构成胃床的一部分。
[题目] 522. 关于胃的描述,下列项错误的()
A. 胃分贲门部、胃底、胃体和幽门窦4部分
B. 胃后壁隔网膜囊与胰、脾、左肾、左肾上腺、膈、横结肠及其系膜相邻
C. 胃前壁与肝、膈和腹前壁相邻
D. 幽门瓣可防止十二指肠内容物逆流到胃
E. 角切迹是胃体和胃幽门窦在小弯侧的分界标志
[答案] A
[解析] A描述错误：胃的解剖分部应为贲门部、胃底、胃体和幽门部（幽门部可分为幽门窦和幽门管），选项中将幽门窦与胃底、胃体并列且漏了幽门管，表述不准确。
[题目] 523. 胃左动脉和胃右动脉行于()
A. 胃脾韧带内
B. 肝十二指肠韧带内
C. 膈胃韧带内
D. 胃结肠韧带内
E. 肝胃韧带内
[答案] E
[解析] 胃左动脉（来自腹腔干）和胃右动脉（来自肝固有动脉）走行于肝胃韧带（小网膜的一部分）内，沿胃小弯形成动脉弓。胃短动脉走行于胃脾韧带；胃网膜血管走行于胃结肠韧带。
[题目] 524. 胃大部分切除后,残胃的血供主要来自()
A. 胃网膜右动脉
B. 胃网膜左动脉
C. 胃右动脉
D. 胃短动脉
E. 胃左动脉
[答案] D
[解析] 胃大部分切除（通常切除远端2/3）后，残胃（胃底和贲门区）的血供主要来自胃短动脉（经胃脾韧带供应胃底）和膈下动脉分支。胃左动脉、胃右动脉和胃网膜血管均已在切除时被结扎。
[题目] 525. 钡剂在1、2腰椎前、肠系膜上动脉后方积聚,肠管是()
A. 横结肠
B. 十二指肠第四段
C. 十二指肠第二段
D. 十二指肠第三段
E. 十二指肠第一段
[答案] D
[解析] 钡剂在L1-L2前方、肠系膜上动脉后方积聚，受压肠管为十二指肠第三段（水平部）。十二指肠水平部于L3平面横过脊柱前方，从腹主动脉与肠系膜上动脉之间穿过，解剖位置与描述吻合。
[题目] 526. 胃后壁穿孔内容蔓延错误的是()
A. 可蔓延至右肠系膜窦
B. 可蔓延至右结肠旁沟
C. 可蔓延至肝肾隐窝
D. 可蔓延至右肝上间隙
E. 可蔓延至右髂窝
[答案] A
[解析] A描述错误：胃后壁穿孔内容物经网膜囊→网膜孔→肝肾隐窝→右结肠旁沟→右髂窝→盆腔蔓延。右肠系膜窦在右侧腹膜腔中部，与上述蔓延路径不通，故不易被累及。
[题目] 527. 左第9、10肋骨折易伤()
A. 脾
B. 肺
C. 肝
D. 肾
E. 胃
[答案] A
[解析] 脾位于左季肋区第9-11肋深面，与膈、膈结肠韧带相邻。左侧第9、10肋骨骨折的碎片可直接刺破脾脏导致脾破裂出血。肝在右侧，肾位置更靠后下方。
[多选题]
[题目] 528. 关于胆总管,下列正确的是()
A. 走行于肝固有动脉的左侧
B. 位于小网膜的右侧游离
C. 越过网膜孔,行经十二指肠前方
D. 经过胰头后方
E. 其末端有肝胰壶腹括约肌
[答案] BDE
[解析] 胆总管位于小网膜（肝十二指肠韧带）右侧游离缘内，经胰头后方下行，末端有肝胰壶腹括约肌环绕。胆总管走行于肝固有动脉的右侧（非左侧）；越过网膜孔行经十二指肠后方（非前方）。
[题目] 529. 胃后方的毗邻有()
A. 下腔静脉
B. 肝左叶
C. 左肾上腺
D. 腹主动脉
E. 胰
[答案] CE
[解析] 胃后方（胃床）主要毗邻为胰体和胰尾以及左肾上腺，两者紧贴胃后壁。下腔静脉和腹主动脉在脊柱前方，距胃后壁较远；肝左叶位于胃前方而非后方。
[单选题]
[题目] 530. 位于腹膜后间隙的器官应除外()
A. 胰腺
B. 十二指肠降部
C. 肾上腺
D. 十二指肠升部
E. 十二指肠水平部
[答案] D
[解析] 十二指肠升部较短，位于腹膜腔内（被腹膜包裹），不属于腹膜后位器官，应除外。胰腺、十二指肠降部和水平部、肾上腺均为腹膜后位器官。
[题目] 531. 对大肠的描述,下列错误的是()
A. 包括盲肠、阑尾、结肠、直肠和肛管5部分
B. 阑尾根部在盲肠后内侧壁,体表投影麦氏点
C. 回盲瓣由回肠末端环形肌增厚构成
D. 均有结肠带、结肠袋、肠脂垂
E. 阑尾动脉行于阑尾系膜游离缘
[答案] D
[解析] D描述错误：不是所有大肠都具有结肠带、结肠袋和肠脂垂。直肠和肛管不具有这三大形态特征（结肠带在直肠处分散为纵肌层，无结肠袋和肠脂垂）。其余描述均正确。
[题目] 532. 回肠上段位于()
A. 右腹外侧区
B. 腹下区
C. 脐区
D. 左髂区
E. 左腹外侧区
[答案] C
[解析] 回肠上段位于脐区（中腹部）。回肠末段位于右髂区和盆腔；空肠位于左腹外侧区和脐区。
[题目] 533. 手术找阑尾依据()
A. 在盲肠处寻找
B. 循结肠寻找
C. 循结肠带寻找
D. 循阑尾动脉寻找
E. 循回盲瓣寻找
[答案] C
[解析] 结肠带（结肠前纵肌带）在盲肠处汇聚于阑尾根部，手术中沿结肠带向下追踪即可找到阑尾根部。这是阑尾切除术中最经典的寻找阑尾的方法。
[题目] 534. 下列哪个器官血液不汇入门静脉()
A. 胰
B. 胃
C. 肠
D. 肝
E. 脾
[答案] D
[解析] 肝的血液（肝静脉）直接汇入下腔静脉，不汇入门静脉。胰、胃、肠、脾的静脉血均经相应的属支汇入门静脉，进入肝脏进行代谢。
[题目] 535. 门静脉及胆总管位于()
A. 胃脾韧带内
B. 脾肾韧带内
C. 胃结肠韧带内
D. 肝十二指肠韧带内
E. 肝胃韧带内
[答案] D
[解析] 门静脉和胆总管位于肝十二指肠韧带（小网膜右侧部）内，门静脉在后方，胆总管居右前方，肝固有动脉居左前方。肝胃韧带内含胃左、右动脉和胃冠状静脉。
[题目] 536. 肾门腹前壁投影()
A. 第12肋下缘与竖脊肌外缘交角
B. 第9肋前端
C. 第1腰椎
D. 第3腰椎上缘
E. 第11胸椎下缘
[答案] B
[解析] 肾门在腹前壁的体表投影为第9肋前端（距正中线约5cm处），相当于肾门在腹前壁的对应位置。第12肋下缘与竖脊肌外缘交角为肾区（肋脊角）的体表投影（背部）。
[题目] 537. 肾结构错误的是()
A. 肾门向肾内延续肾窦
B. 肾髓质主要肾锥体
C. 皮质约占1/3
D. 肾有4层被膜
E. 肾脂肪囊入肾窦
[答案] D
[解析] D描述错误：肾有3层被膜（肾筋膜、肾脂肪囊和肾纤维膜），而非4层。肾门向肾内延续为肾窦；髓质由肾锥体构成；皮质占肾实质约1/3；肾脂肪囊的内侧延伸入肾窦。
[题目] 538. 肾蒂从上到下()
A. 肾盂、肾静脉、肾动脉
B. 肾静脉、肾盂、肾动脉
C. 肾动脉、肾静脉、肾盂
D. 肾盂、肾动脉、肾静脉
E. 肾静脉、肾动脉、肾盂
[答案] C
[解析] 肾蒂主要结构从前向后为：肾静脉→肾动脉→肾盂。题干问"从上到下"指垂直方向，肾动脉位置最高，肾静脉在动脉前下方，肾盂最靠下（后方）。
[题目] 539. 肾毗邻错误的是()
A. 右肾前:十二指肠降部、肝右叶、结肠右曲
B. 肾后:腰大肌、腰方肌
C. 12肋上邻膈胸膜
D. 肾上邻肾上腺
E. 右肾内侧腹主动脉、左肾下腔静脉
[答案] E
[解析] E描述错误：右肾内侧毗邻下腔静脉，左肾内侧毗邻腹主动脉，而非"右肾内侧腹主动脉、左肾内侧下腔静脉"，选项将两者关系完全颠倒。
[题目] 540. 胰颈后方()
A. 脾动脉
B. 胰十二指肠动脉
C. 腹腔干
D. 肝门静脉
E. 十二指肠
[答案] D
[解析] 肝门静脉在胰颈后方由肠系膜上静脉和脾静脉汇合形成，胰颈正好跨过门静脉起始部前方。脾动脉沿胰体上缘走行；腹腔干在胰上方。
[题目] 541. 胰头后方()
A. 十二指肠降部
B. 腹主动脉
C. 右肾
D. 胆总管
E. 肠系膜动静脉
[答案] D
[解析] 胰头被十二指肠"C"形围绕，胰头后方有胆总管下行（胰腺段），是胰头癌压迫胆总管引起梗阻性黄疸的解剖学基础。肠系膜上动静脉在胰颈后方而非胰头后方。
[题目] 542. 左肾脓肿牵涉痛到肩是累及()
A. 胃
B. 胰腺
C. 结肠脾曲
D. 膈
E. 十二指肠
[答案] D
[解析] 肾和膈神经均受C3-C5节段支配（膈神经为C3-C5），左肾脓肿和炎症可刺激膈神经引起左肩部牵涉痛。胰腺、胃和结肠的牵涉痛部位不同。
[题目] 543. 输尿管腹段结石常在()
A. 右肾门
B. 左髂总动脉末端前方
C. 左髂外起始前方
D. 左输尿管中点
E. 左髂外远端
[答案] B
[解析] 输尿管腹段在骨盆入口处跨越髂总动脉末端（或髂外动脉起始部）前方，此狭窄处是输尿管结石最易嵌顿的三个部位之一。其余两处为肾盂输尿管移行处和输尿管膀胱壁内段。
[题目] 544. 左肾静脉栓塞致睾丸肿痛()
A. 下腔
B. 阴部内
C. 阴部外
D. 左肾静脉
E. 腹壁下
[答案] D
[解析] 左肾静脉栓塞导致左睾丸（卵巢）静脉回流受阻。左睾丸静脉汇入左肾静脉（而右睾丸静脉直接汇入下腔静脉），故左肾静脉栓塞时左睾丸静脉血回流不畅，引起睾丸淤血肿痛。
[多选题]
[题目] 545. 关于阑尾,下列正确的是
A. 麦氏点:脐-右髂前上棘中外1/3
B. 国人盲肠下位多见
C. 沿结肠带找阑尾
D. 位于右髂区
E. 静脉入门静脉
[答案] ACDE
[解析] 国人阑尾以回肠后位和盲肠后位多见，而非盲肠下位多见。麦氏点为脐-右髂前上棘中外1/3处；手术沿结肠带找阑尾；阑尾位于右髂区；阑尾静脉经回结肠静脉→肠系膜上静脉→门静脉。
[题目] 546. 属于门静脉属支的有()
A. 肠系膜上静脉
B. 肾静脉
C. 胆囊静脉
D. 肝静脉
E. 脾静脉
[答案] ACE
[解析] 门静脉属支包括肠系膜上静脉、脾静脉、肠系膜下静脉、胃左静脉、胃右静脉、胆囊静脉和附脐静脉等。肾静脉和肝静脉属于下腔静脉属支，不汇入门静脉。
[题目] 547. 关于门静脉,下列正确的是()
A. 对肝灌流70%~80%
B. 内有瓣膜
C. 左前方胆道
D. 后方隔网膜孔对下腔静脉
E. 始于胰颈后方
[答案] DE
[解析] 门静脉后方隔网膜孔与下腔静脉相对（可经网膜孔实施门-腔静脉吻合），门静脉始于胰颈后方（肠系膜上静脉与脾静脉汇合处）。门静脉对肝灌流约占70-75%（非70-80%）；门静脉内无瓣膜；门静脉的右前方是胆总管。
[题目] 548. 右肾前面毗邻()
A. 结肠右曲
B. 肝右叶
C. 胰头
D. 十二指肠
E. 胆囊
[答案] ABD
[解析] 右肾前面毗邻：肝右叶（上外侧）、十二指肠降部（内侧）和结肠右曲（下外侧）。胰头位于右肾前方内侧但距离较远，不直接毗邻；胆囊位于肝下面，不直接与右肾前面毗邻。
[题目] 549. 有关肾的毗邻,下列正确的是()
A. 12肋上邻膈胸膜
B. 右肾前:十二指肠降部、肝右叶、结肠右曲
C. 肾上邻肾上腺
D. 右肾内侧腹主动脉,左肾下腔静脉
E. 肾后:腰大肌、腰方肌
[答案] ABCE
[解析] 关于肾毗邻的正确描述：第12肋上方毗邻膈和膈胸膜；右肾前方毗邻十二指肠降部、肝右叶和结肠右曲；肾上方毗邻肾上腺；肾后方毗邻腰大肌、腰方肌和腹横肌腱膜。D项将左、右肾内侧毗邻关系颠倒（应为右肾内侧下腔静脉、左肾内侧腹主动脉），故错误。

[章节] 颈部
[单选题]
[题目] 550. 下面关于固有颈部描述正确的是 ()
A. 斜方肌覆盖的深部与脊柱颈部之间的部分
B. 两侧斜方肌前缘之间和脊柱颈部的前方
C. 两侧胸锁乳突肌后缘之间的部分
D. 两侧胸锁乳突肌前缘之间的部分
E. 两侧斜方肌后缘和脊柱
[答案] B
[解析] 固有颈部位于两侧斜方肌前缘之间和脊柱颈部的前方。A错在斜方肌覆盖的深部为项部；C为颈后三角的界定，非固有颈部；D仅指颈前区；E描述不完整。
[题目] 551. 椎前间隙是指 ()
A. 位于颈筋膜中层与深层之间
B. 位于脊柱颈段、颈深肌群与椎前筋膜之间
C. 直接与气管前间隙相通
D. 直接与咽后间隙相通
E. 位于椎前筋膜与内脏筋膜之间
[答案] B
[解析] 椎前间隙位于脊柱颈段、颈深肌群与椎前筋膜之间。A错在颈筋膜中层与深层间为咽后间隙；C和D错在椎前间隙与气管前间隙/咽后间隙并不直接相通；E错在椎前筋膜与内脏筋膜间为咽后间隙。
[题目] 552. 咽后间隙是指 ()
A. 位于气管前筋膜与气管颈部之间
B. 位于椎前筋膜与内脏筋膜之间
C. 位于颈筋膜中层与深层之间
D. 位于椎前筋膜与颊咽筋膜之间
E. 位于脊柱颈段、颈深肌群与椎前筋膜之间
[答案] D
[解析] 咽后间隙位于椎前筋膜与颊咽筋膜之间。A为气管前间隙位置；B和C描述不准确；E为椎前间隙。
[题目] 553. 包绕胸锁乳突肌、斜方肌的颈筋膜是 ()
A. 颈部浅筋膜
B. 颈筋膜深层
C. 封套筋膜
D. 气管前筋膜
E. 椎前筋膜
[答案] C
[解析] 封套筋膜（颈筋膜浅层）分两层包绕胸锁乳突肌和斜方肌。A为颈浅筋膜，不含肌肉；B为颈筋膜深层（椎前筋膜）；D包裹甲状腺等内脏结构。
[题目] 554. 腋鞘是由哪层颈筋膜构成 ()
A. 椎前筋膜
B. 颈动脉鞘
C. 颈部浅筋膜
D. 封套筋膜
E. 气管前筋膜
[答案] A
[解析] 腋鞘由椎前筋膜向下延续形成，包裹臂丛和腋血管。B颈动脉鞘为独立结构非筋膜层；C浅筋膜不形成腋鞘；D封套筋膜包绕胸锁乳突肌等；E气管前筋膜形成内脏筋膜鞘。
[题目] 555. 颈动脉三角的浅面是 ()
A. 皮肤、颈筋膜浅层、胸锁乳突肌
B. 皮肤、浅筋膜、内脏筋膜、椎前筋膜
C. 皮肤、颈筋膜浅层、中层、深层
D. 皮肤、浅筋膜、颈阔肌、胸锁乳突肌
E. 皮肤、浅筋膜、颈阔肌、颈筋膜浅层
[答案] E
[解析] 颈动脉三角浅面由皮肤、浅筋膜、颈阔肌、颈筋膜浅层构成。A和D缺少颈阔肌；B内脏筋膜和椎前筋膜位于深面而非浅面；C缺少颈阔肌。
[题目] 556. 颈动脉三角的深面是 ()
A. 咽侧壁及其筋膜
B. 内脏筋膜与椎前筋膜
C. 颈筋膜浅层与胸锁乳突肌
D. 椎前筋膜
E. 颈阔肌与颈筋膜浅层
[答案] D
[解析] 颈动脉三角深面为椎前筋膜。A咽侧壁位于内侧而非深面；B内脏筋膜与椎前筋膜之间为咽后间隙；C颈筋膜浅层和胸锁乳突肌构成其浅面。
[题目] 557. 气管切开术时由浅入深依次经 ()
A. 皮肤、浅筋膜、颈筋膜浅层、颈阔肌、气管前筋膜
B. 皮肤、浅筋膜、颈筋膜浅层、颈阔肌、胸骨上间隙、椎前筋膜
C. 皮肤、浅筋膜、颈筋膜浅层、颈阔肌、舌骨下肌群、气管前筋膜
D. 皮肤、浅筋膜、颈筋膜浅层、颈阔肌、甲状腺峡、气管前筋膜
E. 皮肤、浅筋膜、颈筋膜浅层、舌骨下肌群、气管前筋膜
[答案] E
[解析] 气管切开依次经皮肤、浅筋膜、颈筋膜浅层、舌骨下肌群、气管前筋膜。A和D含颈阔肌错误（正中线无颈阔肌）；B含椎前筋膜错误（椎前筋膜在脊柱前方）。
[题目] 558. 甲状腺下动脉来自 ()
A. 椎动脉
B. 头臂干
C. 颈总动脉
D. 胸廓内动脉
E. 甲状颈干
[答案] E
[解析] 甲状腺下动脉来自甲状颈干。A椎动脉不分支至甲状腺；B头臂干为上级血管不直接发出此支；C颈总动脉不直接分支此动脉；D胸廓内动脉分支至胸壁。
[题目] 559. 甲状腺最下动脉通常来自 ()
A. 甲状颈干
B. 胸廓内动脉
C. 升主动脉
D. 颈总动脉
E. 头臂干
[答案] E
[解析] 甲状腺最下动脉通常来自头臂干。A甲状颈干发出甲状腺下动脉；B胸廓内动脉偶发此支但非常见来源；C升主动脉和D颈总动脉均非常见来源。
[题目] 560. 有关甲状腺静脉描述正确的是 ()
A. 甲状腺上、下、最下静脉
B. 甲状腺上、中、下静脉
C. 甲状腺上、下静脉
D. 甲状腺上、中静脉
E. 甲状腺中、下静脉
[答案] B
[解析] 甲状腺静脉包括上、中、下三对静脉。A无"最下静脉"；C只有上、下静脉，缺少中静脉；D缺少下静脉；E缺少上静脉。
[题目] 561. 锁骨下动脉被前斜角肌覆盖的是 ()
A. 第2段
B. 第5段
C. 第4段
D. 第1段
E. 第3段
[答案] A
[解析] 锁骨下动脉被前斜角肌分为三段，第2段位于前斜角肌后方（被其覆盖）。第1段在前斜角肌内侧，第3段在前斜角肌外侧。无第4、5段之分。
[题目] 562. 椎动脉来自锁骨下的
A. 第4段
B. 第1段
C. 第5段
D. 第3段
E. 第2段
[答案] B
[解析] 椎动脉起自锁骨下动脉第1段（前斜角肌内侧段）。第2段被前斜角肌覆盖，第3段在前斜角肌外侧。椎动脉并不是从第2、3段发出。
[题目] 563. 正确结扎甲状腺下动脉的方法是 ()
A. 甲状腺侧叶内侧
B. 在甲状腺峡部结扎
C. 远离甲状腺下极结扎
D. 以上都不正确
E. 紧贴甲状腺下极结扎
[答案] C
[解析] 甲状腺下动脉结扎应远离甲状腺下极，以免损伤喉返神经。A和B错误；E紧贴下极结扎极易损伤喉返神经，为禁忌操作。
[题目] 564. 下颌下腺由哪块筋膜包裹 ()
A. 椎前筋膜
B. 颈筋膜中层
C. 颈筋膜浅层
D. 颊咽筋膜
E. 颈浅筋膜
[答案] C
[解析] 下颌下腺由颈筋膜浅层（封套筋膜）包裹形成筋膜鞘。A椎前筋膜位于脊柱前；B颈筋膜中层包裹内脏结构；D颊咽筋膜位于咽后壁；E颈浅筋膜为皮下疏松组织不包裹腺体。
[题目] 565. 气管食管旁沟内有 ()
A. 迷走神经
B. 颈丛
C. 喉上神经
D. 喉返神经
E. 喉下神经
[答案] D
[解析] 气管食管旁沟内有喉返神经上行。A迷走神经位于颈动脉鞘内；B颈丛位于胸锁乳突肌深面；C喉上神经位置较高；E喉下神经为喉返神经终支，但旁沟内走行的主干是喉返神经。
[题目] 566. Horner综合征的出现,是因为甲状腺肿大压迫了 ()
A. 迷走神经
B. 喉返神经
C. 喉上神经
D. 喉下神经
E. 颈交感干
[答案] E
[解析] Horner综合征（瞳孔缩小、眼睑下垂、面部无汗）由颈交感干受压所致。A迷走神经受压导致内脏症状；B喉返神经受压导致声嘶；C和D受压分别导致音调降低和声嘶，均非Horner综合征。
[题目] 567. 不属于颈动脉三角内结构的是 ()
A. 颈外静脉
B. 迷走神经及其分支
C. 颈内静脉及其属支
D. 颈总动脉及其分支
E. 舌下神经及其降支
[答案] A
[解析] 颈外静脉沿胸锁乳突肌浅面下行，不位于颈动脉三角内。B迷走神经、C颈内静脉、D颈总动脉及其分支、E舌下神经及其降支均位于颈动脉三角内。
[题目] 568. 不位于胸锁乳突区的结构是 ()
A. 颈袢
B. 颈交感干
C. 臂丛
D. 颈动脉鞘
E. 颈丛
[答案] C
[解析] 臂丛穿过斜角肌间隙进入锁骨上三角，不位于胸锁乳突区。A颈袢、B颈交感干、D颈动脉鞘、E颈丛均位于胸锁乳突肌深面的胸锁乳突区内。
[题目] 569. 不属于颈根部的结构是 ()
A. 膈神经
B. 胸导管
C. 胸膜顶
D. 锁骨下动脉
E. 颈丛
[答案] E
[解析] 颈丛位于胸锁乳突肌深面，不属于颈根部结构。A膈神经、B胸导管（左侧）、C胸膜顶、D锁骨下动脉均位于颈根部。
[题目] 570. 不属于气管前间隙的结构是 ()
A. 小儿头臂干和左头臂静脉
B. 颈静脉弓
C. 小儿胸腺上部
D. 甲状腺下静脉
E. 甲状腺奇静脉丛
[答案] B
[解析] 颈静脉弓位于胸骨上间隙而不是气管前间隙。A小儿头臂干和左头臂静脉、C小儿胸腺上部、D甲状腺下静脉、E甲状腺奇静脉丛均位于气管前间隙内。
[题目] 571. 关于膈神经描述正确的是 ()
A. 前斜角肌前面
B. 前斜角肌深面
C. 中斜角肌后面
D. 椎前筋膜浅面
E. 后斜角肌前面
[答案] A
[解析] 膈神经经前斜角肌前面下行进入胸腔。B错在膈神经并不走行于前斜角肌深面；C中斜角肌后面无膈神经；E后斜角肌前方亦非膈神经走行处。
[题目] 572. 锁骨上大窝在 ()
A. 锁骨上缘
B. 锁骨上缘中1/3上方
C. 锁骨上缘外1/3上方
D. 锁骨上缘与第1肋之间
E. 锁骨上缘内 1/3 上方
[答案] B
[解析] 锁骨上大窝位于锁骨上缘中1/3上方，在体表呈明显凹陷，又称锁骨上三角。A锁骨上缘范围过大；C外1/3为锁骨上小窝；E内1/3非锁骨上大窝位置。
[题目] 573. 胸骨上窝在 ()
A. 锁骨上缘与第1肋之间
B. 锁骨上缘中1/3上方
C. 胸锁乳突肌的胸骨头、锁骨头与锁骨的胸骨端上缘之间区域,为颈丛皮支的麻醉阻滞点
D. 胸骨柄颈静脉切迹上方的凹陷处
E. 锁骨上缘内1/3上方
[答案] D
[解析] 胸骨上窝位于胸骨柄颈静脉切迹上方的凹陷处。A错误，那是锁骨上大窝的位置；B错误；C描述的是锁骨上小窝；E为锁骨上缘内1/3上方，非胸骨上窝。
[题目] 574. 锁骨上小窝在 ()
A. 锁骨上缘与第1肋之间
B. 锁骨上缘中1/3上方
C. 锁骨上缘外1/3上方
D. 锁骨上缘内1/3上方
E. 胸锁乳突肌的胸骨头、锁骨头与锁骨的胸骨端上缘之间区域
[答案] E
[解析] 锁骨上小窝位于胸锁乳突肌胸骨头、锁骨头与锁骨胸骨端上缘之间，是颈丛皮支的麻醉阻滞点。A锁骨上缘为锁骨上大窝位置；B为锁骨大窝；D内1/3上方范围不准确。
[题目] 575. 下面哪一个可以作为臂丛神经阻滞麻醉部位 ()
A. 锁骨外侧1/3上方
B. 锁骨内侧1/3下方
C. 锁骨内侧1/3上方
D. 锁骨外侧1/3下方
E. 锁骨中点上方
[答案] E
[解析] 臂丛神经阻滞麻醉在锁骨中点上方进行，此处臂丛经斜角肌间隙穿出，位置表浅且集中。A外侧1/3为锁骨上小窝；B、D在锁骨下方不适用；C内侧1/3位置偏内不可取。
[题目] 576. 颈阔肌受哪条神经支配 ()
A. 耳大神经
B. 锁骨上神经
C. 面神经颈支
D. 颈横神经
E. 枕小神经
[答案] C
[解析] 颈阔肌受面神经颈支支配，面神经颈支自腮腺下端穿出后进入颈阔肌深面。A耳大神经、B锁骨上神经、D颈横神经、E枕小神经均为颈丛皮支，支配相应皮肤感觉。
[题目] 577. 颈根部的位置是 ()
A. 颈部与胸膜顶之间的区域
B. 颈前区与胸骨颈静脉切迹之间的区域
C. 颈外侧区的根部
D. 颈前区与胸廓上口的相接区域
E. 颈部与胸部、上肢之间的相接区域
[答案] E
[解析] 颈根部是颈部与胸部、上肢之间的相接区域。A仅描述了颈与胸膜顶关系；B仅指颈前区；C仅指颈外侧区根部；D仅指颈前区与胸廓上口，均不全面。
[题目] 578. 颈动脉三角浅面不包括 ()
A. 皮肤
B. 浅筋膜
C. 封套筋膜
D. 颊咽筋膜
E. 颈阔肌
[答案] D
[解析] 颊咽筋膜位于咽后壁深面，不属于颈动脉三角浅面。颈动脉三角浅面由皮肤、浅筋膜、颈阔肌和封套筋膜构成。A、B、C、E均为浅面层次。
[题目] 579. 椎动脉三角的边界是 ()
A. 由前斜角肌、胸锁乳突肌前缘、锁骨下动脉第一段围成
B. 由前斜角肌外侧缘、颈长肌外侧缘、锁骨下动脉第一段围成
C. 由前斜角肌外侧缘、颈长肌内侧缘、锁骨下动脉第一段围成
D. 由前斜角肌内侧缘、颈长肌内侧缘、锁骨下动脉第一段围成
E. 由前斜角肌内侧缘、颈长肌外侧缘、锁骨下动脉第一段围成
[答案] E
[解析] 椎动脉三角由前斜角肌内侧缘、颈长肌外侧缘和锁骨下动脉第一段围成。A胸锁乳突肌前缘不参与；B和C外侧缘/内侧缘组合错误。
[题目] 580. 甲状腺峡部位于 ()
A. 第1~3气管软骨前
B. 第2~4气管软骨前方
C. 第1~5气管软骨前方
D. 第1~4气管软骨前方
E. 第3~6气管软骨前方
[答案] B
[解析] 甲状腺峡部位于第2~4气管软骨前方。A、C、D、E所描述的位置均与该标准解剖位置不符。
[题目] 581. 勾绕主动脉弓的神经是 ()
A. 膈神经
B. 迷走神经
C. 喉返神经
D. 喉上神经内支
E. 喉上神经外支
[答案] C
[解析] 左喉返神经勾绕主动脉弓后上行，是此解剖位置的标志性特征。A膈神经经前斜角肌前；B迷走神经经肺根后方；D和E喉上神经分支位于甲状软骨附近，不接触主动脉弓。
[题目] 582. 甲状腺切除手术结扎甲状腺上动脉时应 ()
A. 在甲状腺上极上方0.5~1.0cm处
B. 在甲状腺动脉进入甲状腺处结扎
C. 远离甲状腺上极
D. 紧贴甲状腺上极
E. 在甲状腺上动脉起始处
[答案] D
[解析] 甲状腺上动脉结扎应紧贴甲状腺上极，以避免损伤喉上神经外支（该神经在距上极约1cm处离开动脉转向内侧）。A在起始处结扎风险大；C远离上极易损伤喉上神经外支。
[题目] 583. 有关胸骨上间隙正确的是 ()
A. 颈筋膜浅层的深、浅两层之间
B. 颈浅筋膜与颈筋膜浅层之间
C. 颈浅筋膜的深、浅两层之间
D. 位于脊柱颈部、颈深肌群与椎前筋膜之间
E. 颈筋膜深层与内脏筋膜之间
[答案] A
[解析] 胸骨上间隙位于颈筋膜浅层（封套筋膜）分出的深、浅两层之间，内含颈静脉弓。B位于浅筋膜与颈筋膜浅层之间；D为椎前间隙；E为咽后间隙。
[题目] 584. 关于下颌下三角描述正确的是 ()
A. 同侧二腹肌前、后腹与下颌骨下缘
B. 左、右二腹肌前腹和舌骨体
C. 左、右二腹肌前腹和下颌骨下缘
D. 同侧二腹肌前、后腹与舌骨体
E. 同侧二腹肌前、后腹与下颌骨上缘
[答案] A
[解析] 下颌下三角由同侧二腹肌前、后腹与下颌骨下缘围成。B为颏下三角；C描述不完整；D舌骨体非下颌下三角边界；E下颌骨上缘非下缘。
[题目] 585. 关于颏下三角描述正确的是 ()
A. 左、右二腹肌后腹与舌骨体上缘之间
B. 左、右二腹肌前腹与舌骨体上缘之间
C. 左、右二腹肌后腹之间
D. 左、右二腹肌前腹之间
E. 左、右二腹肌前、后腹之间
[答案] B
[解析] 颏下三角由左右二腹肌前腹与舌骨体上缘围成。A和C为二腹肌后腹不参与颏下三角；D仅含二腹肌前腹丢失舌骨体；E含有后腹不正确。
[题目] 586. 下面哪个结构不是位于颈阔肌深面 ()
A. 颈前静脉
B. 颈外静脉
C. 皮肤
D. 颈前和颈外侧浅淋巴结
E. 颈丛的皮支以及面神经的颈支
[答案] C
[解析] 皮肤位于颈阔肌浅面而非深面。A颈前静脉、B颈外静脉、D颈浅淋巴结、E颈丛皮支和面神经颈支均走行于颈阔肌深面的浅筋膜内。
[题目] 587. 颈丛皮支阻滞麻醉部位是 ()
A. 胸锁乳突肌后缘中点
B. 斜方肌前缘中点
C. 胸锁乳突肌前缘中点
D. 胸锁乳突肌前缘上、中1/3交界处
E. 胸锁乳突肌后缘上、中1/3交界处
[答案] A
[解析] 颈丛皮支阻滞麻醉部位在胸锁乳突肌后缘中点，此处颈丛皮支集中浅出颈筋膜。B斜方肌前缘中点不适用；C前缘中点非阻滞点；D和E为上、中1/3交界处，非标准阻滞位。
[题目] 588. 甲状腺悬韧带将甲状腺固定于 ()
A. 喉及气管壁上
B. 喉及甲状软骨
C. 气管软骨环
D. 甲状软骨
E. 环状软骨
[答案] A
[解析] 甲状腺悬韧带由假被膜形成，将甲状腺固定于喉及气管壁上。B喉及甲状软骨未包括气管；C仅气管软骨环不全面；D单项甲状软骨不全面。
[题目] 589. 甲状腺上动脉与哪条神经伴行 ()
A. 喉上神经外支
B. 膈神经
C. 喉上神经内支
D. 迷走神经
E. 喉返神经
[答案] A
[解析] 甲状腺上动脉与喉上神经外支伴行，外支在距甲状腺上极约1cm处离开动脉转向内侧支配环甲肌。B膈神经在颈部无此伴行关系；C内支穿过甲状舌骨膜不伴行动脉；E喉返神经与甲状腺下动脉关系密切。
[题目] 590. 甲状腺上动脉结扎时要避免损伤 ()
A. 喉上神经内支
B. 膈神经
C. 喉上神经外支
D. 喉返神经
E. 迷走神经
[答案] C
[解析] 结扎甲状腺上动脉时应避免损伤喉上神经外支（支配环甲肌，损伤后声音低钝）。A喉上神经内支位置较高不伴行动脉；D喉返神经与甲状腺下动脉伴行；B和E在颈部行程较远不直接相关。
[题目] 591. 斜角肌间隙是 ()
A. 中斜角肌与锁骨内侧份上面围成
B. 前、中斜角肌与第1肋上面围成的一个三角形间隙
C. 前斜角肌与锁骨内侧份上面围成
D. 前、中斜角肌围成
E. 中斜角肌与第1肋上面围成
[答案] B
[解析] 斜角肌间隙由前、中斜角肌与第1肋上面围成，为三角形间隙。A缺少前斜角肌；C缺少中斜角肌；D缺少第1肋；E缺少前斜角肌。
[题目] 592. 下面哪些结构穿过斜角肌间隙 ()
A. 臂丛和锁骨下动脉
B. 锁骨下动、静脉
C. 锁骨下静脉和胸导管
D. 臂丛和锁骨下静脉
E. 交感干和锁骨下动脉
[答案] A
[解析] 臂丛和锁骨下动脉穿过斜角肌间隙进入锁骨上三角。B锁骨下静脉不穿过此间隙，其位于前斜角肌前方；C锁骨下静脉不穿过；D静脉不通过；E交感干不经过此处。
[题目] 593. 关于胸膜顶与颈根部位置描述正确的是 ()
A. 锁骨内1/3上缘2~3cm
B. 锁骨外1/3上缘2~3cm
C. 第1肋2~3cm
D. 锁骨中1/3上缘2~3cm
E. 肺尖2~3cm
[答案] A
[解析] 胸膜顶高出锁骨内侧1/3上缘2~3cm，此为其体表投影位置。B外1/3为非肺尖位置；C第1肋为胸膜顶下界非高度；D锁骨中1/3上方非精确定位；E肺尖为肺的解剖结构非胸膜顶。
[题目] 594. 下面关于颈内动脉描述错误的是 ()
A. 在颈部无分支
B. 迷走神经在其后方下行
C. 起始部膨大为颈动脉窦,是压力感受器
D. 行于颈外动脉内侧
E. 主要供应颅内
[答案] D
[解析] 颈内动脉在颈部位于颈外动脉的后外侧（非内侧），故D描述错误。A正确，颈内动脉在颈部无分支；B正确，迷走神经在其后方下行；C正确，起始膨大为颈动脉窦；E正确，主要供应颅内。
[题目] 595. 关于下颌下腺描述正确的是 ()
A. 下颌下腺管由浅部前端发出
B. 其腺管开口于舌下襞
C. 浅部位于下颌舌骨肌深面
D. 深部位于舌骨舌肌深面
E. 由颈筋膜浅层形成其筋膜鞘
[答案] E
[解析] 下颌下腺由颈筋膜浅层形成筋膜鞘包裹。A腺管由深部前端发出非浅部；B腺管开口于舌下阜非舌下襞；C浅部位于下颌舌骨肌浅面非深面；D深部位于下颌舌骨肌深面非舌骨舌肌深面。
[题目] 596. 关于甲状旁腺描述错误的是 ()
A. 上甲状旁腺多位于侧叶上1/3的后方
B. 下甲状旁腺多位于侧叶下1/3的后方
C. 位于真、假被膜之间的囊鞘间隙内
D. 一般有上、下两对
E. 有时还可位于甲状腺实质内
[答案] A
[解析] 上甲状旁腺位于侧叶后缘中点或上中1/3交界处，而非上1/3的后方。B下甲状旁腺位于下1/3后方正确；C位于真假被膜间囊鞘间隙正确；D一般有两对正确；E可异位于实质内正确。
[题目] 597. 经过锁骨上三角的结构是 ()
A. 膈神经
B. 迷走神经
C. 颈内静脉下端
D. 锁骨下静脉
E. 副神经
[答案] D
[解析] 锁骨下静脉经锁骨上三角（锁骨上大窝）的底部走行。A膈神经经前斜角肌前面；B迷走神经在颈动脉鞘内；C颈内静脉下端也在鞘内；E副神经经枕三角。
[题目] 598. 关于颈横神经正确的是 ()
A. 以上均对
B. 支配颈阔肌
C. 经胸锁乳突肌后缘中点穿深筋膜浅出
D. 为臂丛的分支
E. 行于颈阔肌浅面
[答案] C
[解析] 颈横神经为颈丛皮支，经胸锁乳突肌后缘中点穿深筋膜浅出，分布于颈前区皮肤。B它不支配颈阔肌（面神经颈支支配）；D它是颈丛而非臂丛分支；E它行于颈阔肌深面而非浅面。
[题目] 599. 关于颈内静脉叙述正确的是 ()
A. 全程与颈内动脉伴行
B. 颈动脉三角处无属支注入
C. 颈内静脉位于颈总动脉外侧
D. 只收集颅内的静脉血
E. 位于迷走神经的前内侧
[答案] C
[解析] 颈内静脉在颈动脉鞘内位于颈总动脉外侧。A全程伴行错误（颈内静脉上段位于颈内动脉后方外侧）；B颈动脉三角处有面静脉等属支注入；D收集颅内+面部+颈部静脉血；E迷走神经位于动静脉之间的后方。
[题目] 600. 关于颈外静脉陈述正确的是 ()
A. 投影于下颌角至锁骨中点的连线
B. 与颈内静脉伴行
C. 与颈内动脉伴行
D. 与颈外动脉伴行
E. 收集头、颈部浅层所有的静脉血
[答案] A
[解析] 颈外静脉体表投影为下颌角至锁骨中点的连线。B它不与颈内静脉伴行（一浅一深）；C和D不与动脉伴行；E收集头颈部浅层大部分静脉血但非全部。
[题目] 601. 食管癌患者癌细胞常转移至颈部哪群淋巴结 ()
A. Virchow淋巴结
B. 角淋巴结
C. 颈前深淋巴结
D. 颈外侧浅淋巴结
E. 颈前浅淋巴结
[答案] A
[解析] 食管癌（及胃癌等腹部恶性肿瘤）癌细胞常经胸导管转移至左锁骨上淋巴结（Virchow淋巴结）。B角淋巴结与舌及扁桃体相关；C、D、E均非典型远处转移淋巴群。
[题目] 602. 关于神经损伤的描述错误的是 ()
A. 喉上神经喉外支和喉返神经损伤后,声带处于“尸体位”,而发生窒息
B. 单侧喉上神经喉外支损伤后出现声音低钝、易疲劳
C. 双侧喉返神经损伤后出现声音嘶哑
D. 颈交感干受损出现Horner综合征
E. 喉上神经喉内支损伤后出现进食和饮水易呛咳
[答案] C
[解析] 双侧喉返神经损伤后声带处于内收位（尸体位），可发生窒息而危及生命，而非仅声音嘶哑。A描述了喉上神经外支+喉返神经损伤；B单侧外支损伤正确；D交感干受损导致Horner综合征正确；E内支损伤致呛咳正确。
[题目] 603. 锁骨下动脉分段的标志是 ()
A. 前斜角肌
B. 后斜角肌
C. 中斜角肌
D. 锁骨
E. 胸小肌
[答案] A
[解析] 前斜角肌是锁骨下动脉分段的标志：第1段在前斜角肌内侧，第2段被前斜角肌覆盖，第3段在前斜角肌外侧。B后斜角肌和C中斜角肌不参与分段。
[题目] 604. 甲状腺悬韧带由 ()
A. 颈筋膜浅层形成
B. 气管软骨膜形成
C. 椎前筋膜形成
D. 假被膜形成
E. 真被膜形成
[答案] D
[解析] 甲状腺悬韧带由假被膜（甲状腺鞘）形成，将甲状腺固定于喉和气管。A颈筋膜浅层形成封套筋膜；B气管软骨膜不参与；C椎前筋膜不参与；E真被膜为纤维囊，紧贴甲状腺表面。
[题目] 605. 右锁骨下动脉第1段前方经过的结构是 ()
A. 右迷走神经
B. 右颈交感干
C. 右膈神经
D. 右胸背神经
E. 右心包膈血管
[答案] A
[解析] 右迷走神经经右锁骨下动脉第1段前方下行入胸腔。B右颈交感干位于椎前筋膜深面；C右膈神经经前斜角肌前；D胸背神经不在此区域；E心包膈血管与膈神经伴行而非经动脉第1段前。
[题目] 606. 与咽旁间隙相通的间隙是 ()
A. 胸骨上间隙
B. 气管前间隙
C. 咽后间隙
D. 椎前间隙
E. 锁骨上间隙
[答案] C
[解析] 咽旁间隙与咽后间隙相通。A胸骨上间隙不与此相通；B气管前间隙不与咽旁间隙直接相通；D椎前间隙与咽旁间隙不直接相通；E锁骨上间隙位置较远。
[题目] 607. 关于腋鞘描述正确的是 ()
A. 由颈筋膜浅层形成
B. 鞘内含有颈内、外动脉和迷走神经
C. 由椎前筋膜形成
D. 鞘内含有颈丛和至上肢的血管
E. 由气管前筋膜形成
[答案] C
[解析] 腋鞘由椎前筋膜延续形成，包绕臂丛和腋血管。A由颈筋膜浅层形成错误（封套筋膜不形成腋鞘）；B鞘内含有臂丛和腋血管而非颈内外动脉；E气管前筋膜延续形成颈动脉鞘而非腋鞘。
[题目] 608. 枕三角区内勾绕副神经的神经是 ()
A. 迷走神经
B. 锁骨上神经
C. 颈横神经
D. 耳大神经
E. 枕小神经
[答案] E
[解析] 枕小神经勾绕副神经后沿胸锁乳突肌后缘上行至枕部。A迷走神经不在此区域；B锁骨上神经分布于锁骨上区；C颈横神经分布于颈前区；D耳大神经分布于耳后区。
[题目] 609. 不属于下颌下三角内结构的是 ()
A. 面动脉
B. 下颌下神经节
C. 舌神经
D. 下颌后动脉
E. 舌下神经
[答案] D
[解析] 下颌后动脉为颈外动脉终支之一，位于腮腺内，不属于下颌下三角内结构。A面动脉、B下颌下神经节、C舌神经、E舌下神经均为下颌下三角内容物。
[题目] 610. 甲状腺鞘又名 ()
A. 假被膜
B. 甲状腺悬韧带
C. 纤维囊
D. 甲状腺外膜
E. 真被膜
[答案] A
[解析] 甲状腺鞘即假被膜，由气管前筋膜形成，包裹甲状腺形成筋膜鞘。B甲状腺悬韧带是假被膜增厚部分；C纤维囊和E真被膜为同一结构（甲状腺外膜）；D甲状腺外膜即真被膜。
[题目] 611. 甲状腺的外膜是 ()
A. 假被膜
B. 甲状腺鞘
C. 气管前筋膜
D. 内脏筋膜
E. 纤维囊
[答案] E
[解析] 甲状腺外膜即纤维囊（真被膜），紧贴甲状腺实质表面。A假被膜是甲状腺鞘，位于真被膜外；B甲状腺鞘即假被膜；C气管前筋膜形成假被膜；D内脏筋膜涵盖更广泛。
[题目] 612. 甲状腺悬韧带位于 ()
A. 甲状腺峡部的前面
B. 甲状腺峡部的后面
C. 甲状腺两侧叶外侧与峡部的前面
D. 甲状腺两侧叶内侧与峡部的后面
E. 甲状腺两侧叶外侧与峡部的后面
[答案] D
[解析] 甲状腺悬韧带位于甲状腺两侧叶内侧和峡部后面，由假被膜增厚形成，将甲状腺固定于喉和气管。A缺部前面无悬韧带；B峡部后面但缺少侧叶内侧；C和E侧叶外侧不形成悬韧带。
[题目] 613. 路人外伤，锁骨上区皮肤感觉障碍，损伤神经()
A. 耳大神经
B. 枕小神经
C. 锁骨上神经
D. 颈横神经
E. 肩胛下神经
[答案] C
[解析] 锁骨上神经分布于锁骨上区皮肤，损伤后该区感觉障碍。A耳大神经分布于耳后区；B枕小神经分布于枕部；D颈横神经分布于颈前区；E肩胛下神经支配肩部肌肉，非皮神经。
[题目] 614. 甲状腺手术麻醉阻滞神经()
A. 臂丛
B. 颈丛
C. 迷走神经
D. 喉返神经
E. 颈交感干
[答案] B
[解析] 甲状腺手术麻醉阻滞颈丛（颈丛皮支自胸锁乳突肌后缘中点浅出）。A臂丛支配上肢不用于甲状腺麻醉；C迷走神经阻滞风险大；D喉返神经和E颈交感干不用于单纯手术麻醉。
[题目] 615. 甲状腺手术由浅入深层次()
A. 皮肤、浅筋膜、颈筋膜浅层、肩胛舌骨肌及椎前筋膜
B. 皮肤、浅筋膜、颈筋膜深层、舌骨下肌群及气管前筋膜
C. 皮肤、浅筋膜、颈筋膜中层、舌骨下肌群及气管前筋膜
D. 皮肤、浅筋膜、颈筋膜浅层、胸骨舌骨肌及椎前筋膜
E. 皮肤、浅筋膜、颈筋膜浅层、舌骨下肌群及气管前筋膜
[答案] E
[解析] 甲状腺手术依次经皮肤、浅筋膜、颈筋膜浅层、舌骨下肌群及气管前筋膜到达甲状腺。A含肩胛舌骨肌及椎前筋膜错（甲状腺在气管前间隙不在椎前间隙）；B颈筋膜深层错误；C颈筋膜中层非常规层次。
[题目] 616. 甲状腺手术描述错误()
A. 甲状腺部分切除单侧颈丛阻滞
B. 次全切远离下极结扎下动脉
C. 结扎上动脉远离上极
D. 结扎上动脉紧贴上极
E. 层次:皮肤、浅筋膜、颈筋膜浅层、舌骨下肌群、气管前筋膜
[答案] C
[解析] 结扎甲状腺上动脉应紧贴上极而非远离上极（远离会损伤喉上神经外支）。A单侧颈丛阻滞正确；B远离下极结扎正确（保护喉返神经）；D紧贴上极结扎正确；E层次描述正确。
[题目] 617. 气管切开由浅入深()
A. 皮肤、浅筋膜、颈筋膜浅层、胸骨上间隙及其内的颈静脉弓、舌骨下肌群以及气管前筋膜
B. 皮肤、浅筋膜、颈筋膜深层、胸骨上间隙及其内的颈静脉弓、舌骨下肌群以及气管前筋膜
C. 皮肤、浅筋膜、颈筋膜浅层、气管前间隙及其内的颈静脉弓、舌骨下肌群以及气管前筋膜
D. 皮肤、浅筋膜、颈筋膜中层、胸骨上间隙及其内的颈静脉弓、舌骨下肌群以及气管前筋膜
E. 皮肤、浅筋膜、颈筋膜浅层、气管间隙及其内的颈静脉弓、舌骨下肌群以及气管前筋膜
[答案] A
[解析] 气管切开依次经皮肤、浅筋膜、颈筋膜浅层、胸骨上间隙及其内的颈静脉弓、舌骨下肌群及气管前筋膜。B颈筋膜深层错误；C气管前间隙内无颈静脉弓；D颈筋膜中层错误。
[题目] 618. 甲状腺术后声音嘶哑()
A. 交感神经
B. 喉上神经外支
C. 喉返神经
D. 喉下神经
E. 喉上神经内支
[答案] C
[解析] 甲状腺术后声音嘶哑由喉返神经损伤所致（喉返神经支配除环甲肌外的所有喉肌）。A交感神经损伤致Horner综合征；B喉上神经外支损伤致声调降低；E喉上神经内支损伤致呛咳。
[题目] 619. 气管切开部位()
A. 3~5气管软骨环前中线处
B. 1~3气管环前中线处
C. 4~6气管软骨环前中线处
D. 5~7气管软骨环前中线处
E. 2~4气管软骨环前中线处
[答案] A
[解析] 气管切开常在3~5气管软骨环前中线处进行，位置适中，避免损伤甲状腺峡部和血管。B1~3位置过高（靠近环状软骨）；C4~6和D5~7位置偏低；E2~4范围略靠上也非标准部位。
[题目] 620. 甲旁损伤手足抽搐()
A. 切除了甲状旁腺
B. 甲状腺切除过多
C. 甲状腺切除太少
D. 损伤喉返神经
E. 损伤迷走神经
[答案] A
[解析] 甲旁损伤（误切甲状旁腺）导致血钙降低，出现手足抽搐。B甲状腺切除过多导致甲减非抽搐；C切除太少不导致抽搐；D损伤喉返神经导致声嘶；E损伤迷走神经不直接导致抽搐。
[题目] 621. 颈椎结核脓肿蔓延腋窝经()
A. 咽后间隙
B. 咽旁间隙
C. 颈动脉鞘
D. 腋鞘
E. 气管前间隙
[答案] D
[解析] 颈椎结核脓肿可经椎前筋膜形成的腋鞘蔓延至腋窝。A咽后间隙通向咽旁；B咽旁间隙和C颈动脉鞘不直接连通腋窝；E气管前间隙通向胸腔。
[题目] 622. 锁骨下静脉穿刺胸闷损伤()
A. 膈神经
B. 血管
C. 迷走神经
D. 胸膜顶
E. 臂丛
[答案] D
[解析] 锁骨下静脉穿刺时穿刺过深可能损伤胸膜顶导致气胸（胸闷）。A膈神经位于前斜角肌前，位置更深，较少损伤；C迷走神经、E臂丛位置关系较远。
[题目] 623. 胃癌左锁骨上淋巴结肿大()
A. 颈前深淋巴结
B. Virchow淋巴结
C. 颈前浅淋巴结
D. 颈外侧浅淋巴结
E. 角淋巴结
[答案] B
[解析] 胃癌细胞经胸导管转移至左锁骨上淋巴结（Virchow淋巴结）致其肿大。A颈前深淋巴结位置不同；C和D为浅淋巴结不典型；E角淋巴结与口咽相关。
[题目] 624. 甲状腺癌术后声嘶()
A. 喉上神经
B. 舌咽神经
C. 喉返神经
D. 舌神经
E. 舌下神经
[答案] C
[解析] 甲状腺癌术后声嘶由喉返神经损伤或受侵所致。A喉上神经损伤致声调降低；B舌咽神经不支配喉肌；D舌神经和E舌下神经与发声无关。
[题目] 625. 处理甲状腺下动脉保护()
A. 迷走神经
B. 喉下神经
C. 喉上神经喉外支
D. 喉返神经
E. 喉上神经喉内支
[答案] D
[解析] 处理甲状腺下动脉时应保护喉返神经，因其与下动脉关系密切、交叉走行。B喉下神经为喉返神经终支；C喉上神经外支与上动脉伴行；A和E位置较远。
[题目] 626. 气管切开常用位置()
A. 第1~3气管软骨处
B. 环甲膜
C. 第3~5气管软骨处
D. 第6~8气管软骨处
E. 第5~7气管软骨处
[答案] C
[解析] 气管切开常用第3~5气管软骨处，位置适中不易损伤重要结构。A第1~3偏高靠近环状软骨；B环甲膜为急救穿刺部位非常规切开；D和E位置偏低。
[题目] 627. 低位气管切开防损伤()
A. 甲状腺上动脉
B. 甲状腺最下动脉
C. 舌下神经
D. 甲状腺下动脉
E. 颈外静脉
[答案] B
[解析] 低位气管切开（5~7气管软骨）需防止损伤甲状腺最下动脉（此动脉来自头臂干，上行至甲状腺下缘）。A甲状腺上动脉位置偏高；D甲状腺下动脉位偏高；E颈外静脉在浅面。
[题目] 628. 甲状腺肿大Horner征压迫()
A. 颈交感干
B. 动眼神经
C. 喉上神经
D. 迷走神经
E. 喉返神经
[答案] A
[解析] 甲状腺肿大压迫颈交感干导致Horner综合征（瞳孔缩小、上睑下垂、面部无汗）。B动眼神经与眼肌有关非交感；C、D、E均不引起Horner综合征。
[题目] 629. 新生儿斜颈病变()
A. 颈椎
B. 颈部淋巴结
C. 颈部血管
D. 星状神经节
E. 胸锁乳突肌
[答案] E
[解析] 新生儿斜颈常由胸锁乳突肌损伤或纤维化导致。A颈椎病变、B淋巴结肿大、C血管病变、D星状神经节损伤均非新生儿斜颈的典型病因。
[题目] 630. 胸锁乳突肌锁骨头旁穿刺()
A. 上颌静脉
B. 面静脉
C. 颈外静脉
D. 颈内静脉
E. 锁骨下静脉
[答案] E
[解析] 胸锁乳突肌锁骨头后方为锁骨下静脉穿刺部位。颈内静脉穿刺点多在胸锁乳突肌锁骨头与胸骨头间。A-D均非标准深静脉穿刺点。
[题目] 631. 甲状腺肿大声嘶()
A. 喉上神经喉内支
B. 舌咽神经
C. 颈交感干
D. 喉返神经
E. 喉上神经喉外支
[答案] D
[解析] 甲状腺肿大压迫喉返神经导致声音嘶哑。A内支损伤致呛咳；B舌咽神经不支配喉；C交感干受压致Horner征；E外支损伤致声调降低（声低钝）。
[题目] 632. 甲状腺肿大吞咽困难()
A. 食管
B. 颈交感干
C. 喉返神经
D. 喉上神经
E. 气管
[答案] A
[解析] 甲状腺肿大向后压迫食管导致吞咽困难。B和C压迫不导致吞咽困难；D压迫导致声嘶；E气管压迫导致呼吸困难非吞咽困难。
[题目] 633. 急救气管穿刺部位()
A. 弹性圆锥
B. 方形膜
C. 环甲正中韧带
D. 甲状舌骨膜
E. 环状软骨气管韧带
[答案] C
[解析] 急救气管穿刺经环甲正中韧带（环甲膜），此处位置表浅、血管少，为紧急建立气道的首选部位。A弹性圆锥更广泛非精确定位；B方形膜在上方；D和E非急救首选。
[题目] 634. 平环状软骨切肌群避免伤()
A. 颈动脉窦
B. 舌咽神经
C. 喉返神经
D. 舌神经
E. 颈袢肌支
[答案] E
[解析] 平环状软骨切开气管时需避免损伤颈袢肌支（该神经紧贴颈动脉鞘下行，支配舌骨下肌群）。A颈动脉窦为感受器非神经；C喉返神经在气管食管旁沟内更深处。
[题目] 635. 甲亢Horner征()
A. 舌神经
B. 颈袢
C. 舌咽神经
D. 颈交感干
E. 喉返神经
[答案] D
[解析] 甲亢患者因甲状腺肿大压迫颈交感干可致Horner综合征（瞳孔缩小、上睑下垂、面部无汗）。A舌神经、B颈袢、C舌咽神经、E喉返神经均不引起Horner综合征。
[题目] 636. 结扎甲状腺上动脉保护()
A. 喉上神经喉内支
B. 舌下神经
C. 喉返神经
D. 喉上神经喉外支
E. 迷走神经
[答案] D
[解析] 结扎甲状腺上动脉时应保护喉上神经喉外支（与上动脉伴行，支配环甲肌）。A喉内支穿过甲状舌骨膜不与动脉伴行；C喉返神经与下动脉关系密切。
[题目] 637. 颈椎结核脓肿向下至()
A. 气管前间隙
B. 胸骨上间隙
C. 后纵隔
D. 斜角肌间隙
E. 锁骨上大窝
[答案] C
[解析] 颈椎结核脓肿可经椎前间隙向下蔓延至后纵隔。A气管前间隙通前纵隔非后纵隔；B胸骨上间隙表浅不连通；D和E不直接连通后纵隔。
[题目] 638. 紧贴上极结扎声低钝()
A. 喉上神经喉内支
B. 喉下神经
C. 迷走神经
D. 喉返神经
E. 喉上神经喉外支
[答案] E
[解析] 紧贴甲状腺上极结扎上动脉时容易损伤喉上神经喉外支（该神经在距上极约1cm处离开动脉），损伤后致声低钝。A损伤致呛咳；D损伤致声嘶。
[题目] 639. 颈外伤梳头困难()
A. 舌咽神经
B. 副神经
C. 喉上神经
D. 迷走神经
E. 喉返神经
[答案] B
[解析] 颈外伤致副神经损伤后，斜方肌麻痹，患者抬臂梳头困难（副神经支配斜方肌和胸锁乳突肌）。A舌咽神经支配咽部感觉；C-E不支配斜方肌。
[题目] 640. 枕三角术后不能耸肩()
A. 颈袢
B. 迷走神经
C. 副神经
D. 舌咽神经
E. 颈神经前支
[答案] C
[解析] 枕三角区手术（如淋巴结清扫）误伤副神经可致斜方肌瘫痪，出现不能耸肩。A颈袢支配舌骨下肌非肩部；B迷走神经和E不直接支配耸肩动作。
[题目] 641. 肺尖癌Horner征()
A. 左膈神经
B. 左迷走神经
C. 左侧臂丛
D. 左喉返神经
E. 左颈交感干
[答案] E
[解析] 肺尖癌侵犯左颈交感干导致Horner综合征。A左膈神经损伤致膈肌麻痹；B左迷走神经损伤不引起Horner征；D左喉返神经损伤致声嘶。
[题目] 642. 颈部术后不能耸肩()
A. 迷走神经
B. 颈丛神经根
C. 膈神经
D. 臂丛
E. 副
[答案] E
[解析] 副神经损伤致斜方肌瘫痪导致不能耸肩。A迷走神经不支配肩部肌肉；B颈丛和D臂丛非直接原因；C膈神经支配膈肌。
[题目] 643. 包裹下颌下腺筋膜()
A. 椎前筋膜
B. 气管前筋膜
C. 颈深筋膜浅层
D. 颈浅筋膜
E. 颈动脉鞘
[答案] C
[解析] 下颌下腺由颈深筋膜浅层（封套筋膜）包裹形成筋膜鞘。A椎前筋膜在脊柱前；B气管前筋膜包裹内脏；D颈浅筋膜为皮下组织太浅；E颈动脉鞘不包裹腺体。
[题目] 644. 形成腋鞘筋膜()
A. 颈浅筋膜
B. 颈动脉鞘
C. 气管前筋膜
D. 椎前筋膜
E. 颈深筋膜浅层
[答案] D
[解析] 腋鞘由椎前筋膜向下延伸形成。A颈浅筋膜过浅不形成腋鞘；B颈动脉鞘不形成腋鞘；C气管前筋膜形成内脏筋膜；E颈深筋膜浅层为封套筋膜不形成腋鞘。
[题目] 645. 颈阔肌位于()
A. 椎前筋膜
B. 气管前筋膜
C. 颈浅筋膜
D. 颈动脉鞘
E. 颈深筋膜浅层
[答案] C
[解析] 颈阔肌位于颈浅筋膜（皮下脂肪组织）内。A椎前筋膜在脊柱前方过深；B气管前筋膜在内脏前；D颈动脉鞘包绕血管；E颈深筋膜浅层在颈浅筋膜深面。
[题目] 646. 颈动脉鞘内有()
A. 迷走神经
B. 舌咽神经
C. 颈交感干
D. 膈神经
E. 舌神经
[答案] A
[解析] 颈动脉鞘内包含颈总/颈内动脉、颈内静脉和迷走神经。B舌咽神经在上方已穿出；C颈交感干位于鞘后方椎前筋膜深面；D膈神经在鞘外侧前斜角肌前；E舌神经在下颌下三角内不在鞘内。
[题目] 647. 下颌下三角内有()
A. 舌神经
B. 膈神经
C. 舌咽神经
D. 迷走神经
E. 颈交感干
[答案] A
[解析] 舌神经走行于下颌下三角内，与下颌下腺关系密切。B膈神经在颈部前斜角肌前；C舌咽神经在咽侧壁；D迷走神经在颈动脉鞘；E颈交感干在椎前筋膜深面。
[题目] 648. 前斜角肌浅面()
A. 膈神经
B. 舌神经
C. 舌咽神经
D. 颈交感干
E. 迷走神经
[答案] A
[解析] 膈神经经前斜角肌前面下行进入胸腔。B舌神经在下颌下三角；C舌咽神经在颈动脉鞘外上段；D颈交感干在椎前筋膜深面；E迷走神经在颈动脉鞘内。
[题目] 649. 胃癌转移淋巴结()
A. 下颌下淋巴结
B. 颈内静脉肩胛舌骨肌淋巴结
C. 副神经淋巴结
D. 角淋巴结
E. Virchow淋巴结
[答案] E
[解析] 胃癌通过胸导管转移至左锁骨上淋巴结（Virchow淋巴结）。A下颌下淋巴结与口腔相关；B颈内静脉肩胛舌骨肌淋巴结与舌尖癌相关；C副神经淋巴结和D角淋巴结位置不同。
[题目] 650. 舌尖癌首先转移()
A. 角淋巴结
B. 下颌下淋巴结
C. Virchow淋巴结
D. 副神经淋巴结
E. 颈内静脉肩胛舌骨肌淋巴结
[答案] E
[解析] 舌尖癌首先转移至颈内静脉肩胛舌骨肌淋巴结（位于肩胛舌骨肌中间腱与颈内静脉交叉处）。A角淋巴结与舌根扁桃体相关；B下颌下淋巴结与面部口腔前部相关；C、D位置不同。
[题目] 651. 颈内静脉与二腹肌夹角淋巴结()
A. 角淋巴结
B. 颈内静脉肩胛舌骨肌淋巴结
C. 下颌下淋巴结
D. Virchow淋巴结
E. 副神经淋巴结
[答案] A
[解析] 颈内静脉与二腹肌后腹夹角处淋巴结称为角淋巴结，为舌根及扁桃体癌常见转移处。B、C、D、E均为其他位置的淋巴结群。
[题目] 652. 胸骨上间隙内()
A. 颈静脉弓
B. 面静脉
C. 耳后静脉
D. 颈外静脉
E. 颈内静脉
[答案] A
[解析] 胸骨上间隙内含有颈静脉弓，连接两侧颈前静脉。B面静脉不在此间隙；C耳后静脉位置更浅更后；D和E颈内、外静脉不在胸骨上间隙内。
[题目] 653. 沿胸锁乳突肌浅面()
A. 颈前静脉
B. 颈静脉弓
C. 颈外静脉
D. 耳后静脉
E. 颈内静脉
[答案] C
[解析] 颈外静脉沿胸锁乳突肌浅面斜行向下，注入锁骨下静脉。A颈前静脉沿中线两侧下行；B颈静脉弓在胸骨上间隙；D和E均为深静脉不走浅面。
[题目] 654. 颈动脉鞘内静脉()
A. 耳后静脉
B. 颈静脉弓
C. 颈前静脉
D. 颈内静脉
E. 颈外静脉
[答案] D
[解析] 颈动脉鞘内静脉为颈内静脉，与颈内动脉、迷走神经共同包裹于鞘内。A耳后静脉和C颈前静脉较浅；B颈静脉弓在胸骨上间隙；E颈外静脉在浅筋膜内。
[题目] 655. 颈总动脉分叉()
A. 甲状软骨上缘
B. 锁骨中点上方
C. 环状软骨
D. 胸锁乳突肌后缘中点
E. 舌骨大角
[答案] A
[解析] 颈总动脉在甲状软骨上缘水平分为颈内和颈外动脉。B锁骨中点上方为锁骨下动脉；C环状软骨为计数气管环标志；D胸锁乳突肌后缘中点为颈丛皮支阻滞点；E舌骨大角为舌动脉标志。
[题目] 656. 舌动脉标志()
A. 环状软骨
B. 锁骨中点上方
C. 甲状软骨上缘
D. 舌骨大角
E. 胸锁乳突肌后缘中点
[答案] D
[解析] 舌动脉在舌骨大角处自颈外动脉发出，是寻找和结扎舌动脉的体表标志。A环状软骨不是舌动脉标志；B锁骨中点上方为锁骨下动脉；C甲状软骨上缘为颈总动脉分叉处。
[题目] 657. 计数气管软骨标志()
A. 舌骨大角
B. 胸锁乳突肌后缘中点
C. 环状软骨
D. 甲状软骨上缘
E. 锁骨中点上方
[答案] C
[解析] 环状软骨为第6颈椎水平的标志，其下的气管软骨环可经此计数（第1气管软骨环相当于C6水平）。A舌骨大角为舌动脉标志；B胸锁乳突肌后缘中点用于颈丛阻滞；D甲状软骨上缘为颈总动脉分叉处；E锁骨中点上方用于臂丛阻滞。
[多选题]
[题目] 658. 关于锁骨上大窝正确的是 ()
A. 在体表呈明显凹陷
B. 位于锁骨上缘外1/3上方
C. 位于锁骨上缘中1/3上方
D. 又称锁骨上三角
E. 位于锁骨上缘内1/3上方
[答案] ACD
[解析] 锁骨上大窝位于锁骨上缘中1/3上方（非外1/3、非内1/3），体表呈明显凹陷，又称锁骨上三角。B外1/3为锁骨上小窝位置；E内1/3不是锁骨上大窝位置。
[题目] 659. 锁骨上大窝的内容物包括 ()
A. 膈神经
B. 锁骨下动脉及静脉
C. 静脉角
D. 臂丛
E. 胸膜顶
[答案] BCD
[解析] 锁骨上大窝内含锁骨下动脉及静脉、静脉角和臂丛。A膈神经位于前斜角肌前方，不在此窝内；E胸膜顶位于窝底深处，但不列为内容物（题目选BCD）。
[题目] 660. 甲状腺侧叶后外侧的毗邻结构有 ()
A. 颈内静脉
B. 颈总动脉
C. 颈内动脉
D. 颈外静脉
E. 颈交感干
[答案] ABCE
[解析] 甲状腺侧叶后外侧毗邻颈内静脉、颈总动脉、颈内动脉和颈交感干。D颈外静脉在胸锁乳突肌浅面下行，不位于甲状腺侧叶后外侧。
[题目] 661. 关于斜角肌间隙正确的是 ()
A. 有臂的根和干通过
B. 由中斜角肌及第1肋骨上面围成
C. 有锁骨下动脉通过
D. 有锁骨下静脉通过
E. 由前、中斜角肌及第1肋骨上面围成
[答案] ACE
[解析] 斜角肌间隙由前、中斜角肌及第1肋上面围成（非仅中斜角肌），有臂丛和锁骨下动脉通过。B缺少前斜角肌；D锁骨下静脉位于前斜角肌前方，不通过此间隙。
[题目] 662. 椎前筋膜覆盖的结构有 ()
A. 臂丛
B. 锁骨下动脉
C. 颈内动脉
D. 颈交感干
E. 膈神经
[答案] ABDE
[解析] 椎前筋膜覆盖臂丛、锁骨下动脉、颈交感干和膈神经。C颈内动脉位于颈动脉鞘内，不被椎前筋膜直接覆盖。
[题目] 663. 有关面神经颈支描述正确的是 ()
A. 支配颈阔肌
B. 在颈阔肌前面下行
C. 自腮腺上端穿出
D. 可作为寻找面神经主干的标志
E. 自腮腺下端穿出
[答案] ADE
[解析] 面神经颈支自腮腺下端穿出，支配颈阔肌，可作为寻找面神经主干的标志。B它在颈阔肌深面而非前面下行；C它自腮腺下端穿出而非上端。
[题目] 664. 有关颈筋膜正确的是 ()
A. 可分为浅、中、深3层
B. 在血管、神经周围形成筋膜鞘及筋膜间隙
C. 位于浅筋膜和颈阔肌的前面
D. 浅层形成腮腺的腺鞘
E. 围绕颈、项部诸肌和器官
[答案] ABDE
[解析] 颈筋膜分浅中深三层，在血管神经周围形成筋膜鞘及间隙，浅层形成腮腺鞘和下颌下腺鞘，围绕颈项部诸肌和器官。C错误——颈筋膜位于颈阔肌深面而非前面。
[题目] 665. 有关囊鞘间隙描述正确的是 ()
A. 间隙内有甲状腺组织
B. 间隙内有疏松结缔组织
C. 为真被膜与纤维囊之间的间隙
D. 为假被膜与真被膜之间的间隙
E. 间隙内有甲状旁腺
[答案] BDE
[解析] 囊鞘间隙为假被膜（筋膜鞘）与真被膜（纤维囊）之间的间隙，内含疏松结缔组织和甲状旁腺。A甲状腺组织不在囊鞘间隙内（在真被膜内）；C间隙位于假被膜与真被膜之间，非真被膜与纤维囊（二者为同一结构）。
[题目] 666. 颈筋膜中层包裹的结构有 ()
A. 咽缩肌
B. 喉
C. 食管颈段
D. 甲状腺
E. 下颌下腺
[答案] BCD
[解析] 颈筋膜中层（内脏筋膜/气管前筋膜）包裹喉、食管颈段和甲状腺。A咽缩肌由颊咽筋膜包裹非中层主要内容；E下颌下腺由颈筋膜浅层包裹。
[题目] 667. 颈阔肌深面的浅筋膜内含有 ()
A. 颈浅淋巴结
B. 颈外静脉
C. 颈前静脉
D. 颈丛皮支
E. 面神经颈支
[答案] ABCDE
[解析] 颈阔肌深面的浅筋膜内含有颈浅淋巴结、颈外静脉、颈前静脉、颈丛皮支和面神经颈支，以上所有选项均正确。这些结构均位于颈阔肌深面与颈筋膜浅层之间的浅筋膜层。
[题目] 668. 颈动脉三角内的结构有 ()
A. 颈内静脉及其属支
B. 舌下神经及其降支
C. 迷走神经及其分支
D. 颈内动脉
E. 舌咽神经
[答案] ABCD
[解析] 颈动脉三角内含颈内静脉及其属支、舌下神经及其降支、迷走神经及其分支、颈内动脉。E舌咽神经在颈动脉三角上方已穿出，不位于此三角内。
[题目] 669. 下面有关胸膜顶正确的是 ()
A. 前、中、后斜角肌覆盖其前、后、外方
B. 为覆盖肺尖部的壁胸膜
C. 为覆盖肺尖部的脏胸膜
D. 高出锁骨外侧1/3上缘2~3cm
E. 高出锁骨内侧1/3上缘2~3cm
[答案] ABE
[解析] 胸膜顶为覆盖肺尖的壁胸膜，前中后斜角肌覆盖其前、后、外方，高出锁骨内侧1/3上缘2~3cm。C它为壁胸膜非脏胸膜；D高出位置为锁骨内侧1/3非外侧1/3。
[题目] 670. 甲状腺侧叶后内侧的毗邻结构有 ()
A. 喉上神经
B. 咽和食管
C. 颈外动脉
D. 喉返神经
E. 喉和气管
[答案] BDE
[解析] 甲状腺侧叶后内侧毗邻咽和食管、喉返神经、喉和气管。A喉上神经位于甲状腺上极附近非后内侧；C颈外动脉位于侧叶前外侧非后内侧。
[题目] 671. 颈根部的结构有 ()
A. 胸膜顶
B. 迷走神经和膈神经
C. 锁骨下动脉和锁骨下静脉
D. 胸导管和右淋巴导管
E. 椎动脉三角
[答案] ABCDE
[解析] 颈根部结构包括胸膜顶、迷走神经和膈神经、锁骨下动脉和静脉、胸导管和右淋巴导管、椎动脉三角。上述所有选项均为颈根部重要结构。
[题目] 672. 锁骨下动脉第1段的分支有 ()
A. 颈横动脉
B. 甲状颈干
C. 椎动脉
D. 胸廓内动脉
E. 肋颈干
[答案] BCDE
[解析] 锁骨下动脉第1段的分支包括甲状颈干、椎动脉、胸廓内动脉和肋颈干。A颈横动脉是甲状颈干的分支而非第1段直接分支。
[题目] 673. 下面关于下颌下腺正确的是 ()
A. 包裹在颈筋膜浅层形成筋膜鞘内
B. 深部位于舌骨舌肌深面
C. 浅部较大,位于下颌舌骨肌深面
D. 下颌下腺管由腺深部前端发出
E. 呈“U”形,分浅、深两部
[答案] ADE
[解析] 下颌下腺包裹于颈筋膜浅层形成的筋膜鞘内，呈"U"形分浅深两部，腺管由深部前端发出。B深部位于下颌舌骨肌深面而非舌骨舌肌深面；C浅部位于下颌舌骨肌浅面而非深面。

﻿[章节] 第一章 绪论
[单选题]
[题目] 1. 自身免疫病是由于哪项免疫功能异常所致
A. 固有免疫
B. 免疫防御
C. 免疫监视
D. 抗原提呈
E. 免疫自稳
[答案] E
[解析] 【正解E】免疫自稳负责维持自身耐受与内环境稳态,功能异常时自身反应性淋巴细胞攻击自身组织导致自身免疫病。【排除】A.固有免疫为屏障+固有细胞组成的非特异性防御,不涉及自身/非己识别。B.免疫防御针对外来病原体,亢进致超敏反应。C.免疫监视针对突变细胞,低下致肿瘤。D.抗原提呈仅启动适应性免疫,与自身耐受无关。
[题目] 2. 脾的动脉周围淋巴鞘中定居最多的免疫细胞定居于淋巴结的哪个部位
A. 被膜
B. 浅皮质区
C. 深皮质区
D. 髓索
E. 髓窦
[答案] C
[解析] 【正解C】脾动脉周围淋巴鞘为T细胞区,淋巴结深皮质区(副皮质区)同样是T细胞定居部位,二者功能对应。【排除】A.被膜为结缔组织包裹,不含大量免疫细胞。B.浅皮质区为B细胞区(淋巴滤泡)。D.髓索含浆细胞和巨噬细胞。E.髓窦为淋巴液流经通道,含巨噬细胞。
[题目] 3. 免疫系统包括
A. 免疫细胞、黏膜免疫系统、中枢免疫器官
B. 免疫器官、免疫细胞、免疫分子
C. 中枢免疫器官、免疫细胞、皮肤免疫系统
D. 免疫分子、黏膜免疫系统、皮肤免疫系统
E. 中枢免疫器官、外周免疫器官
[答案] B
[解析] 【正解B】免疫系统由免疫器官(中枢+外周)、免疫细胞和免疫分子三大部分组成,三者缺一不可。【排除】A.仅含免疫细胞和部分器官,缺失免疫分子。C.仅含中枢免疫器官和细胞,缺失外周免疫器官和免疫分子。D.仅含免疫分子和局部系统,缺失免疫器官和细胞。E.仅含免疫器官,缺失免疫细胞和免疫分子。
[题目] 4. 脾的B细胞主要位于
A. 动脉周围淋巴鞘
B. 脾小结
C. 边缘区
D. 脾索
E. 脾血窦
[答案] B
[解析] 【正解B】脾小结(脾淋巴滤泡)是脾脏B细胞主要聚集区域,相当于淋巴结浅皮质区的淋巴滤泡和生发中心。【排除】A.动脉周围淋巴鞘为T细胞区。C.边缘区含巨噬细胞和边缘区B细胞,非B细胞主体。D.脾索为红髓结构,含浆细胞和巨噬细胞。E.脾血窦为血液流通管道。
[题目] 5. 在胸腺发育成熟的免疫细胞主要定居于脾脏的哪个部位
A. 动脉周围淋巴鞘
B. 脾小结
C. 边缘区
D. 脾索
E. 脾血窦
[答案] A
[解析] 【正解A】胸腺发育成熟的T细胞归巢至脾动脉周围淋巴鞘(PALS,即脾T细胞区)定居。【排除】B.脾小结为B细胞区。C.边缘区含巨噬细胞和边缘区B细胞。D.脾索为红髓结构。E.脾血窦为血管窦,非免疫细胞定居区。
[题目] 6. 属于人类中枢免疫器官的是
A. 淋巴结
B. 脾脏
C. 骨髓
D. 扁桃体
E. 阑尾
[答案] C
[解析] 【正解C】骨髓和胸腺是人类中枢免疫器官,是免疫细胞发生、分化、发育和成熟的场所。【排除】A.淋巴结为外周免疫器官。B.脾脏为外周免疫器官。D.扁桃体为外周黏膜淋巴组织。E.阑尾为肠相关淋巴组织,属外周免疫。
[题目] 7. 以下哪种细胞能够进一步分化为巨噬细胞
A. 中性粒细胞
B. NK细胞
C. 单核细胞
D. 肥大细胞
E. 浆细胞
[答案] C
[解析] 【正解C】单核细胞从血液进入组织后分化为巨噬细胞,是巨噬细胞最主要的前体细胞。【排除】A.中性粒细胞为终末分化细胞,不再分化。B.NK细胞为固有淋巴细胞终末细胞。D.肥大细胞由髓样前体分化,在组织中成熟。E.浆细胞为B细胞终末分化阶段。
[题目] 8. 感染埃博拉病毒后的紧急、特异性治疗措施是
A. 抗病毒治疗
B. 接种病毒疫苗
C. 注射干扰素
D. 注射痊愈后的埃博拉病毒感染者的血清
E. 防止出血、肾衰等对症治疗
[答案] D
[解析] 【正解D】注射痊愈者血清含特异性抗埃博拉病毒抗体,属于人工被动免疫,可立即提供保护。【排除】A.抗病毒药为化学治疗,非免疫学手段。B.疫苗接种为主动免疫,需数周产生抗体,不适合紧急治疗。C.干扰素为非特异性抗病毒,非特异性措施。E.对症治疗非特异性措施。
[题目] 9. 能持久性的产生大量IgG抗体的细胞主要位于
A. 骨髓
B. 胸腺
C. 脾
D. 淋巴结
E. 感染发生部位
[答案] A
[解析] 【正解A】骨髓是再次体液免疫应答主要场所,长寿浆细胞定居骨髓可持续分泌大量IgG抗体。【排除】B.胸腺为T细胞成熟场所,不产生抗体。C.脾参与初次应答,非持久抗体主要来源。D.淋巴结参与局部应答,非长期抗体主要来源。E.感染部位无菌浆细胞长期存活微环境。
[题目] 10. 目前人类通过疫苗主动消灭的唯一的一个曾经严重威胁人类健康的疾病是
A. 狂犬病
B. 白喉
C. 破作风
D. 天花
E. 脊髓灰质炎
[答案] D
[解析] 【正解D】天花是人类通过牛痘疫苗主动免疫唯一成功消灭的传染病,WHO于1980年宣布全球消灭。【排除】A.狂犬病尚未消灭。B.白喉仍有发生。C.破伤风无法消灭(芽孢存在于土壤)。E.脊髓灰质炎尚未全球消灭(仅部分国家)。
[题目] 11. 可产生免疫记忆的细胞是
A. NK细胞
B. γδT细胞
C. αβT细胞
D. B1细胞
E. 巨噬细胞
[答案] C
[解析] 【正解C】αβT细胞是适应性免疫主要效应细胞,受抗原刺激后分化为记忆T细胞,再次遇到相同抗原时产生更快更强应答。【排除】A.NK细胞为固有免疫细胞,无免疫记忆。B.γδT细胞为固有样T细胞,免疫记忆有限。D.B1细胞为固有样B细胞,主要产生天然IgM。E.巨噬细胞为固有免疫细胞,无免疫记忆。
[题目] 12. 下列哪种细胞不能由单核细胞分化而来
A. 腹腔巨噬细胞
B. 小胶质细胞
C. 库普弗细胞
D. NK细胞
E. 树突状细胞
[答案] D
[解析] 【正解D】NK细胞来源于淋巴样干细胞,非髓样干细胞-单核细胞分化路径,故不能由单核细胞分化而来。【排除】A.腹腔巨噬细胞由单核细胞迁入腹腔分化。B.小胶质细胞由单核细胞迁入中枢神经系统分化。C.库普弗细胞由单核细胞迁入肝脏分化。E.部分树突状细胞可由单核细胞分化。
[题目] 13. 机体防御反应过高可导致
A. 自身免疫病
B. 超敏反应
C. 肿瘤
D. 病毒持续性感染
E. 免疫缺陷
[答案] B
[解析] 【正解B】免疫防御反应过高时,机体对无害抗原产生异常强烈免疫应答,导致超敏反应(变态反应)。【排除】A.自身免疫病由免疫自稳功能异常导致。C.肿瘤由免疫监视功能低下导致。D.病毒持续感染由免疫防御功能低下导致。E.免疫缺陷由免疫系统发育不全或受损导致。
[题目] 14. 在胸腺发育成熟的免疫细胞主要定居于淋巴结的哪个部位
A. 被膜
B. 浅皮质区
C. 深皮质区
D. 髓索
E. 髓窦
[答案] C
[解析] 【正解C】胸腺发育成熟的T细胞主要定居于淋巴结深皮质区(副皮质区),是淋巴结T细胞依赖区。【排除】A.被膜为纤维结缔组织包裹。B.浅皮质区为B细胞区(淋巴滤泡)。D.髓索含浆细胞和巨噬细胞。E.髓窦为淋巴液流经通道。
[题目] 15. 只能由髓样祖细胞分化而来的细胞是
A. NK细胞
B. B细胞
C. T细胞
D. 树突状细胞
E. 中性粒细胞
[答案] E
[解析] 【正解E】中性粒细胞仅由髓样祖细胞分化而来;NK细胞、T细胞、B细胞来源于淋巴样干细胞。【排除】A.NK细胞来自淋巴样干细胞。B.B细胞来自淋巴样干细胞。C.T细胞来自淋巴样干细胞。D.树突状细胞可双源分化(淋巴样+髓样)。
[题目] 16. 实验发现鸡切除法氏囊后
A. 细胞免疫功能正常，体液免疫功能下降
B. 细胞免疫功能缺陷，体液免疫功能正常
C. 细胞免疫功能正常，体液免疫功能升高
D. 细胞免疫功能缺陷，体液免疫功能下降
E. 细胞免疫功能正常，体液免疫功能正常
[答案] A
[解析] 【正解A】法氏囊是禽类B细胞分化成熟中枢器官,切除后B细胞缺乏导致体液免疫功能下降,而T细胞介导的细胞免疫功能正常。【排除】B.细胞免疫缺陷错误,法氏囊不影响T细胞。C.体液免疫升高错误,切除后下降。D.两者均缺陷错误。E.两者均正常错误。
[题目] 17. 淋巴结生发中心最主要的细胞是
A. αβT细胞
B. γδT细胞
C. B1 B细胞
D. B2 B细胞
E. NK细胞
[答案] D
[解析] 【正解D】生发中心主要由B2 B细胞在抗原刺激后增殖分化形成,B2细胞是适应性体液免疫主要B细胞亚群。【排除】A.αβT细胞位于深皮质区。B.γδT细胞分布于上皮和黏膜。C.B1 B细胞为固有样B细胞,主要产生天然IgM,不进入生发中心。E.NK细胞为固有免疫细胞,不参与生发中心。
[题目] 18. 下列哪种细胞在分化上不是来自于髓样干细胞
A. NK细胞
B. 红细胞
C. 嗜酸性粒细胞
D. 巨噬细胞
E. 中性粒细胞
[答案] A
[解析] 【正解A】NK细胞来源于淋巴样干细胞(与T、B细胞同源),而红细胞、嗜酸性粒细胞、巨噬细胞和中性粒细胞均来源于髓样干细胞。【排除】B.红细胞来自髓系。C.嗜酸性粒细胞来自髓系。D.巨噬细胞来自髓系(单核细胞)。E.中性粒细胞来自髓系。
[题目] 19. 成熟的CD3和CD4双阳性的细胞主要来源于
A. 骨髓
B. 胸腺
C. 脾
D. 扁桃体
E. 淋巴结
[答案] B
[解析] 【正解B】胸腺细胞在胸腺中经历TCR基因重排、阳性选择(获得MHC限制性)和阴性选择(删除自身反应性克隆),最终分化为成熟CD4+CD3+T细胞。【排除】A.骨髓为B细胞成熟场所。C.脾为外周免疫器官,非T细胞成熟场所。D.扁桃体为外周淋巴组织。E.淋巴结为外周免疫器官。
[题目] 20. T细胞主要位于淋巴结的
A. 被膜
B. 浅皮质区
C. 深皮质区
D. 髓索
E. 髓窦
[答案] C
[解析] 【正解C】T细胞在淋巴结中主要定居于深皮质区(副皮质区),该区域为淋巴结T细胞依赖区。【排除】A.被膜为纤维结缔组织包裹。B.浅皮质区为B细胞区。D.髓索含浆细胞和巨噬细胞。E.髓窦为淋巴液流经通道,含巨噬细胞。
[题目] 21. 介导细胞免疫的最主要的细胞是
A. 巨噬细胞
B. NK细胞
C. 中性粒细胞
D. T细胞
E. B细胞
[答案] D
[解析] 【正解D】T细胞(特别是CTL和Th1)是介导细胞免疫应答最主要的细胞,通过直接杀伤靶细胞或分泌细胞因子激活巨噬细胞等发挥效应。【排除】A.巨噬细胞参与但非最主要介导者。B.NK细胞为固有免疫效应细胞。C.中性粒细胞为固有免疫效应细胞。E.B细胞介导体液免疫。
[题目] 22. 人体内数量最多的免疫器官是
A. 骨髓
B. 胸腺
C. 脾
D. 淋巴结
E. 扁桃体
[答案] D
[解析] 【正解D】淋巴结广泛分布于全身各处(颈部、腋窝、腹股沟等),是人体内数量最多的免疫器官(数百个)。【排除】A.骨髓分布于骨内,结构分散但非单一器官最多。B.胸腺仅一个。C.脾仅一个。E.扁桃体数目有限(咽部几对)。
[题目] 23. 介导细胞免疫的最主要的细胞是在哪个脏器中发育成熟的
A. 骨髓
B. 胸腺
C. 脾
D. 淋巴结
E. 肝脏
[答案] B
[解析] 【正解B】T细胞(细胞免疫主要介导者)在胸腺中发育成熟,胸腺是T细胞分化成熟的中枢免疫器官。【排除】A.骨髓为B细胞成熟场所和造血场所。C.脾为外周免疫器官。D.淋巴结为外周免疫器官。E.肝脏非免疫细胞成熟场所。
[题目] 24. 不属于免疫生物治疗的方法是
A. 抗生素治疗细菌性感染性疾病
B. 细胞因子治疗自身免疫性疾病
C. 造血干细胞移植治疗白血病
D. 单克隆抗体制剂治疗移植排斥反应
E. 修饰后效应T细胞治疗肿瘤
[答案] A
[解析] 【正解A】抗生素直接杀灭或抑制细菌,属于化学药物治疗,非利用免疫系统或免疫分子进行干预的免疫生物治疗。【排除】B.细胞因子为免疫分子,属免疫治疗。C.造血干细胞移植重建免疫系统,属免疫治疗。D.单克隆抗体为免疫分子,属免疫治疗。E.效应T细胞回输为细胞免疫治疗。
[题目] 25. 发生再次体液免疫应答和产生抗体的主要部位是
A. 脾
B. 淋巴结
C. 扁桃体
D. 胸腺
E. 骨髓
[答案] E
[解析] 【正解E】骨髓中长寿浆细胞可持续分泌高亲和力IgG抗体,是再次体液免疫应答产生抗体的主要部位。【排除】A.脾参与初次应答,非再次应答主要部位。B.淋巴结参与局部应答。C.扁桃体为局部黏膜应答场所。D.胸腺为T细胞成熟场所。
[题目] 26. 以下关于骨髓的功能描述错误的是
A. 各类血细胞发生的场所
B. 各类免疫细胞发生的场所
C. 淋巴细胞分化成熟的场所
D. 髓系细胞分化成熟的场所
E. 再次体液免疫应答的主要部位
[答案] C
[解析] 【正解C】骨髓是B细胞和髓系细胞分化成熟场所,但T淋巴细胞在胸腺中分化成熟,不在骨髓中完成全程发育。【排除】A.骨髓是各类血细胞发生场所,正确。B.骨髓是各类免疫细胞发生场所,正确。D.髓系细胞在骨髓成熟,正确。E.骨髓是再次体液免疫应答主要部位,正确。
[题目] 27. 人类单体最大的免疫器官是
A. 骨髓
B. 胰腺
C. 脾脏
D. 胸腺
E. 淋巴结
[答案] C
[解析] 【正解C】脾脏是人体单体最大外周免疫器官,位于左上腹,具有过滤血液、对血源性抗原应答、清除衰老红细胞等功能。【排除】A.骨髓虽体积大但非单一器官概念。B.胰腺非免疫器官。D.胸腺随年龄萎缩体积小。E.淋巴结单个体积小。
[题目] 28. 将来源于同卵双生双胞胎哥哥的成熟T细胞经腹腔注射入弟弟体内后，脾脏的哪个部位可能含有数量最多的该外源T细胞
A. 动脉周围淋巴鞘
B. 脾小结
C. 边缘区
D. 脾索
E. 脾血窦
[答案] A
[解析] 【正解A】成熟T细胞通过淋巴细胞再循环归巢至外周淋巴器官T细胞区,脾脏中即动脉周围淋巴鞘(PALS)。同卵双生MHC相同,无排斥。【排除】B.脾小结为B细胞区。C.边缘区非T细胞主要定居区。D.脾索为红髓。E.脾血窦为血管窦。
[题目] 29. 人体中主要作用为抵御经空气传播的病原体的感染的是
A. 脾
B. 肠系膜淋巴结
C. 腹股沟淋巴结
D. 颈部淋巴结
E. 扁桃体
[答案] E
[解析] 【正解E】扁桃体位于呼吸道和消化道入口处,是抵御经空气/飞沫传播病原体感染的第一道黏膜免疫防线。【排除】A.脾过滤血液,不对空气传播病原体。B.肠系膜淋巴结防御肠道病原体。C.腹股沟淋巴结引流下肢。D.颈部淋巴结引流头颈部淋巴液,非直接防御空气传播。
[题目] 30. 下列哪项是分泌型免疫分子
A. T细胞受体
B. B细胞受体
C. 抗体
D. CD分子
E. MHC分子
[答案] C
[解析] 【正解C】抗体(免疫球蛋白)由浆细胞分泌至体液(血液、淋巴液、组织液),是典型的分泌型免疫分子。【排除】A.TCR为T细胞膜表面受体。B.BCR为B细胞膜表面受体。D.CD分子为白细胞膜表面分化抗原。E.MHC分子为细胞膜表面抗原提呈分子。
[题目] 31. 老年时体积缩小最为明显的免疫器官是
A. 骨髓
B. 胸腺
C. 脾
D. 淋巴结
E. 扁桃体
[答案] B
[解析] 【正解B】胸腺随年龄增长发生生理性萎缩(退化),青春期后逐渐被脂肪替代,是老年体积缩小最明显免疫器官,导致T细胞输出减少、免疫力下降。【排除】A.骨髓体积随年龄有减少但非最明显。C.脾体积变化相对较小。D.淋巴结体积变化不大。E.扁桃体随年龄有一定萎缩但非最明显。
[题目] 32. 具有特异性免疫功能的免疫分子是
A. 抗体
B. 抗菌肽
C. 细胞因子
D. MHC分子
E. 补体
[答案] A
[解析] 【正解A】抗体是唯一具有高度特异性识别并结合抗原能力的分泌型免疫分子,TCR和BCR虽也是特异性分子但为膜型受体。【排除】B.抗菌肽为非特异性固有免疫分子。C.细胞因子为非特异性免疫调节分子。D.MHC分子提呈抗原肽,非特异性识别。E.补体为非特异性固有免疫分子。
[题目] 33. 胸腺内T细胞发育阴性选择障碍，易患何种疾病
A. 超敏反应
B. 自身免疫病
C. 免疫缺陷病
D. 肿瘤
E. 机会性感染
[答案] B
[解析] 【正解B】胸腺阴性选择删除与自身抗原高亲和力结合的T细胞,建立中枢耐受。阴性选择障碍时自身反应性T细胞逃逸至外周,攻击自身组织致自身免疫病。【排除】A.超敏反应由免疫防御亢进导致。C.免疫缺陷由发育不全导致。D.肿瘤由免疫监视低下导致。E.机会性感染由免疫低下导致。
[题目] 34. 下列哪项属于主动免疫治疗手段
A. 疫苗接种
B. 细胞因子注射
C. 单克隆抗体注射
D. 口服免疫抑制剂
E. 效应T细胞回输
[答案] A
[解析] 【正解A】疫苗接种使机体主动产生特异性免疫应答和免疫记忆,属于主动免疫(主动免疫治疗)。【排除】B.细胞因子注射为被动免疫/免疫调节。C.单克隆抗体注射为被动免疫。D.口服免疫抑制剂为免疫抑制,非免疫治疗。E.效应T细胞回输为被动细胞免疫治疗。
[题目] 35. 诱导髓样干细胞向红细胞分化的主要细胞因子是
A. IL-3
B. GM-CSF
C. IL-7
D. G-CSF
E. EPO
[答案] E
[解析] 【正解E】EPO(促红细胞生成素)由肾间质细胞分泌,特异性诱导髓样干细胞向红细胞系定向分化和成熟。【排除】A.IL-3为多能造血因子,非红细胞特异性。B.GM-CSF诱导粒-单核细胞分化。C.IL-7促进淋巴细胞发育。D.G-CSF诱导粒细胞分化。
[题目] 36. 由淋巴样干细胞发育分化而来的固有免疫细胞是
A. NK细胞
B. 粒细胞
C. 单核细胞
D. 红细胞
E. 血小板
[答案] A
[解析] 【正解A】NK细胞虽功能上属于固有免疫细胞,但来源于淋巴样干细胞,与T、B细胞有共同淋巴样祖细胞前体。【排除】B.粒细胞来源于髓样干细胞。C.单核细胞来源于髓样干细胞。D.红细胞来源于髓样干细胞。E.血小板来源于髓样(巨核细胞)。
[题目] 37. 淋巴结所不具备的作用是
A. 参与T细胞选择性发育过程
B. 提供成熟淋巴细胞寄居的场所
C. 提供免疫应答的场所
D. 清除病原菌
E. 参与淋巴细胞再循环
[答案] A
[解析] 【正解A】T细胞的选择性发育(阳性选择和阴性选择)发生在胸腺,淋巴结作为外周免疫器官不具备此功能,仅提供成熟淋巴细胞定居和免疫应答场所。【排除】B.提供成熟淋巴细胞寄居场所为淋巴结功能。C.提供免疫应答场所为淋巴结功能。D.清除病原菌为淋巴结过滤淋巴液功能。E.参与淋巴细胞再循环为淋巴结功能。
[题目] 38. 脾的T细胞主要位于
A. 动脉周围淋巴鞘
B. 脾小结
C. 边缘区
D. 脾索
E. 脾血窦
[答案] A
[解析] 【正解A】脾动脉周围淋巴鞘(PALS)是脾脏白髓中T细胞主要定居区域,即脾脏T细胞区。【排除】B.脾小结为B细胞区(脾淋巴滤泡)。C.边缘区为B细胞和巨噬细胞混合区。D.脾索为红髓结构。E.脾血窦为血液通道。
[题目] 39. 以下关于固有免疫的说法，错误的是
A. 发生迅速
B. 无免疫记忆
C. 对病原体无严格选择性
D. 又称非特异性免疫
E. 不诱导炎症
[答案] E
[解析] 【正解E】固有免疫应答可诱导炎症反应,通过释放炎症因子(TNF、IL-1等)和趋化因子募集免疫细胞至感染部位,故"不诱导炎症"错误。【排除】A.发生迅速是固有免疫特点。B.无免疫记忆是固有免疫特点。C.对病原体无严格选择性是固有免疫特点。D.又称非特异性免疫是固有免疫特点。
[题目] 40. 下列哪种细胞不能分化为浆细胞
A. 造血干细胞
B. 淋巴样干细胞
C. 祖B细胞
D. 祖T细胞
E. B细胞
[答案] D
[解析] 【正解D】浆细胞由B细胞终末分化而来,祖T细胞已经定向T细胞谱系,只能分化为成熟T细胞,不能跨谱系分化为浆细胞。【排除】A.造血干细胞可下分化为B→浆细胞。B.淋巴样干细胞可分化为B→浆细胞。C.祖B细胞可分化为B→浆细胞。E.B细胞可分化为浆细胞。
[题目] 41. 在中性粒细胞分化成熟中起关键作用的细胞因子是
A. G-CSF、GM-CSF
B. M-CSF、GM-CSF
C. IL-3、IL-4
D. IFN
E. TPO
[答案] A
[解析] 【正解A】G-CSF(粒细胞集落刺激因子)和GM-CSF(粒-巨噬细胞集落刺激因子)是诱导中性粒细胞分化成熟最关键细胞因子。【排除】B.M-CSF主要促进单核/巨噬细胞分化。C.IL-3和IL-4不主要作用于中性粒细胞。D.IFN为抗病毒和免疫调节因子。E.TPO(促血小板生成素)促进血小板生成。
[题目] 42. 下列哪种免疫细胞还能进一步分化为另一种免疫细胞
A. T细胞
B. B细胞
C. NK细胞
D. 单核细胞
E. 巨噬细胞
[答案] D
[解析] 【正解D】单核细胞离开血液进入组织后分化为巨噬细胞或部分树突状细胞,是外周血中唯一能进一步分化为其他免疫细胞的细胞。【排除】A.T细胞为终末细胞。B.B细胞分化为浆细胞后不再分化。C.NK细胞为终末细胞。E.巨噬细胞为终末效应细胞。
[题目] 43. 自身免疫病是由于哪一项免疫功能损害所致
A. 免疫记忆
B. 免疫防御
C. 抗原提呈
D. 免疫自稳
E. 免疫调节
[答案] D
[解析] 【正解D】免疫自稳功能损害时,机体不能清除自身反应性淋巴细胞或维持自身耐受,自身反应性淋巴细胞攻击自身组织导致自身免疫病。【排除】A.免疫记忆为适应性免疫特征,与自身免疫病无直接因果。B.免疫防御针对外来病原体。C.抗原提呈为免疫启动环节。E.免疫调节紊乱可参与但非直接原因。
[题目] 44. 人类出生后造血干细胞主要位于
A. 肝脏
B. 脾脏
C. 骨髓
D. 法氏囊
E. 胸腺
[答案] C
[解析] 【正解C】出生后造血干细胞主要位于红骨髓中,红骨髓分布于扁骨、椎骨和长骨骨骺端,是成人主要造血器官。【排除】A.肝脏为胚胎期造血器官,出生后非主要造血。B.脾脏为胚胎期造血器官,出生后无造血。D.法氏囊为禽类B细胞成熟器官,人类无。E.胸腺为T细胞成熟器官,非造血。
[题目] 45. 具有抗原提呈功能的适应性免疫细胞是
A. T细胞
B. B细胞
C. 树突状细胞
D. 巨噬细胞
E. NK细胞
[答案] B
[解析] 【正解B】B细胞既是适应性免疫细胞(产生特异性抗体),又是专职APC,通过BCR特异性摄取抗原后经MHC-II类分子提呈抗原肽。【排除】A.T细胞为适应性免疫细胞但非APC。C.树突状细胞为专职APC但属固有免疫。D.巨噬细胞为固有免疫APC。E.NK细胞为固有免疫细胞,非APC。
[题目] 46. 机体抵抗病原微生物感染的功能称为
A. 免疫监视
B. 免疫自稳
C. 免疫耐受
D. 免疫防御
E. 免疫调节
[答案] D
[解析] 【正解D】免疫防御是机体抵抗和清除外来病原微生物感染的功能,防止感染发生或促进病原体清除。【排除】A.免疫监视针对突变细胞和肿瘤。B.免疫自稳维持自身耐受。C.免疫耐受为对特定抗原不应答。E.免疫调节为调控免疫应答强度和类型。
[题目] 47. 不属于外周免疫器官和组织的是
A. 脾脏
B. 淋巴结
C. 胸腺
D. 黏膜相关淋巴组织
E. 皮肤相关淋巴组织
[答案] C
[解析] 【正解C】胸腺是中枢免疫器官(T细胞分化成熟场所),而脾脏、淋巴结、黏膜相关淋巴组织和皮肤相关淋巴组织均属于外周免疫器官和组织。【排除】A.脾脏为外周免疫器官。B.淋巴结为外周免疫器官。D.黏膜相关淋巴组织为外周免疫组织。E.皮肤相关淋巴组织为外周免疫组织。
[题目] 48. 淋巴结浅皮质区定居最多的免疫细胞定居在脾的哪个部位
A. 动脉周围淋巴鞘
B. 脾小结
C. 边缘区
D. 脾索
E. 脾血窦
[答案] B
[解析] 【正解B】淋巴结浅皮质区(淋巴滤泡)为B细胞区,B细胞在脾脏中对应定居于脾小结(脾淋巴滤泡),两者结构功能对应。【排除】A.动脉周围淋巴鞘为T细胞区。C.边缘区非B细胞主体区域。D.脾索为红髓结构。E.脾血窦为血液通道。
[题目] 49. 下列有关适应性免疫应答的表述错误的是
A. 抗原识别的实质是抗原对淋巴细胞的特异性克隆选择
B. 淋巴细胞活化需要双信号
C. CTL可杀伤病原体感染的靶细胞，清除胞内感染病原体
D. 抗体可活化补体杀伤清除胞外感染病原体
E. 抗体不能预防相同病原体的再次感染
[答案] E
[解析] 【正解E】抗体可中和病原体并提供长期保护;再次感染时记忆B细胞迅速应答产生高亲和力抗体,有效预防同一病原体再次感染,故"抗体不能预防再次感染"错误。【排除】A.抗原识别为克隆选择,正确。B.淋巴细胞活化需双信号,正确。C.CTL杀伤感染靶细胞,正确。D.抗体活化补体清除病原体,正确。
[题目] 50. 下列白细胞中有免疫记忆功能的是
A. 中性粒细胞
B. 单核细胞
C. 淋巴细胞
D. 嗜酸性粒细胞
E. 嗜碱性粒细胞
[答案] C
[解析] 【正解C】淋巴细胞(T细胞和B细胞)是唯一具有免疫记忆功能的白细胞,再次遇到相同抗原可产生更快更强应答。【排除】A.中性粒细胞为固有免疫终末细胞,无记忆。B.单核细胞为固有免疫细胞,无记忆。D.嗜酸性粒细胞为固有免疫效应细胞,无记忆。E.嗜碱性粒细胞为固有免疫效应细胞,无记忆。
[题目] 51. 下列哪种细胞在分化上来自于淋巴样干细胞
A. NK细胞
B. 红细胞
C. 肥大细胞
D. 巨噬细胞
E. 中性粒细胞
[答案] A
[解析] 【正解A】NK细胞来源于淋巴样干细胞(与T、B细胞同源),而红细胞、肥大细胞、巨噬细胞和中性粒细胞均来源于髓样干细胞。【排除】B.红细胞来自髓系。C.肥大细胞来自髓系。D.巨噬细胞来自髓系(单核细胞)。E.中性粒细胞来自髓系。
[题目] 52. 人类出生后的造血器官是
A. 卵黄囊
B. 肝
C. 脾
D. 红骨髓
E. 黄骨髓
[答案] D
[解析] 【正解D】出生后红骨髓是人类主要造血器官,分布于扁骨和长骨骨骺端,是所有血细胞和免疫细胞的来源。【排除】A.卵黄囊为胚胎早期造血场所。B.肝为胚胎期造血器官。C.脾为胚胎期造血器官。E.黄骨髓为脂肪组织,无造血功能。
[题目] 53. 人类消灭天花借助的是哪种免疫治疗方法
A. 注射细胞因子
B. 注射单克隆抗体
C. 口服免疫抵制剂
D. 疫苗接种
E. 效应T细胞回输
[答案] D
[解析] 【正解D】人类通过全球范围接种牛痘疫苗(Edward Jenner 1796年发明)消灭天花,属于主动免疫治疗。【排除】A.注射细胞因子非消灭天花手段。B.注射单克隆抗体非消灭天花手段。C.口服免疫抑制剂为抑制免疫。E.效应T细胞回输非消灭天花手段。
[题目] 54. 不属于免疫分子的是
A. 抗原
B. 抗体
C. 补体
D. 细胞因子
E. CD分子
[答案] A
[解析] 【正解A】抗原是免疫系统识别和应答的对象(外来或自身物质),不属于免疫系统产生的免疫分子。【排除】B.抗体为免疫分子(分泌型)。C.补体为固有免疫分子。D.细胞因子为免疫调节分子。E.CD分子为膜型免疫分子(白细胞分化抗原)。
[题目] 55. 下列哪种细胞可能由淋巴样干细胞分化而来
A. 红细胞
B. 中性粒细胞
C. 巨噬细胞
D. 树突状细胞
E. 肥大细胞
[答案] D
[解析] 【正解D】树突状细胞具有双源性:淋巴样干细胞分化为浆细胞样DC,髓样干细胞分化为经典DC(髓样DC)。【排除】A.红细胞仅来自髓样干细胞。B.中性粒细胞仅来自髓样干细胞。C.巨噬细胞仅来自髓样干细胞。E.肥大细胞仅来自髓样干细胞。
[题目] 56. 介导体液免疫的最主要的细胞是在哪个部位发育成熟的
A. 骨髓
B. 胸腺
C. 肝脏
D. 脾
E. 淋巴结
[答案] A
[解析] 【正解A】B细胞(介导体液免疫最主要细胞)在骨髓中发育成熟,骨髓是B细胞分化成熟的中枢免疫器官。【排除】B.胸腺为T细胞成熟场所。C.肝脏非免疫细胞成熟场所。D.脾为外周免疫器官。E.淋巴结为外周免疫器官。
[题目] 57. 中枢免疫器官是
A. T细胞分化成熟的部位
B. B细胞分化成熟的部位
C. 固有免疫细胞分化成熟的部位
D. 免疫应答的部位
E. 免疫细胞发生、分化、发育和成熟的部位
[答案] E
[解析] 【正解E】中枢免疫器官是免疫细胞发生、分化、发育和成熟场所,包括骨髓(所有免疫细胞来源+B细胞成熟)和胸腺(T细胞成熟)。【排除】A.仅为T细胞成熟,不完整。B.仅为B细胞成熟,不完整。C.固有免疫细胞不都在中枢器官成熟。D.免疫应答在外周器官发生。
[题目] 58. 免疫系统不包括
A. 中枢免疫器官
B. 外周免疫器官
C. 免疫细胞
D. 抗原
E. 免疫分子
[答案] D
[解析] 【正解D】抗原是免疫系统识别和应答的对象(外来物质),不属于免疫系统组成成分;免疫系统由免疫器官、免疫细胞和免疫分子三部分构成。【排除】A.中枢免疫器官为系统组成。B.外周免疫器官为系统组成。C.免疫细胞为系统组成。E.免疫分子为系统组成。
[题目] 59. 下列哪种祖细胞会离开骨髓进入其他脏器进一步分化为终末期细胞
A. 淋巴样干细胞
B. 祖T细胞
C. 祖B细胞
D. 红母细胞
E. 粒－单核祖细胞
[答案] B
[解析] 【正解B】祖T细胞(前T细胞)在骨髓由淋巴样干细胞分化而来,离开骨髓经血液循环进入胸腺,在胸腺微环境中完成TCR重排和阳性/阴性选择,分化为成熟T细胞。【排除】A.淋巴样干细胞在骨髓内分化为祖细胞。C.祖B细胞在骨髓内完成全程发育。D.红母细胞在骨髓成熟。E.粒-单核祖细胞在骨髓成熟。
[题目] 60. 患者，男性，35岁，反复不明原因发烧6个月，到本院就诊，检查发现HIV抗体呈阳性。血常规检查，比例与数量下降最明显的细胞最可能的是
A. 红细胞
B. 中性粒细胞
C. 血小板
D. T淋巴细胞
E. B淋巴细胞
[答案] D
[解析] 【正解D】HIV主要感染并破坏CD4+T细胞,导致T淋巴细胞数量和比例显著下降,是艾滋病最特征性免疫学改变。【排除】A.红细胞不受HIV直接影响。B.中性粒细胞非HIV主要靶细胞。C.血小板非HIV靶细胞。E.B细胞也受影响但下降不如T细胞明显。
[题目] 61. 患者，男，42岁。确诊艾滋病5年。近期被诊断患了卡波西肉瘤，最可能的原因是
A. HIV感染导致该患者免疫防御功能下降
B. HIV感染导致该患者免疫防御功能增强
C. HIV感染导致该患者免疫监视功能下降
D. HIV感染导致该患者免疫监视功能增强
E. HIV感染导致该患者免疫自稳功能紊乱
[答案] C
[解析] 【正解C】HIV破坏CD4+T细胞致免疫监视功能下降,不能有效识别和清除突变肿瘤细胞,卡波西肉瘤等恶性肿瘤发生率显著升高。【排除】A.免疫防御下降致机会性感染,非直接致肿瘤。B.防御增强不会致肿瘤。D.监视增强应防止肿瘤。E.自稳紊乱致自身免疫病。
[题目] 62. 患者，男，50岁。葡萄球菌性菌血症1周。请问该患者的下列哪个部位的体积增大最明显
A. 脾的动脉周围淋巴鞘
B. 脾小结
C. 脾边缘区
D. 淋巴结的浅皮质区
E. 淋巴结的深皮质区
[答案] B
[解析] 【正解B】葡萄球菌为胞外菌,主要引发体液免疫应答,脾小结(B细胞区)因B细胞大量增殖和生发中心形成而体积增大最明显。【排除】A.动脉周围淋巴鞘为T细胞区,胞外菌以体液免疫为主。C.脾边缘区变化相对不明显。D.淋巴结浅皮质区虽为B细胞区但血源性抗原主要在脾应答。E.深皮质区为T细胞区。
[题目] 63. 患儿，男，10岁，因患白血病进行造血干细胞移植后6个月，请问该儿童的下列哪种细胞还是自身原来的细胞
A. 脾脏
B. 细胞 B.淋巴结T细胞
C. 红细胞
D. 胸腺细胞
E. 肝细胞
[答案] E
[解析] 【正解E】造血干细胞移植后造血和免疫系统细胞由供者干细胞重建,但肝细胞等实质组织细胞不受影响,仍是受体自身的。【排除】A.脾中免疫细胞来自供者干细胞。B.淋巴结T细胞来自供者干细胞。C.红细胞来自供者干细胞。D.胸腺细胞来自供者干细胞。
[题目] 64. 患者，男，22岁，大腿内侧意外受伤，继发感染，请问该患者抗感染体液免疫应答主要发生的部位是
A. 骨髓
B. 脾
C. 腘窝淋巴结
D. 腹股沟淋巴结
E. 肠系膜淋巴结
[答案] D
[解析] 【正解D】腹股沟淋巴结引流大腿内侧和下肢淋巴液,大腿内侧感染后抗原经淋巴管引流至腹股沟淋巴结启动体液免疫应答。【排除】A.骨髓为再次应答和抗体产生主场所,非初次应答部位。B.脾对血源性抗原应答。C.腘窝淋巴结引流小腿和足部。E.肠系膜淋巴结引流肠道。
[题目] 65. 在骨髓内分化成熟的适应性免疫细胞是
A. NK细胞
B. 树突状细胞
C. T细胞
D. B细胞
E. 巨噬细胞
[答案] D
[解析] 【正解D】B细胞在骨髓内完成从造血干细胞到成熟B细胞全程发育,是适应性免疫细胞中唯一在骨髓内完成全程发育的细胞。【排除】A.NK细胞为固有免疫细胞。B.树突状细胞部分在组织成熟。C.T细胞在胸腺成熟。E.巨噬细胞在组织成熟分化。
[题目] 66. 既可来源于淋巴样祖细胞又可来源于髓样祖细胞的细胞是
A. NK细胞
B. 树突状细胞
C. T细胞
D. B细胞
E. 巨噬细胞
[答案] B
[解析] 【正解B】树突状细胞具有双源性:淋巴样祖细胞分化为浆细胞样DC,髓样祖细胞分化为经典DC(髓样DC)。【排除】A.NK细胞仅来自淋巴样祖细胞。C.T细胞仅来自淋巴样祖细胞。D.B细胞仅来自淋巴样祖细胞。E.巨噬细胞仅来自髓样祖细胞。
[题目] 67. 可促进成熟T细胞增殖的细胞因子是
A. TPO
B. EPO
C. IL-2
D. IL-5
E. IL-7
[答案] C
[解析] 【正解C】IL-2是T细胞自泌性生长因子,活化T细胞高表达IL-2R,以自分泌方式促进T细胞克隆增殖和分化。【排除】A.TPO促进血小板生成。B.EPO促进红细胞分化。D.IL-5促进嗜酸性粒细胞分化增殖。E.IL-7促进淋巴细胞早期发育,非成熟T细胞增殖主要因子。
[题目] 68. 淋巴样干细胞可以分化为
A. T细胞
B. 红细胞
C. 血小板
D. 巨噬细胞
E. 嗜碱性粒细胞
[答案] A
[解析] 【正解A】淋巴样干细胞可分化为T细胞、B细胞和NK细胞等淋巴细胞谱系。【排除】B.红细胞来源于髓样干细胞。C.血小板来源于髓样(巨核细胞)。D.巨噬细胞来源于髓样干细胞(单核细胞)。E.嗜碱性粒细胞来源于髓样干细胞。
[题目] 69. 适应性免疫应答不具备的特点是
A. 无需抗原激发
B. 具有免疫记忆性
C. 具有抗原特异性
D. 具有再次应答的能力
E. 精确区分“自身”和“非己”
[答案] A
[解析] 【正解A】适应性免疫应答需抗原激发才能启动,非"无需抗原激发";此为固有免疫特点。【排除】B.具有免疫记忆性是适应性免疫特点。C.具有抗原特异性是适应性免疫特点。D.具有再次应答能力是适应性免疫特点。E.精确区分"自身"和"非己"是适应性免疫特点。 
[题目] 70. 下列哪种细胞不是由造血干细胞分化而来的
A. 红细胞
B. 中性粒细胞
C. 胸腺细胞
D. 树突状细胞
E. 成纤维细胞
[答案] E
[解析] 【正解E】成纤维细胞属于结缔组织固有细胞,由间充质干细胞分化而来,非造血干细胞来源。【排除】A.红细胞由造血干细胞经髓系分化。B.中性粒细胞由造血干细胞经髓系分化。C.胸腺细胞(T前体)由造血干细胞经淋巴系分化。D.树突状细胞由造血干细胞分化。 
[题目] 71. 免疫防御功能低下的机体易发生
A. 肿瘤
B. 超敏反应
C. 自身免疫病
D. 反复感染
E. 免疫增生性疾病
[答案] D
[解析] 【正解D】免疫防御功能低下时,机体不能有效清除入侵病原微生物,易发生反复感染。【排除】A.肿瘤为免疫监视低下导致。B.超敏反应为免疫防御亢进导致。C.自身免疫病为免疫自稳失调导致。E.免疫增生性疾病为淋巴细胞异常增生。 
[题目] 72. 出生后，人类造血干细胞的主要来源是
A. 胸腺
B. 淋巴结
C. 骨髓
D. 肝脏
E. 脾脏
[答案] C
[解析] 【正解C】出生后红骨髓是造血干细胞主要来源,分布于扁骨、椎骨和长骨骨骺端,持续终身维持造血。【排除】A.胸腺为T细胞成熟场所,非造血干细胞来源。B.淋巴结为外周免疫器官。D.肝脏为胚胎期造血器官。E.脾脏为胚胎期造血器官,出生后无造血。 
[题目] 73. 机体免疫防御反应异常增高，可引发
A. 肿瘤
B. 超敏反应
C. 严重感染
D. 免疫缺陷病
E. 自身免疫病
[答案] B
[解析] 【正解B】免疫防御反应异常增高时,对无害抗原产生强烈免疫应答,引发超敏反应(过敏)。【排除】A.肿瘤由免疫监视低下导致。C.严重感染由免疫防御低下导致。D.免疫缺陷病由发育不全或受损导致。E.自身免疫病由免疫自稳失调导致。 
[题目] 74. 对血源性抗原产生免疫应答的主要场所是
A. 扁桃体
B. 脾
C. 胸腺
D. 小肠派尔集合淋巴结
E. 腹股沟淋巴结
[答案] B
[解析] 【正解B】脾脏过滤全身血液,是对血源性抗原(经血液循环进入的抗原)产生免疫应答的主要场所。【排除】A.扁桃体防御经口鼻进入的抗原。C.胸腺为中枢免疫器官,非免疫应答场所。D.小肠派尔集合淋巴结防御肠道抗原。E.腹股沟淋巴结引流局部淋巴液。 
[题目] 75. 绝大多数T细胞分化成熟的场所是
A. 骨髓
B. 法氏囊
C. 脾脏
D. 胸腺
E. 淋巴结
[答案] D
[解析] 【正解D】胸腺是绝大多数T细胞分化成熟场所,T细胞在胸腺中经历TCR基因重排、阳性选择(获得MHC限制性)和阴性选择(删除自身反应性克隆)。【排除】A.骨髓为B细胞成熟场所。B.法氏囊为禽类B细胞成熟器官。C.脾脏为外周免疫器官。E.淋巴结为外周免疫器官。 
[题目] 76. 下面哪种细胞或成分不属于胸腺微环境
A. 胸腺细胞
B. 胸腺上皮细胞
C. 巨噬细胞
D. 细胞外基质
E. 局部活性因子
[答案] A
[解析] 【正解A】胸腺细胞(发育中的T细胞)是胸腺微环境的"受体"而非组成部分;胸腺微环境包括胸腺上皮细胞、DC、巨噬细胞、细胞外基质和细胞因子等。【排除】B.胸腺上皮细胞为微环境组成。C.巨噬细胞为微环境组成。D.细胞外基质为微环境组成。E.局部活性因子(细胞因子等)为微环境组成。 
[题目] 77. 有关免疫器官和组织的说法错误的是
A. 骨髓是所有免疫细胞发育和成熟的场所
B. 脾是对血液性抗原产生免疫应答的主要场所
C. 淋巴结是T细胞的主要定居地
D. 黏膜免疫系统是局部免疫应答发生部位
E. 脾是人体最大的外周免疫器官
[答案] A
[解析] 【正解A】并非所有免疫细胞都在骨髓成熟,T细胞在胸腺中分化成熟,故"骨髓是所有免疫细胞发育成熟场所"错误。【排除】B.脾对血源性抗原应答,正确。C.淋巴结深皮质区是T细胞主要定居地,正确。D.黏膜免疫系统是局部应答部位,正确。E.脾是人体最大外周免疫器官,正确。 
[题目] 78. 机体免疫自稳功能失调，可引发
A. 免疫缺陷病
B. 病毒持续感染
C. 肿瘤
D. 超敏反应
E. 自身免疫病
[答案] E
[解析] 【正解E】免疫自稳功能失调时,机体不能维持对自身抗原的耐受,自身反应性淋巴细胞攻击自身组织,引发自身免疫病。【排除】A.免疫缺陷病由免疫系统发育不全导致。B.病毒持续感染由免疫防御低下导致。C.肿瘤由免疫监视低下导致。D.超敏反应由免疫防御亢进导致。 
[题目] 79. 可清除突变细胞，防止肿瘤发生的免疫功能是
A. 免疫防御功能
B. 免疫监视功能
C. 免疫稳定功能
D. 抗感染作用
E. 吞噬功能
[答案] B
[解析] 【正解B】免疫监视功能可识别和清除体内突变细胞(肿瘤细胞),防止肿瘤发生。【排除】A.免疫防御针对外来病原体。C.免疫稳定即免疫自稳,维持自身耐受。D.抗感染作用属于免疫防御。E.吞噬功能为固有免疫清除方式。 
[题目] 80. 下列细胞中兼具适应性免疫功能的APC是
A. 自然杀伤细胞
B. 树突状细胞
C. B细胞
D. T细胞
E. 巨噬细胞
[答案] C
[解析] 【正解C】B细胞兼具适应性免疫功能(产生特异性抗体)和抗原提呈功能(经MHC-II类分子),是唯一兼具两者的APC。【排除】A.NK细胞为固有免疫细胞,非APC。B.树突状细胞为专职APC但属固有免疫。D.T细胞为适应性免疫效应细胞,非APC。E.巨噬细胞为固有免疫APC。 
[题目] 81. 哺乳类动物的中枢免疫器官包括
A. 淋巴结和脾脏
B. 胸腺和骨髓
C. 法氏囊和胸腺
D. 骨髓和黏膜相关淋巴组织
E. 淋巴结和骨髓
[答案] B
[解析] 【正解B】哺乳动物中枢免疫器官是胸腺和骨髓,分别是T细胞和B细胞分化成熟场所。【排除】A.淋巴结和脾脏均为外周免疫器官。C.法氏囊为禽类中枢免疫器官,非哺乳类。D.黏膜相关淋巴组织为外周。E.淋巴结为外周免疫器官。 
[题目] 82. 下列关于脾的描述错误的是
A. 是胚胎时期的造血器官
B. 是人体最大的外周免疫器官
C. 结构上与淋巴管道相连
D. 定居最多的免疫细胞是B细胞
E. 是对血源性抗原产生免疫应答的主要场所
[答案] C
[解析] 【正解C】脾脏不与淋巴管道相连,而是通过脾动脉和脾静脉与血液循环系统相连,这是脾与淋巴结的重要区别。【排除】A.脾是胚胎期造血器官,正确。B.脾是人体最大外周免疫器官,正确。D.脾定居最多的是B细胞(约60%),正确。E.脾对血源性抗原应答,正确。 
[题目] 83. 脾脏和淋巴结生发中心主要由(
A. T淋巴细胞
B. B淋巴细胞
C. 粒细胞
D. 巨噬细胞
E. NK细胞
[答案] B
[解析] 【正解B】脾脏和淋巴结的生发中心主要由增殖分化中的B淋巴细胞组成,是抗原刺激后B细胞克隆扩增、体细胞高频突变和亲和力成熟的场所。【排除】A.T细胞位于深皮质区/动脉周围淋巴鞘。C.粒细胞不在生发中心。D.巨噬细胞在生发中心中起清除凋亡细胞作用,非组成主体。E.NK细胞不在生发中心。 
[题目] 84. 机体防止外界病原体的入侵及清除已入侵病原体的功能称为
A. 免疫调节
B. 免疫缺陷
C. 免疫耐受
D. 免疫防御
E. 免疫监视
[答案] D
[解析] 【正解D】免疫防御是机体防止外界病原体入侵及清除已入侵病原体的免疫功能,是最基本的免疫功能。【排除】A.免疫调节是调控免疫应答强度。B.免疫缺陷指免疫系统功能低下。C.免疫耐受为对特定抗原不应答。E.免疫监视针对突变细胞和肿瘤。 
[题目] 85. 下列关于脾的功能的描述错误的是
A. 是T细胞定居的场所
B. 是B细胞定居的场所
C. 是对血源性抗原产生免疫应答的场所
D. 是对引流淋巴液而来的抗原产生免疫应答的场所
E. 可吞噬清除外周血中衰老的红细胞
[答案] D
[解析] 【正解D】脾脏对血源性(经血液进入的)抗原产生免疫应答,淋巴结才对引流淋巴液而来的抗原产生免疫应答,二者分工不同。【排除】A.脾是T细胞定居场所,正确。B.脾是B细胞定居场所,正确。C.脾对血源性抗原应答,正确。E.脾可清除衰老红细胞,正确。 
[题目] 86. 适应性免疫的特点是
A. 可产生免疫记忆
B. 无针对病原体的特异性
C. 经遗传获得
D. 包括物理屏障和化学屏障作用
E. 感染早期迅速发挥作用
[答案] A
[解析] 【正解A】适应性免疫可产生免疫记忆,是区别于固有免疫的核心特征之一。【排除】B.适应性免疫具有高度抗原特异性。C.适应性免疫需经抗原刺激获得,非遗传获得。D.物理和化学屏障属固有免疫。E.感染早期迅速发挥作用是固有免疫特点。 
[题目] 87. B细胞主要定居在淋巴结的
A. 浅皮质区
B. 深皮质区
C. 副皮质区
D. 髓索
E. 髓窦
[答案] A
[解析] 【正解A】B细胞在淋巴结主要定居于浅皮质区(初级淋巴滤泡和生发中心),即淋巴结B细胞依赖区。【排除】B.深皮质区为T细胞区。C.副皮质区=深皮质区,为T细胞区。D.髓索含浆细胞和巨噬细胞。E.髓窦为淋巴液流经通道。 
[题目] 88. 下列叙述中不属于专职APC特点及功能的是
A. 携带抗原迁移
B. 释放穿孔素和颗粒酶
C. 表达MHC分子
D. 表达协同刺激分子
E. 处理抗原
[答案] B
[解析] 【正解B】释放穿孔素和颗粒酶是CTL和NK细胞的杀伤功能,不属于专职APC的特点及功能。【排除】A.携带抗原迁移至淋巴结为DC的功能。C.表达MHC分子为APC基本特征。D.表达协同刺激分子为APC活化T细胞的必要条件。E.处理抗原为APC核心功能。 
[题目] 89. 人体免疫细胞产生、发育、分化成熟的场所是
A. 胸腺和淋巴结
B. 胸腺和骨髓
C. 淋巴结和脾
D. 骨髓和黏膜免疫系统
E. 脾和胸腺
[答案] B
[解析] 【正解B】胸腺和骨髓合称中枢免疫器官,是免疫细胞产生、发育、分化成熟场所。【排除】A.淋巴结为外周免疫器官。C.淋巴结和脾均为外周免疫器官。D.黏膜免疫系统为外周免疫组织。E.脾为外周免疫器官。 
[题目] 90. 用牛痘预防天花的学者是
A. Pasteur
B. Jenner
C. Koch
D. Landsteiner
E. Ehrlich
[答案] B
[解析] 【正解B】Edward Jenner(琴纳)于1796年发现接种牛痘可预防天花,开创现代免疫学和疫苗接种先河。【排除】A.Pasteur(巴斯德)发明减毒活疫苗(鸡霍乱、狂犬病)。C.Koch(科赫)发现结核杆菌。D.Landsteiner发现ABO血型。E.Ehrlich提出侧链学说。 
[题目] 91. 下列哪个不是成熟T细胞和B细胞定居的场所
A. 扁桃体
B. 胸腺
C. 脾
D. 肠淋巴结
E. 腹股沟淋巴结
[答案] B
[解析] 【正解B】胸腺是T细胞分化成熟的中枢免疫器官,不是成熟T/B细胞定居场所;成熟淋巴细胞定居于外周免疫器官。【排除】A.扁桃体为外周淋巴组织,是成熟淋巴细胞定居地。C.脾为外周免疫器官。D.肠淋巴结为外周免疫器官。E.腹股沟淋巴结为外周免疫器官。 
[题目] 92. 以下关于免疫应答的说法错误的是
A. 是指免疫系统识别和清除抗原物质的整个过程
B. 包括固有免疫和适应性免疫
C. 免疫应答总是对机体有利
D. 固有免疫是适应性免疫的先决条件
E. 适应性免疫可促进固有免疫应答的发生
[答案] C
[解析] 【正解C】免疫应答并非总是对机体有利;异常免疫应答可导致超敏反应、自身免疫病等对机体有害后果。【排除】A.免疫应答是识别清除抗原全过程,正确。B.包括固有和适应性免疫,正确。D.固有免疫是适应性免疫先决条件,正确。E.适应性免疫可促进固有免疫,正确。 
[题目] 93. 机体免疫监视功能低下时易发生
A. 免疫耐受
B. 自身免疫病
C. 移植排斥反应
D. 超敏反应
E. 肿瘤
[答案] E
[解析] 【正解E】免疫监视功能低下时突变肿瘤细胞不能被及时识别和清除,机体易发生肿瘤。【排除】A.免疫耐受为对特定抗原不应答。B.自身免疫病由免疫自稳失调导致。C.移植排斥反应由同种异体抗原引起。D.超敏反应由免疫防御亢进导致。 
[题目] 94. T细胞的阴性选择发生在
A. 血管
B. 骨髓
C. 淋巴结
D. 脾
E. 胸腺
[答案] E
[解析] 【正解E】T细胞阴性选择发生在胸腺髓质,删除能与自身抗原高亲和力结合的胸腺细胞,建立中枢免疫耐受。【排除】A.血管非免疫选择场所。B.骨髓为B细胞阴性选择场所。C.淋巴结为外周免疫应答场所。D.脾为外周免疫应答场所。 
[题目] 95. 成年男性，意外受到非致死剂量的核辐射，导致造血干细胞受损，以下最不可能出现的症状是
A. 贫血
B. 凝血功能障碍
C. 嗜睡
D. 机会性感染
E. 菌血症
[答案] C
[解析] 【正解C】核辐射损伤造血干细胞导致全血细胞减少(贫血、凝血障碍、感染),但嗜睡非造血干细胞损伤直接后果。【排除】A.贫血为红细胞减少后果,会出现。B.凝血障碍为血小板减少后果,会出现。D.机会性感染为白细胞减少后果,会出现。E.菌血症为粒细胞缺乏后果,会出现。 
[题目] 96. 患者，男，55岁，发生血源性胞内寄生菌感染1周，请问该患者最有可能是下列哪个部位的体积增大最明显
A. 脾的动脉周围淋巴鞘
B. 脾小结
C. 脾边缘区
D. 淋巴结的浅皮质区
E. 淋巴结的深皮质区
[答案] A
[解析] 【正解A】胞内寄生菌感染主要引发细胞免疫应答,脾动脉周围淋巴鞘(T细胞区)因T细胞大量增殖而体积增大最明显。【排除】B.脾小结为B细胞区,胞内菌以细胞免疫为主。C.脾边缘区变化相对不明显。D.淋巴结浅皮质区为B细胞区。E.淋巴结深皮质区虽为T细胞区但血源性抗原主在脾应答。 
[题目] 97. 2020年新冠肺炎在全世界范围内大流行，感染者中有的一直是无症状感染者，有的症状较轻，在一段时间之后不经任何药物治疗就能自愈，这体现的是免疫系统的哪种功能
A. 免疫防御
B. 免疫调节
C. 免疫耐受
D. 免疫监视
E. 免疫自稳
[答案] A
[解析] 【正解A】部分感染者不经治疗自愈体现免疫防御功能成功识别和清除入侵的新冠病毒,防止感染扩散。【排除】B.免疫调节为调控应答强度和类型。C.免疫耐受为对特定抗原不应答。D.免疫监视针对突变细胞和肿瘤。E.免疫自稳维持自身耐受。 
[题目] 98. 2020年新冠肺炎在全世界范围内大流行，疫苗成为了人类战胜这种传染病的最大希望，注射疫苗是为了获得针对新冠病毒的哪种免疫功能
A. 免疫防御
B. 免疫监视
C. 免疫自稳
D. 免疫调节
E. 免疫记忆
[答案] E
[解析] 【正解E】注射疫苗的目的是激发机体产生针对新冠的免疫记忆(记忆T/B细胞),使机体在遇到真正病毒时能快速产生保护性应答。【排除】A.免疫防御需有抗体和效应细胞,疫苗建立免疫记忆后才发挥防御。B.免疫监视针对突变细胞。C.免疫自稳维持自身耐受。D.免疫调节调控应答强度。 
[题目] 99. 2020年新冠肺炎在全世界范围内大流行，发现老年人感染和死亡的风险较高，这是因为老年人的哪种免疫功能低下
A. 免疫调节
B. 免疫耐受
C. 免疫自稳
D. 免疫防御
E. 免疫监视
[答案] D
[解析] 【正解D】老年人免疫功能衰退主要表现为免疫防御功能低下(胸腺萎缩T输出减少+B细胞应答减弱),导致感染风险增加和病死率升高。【排除】A.免疫调节功能随年龄有一定变化但非主因。B.免疫耐受下降可致自身免疫增多但非感染主因。C.免疫自稳下降也与年龄有关但非新冠感染主因。E.免疫监视低下易致肿瘤,非感染主因。 
[题目] 100. 患者，男，52岁。2个月前开始出现上腹部隐痛不适，进食后明显，伴饱胀感，食欲逐渐下降，当地医院按“胃炎”进行治疗，稍好转。近半月自觉乏力，体重较2个月前下降3kg。近日大便色黑。来我院就诊，经进一步检查确诊为胃癌。该患者患该病的原因是
A. 免疫防御功能减弱
B. 免疫防御功能过强
C. 免疫监视功能失调
D. 免疫自稳功能失调
E. 免疫耐受功能失调
[答案] C
[解析] 【正解C】胃癌发生的核心原因是免疫监视功能失调,不能及时识别和清除胃黏膜突变的癌细胞,导致癌细胞持续增殖形成肿瘤。【排除】A.免疫防御减弱致感染易发。B.免疫防御过强致超敏反应。D.免疫自稳失调致自身免疫病。E.免疫耐受失调可参与但非肿瘤发生主因。 
[题目] 101. 2020年新冠肺炎在全世界范围内大流行，疫苗接种是最重要的控制手段，疫苗成功接种后的主要表现是体内产生抗新冠病毒的特异性抗体且长期存在，这些抗体主要来源于以下哪个免疫器官
A. 骨髓
B. 胸腺
C. 脾脏
D. 淋巴结
E. 扁桃体
[答案] A
[解析] 【正解A】疫苗接种后产生的长期特异性抗体主要由骨髓中长寿浆细胞持续分泌产生,骨髓为维持血清抗体水平的关键器官。【排除】B.胸腺为T细胞成熟场所。C.脾脏参与初次应答。D.淋巴结参与局部应答。E.扁桃体为局部黏膜应答。 
[章节] 第二章 固有免疫系统
[单选题]
[题目] 102. 下列属于固有免疫细胞的是
A. T淋巴细胞
B. B淋巴细胞
C. 浆细胞
D. 记忆细胞
E. 自然杀伤细胞(NK细胞)
[答案] E
[解析] 【正解E】NK细胞是固有免疫淋巴细胞，无需抗原预先致敏即可直接杀伤靶细胞，表达CD16/CD56标志，属于固有免疫系统的核心杀伤细胞。T/B/浆/记忆细胞均属适应性免疫系统。【排除】A.T淋巴细胞通过TCR特异性识别抗原肽-MHC复合物，需抗原致敏和克隆扩增，属适应性免疫。B.B淋巴细胞通过BCR识别特异性抗原表位，需Th辅助产生抗体，属适应性免疫。C.浆细胞由活化B细胞终末分化而来，分泌特异性抗体，属适应性免疫效应细胞。D.记忆细胞由活化T/B细胞分化而来，介导免疫记忆和再次快速应答，属适应性免疫。
[题目] 103. 固有免疫系统的组成不包括
A. 屏障结构
B. 固有免疫细胞
C. 固有免疫分子
D. 抗原提呈细胞
E. 黏膜免疫系统
[答案] D
[解析] 【正解D】抗原提呈细胞（如树突状细胞、巨噬细胞、B细胞）本身属于免疫细胞，虽然部分APC也是固有免疫细胞，但抗原提呈细胞作为一个功能分类概念并不专属于固有免疫系统。固有免疫系统的组成包括屏障结构、固有免疫细胞和固有免疫分子三部分。【排除】A.屏障结构（皮肤黏膜屏障等）是固有免疫系统的第一道防线。B.固有免疫细胞（NK、巨噬、中性粒等）是固有免疫系统的核心细胞组分。C.固有免疫分子（补体、防御素、CRP等）构成固有免疫的体液成分。E.黏膜免疫系统包含固有免疫和适应性免疫成分，有屏障和效应功能。
[题目] 104. 人体内执行非特异性免疫功能的第一道防线是
A. 皮肤和黏膜屏障
B. 血脑屏障
