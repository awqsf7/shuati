C. 胎盘屏障
D. 血胸腺屏障
E. 血睾屏障
[答案] A
[解析] 【正解A】皮肤和黏膜屏障构成机体抵抗病原体入侵的第一道防线，包括角质层等物理屏障、分泌液（溶菌酶、胃酸等）的化学屏障和正常菌群的微生物拮抗作用。血脑、胎盘、血胸腺、血睾屏障均为机体内屏障，不属于第一道防线。【排除】B.血脑屏障保护中枢神经系统微环境，属内屏障。C.胎盘屏障保护胎儿免受母体免疫攻击。D.血胸腺屏障保护胸腺髓质内发育中的T细胞。E.血睾屏障维持生精细胞发育微环境。
[题目] 105. 下列哪项是固有免疫细胞表面的模式识别受体(PRR)
A. TCR
B. TLR( Toll 样受体)
C. BCR
D. CD4 分子
E. CD8 分子
[答案] B
[解析] 【正解B】TLR（Toll样受体）是固有免疫细胞表面和胞内最主要的一类模式识别受体（PRR），识别病原体相关分子模式（PAMP）如LPS、肽聚糖、病毒核酸等，活化后启动固有免疫和炎症应答。TCR和BCR为适应性免疫淋巴细胞的特异性抗原受体。【排除】A.TCR（T细胞受体）为αβT细胞表面的适应性免疫受体，特异性识别抗原肽-MHC复合物。C.BCR（B细胞受体）为B细胞表面的适应性免疫受体，即膜结合型免疫球蛋白。D.CD4分子为辅助T细胞辅助受体，与MHC-II类分子结合。E.CD8分子为细胞毒性T细胞辅助受体，与MHC-I类分子结合。
[题目] 106. 固有免疫应答的特点不包括
A. 无特异性
B. 先天存在
C. 具有免疫记忆
D. 反应迅速
E. 参与早期防御
[答案] C
[解析] 【正解C】固有免疫应答不具有免疫记忆性，再次接触相同病原体时应答强度和速度不会增强，这是固有免疫与适应性免疫最核心的区别之一。其他选项（无特异性、先天存在、反应迅速、参与早期防御）均为固有免疫应答的正确特点。【排除】A.固有免疫识别的特异性有限，仅能识别PAMP/DAMP模式。B.固有免疫先天即存在，无需抗原预先刺激。D.固有免疫反应迅速，0-4小时内即可启动。E.固有免疫在感染早期即参与防御，是机体第一道防线。
[题目] 107. 可识别病原体相关分子模式(PAMP)的细胞是
A. T 细胞
B. B 细胞
C. 红细胞
D. 血小板
E. 巨噬细胞
[答案] E
[解析] 【正解E】巨噬细胞表面和胞内表达多种模式识别受体（PRR），如TLR、清道夫受体、甘露糖受体等，可直接识别病原体相关分子模式（PAMP）。T/B细胞通过TCR/BCR识别特异性抗原肽而非PAMP，红细胞和血小板不表达PRR，不参与免疫识别。【排除】A.T细胞通过TCR识别抗原肽-MHC复合物，不直接识别PAMP。B.B细胞通过BCR识别特异性抗原表位，不识别PAMP。C.红细胞不表达PRR，主要功能为运输氧气。D.血小板不表达PRR，主要参与止血和凝血。
[题目] 108. 下列属于固有免疫分子的是
A. IgG
B. IgM
C. IgA
D. 补体 C3
E. 细胞因子受体
[答案] D
[解析] 【正解D】补体C3是补体系统三条激活途径交汇的核心成分，补体系统属于固有免疫分子，可不依赖抗体通过旁路途径和MBL途径直接激活。IgG、IgM、IgA均为适应性免疫细胞产生的抗体分子，属适应性体液免疫效应分子。【排除】A.IgG由浆细胞产生，为适应性免疫主要抗体，可介导调理、中和及ADCC。B.IgM为初次免疫应答早期抗体，由活化B细胞/浆细胞产生。C.IgA主要存在于黏膜表面，为适应性免疫的分泌型抗体。E.细胞因子受体为跨膜蛋白，部分表达于固有免疫细胞表面，但其本身不属于固有免疫效应分子。
[题目] 109. 皮肤黏膜屏障的组成不包括
A. 角质层物理屏障
B. 朗格汉斯细胞
C. 黏膜表面分泌液
D. 正常菌群拮抗作用
E. 呼吸道纤毛摆动
[答案] B
[解析] 【正解B】朗格汉斯细胞是分布于皮肤表皮层的未成熟树突状细胞（DC），属于固有免疫细胞（抗原提呈细胞），不属于皮肤黏膜屏障的结构组分。皮肤黏膜屏障由物理屏障（角质层、上皮紧密连接）、化学屏障（皮脂、汗液中的溶菌酶和抗菌肽）和微生物屏障（正常菌群拮抗）三部分组成。【排除】A.角质层物理屏障是皮肤屏障的重要组成，机械阻挡病原体。C.黏膜表面分泌液含溶菌酶、乳铁蛋白等抗菌物质，属于化学屏障。D.正常菌群通过竞争营养和分泌抑菌物质拮抗病原体，属微生物屏障。E.呼吸道纤毛摆动通过机械清除方式排除病原体，属物理防御机制。
[题目] 110. 固有免疫细胞中具有直接杀伤靶细胞作用的是
A. NK 细胞
B. 树突状细胞
C. 肥大细胞
D. 嗜碱性粒细胞
E. 嗜酸性粒细胞
[答案] A
[解析] 【正解A】NK细胞是固有免疫中最重要的直接杀伤细胞，通过释放穿孔素（在靶细胞膜上形成孔洞）和颗粒酶（诱导凋亡）以及Fas-FasL凋亡途径直接杀伤病毒感染细胞和肿瘤细胞，无需抗原预先致敏。树突状细胞主司抗原提呈，肥大/嗜碱/嗜酸性粒细胞主要参与过敏反应和抗寄生虫免疫。【排除】B.树突状细胞主要功能为识别PAMP和抗原提呈，激活T细胞，不直接杀伤。C.肥大细胞参与I型超敏反应和抗寄生虫免疫。D.嗜碱性粒细胞参与过敏反应和抗寄生虫，非直接杀伤细胞。E.嗜酸性粒细胞主要参与抗寄生虫感染。
[题目] 111. 下列哪种细胞不属于固有免疫细胞
A. 中性粒细胞
B. 巨噬细胞
C. αβT 细胞
D. γδT 细胞
E. NKT 细胞
[答案] C
[解析] 【正解C】αβT细胞是适应性免疫系统的核心淋巴细胞，需抗原致敏、克隆扩增和分化为效应细胞后方可发挥功能，具有高度抗原特异性和MHC限制性。中性粒细胞、巨噬细胞、γδT细胞和NKT细胞均属于固有/固有样免疫细胞。【排除】A.中性粒细胞为固有免疫的专职吞噬细胞。B.巨噬细胞为固有免疫吞噬细胞兼抗原提呈细胞。D.γδT细胞为固有免疫样淋巴细胞，可直接识别非肽类抗原。E.NKT细胞为固有免疫样淋巴细胞，识别CD1d分子提呈的糖脂抗原。
[题目] 112. 补体系统激活后发挥的生物学效应不包括
A. 溶菌作用
B. 调理作用
C. 炎症介质作用
D. 清除免疫复合物
E. 特异性免疫应答调节
[答案] E
[解析] 【正解E】补体系统的主要生物学效应包括：溶菌/溶细胞作用（MAC在靶细胞膜形成穿膜孔道）、调理作用（C3b/CR1介导吞噬）、炎症介质作用（C3a/C5a为过敏毒素）和清除免疫复合物（免疫黏附）。补体不直接执行特异性免疫应答调节功能，特异性调节主要由适应性免疫分子完成。【排除】A.溶菌作用是补体终末MAC复合物形成导致病原体裂解。B.调理作用是C3b/C4b包被病原体促进吞噬细胞识别和吞噬。C.炎症介质作用通过C3a/C5a过敏毒素促进血管通透性增加和炎症细胞趋化。D.清除免疫复合物通过补体与红细胞CR1结合转运至肝脾清除。
[题目] 113. 固有免疫细胞表面能够识别病毒双链 RNA 的受体是
A. TLR2
B. TLR3
C. TLR4
D. TLR5
E. TLR9
[答案] B
[解析] 【正解B】TLR3表达于胞内器室膜（内体/溶酶体膜）上，特异性识别病毒双链RNA（dsRNA），通过TRIF信号通路激活IRF3/IRF7，诱导I型干扰素（IFN-α/β）产生，是抗病毒固有免疫的关键受体。各TLR配体具有高度特异性。【排除】A.TLR2与TLR1或TLR6形成异源二聚体，识别革兰阳性菌的肽聚糖和脂磷壁酸。C.TLR4与MD-2/CD14共同识别革兰阴性菌LPS。D.TLR5识别细菌鞭毛蛋白。E.TLR9表达于胞内器室膜，识别细菌和病毒的非甲基化CpG DNA。
[题目] 114. 参与固有免疫应答的细胞因子不包括
A. IL-1
B. IL-6
C. TNF-α
D. IL-10
E. IFN-γ
[答案] D
[解析] 【正解D】IL-10是重要的免疫抑制性/调节性细胞因子，主要由适应性免疫细胞（Th2、Treg、Tr1）和部分固有细胞分泌，主要功能是抑制炎症反应和免疫应答。IL-1、IL-6、TNF-α是固有免疫的核心促炎细胞因子（由活化巨噬细胞产生），IFN-γ由活化NK细胞产生，也参与固有免疫应答。【排除】A.IL-1是固有免疫早期产生的促炎因子，引起发热和急性期反应。B.IL-6是内源性致热原，促进急性期蛋白合成。C.TNF-α是固有免疫核心促炎因子，介导局部和全身炎症反应。E.IFN-γ由活化NK细胞产生，参与固有免疫抗病毒和抗肿瘤效应。
[题目] 115. 下列哪项是固有免疫应答的主要场所
A. 感染局部组织
B. 淋巴结
C. 脾脏
D. 骨髓
E. 胸腺
[答案] A
[解析] 【正解A】固有免疫应答主要发生于感染局部组织，皮肤黏膜屏障被突破后，局部巨噬细胞、中性粒细胞等固有免疫细胞迅速被募集至感染部位，通过吞噬、释放炎症介质和抗菌物质发挥作用。淋巴结和脾脏是适应性免疫应答（T/B细胞活化增殖）发生的主要场所。【排除】B.淋巴结是适应性免疫T/B细胞相遇和活化增殖的主要外周淋巴器官。C.脾脏是适应性免疫应答发生场所，负责血源性抗原的滤过和应答。D.骨髓为造血器官和B细胞发育分化的中枢场所。E.胸腺为T细胞发育分化的中枢场所。
[题目] 116. 中性粒细胞的主要功能是
A. 抗原提呈
B. 产生抗体
C. 吞噬杀菌
D. 免疫调节
E. 参与Ⅰ型超敏反应
[答案] C
[解析] 【正解C】中性粒细胞是血液中数量最多的白细胞（占白细胞总数50%-70%），主要功能为吞噬和杀灭细菌。其杀菌机制包括：吞噬体与溶酶体融合形成吞噬溶酶体，依赖活性氧中间体（ROI）、一氧化氮（NO）和髓过氧化物酶系统及多种蛋白水解酶发挥杀菌作用。【排除】A.抗原提呈主要由树突状细胞、巨噬细胞和B细胞完成，非中性粒细胞主要功能。B.产生抗体是B细胞/浆细胞的功能，中性粒细胞不产生抗体。D.免疫调节非中性粒细胞主要功能。E.参与I型超敏反应的主要是肥大细胞和嗜碱性粒细胞。
[题目] 117. 固有免疫分子中具有直接杀菌作用的是
A. 补体
B. 防御素
C. 细胞因子
D. 黏附分子
E. MHC分子
[答案] B
[解析] 【正解B】防御素是固有免疫中重要的抗菌肽，由上皮细胞和中性粒细胞等产生，通过带正电荷的氨基酸残基与病原体细胞膜带负电荷的磷脂结合，在膜上形成孔洞，破坏细胞膜完整性，具有广谱抗菌、抗真菌和抗某些包膜病毒的直接杀伤活性。【排除】A.补体通过溶细胞、调理、炎症介质等间接方式清除病原体，非直接杀菌肽。C.细胞因子是信号分子，通过受体介导调节免疫应答，不直接杀菌。D.黏附分子介导细胞间黏附和信号传导，不直接杀菌。E.MHC分子为抗原提呈分子，不具杀菌功能。
[题目] 118. 树突状细胞在固有免疫中的主要作用是
A. 直接杀伤病原体
B. 产生抗体
C. 参与适应性免疫应答启动
D. 分泌细胞因子
E. 识别 PAMP 并激活免疫细胞
[答案] E
[解析] 【正解E】树突状细胞通过表面PRR（如TLR、CLR等）识别病原体PAMP后被活化，分泌细胞因子（IL-12、IL-6、TNF-α等），并上调MHC-II和共刺激分子表达，增强抗原提呈能力，进而激活T细胞，是连接固有免疫和适应性免疫的关键桥梁。【排除】A.直接杀伤病原体主要是NK细胞和杀伤性T细胞的功能。B.产生抗体是B细胞和浆细胞的功能。C.参与适应性免疫应答启动是其功能之一，但未涵盖PRR识别PAMP的完整作用链。D.分泌细胞因子是其活化后的功能之一，但非最全面的描述。
[题目] 119. 下列哪种细胞可通过 ADCC 效应杀伤靶细胞
A. 中性粒细胞
B. 嗜酸性粒细胞
C. 嗜碱性粒细胞
D. NK 细胞
E. 肥大细胞
[答案] D
[解析] 【正解D】NK细胞表面表达CD16（FcγRIII，IgG Fc低亲和力受体），可通过ADCC效应（抗体依赖细胞介导的细胞毒作用）杀伤靶细胞——即识别并结合靶细胞表面IgG抗体的Fc段，释放穿孔素和颗粒酶溶解靶细胞。中性粒细胞和嗜酸性粒细胞也可参与ADCC，但NK细胞是ADCC最主要的效应细胞。【排除】A.中性粒细胞表达FcγR，也可参与ADCC，但主要功能为吞噬杀菌。B.嗜酸性粒细胞通过FcεR参与抗寄生虫ADCC。C.嗜碱性粒细胞主要参与I型超敏反应。E.肥大细胞主要参与I型超敏反应和抗寄生虫免疫。
[题目] 120. 固有免疫应答发生于感染后的
A. 0-4 小时
B. 4-96 小时
C. 96 小时后
D. 1 周后
E. 2 周后
[答案] A
[解析] 【正解A】固有免疫应答分为瞬时固有免疫应答阶段（感染后0-4小时），此阶段屏障结构、补体系统和预存的抗菌肽等立即发挥作用，是机体最快的防御反应。感染后4-96小时为早期诱导的固有免疫应答阶段（巨噬细胞活化、NK杀伤等），96小时后启动适应性免疫应答。【排除】B.4-96小时为早期诱导的固有免疫应答阶段。C.96小时后适应性免疫应答逐渐启动。D.1周后适应性免疫应答已建立。E.2周后适应性免疫应答达到高峰。
[题目] 121. 模式识别受体(PRR)的主要作用是识别
A. 自身细胞表面分子
B. 特异性抗原表位
C. 病原体相关分子模式(PAMP)
D. 肿瘤抗原
E. 变应原
[答案] C
[解析] 【正解C】模式识别受体（PRR）的主要功能是识别病原体共有且高度保守的分子结构——病原体相关分子模式（PAMP），如LPS、肽聚糖、鞭毛蛋白、病毒核酸等。PRR由胚系基因编码，数量有限（数百种），但可覆盖绝大多数病原体共有的分子特征。【排除】A.PRR识别非己分子而非自身细胞表面分子。B.特异性抗原表位由TCR/BCR识别，非PRR的配体。D.肿瘤抗原由适应性免疫系统识别。E.变应原（过敏原）由IgE结合肥大细胞/嗜碱粒细胞表面FcεRI识别。
[题目] 122. 下列属于固有免疫细胞的是
A. αβT 细胞
B. B2 细胞
C. 记忆 T 细胞
D. 浆细胞
E. γδT 细胞
[答案] E
[解析] 【正解E】γδT细胞属于固有免疫样淋巴细胞，其TCR由γ链和δ链组成，可直接识别非肽类抗原（磷酸化抗原、脂类抗原、HSP等），无需MHC提呈，反应迅速，功能介于固有免疫和适应性免疫之间。【排除】A.αβT细胞是适应性免疫核心细胞，需MHC限制性抗原提呈。B.B2细胞是适应性体液免疫B细胞，需Th辅助产生高亲和力抗体。C.记忆T细胞由活化αβT细胞分化，介导适应性免疫记忆。D.浆细胞由活化B2细胞终末分化，分泌特异性抗体。
[题目] 123. 补体旁路激活途径的起始分子是
A. C1q
B. C3
C. C4
D. C5
E. C9
[答案] B
[解析] 【正解B】补体旁路激活途径（替代途径）不依赖抗体和C1q，其起始分子是C3。生理状态下C3自发水解形成C3(H2O)，与B因子结合后由D因子裂解产生C3(H2O)Bb（液相C3转化酶），启动旁路途径级联反应。经典途径由C1q起始，MBL途径由MBL起始。【排除】A.C1q是经典途径的起始识别分子。C.C4参与经典途径和MBL途径，非旁路途径起始分子。D.C5是三条途径共同的终末阶段起始分子。E.C9是MAC复合物的组成成分，参与终末溶细胞阶段。
[题目] 124. 补体凝集素激活途径的C5转化酶是
A. C4b2a
B. C4b2a3a
C. C4b2a3b
D. C3bBb
E. C3bBb3b
[答案] E
[解析] 【正解E】补体凝集素途径（MBL途径）的C5转化酶是C3bBb3b（即C3b2Bb），与旁路途径的C5转化酶结构及组成相同。该酶由C3转化酶C3bBb与额外C3b结合形成，裂解C5为C5a和C5b，启动终末途径形成MAC。经典途径C5转化酶为C4b2a3b。【排除】A.C4b2a是经典途径C3转化酶。B.C4b2a3a不存在于补体激活途径中。C.C4b2a3b是经典途径C5转化酶。D.C3bBb是旁路途径C3转化酶。
[题目] 125. 下列哪种细胞具有很强的吞噬和清除衰老细胞功能
A. 巨噬细胞
B. 中性粒细胞
C. NK 细胞
D. 树突状细胞
E. 肥大细胞
[答案] A
[解析] 【正解A】巨噬细胞具有强大的吞噬功能，可识别并吞噬衰老、凋亡的体细胞和衰老损伤的红细胞，尤其在脾脏中负责清除衰老红细胞（红细胞寿命约120天），同时清除细胞碎片和组织重建中的凋亡细胞，维持组织稳态。【排除】B.中性粒细胞主要吞噬杀灭细菌，寿命短（数小时至数天），非清除衰老细胞的主要细胞。C.NK细胞通过杀伤靶细胞而非吞噬清除衰老细胞。D.树突状细胞主要功能为抗原提呈，吞噬能力弱于巨噬细胞。E.肥大细胞主要参与过敏反应和抗寄生虫免疫。
[题目] 126. 固有免疫分子中参与调理作用的是
A. 细胞因子
B. 防御素
C. 溶菌酶
D. C3b
E. C反应蛋白
[答案] D
[解析] 【正解D】C3b是补体系统中最重要的调理素，共价结合于病原体表面后，可被吞噬细胞（巨噬细胞、中性粒细胞）表面的C3b受体CR1（CD35）识别结合，显著促进吞噬细胞对病原体的吞噬和清除。IgG抗体通过Fc受体也可发挥调理作用，但C3b是固有免疫调理的核心分子。【排除】A.细胞因子为信号分子介导免疫调节，不直接参与调理。B.防御素为抗菌肽，通过破坏膜结构直接杀菌，非调理素。C.溶菌酶水解细菌细胞壁肽聚糖，不参与调理。E.C反应蛋白为急性期蛋白，激活补体并可结合磷酸胆碱，但非主要调理素。
[题目] 127. 下列哪项不属于固有免疫的组成部分
A. 皮肤黏膜屏障
B. 中性粒细胞
C. 抗原特异性 T 细胞
D. 补体系统
E. 树突状细胞
[答案] C
[解析] 【正解C】抗原特异性T细胞（αβT细胞）是适应性免疫系统的核心组成部分，通过TCR特异性识别抗原肽-MHC复合物，需抗原致敏和克隆扩增，不属于固有免疫系统。固有免疫的组成部分包括屏障结构、固有免疫细胞（巨噬细胞、NK细胞、DC、中性粒细胞等）和固有免疫分子（补体、抗菌肽等）。【排除】A.皮肤黏膜屏障是固有免疫系统的第一道防线。B.中性粒细胞是固有免疫主要的吞噬杀菌细胞。D.补体系统属于固有免疫体液分子。E.树突状细胞属于固有免疫细胞，兼具PRR识别和抗原提呈功能。
[题目] 128. NK 细胞杀伤靶细胞的机制不包括
A. 释放穿孔素和颗粒酶
B. 表达 CD40L
C. 诱导靶细胞凋亡
D. ADCC 效应
E. 分泌细胞因子
[答案] B
[解析] 【正解B】表达CD40L（CD154）是活化CD4+辅助T细胞的标志，CD40L与B细胞表面CD40结合提供T-B协作信号，促进B细胞活化和类别转换，不是NK细胞的杀伤机制。NK细胞的杀伤机制包括：释放穿孔素和颗粒酶（主要途径）、通过ADCC效应（CD16/FcγRIII识别IgG包被靶细胞）、Fas-FasL和TRAIL诱导靶细胞凋亡，以及分泌IFN-γ和TNF-α等效应细胞因子。【排除】A.穿孔素/颗粒酶是NK细胞主要杀伤途径。C.诱导靶细胞凋亡是NK细胞重要杀伤机制。D.ADCC效应是NK细胞以CD16/FcγRIII介导的杀伤方式。E.分泌IFN-γ等细胞因子参与NK细胞效应功能。
[题目] 129. 固有免疫应答中最早产生的细胞因子是
A. IL-1
B. IL-2
C. IL-4
D. IL-5
E. IL-12
[答案] A
[解析] 【正解A】IL-1（包括IL-1α和IL-1β）是固有免疫应答中最早产生的促炎细胞因子之一，由活化的巨噬细胞、DC等固有免疫细胞在接触PAMP后迅速产生，作用于多种细胞引发炎症和发热反应（内源性致热原），并促进急性期反应蛋白的合成。【排除】B.IL-2主要由活化T细胞产生，促进T细胞增殖，属于适应性免疫早期因子。C.IL-4由Th2和肥大细胞等产生，促进Th2分化和IgE类别转换。D.IL-5由Th2和ILC2产生，促进嗜酸性粒细胞分化。E.IL-12由活化的DC和巨噬细胞产生，促进Th1分化，产生时间略晚于IL-1。
[题目] 130. 下列哪种细胞属于固有免疫的抗原提呈细胞
A. A.B 细胞
B. αβT 细胞
C. 浆细胞
D. 记忆细胞
E. 树突状细胞
[答案] E
[解析] 【正解E】树突状细胞（DC）是固有免疫中最强的专职抗原提呈细胞（APC），也是唯一能有效激活初始T细胞（naive T cell）的APC。未成熟DC在外周组织中通过PRR识别PAMP后成熟，上调MHC-II和共刺激分子（CD80/CD86），迁移至淋巴结将加工后的抗原提呈给T细胞，启动适应性免疫应答。【排除】A.B细胞可通过BCR内化抗原后进行MHC-II抗原提呈，但非固有免疫APC。B.αβT细胞是接受抗原提呈的细胞，不是APC。C.浆细胞为B细胞终末分化细胞，专职分泌抗体。D.记忆细胞维持长久的免疫记忆，非APC。
[题目] 131. 参与固有免疫的补体激活途径不包括
A. 经典途径
B. 旁路途径
C. MBL 途径
D. TCR 途径
E. 以上均包括
[答案] D
[解析] 【正解D】TCR途径不存在于补体激活系统中，TCR（T细胞受体）是适应性免疫系统T淋巴细胞表面的特异性抗原识别受体，与补体系统毫无关联。补体系统只有三条激活途径：经典途径（由抗原-抗体复合物结合C1q起始）、旁路途径（C3自发水解起始）和MBL/凝集素途径（MBL识别病原体表面甘露糖起始）。【排除】A.经典途径存在，由免疫复合物中IgG/IgM结合C1q启动。B.旁路途径存在，C3自发水解后在病原体表面被放大。C.MBL途径存在。
[题目] 132. 固有免疫细胞表面的杀伤活化受体(KAR)识别的配体是
A. MHCⅠ 类分子
B. MHCⅡ 类分子
C. 非 MHC 分子
D. 抗原肽 - MHC 复合物
E. 黏附分子
[答案] C
[解析] 【正解C】NK细胞表面杀伤活化受体（KAR）分为多种类型：天然细胞毒性受体（NCR，如NKp30、NKp44、NKp46）和NKG2D等，它们识别的配体属于非MHC分子，包括应激诱导分子（MICA/B、ULBP等）和病毒蛋白（如流感病毒血凝素）。KAR与KIR（杀伤抑制受体）平衡决定NK细胞是否杀伤靶细胞。【排除】A.MHC-I类分子是NK细胞KIR（杀伤抑制受体）的配体，传递抑制信号。B.MHC-II类分子不被NK细胞主要受体直接识别。D.抗原肽-MHC复合物是TCR的配体。E.黏附分子介导细胞间黏附但非KAR的主要配体。
[题目] 133. 下列哪种物质属于固有免疫分子
A. IgG 抗体
B. C 反应蛋白(CRP)
C. 抗原受体
D. 细胞黏附分子
E. 主要组织相容性抗原
[答案] B
[解析] 【正解B】C反应蛋白（CRP）是肝脏合成的急性期反应蛋白，属于固有免疫分子中的分泌型模式识别分子。CRP可结合细菌表面的磷酸胆碱，通过类似C1q的方式激活补体经典途径，发挥调理作用和促进病原体清除，在感染早期迅速升高。【排除】A.IgG抗体是适应性体液免疫产物（浆细胞分泌）。C.抗原受体（TCR/BCR）属于适应性免疫受体。D.细胞黏附分子是膜蛋白，非固有免疫效应分子。E.主要组织相容性抗原（MHC分子）为抗原提呈分子。
[题目] 134. 中性粒细胞的趋化因子不包括
A. C5a
B. LTB4
C. IL-8
D. MCP-1
E. IFN-γ
[答案] E
[解析] 【正解E】IFN-γ（II型干扰素）主要由活化的T细胞（Th1和CTL）和NK细胞产生，是重要的免疫调节因子，但其不是中性粒细胞的主要趋化因子。中性粒细胞的主要趋化因子包括C5a（过敏毒素片段）、LTB4（花生四烯酸代谢产物）、IL-8（CXCL8，CXC趋化因子家族）和MCP-1（CCL2）等。【排除】A.C5a是强效的中性粒细胞趋化因子和激活剂。B.LTB4由活化巨噬细胞和中性粒细胞产生，趋化中性粒细胞。C.IL-8是中性粒细胞最主要的趋化因子和激活剂。D.MCP-1可趋化单核细胞并在一定程度上趋化中性粒细胞。
[题目] 135. 固有免疫应答的主要效应不包括
A. 清除病原体
B. 促进炎症反应
C. 启动适应性免疫
D. 产生高亲和力抗体
E. 维持内环境稳定
[答案] D
[解析] 【正解D】产生高亲和力抗体是适应性体液免疫应答的特征。B2细胞受T细胞依赖性抗原刺激后，在生发中心经历体细胞高频突变和亲和力成熟，产生高亲和力IgG/IgA/IgE抗体（需要CD4+Th辅助）。固有免疫应答以巨噬细胞吞噬杀菌、NK细胞杀伤、补体活化和炎症反应为主要效应，不产生高亲和力抗体。【排除】A.清除病原体是固有免疫应答的直接效应。B.促进炎症反应（释放IL-1、TNF-α等）是固有免疫核心效应。C.启动适应性免疫（DC提呈抗原给初始T细胞）是固有免疫的重要功能。E.维持内环境稳定（清除凋亡衰老细胞）是固有免疫的稳态维持功能。
[题目] 136. 下列哪种细胞可分泌大量 IL-12，促进 Th1 细胞分化
A. 树突状细胞
B. 巨噬细胞
C. NK 细胞
D. 中性粒细胞
E. 肥大细胞
[答案] A
[解析] 【正解A】活化的树突状细胞（特别是髓样树突状细胞/mDC/经典DC）在识别PAMP后成熟，可分泌大量IL-12和少量IL-2，诱导初始CD4+T细胞（Th0）向Th1细胞分化。Th1细胞分泌IFN-γ，促进细胞免疫应答（巨噬细胞活化、CTL分化等），这是固有免疫连接适应性免疫的关键环节。【排除】B.巨噬细胞活化后也分泌IL-12，但不如DC高效促进Th1分化。C.NK细胞主要分泌IFN-γ和穿孔素/颗粒酶。D.中性粒细胞主要功能为吞噬杀菌。E.肥大细胞参与过敏反应，不促进Th1分化。
[题目] 137. 固有免疫中识别革兰阴性菌脂多糖(LPS)的受体是
A. TLR2
B. TLR3
C. TLR4
D. TLR5
E. TLR6
[答案] C
[解析] 【正解C】TLR4同源二聚体与辅助分子MD-2和CD14共同识别革兰阴性菌的脂多糖（LPS/内毒素），通过MyD88和TRIF双信号通路激活NF-κB和IRF3，诱导促炎细胞因子和I型干扰素产生。TLR4是固有免疫识别革兰阴性菌最重要的PRR之一。【排除】A.TLR2识别革兰阳性菌肽聚糖、脂磷壁酸等。B.TLR3识别病毒双链RNA（dsRNA）。D.TLR5识别细菌鞭毛蛋白。E.TLR6与TLR2形成异源二聚体识别二酰化脂肽。
[题目] 138. 下列属于固有免疫细胞的是
A. αβT 细胞
B. B2 细胞
C. 记忆 B 细胞
D. 浆细胞
E. B1 细胞
[答案] E
[解析] 【正解E】B1细胞（CD5+B细胞）是固有免疫样B细胞，主要分布于胸腔、腹腔和肠壁固有层，可自发产生天然IgM抗体（低亲和力、多反应性），对TI-2抗原（多糖类抗原）快速应答，无类别转换和亲和力成熟，具有自我更新能力，属于固有免疫系统。B2细胞是适应性免疫的常规B细胞。【排除】A.αβT细胞是适应性免疫核心T细胞。B.B2细胞是适应性免疫常规B细胞，参与T细胞依赖性抗体应答。C.记忆B细胞由B2细胞经生发中心反应分化，介导体液免疫记忆。D.浆细胞由活化B细胞终末分化，大量分泌特异性抗体。
[题目] 139. 补体系统的生物学作用不包括
A. 溶细胞作用
B. 特异性免疫识别
C. 调理作用
D. 炎症介质作用
E. 免疫复合物清除
[答案] B
[解析] 【正解B】补体系统不执行特异性免疫识别功能——特异性免疫识别由适应性免疫系统的TCR（识别抗原肽-MHC复合物）和BCR/抗体（识别抗原表位）完成。补体的生物学作用包括：溶细胞作用（MAC穿孔）、调理作用（C3b/CR1）、炎症介质作用（C3a/C5a过敏毒素和趋化）和免疫复合物清除（免疫黏附）。【排除】A.溶细胞作用是补体终末MAC形成穿孔致靶细胞溶解。C.调理作用是C3b包被病原体促进吞噬。D.炎症介质作用为C3a/C5a促进血管扩张和白细胞趋化。E.免疫复合物清除为补体与免疫复合物结合后经红细胞CR1转运清除。
[题目] 140. 固有免疫中参与抗病毒感染的主要细胞是
A. 中性粒细胞
B. 嗜酸性粒细胞
C. 肥大细胞
D. NK 细胞
E. 巨噬细胞
[答案] D
[解析] 【正解D】NK细胞是抗病毒感染早期最重要的固有免疫细胞。病毒感染细胞后MHC-I类分子表达下调，NK细胞KIR无法识别自我信号而被活化，释放穿孔素/颗粒酶杀伤病毒感染细胞；同时分泌IFN-γ，直接抑制病毒复制并激活巨噬细胞。NK细胞的抗病毒作用发生在适应性CTL产生之前（感染后1-3天）。【排除】A.中性粒细胞主要抗细菌和真菌感染，对病毒感染作用有限。B.嗜酸性粒细胞主要参与抗寄生虫感染和过敏反应。C.肥大细胞主要参与过敏反应。E.巨噬细胞可吞噬病毒和病毒感染细胞并产生抗病毒因子，但不如NK细胞是抗病毒固有免疫的主要效应细胞。
[题目] 141. 下列哪种细胞具有很强的抗原提呈能力，并能激活初始 T 细胞
A. 树突状细胞
B. 巨噬细胞
C. NK 细胞
D. 中性粒细胞
E. B1 细胞
[答案] A
[解析] 【正解A】树突状细胞（DC）是体内功能最强的专职抗原提呈细胞，且是唯一能有效激活初始T细胞（naive T cell）的APC。成熟DC高表达MHC-I/II类分子和共刺激分子（CD80/CD86），可为T细胞活化提供第一信号（抗原肽-MHC-TCR）和第二信号（CD80/CD86-CD28），启动适应性免疫应答。【排除】B.巨噬细胞可提呈抗原给活化的效应T细胞，但激活初始T细胞能力弱。C.NK细胞不是抗原提呈细胞，主要功能为杀伤靶细胞。D.中性粒细胞主要功能为吞噬杀菌，非APC。E.B1细胞可产生天然IgM抗体，提呈抗原能力很弱。
[题目] 142. 固有免疫分子中具有致热作用的是
A. 补体
B. 防御素
C. IL-6
D. IFN-α
E. TNF-β
[答案] C
[解析] 【正解C】IL-6是重要的内源性致热原，由活化的巨噬细胞、DC等分泌，通过血脑屏障作用于下丘脑体温调节中枢，诱导前列腺素E2（PGE2）合成，使体温调定点上移导致发热。IL-1和TNF-α也具有致热作用，但在该题选项中以IL-6最为典型明确。【排除】A.补体不具备致热作用。B.防御素是抗菌肽直接杀菌，不参与发热。D.IFN-α具有抗病毒和免疫调节作用，有轻度致热效应但非主要致热原。E.TNF-β（淋巴毒素）主要参与淋巴器官发育和细胞凋亡。
[题目] 143. 下列哪项是固有免疫应答的特点
A. 特异性强
B. 具有免疫记忆
C. 作用时间长
D. 需抗原刺激后产生
E. 先天存在，反应迅速
[答案] E
[解析] 【正解E】固有免疫应答的核心特点包括：先天存在（生而有之，无需抗原预先刺激）、反应迅速（0-4小时内启动，4-96小时发挥效应）、无抗原特异性（通过PRR识别PAMP模式而非特定抗原）、无免疫记忆（再次应答不增强），是机体防御的第一道防线。【排除】A.特异性强是适应性免疫而非固有免疫的特点。B.具有免疫记忆是适应性免疫的核心特征。C.作用时间长是适应性免疫特征（可维持数年甚至终身）。D.需抗原刺激后产生是适应性免疫特征，固有免疫先天存在。
[题目] 144. NK 细胞表面的杀伤抑制受体(KIR)识别的配体是
A. MHCⅠ 类分子
B. MHCⅡ 类分子
C. 非 MHC 分子
D. 抗原肽 - MHCⅡ 复合物
E. 黏附分子
[答案] A
[解析] 【正解A】NK细胞表面的杀伤抑制受体（KIR，杀伤细胞免疫球蛋白样受体）识别靶细胞表面的HLA-I类分子（MHC-I类分子）。正常细胞表达MHC-I类分子，与KIR结合后通过胞质区ITIM基序募集磷酸酶SHP-1/SHP-2，传递抑制信号阻止NK细胞活化杀伤。病毒感染细胞或肿瘤细胞MHC-I下调则KIR无法传递抑制信号，NK细胞被激活杀伤。【排除】B.MHC-II类分子不被KIR直接识别。C.非MHC分子（如MICA/B）是NKG2D活化受体的配体。D.抗原肽-MHC-II复合物是CD4+T细胞TCR的配体。E.黏附分子介导NK-靶细胞黏附但非抑制信号。
[题目] 145. 参与固有免疫的细胞因子中，具有抗病毒作用的是
A. IL-1
B. IFN-α/β
C. TNF-α
D. IL-6
E. IL-8
[答案] B
[解析] 【正解B】IFN-α/β（I型干扰素）是抗病毒固有免疫最关键的细胞因子。病毒感染后，受感染细胞和pDC通过胞质PRR（RIG-I、cGAS等）和TLR识别病毒核酸，大量产生I型IFN。I型IFN与邻近细胞表面IFNAR结合，通过JAK-STAT通路诱导数百种抗病毒蛋白（如PKR、OAS、Mx蛋白等）表达，使细胞进入抗病毒状态，抑制病毒复制和传播。【排除】A.IL-1为促炎因子，不直接抗病毒。C.TNF-α为促炎因子，间接参与抗病毒。D.IL-6为促炎和致热因子。E.IL-8为趋化因子，募集中性粒细胞。
[题目] 146. 下列哪种细胞不属于髓系固有免疫细胞
A. 中性粒细胞
B. 巨噬细胞
C. 树突状细胞
D. NKT 细胞
E. 嗜酸性粒细胞
[答案] D
[解析] 【正解D】NKT细胞来源于骨髓淋巴样祖细胞（common lymphoid progenitor），属于淋巴系而非髓系，因此不属于髓系固有免疫细胞。中性粒细胞、巨噬细胞、树突状细胞（经典DC/mDC来源于髓系）和嗜酸性粒细胞均来源于骨髓髓样祖细胞（common myeloid progenitor），属于髓系固有免疫细胞。【排除】A.中性粒细胞来源于髓系，为髓系固有免疫细胞。B.巨噬细胞来源于髓系单核细胞。C.树突状细胞有髓系来源（经典DC/mDC）。E.嗜酸性粒细胞来源于髓系。
[题目] 147. 固有免疫中识别肽聚糖的受体是
A. TLR2
B. TLR3
C. TLR4
D. TLR5
E. TLR7
[答案] A
[解析] 【正解A】TLR2与TLR1或TLR6形成异源二聚体，识别革兰阳性菌细胞壁中的肽聚糖（PGN）、脂磷壁酸（LTA）、脂蛋白和分枝杆菌的脂阿拉伯甘露聚糖等。TLR2/TLR1识别三酰化脂肽，TLR2/TLR6识别二酰化脂肽，通过MyD88信号通路激活NF-κB，诱导促炎细胞因子产生。【排除】B.TLR3识别病毒dsRNA。C.TLR4识别革兰阴性菌LPS。D.TLR5识别细菌鞭毛蛋白。E.TLR7识别病毒单链RNA（ssRNA），表达于胞内器室膜。
[题目] 148. 补体 MBL 激活途径的起始分子是
A. C1q
B. C3
C. C4
D. C5
E. 甘露糖结合凝集素(MBL)
[答案] E
[解析] 【正解E】补体MBL激活途径（凝集素途径）的起始分子是甘露糖结合凝集素（MBL），由肝脏合成并分泌入血。MBL识别并结合病原体表面甘露糖、N-乙酰氨基葡萄糖等糖残基后，构象改变继而激活MBL相关丝氨酸蛋白酶（MASP-1和MASP-2），MASP-2裂解C4和C2产生C3转化酶C4b2a，后续步骤与经典途径相似。【排除】A.C1q是经典途径起始分子。B.C3是旁路途径起始分子。C.C4被MASP裂解参与级联但非起始识别分子。D.C5是终末途径起始分子。
[题目] 149. 下列哪种物质属于抗菌肽
A. 补体
B. 细胞因子
C. 防御素
D. 黏附分子
E. C 反应蛋白
[答案] C
[解析] 【正解C】防御素是人体内重要的抗菌肽，属于固有免疫效应分子，由上皮细胞、中性粒细胞和Paneth细胞（小肠潘氏细胞）等产生。防御素分子含3对二硫键形成β片层结构，通过带正电氨基酸与病原体细胞膜带负电磷脂相互作用，在膜上形成孔道，导致内容物外漏和细胞死亡，具有广谱抗菌、抗真菌和抗包膜病毒活性。【排除】A.补体通过级联反应发挥溶细胞、调理等作用，非抗菌肽。B.细胞因子是免疫调节信号分子，非直接杀菌。D.黏附分子介导细胞间黏附。E.C反应蛋白是急性期蛋白，激活补体而非直接杀菌。
[题目] 150. 固有免疫细胞中，能够识别寄生虫并参与杀伤的是
A. 中性粒细胞
B. 嗜酸性粒细胞
C. 嗜碱性粒细胞
D. 肥大细胞
E. NK 细胞
[答案] B
[解析] 【正解B】嗜酸性粒细胞是抗寄生虫感染最重要的固有免疫细胞。它通过Fc受体（FcεRI、FcγR）识别结合IgE/IgG包被的寄生虫，脱颗粒释放主要碱性蛋白（MBP）、嗜酸性粒细胞阳离子蛋白（ECP）、嗜酸性粒细胞过氧化物酶（EPO）和嗜酸性粒细胞衍生神经毒素（EDN），对寄生虫体壁造成损伤并杀伤寄生虫。【排除】A.中性粒细胞主要吞噬杀灭细菌和真菌。C.嗜碱性粒细胞参与过敏反应和抗寄生虫但非主要杀伤细胞。D.肥大细胞以脱颗粒介导I型超敏反应为主。E.NK细胞主要杀伤病毒感染细胞和肿瘤细胞。
[题目] 151. 下列哪项不是固有免疫分子的作用
A. 直接杀伤病原体
B. 调理作用
C. 激活补体
D. 特异性结合抗原
E. 参与炎症反应
[答案] D
[解析] 【正解D】特异性结合抗原是适应性免疫分子（抗体/免疫球蛋白、TCR、BCR）的核心功能，抗体通过可变区互补决定区（CDR）与抗原表位高亲和力、高特异性结合。固有免疫分子（补体、防御素、CRP、MBL等）通过模式识别方式识别PAMP/DAMP，不进行精细的特异性抗原识别。【排除】A.防御素等固有免疫分子可直接破坏病原体细胞膜杀伤。B.补体C3b等具有调理作用促进吞噬。C.CRP和MBL可激活补体经典途径和MBL途径。E.补体C3a/C5a和促炎细胞因子参与炎症反应。
[题目] 152. 树突状细胞的主要功能不包括
A. 识别 PAMP
B. 抗原提呈
C. 产生抗体
D. 分泌细胞因子
E. 激活 T 细胞
[答案] C
[解析] 【正解C】产生抗体是B淋巴细胞及其终末分化细胞浆细胞的专属功能，树突状细胞不能产生抗体。DC的主要功能包括：通过PRR识别PAMP并活化、摄取加工抗原、上调MHC-II和共刺激分子后迁移至淋巴结、将抗原提呈给初始T细胞并激活之、分泌IL-12等细胞因子调控T细胞分化方向。【排除】A.识别PAMP是DC通过PRR的核心功能。B.抗原提呈是DC作为专职APC的首要功能。D.分泌细胞因子（IL-12、IL-6、TNF-α）是DC活化的结果。E.激活初始T细胞是DC区别于其他APC的关键能力。
[题目] 153. NK 细胞区别于 T 细胞的主要标志是
A. 表达 CD3 分子
B. 表达 TCR
C. 表达 CD4 或 CD8
D. 表达 CD28
E. 表达 CD16 和 CD56
[答案] E
[解析] 【正解E】NK细胞区别于T细胞的特征性表面标志是表达CD16（FcγRIII，低亲和力IgG Fc受体）和CD56（NCAM），而不表达T细胞特征性的CD3/TCR复合物。CD3是T细胞谱系标志，TCR是T细胞抗原识别受体，CD4/CD8是T细胞辅助受体——这些都是NK细胞所不表达的。【排除】A.CD3分子是T细胞谱系标志，NK细胞不表达。B.TCR是T细胞抗原受体，NK细胞无TCR。C.CD4或CD8是T细胞辅助受体，NK细胞不表达。D.CD28是T细胞重要的共刺激分子受体，NK细胞不表达。
[题目] 154. 固有免疫中参与真菌感染识别的受体是
A. Dectin-1
B. TLR3
C. TLR4
D. TLR5
E. TLR9
[答案] A
[解析] 【正解A】Dectin-1（树突状细胞相关性C型凝集素-1）是识别真菌细胞壁β-1,3-葡聚糖的膜型PRR，属于C型凝集素受体（CLR）家族。Dectin-1识别真菌后通过胞质区ITAM样基序传递活化信号（Syk-CARD9通路），诱导吞噬、活性氧产生和促炎/Th17极化细胞因子分泌，在抗真菌（如白念珠菌、曲霉菌）固有免疫中起核心作用。【排除】B.TLR3识别病毒dsRNA。C.TLR4识别革兰阴性菌LPS。D.TLR5识别细菌鞭毛蛋白。E.TLR9识别非甲基化CpG DNA。
[题目] 155. 下列哪种细胞属于固有免疫的淋巴细胞
A. αβT 细胞
B. B2 细胞
C. 浆细胞
D. NKT 细胞
E. 记忆 T 细胞
[答案] D
[解析] 【正解D】NKT细胞（自然杀伤T细胞）属于固有免疫淋巴细胞，同时表达TCR（限制性TCR库，Vα14-Jα18/Vβ8等）和NK细胞表面标志（NK1.1/CD56）。NKT细胞识别CD1d分子提呈的糖脂抗原（如α-GalCer），应答迅速，胞内预存效应分子，功能介于固有免疫和适应性免疫之间，属固有免疫样淋巴细胞。【排除】A.αβT细胞是适应性免疫核心T细胞。B.B2细胞是适应性免疫常规B细胞。C.浆细胞由活化B细胞分化，分泌抗体属适应性免疫效应细胞。E.记忆T细胞由活化αβT细胞分化，介导适应性免疫记忆。
[题目] 156. 补体激活后形成的膜攻击复合物是
A. C3b
B. C5b6789
C. C4b2a
D. C3bBb
E. C1qrs
[答案] B
[解析] 【正解B】C5b6789（即C5b-9复合物，又称膜攻击复合物MAC）是补体三条激活途径共同的终末效应产物。C5被C5转化酶裂解为C5a（释放到液相）和C5b后，C5b依次与C6、C7结合形成C5b67插入靶细胞膜，再结合C8和多个C9分子（10-16个）聚合形成贯穿膜脂双层的孔道，导致靶细胞溶解死亡。【排除】A.C3b是调理素和C5转化酶的组分。C.C4b2a是经典途径C3转化酶。D.C3bBb是旁路途径C3转化酶。E.C1qrs是经典途径起始复合物。
[题目] 157. 固有免疫应答中，能够募集白细胞到炎症部位的细胞因子是
A. IL-1
B. IL-6
C. TNF-α
D. IFN-γ
E. IL-8
[答案] E
[解析] 【正解E】IL-8（CXCL8）是CXC趋化因子家族的代表性成员，由活化的巨噬细胞、上皮细胞等在炎症刺激下产生，是中性粒细胞最主要的趋化因子和激活剂。IL-8与其受体CXCR1/CXCR2结合，诱导中性粒细胞沿趋化因子浓度梯度向炎症部位迁移，并激活中性粒细胞的吞噬和杀菌功能。【排除】A.IL-1为促炎因子，非趋化因子。B.IL-6为促炎因子和致热原。C.TNF-α为促炎因子，通过上调黏附分子间接促进白细胞募集。D.IFN-γ为免疫调节因子。
[题目] 158. 下列哪种细胞具有吞噬和消化衰老红细胞的功能
A. 巨噬细胞
B. 中性粒细胞
C. NK 细胞
D. 树突状细胞
E. 肥大细胞
[答案] A
[解析] 【正解A】巨噬细胞具有强大的吞噬和消化衰老红细胞的功能，尤其在脾脏红髓和肝脏（Kupffer细胞）中，巨噬细胞识别衰老红细胞表面暴露的磷脂酰丝氨酸和CD47表达减少等吃我信号，吞噬并消化红细胞。这一过程是维持红细胞动态平衡（每天约清除1%衰老红细胞，红细胞寿命约120天）和铁再循环的关键。【排除】B.中性粒细胞寿命短（血液循环中约6-8小时），不以清除衰老红细胞为主要功能。C.NK细胞通过杀伤靶细胞而非吞噬方式。D.树突状细胞吞噬能力弱。E.肥大细胞参与过敏反应。
[题目] 159. 固有免疫分子中，具有激活补体经典途径作用的是
A. 防御素
B. 溶菌酶
C. C反应蛋白(CRP)
D. 干扰素
E. 白细胞介素
[答案] C
[解析] 【正解C】C反应蛋白（CRP）是急性期反应蛋白，属固有免疫溶液中的分泌型模式识别分子。CRP可与细菌表面的磷酸胆碱结合，通过其胶原样区域与C1q结合，以类似免疫复合物的方式激活补体经典途径，进而产生C3b调理素和MAC，发挥调理吞噬和溶菌效应。【排除】A.防御素为抗菌肽直接杀菌，不激活补体。B.溶菌酶水解细菌细胞壁肽聚糖，不激活补体经典途径。D.干扰素为抗病毒因子，不直接激活补体。E.白细胞介素为免疫调节信号分子，不直接激活补体。
[题目] 160. NK 细胞杀伤靶细胞时，不需要
A. 识别异常细胞表面分子
B. 释放细胞毒性颗粒
C. 诱导靶细胞凋亡
D. 抗原致敏
E. ADCC 效应
[答案] D
[解析] 【正解D】NK细胞杀伤靶细胞的关键特征是不需要抗原预先致敏（priming/sensitization），即无需经过克隆扩增和分化为效应细胞的漫长过程。NK细胞预存杀伤效应分子（穿孔素、颗粒酶），其活化由KAR和KIR信号的平衡决定，一旦识别异常细胞即可立即释放细胞毒颗粒杀伤靶细胞，这是NK细胞与CTL（需要抗原致敏、克隆扩增约5-7天）最根本的区别。【排除】A.NK细胞需识别异常细胞表面分子（MHC-I下调或应激分子上调）。B.NK细胞通过释放细胞毒性颗粒（穿孔素/颗粒酶）杀伤。C.NK细胞可通过Fas-FasL和TRAIL诱导靶细胞凋亡。E.NK细胞可通过CD16/FcγRIII介导ADCC效应。
[题目] 161. 下列哪项是固有免疫系统的核心功能
A. 特异性清除抗原
B. 早期抵御病原体入侵
C. 产生免疫记忆
D. 调节适应性免疫
E. 维持免疫耐受
[答案] B
[解析] 【正解B】固有免疫系统的核心功能是早期（0-96小时）快速抵御病原体入侵，在适应性免疫应答建立之前（约需96小时以上）限制感染扩散、清除大部分病原体，并为适应性免疫应答的启动争取时间并提供必要的危险信号和共刺激信号。【排除】A.特异性清除抗原是适应性免疫（CTL和抗体）的功能。C.产生免疫记忆是适应性免疫的核心特征。D.调节适应性免疫是固有免疫的重要功能之一，但非核心功能。E.维持免疫耐受主要是调节性T细胞和中枢/外周耐受机制的功能。
[章节] 第三章 固有免疫应答
[单选题]
[题目] 162. 下列属于DAMP的是
A. 鞭毛蛋白
B. 脂多糖
C. 肽聚糖
D. 胞外ATP
E. CpG DNA
[答案] D
[解析] 【正解D】胞外ATP是典型的损伤相关分子模式（DAMP / alarmin），由坏死、受损或应激细胞被动释放或主动分泌到胞外。胞外ATP可被P2X7受体和NLRP3炎症小体感知，诱导炎症反应。鞭毛蛋白、LPS、肽聚糖和CpG DNA均来自病原体，属于PAMP（病原体相关分子模式），而非DAMP。【排除】A.鞭毛蛋白是细菌鞭毛成分，属PAMP。B.脂多糖（LPS）是革兰阴性菌细胞壁成分，属PAMP。C.肽聚糖是细菌细胞壁共有成分，属PAMP。E.CpG DNA是细菌和病毒的非甲基化DNA基序，属PAMP。
[题目] 163. 模式识别受体中属于胞质型PRR的是
A. RIG-I样受体
B. 清道夫受体
C. 甘露糖结合凝集素
D. TLR7同源二聚体
E. TLR5同源二聚体
[答案] A
[解析] 【正解A】RIG-I样受体（RLR，包括RIG-I、MDA5和LGP2）是胞质型模式识别受体，识别胞质中的病毒RNA（RIG-I识别5ppp短dsRNA，MDA5识别长dsRNA），通过MAVS/IPS-1接头分子激活IRF3/IRF7和NF-κB，诱导I型IFN产生。清道夫受体和TLR为膜型PRR，MBL为分泌型PRR。【排除】B.清道夫受体是巨噬细胞膜表面的膜型PRR。C.甘露糖结合凝集素（MBL）是分泌到血浆中的分泌型PRR。D.TLR7是表达于胞内器室膜而非胞质的PRR。E.TLR5是表达于细胞膜表面的膜型PRR。
[题目] 164. TLR4同源二聚体识别的病原体相关分子模式是
A. 细菌甘露糖残基
B. 细菌脂多糖
C. 细菌胞壁酰二肽
D. 病毒双链RNA
E. 病毒单链RNA
[答案] B
[解析] 【正解B】TLR4同源二聚体与辅助分子MD-2和CD14共同识别革兰阴性菌脂多糖（LPS/内毒素），TLR4胞外区有富含亮氨酸重复序列（LRR）结构域识别LPS的脂质A部分。活化后通过MyD88依赖途径（诱导促炎细胞因子）和TRIF依赖途径（诱导I型IFN）进行信号转导。【排除】A.细菌甘露糖残基由MBL和甘露糖受体识别，非TLR4。C.细菌胞壁酰二肽（MDP）由NOD2识别。D.病毒双链RNA由TLR3和RIG-I/MDA5识别。E.病毒单链RNA由TLR7/TLR8识别。
[题目] 165. TLR9同源二聚体识别的病原体相关分子模式是
A. 病毒非甲基化CpGDNA
B. 病毒单链RNA
C. 病毒双链RNA
D. 细菌脂多糖
E. 细菌肽聚糖
[答案] A
[解析] 【正解A】TLR9同源二聚体表达于胞内器室膜（内体/溶酶体膜）上，特异性识别细菌和病毒DNA中的非甲基化CpG DNA基序（CpG oligodeoxynucleotide）。哺乳动物自身DNA因CpG基序稀少且多为甲基化状态，不被TLR9识别。TLR9活化后通过MyD88-IRF7通路诱导大量I型IFN产生，在抗DNA病毒和细菌感染中起重要作用。【排除】B.病毒单链RNA由TLR7和TLR8识别。C.病毒双链RNA由TLR3识别。D.细菌脂多糖由TLR4识别。E.细菌肽聚糖由TLR2识别。
[题目] 166. NOD2识别的病原体相关分子模式是
A. 细菌甘露糖残基
B. 胞内DNA
C. 细菌胞壁酰二肽(MDP)
D. 二氨基庚二酸(DAP)
E. 病毒单链RNA
[答案] C
[解析] 【正解C】NOD2是胞质型PRR（NLR家族成员，NOD样受体），表达于巨噬细胞、DC和肠上皮细胞等胞质中，识别细菌肽聚糖的最小活性片段——胞壁酰二肽（MDP，Muramyl Dipeptide）。NOD2活化后通过RIP2激活NF-κB和MAPK通路，诱导促炎细胞因子产生。NOD2基因突变与克罗恩病易感性相关。【排除】A.细菌甘露糖残基由MBL和甘露糖受体识别。B.胞内DNA由cGAS和AIM2等识别。D.二氨基庚二酸（DAP，即iE-DAP）由NOD1识别。E.病毒单链RNA由TLR7/TLR8和RIG-I识别。
[题目] 167. NLRP3炎症小体活化后可蛋白水解产生的活性细胞因子是
A. IFN-α/β
B. IL-1β
C. IFN-γ
D. GM-CSF
E. IL-8
[答案] B
[解析] 【正解B】NLRP3炎症小体（inflammasome）是胞质多蛋白复合物，由NLRP3（NOD样受体蛋白3）、ASC（凋亡相关斑点样蛋白含CARD）和pro-caspase-1组装而成。活化后pro-caspase-1自剪切为活性caspase-1，后者蛋白水解切割pro-IL-1β和pro-IL-18产生成熟的有生物活性的IL-1β和IL-18，同时诱导gasdermin D介导的细胞焦亡。【排除】A.IFN-α/β由cGAS-STING和RLR-MAVS通路诱导。C.IFN-γ由NK和T细胞产生，非炎症小体产物。D.GM-CSF由活化T细胞和基质细胞产生。E.IL-8由NF-κB通路诱导产生，非炎症小体底物。
[题目] 168. cGAS识别的病原体相关分子模式是
A. 病毒单链RNA
B. 细菌脂多糖
C. 细菌胞壁酰二肽(MDP)
D. 胞质双链DNA
E. 病毒双链RNA
[答案] D
[解析] 【正解D】cGAS（环状GMP-AMP合酶）是胞质DNA感受器，识别胞质中的双链DNA（无论是来自病毒、细菌还是自身线粒体泄漏的DNA）。cGAS与dsDNA结合后被活化，催化ATP和GTP合成cGAMP（环状二核苷酸第二信使），后者结合并激活内质网膜上的STING蛋白，STING通过TBK1-IRF3通路和IKK-NF-κB通路诱导I型IFN和炎症因子产生。【排除】A.病毒单链RNA由TLR7/TLR8和RIG-I/MDA5识别。B.细菌脂多糖由TLR4识别。C.细菌胞壁酰二肽由NOD2识别。E.病毒双链RNA由TLR3和MDA5识别。
[题目] 169. NKT细胞可通过表面TCR直接识别结合的是
A. 细菌DNA
B. 靶细胞表面MHC-II类分子提呈的蛋白类抗原
C. 靶细胞表面MHC-I类分子提呈的蛋白类抗原
D. 靶细胞表面CD1分子提呈的蛋白类抗原
E. MICA/B
[答案] D
[解析] 【正解D】NKT细胞表面TCR（为半恒定TCR，如Vα14-Jα18/Vβ8等）识别CD1d分子提呈的糖脂类抗原（如α-半乳糖神经酰胺α-GalCer），而非MHC-I或MHC-II分子提呈的蛋白类抗原肽。CD1d是MHC-I类样分子，但提呈的是脂类和糖脂抗原而非蛋白质抗原肽，这是NKT细胞区别于常规αβT细胞的关键特征。【排除】A.细菌DNA由TLR9和cGAS识别，非NKT细胞TCR配体。B.MHC-II类分子提呈蛋白抗原给CD4+T细胞。C.MHC-I类分子提呈胞内蛋白抗原来CTL。E.MICA/B是NKG2D的配体，由NK细胞和γδT细胞等识别。
[题目] 170. 能够诱导ILC3活化的细胞因子是
A. IL-4、IL-13
B. IL-1β、IL-6
C. IFN-γ、IL-2
D. IL-1β、IL-23
E. IL-17、IL-22
[答案] D
[解析] 【正解D】ILC3（第3组固有淋巴样细胞，包括LTi细胞和NKp46+ILC3等）的活化依赖于IL-1β和IL-23的协同刺激。IL-23与其受体结合后通过STAT3信号通路激活ILC3，促使其分泌IL-17和IL-22，在肠道等黏膜部位维持屏障完整性、抵抗胞外细菌和真菌感染，并参与淋巴组织形成。【排除】A.IL-4和IL-13主要诱导ILC2活化产生Th2型应答。B.IL-1β参与ILC3活化但IL-6非ILC3主要活化因子。C.IFN-γ和IL-2可促进ILC1活化和NK细胞功能。E.IL-17和IL-22是ILC3的效应产物而非活化因子。
[题目] 171. B1细胞接受多糖抗原刺激后可产生
A. 以IgM为主的高亲和力抗体
B. 以IgM为主的低亲和力抗体
C. 以IgG为主的高亲和力抗体
D. 以IgG为主的低亲和力抗体
E. IgM和IgG两种抗体
[答案] B
[解析] 【正解B】B1细胞接受多糖抗原（TI-2抗原）刺激后，可在48小时内快速产生以IgM为主的低亲和力抗体，不经历类别转换（class switching）和亲和力成熟（affinity maturation），无免疫记忆。这与B2细胞的T细胞依赖性抗体应答（约7-14天产生高亲和力IgG/IgA/IgE并经类别转换和体细胞突变）截然不同。【排除】A.IgM为主的高亲和力抗体不是B1细胞产物，B1细胞抗体亲和力低。C.以IgG为主并产生高亲和力抗体是B2细胞T依赖性应答的特征。D.以IgG为主的低亲和力抗体亦非B1细胞典型产物。E.B1细胞应答不产生类别转换故不产生IgG。
[题目] 172. .初次免疫应答中，早期诱导的固有免疫应答发生于
A. 0-4小时
B. 0-8小时
C. 8-96小时
D. 4-96小时
E. 4-48小时
[答案] D
[解析] 【正解D】早期诱导的固有免疫应答（early induced innate response）发生于感染后4-96小时（约4天）。此阶段的特点是巨噬细胞识别PAMP后活化并分泌促炎因子（IL-1、IL-6、TNF-α）和趋化因子，NK细胞杀伤病毒感染细胞，DC成熟并迁移至淋巴结启动适应性免疫应答。0-4小时为即时固有免疫阶段（preformed effectors）。【排除】A.0-4小时为即时/瞬时固有免疫应答阶段。B.0-8小时跨越了即时和早期固有免疫阶段分界。C.8-96小时跨越分界。E.4-48小时范围不完整（早期诱导应至96小时）。
[题目] 173. 固有免疫细胞所不具备的特征是
A. 通过胚系基因编码模式识别受体
B. 表面膜是识别受体或泛特异性抗原受体较少多样性
C. 通常没有免疫记忆功能
D. 识别不具有特异性
E. 通过克隆选择迅速发挥免疫效应
[答案] E
[解析] 【正解E】通过克隆选择迅速发挥免疫效应是适应性免疫的特征而非固有免疫特征。克隆选择学说描述的是：抗原选择性地与表达对应特异性受体的淋巴细胞克隆结合，使其活化、增殖、分化为效应细胞和记忆细胞。固有免疫细胞通过胚系基因编码的PRR直接识别PAMP，不经克隆扩增和选择即可产生应答。【排除】A.固有免疫细胞PRR由胚系基因编码（数量有限约数百种），为正确描述。B.固有免疫受体多样性远少于BCR/TCR，为正确描述。C.固有免疫通常无记忆，为正确描述。D.固有免疫识别不具有高度特异性，为正确描述。
[题目] 174. 关于固有免疫应答说法不正确的是
A. 可启动适应性免疫应答
B. 识别特点具有特异性
C. 通过PRR识别PAMP
D. 一般无免疫记忆
E. 可协助适应性免疫应答效应产物发挥作用
[答案] B
[解析] 【正解B】识别特点具有特异性是不正确的说法——固有免疫识别不具有高度特异性，而是通过有限的模式识别受体（PRR）识别病原体共有的保守分子模式（PAMP）和损伤相关分子模式（DAMP），这种识别是模式性的（pattern-based）而非精细表位特异性的（后者为适应性免疫特征）。【排除】A.固有免疫可启动适应性免疫，通过DC提呈抗原和提供共刺激信号，为正确描述。C.通过PRR识别PAMP是固有免疫识别机制，为正确描述。D.固有免疫一般无记忆（除训练免疫等个别特例外），为正确描述。E.固有免疫通过调理（C3b）、ADCC等方式协助适应性效应产物，为正确描述。
[题目] 175. 在早期诱导的固有免疫应答阶段直接杀伤被感染靶细胞作用的主要细胞是
A. B2细胞
B. T细胞
C. NK细胞
D. 巨噬细胞
E. 中性粒细胞
[答案] C
[解析] 【正解C】在早期诱导的固有免疫应答阶段（感染后4-96小时），NK细胞是直接杀伤被感染靶细胞（特别是病毒感染细胞）的主要效应细胞。NK细胞无需抗原预先致敏，一旦识别靶细胞表面MHC-I类分子下调或应激分子上调，即可立即释放穿孔素/颗粒酶杀伤靶细胞，此阶段适应性CTL尚未形成（需约5-7天）。【排除】A.B2细胞是适应性免疫细胞，产生抗体需T细胞辅助和较长时间。B.T细胞（αβT）为适应性免疫细胞，需抗原致敏和克隆扩增。D.巨噬细胞主要功能为吞噬和分泌细胞因子，非直接杀伤靶细胞。E.中性粒细胞主要吞噬杀菌，不直接杀伤病毒感染靶细胞。
[题目] 176. 下列受体中属于模式识别受体的是
A. 细胞因子受体
B. 补体受体
C. T细胞受体
D. Toll 样受体
E. B细胞受体
[答案] D
[解析] 【正解D】Toll样受体（TLR）是最经典和最早被发现的模式识别受体（PRR）家族，包括TLR1-TLR10（人），识别多种PAMP。TLR属于膜型PRR（细胞膜或内体膜），通过TIR结构域传递信号。TCR和BCR为适应性免疫的特异性抗原受体，补体受体和细胞因子受体各自属于各自的系统，不称为模式识别受体。【排除】A.细胞因子受体识别细胞因子而非PRR类受体。B.补体受体识别补体裂解片段（如C3b/CR1），非PRR。C.T细胞受体（TCR）为适应性免疫受体，识别MHC-抗原肽。E.B细胞受体（BCR）为适应性免疫受体，即膜Ig。
[题目] 177. 模式识别受体可识别
A. 细菌表面的甘露糖残基
B. 肿瘤相关抗原
C. 肿瘤特异性抗原
D. MHC-I 类分子
E. MHC-Ⅱ类分子
[答案] A
[解析] 【正解A】模式识别受体（PRR）可识别病原体共有的保守分子结构（PAMP），包括：细菌表面的甘露糖残基、岩藻糖残基（被MBL和甘露糖受体识别），LPS（被TLR4识别），肽聚糖（被TLR2和NOD1/NOD2识别），鞭毛蛋白（被TLR5识别），病毒核酸（被TLR3/7/8/9和RLR识别）等。PRR不能识别肿瘤抗原或MHC分子，后者由适应性免疫系统处理。【排除】B.肿瘤相关抗原主要由适应性免疫（抗体和T细胞）识别。C.肿瘤特异性抗原由TCR（T细胞）识别。D.MHC-I类分子由CD8和TCR识别。E.MHC-II类分子由CD4和TCR识别。
[题目] 178. 属于分泌型模式识别受体的是
A. α-防御素
B. 甘露糖结合凝集素
C. 乳铁蛋白
D. 甘露糖受体
E. Toll样受体
[答案] B
[解析] 【正解B】甘露糖结合凝集素（MBL）由肝脏合成后分泌到血液和组织液中，以游离可溶形式存在，属于分泌型模式识别受体（soluble PRR）。MBL识别病原体表面的甘露糖、N-乙酰氨基葡萄糖等糖残基，通过活化MASP启动补体MBL途径。其他分泌型PRR还包括纤维胶凝蛋白（ficolin）、表面活性蛋白SP-A/SP-D等。【排除】A.α-防御素是抗菌肽（效应分子），非PRR。C.乳铁蛋白是铁结合蛋白，具抗菌活性但非PRR。D.甘露糖受体是膜型PRR（表达于巨噬细胞/DC表面）。E.Toll样受体是膜型PRR（细胞膜或内体膜）。
[题目] 179. 以游离形式存在的病原相关模式分子是
A. G-菌脂多糖
B. G+菌肽聚糖
C. 细菌甘露糖
D. 分枝杆菌脂蛋白
E. 细菌非甲基化 CpG DNA
[答案] E
[解析] 【正解E】细菌非甲基化CpG DNA是游离形式的病原体相关分子模式（PAMP），可被释放到胞外环境或被内化至内体中由TLR9识别。LPS（脂多糖）、肽聚糖、甘露糖残基和脂蛋白通常作为细菌细胞壁或细胞膜的组成结构成分存在，与细菌结构紧密结合，不以大量游离形式存在。【排除】A.G-菌脂多糖是细胞壁外膜结构成分，非游离形式。B.G+菌肽聚糖是细胞壁骨架结构成分，非游离形式。C.细菌甘露糖通常连接于细菌表面糖蛋白/糖脂上。D.分枝杆菌脂蛋白嵌入细菌细胞壁/膜中。
[题目] 180. NK细胞表面能够识别HLAI 类分子的杀伤抑制性受体是
A. KIR2DL
B. KIR3DS
C. CD94/NKG2C
D. NKG2D
E. NKp30
[答案] A
[解析] 【正解A】KIR2DL（杀伤细胞免疫球蛋白样受体2DL，如KIR2DL1/2/3/4/5）是NK细胞表面识别HLA-I类分子（MHC-I）的主要杀伤抑制性受体，胞质区含1-2个ITIM（免疫受体酪氨酸抑制基序），与MHC-I结合后ITIM被磷酸化，募集磷酸酶SHP-1/SHP-2，去磷酸化抑制活化信号。CD94/NKG2A异源二聚体也是抑制性受体但识别HLA-E（非经典MHC-I）。【排除】B.KIR3DS胞质区与DAP12耦联传递活化信号，非抑制性受体。C.CD94/NKG2C与DAP12耦联传递活化信号。D.NKG2D与DAP10耦联传递活化信号，识别MICA/B而非HLA-I。E.NKp30属天然细胞毒性受体NCR，传递活化信号。
[题目] 181. NK 细胞表面能够识别流感病毒血凝素的杀伤活化性受体是
A. KIR2DL
B. KIR3DS
C. CD94/NKG2C
D. CD94/NKG2A
E. NKp44
[答案] E
[解析] 【正解E】NKp44是NK细胞天然细胞毒性受体（NCR）家族成员之一（还包括NKp30和NKp46），可直接识别流感病毒血凝素（HA）和某些肿瘤细胞表面分子。其跨膜区含带正电荷氨基酸与含ITAM的DAP12同源二聚体非共价结合传递活化信号，属于杀伤活化性受体。NKp44仅在活化的NK细胞上表达。【排除】A.KIR2DL是识别HLA-I类分子的抑制性受体。B.KIR3DS是活化性受体但识别HLA-I类分子。C.CD94/NKG2C识别HLA-E传递活化信号。D.CD94/NKG2A识别HLA-E传递抑制信号。
[题目] 182. NK细胞表面能与 DAP-10 同源二聚体非共价结合组成活化性受体的分子是
A. CD94/NKG2A
B. NKG2D
C. NKp44
D. KIR3DL
E. CD94/NKG2C
[答案] B
[解析] 【正解B】NKG2D（NK group 2 member D）是NK细胞和某些T细胞表面的重要活化性受体，属C型凝集素超家族。其跨膜区与DAP10同源二聚体非共价结合，DAP10胞质区含YxxM基序，活化后募集PI3K和Grb2信号分子（而非ITAM-Syk/ZAP70通路），传递活化信号，与识别MICA/B和ULBP等应激诱导配体的功能适配。【排除】A.CD94/NKG2A为抑制性受体。C.NKp44与DAP12非共价结合。D.KIR3DL为抑制性受体，胞质区自身含ITIM。E.CD94/NKG2C与DAP12非共价结合传递活化信号。
[题目] 183. NKT细胞表面TCR 识别结合的配体是
A. MHC-I类分子提呈的抗原肽
B. CD1分子提呈的磷脂/糖脂类抗原
C. MHC-Ⅱ类分子提呈的抗原肽
D. 某些肿瘤细胞表面的 MIC A/B分子
E. 细菌脂多糖
[答案] B
[解析] 【正解B】NKT细胞表面TCR（为半恒定TCR，小鼠Vα14-Jα18，人Vα24-Jα18）识别由CD1d分子（非经典MHC-I类样分子）提呈的磷脂和糖脂类抗原，经典配体为α-半乳糖神经酰胺（α-GalCer）。CD1d分子具有疏水性抗原结合沟槽，特异性结合和提呈脂质/糖脂抗原而非蛋白质抗原肽，这是NKT细胞与常规αβT细胞的最本质区别。【排除】A.MHC-I类分子提呈蛋白肽给CD8+T细胞。C.MHC-II类分子提呈蛋白肽给CD4+T细胞。D.MICA/B是NKG2D的应激诱导配体，非TCR配体。E.细菌脂多糖由TLR4识别。
[题目] 184. γδT细胞所不能识别的抗原是
A. 表达于感染细胞表面的热休克蛋白
B. 感染细胞表面 CD1分子提呈的脂类抗原
C. 表达于感染细胞表面的某些病毒蛋白
D. 表达于抗原提呈细胞表面的抗原肽-MHC分子复合物
E. 表达于感染细胞表面的磷酸化抗原
[答案] D
[解析] 【正解D】γδT细胞不能识别MHC分子提呈的抗原肽-MHC复合物，这是其区别于αβT细胞的核心特征之一。γδT细胞可直接识别：感染细胞表面表达的热休克蛋白（HSP）、CD1分子提呈的脂类抗原（类似于NKT细胞）、某些病毒蛋白（如疱疹病毒蛋白）和磷酸化抗原（如细菌代谢产物HMB-PP等磷酸化代谢中间物），无需MHC分子参与提呈。【排除】A.HSP是γδT细胞可识别的抗原。B.CD1提呈脂类抗原是γδT细胞可识别的配体。C.某些病毒蛋白可被γδT细胞直接识别。E.磷酸化抗原是Vγ9Vδ2 T细胞识别的典型配体。
[题目] 185. γδT 细胞所不具备的生物学作用是
A. 非特异性杀伤某些病毒感染的靶细胞
B. 非特异性杀伤某些肿瘤细胞
C. 分泌细胞因子介导炎症反应
D. 分泌细胞因子参与免疫调节
E. 非特异性杀伤衰老损伤的自身细胞
[答案] E
[解析] 【正解E】γδT细胞具有非特异性杀伤某些病毒感染细胞和肿瘤细胞的能力，可分泌IFN-γ和TNF-α等细胞因子介导炎症反应和参与免疫调节，但对非特异性杀伤衰老损伤的自身细胞不是其典型的生物学作用。清除衰老损伤细胞主要依赖于巨噬细胞的吞噬清除功能，而非γδT细胞的杀伤作用。【排除】A.杀伤病毒感染细胞是γδT细胞的重要功能。B.杀伤肿瘤细胞是γδT细胞的重要功能。C.分泌IFN-γ/TNF-α介导炎症是γδT细胞效应功能。D.分泌细胞因子参与免疫调节（如IL-17+γδT细胞促进Th17）是γδT细胞的调节功能。
[题目] 186. 具有自我更新能力的淋巴细胞是
A. NK细胞
B. B1细胞
C. B2细胞
D. γδT细胞
E. αβT细胞
[答案] B
[解析] 【正解B】B1细胞（CD5+B细胞）具有自我更新能力，可在胸腹腔和肠壁固有层中通过低水平增殖维持自身细胞数量，不需持续从骨髓前体细胞补充，类似于固有免疫细胞的维持方式。B2细胞、αβT细胞、γδT细胞和NK细胞均不具有显著的自我更新能力，需持续从骨髓或胸腺前体细胞补充。【排除】A.NK细胞寿命较短，在体内需持续由骨髓前体分化补充。C.B2细胞为适应性B细胞，由骨髓持续产生输出。D.γδT细胞虽有部分局部增殖但以胸腺输出为主。E.αβT细胞在胸腺发育后经外周维持和稳态增殖但不具典型自我更新能力。
[题目] 187. B1 细胞主要分布于
A. 血液
B. 淋巴液
C. 胸腺浅皮质区
D. 胸、腹腔和肠壁固有层
E. 淋巴结浅皮质区
[答案] D
[解析] 【正解D】B1细胞主要分布于胸腔、腹腔（腹膜腔和胸膜腔）以及肠壁固有层等黏膜相关部位，是体腔免疫和黏膜免疫的主要效应B细胞。B1细胞在胚胎期由胎肝（小鼠）前体细胞产生，出生后持续存在于腹腔等部位并通过自我更新维持。B2细胞则主要分布于外周淋巴器官（淋巴结、脾脏）。【排除】A.血液中B细胞以B2细胞为主。B.淋巴液中以B2细胞和T细胞为主。C.胸腺浅皮质区为未成熟T细胞所在区域。E.淋巴结浅皮质区为B细胞（B2细胞）滤泡区。
[题目] 188. B1细胞表面具有鉴别意义的标志是
A. TCR- 、mlgM+ 、CD5+
B. TCR- 、mlgM+/IgD+ 、CD5~
C. TCR+、CD56+、CD16
D. TCR-、CD56+、CD16+
E. TCR- 、CD34+ 、CD117+
[答案] A
[解析] 【正解A】B1细胞（CD5+B细胞）的表型特征为：不表达TCR（TCR-）、膜表面IgM高表达（mIgM+）、膜表面IgD低表达或不表达（mIgDlow/-）、特征性表达CD5分子（CD5+）。B2细胞（常规B细胞）的表型为TCR-、mIgM+/mIgD+、CD5-。通过CD5表达与否可将B1细胞与B2细胞明确区分开来。【排除】B.TCR-/mIgM+/IgD+/CD5-是B2细胞的表型。C.TCR+/CD56+/CD16+是NKT细胞或γδT细胞的表型。D.TCR-/CD56+/CD16+是NK细胞的特征性表型。E.TCR-/CD34+/CD117+是造血干细胞/祖细胞表型。
[题目] 189. B1 细胞接受多糖类抗原刺激后，相应抗体可在
A. 96 小时内产生
B. 72 小时内产生
C. 48 小时内产生
D. 24 小时内产生
E. 一周内产生
[答案] C
[解析] 【正解C】B1细胞接受多糖类抗原（TI-2抗原）刺激后，可在48小时内快速产生抗体（以IgM为主的低亲和力抗体）。这与B2细胞的T细胞依赖性抗体应答需要约7-14天（涉及克隆扩增、生发中心形成、体细胞高频突变和亲和力成熟）形成鲜明对比。B1细胞的快速抗体应答属于固有免疫样应答模式。【排除】A.96小时内B1细胞也可产生抗体，但最快约为48小时。B.72小时时间长于48小时。D.24小时内时间过短。E.一周是B2细胞T细胞依赖性应答的典型时程。
[题目] 190. B1 细胞接受多糖类抗原刺激后可产生
A. 以 IgM 为主的高亲和性抗体
B. 以 IgG 为主的高亲和性抗体
C. 以 IgM 为主的低亲和性抗体
D. 以 IgG 为主的低亲和性抗体
[答案] C
[解析] 【正解C】B1细胞接受多糖类抗原（TI-2抗原如荚膜多糖）刺激后，产生以IgM为主的低亲和性抗体（天然IgM样）。B1细胞不经历类别转换——即不发生VDJ基因下游Cμ外显子切换到Cγ/Cα/Cε——因此不产生IgG/IgA/IgE；也不经历亲和力成熟（体细胞高频突变和抗原选择），故抗体亲和力低，属于固有免疫样应答。【排除】A.IgM为主但亲和力高不符合B1细胞——B1不经历亲和力成熟。B.以IgG为主且高亲和力是B2细胞T依赖性应答的特征。D.以IgG为主不符合B1细胞（无类别转换）。
[题目] 191. 巨噬细胞所不具备的受体是
A. IgG Fc 受体
B. C3b 受体
C. 清道夫受体
D. 甘露糖受体
E. TLR7
[答案] E
[解析] 【正解E】巨噬细胞膜表面表达多种受体：IgG Fc受体（CD64/FcγRI为高亲和力、CD32/FcγRII、CD16/FcγRIII），C3b受体（CR1/CD35），清道夫受体（识别修饰LDL和凋亡细胞磷脂酰丝氨酸）和甘露糖受体（CD206，识别病原体表面甘露糖残基）。TLR7主要表达于浆细胞样树突状细胞（pDC）和B细胞的胞内器室膜上，巨噬细胞一般不表达或极低表达TLR7。【排除】A.IgG Fc受体（CD64/CD32/CD16）存在于巨噬细胞表面。B.C3b受体（CR1）存在于巨噬细胞表面。C.清道夫受体存在于巨噬细胞表面。D.甘露糖受体（CD206）为M2型/组织巨噬细胞标志。
[题目] 192. 噬细胞表面能够识别凋亡细胞表面磷脂酰丝氨酸的受体是
A. 清道夫受体
B. Toll 样受体
C. 甘露糖受体
D. 调理性受体
E. 细胞因子受体
[答案] A
[解析] 【正解A】清道夫受体（scavenger receptor，如SR-A、MARCO、CD36等）表达于巨噬细胞表面，可识别凋亡细胞表面暴露的磷脂酰丝氨酸（phosphatidylserine，PS）。在正常活细胞中，PS定位于细胞膜内侧小叶；凋亡过程中PS翻转到膜外侧，被清道夫受体识别为吃我信号，介导巨噬细胞对凋亡细胞的及时吞噬清除，维持组织稳态和防止自身免疫。【排除】B.TLR识别PAMP（细菌/病毒成分），非凋亡细胞PS。C.甘露糖受体识别病原体表面甘露糖，非PS。D.调理性受体（FcR/CR）识别IgG和C3b包被的抗原。E.细胞因子受体识别细胞因子配体。
[题目] 193. 胞内器室膜上表达的 Toll 样受体是
A. TLR1
B. TLR2
C. TLR3
D. TLR4
E. TLR5
[答案] C
[解析] 【正解C】TLR3是表达于胞内器室膜（内体/溶酶体膜）上的Toll样受体，识别病毒双链RNA（dsRNA）以及宿主坏死细胞释放的mRNA。TLR1、TLR2、TLR4、TLR5和TLR6主要表达于细胞质膜表面。其他表达于胞内器室膜的TLR还包括TLR7、TLR8和TLR9，它们识别不同的核酸配体（ssRNA和CpG DNA）。【排除】A.TLR1表达于细胞膜表面，识别三酰化脂肽（与TLR2异源二聚）。B.TLR2表达于细胞膜表面。D.TLR4表达于细胞膜表面。E.TLR5表达于细胞膜表面。
[题目] 194. 成熟树突状细胞表面膜分子表达及其生物学特征是
A. 高表达调理性受体，摄取加工抗原能力强
B. 高表达模式识别受体，摄取加工处理抗原能力强
C. 低表达共刺激分子，提呈抗原激发免疫应答能力弱
D. 高表达 MHCⅡ类分子，提呈抗原激发免疫应答能力强
E. 低表达 MHCⅡ类分子，摄取加工处理抗原能力弱
[答案] D
[解析] 【正解D】成熟树突状细胞（mature DC）的膜分子表达和生物学特征为：高表达MHC-I/II类分子（提供第一信号）、高表达共刺激分子CD80/CD86和CD40（提供第二信号），抗原提呈能力强，能有效激发初始T细胞增殖分化。但其模式识别受体和调理性受体表达下调，抗原摄取和加工能力较未成熟DC明显减弱。【排除】A.成熟DC高表达MHC而非调理性受体，摄取能力弱非强。B.成熟DC模式识别受体下调，摄取加工能力弱。C.成熟DC高表达共刺激分子（非低表达），提呈激发能力强。E.成熟DC高表达MHC分子（非低表达）。
[题目] 195. 浆细胞样树突状细胞主要分泌的细胞因子是
A. IFN-a/β
B. IL-12
C. IL-3
D. IL-4
E. IFN-Y
[答案] A
[解析] 【正解A】浆细胞样树突状细胞（pDC）是体内产生I型干扰素（IFN-α和IFN-β）能力最强的细胞，在病毒核酸刺激下（通过TLR7识别ssRNA和TLR9识别CpG DNA）可产生比其它细胞高100-1000倍的I型IFN，在抗病毒固有免疫中发挥关键作用，故又称天然干扰素产生细胞（NIPC）。【排除】B.IL-12主要由髓样树突状细胞（mDC/cDC）和活化巨噬细胞分泌，促进Th1分化。C.IL-3主要由活化T细胞产生。D.IL-4由Th2、肥大细胞和ILC2等产生。E.IFN-γ由活化NK细胞和Th1细胞产生。
[题目] 196. 浆细胞样树突状细胞胞质器室膜上高表达的 Toll 样受体是
A. TLR7
B. TLR2
C. TLR4
D. TLR5
E. TLR6
[答案] A
[解析] 【正解A】浆细胞样树突状细胞（pDC）胞内器室膜上高表达TLR7（识别单链RNA）和TLR9（识别非甲基化CpG DNA），但TLR7在pDC的表达最为特征性。pDC通过TLR7/9识别病毒核酸后，经MyD88-IRF7通路快速大量产生I型干扰素（IFN-α/β），是pDC发挥抗病毒功能的关键分子基础。【排除】B.TLR2主要表达于细胞膜表面而非pDC特征性高表达受体。C.TLR4主要表达于细胞膜表面（巨噬细胞/DC）。D.TLR5表达于细胞膜表面。E.TLR6表达于细胞膜表面。
[题目] 197. 以下哪个分子属于病原体相关分子模式
A. CD25
B. CD4
C. LPS
D. CD8
E. TCR
[答案] C
[解析] 【正解C】LPS（脂多糖/内毒素）是革兰阴性菌细胞壁外膜的特有成分，为经典病原体相关分子模式（PAMP），被TLR4/MD-2/CD14受体复合物识别。CD4、CD8为T细胞辅助受体（识别MHC-II/I类分子），CD25为IL-2受体α链（调节性/活化T细胞标志），TCR为T细胞抗原受体——这些分子均为适应性免疫相关分子，不属于PAMP。【排除】A.CD25是IL-2受体α链，为活化/调节性T细胞标志，非PAMP。B.CD4是辅助T细胞辅助受体，非PAMP。D.CD8是细胞毒性T细胞辅助受体，非PAMP。E.TCR为T细胞抗原识别受体，不属于PAMP。
[题目] 198. 关于模式识别受体错误的是
A. 病原体相关模式分子PAMP是模式识别受体的配体
B. TLR是重要的模式识别受体
C. 模式识别受体的多样性非常复杂，与BCR多样性相当
D. 可以活化巨噬细胞
E. 主要包括甘露糖受体、清道夫受体和Toll样受体等
[答案] C
[解析] 【正解C】模式识别受体的多样性非常复杂，与BCR多样性相当是错误的——PRR由胚系基因编码，种类有限（人类TLR约10种，NLR约22种，RLR约3种等，总数约数十至百余种），而BCR/TCR通过V(D)J重排（体细胞基因重排）、连接多样性和N区核苷酸插入等机制可产生10^11-10^16种多样性，两者多样性完全不在同一数量级。【排除】A.PAMP是PRR配体，为正确描述。B.TLR是重要PRR，为正确描述。D.PRR可活化巨噬细胞（信号转导诱导效应分子），为正确描述。E.PRR主要包括甘露糖受体、清道夫受体和TLR，为正确描述。
[题目] 199. 未成熟树突状细胞表面膜分子表达特征是
A. 高表达调理性受体和MHCⅡ/Ⅰ类分子
B. 低表达调理性受体和MHCⅡ/Ⅰ类分子
C. 高表达调理性受体，低表达MHCⅡ/Ⅰ类分子
D. 低表达调理性受体，高表达MHCⅡ/Ⅰ类分子
E. 只表达调理性受体，不表达MHCⅡ/Ⅰ类分子
[答案] C
[解析] 【正解C】未成熟树突状细胞（immature DC）的膜分子表达特征为：高表达调理性受体（如Fc受体/FcγR、甘露糖受体/CD206、清道夫受体等模式识别/吞噬相关受体），促进抗原捕获和内化加工；但低表达MHC-II/I类分子和共刺激分子CD80/CD86，抗原提呈能力弱，不适合激发T细胞免疫应答。【排除】A.高表达MHC分子是成熟DC特征非未成熟DC。B.低表达调理性受体是成熟DC特征。D.低表达调理性受体和高表达MHC是成熟DC特征。E.只表达调理性受体不表达MHC不符合DC生物学（DC始终有MHC基础表达）。
[题目] 200. 成熟树突状细胞表面膜分子和生物学特征是
A. 高表达调理性受体，摄取加工抗原能力强
B. 高表达模式识别受体，提呈抗原激发免疫应答能力弱
C. 高表达共刺激分子，摄取加工处理抗原能力强
D. 高表达MHCⅡ/Ⅰ类分子，提呈抗原激发免疫应答能力强
E. 低表达MHCⅡ/Ⅰ类分子，摄取加工处理抗原能力弱
[答案] D
[解析] 【正解D】成熟树突状细胞（mature DC）的膜分子特征和生物学功能为：高表达MHC-I/II类分子（提供T细胞活化第一信号）和共刺激分子CD80/CD86、CD40（提供第二信号），抗原提呈能力强，能高效激发初始T细胞增殖分化为效应细胞。但模式识别受体和调理性受体表达下调，抗原摄取和加工处理能力较未成熟DC明显减弱。【排除】A.成熟DC调理性受体下调，摄取能力弱而非强。B.成熟DC模式识别受体下调，提呈激发能力强。C.高表达共刺激分子与摄取加工能力弱并存（非强）。E.成熟DC高表达MHC分子（非低表达）。
[题目] 201. 通过分泌IL-12和IL-2诱导Th0细胞分化为Th1细胞的免疫细胞是
A. 髓样树突状细胞
B. 浆细胞样树突状细胞(IFN-a)
C. 肥大细胞
D. B淋巴细胞
E. 调节性T细胞
[答案] A
[解析] 【正解A】髓样树突状细胞（mDC，又称经典树突状细胞/传统DC/cDC）在识别PAMP活化后可分泌大量IL-12（p70，由p35和p40亚基组成）和IL-2，是诱导Th0细胞向Th1细胞分化的关键APC。IL-12通过激活STAT4信号通路促进Th1分化，Th1分泌IFN-γ，促进细胞免疫应答（巨噬细胞活化、CTL应答等），在抗胞内病原体感染和抗肿瘤中起重要作用。【排除】B.浆细胞样树突状细胞（pDC）主要分泌IFN-α/β（I型IFN），非IL-12。C.肥大细胞分泌组胺和脂质介质。D.B淋巴细胞不分泌IL-12作为主要功能。E.调节性T细胞分泌IL-10和TGF-β抑制免疫。
[题目] 202. NKT细胞表面TCR识别结合的配体是
A. HLA-Ⅰ 类分子
B. CD1分子提呈的磷脂/糖脂类抗原
C. 抗原肽-MHC Ⅰ 类分子复合物
D. MICA/B分子
E. 细菌脂多糖
[答案] B
[解析] 【正解B】NKT细胞表面TCR（半恒定TCR）识别由CD1d分子（非经典MHC-I类样分子）提呈的磷脂和糖脂类抗原，而非MHC-I类分子提呈的蛋白质抗原肽。CD1d通过疏水性抗原结合沟槽提呈脂类抗原，NKT细胞的TCR识别CD1d-脂质复合物后被迅速活化分泌大量细胞因子（IFN-γ、IL-4等），发挥免疫调节和效应功能。【排除】A.HLA-I类分子（MHC-I）提呈蛋白肽给CD8+T细胞的TCR。C.抗原肽-MHC-I类分子复合物是常规CD8+T细胞TCR的配体。D.MICA/B是NKG2D的配体。E.细菌LPS由TLR4/MD-2/CD14识别。
[题目] 203. 属于瞬时固有免疫应答阶段的反应是
A. 巨噬细胞的募集、活化
B. 直接激活补体系统，杀伤病原微生物
C. B1细胞活化产生IgM类抗体
D. 大量释放源性质热原引起发热
E. NK细胞和γδ T细胞对病毒感染细胞产生杀伤作用
[答案] B
[解析] 【正解B】瞬时固有免疫应答阶段（immediate innate response，感染后0-4小时）主要通过预存效应分子立即发挥作用，包括：直接激活补体系统（旁路途径和MBL途径无需抗体即可被PAMP启动）、预存抗菌肽（防御素）直接杀伤病原体和驻留巨噬细胞的即刻吞噬。此阶段不涉及细胞募集和基因转录活化。【排除】A.巨噬细胞募集活化为早期诱导阶段（4-96小时）。C.B1细胞活化产生IgM为早期诱导阶段反应。D.内源性致热原释放引起发热为早期诱导阶段。E.NK和γδT杀伤为早期诱导阶段（4-96小时）。
[题目] 204. 模式识别受体主要分布于
A. T细胞
B. B细胞
C. NK细胞
D. 巨噬细胞和树突状细胞
E. 红细胞
[答案] D
[解析] 【正解D】模式识别受体（PRR）主要分布于固有免疫细胞（巨噬细胞、树突状细胞、中性粒细胞、NK细胞、肥大细胞等）的细胞膜表面和胞内区室膜（内体/溶酶体膜）以及胞质中。巨噬细胞和树突状细胞（DC）是表达PRR种类最丰富、功能最重要的细胞，通过PRR识别PAMP后活化并启动固有免疫和适应性免疫。【排除】A.T细胞表面表达TCR（抗原受体）非PRR。B.B细胞表达BCR，部分表达TLR但非PRR主要分布细胞。C.NK细胞可表达部分PRR（如TLR），但非主要分布细胞。E.红细胞不表达PRR。
[题目] 205. NK细胞抑制性受体分子的胞质区均具有何种蛋白结构域
A. ITIM
B. ITAM
C. SHP
D. TLR
E. PAMP
[答案] A
[解析] 【正解A】NK细胞抑制性受体（包括KIR家族和CD94/NKG2A异源二聚体）的胞质区均含有ITIM（免疫受体酪氨酸抑制基序，immunoreceptor tyrosine-based inhibitory motif，共有序列为I/V/LxYxxL/V）。配体（MHC-I类分子）结合后ITIM被Src家族激酶磷酸化，继而募集含SH2结构域的磷酸酶SHP-1/SHP-2或SHIP，去磷酸化下游信号分子抑制NK细胞活化。【排除】B.ITAM（免疫受体酪氨酸活化基序）存在于活化性受体（如CD16、DAP12/DAP10相关受体）。C.SHP是磷酸酶分子自身，非蛋白质结构域类型。D.TLR是模式识别受体，非胞质区信号基序。E.PAMP是PRR的配体，非蛋白质结构域。
[题目] 206. NKT细胞表达的分子是
A. BCR
B. TCR
C. CD8
D. CD19
E. mIgM
[答案] B
[解析] 【正解B】NKT细胞表达TCR（T细胞受体），通常为半恒定TCR（如小鼠Vα14-Jα18/Vβ8.2，人Vα24-Jα18/Vβ11），同时表达NK细胞谱系标志（如NK1.1/CD161c和CD56等）。NKT细胞不表达BCR（B细胞受体）、不表达CD8（大多数NKT细胞为CD4+或双阴性DN）、不表达CD19（B细胞标志）和mIgM（膜IgM为B细胞标志）。【排除】A.BCR为B细胞抗原受体，NKT不表达。C.CD8为细胞毒性T细胞辅助受体，大多数NKT细胞不表达。D.CD19为B细胞谱系标志，NKT不表达。E.mIgM为B细胞膜型免疫球蛋白，NKT不表达。
[题目] 207. 固有免疫效应分子中不包括
A. 乙型溶素
B. 防御素
C. 抗体
D. 细胞因子
E. 溶菌酶
[答案] C
[解析] 【正解C】抗体（免疫球蛋白，Ig）是适应性体液免疫的效应分子，由B细胞/浆细胞产生，通过可变区特异性识别和结合抗原表位，不属于固有免疫效应分子。固有免疫效应分子包括：抗菌肽/防御素、乙型溶素（β-lysin）、溶菌酶、补体系统成分、急性期反应蛋白（CRP、MBL等）和固有免疫细胞产生的各类细胞因子（IL-1、TNF-α、IFN-α/β等）。【排除】A.乙型溶素为固有免疫抗菌物质。B.防御素为固有免疫抗菌肽。D.细胞因子由多种细胞产生参与固有免疫应答。E.溶菌酶水解细菌细胞壁肽聚糖，为固有免疫效应分子。
[题目] 208. 固有免疫应答的特点中不包括
A. 直接识别病原体某些高度保守的配体分子
B. 结合相应配体后可立即产生免疫应答
C. 没有免疫记忆功能
D. 高度特异性结合相应配体
E. 维持时间较短
[答案] D
[解析] 【正解D】固有免疫应答不具备高度特异性结合相应配体的特点——高度特异性（high specificity，即能区分极其细微的抗原差异，如单个氨基酸突变）是适应性免疫的特征（由BCR/TCR的体细胞多样性和克隆选择决定）。固有免疫通过PRR识别PAMP/DAMP，具有模式识别水平上的特异性（如TLR4特异识别LPS，TLR3特异识别dsRNA），但远不及适应性免疫精细。其他选项均为固有免疫的正确特点：直接识别保守配体、立即应答、无记忆、维持时间短。【排除】A.直接识别保守PAMP配体为正确描述。B.结合配体后立即应答为正确描述。C.无免疫记忆为正确描述。E.维持时间较短为正确描述。
[题目] 209. 固有免疫细胞包括
A. A.
B. 细胞 B.CD4+T细胞
C. NK细胞
D. CD8+T细胞
E. 浆细胞
[答案] C
[解析] 【正解C】NK细胞（自然杀伤细胞）属于固有免疫细胞，无需抗原预先致敏即可杀伤靶细胞。CD4+T细胞（辅助T细胞）和CD8+T细胞（细胞毒性T细胞）均为适应性免疫的核心T细胞亚群，浆细胞由活化B细胞分化而来属于适应性免疫效应细胞。选项A和B有排版问题，非实际选项。【排除】A.选项A为排版错误，无实际免疫学含义。B.CD4+T细胞为适应性辅助T细胞。D.CD8+T细胞为适应性细胞毒性T细胞。E.浆细胞由B细胞分化，分泌抗体属适应性体液免疫效应细胞。
[题目] 210. 以下哪个分子属于模式识别受体
A. CD4
B. CD5
C. TLR4
D. IL-6
E. BCR
[答案] C
[解析] 【正解C】TLR4（Toll样受体4）是经典的模式识别受体（PRR），识别革兰阴性菌脂多糖（LPS），在固有免疫中发挥识别PAMP和启动炎症信号的重要作用。CD4和CD5为白细胞分化抗原（CD分子），IL-6为细胞因子（配体分子），BCR为适应性免疫受体（膜Ig），均不属于模式识别受体。【排除】A.CD4是T细胞辅助受体和HIV受体，非PRR。B.CD5是T细胞和B1细胞表面标志，非PRR。D.IL-6是促炎细胞因子，非PRR（为配体）。E.BCR是B细胞抗原受体（膜Ig），属适应性免疫受体非PRR。
[题目] 211. 固有免疫应答的特点是
A. 抗原进入机体后96小时启动
B. 具有免疫记忆
C. 维持时间长
D. 通过模式识别受体进行识别，不经克隆扩增和分化，迅速产生免疫作用
E. 有MHC限制性
[答案] D
[解析] 【正解D】固有免疫应答的核心特点为：通过模式识别受体（PRR）识别PAMP/DAMP，不经过克隆扩增和分化即可迅速产生免疫效应（数小时内）。健康机体预先存在大量固有免疫效应细胞和分子，一旦识别病原体即立即发挥功能。而适应性免疫需96小时以上启动（抗原致敏-克隆扩增-分化）、有免疫记忆和MHC限制性。【排除】A.96小时启动是适应性免疫的诱导阶段特征，固有免疫0-4小时即启动。B.具有免疫记忆是适应性免疫核心特征，固有免疫无记忆。C.维持时间长是适应性免疫特征，固有免疫应答维持时间较短。E.MHC限制性是适应性免疫特征（T细胞TCR识别需MHC分子提呈）。
[题目] 212. 早期固有免疫应答发生于
A. 感染0~4小时之
B. 感染后3、4天之
C. 感染后4天之后
D. 感染一月之后
E. 以上皆不对
[答案] B
[解析] 【正解B】早期固有免疫应答（早期诱导的固有免疫应答）发生于感染后数小时至数天（约感染后4-96小时/3-4天），是固有免疫的第二阶段。此阶段涉及巨噬细胞识别PAMP后活化产生促炎因子、NK细胞杀伤病毒感染细胞、DC成熟和迁移、炎症反应充分建立等过程，为适应性免疫应答的启动做准备。【排除】A.感染0-4小时为瞬时/即时固有免疫应答（immediate response）。C.感染4天后适应性免疫应答的诱导逐渐开始。D.感染一月为感染后期，适应性免疫应答已充分发挥。E.以上皆不对不正确。
[题目] 213. 适应性免疫应答诱导阶段发生于
A. 感染0~4小时之
B. 感染后3、4天之
C. 感染后4天之后
D. 感染一月之后
E. 以上皆不对
[答案] C
[解析] 【正解C】适应性免疫应答的诱导阶段（induction phase）通常发生于感染96小时后（约第4天之后）。该阶段DC携带抗原从外周组织经输入淋巴管迁移至淋巴结，将抗原提呈给初始T细胞（priming），T/B细胞识别抗原后被活化进入克隆扩增阶段，分化产生效应T细胞和抗体。整个过程需要足够时间（约7-14天达高峰）因此在感染96小时之内不能完全建立。【排除】A.0-4小时为瞬时固有免疫阶段。B.感染后3-4天为早期诱导固有免疫阶段（NK/巨噬细胞活化）。D.感染一月后适应性免疫记忆已建立。E.以上皆不对不正确（C选项正确描述了适应性诱导阶段的时间）。
[题目] 214. NKG2D识别的配体是
A. HLA I类分子
B. CD1
C. MICA/B
D. CD56
E. B7
[答案] C
[解析] 【正解C】NKG2D（NK group 2 member D）是NK细胞、γδT细胞和活化的CD8+T细胞表面表达的活化性受体，识别靶细胞表面应激诱导表达的MICA/B（MHC class I chain-related A/B）和ULBP（UL16 binding protein）分子。正常细胞MICA/B表达极低，但病毒感染、DNA损伤、肿瘤转化等应激状态下MICA/B上调表达，被NKG2D识别后传递活化信号触发杀伤。【排除】A.HLA I类分子是KIR和CD94/NKG2A的配体（抑制信号来源）。B.CD1分子是NKT细胞TCR的配体。D.CD56是NK细胞表型标志（NCAM），非NKG2D配体。E.B7（CD80/CD86）是CD28/CTLA-4的配体，非NKG2D配体。
[题目] 215. 在巨噬细胞胞膜上表达的Toll样受体是
A. TLR-3
B. TLR-6
C. TLR-7
D. TLR-8
E. TLR-9
[答案] B
[解析] 【正解B】在巨噬细胞胞膜上表达的Toll样受体包括TLR1、TLR2、TLR4、TLR5和TLR6，它们均为细胞膜型PRR，识别细菌等胞外病原体的PAMP。其中TLR6（与TLR2形成异源二聚体识别二酰化脂肽）在巨噬细胞胞膜上表达。TLR3、TLR7、TLR8和TLR9为胞内器室膜（内体/溶酶体膜）型PRR，不在细胞膜表面表达。【排除】A.TLR3表达于胞内器室膜（内体膜）非细胞膜。C.TLR7表达于胞内器室膜（pDC特征性表达）。D.TLR8表达于胞内器室膜。E.TLR9表达于胞内器室膜（pDC和B细胞）。
[题目] 216. 兼备抗原加工提呈和吞噬杀菌作用的固有免疫细胞是
A. 树突状细胞
B. B细胞
C. 单个核细胞
D. 巨噬细胞
E. 中性粒细胞
[答案] D
[解析] 【正解D】巨噬细胞兼具吞噬杀菌和抗原加工提呈双重功能，是连接固有免疫和适应性免疫的桥梁细胞。作为固有免疫效应细胞，巨噬细胞可吞噬杀灭病原体并通过活性氧和NO清除胞内细菌；作为APC，巨噬细胞表达MHC-II类分子，可将加工后的抗原肽提呈给CD4+T细胞，参与适应性免疫应答的启动和效应阶段。【排除】A.树突状细胞以抗原提呈为主要功能，吞噬杀菌能力弱于巨噬细胞。B.B细胞通过BCR内化抗原后提呈，以产生抗体为主要功能。C.单个核细胞为血液前体细胞，发育为巨噬细胞后方具完整功能。E.中性粒细胞以吞噬杀菌为主要功能，抗原提呈能力极弱。
[题目] 217. 活化巨噬细胞分泌的对巨噬细胞具有趋化和激活作用的细胞因子是
A. IL-8
B. MIP-1α/β
C. IL-1
D. IL-6
E. TNF-α
[答案] B
[解析] 【正解B】MIP-1α（CCL3）和MIP-1β（CCL4）（巨噬细胞炎症蛋白-1α/β）均由活化巨噬细胞分泌，属于CC趋化因子家族，对单核/巨噬细胞具有趋化和激活作用，可在炎症部位招募更多的单核细胞，增强局部的巨噬细胞浸润和炎症应答。【排除】A.IL-8（CXCL8）主要趋化和激活中性粒细胞，非巨噬细胞的主要趋化因子。C.IL-1为促炎因子非趋化因子。D.IL-6为促炎因子和致热原非趋化因子。E.TNF-α为促炎因子非趋化因子。
[题目] 218. 活化巨噬细胞产生的对中性粒细胞具有趋化和激活作用的细胞因子是
A. MIP-1α/β
B. MCP-1
C. IL-8
D. IL-1β
E. IL-6
[答案] C
[解析] 【正解C】IL-8（CXCL8）是活化巨噬细胞产生的最重要的中性粒细胞趋化因子，属于CXC趋化因子家族（含ELR基序）。IL-8与中性粒细胞表面CXCR1/CXCR2受体结合，沿浓度梯度趋化中性粒细胞向炎症部位迁移，并激活中性粒细胞的吞噬和脱颗粒功能，是急性炎症中募集中性粒细胞的核心分子。【排除】A.MIP-1α/β主要趋化单核/巨噬细胞。B.MCP-1（CCL2）主要趋化单核细胞。D.IL-1β为促炎因子非趋化因子。E.IL-6为促炎因子和致热原。
[题目] 219. 单核细胞进入结缔组织和器官后发育而成的免疫细胞是
A. 中性粒细胞
B. 巨噬细胞
C. 肥大细胞
D. 朗格汉斯细胞
E. 间质树突状细胞
[答案] C
[解析] 【正解C】肥大细胞来源于骨髓CD34+多能造血前体细胞，前体细胞进入血液循环后迁移至结缔组织和黏膜组织，在局部微环境（SCF等因子）作用下分化为成熟肥大细胞。肥大细胞胞质内含丰富的嗜碱性颗粒，是I型超敏反应和抗寄生虫免疫的主要效应细胞。单核细胞分化为巨噬细胞，中性粒细胞直接由髓系前体释放，朗格汉斯细胞为表皮DC，间质DC为组织DC。【排除】A.中性粒细胞由骨髓髓系前体细胞在骨髓内分化成熟后释放入血，不经结缔组织继续发育。B.巨噬细胞由单核细胞（非前体细胞）进入组织后分化而来。D.朗格汉斯细胞是表皮定居的未成熟DC，来源于胚胎期前体或骨髓前体，非单核细胞分化。E.间质树突状细胞来源于骨髓DC前体细胞。
[题目] 220. 婴幼儿容易发生中枢神经系统感染的原因是
A. 物理屏障发育尚未完善
B. 化学屏障发育尚未完善
C. 微生物屏障尚未发育完善
D. 血-脑屏障尚未发育完善
E. 血-胎屏障尚未发育完善
[答案] D
[解析] 【正解D】婴幼儿容易发生中枢神经系统感染（如化脓性脑膜炎、病毒性脑炎）的重要原因是血-脑屏障尚未发育完善。血-脑屏障由脑微血管内皮细胞紧密连接、基膜和星形胶质细胞足突构成，婴幼儿时期紧密连接蛋白表达和屏障完整性不足，细菌和病毒容易穿过屏障进入中枢神经系统，增加了CNS感染的风险。【排除】A.物理屏障主要指皮肤和黏膜，影响体表感染而非CNS感染。B.化学屏障指体表分泌的抗菌物质，不解释CNS易感性。C.微生物屏障指体表正常菌群，非CNS屏障。E.血-胎屏障是母胎界面结构，保护胎儿在宫内免受感染，非婴幼儿期保护结构。
[题目] 221. 承受寄生虫刺激后主要产生IL-4的免疫细胞是
A. 巨噬细胞
B. NK细胞
C. γδT细胞
D. 肥大细胞
E. 树突状细胞
[答案] E
[解析] 【正解E】树突状细胞（DC）在寄生虫感染时可识别寄生虫PAMP（如糖脂、蛋白质成分等），经PRR信号通路活化后，部分DC亚群（如特定组织DC或经寄生虫产物调节的DC）可分泌IL-4，诱导Th0细胞向Th2方向分化。Th2细胞进一步分泌IL-4、IL-5、IL-13，促进IgE类别转换和嗜酸性粒细胞募集活化，建立抗寄生虫的Th2型免疫应答。【排除】A.巨噬细胞主要产生促炎因子IL-1、TNF-α和IL-12。B.NK细胞主要产生IFN-γ，促进Th1方向。C.γδT细胞可产生IFN-γ或IL-17。D.肥大细胞虽可产生少量IL-4，但非寄生虫刺激后主要产生IL-4的细胞。
[章节] 第四章 抗原
[单选题]
[题目] 222. 乙肝病毒感染人体，HBsAg诱导机体产生的抗体，只能与HBsAg特异性的结合，这体现的是HBsAg这一抗原的
A. 免疫原性
B. 免疫反应性
C. 抗原特异性
D. 半抗原－载体效应
E. 抗原的交叉反应性
[答案] C
[解析] 【正解C】抗原特异性是指抗原只能与相应的抗体或TCR/BCR特异性结合的性质,HBsAg诱导的抗体只能与HBsAg结合而无法与其他抗原结合,体现了高度的抗原特异性。【排除】A.免疫原性指抗原诱导免疫应答的能力,不涉及结合的特异性。B.免疫反应性指抗原与免疫应答产物(抗体/BCR/TCR)结合的能力,仅描述结合能力而非高度选择性。D.半抗原-载体效应指半抗原与载体偶联后获得免疫原性的现象,与本题无关。E.交叉反应性指抗体与不同抗原的交叉结合,与"只能特异性结合"的题设矛盾。
[题目] 223. 下列关于抗原表位的描述，正确的是
A. 表位是一种大分子蛋白质
B. 表位的氨基酸须依次排列
C. 表位不能被B细胞识别
D. 表位可以被NK细胞识别
E. 表位的空间构象可影响其免疫原性
[答案] E
[解析] 【正解E】抗原表位的空间构象(三维折叠结构)直接决定其能否被抗体/BCR识别,构象表位一旦变性失去天然构象即丧失免疫原性,是决定表位识别的重要因素。【排除】A.表位是抗原分子表面的特殊化学基团,通常仅为几个氨基酸或糖残基,远小于大分子蛋白质。B.构象表位的氨基酸残基在序列上可不连续,经肽链折叠后空间上邻近形成表位。C.B细胞表位可直接被BCR/抗体识别,这是B细胞识别抗原的基础。D.NK细胞不识别抗原表位,NK识别MHC-I类分子缺失或改变的靶细胞。
[题目] 224. 与载体蛋白偶联后可获得免疫原性的物质是
A. 超抗原
B. 完全抗原
C. 酵母多糖
D. 半抗原
E. DNA
[答案] D
[解析] 【正解D】半抗原是小分子物质(分子量<4000Da),仅具有免疫反应性(能与对应抗体结合)而无免疫原性(不能单独诱导免疫应答),与大分子载体蛋白共价偶联后获得免疫原性成为完全抗原,此即半抗原-载体效应。【排除】A.超抗原本身即可直接激活大量T细胞(非特异性激活),是完整功能分子,无需载体偶联。B.完全抗原本身兼具免疫原性和免疫反应性。C.酵母多糖为TI-2抗原,本身可刺激B细胞。E.DNA虽免疫原性弱,但并非"与载体偶联后获得免疫原性"的经典定义。
[题目] 225. 同种不同个体间存在的不同抗原称为
A. 独特型抗原
B. 自身抗原
C. 异种抗原
D. 同种异型抗原
E. 异嗜性抗原
[答案] D
[解析] 【正解D】同种异型抗原指同一种属不同个体之间因等位基因多态性而结构不同的抗原分子,典型代表为HLA和ABO血型抗原,是移植排斥反应和输血反应的免疫学基础。【排除】A.独特型抗原指抗体或BCR/TCR可变区上每个克隆独有的抗原表位,体现抗体/受体多样性。B.自身抗原指自身组织成分在异常情况下被免疫系统识别为"非己"的抗原。C.异种抗原来源于不同种属生物。E.异嗜性抗原是跨种属存在的共同抗原(Forssman抗原),如溶血性链球菌与人心肌组织共有。
[题目] 226. 关于T细胞表位的特性，错误的是
A. 主要为小分子多肽
B. 是线性表位
C. 识别受体为TCR
D. 位于抗原分子任意部位
E. 不需要MHC分子
[答案] E
[解析] 【正解E】T细胞表位识别必须经MHC分子提呈(MHC限制性)——TCR不能直接识别天然游离抗原,必须同时识别"抗原肽+MHC分子"复合物,这是T细胞与B细胞识别抗原最本质的区别。【排除】A.T细胞表位主要由8-20个氨基酸组成的小分子多肽,经APC加工处理产生,属于正确特性。B.T细胞表位均为线性表位(顺序表位),由连续氨基酸序列构成。C.T细胞表位的识别受体是TCR。D.T细胞表位可位于抗原分子任意部位(内部或表面),经酶解后暴露。
[题目] 227. 关于佐剂的免疫生物学作用不正确的是
A. 增强免疫原性
B. 改变抗体类型
C. 提高抗体滴度
D. 改变抗原的特异性
E. 引发迟发型超敏反应
[答案] D
[解析] 【正解D】佐剂能增强免疫原性、改变抗体产生类型、提高抗体滴度、引发迟发型超敏反应等,但不能改变抗原特异性——抗原特异性由表位的化学组成和构象决定,佐剂仅非特异性地增强或调节免疫应答强度。【排除】A.佐剂可通过形成抗原储库(缓释效应)和激活固有免疫来增强免疫原性。B.佐剂可通过影响细胞因子微环境改变抗体类别(如诱导Th1/Th2偏向)。C.佐剂可显著提高血清抗体滴度。E.含灭活结核分枝杆菌的弗氏完全佐剂可诱导迟发型超敏反应。
[题目] 228. 非胸腺依赖抗原(TI-Ag)是
A. 不在胸腺中产生
B. 只产生细胞免疫
C. 相应抗体不是在胸腺中产生
D. 仅存在于胸腺细胞上
E. 刺激B细胞产生抗体不需要T细胞辅助
[答案] E
[解析] 【正解E】TI-Ag(非胸腺依赖性抗原)可直接刺激B细胞产生抗体而无需Th细胞辅助,多为含重复表位的多糖类抗原(LPS、荚膜多糖等);TI-Ag仅能诱导IgM类抗体,不产生免疫记忆和类别转换。【排除】A.TI-Ag的命名与产生部位无关,是指T细胞依赖性方面的分类,TI-Ag不在胸腺中产生。B.TI-Ag主要诱导体液免疫(IgM),不产生细胞免疫。C.抗体由B细胞/浆细胞在外周淋巴器官中产生,不在胸腺中产生。D.TI-Ag并非仅存在于胸腺细胞上,可来源于多种微生物。
[题目] 229. 下列属于隐蔽的自身抗原物质的是
A. ABO血型物质
B. 甲胎蛋白
C. 眼晶状体蛋白
D. Forssman抗原
E. HLA抗原
[答案] C
[解析] 【正解C】眼晶状体蛋白位于免疫豁免部位(眼球前房等),胚胎期未与免疫系统接触建立耐受;眼外伤后晶状体蛋白释放入血液循环,被识别为"非己",可诱发交感性眼炎等自身免疫病。【排除】A.ABO血型物质是正常表达于红细胞和组织的同种异型抗原,非隐蔽抗原。B.甲胎蛋白(AFP)属肿瘤胚胎抗原,正常成人低表达,肿瘤时大量表达,非隐蔽抗原概念。D.Forssman抗原是异嗜性抗原(跨种属共同抗原),如豚鼠器官与人红细胞共有。E.HLA抗原是表达于有核细胞的同种异型抗原,广泛存在。
[题目] 230. 非胸腺依赖性抗原激活的淋巴细胞是
A. αβT细胞
B. γδT细胞
C. B1 B细胞
D. B2 B细胞
E. NK细胞
[答案] C
[解析] 【正解C】TI-Ag主要激活B1 B细胞(B1亚群),通过多克隆或BCR交联方式活化,产生以IgM为主的天然抗体;应答快速但无类别转换、无亲和力成熟、无免疫记忆。【排除】A.αβT细胞是适应性免疫T细胞,通过TCR识别MHC-抗原肽复合物,不被TI-Ag直接激活。B.γδT细胞为固有免疫样T细胞,识别非肽类抗原分子,不参与TI-Ag应答。D.B2 B细胞(滤泡B细胞)主要对TD-Ag应答,需Th细胞辅助产生IgG/IgA/IgE,有记忆。E.NK细胞为固有淋巴细胞,不参与TD/TI抗原分类的应答。
[题目] 231. 以下不属于外源性抗原的主要特性的是
A. 从细胞外部摄取
B. 经溶酶体降解
C. 经MHCⅠ类分子提呈
D. 主要被CD4 T细胞识别
E. 主要激活Th细胞应答
[答案] C
[解析] 【正解C】经MHC-I类分子提呈是内源性抗原的特征而非外源性抗原;外源性抗原经MHC-II类分子提呈给CD4+T细胞,这是两条经典抗原加工提呈途径的核心区别。【排除】A.外源性抗原从细胞外经吞噬/胞饮/受体介导摄入,是外源性抗原的基本定义。B.外源性抗原在内体-溶酶体(吞噬溶酶体)中经酸性蛋白酶降解。D.外源性抗原经MHC-II类分子提呈后主要被CD4+T细胞(Th细胞)识别。E.外源性抗原主要通过激活Th细胞(CD4+T)启动辅助和效应功能。
[题目] 232. 下列有关抗原表位的描述，错误的是
A. 亦称抗原决定基
B. 是抗原特异性的结构基础
C. 一般由50个左右的氨基酸组成
D. 可由多糖残基或核苷酸组成
E. 1个抗原表位相当于1个半抗原
[答案] C
[解析] 【正解C】抗原表位一般仅由数个至十几个氨基酸(或单糖)残基组成,B细胞线性表位约5-15氨基酸,T细胞表位8-20氨基酸;50个氨基酸远超过单个表位的正常范围,约为完整蛋白质结构域的大小。【排除】A.表位即抗原决定基,是正确的同义名称。B.表位是抗原特异性的结构基础,正确。D.表位可由多糖残基、核苷酸或氨基酸等不同化学基团组成,正确。E.1个表位功能上等同于1个半抗原——单表位本身有免疫反应性而无免疫原性,正确。
[题目] 233. 弗氏完全佐剂比弗氏不完全佐剂多了
A. 羊毛脂
B. 矿物油
C. 脂多糖
D. 结核分枝杆菌
E. 短小棒状杆菌
[答案] D
[解析] 【正解D】弗氏完全佐剂(FCA)配方为矿物油+羊毛脂+灭活结核分枝杆菌;弗氏不完全佐剂(FIA)仅含矿物油+羊毛脂,不含结核分枝杆菌——FCA额外含结核分枝杆菌的PAMP,可更强地激活巨噬细胞和DC,诱导更强的免疫应答。【排除】A.羊毛脂为两种佐剂的共同成分,起乳化剂作用。B.矿物油为两种佐剂的共同成分,形成油包水乳液实现抗原缓释。C.脂多糖(LPS)不是弗氏佐剂的成分。E.短小棒状杆菌为另一种独立的微生物佐剂制剂。
[题目] 234. 属于非胸腺依赖性抗原的是
A. 绵羊红细胞
B. 卡介苗
C. 脂多糖
D. 类毒素
E. 抗病毒血清
[答案] C
[解析] 【正解C】脂多糖(LPS)是革兰阴性菌细胞壁成分,属于TI-1抗原——可通过丝裂原活化和TLR4信号直接多克隆活化B1 B细胞产生IgM抗体,无需T细胞辅助。【排除】A.绵羊红细胞(SRBC)是颗粒性TD抗原,含蛋白质表位,需T细胞辅助才能诱导抗体产生,实验中用作T细胞依赖性抗原模型。B.卡介苗(BCG)含有大量分枝杆菌蛋白,为TD抗原。D.类毒素(破伤风/白喉)为蛋白质TD抗原,需T细胞辅助。E.抗病毒血清是抗体,为被动免疫制剂。
[题目] 235. 免疫效果最好的免疫方法是
A. 肌内注射
B. 皮内注射
C. 口服
D. 腹腔注射
E. 静脉注射
[答案] B
[解析] 【正解B】皮内注射免疫效果最好,因皮肤真皮层富含朗格汉斯细胞(未成熟DC),可高效摄取、加工抗原并沿输入淋巴管迁移至引流淋巴结,T细胞区成熟为并指状DC后强效激活初始T细胞,启动适应性免疫应答;卡介苗等疫苗采用皮内接种正是基于此原理。【排除】A.肌内注射抗原主要进入血液循环/组织液,DC接触效率相对较低。C.口服免疫易诱导口服耐受,应答弱且以IgA为主。D.腹腔注射可起效但易引起黏连等副作用。E.静脉注射抗原被脾脏巨噬细胞快速清除,可诱发全身性过敏反应。
[题目] 236. AB型血的外周血中含有的抗体是
A. 抗A抗体
B. 抗B抗体
C. 抗O抗体
D. 抗A+抗B抗体
E. 不含抗A抗体，也不含抗B抗体
[答案] E
[解析] 【正解E】AB血型个体红细胞表面同时表达A和B两种抗原,血浆中不含抗A抗体和抗B抗体——免疫系统对自身ABO抗原建立了中枢耐受,若产生抗自身ABO的抗体则会导致自身红细胞凝集反应。【排除】A.抗A抗体存在于B型和O型血浆中。B.抗B抗体存在于A型和O型血浆中。C.不存在"抗O抗体",O型指红细胞缺乏A和B抗原。D.抗A+抗B抗体同时存在于O型血中。
[题目] 237. 不是抗原性质的是
A. 大分子物质
B. 抗原均具有”异物性”
C. 具有免疫原性的一定具有免疫反应性
D. 具有免疫反应性的一定具有免疫原性
E. 以表位与TCR/BCR和抗体结合
[答案] D
[解析] 【正解D】”具有免疫反应性的一定具有免疫原性”不成立——半抗原具有免疫反应性（能与抗体/BCR结合）但缺乏免疫原性（不能单独诱导免疫应答），免疫反应性与免疫原性并非互为充要条件。【排除】A.抗原多数为大分子物质（分子量>10kD），正确。B.异物性是抗原的核心性质，正确。C.具有免疫原性必然具有免疫反应性，这是正确命题（免疫原性包含免疫反应性）。E.抗原通过表位与TCR/BCR和抗体特异性结合，正确。 
[题目] 238. 将健康人的组织或器官来替代患者丧失功能的组织和器官，常常会发生排斥反应，此时HLA分子被认为是
A. 同种异型抗原
B. 异嗜性抗原
C. 超抗原
D. 改变的自身抗原
E. 异种抗原
[答案] A
[解析] 【正解A】HLA分子在不同个体间因等位基因多态性存在结构差异，同种异体移植时供者HLA被受者免疫系统识别为同种异型抗原（同一种属不同个体间的差异抗原），引发移植排斥反应。【排除】B.异嗜性抗原为不同种属间共同抗原（如溶血性链球菌与人心肌共同抗原）。C.超抗原可非特异性激活大量T细胞（如TSST-1）。D.改变的自身抗原为自身成分经修饰后产生。E.异种抗原为不同种属间的抗原。 
[题目] 239. 抗体对具有相同或相似决定基的不同抗原的反应称为
A. 特异性反应
B. 非特异性反应
C. 交叉反应
D. 过敏反应
E. 半抗原－载体效应
[答案] C
[解析] 【正解C】交叉反应是指抗体（或TCR）对含有相同或相似抗原决定基（表位）的不同抗原发生的识别和结合反应，其分子基础是不同抗原间存在共同的抗原表位。【排除】A.特异性反应为抗体仅识别对应抗原。B.非特异性反应无抗原表位识别特异性。D.过敏反应即超敏反应，非此概念。E.半抗原-载体效应指半抗原偶联载体后才具备免疫原性。 
[题目] 240. 溶血性链球菌的表面成分与人心肌组织存在的共同抗原，属于
A. 异嗜性抗原
B. 异种抗原
C. 同种异型抗原
D. 自身抗原
E. 独特型抗原
[答案] A
[解析] 【正解A】异嗜性抗原（Forssman抗原）是存在于不同种属生物（如细菌和人体）之间的共同抗原。溶血性链球菌表面M蛋白与人心肌肌球蛋白存在交叉抗原性，属异嗜性抗原，这是风湿热/风湿性心脏病发病的免疫学基础——抗链球菌抗体交叉攻击心肌组织。【排除】B.异种抗原为单一异种来源抗原。C.同种异型抗原为同种不同个体间差异抗原。D.自身抗原为自身组织成分。E.独特型抗原为抗体/BCR/TCR可变区抗原决定基。 
[题目] 241. 蛋白质、糖类和脂类，免疫原性最强和最弱的分别是
A. 蛋白质，糖类
B. 蛋白质，脂类
C. 脂类，蛋白质
D. 脂类，糖类
E. 糖类，脂类
[答案] B
[解析] 【正解B】蛋白质免疫原性最强——分子量大、化学结构复杂多样、含丰富T/B细胞表位；脂类免疫原性最弱——分子量小、结构简单、缺乏有效T细胞表位且不易被APC加工提呈；糖类免疫原性居中（多糖可含重复B细胞表位作为TI-2抗原）。【排除】A.脂类弱于糖类。C.蛋白质远强于脂类。D.蛋白质最强而非脂类。E.糖类非最弱。 
[题目] 242. 经肌肉注射某一多肽疫苗，并没有成功诱导体液免疫，下列哪种不是可行的改进方法
A. 改为皮下注射
B. 组装成颗粒性物质
C. 加用佐剂
D. 每天注射一次，连续一周
E. 组装成四聚体
[答案] D
[解析] 【正解D】每天注射一次连续一周不是增强免疫应答的有效手段——单纯增加注射频率不改变抗原的免疫原性本质，且频繁低剂量注射可能诱导免疫耐受（低带耐受），此为不可行的改进方法。【排除】A.改为皮下/皮内注射可利用皮内丰富DC增强提呈，可行。B.组装成颗粒性物质可增强被APC摄取效率，可行。C.加用佐剂非特异性增强免疫应答，可行。E.组装成四聚体可增大分子量和表位密度，增强免疫原性，可行。 
[题目] 243. 以下不属于内源性抗原的主要特点的是
A. 存在于胞浆内
B. APC内合成
C. 病毒感染细胞后合成的病毒抗原
D. 主要由MHCⅠ类分子提呈
E. 主要由CD4 T细胞识别
[答案] E
[解析] 【正解E】"主要由CD4 T细胞识别"不是内源性抗原的特点——内源性抗原经MHC-I类分子提呈给CD8+CTL识别，CD4+T细胞识别的是MHC-II类分子提呈的外源性抗原肽。【排除】A.内源性抗原存在于胞浆内，正确。B.在APC内合成，正确。C.病毒感染细胞后合成的病毒蛋白为典型内源性抗原，正确。D.主要由MHC-I类分子提呈，正确。 
[题目] 244. 对人体来说，肺癌细胞来源的癌胚抗原不属于
A. 胸腺依赖性抗原
B. 同种异型抗原
C. 自身抗原
D. 内源性抗原
E. 肿瘤抗原
[答案] B
[解析] 【正解B】癌胚抗原（如CEA、AFP）是人体自身基因在肿瘤中异常高表达的胚胎时期产物，属于自身抗原（正常时胚胎期表达，成人体内为"改变的量"而非"异己"）和肿瘤抗原，但不属于同种异型抗原——同种异型抗原是同一物种不同个体间因等位基因多态性产生的差异抗原（如HLA、血型抗原），癌胚抗原不具个体间等位基因多态性。【排除】A.属TD-Ag含T/B表位。C.是自身抗原。D.细胞内合成属内源性抗原。E.属肿瘤抗原。 
[题目] 245. 下列属于半抗原的是
A. 青霉烯酸
B. 肽聚糖
C. 香菇多糖
D. 脂多糖
E. 荚膜多糖
[答案] A
[解析] 【正解A】青霉烯酸是青霉素降解产生的小分子（MW<1000），仅具有免疫反应性而无免疫原性，属于半抗原。其与体内血清蛋白（载体）共价结合后获得免疫原性，可诱导IgE产生并介导I型超敏反应（青霉素过敏）。【排除】B.肽聚糖为细菌细胞壁成分，分子量大，属于完全抗原/TI-2抗原。C.香菇多糖为多糖类，含重复B细胞表位属TI-2抗原。D.脂多糖（LPS）为革兰阴性菌内毒素，属TI-1抗原（有丝分裂原）。E.荚膜多糖为多糖类TI-2抗原。 
[题目] 246. 对人来说不是抗原的物质是
A. 人血清白蛋白
B. 牛血清白蛋白
C. 减毒活疫苗
D. 类毒素
E. 细菌外毒素
[答案] A
[解析] 【正解A】抗原的核心属性是异物性——"非己"物质才能被免疫系统识别。人血清白蛋白是人体自身正常蛋白，受免疫耐受保护，对自身不具有抗原性。【排除】B.牛血清白蛋白属异种抗原。C.减毒活疫苗含减毒病原微生物，属异种抗原。D.类毒素经甲醛处理保留免疫原性，属异种/改性抗原。E.细菌外毒素为细菌产物，属异种抗原。 
[题目] 247. 下列哪种自身抗原暴露于免疫系统后，不会引起自身免疫应答
A. 脑组织
B. 精子
C. 甲状腺球蛋白
D. 眼晶状体蛋白
E. 甲胎蛋白
[答案] E
[解析] 【正解E】甲胎蛋白（AFP）是胎儿期正常表达的蛋白质，出生后迅速降至极低水平，成人免疫系统在其胚胎期已建立中枢耐受（胸腺阴性选择中删除AFP反应性T细胞），故AFP暴露于免疫系统后不会引起自身免疫应答，属于已建立耐受的自身抗原而非隐蔽抗原。【排除】A.脑组织为隐蔽抗原（血脑屏障隔离），外伤/感染暴露可致自身免疫性脑炎。B.精子为隐蔽抗原（血睾屏障隔离），外伤暴露可致自身免疫性睾丸炎。甲状腺球蛋白为隐蔽抗原（甲状腺滤泡腔隔离），暴露可致桥本甲状腺炎。D.眼晶状体蛋白为隐蔽抗原，眼球外伤暴露可致交感性眼炎。 
[题目] 248. 抗原具备的两种特性是
A. 抗原性和异物性
B. 免疫原性和免疫反应性
C. 异物性和特异性
D. 免疫原性和特异性
E. 异物性和免疫反应性
[答案] B
[解析] 【正解B】抗原具备两种基本特性：免疫原性（immunogenicity）——诱导机体产生免疫应答（产生抗体/效应T细胞）的能力；免疫反应性（immunoreactivity，又称抗原性）——与免疫应答产物（抗体/BCR/TCR）特异性结合的能力。二者统一于完全抗原。【排除】A.抗原性即免疫反应性，异物性是免疫原性的条件而非特性本身。C.异物性为条件，特异性由表位决定。D.特异性由表位决定非特性分类。E.异物性为条件而非特性。 
[题目] 249. 下列哪种物质没有免疫原性
A. 半抗原
B. 完全抗原
C. 补体
D. 异嗜性抗原
E. 抗体
[答案] A
[解析] 【正解A】半抗原（hapten）仅具有免疫反应性而无免疫原性——分子量小（通常<1000Da），能单独与抗体/BCR结合但不能诱导免疫应答，必须与载体蛋白偶联后才获得免疫原性。【排除】B.完全抗原同时具备免疫原性和免疫反应性。C.补体是免疫分子，其本身作为蛋白具有免疫原性。D.异嗜性抗原为完全抗原。E.抗体（免疫球蛋白）作为蛋白质具有免疫原性（可产生抗抗体/抗独特型抗体）。 
[题目] 250. 以下关于抗原的描述错误的是
A. 半抗原没有免疫原性
B. 半抗原有免疫反应性
C. 完全抗原有免疫原性
D. 半抗原需要偶联载体后才有免疫原性
E. 抗体没有免疫原性
[答案] E
[解析] 【正解E】"抗体没有免疫原性"错误——抗体（免疫球蛋白）本身是大分子蛋白质，具有免疫原性。异种抗体（如马血清抗毒素）可诱导人体产生抗异种蛋白抗体致血清病；同种异型抗体（如IgG同种异型）可诱导产生抗同种异型抗体，独特型表位可诱导产生抗独特型抗体。【排除】A.半抗原无免疫原性，正确。B.半抗原有免疫反应性，正确。C.完全抗原有免疫原性，正确。D.半抗原需偶联载体才获得免疫原性，正确。 
[题目] 251. 同一种属不同个体的抗原性物质是
A. 超抗原
B. 异种抗原
C. 自身抗原
D. 独特型抗原
E. 同种异型抗原
[答案] E
[解析] 【正解E】同种异型抗原（alloantigen）是同一种属不同个体间因等位基因多态性而产生的具有结构差异的抗原物质，是移植排斥反应和输血反应的主要免疫学基础，经典例子包括HLA分子（人类白细胞抗原）和ABO血型抗原。【排除】A.超抗原可直接激活大量T细胞克隆。B.异种抗原为不同种属间抗原。C.自身抗原为机体自身成分。D.独特型抗原为抗体/BCR/TCR可变区特有表位。 
[题目] 252. 关于B细胞表位的特性，错误的是
A. 受体是BCR
B. 识别需要MHC分子
C. 构象表位
D. 线性表位
E. 存在于抗原表面
[答案] B
[解析] 【正解B】"识别需要MHC分子"错误——B细胞表位由BCR/Ig直接识别天然抗原分子表面的表位，无需抗原加工处理和MHC分子提呈，不受MHC限制。这是B细胞与T细胞抗原识别的关键区别之一。【排除】A.BCR是B细胞表位的识别受体（膜型Ig），正确。C.B细胞表位多为构象表位（依赖空间构象），正确。D.B细胞也可识别线性表位（顺序表位），正确。E.B细胞表位存在于天然抗原分子表面，易被BCR接近，正确。 
[题目] 253. 对人类而言，小鼠的MHC是
A. 同种异型抗原
B. 异种抗原
C. 自身抗原
D. 移植抗原
E. 独特型抗原
[答案] B
[解析] 【正解B】小鼠与人类属于不同种属，小鼠MHC（H-2复合体）对人类免疫系统而言是异种抗原（xenoantigen），其蛋白质序列和结构与人HLA存在种属差异，可诱导强烈的异种免疫应答，是异种移植排斥的分子基础。【排除】A.同种异型抗原为同一物种不同个体间差异抗原（如人-人之间HLA差异）。C.自身抗原为机体自身组织成分。D.移植抗原是功能概念（含同种异型与异种抗原），非独立抗原分类。E.独特型抗原为抗体/BCR/TCR可变区特有表位。
[题目] 254. 诱导机体产生超敏反应的抗原，被称为
A. 异嗜性抗原
B. 同种异型抗原
C. 自身抗原
D. 变应原
E. 耐受原
[答案] D
[解析] 【正解D】变应原（allergen）是能诱导机体产生超敏反应（变态反应/hypersensitivity）的抗原物质，典型例子包括花粉蛋白、尘螨排泄物、青霉素降解产物（半抗原-载体复合物）、动物皮屑和食物蛋白等，其共同特点是诱导Th2型偏向的免疫应答并促进IgE类别转换。【排除】A.异嗜性抗原为不同种属间共同抗原（如链球菌与人心肌共同抗原）。B.同种异型抗原为个体间差异抗原。C.自身抗原可致自身免疫病而非超敏反应。E.耐受原可诱导免疫耐受而非超敏反应。
[题目] 255. 含多个重复的B细胞表位，通过交联BCR刺激成熟B细胞应答的抗原是
A. TD-Ag
B. TI-1 Ag
C. TI-2 Ag
D. 外源性抗原
E. 内源性抗原
[答案] C
[解析] 【正解C】TI-2抗原（非胸腺依赖性抗原2型）的分子结构特征为含多个重复B细胞表位（如细菌荚膜多糖、鞭毛蛋白），通过广泛交联大量BCR向B细胞传递强活化信号，无需Th细胞辅助即可刺激成熟B细胞（特别是B1细胞和边缘区B细胞）增殖并产生IgM为主的抗体。【排除】A.TD-Ag需T细胞辅助，不通过BCR交联激活。B.TI-1抗原含B细胞有丝分裂原活性（如LPS），高浓度时多克隆激活B细胞。D/E.外源性/内源性抗原为按来源分类，非TI-2抗原的机制性定义。
[题目] 256. 树突状细胞内新合成的抗原属于
A. 内源性抗原
B. 外源性抗原
C. 胸腺依赖性抗原
D. 非胸腺依赖性抗原
E. 人工抗原
[答案] A
[解析] 【正解A】树突状细胞（DC）自身新合成的抗原（如正常自身蛋白、病毒感染DC后合成的病毒蛋白）来源于胞内合成，属于内源性抗原，经蛋白酶体降解后由TAP转运至内质网，与MHC-I类分子结合后提呈至细胞表面被CD8+T细胞识别。【排除】B.外源性抗原为从胞外摄取后经内体/溶酶体途径加工的抗原。C.胸腺依赖性抗原（TD-Ag）为需要T细胞辅助才能产生抗体的抗原分类。D.非胸腺依赖性抗原（TI-Ag）为无需T细胞辅助的抗原分类。E.人工抗原为人工合成的抗原。
[题目] 257. 没有免疫原性的物质是
A. TD抗原
B. 抗体
C. 补体
D. 半抗原
E. TI抗原
[答案] D
[解析] 【正解D】半抗原（hapten）是没有免疫原性的小分子物质（通常分子量<1000Da），不能单独诱导免疫应答，但具有免疫反应性（能与相应抗体/BCR结合）。半抗原需与载体蛋白偶联后才获得免疫原性。【排除】A.TD抗原（胸腺依赖性抗原）为完全抗原，有免疫原性。B.抗体为大分子蛋白质，具有免疫原性（可诱导产生抗抗体）。C.补体为大分子蛋白质，具有免疫原性。E.TI抗原（非胸腺依赖性抗原）为完全抗原，有免疫原性。
[题目] 258. 刺激B细胞产生抗体时需要Th细胞辅助的抗原是
A. 自身抗原
B. 非胸腺依赖性抗原
C. 异种抗原
D. 胸腺依赖性抗原
E. 半抗原
[答案] D
[解析] 【正解D】胸腺依赖性抗原（TD-Ag，thymus-dependent antigen）必须依赖Th细胞的辅助才能刺激B细胞产生抗体——Th细胞通过CD40L-CD40相互作用和分泌细胞因子（IL-4、IL-21等）为B细胞提供第二活化信号，T-B细胞协作是TD抗原诱导抗体产生的关键。【排除】A.自身抗原多数为TD-Ag。B.非胸腺依赖性抗原（TI-Ag）无需Th细胞辅助。C.异种抗原多数为TD-Ag。E.半抗原不能单独诱导免疫应答。
[题目] 259. 对人体既是抗原又是抗体的物质是
A. 细菌外毒素
B. 马抗破伤风血清
C. 类毒素
D. HLA
E. 干扰素
[答案] B
[解析] 【正解B】马抗破伤风血清（马血清来源的抗毒素）对人体来说具有双重属性：一方面含有抗破伤风毒素的特异性抗体（具有抗体功能），另一方面马血清蛋白对人体是异种抗原（马与人属不同种属），可诱导人体产生抗马血清蛋白的抗体，反复注射可导致III型超敏反应（血清病）。【排除】A.细菌外毒素仅为抗原。C.类毒素仅为抗原（保留免疫原性，丧失毒性）。D.HLA仅为抗原。E.干扰素为细胞因子，非抗体。
[题目] 260. 临床上注射青霉素容易导致过敏，其机制为青霉素在体内降解为青霉烯酸，与血清蛋白结合，诱导机体产生IgE抗体并介导超敏反应。其中血清蛋白起的作用是
A. 半抗原
B. 完全抗原
C. 载体
D. 佐剂
E. 自身抗原
[答案] C
[解析] 【正解C】在半抗原-载体效应中，青霉素降解为青霉烯酸（半抗原/表位，仅具免疫反应性），与血清蛋白（载体）共价结合后形成半抗原-载体复合物，获得免疫原性；血清蛋白在此提供T细胞表位，辅助B细胞识别半抗原表位并产生抗青霉烯酸IgE抗体，血清蛋白起载体（carrier）作用。【排除】A.半抗原为青霉烯酸本身，非血清蛋白。B.完全抗原指同时具有免疫原性和免疫反应性的物质，血清蛋白单独非此复合物的完全抗原。D.佐剂为非特异性增强免疫应答的物质，与此机制不同。E.自身抗原为自身组织成分。
[题目] 261. 外毒素变成类毒素后
A. 毒素的免疫原性更强
B. 毒素的毒性减弱
C. 与抗毒素的亲和力增强
D. 只可诱导天然免疫
E. 可增强吞噬细胞的吞噬作用
[答案] B
[解析] 【正解B】外毒素经甲醛处理后变为类毒素，甲醛处理使外毒素的毒性基团被化学修饰而丧失毒性（减弱），但其抗原表位得以保留（免疫原性不丧失），因此类毒素可用于疫苗制备（如白喉类毒素、破伤风类毒素）以诱导保护性抗毒素抗体。【排除】A.免疫原性通常不变或略弱，非更强。C.与抗毒素的亲和力通常不变或略低。D.类毒素可诱导适应性免疫（产生IgG类抗体）。E.类毒素不能直接增强吞噬细胞的吞噬作用（调理吞噬由抗体/补体介导）。
[题目] 262. 以下输血可引起严重的输血反应的是
A. A.B型血输至
B. 型血者 B.B型血输至A型血者
C. O型血输至A型血者
D. O型血输至B型血者
E. B型血输至AB型血者
[答案] B
[解析] 【正解B】B型血个体的红细胞表面表达B抗原，血浆中含天然抗A抗体（IgM类）。当B型血输给A型血个体（红细胞表面表达A抗原，血浆含抗B抗体），供者B抗原与受者抗B抗体发生凝集反应，引发急性溶血性输血反应，是最严重的输血反应类型之一。【排除】A.AB型血含A和B抗原，无抗A/抗B抗体，可接受各型血（万能受血者）。C.O型血红细胞无A/B抗原，可输给任何ABO血型者（万能供血者）。D.同C。E.AB型血浆无抗A/抗B抗体，可接受B型血。
[题目] 263. 下列哪种免疫接种方式可能导致免疫应答强度较低
A. 适当间隔多次接种
B. 皮内接种
C. 加用佐剂
D. 给肿瘤患者接种
E. 适当抗原剂量接种
[答案] D
[解析] 【正解D】肿瘤患者常存在免疫功能低下（肿瘤微环境免疫抑制、放化疗导致免疫细胞减少等），其免疫应答能力减弱，接种疫苗后免疫应答强度可能显著低于免疫功能正常者，是疫苗接种效果不佳的高危人群，需要特别考虑接种策略。【排除】A.适当间隔多次接种可增强免疫应答（加强免疫效应）。B.皮内接种可充分利用皮内丰富DC增强提呈，提高应答强度。C.加用佐剂可非特异性增强免疫应答。E.适当抗原剂量最有利于诱导免疫应答。
[题目] 264. 类毒素是
A. 内毒素
B. 甲醛处理后的外毒素
C. 抗血清
D. 抗毒素
E. 毒素的衍生物
[答案] B
[解析] 【正解B】类毒素（toxoid）是外毒素经甲醛（福尔马林）处理后失去毒性但保留免疫原性的产物，用于人工主动免疫（预防接种），经典例子包括白喉类毒素和破伤风类毒素疫苗。甲醛作用机制是使外毒素的毒性基团发生化学修饰而不破坏其抗原表位。【排除】A.内毒素是革兰阴性菌细胞壁LPS成分，非类毒素。C.抗血清为含抗体的血清制品。D.抗毒素为针对外毒素的抗体。E.类毒素确为外毒素的化学衍生物，但B更精确地描述了制备方法（甲醛处理）。
[题目] 265. BCR能够识别的表位不包括
A. T细胞表位
B. B细胞表位
C. 线性表位
D. 顺序表位
E. 构象表位
[答案] A
[解析] 【正解A】BCR（膜型Ig）能识别B细胞表位，包括线性表位（顺序表位）和构象表位，但不能识别T细胞表位。T细胞表位是经APC加工处理后与MHC分子结合并被TCR识别的线性短肽，必须经过抗原加工和MHC提呈过程，BCR无法直接识别MHC-肽复合物。【排除】B.BCR可识别B细胞表位。C.BCR可识别线性表位（顺序表位）。D.顺序表位即线性表位，BCR可识别。E.BCR可识别构象表位。
[题目] 266. 含共同抗原表位的不同抗原称为
A. 异嗜性抗原
B. 异种抗原
C. 同种异体抗原
D. 交叉抗原
E. 不完全抗原
[答案] D
[解析] 【正解D】含有共同（相同或相似）抗原表位的不同抗原称为交叉抗原（cross-reactive antigen），一种抗体/BCR/TCR可同时识别含有相同或相似表位的不同抗原，针对交叉抗原产生的免疫反应称为交叉反应，如牛痘病毒与天花病毒的交叉保护。【排除】A.异嗜性抗原为跨种属存在的共同抗原（如链球菌与人心肌），是交叉抗原的一种特殊类型但非总称。B.异种抗原为来自不同种属的抗原。C.同种异体抗原为同种不同个体间差异抗原。E.不完全抗原即半抗原。
[题目] 267. 免疫原性相对较弱的是
A. 脂肪
B. 蛋白质
C. 类毒素
D. 抗毒素
E. 多糖
[答案] A
[解析] 【正解A】各类生物大分子中，脂肪（脂类）的免疫原性最弱，因其分子量相对较小、结构简单（主要为碳氢链）、缺乏有效的T细胞表位且难以被APC有效加工提呈。免疫原性强弱顺序为：蛋白质 > 多糖 > 核酸 > 脂类。【排除】B.蛋白质免疫原性最强。C.类毒素为化学修饰的蛋白质，免疫原性强。D.抗毒素为抗体（蛋白质），免疫原性强。E.多糖免疫原性居中（含重复B细胞表位，可作为TI-2抗原），强于脂类。
[题目] 268. 决定抗原特异性的因素是
A. 抗原分子的物理性状
B. 抗原分子内部结构的复杂性
C. 抗原分子中特殊的化学基团
D. 抗原分子量的大小
E. 抗原分子的异物性
[答案] C
[解析] 【正解C】抗原特异性由抗原分子中特殊的化学基团——抗原表位（antigenic epitope/antigenic determinant，抗原决定基）所决定。表位的化学组成、空间构象和电荷分布是抗原特异性的结构基础，抗体的互补决定区（CDR）与表位形成精确的空间互补结合。【排除】A.物理性状影响免疫原性强弱，非特异性决定因素。B.分子内部结构复杂性影响免疫原性强弱。D.分子量大小影响免疫原性强弱。E.异物性决定是否为抗原，但不决定特异性。
[题目] 269. 一蛋白质抗原含有5个T细胞表位和8个B细胞表位，T细胞表位各不相同，B细胞表位中有3个是同一种表位，该抗原最多能诱导机体几种抗体
A. 3种
B. 5种
C. 6种
D. 8种
E. 13种
[答案] C
[解析] 【正解C】每种不同的B细胞表位可诱导一种特异性抗体产生。该蛋白质有8个B细胞表位，其中3个是同一种表位（即重复），实际不同的B细胞表位数为8-3+1=6种（8个中有3个相同，其余5个各不相同 = 5+1=6种）。每种不同的B细胞表位刺激相应B细胞克隆产生一种特异性抗体，最多诱导6种抗体。T细胞表位的种类数不影响抗体种类数。【排除】A.3种为重复B表位数，非总种类数。B.5种为T表位数。D.8种为B表位总数（含重复）。E.13种为T表位+B表位总数。
[题目] 270. 以下关于抗原进入机体的方式对抗原免疫原性的影响的叙述中错误的是
A. 皮内注射和皮下免疫途径容易诱导免疫应答
B. 口服免疫易诱导耐受
C. 高抗原剂量容易诱导免疫应答
D. 低抗原剂量容易诱导免疫耐受
E. 频繁注射抗原可诱导免疫耐受
[答案] C
[解析] 【正解C】"高抗原剂量容易诱导免疫应答"错误——抗原剂量与免疫应答的关系呈钟形曲线：剂量过低或过高均可诱导免疫耐受（低带耐受和高带耐受），只有适中剂量最有利于诱导有效的免疫应答。高剂量抗原可能使T/B细胞过度刺激后进入无反应状态（anergy）或耗竭。【排除】A.皮内/皮下注射可利用皮内丰富DC增强提呈，正确。B.口服免疫易诱导口服耐受（诱导调节性T细胞），正确。D.低抗原剂量可诱导低带耐受，正确。E.频繁注射低剂量抗原可诱导免疫耐受，正确。
[题目] 271. 小明一到春天，总会出现鼻部卡他症状，到医院就诊，诊断为过敏性鼻炎，对花粉过敏，花粉对小明来说不属于
A. 变应原
B. 异种抗原
C. 外源性抗原
D. 非胸腺依赖性抗原
E. 天然抗原
[答案] D
[解析] 【正解D】花粉蛋白是蛋白质抗原，含有T细胞表位和B细胞表位，属于胸腺依赖性抗原（TD-Ag，需要T细胞辅助才能诱导抗体产生），不属于非胸腺依赖性抗原（TI-Ag，通常为多糖类等含重复B细胞表位、无需T细胞辅助的抗原）。【排除】A.花粉对小明是变应原（诱导I型超敏反应产生IgE），正确。B.花粉来源于植物，对人体是异种抗原，正确。C.花粉经呼吸道黏膜进入机体，属于外源性抗原，正确。E.花粉是自然界存在的天然抗原，正确。
[题目] 272. 被毒蛇咬伤的一年轻男性，在注射抗蛇毒血清后，出现注射局部荨麻疹样风团，随后出现发热和全身淋巴结肿大。导致上述症状的原因是抗蛇毒血清中含有
A. 蛇毒
B. 异种抗原
C. 异嗜性抗原
D. 佐剂
E. 独特型抗原
[答案] B
[解析] 【正解B】抗蛇毒血清通常以马等大动物制备（用蛇毒免疫马后提取），含有大量马血清蛋白，对人体而言是异种抗原（马与人属不同种属）。注射后马血清蛋白诱导人体免疫应答，大量异种蛋白形成免疫复合物可导致血清病（III型超敏反应），表现为荨麻疹、发热和淋巴结肿大等症状。【排除】A.抗蛇毒血清含有的是抗蛇毒抗体而非蛇毒本身。C.异嗜性抗原为跨种属共同抗原。D.佐剂为非特异性免疫增强剂。E.独特型抗原为抗体可变区表位。
[题目] 273. 偶联上载体后具有免疫原性的是
A. 顺序表位
B. 构象表位
C. 线性表位
D. 半抗原
E. 独特型表位
[答案] D
[解析] 【正解D】半抗原（hapten）为仅有免疫反应性而无免疫原性的小分子物质，与载体蛋白偶联后可获得免疫原性（成为完全抗原/半抗原-载体复合物），产生T细胞表位使Th细胞能够辅助B细胞产生抗半抗原抗体，此即半抗原-载体效应。【排除】A.顺序表位（线性表位）本身即可被BCR/TCR识别。B.构象表位本身即可被BCR识别。C.线性表位同顺序表位。E.独特型表位为抗体可变区表位，本身具有免疫原性。
[题目] 274. 识别不受MHC限制的是
A. 顺序表位
B. 构象表位
C. 线性表位
D. 半抗原
E. 独特型表位
[答案] B
[解析] 【正解B】构象表位（conformational epitope）由BCR/抗体直接识别天然抗原分子表面的空间构象依赖性决定基，无需蛋白酶降解处理和MHC分子提呈，识别不受MHC限制——这是B细胞抗原识别与T细胞抗原识别的关键区别之一。但需注意，本题四个选项（顺序表位、构象表位、线性表位、独特型表位）中，B细胞识别的表位（含构象表位和线性表位）均不受MHC限制，故答案为构象表位（最典型的MHC非限制性表位）。【排除】A/C.顺序表位/线性表位亦可被BCR直接识别，不受MHC限制，但构象表位是最典型的MHC非限制性识别代表。D.半抗原非表位类型。E.独特型表位亦可被BCR直接识别。
[题目] 275. 属于同种异型抗原的是
A. HLA
B. 青霉素
C. 花粉
D. 进入血液的精子
E. Forssman抗原
[答案] A
[解析] 【正解A】HLA（人类白细胞抗原）是典型的同种异型抗原（alloantigen），在同一物种不同个体间因MHC基因的高度多态性而存在结构差异，是器官移植排斥反应和输血反应的主要免疫学基础。【排除】B.青霉素为半抗原。C.花粉为变应原/异种抗原。D.进入血液的精子为隐蔽抗原暴露导致的自身抗原。E.Forssman抗原为异嗜性抗原（跨种属共同抗原）。
[题目] 276. 属于半抗原的是
A. HLA
B. 青霉素
C. 花粉
D. 进入血液的精子
E. Forssman抗原
[答案] B
[解析] 【正解B】青霉素是小分子药物（分子量约334Da），仅具有免疫反应性而无免疫原性，属于半抗原（hapten）。青霉素在体内可降解为青霉烯酸，与血清蛋白共价结合形成半抗原-载体复合物后获得免疫原性，可诱导IgE产生并介导I型超敏反应。【排除】A.HLA为大分子蛋白质，属完全抗原/同种异型抗原。C.花粉蛋白为完全抗原/变应原。D.进入血液的精子蛋白为完全抗原/自身抗原。E.Forssman抗原为完全抗原/异嗜性抗原。
[题目] 277. 一种蛋白质抗原免疫动物时，一般都是得到多克隆抗体，其原因是
A. 该蛋白质抗原含有多个相同的T细胞表位
B. 该蛋白质抗原含有多个不同的T细胞表位
C. 该蛋白质抗原含有多个相同的B细胞表位
D. 该蛋白质抗原含有多个不同的B细胞表位
E. 该蛋白质抗原含有多个相同的T细胞表位和多个相同的B细胞表位
[答案] D
[解析] 【正解D】一种蛋白质抗原通常含有多个不同的B细胞表位（不同部位、不同序列的抗原决定基），每个不同的B细胞表位可被相应B细胞克隆的BCR特异性识别，刺激该B细胞克隆增殖分化为浆细胞并产生针对该表位的特异性抗体。因此用该蛋白质免疫动物后获得的是含多种不同特异性抗体的混合物——多克隆抗体。【排除】A.相同T细胞表位不增加B细胞表位多样性。B.不同T细胞表位不决定抗体种类，抗体种类由B细胞表位多样性决定。C.相同B细胞表位只能诱导一种抗体。E.相同表位不产生多克隆抗体。
[题目] 278. 下列关于抗原免疫原性影响因素的叙述正确的是
A. 抗原与机体之间的亲缘关系越远，免疫原性越弱
B. 一般而言，脂类较蛋白质免疫原性强
C. 一般而言，抗原的分子量越大，免疫原性越弱
D. 抗原的分子结构越复杂，免疫原性越强
E. 抗原结构越简单，免疫原性越强
[答案] D
[解析] 【正解D】抗原分子结构越复杂，所含的抗原表位种类越丰富、数量越多，免疫原性越强。化学结构复杂度是决定免疫原性强弱的最关键因素之一，结构复杂的蛋白质比结构简单的均一多肽免疫原性强得多。【排除】A.亲缘关系越远，免疫原性越强（而非越弱）。B.脂类免疫原性较蛋白质弱（而非强）。C.分子量越大，免疫原性越强（而非越弱）。E.结构越简单，免疫原性越弱（而非越强）。
[题目] 279. 以下关于B细胞表位的描述，错误的是
A. 由BCR识别
B. 大多为构象表位
C. 识别受MHC限制
D. 无需蛋白酶降解就可识别
E. 一般由10个左右氨基酸组成
[答案] C
[解析] 【正解C】"识别受MHC限制"错误——B细胞表位由BCR/抗体直接识别，无需抗原加工处理和MHC分子提呈，识别不受MHC限制。MHC限制性是T细胞表位识别的特点（TCR识别MHC-肽复合物）。【排除】A.B细胞表位由BCR识别，正确。B.B细胞表位大多为构象表位（依赖空间构象），正确。D.B细胞表位无需蛋白酶降解即可识别（直接识别天然抗原表面表位），正确。E.B细胞表位一般由5-15个氨基酸（或单糖/核苷酸）组成，10个左右正确。
[题目] 280. 目前临床上肾脏移植面临的主要困难之一是移植排斥反应，请问诱导该反应的主要抗原属于
A. Forssmann抗原
B. 异种抗原
C. 同种异型抗原
D. 血型抗原
E. 独特型抗原
[答案] C
[解析] 【正解C】临床肾脏（同种异体）移植时，供受者之间HLA等位基因差异（同种异型抗原）是诱导移植排斥反应的主要免疫原，受者T细胞识别供者HLA分子（直接识别）或供者HLA-肽复合物（间接识别）而被激活，介导细胞免疫和体液免疫排斥反应。【排除】A.Forssman抗原为异嗜性抗原，非移植排斥相关。B.异种抗原为不同种属间抗原（如猪-人异种移植）。D.血型抗原虽也参与排斥（超急性排斥），但HLA为最主要的移植抗原。E.独特型抗原不参与移植排斥。
[题目] 281. 半抗原的特性是
A. 同时具有免疫原性和免疫反应性
B. 具有免疫反应性而不具有免疫原性
C. 含有多个抗原表位
D. 具有免疫原性而不具有免疫反应性
E. 不具有免疫反应性和免疫原性
[答案] B
[解析] 【正解B】半抗原（hapten）的核心特性是：具有免疫反应性（能与相应的抗体/BCR特异性结合）而不具有免疫原性（不能单独诱导机体产生免疫应答）。半抗原需与载体蛋白共价偶联后才获得免疫原性成为完全抗原。【排除】A.半抗原无免疫原性。C.半抗原通常仅含单一表位。D.半抗原无免疫原性但有免疫反应性（选项表述相反）。E.半抗原具有免疫反应性（选项表述均不具有）。
[题目] 282. 下列关于抗原的叙述，哪一项是错误的
A. 大分子蛋白质抗原常含有多种不同的抗原决定基
B. 抗原诱导免疫应答必须有T细胞辅助
C. 不同的抗原之间可以有相同的抗原决定基
D. 抗原不一定只诱导正向免疫应答
E. 半抗原虽无免疫原性，但可与相应抗体结合
[答案] B
[解析] 【正解B】"抗原诱导免疫应答必须有T细胞辅助"错误——非胸腺依赖性抗原（TI-Ag）可在无T细胞辅助的情况下直接刺激B细胞产生抗体（主要为IgM），如TI-1抗原（LPS）通过多克隆激活和TI-2抗原（荚膜多糖）通过交联BCR激活B细胞。TD-Ag诱导免疫应答才需要T细胞辅助。【排除】A.大分子蛋白质含多种不同表位，正确。C.不同抗原间可有交叉表位（共同表位），正确。D.抗原可诱导正向免疫应答（免疫）或负向免疫应答（耐受），正确。E.半抗原无免疫原性但可与抗体结合（免疫反应性），正确。
[题目] 283. 以下哪种抗原物质的免疫原性相对较强
A. 抗原来源与人类的亲缘关系较近
B. 抗原的分子量小于10kD
C. 抗原的结构复杂
D. 脂类抗原
E. 由单一的氨基酸组成的抗原
[答案] C
[解析] 【正解C】抗原分子结构越复杂，免疫原性越强——结构复杂意味着表位种类丰富、数目多，能有效激活更多T/B细胞克隆。此外，与宿主亲缘关系越远、分子量越大也增强免疫原性，但结构复杂度是最关键的因素。【排除】A.亲缘关系近，免疫原性弱。B.分子量小（<10kD），免疫原性弱。D.脂类抗原免疫原性弱。E.单一氨基酸组成的抗原结构简单，免疫原性弱。
[题目] 284. 下列分子中参与胞外寄生菌激活CD4+ T细胞的抗原提呈过程的是
A. TAP
B. LMP
C. HLA-A
D. HLA-B
E. HLA-DM
[答案] E
[解析] 【正解E】胞外寄生菌被APC摄取后经吞噬溶酶体降解为肽段，属于外源性抗原加工途径（MHC-II类途径）。HLA-DM分子在MHC-II类小室（MIIC）中催化CLIP从MHC-II类分子肽结合槽释放并促进抗原肽加载，是MHC-II类途径的关键辅助分子。【排除】A.TAP参与MHC-I类途径（内源性抗原肽转运至内质网）。B.LMP编码蛋白酶体亚单位，参与MHC-I类途径。C.HLA-A为MHC-I类分子，参与内源性抗原提呈。D.HLA-B为MHC-I类分子，参与内源性抗原提呈。
[题目] 285. 半抗原
A. 除非与载体结合，否则不能与抗体结合
B. 是大分子物质
C. 通常具有多肽的性质
D. 本身不具有免疫原性
E. 只能触发体液免疫
[答案] D
[解析] 【正解D】半抗原最核心的特征是本身不具有免疫原性，不能单独诱导免疫应答。半抗原具有免疫反应性（可单独与相应抗体结合），与载体蛋白偶联后获得免疫原性成为完全抗原（半抗原-载体复合物）。【排除】A.半抗原可单独与抗体结合（此为其免疫反应性的体现），无需载体。B.半抗原是小分子（通常<1000Da），非大分子。C.半抗原不一定是多肽（可以是小分子化学物质如青霉烯酸）。E.半抗原-载体复合物可诱导细胞免疫和体液免疫。
[题目] 286. 从抗原化学性质来讲，免疫原性最强的是
A. 脂多糖
B. 多糖类
C. 核酸
D. DNA
E. 蛋白质
[答案] E
[解析] 【正解E】从抗原化学性质来看，蛋白质是免疫原性最强的抗原。蛋白质由20种氨基酸组成，具有复杂的一级、二级、三级（甚至四级）结构，可提供丰富多样的T细胞表位和B细胞表位，分子量大，易被APC加工提呈，因此免疫原性远超其他生物大分子。【排除】A.脂多糖免疫原性中等（含脂质A和多糖）。B.多糖类免疫原性较弱（多含重复结构，主要为TI-2抗原）。C.核酸免疫原性弱。D.DNA免疫原性弱（高度保守且结构相对简单）。
[题目] 287. 以下抗原免疫原性较弱的是
A. 乙肝病毒表面抗原
B. 多聚赖氨酸
C. 抗原抗体复合物
D. 鸡卵清白蛋白
E. 金黄色葡萄球菌外毒素
[答案] B
[解析] 【正解B】多聚赖氨酸（poly-L-lysine）是由单一赖氨酸重复连接组成的均一多肽，化学结构简单、抗原表位单一（仅含重复的赖氨酸残基），缺少有效的T细胞表位，因此免疫原性很弱，常被用于免疫原性研究中的弱抗原模型。【排除】A.乙肝病毒表面抗原为复杂蛋白质，免疫原性强。C.抗原抗体复合物免疫原性强（含多种表位且以颗粒形式存在易被APC摄取）。D.鸡卵清白蛋白为复杂蛋白质，免疫原性强。E.金黄色葡萄球菌外毒素为蛋白质，免疫原性强。
[题目] 288. 氨苯磺酸结合载体诱导机体产生的抗氨苯磺酸抗体，只能与氨苯磺酸结合，而无法与结构相近的氨苯甲醛结合，这体现了抗原的什么性质
A. 免疫原性
B. 免疫反应性
C. 抗原特异性
D. 抗原的交叉免疫性
E. 半抗原-载体效应
[答案] C
[解析] 【正解C】抗体只能与特异性抗原（氨苯磺酸）结合，不能与结构非常相近的类似物（氨苯甲醛）结合，体现的是抗原的高度特异性（specificity）——抗体CDR区与抗原表位的结合具有精确的空间互补性，即使是极小的化学基团差异（磺酸基 vs 甲醛基）也足以破坏结合。这种精确的特异性是获得性免疫的核心特征之一。【排除】A.免疫原性是诱导免疫应答的能力，非此题范畴。B.免疫反应性是抗体与抗原结合的能力本身，但此题强调选择性的精确性。D.交叉免疫性指抗体与结构相似抗原的交叉结合，此题描述的是不交叉（高度特异性）。E.半抗原-载体效应指半抗原需偶联载体才具免疫原性。
[题目] 289. 免疫佐剂是
A. 增强半抗原免疫原性的物质
B. 增强对抗原免疫应答的物质
C. 减少免疫原毒性的物质
D. 增强免疫交叉反应性的物质
E. 增强造血作用的物质
[答案] B
[解析] 【正解B】免疫佐剂（immunologic adjuvant）是指预先或与抗原同时注入体内，可非特异性增强机体对抗原的特异性免疫应答能力或改变免疫应答类型（如从Th2型转向Th1型）的物质，经典佐剂包括铝盐佐剂、弗氏佐剂、卡介苗（BCG）和CpG ODN等。【排除】A.佐剂增强的是整体的免疫应答，非仅增强半抗原的免疫原性。C.佐剂不减少免疫原毒性（类毒素/疫苗制备才涉及减毒）。D.佐剂不专门增强交叉反应性。E.佐剂不增强造血作用。
[题目] 290. 下列哪种抗原属于同种异型抗原
A. Forssman抗原
B. 新冠病毒S蛋白
C. HLA
D. PHA
E. 葡萄球菌蛋白A
[答案] C
[解析] 【正解C】HLA（人类白细胞抗原）是典型的同种异型抗原（alloantigen），由第6号染色体MHC基因编码，在人群中存在极高度的等位基因多态性。不同个体的HLA分子氨基酸序列有差异，因此HLA在个体间属于同种异型抗原，是移植排斥反应的主要靶抗原。【排除】A.Forssman抗原为异嗜性抗原。B.新冠病毒S蛋白为异种抗原。D.PHA（植物血凝素）为有丝分裂原，非同种异型抗原。E.葡萄球菌蛋白A（SPA）为细菌产物，属异种抗原。
[题目] 291. 引起变态反应性甲状腺炎(桥本甲状腺炎)的抗原属
A. 异种抗原
B. 同种异型抗原
C. 异嗜性抗原
D. 自身抗原
E. 独特型抗原
[答案] D
[解析] 【正解D】桥本甲状腺炎（Hashimoto thyroiditis）是典型的器官特异性自身免疫病，其靶抗原为甲状腺自身抗原——甲状腺球蛋白（Tg）和甲状腺过氧化物酶（TPO）。患者产生抗Tg和抗TPO自身抗体，通过ADCC和补体活化等机制导致甲状腺滤泡破坏和甲状腺功能减退。【排除】A.异种抗原为其他种属抗原。B.同种异型抗原为个体间差异抗原（如HLA）。C.异嗜性抗原为跨种属共同抗原（如链球菌与人心肌）。E.独特型抗原为抗体可变区表位。
[题目] 292. 下列物质属于佐剂的是
A. 金黄色葡萄球菌外毒素
B. 青霉素
C. 溶血性链球菌外毒素
D. 卡介苗
E. 人乳头状瘤病毒蛋白
[答案] D
[解析] 【正解D】卡介苗（BCG，Bacillus Calmette-Guerin）是减毒牛型结核分枝杆菌活菌苗，同时具有强大的免疫佐剂作用，可非特异性激活巨噬细胞、DC和NK细胞，增强机体对抗原的免疫应答，广泛用于膀胱癌免疫治疗和作为实验佐剂（弗氏完全佐剂含灭活结核分枝杆菌）。【排除】A.金黄色葡萄球菌外毒素为超抗原，非佐剂。B.青霉素为半抗原/抗生素。C.溶血性链球菌外毒素为致病因子/超抗原。E.人乳头状瘤病毒蛋白为疫苗抗原。
[题目] 293. 兄弟姐妹间引起器官移植排斥反应的物质属于
A. 自身抗原
B. 同种异型抗原
C. 异种抗原
D. 异嗜性抗原
E. 隐蔽抗原
[答案] B
[解析] 【正解B】兄弟姐妹间为同一物种（人类）的不同个体，其HLA等位基因因亲代遗传组合不同而存在差异（每个个体HLA单体型有25%概率与同胞完全相同），此差异即为同种异型抗原差异，引起同种异体移植排斥反应。兄弟姐妹间进行器官移植时HLA配型是评估移植风险的核心指标。【排除】A.自身抗原为自身组织成分，非移植排斥原因。C.异种抗原为不同种属间抗原差异。D.异嗜性抗原为跨种属共同抗原。E.隐蔽抗原为由于屏障隔离而未被免疫系统识别的自身抗原（如眼晶状体蛋白）。
[题目] 294. 对人体来说，乙型肝炎病毒表面抗原(HBsAg)不属于
A. 胸腺依赖性抗原
B. 异种抗原
C. 内源性抗原
D. 天然抗原
E. 异嗜性抗原
[答案] E
[解析] 【正解E】乙型肝炎病毒表面抗原（HBsAg）是乙肝病毒的蛋白，对人体属于异种抗原（病毒与人类属不同种属）和胸腺依赖性抗原（TD-Ag，蛋白质类需T细胞辅助）。但不属于异嗜性抗原——异嗜性抗原是指存在于不同种属之间的共同抗原（如溶血性链球菌与人肾小球基底膜共同抗原），HBsAg无此特性。【排除】A.HBsAg为蛋白质抗原，属TD-Ag。B.HBsAg来源于病毒，属异种抗原。C.在肝细胞内合成的HBsAg属内源性抗原（经MHC-I提呈）。D.HBsAg为天然存在的病毒抗原。
[题目] 295. 接种牛痘获得对天花的免疫力表明
A. 增强巨噬细胞对病毒的吞噬能力
B. 抗原交叉反应性
C. 被动免疫的效果
D. 增强了天然免疫力
E. 抗原特异性
[答案] B
[解析] 【正解B】接种牛痘（牛痘病毒，cowpox virus）获得对天花（天花病毒，smallpox virus）的免疫力，其免疫学本质是抗原交叉反应性（cross-reactivity）——牛痘病毒和天花病毒含有共同/相似的抗原表位（交叉抗原），接种牛痘后诱导的抗体和效应T细胞能同时识别和中和天花病毒，提供交叉保护性免疫。Jenner正是利用此原理发明了人类第一个疫苗。【排除】A.非增强吞噬。C.主动免疫（接种后自身产生免疫力），非被动。D.非增强天然免疫。E.此为交叉反应性，非表现特异性。
[题目] 296. 以下关于T细胞表位的描述，错误的是
A. 由TCR识别
B. 由少于20个氨基酸组成
C. 需要蛋白酶降解后才能释放
D. 识别具有MHC限制
E. 既有线性表位，又有构象表位
[答案] E
[解析] 【正解E】"既有线性表位，又有构象表位"错误——T细胞表位仅为线性表位（顺序表位），是一段经APC加工处理后产生的短肽段（8-20个氨基酸），与MHC分子结合后被TCR识别。TCR不识别构象表位（构象表位是B细胞/BCR的识别对象），这是T细胞与B细胞抗原识别的关键区别之一。【排除】A.T细胞表位由TCR识别，正确。B.通常由8-20个氨基酸组成，正确。C.需要经蛋白酶降解加工后释放，正确。D.T细胞识别有MHC限制性，正确。
[题目] 297. 以下关于抗原的叙述错误的是
A. 免疫学的本质是区别“自己”和“非己”，非己物质就是抗原
B. 抗原是指所有能激活和诱导免疫应答的物质
C. 抗原是免疫分子的重要组成部分
D. 抗原通常是指能被TCR或BCR特异性识别的物质
E. 机体免疫细胞识别的抗原通常是蛋白质
[答案] C
[解析] 【正解C】"抗原是免疫分子的重要组成部分"错误——抗原不是免疫分子的组成部分。抗原是免疫系统识别和应答的对象/靶标，而免疫分子是指抗体（免疫球蛋白）、补体、细胞因子和MHC分子等由免疫系统产生或与免疫应答直接相关的分子，抗原与免疫分子是"目标vs工具"的关系。【排除】A.免疫学的核心本质确实是区别"自己"和"非己"，正确。B.抗原是能激活和诱导免疫应答的物质，正确。D.抗原通常是指被TCR或BCR特异性识别的物质，正确。E.免疫细胞识别的抗原通常是蛋白质，正确。
[题目] 298. CD4 T细胞识别的抗原表位不包括
A. 线性表位
B. 顺序表位
C. 构象表位
D. 蛋白降解后的多肽片断
E. MHCⅡ类分子提呈的表位
[答案] C
[解析] 【正解C】CD4+T细胞通过TCR识别MHC-II类分子提呈的抗原肽，这些抗原肽是蛋白质经APC加工降解后产生的线性表位/顺序表位（短肽片段）。CD4+T细胞不识别构象表位——构象表位（conformational epitope）由BCR/抗体直接识别天然抗原表面的空间构象依赖性决定基，不需MHC提呈。【排除】A.CD4+T细胞识别线性表位，正确。B.CD4+T细胞识别顺序表位（同线性表位），正确。D.CD4+T细胞识别蛋白降解后的多肽片段，正确。E.CD4+T细胞识别MHC-II类分子提呈的表位，正确。
[题目] 299. 属于同种异型抗原的是
A. 甲胎蛋白
B. HLA血型物质
C. 甲状腺球蛋白
D. 肠毒素
E. 外毒素
[答案] B
[解析] 【正解B】HLA（人类白细胞抗原，亦称血型物质/组织相容性抗原）和ABO血型抗原均属于同种异型抗原（alloantigen），因等位基因多态性在同一物种不同个体间存在结构差异，是移植排斥和输血反应的免疫学基础。【排除】A.甲胎蛋白为肿瘤胚胎抗原/自身抗原。C.甲状腺球蛋白为自身抗原（桥本甲状腺炎的靶抗原）。D.肠毒素为细菌超抗原。E.外毒素为细菌异种抗原。
[题目] 300. 引起1型糖尿病的抗原属于
A. 异嗜性抗原
B. 自身抗原
C. 同种异型抗原
D. 变应原
E. 耐受原
[答案] B
[解析] 【正解B】1型糖尿病（T1DM）是典型的器官特异性自身免疫病，由自身反应性CD4+和CD8+T细胞攻击胰岛β细胞所致，其靶抗原为自身抗原，包括胰岛素（insulin）、谷氨酸脱羧酶65（GAD65）、胰岛素瘤相关蛋白2（IA-2）和锌转运体8（ZnT8）等β细胞自身成分。【排除】A.异嗜性抗原为不同种属间共同抗原。C.同种异型抗原为个体间差异抗原。D.变应原诱导超敏反应（如花粉过敏性鼻炎）。E.耐受原诱导免疫耐受。
[题目] 301. 关于TD抗原正确的是
A. 在胸腺中产生
B. 只有在T细胞辅助下才能产生针对这种抗原的抗体
C. 仅存在于T细胞上
D. 相应抗体在胸腺中产生
E. 对此抗原不产生体液免疫
[答案] B
[解析] 【正解B】胸腺依赖性抗原（TD-Ag，thymus-dependent antigen）的准确定义是：必须依赖T细胞（特别是Th细胞）辅助才能刺激B细胞产生抗体的抗原。TD-Ag含T细胞表位和B细胞表位，T细胞识别载体表位提供辅助信号（CD40L-CD40、细胞因子），B细胞识别半抗原表位产生抗体，二者协作完成体液免疫应答。【排除】A.TD抗原并非在胸腺中产生（胸腺是T细胞发育场所）。C.TD抗原不局限于T细胞。D.相应抗体由B细胞分化成的浆细胞在骨髓/外周产生。E.TD抗原可诱导体液免疫。
[题目] 302. 动物血清抗毒素对人而言，属于
A. 异种抗原
B. 同种异型抗原
C. 独特型抗原
D. 异嗜性抗原
E. 自身抗原
[答案] A
[解析] 【正解A】动物（马）血清抗毒素来源于马（不同种属动物），对人体免疫系统而言，马血清中的所有蛋白质（包括抗毒素抗体本身）均为异种抗原（xenoantigen），可诱导人体产生抗马血清蛋白抗体，反复使用时可能导致血清病（III型超敏反应）。【排除】B.同种异型抗原为同一物种不同个体间差异抗原。C.独特型抗原为抗体可变区表位。D.异嗜性抗原为跨种属共同抗原。E.自身抗原为自身组织成分。
[题目] 303. 存在于不同种属之间的共同抗原称为
A. 异种抗原
B. 隐蔽抗原
C. 同种异型抗原
D. 异嗜性抗原
E. 独特型抗原
[答案] D
[解析] 【正解D】异嗜性抗原（heterophile antigen，又称Forssman抗原）是存在于不同种属生物之间的共同抗原——即两种不同种属的物种含有结构相同或相似的抗原表位。经典例子：溶血性链球菌表面M蛋白与人心肌肌球蛋白、人肾小球基底膜的交叉抗原性，这是风湿热和链球菌感染后肾小球肾炎的免疫病理基础。【排除】A.异种抗原为某一物种特有的异种来源抗原（不强调"共同"）。B.隐蔽抗原为被屏障隔离的自身抗原。C.同种异型抗原为同种不同个体间差异抗原。E.独特型抗原为抗体可变区表位。
[题目] 304. 一男孩因外伤损伤左眼球，手术后不久左眼球出现红肿热痛等炎症反应症状，该眼球局部的炎症反应针对的抗原属于
A. 自身抗原
B. 异嗜性抗原
C. 同种异型抗原
D. 独特型抗原
E. 异种抗原
[答案] A
[解析] 【正解A】眼部外伤损伤了眼球的正常屏障结构（晶状体囊膜），使原本与免疫系统隔离的隐蔽抗原（如晶状体蛋白、葡萄膜色素蛋白等）暴露于免疫系统，触发自身免疫应答。此反应可累及对侧健康眼球（交感性眼炎），是隐蔽抗原释放导致自身免疫病的经典例子。【排除】B.异嗜性抗原为跨种属共同抗原，外伤不产生。C.同种异型抗原为个体间差异抗原。D.独特型抗原为抗体可变区表位。E.异种抗原为其他种属抗原。
[题目] 305. 患者，女，35岁，无肾病病史，突发肾小球肾炎，检查发现患者急性感染溶血性链球菌，已能检测出抗体。推测该患者肾小球肾炎的发病机制为
A. 溶血性链球菌直接感染肾脏所致
B. 细菌中的超抗原诱发炎症反应所致
C. 链球菌感染所产生抗体与具有共同抗原的肾组织发生交叉反应
D. 抗双链DNA抗体沉积于肾小球
E. 特发性自身免疫病
[答案] C
[解析] 【正解C】急性链球菌感染后肾小球肾炎的发病机制为：A族β溶血性链球菌（特别是致肾炎菌株）的表面抗原（如M蛋白、内链球菌素等）与人肾小球基底膜存在共同抗原（异嗜性抗原），机体产生抗链球菌抗体后，这些抗体与肾小球基底膜发生交叉反应，形成原位免疫复合物，激活补体并募集炎症细胞，导致肾小球免疫损伤。【排除】A.链球菌不直接感染肾脏。B.不是超抗原机制。D.抗dsDNA抗体沉积为系统性红斑狼疮（SLE）肾损伤机制。E.有明确病因（链球菌感染），非特发性。
[题目] 306. 2020年新冠肺炎在全世界范围内大流行，新冠病毒的主要抗原为S蛋白，S蛋白对人体来说属于以下哪种抗原
A. 异嗜性抗原
B. 异种抗原
C. 同种异型抗原
D. 自身抗原
E. 独特型抗原
[答案] B
[解析] 【正解B】新冠病毒（SARS-CoV-2）的S蛋白（刺突蛋白）来源于病毒，病毒与人类属于不同种属/界，新冠病毒S蛋白对人体免疫系统而言是异种抗原（xenoantigen），可诱导产生抗S蛋白特异性抗体和T细胞应答，这也是新冠疫苗的设计靶标。【排除】A.异嗜性抗原为跨种属共同抗原（如链球菌与人心肌）。C.同种异型抗原为同一物种不同个体间差异抗原（如HLA）。D.自身抗原为自身组织成分。E.独特型抗原为抗体可变区表位。
[题目] 307. 2020年新冠肺炎在全世界范围内大流行，回输康复患者的血浆成为治疗重型患者的手段之一，但是多次输入可能导致血清病，其原因是血浆中主要含有以下哪种抗原
A. 异嗜性抗原
B. 异种抗原
C. 同种异型抗原
D. 自身抗原
E. 独特型抗原
[答案] C
[解析] 【正解C】康复患者血浆中含有人类血浆蛋白（包括白蛋白、免疫球蛋白等），不同个体之间存在同种异型差异（如IgG Gm标志、IgA Am标志、补体同种异型和HLA可溶性分子等），反复多次输入不同个体的血浆可诱导受者产生抗同种异型抗原的抗体，形成免疫复合物导致血清病（III型超敏反应）。【排除】A.异嗜性抗原为跨种属共同抗原。B.血浆为同种（人-人），非异种抗原。D.血浆非自身抗原。E.独特型抗原仅为抗体可变区表位，非血浆主要抗原。
[章节] 第五章 抗原的加工处理和提呈(MHC习题)
[单选题]
[题目] 308. 对tapasin描述不正确的是
A. 即TAP相关蛋白
B. 对MHCⅠ类分子在内质网中的装配起作用
C. 参与内源性抗原的加工提呈
D. 参与外源性抗原的加工提呈
E. 属MHC免疫功能相关基因
[答案] D
[解析] 【正解D】tapasin（TAP相关蛋白，TAP-associated protein）参与MHC-I类分子在内质网中的装配和内源性抗原提呈途径，桥联MHC-I类分子与TAP以促进抗原肽加载。"参与外源性抗原的加工提呈"对tapasin描述不正确——tapasin不参与外源性抗原（MHC-II类途径）的加工提呈，外源性抗原由HLA-DM和HLA-DO等辅助。【排除】A.tapasin即TAP相关蛋白，正确。B.对MHC-I类分子在内质网中装配起作用，正确。C.参与内源性抗原（MHC-I类途径）的加工提呈，正确。E.tapasin属MHC免疫功能相关基因，正确。
[题目] 309. 不表达MHCⅡ类分子的细胞是
A. 巨噬细胞
B. NK细胞
C. 活化的Th细胞
D. 树突状细胞
E. B淋巴细胞
[答案] B
[解析] 【正解B】NK细胞不表达MHC-II类分子。MHC-II类分子的表达具有选择性，主要表达在专职抗原提呈细胞（DC、巨噬细胞、B细胞）和活化的T细胞表面，NK细胞属于固有淋巴细胞，组成性表达MHC-I类分子但不表达MHC-II类分子。【排除】A.巨噬细胞表达MHC-II类分子（专职APC）。C.活化的Th细胞表达MHC-II类分子。D.树突状细胞高表达MHC-II类分子（最专职APC）。E.B淋巴细胞表达MHC-II类分子（专职APC）。
[题目] 310. 可介导内源性抗原肽转运至内质网的分子是
A. PSMB分子
B. TAP异二聚体分子
C. HLA-DM分子
D. HLAⅠ类分子
E. HLAⅡ类分子
[答案] B
[解析] 【正解B】TAP（Transporter associated with Antigen Processing，抗原加工相关转运体）是由TAP1和TAP2亚单位组成的异二聚体分子，定位于内质网膜，负责将蛋白酶体降解产生的内源性抗原肽从胞质溶胶转运至内质网腔，使其与MHC-I类分子结合，是MHC-I类抗原提呈途径的关键转运分子。【排除】A.PSMB（蛋白酶体β亚单位）参与抗原肽的降解，不负责转运。C.HLA-DM参与MHC-II类途径（催化CLIP释放和抗原肽加载）。D.HLA-I类分子是抗原肽的受体/载体，非转运体。E.HLA-II类分子参与外源性抗原提呈。
[题目] 311. 下列关于HLAⅡ类分子的叙述正确的是
A. 是HLA-DR、DQ、DP亚区相应功能基因编码的分子
B. 是由α链和β2-m组成的异二聚体糖蛋白
C. 主要表达在B细胞和静息T细胞表面
D. 主要参与内源性抗原的处理和提呈
E. 接纳的抗原肽通常由8～10个氨基酸残基组成
[答案] A
[解析] 【正解A】经典HLA-II类分子由HLA-DR、DQ、DP亚区相应功能基因编码，由α链和β链非共价结合组成（非含β2-m）。主要表达在专职APC和活化T细胞表面，参与外源性抗原的处理和提呈，其肽结合槽两端开放，可接纳13-17个（甚至更长的15-25个）氨基酸残基组成的抗原肽。【排除】B.HLA-II类分子由α链+β链组成，不含β2-m（β2-m为I类分子轻链）。C.静息T细胞不表达HLA-II类分子。D.主要参与外源性抗原提呈（非内源性）。E.接纳的抗原肽通常13-17aa，非8-10aa（此为I类分子特点）。
[题目] 312. 人类HLAⅠ类抗原β2m链编码基因的染色体定位是
A. 第2号染色体短臂
B. 第6号染色体短臂
C. 第6号染色体长臂
D. 第9号染色体长臂
E. 第15号染色体短臂
[答案] E
[解析] 【正解E】人类HLA-I类抗原β2微球蛋白（β2-m）链的编码基因位于第15号染色体短臂（15q21-22），而非第6号染色体上的MHC区域。HLA-I类分子重链（α链）由第6号染色体MHC区域编码，而轻链β2m由第15号染色体独立编码。【排除】A.第2号染色体不编码HLA成分。B.第6号染色体短臂编码HLA-I类重链和II类分子。C.第6号染色体长臂非MHC区域。D.第9号染色体非MHC或β2m位点。
[题目] 313. TNF的编码基因位于
A. HLA-B区
B. HLAⅠ区
C. HLAⅡ区
D. HLAⅢ区
E. HLA-DR区
[答案] D
[解析] 【正解D】TNF（肿瘤坏死因子，包括TNF-α和TNF-β/淋巴毒素）的编码基因位于HLA-III类基因区。HLA-III类区位于HLA-B和HLA-DR之间，编码补体成分（C4、C2、B因子）、TNF-α、TNF-β和热休克蛋白等非经典MHC分子。【排除】A.HLA-B区为经典I类基因区。B.HLA-I区（A、B、C）为经典I类基因区。C.HLA-II区（DR、DQ、DP）为经典II类基因区。E.HLA-DR区属II类基因区。
[题目] 314. 可被HLAⅡ类分子抗原结合槽容纳的抗原肽长度一般为
A. 5～15个氨基酸残基
B. 8～10个氨基酸残基
C. 10～13个氨基酸残基
D. 13～17个氨基酸残基
E. 25～37个氨基酸残基
[答案] D
[解析] 【正解D】HLA-II类分子的肽结合槽两端开放，可容纳较长肽段，一般为13-17个（甚至15-25个）氨基酸残基。HLA-I类分子的肽结合槽两端封闭，通常仅容纳8-10个氨基酸残基的短肽。二者在结构上的关键差异决定了提呈肽段的长度。【排除】A.5-15aa范围不标准。B.8-10aa为HLA-I类分子的肽段长度。C.10-13aa偏短。E.25-37aa过长。
[题目] 315. 单体型指的是
A. 控制一个HLA特异性的基因，如HLA-A或HLA-DP
B. 由一条染色体上不同座位等位基因的特定组合
C. 同一家族中在一个孩子而不是其他孩子身上发现的基因
D. 同一家族中细胞表面所有的同种异型特异性的一半
E. 人类第六号染色体一串基因
[答案] B
[解析] 【正解B】单体型（haplotype）是指一条染色体上不同MHC座位等位基因的特定组合，以一种遗传单位（连锁）的形式从亲代完整地遗传给子代。每个人的HLA单体型分别来自父亲和母亲，形成两个单体型（HLA基因型）。【排除】A.描述的是一个座位的一个等位基因（等位基因概念），非单体型。C/D/E均描述不准确或不完整。
[题目] 316. MHC限制性表现在
A. 巨噬细胞对病原体的吞噬作用
B. ADCC作用
C. CTL细胞对靶细胞的识别和杀伤作用
D. B细胞对TI抗原的识别过程
E. 补体依赖的细胞毒作用
[答案] C
[解析] 【正解C】MHC限制性（MHC restriction）最典型也最重要的表现是CTL（CD8+Tc细胞）对靶细胞的识别和杀伤——CTL通过TCR识别靶细胞表面自身MHC-I类分子提呈的内源性抗原肽，必须同时识别"自身MHC-I + 抗原肽"才能被激活杀伤靶细胞，这是Zinkernagel和Doherty发现的MHC限制性经典现象。【排除】A.吞噬作用不受MHC限制。B.ADCC由NK细胞等经Fc受体介导，不受MHC限制。D.B细胞对TI抗原的识别不受MHC限制。E.补体依赖的细胞毒作用不受MHC限制。
[题目] 317. HLAⅠ类分子与抗原肽结合的部位是
A. α1和β1结构域
B. α1和α2结构域
C. β2-m与α3结构域
D. α2和β2结构域
E. α2和α3结构域
[答案] B
[解析] 【正解B】HLA-I类分子与抗原肽结合的部位是α1和α2结构域共同构成的抗原肽结合槽（peptide-binding groove）。α1和α2各贡献一半α螺旋形成槽的两侧壁，底部由β折叠片构成，N端和C端封闭（限短肽8-10aa），该区域是I类分子多态性最集中的部位。【排除】A.α1和β1为II类分子肽结合槽结构（α1+β1构成）。C.β2-m与α3为Ig样结构域，不参与肽结合。D/E.α2/β2/α3组合均非肽结合槽组成。
[题目] 318. 活化的T淋巴细胞表达哪类分子
A. 只表达MHCⅡ类分子
B. 只表达MHCⅠ类分子
C. 同时表达MHCⅠ、MHCⅡ类分子
D. 仅同时表达MHCⅠ、MHCⅢ类分子
E. 同时表达mIgM和mIgD分子
[答案] C
[解析] 【正解C】活化的T淋巴细胞同时表达MHC-I类和MHC-II类分子。所有有核细胞（包括静息T细胞）组成性表达MHC-I类分子，而MHC-II类分子在T细胞活化后被诱导表达（活化T细胞新表达MHC-II类分子），因此活化的T细胞为MHC-I+II+双阳性。【排除】A.活化T细胞也表达MHC-I类分子。B.活化T细胞还表达MHC-II类分子。D.活化T细胞不表达MHC-III类分子（III类为补体等分泌性分子）。E.mIgM和mIgD为B细胞膜表面免疫球蛋白。
[题目] 319. HLA分子所不具备的功能是
A. 诱导移植排斥反应
B. 参与调理吞噬
C. 参与抗原提呈
D. 参与胸腺T淋巴细胞分化发育
E. 参与自身免疫耐受的形成
[答案] B
[解析] 【正解B】HLA分子不具有调理吞噬功能。调理吞噬作用主要由抗体（IgG的Fc段与吞噬细胞Fc受体结合）和补体裂解片段（C3b与吞噬细胞CR1结合）完成。HLA分子的核心功能是抗原提呈、诱导移植排斥、参与胸腺T细胞发育（阳性/阴性选择）和自身免疫耐受形成。【排除】A.HLA分子诱导移植排斥反应，正确。C.HLA分子参与抗原提呈，是核心功能。D.HLA参与胸腺T细胞分化发育（阳性选择获得MHC限制性、阴性选择删除自身反应克隆）。E.HLA参与自身免疫耐受形成。
[题目] 320. .编码补体成分的基因位于
A. TAP座位
B. HLA-DR座位
C. HLA-I类基因区
D. HLA-Ⅱ类基因区
E. HLA-Ⅲ类基因区
[答案] E
[解析] 【正解E】编码补体成分（C4A、C4B、C2和B因子/Bf）的基因位于HLA-III类基因区（MHC III类区）。III类区位于HLA-B与HLA-DR之间，编码结构/功能与经典HLA分子不同的蛋白。【排除】A.TAP座位编码抗原处理相关转运体。B.HLA-DR座位编码MHC-II类分子。C.HLA-I类基因区编码经典I类分子（A、B、C）。D.HLA-II类基因区编码经典II类分子（DR、DQ、DP）。
[题目] 321. 对MHC中LMP基因描述错误的是
A. 即低分子量多肽基因
B. 包括LMP2和LMP7两个座位
C. 在APC中参与对外源性抗原的酶解
D. 在APC中参与对内源性抗原的酶解
E. 编码胞质溶胶中蛋白酶体相关成分
[答案] C
[解析] 【正解C】LMP（Low Molecular weight Polypeptide，低分子量多肽）基因包括LMP2和LMP7两个座位，编码蛋白酶体（proteasome）的β亚单位，参与内源性抗原（胞质蛋白）的酶解加工（MHC-I类途径）。"参与对外源性抗原的酶解"错误——外源性抗原的酶解发生在吞噬溶酶体和内体中，由组织蛋白酶等负责，不涉及LMP/蛋白酶体途径。【排除】A.LMP即低分子量多肽基因，正确。B.包括LMP2和LMP7两个座位，正确。D.参与对内源性抗原的酶解，正确。E.编码胞质溶胶中蛋白酶体相关成分，正确。
[题目] 322. 经典的HLAⅡ类基因包括
A. HLA-A座位
B. HLA-A、B、
C. 座位 C.HLA-DR、DQ、DP三个亚区
D. HLA-DM、DO、DR亚区
E. HLA-DR、HLA-DM、亚区
[答案] C
[解析] 【正解C】经典的HLA-II类基因包括HLA-DR、DQ、DP三个亚区，每个亚区含A、B两个座位（编码α链和β链），这六个座位编码经典的MHC-II类分子αβ异二聚体，是外源性抗原提呈的关键分子。HLA-DM和DO为非经典II类基因，编码辅助分子而非经典肽提呈分子。【排除】A.HLA-A为经典I类基因。B.HLA-A、B、C为经典I类基因。D.DM/DO为非经典II类基因。E.不完整。
[题目] 323. MHCⅡ类分子表达缺陷病又被称为裸淋巴细胞综合征(bare lymphocyte syndrom，BLS)，是一种极为罕见的原发性免疫缺陷病，属常染色体隐性遗传病，其主要特征表现为MHCⅡ类基因的表达缺失，其机制是控制MHCⅡ类基因表达的因子缺陷。所以此病实际上是一种基因调节缺陷病。实验室检查发现这类病人外周血中CD8+T细胞、B细胞数量正常，CD4+T细胞数量显著减少，请推测CD4+T细胞数量减少的原因
A. CD8+T淋巴细胞不表达MHCⅡ类分子
B. CD8+T淋巴细胞相对增多
C. CD4+T淋巴细胞不表达MHCⅡ类分子
D. T细胞在胸腺发育过程中CD4+CD8+T细胞不能通过阳性选择分化为CD4+T细胞
E. T细胞在胸腺发育过程中CD4+CD8+T细胞不能通过阴性选择分化为CD4+T细胞
[答案] D
[解析] 【正解D】裸淋巴细胞综合征(BLS)因MHC-II类基因表达调控因子（如CIITA、RFX5、RFXAP、RFXANK等）突变导致MHC-II类分子表达缺失。在胸腺中，CD4+CD8+双阳性（DP）胸腺细胞的TCR需与胸腺上皮细胞表面MHC-II类分子-自身肽复合物相互作用才能获得阳性选择信号，诱导分化为CD4+单阳性T细胞。MHC-II类分子缺失导致DP细胞无法通过阳性选择分化为CD4+T细胞，故外周CD4+T细胞显著减少。【排除】A/B/C.均非主要原因。E.阴性选择删除自身反应克隆，与CD4+减少无关。
[题目] 324. 下列关于MHCⅠ类分子的叙述正确的是
A. 其肽链均为MHC编码
B. 可与辅助受体CD4结合
C. 由两条相同的重链和两条相同的轻链组成
D. 参与内源性抗原的提呈
E. 仅表达在抗原提呈细胞表面
[答案] D
[解析] 【正解D】MHC-I类分子参与内源性抗原的提呈（向CD8+CTL提呈细胞内合成的抗原肽）。MHC-I类分子由重链（α链，由MHC基因编码）和轻链（β2-m，由第15号染色体编码）以非共价键组成，以α1+α2结构域构成肽结合槽。MHC-I类分子表达于几乎所有有核细胞表面和血小板。【排除】A.轻链β2-m非MHC编码（第15号染色体编码）。B.I类分子α3结构域与CD8结合，非CD4。C.由一条重链和一条轻链组成，非两条重链+两条轻链。E.不仅表达在APC表面，而是几乎所有有核细胞。
[题目] 325. HLA复合体基因不编码
A. HLAⅠ类分子的重链(α链)
B. HLAⅠ类分子的轻链(β链)
C. HLAⅡ类分子的α链
D. HLAⅡ类分子的β链
E. B因子
[答案] B
[解析] 【正解B】HLA-I类分子的轻链（β链，即β2微球蛋白）由第15号染色体编码，不由HLA复合体基因（第6号染色体）编码。HLA复合体基因编码HLA-I类分子重链（α链）、HLA-II类分子α链和β链、以及III类分子的成分（如B因子、C4、C2）。【排除】A.HLA-I类重链由HLA复合体编码，正确。C.HLA-II类分子α链由HLA复合体编码，正确。D.HLA-II类分子β链由HLA复合体编码，正确。E.B因子（Bf）由III类基因编码，属HLA复合体。
[题目] 326. 人类MHC基因定位于
A. 第2号染色体
B. 第6号染色体
C. 第9号染色体
D. 第17号染色体
E. 第22号染色体
[答案] B
[解析] 【正解B】人类MHC（HLA复合体）基因定位于第6号染色体短臂（6p21.31），是一组紧密连锁的基因群，全长约3600kb，包含200多个基因座，是人体多态性最丰富的基因区域。小鼠MHC（H-2复合体）定位于第17号染色体。【排除】A/C/D/E.均非HLA基因的真实染色体定位。
[题目] 327. MHC分子被T细胞的TCR识别的部位在
A. 肽结合区
B. IgSF结构域
C. 跨膜区
D. 胞浆区
E. 胞膜外区
[答案] A
[解析] 【正解A】TCR识别MHC分子时，其识别部位是MHC分子的肽结合区（peptide-binding region），即MHC-I类分子的α1和α2结构域（或MHC-II类分子的α1和β1结构域）形成的抗原肽结合槽。TCR的CDR1/CDR2主要接触MHC分子的α螺旋，CDR3主要接触抗原肽，三者共同形成MHC限制性识别。【排除】B.IgSF结构域（α3/β2-m或α2/β2）与辅助受体结合，非主要TCR识别部位。C/D/E.跨膜区、胞浆区、胞膜外其他区域非TCR主要识别部位。
[题目] 328. HLAⅠ类抗原的主要功能是
A. 向Th细胞提呈外源性抗原肽
B. 向Tc细胞提呈内源性抗原肽
C. 向Th细胞提呈内源性抗原肽
D. 向Tc细胞提呈外源性抗原肽
E. 向γδ+Tc细胞提呈内源性抗原肽
[答案] B
[解析] 【正解B】HLA-I类分子（经典MHC-I类分子）的主要功能是向Tc细胞（CTL/CD8+细胞毒性T细胞）提呈内源性抗原肽（如病毒感染细胞内合成的病毒蛋白肽、肿瘤细胞内合成的肿瘤抗原肽），使CTL识别并杀伤靶细胞。【排除】A.向Th细胞提呈外源性抗原肽是MHC-II类分子的功能。C.向Th细胞提呈内源性抗原肽主要不通过I类分子。D.向Tc细胞提呈外源性抗原肽需交叉提呈途径（非I类分子主要功能）。E.γδ+Tc细胞识别不受MHC-I类分子严格限制。
[题目] 329. 下列哪一种细胞在正常情况下不表达HLAⅡ类抗原
A. 胰岛β细胞
B. B细胞
C. 朗格汉斯细胞
D. 树突状细胞
E. 巨噬细胞
[答案] A
[解析] 【正解A】胰岛β细胞在正常情况下不表达HLA-II类抗原（HLA-II类分子表达主要限于专职APC：DC、巨噬细胞、B细胞和活化T细胞）。胰岛β细胞表达HLA-I类分子，在自身免疫性糖尿病中可异常表达HLA-II类分子，参与自身抗原提呈和β细胞的自身免疫攻击。【排除】B.B细胞为专职APC，表达II类分子。C.朗格汉斯细胞为皮肤DC，表达II类分子。D.树突状细胞为最专职APC，高表达II类分子。E.巨噬细胞为专职APC，表达II类分子。
[题目] 330. Ⅱ类HLA分子与CD4的结合部位是
A. β1结构域
B. β2结构域
C. α1结构域
D. α2结构域
E. α1和β2结构域
[答案] B
[解析] 【正解B】MHC-II类分子β2结构域（Ig样结构域）含有与CD4辅助受体的结合位点。MHC-II类分子与CD4+T细胞表面的CD4分子通过β2-CD4的非共价相互作用稳定TCR-抗原肽-MHC-II类分子三元复合物，增强T细胞的活化信号。与此对应，MHC-I类分子α3结构域含有与CD8的结合位点。【排除】A.β1结构域与α1共同构成肽结合槽，非CD4结合。C.α1结构域参与构成肽结合槽。D.α2为Ig样结构域，非CD4结合。E.α1+β2非CD4结合部位。
[题目] 331. 抗原肽中与HLA肽结合区结合的氨基酸称为
A. 锚定残基
B. 可变区
C. IgSF结构域
D. 共同基序
E. 跨膜区
[答案] A
[解析] 【正解A】抗原肽中与HLA分子肽结合槽内的锚点（pocket）结合的氨基酸残基称为锚定残基（anchor residue）。每种MHC等位基因产物具有特异的锚点氨基酸偏好（肽结合基序/peptide-binding motif），通常锚定残基位于肽段N端和C端（MHC-I类）或沿肽段分散（MHC-II类），决定某特定抗原肽是否能与特定MHC等位基因产物结合。【排除】B.可变区为TCR/BCR的结构域。C.IgSF结构域为MHC分子的Ig超家族样结构域。D.共同基序为某MHC等位基因所有结合肽的锚定残基特征模式。E.跨膜区为MHC分子的跨膜结构域。
[题目] 332. MHC分子多态性的原因是
A. MHC基因连锁不平衡
B. MHC基因重组
C. MHC基因突变
D. MHC分子间有交叉反应
E. MHC基因是复等位基因，且呈共显性
[答案] E
[解析] 【正解E】MHC分子的高度多态性（polymorphism）源于两方面：MHC基因是复等位基因（每个MHC座位在群体中存在大量等位基因，如HLA-B有超过8000个等位基因）；且MHC等位基因呈共显性表达（来自父方和母方的等位基因均能在同一细胞表面表达），使得每个个体的MHC表型极其多样。【排除】A.连锁不平衡描述不同座位等位基因非随机关联现象。B.重组是产生新等位基因的机制之一，非多态性的主要原因。C.突变是等位基因产生的原始来源但频率低。D.交叉反应指不同MHC分子间结构相似性导致的血清学交叉反应。
[题目] 333. HLAⅡ类分子表达在
A. T淋巴细胞表面
B. 血管内皮细胞表面
C. 专职抗原提呈细胞表面
D. 肝细胞表面
E. 上皮细胞表面
[答案] C
[解析] 【正解C】HLA-II类分子主要表达在专职抗原提呈细胞表面，包括树突状细胞（DC）、巨噬细胞（Mφ）和B淋巴细胞，以及活化的T细胞和胸腺上皮细胞。这是MHC-II类分子表达的组织特异性，与其功能（提呈外源性抗原给CD4+T细胞）匹配。【排除】A.静息T细胞不表达II类分子。B.血管内皮细胞通常不表达II类分子（仅在某些炎症条件下可被诱导）。D.肝细胞不表达II类分子。E.上皮细胞通常不表达II类分子（胸腺髓质上皮细胞除外）。
[题目] 334. 可与CTL细胞表面CD8分子结合的是
A. MHCⅠ类分子的β2-m
B. MHCⅡ类分子的β1功能区
C. MHCⅠ类分子的α1功能区
D. MHCⅡ类分子的α2功能区
E. MHCⅠ类分子的α3功能区
[答案] E
[解析] 【正解E】MHC-I类分子α3功能区（α3结构域，属于Ig样结构域）可与CTL细胞表面CD8分子非共价结合，稳定TCR-抗原肽-MHC-I类分子的相互作用，增强TCR信号的转导效率。这是CD8作为MHC-I类限制性T细胞辅助受体的分子基础。【排除】A.β2-m不直接与CD8结合。B.MHC-II类分子β1结构域参与肽结合，β2与CD4结合。C.MHC-I类分子α1参与肽结合槽。D.MHC-II类分子α2为Ig样结构域，不结合CD8。
[题目] 335. 下列哪一种细胞不表达HLAⅠ类抗原
A. T淋巴细胞
B. B淋巴细胞
C. 成熟的红细胞
D. 上皮细胞
E. 中性粒细胞
[答案] C
[解析] 【正解C】成熟的红细胞不表达HLA-I类抗原。红细胞在成熟过程中脱去细胞核和细胞器，丧失了蛋白质合成能力，细胞表面没有MHC-I类分子表达。HLA-I类分子表达于几乎所有有核细胞（包括T/B淋巴细胞、上皮细胞、中性粒细胞）和血小板表面。【排除】A.T淋巴细胞有核，表达HLA-I类分子。B.B淋巴细胞有核，表达HLA-I类分子。D.上皮细胞有核，表达HLA-I类分子。E.中性粒细胞有核（分叶核），表达HLA-I类分子。
[题目] 336. 关于MHCⅡ类分子的叙述，下列哪项错误
A. 分布在APC表面
B. 由HLA-DP、HLA-DQ、HLA-DR基因编码
C. 体现在Th细胞活化中的限制性
D. 体现在Tc细胞活化中的限制性
E. T细胞激活后可表达MHCⅡ类分子
[答案] D
