A. 情绪的产生多与生理需要的满足有关
B. 情绪常伴有生理性变化
C. 情绪的产生有较大的情境性
D. 是人所特有的
E. 情绪冲动性较大
[答案] D
[解析] 正确答案为D。情绪不是人所特有的，动物也有情绪。情绪特点：多与生理需要有关、伴有生理变化、有情境性、冲动性较大。D"是人所特有的"错误，情绪人和动物共有，情感才是人所特有的。本题考察情绪的特点。

[题目] 129. 关于情绪与情感的特点,下列说法正确的是(   )。
A. 情绪较为稳定
B. 情感反应较持久
C. 情绪反应较深沉
D. 情感与生理性需要有关
E. 情感是人和动物共有的
[答案] B
[解析] 正确答案为B。情感反应较持久稳定，情绪反应较短暂波动。A情绪较为稳定错误，情绪更波动；C情绪反应较深沉错误，情感更深沉；D情感与生理需要有关错误，情感与社会需要有关；E情感是人特有的，动物也有情绪。本题考察情绪与情感的区别。

[题目] 130. 红、橙、黄色,往往使人产生温暖的感觉,被称为“暖色调”。这种心理现象是感觉的(   )。
A. 适应
B. 后像
C. 补偿
D. 联觉
E. 感受性
[答案] D
[解析] 正确答案为D。联觉指一种感觉引起另一种感觉。红橙黄引起温暖感是视觉引起温度觉。A适应刺激持续作用；B后像刺激消失后感觉存续；C补偿代偿；E感受性是感觉能力。本题考察联觉。

[题目] 131. 下列不属于情绪的功能的是(   )。
A. 动机功能
B. 掩饰功能
C. 信号功能
D. 调节功能
E. 影响健康
[答案] B
[解析] 正确答案为B。情绪的功能包括动机功能、信号功能（表情传递信息）、调节功能、影响健康等。掩饰功能不是情绪的功能，情绪的表达往往难以完全掩饰。本题考察情绪的功能。

[题目] 132. 按照希波克拉底对气质的分类,下列不属于气质类型的是(   )。
A. 多血质
B. 黏液质
C. 胆汁质
D. 神经质
E. 抑郁质
[答案] D
[解析] 正确答案为D。希波克拉底的气质分类包括多血质、胆汁质、黏液质、抑郁质四种类型。神经质不是希波克拉底的分类，而是现代心理学中的概念。本题考察气质类型的历史分类。

[题目] 133. “人心不同,各如其面”,这句俗语为人格的(  )做了最好的诠释。
A. 稳定性
B. 独特性
C. 整合性
D. 功能性
E. 社会性
[答案] B
[解析] 正确答案为B。"人心不同各如其面"体现人格的独特性，每个人的心理面貌各不相同。A稳定性指持久不变；C整合性即整体性；D功能性指对行为的影响；E社会性指社会化的影响。本题考察人格的独特性。

[题目] 134. 善于把已经开始了的事业进行到底,不达目的誓不罢休的意志品质是( )。
A. 意志的自觉性
B. 意志的果断性
C. 意志的自制性
D. 意志的坚韧性
E. 意志的稳定性
[答案] D
[解析] 正确答案为D。意志的坚韧性（坚持性）指坚持决定、不达目的不罢休的品质。A自觉性指目的明确；B果断性指迅速决断；C自制性指自我控制；E稳定性不是意志品质。本题考察意志的坚韧性。

[题目] 135. 人对客观现实稳定的态度和与之相适应的习惯化的行为方式称为(  )。
A. 态度
B. 行为
C. 性格
D. ⽓质
E. 能力
[答案] C
[解析] 正确答案为C。性格是人对客观现实稳定的态度和与之相适应的习惯化的行为方式。A态度是心理倾向；B行为是外显活动；D气质是动力特征；E能力是心理特征。本题考察性格的定义。

[题目] 136. 某冠心病患者想接受冠脉搭桥治疗,但又担心术中出现意外,属于(   )。
A. 双趋冲突
B. 双避冲突
C. 趋避冲突
D. 双重趋避冲突
E. 多重趋避冲突
[答案] C
[解析] 正确答案为C。趋避冲突指同一目标既有好的一面又有不好的一面。想接受治疗（趋）又担心意外（避）是典型的趋避冲突。A双趋两个都想要；B双避两个都想避；D双重趋避更复杂。本题考察趋避冲突。

[题目] 137. 一个人同时面临着两件令人讨厌的事物,产生同等的逃避动机,要回避其一就必然遭遇另一事物。此时产生的心理冲突称为(     )。
A. 双趋冲突
B. 双避冲突
C. 趋避冲突
D. 双重趋避冲突
E. 双重趋避冲突
[答案] B
[解析] 正确答案为B。双避冲突指两个都想避开的威胁处境，回避其一必遭遇另一。A双趋两个都想要；C趋避有好有坏。本题考察双避冲突。

[题目] 138. 情感的特征不包括(   )。
A. 外显性
B. 深刻性
C. 长期性
D. 稳定性
E. 社会性
[答案] A
[解析] 正确答案为A。情感的特征包括深刻性、长期性、稳定性、社会性等。外显性不是情感的特征，情感更内隐，情绪更外显。本题考察情感的特征。

[题目] 139. 当机体处于强烈的应激状态时,可表现出心率加快.⾎压升高.呼吸加速.⾎糖升高,这些生理反应说明哪个系统活动增强?(  )
A. 下丘脑-垂体-肾上腺⽪质轴
B. 下丘脑-垂体-甲状腺轴
C. 交感-肾上腺髓质轴
D. 下丘脑-垂体-性腺轴
E. 下丘脑-神经垂体轴
[答案] C
[解析] 正确答案为C。应激时交感-肾上腺髓质轴活动增强，释放去甲肾上腺素和肾上腺素，引起心率加快、血压升高、呼吸加速、血糖升高等反应。A下丘脑-垂体-肾上腺皮质轴主要分泌糖皮质激素；B甲状腺轴；D性腺轴；E神经垂体轴。本题考察应激的生理机制。

[章节] 心理干预

[单选题]

[题目] 1. 异常行为是持久性学习或环境适应不良的结果,因此,可以通过消除条件反射的方法或通过改变学习的方法来矫正。行为是机体在与环境相互作用下的学习过程,异常行为和病理.生理变化既可通过各种条件反射习得和消除外,也可借助于观察.模仿或示范的学习方式获得或消除这个心理治疗理论被称为( )。
A. 来谈者中心治疗理论
B. 精神分析治疗理论
C. 行为治疗理论
D. 交互抑制理论
E. 理性情绪疗法理论
[答案] C
[解析]
正确答案为C。行为治疗理论认为异常行为是学习或环境适应不良的结果，可通过条件反射的消除或改变学习来矫正。A来谈者中心理论强调自我实现；B精神分析关注潜意识冲突；D交互抑制理论是行为治疗的具体机制之一；E理性情绪疗法强调认知改变。本题考察行为治疗理论的核心观点。

[题目] 2. 系统脱敏法是(  )。
A. 将病人暴露于恐惧的刺激中
B. 将病人焦虑.恐惧的刺激分不同等级并逐步放松
C. 要病人不予理会异常行为
D. 通过分析刺激的情境改变态度
E. 快速消退已建立的条件反射
[答案] B
[解析]
正确答案为B。系统脱敏法是将焦虑刺激分等级，并让患者在放松状态下逐步暴露，以消除焦虑。A单纯暴露于恐惧刺激是冲击疗法；C不予理会是消退法；D分析情境改变态度是认知疗法；E快速消退条件反射是冲击疗法的原理。本题考察系统脱敏法的定义。

[题目] 3. 被称为心理学的“第三种势力 ”的是(  )。
A. 行为主义理论
B. 精神分析理论
C. 认知理论
D. 人本主义理论
E. 漂浮理论
[答案] D
[解析]
正确答案为D。人本主义心理学被称为心理学的"第三种势力"，此前的精神分析为第一种，行为主义为第二种。A行为主义是第二种势力；B精神分析是第一种；C认知理论是后来兴起的第四种；E漂浮理论不存在。本题考察心理学流派的历史地位。

[题目] 4. 心理治疗的性质是(  )。
A. 帮助病人自己改变自己的过程
B. 朋友间的聊天
C. 等同于思想教育
D. 病人被动地接受治疗
E. 心理卫生课
[答案] A
[解析]
正确答案为A。心理治疗的本质是帮助病人自己改变自己，强调患者的自主性和主动性。B朋友聊天缺乏专业性和目的性；C心理治疗不同于思想教育；D患者被动接受不符合治疗原则；E心理卫生课是健康教育形式。本题考察心理治疗的性质。

[题目] 5. 某单位职工,男性,48岁。平时性情怪异,与同事相处甚难,某同事想让其就诊心理咨询,但该职工坚决反对,心理医师也不主张这样的人来门诊治疗,是因为心理治疗的性质有( )。
A. 学习性
B. 自主性
C. 实效性
D. 应用性
E. 操作性
[答案] B
[解析]
正确答案为B。心理治疗强调自主性原则，患者必须有主动求治的意愿，否则难以取得效果。该职工坚决反对就诊，缺乏自主性，故心理医师不主张治疗。A学习性、C实效性、D应用性、E操作性均不是该情境下拒绝治疗的原因。本题考察心理治疗的自主性原则。

[题目] 6. 马斯洛把完善自己,充分发挥自己的潜能,完成自身使命的需要称为(  )。
A. 尊重需要
B. 完善自我需要
C. 潜能发挥需要
D. 自我实现需要
E. 安全性需要
[答案] D
[解析]
正确答案为D。马斯洛需要层次理论中最高层次为自我实现需要，即完善自己、充分发挥潜能、完成自身使命。A尊重需要是第四层次；B完善自我和C潜能发挥不是标准术语；E安全性需要是第二层次。本题考察马斯洛需要层次理论。

[题目] 7. 对抑郁症的处理措施中首要的是( )
A. 改变情绪状态
B. 进行心理治疗
C. 加强饮食营养
D. 改善睡眠状况
E. 评估自杀风险
[答案] E
[解析]
正确答案为E。对抑郁症患者首要处理措施是评估自杀风险，这是保障患者生命安全的关键。A改变情绪状态、B心理治疗、C加强营养、D改善睡眠均为后续干预，但首要的是风险评估。本题考察抑郁症的临床处理原则。

[题目] 8. 男,22岁。因为怕脏和反复洗手等被诊断为强迫症。心理治疗师要求患者触摸地面.门把手等,之后不允许其洗手并要求其必须接着做事。经治疗,该患者的强迫症状逐渐减轻这种治疗方法属于( )
A. 系统脱敏疗法
B. 行为塑造
C. 厌恶疗法
D. 冲击疗法
E. 逐级暴露疗法
[答案] D
[解析]
正确答案为D。冲击疗法（满灌疗法）让患者直接暴露于引发焦虑的刺激（触摸脏物），并阻止其强迫行为（不允许洗手），不允许逃避。A系统脱敏需逐步暴露和放松；B行为塑造通过强化逐步接近目标；C厌恶疗法将不良行为与厌恶刺激结合；E逐级暴露是系统脱敏的组成部分。本题考察冲击疗法的特点。

[题目] 9. 治疗者要求病人毫无保留地诉说他想要说的一切,甚至是自认为荒谬.离奇.不好意思讲的想法,这种治疗属于()。
A. 系统脱敏法
B. 释梦
C. 满灌法
D. 自信和社交技巧训练
E. 自由联想
[答案] E
[解析]
正确答案为E。自由联想是精神分析的基本技术，要求患者毫无保留地说出脑中一切想法，包括荒谬、离奇的内容。A系统脱敏是行为治疗技术；B释梦是对梦的分析；C满灌法是行为治疗；D自信和社交技巧训练是行为治疗技术。本题考察自由联想的定义。

[题目] 10. 女,45岁。在初次心理治疗的过程中衣着整产,年貌相当,言语清晰,但语速较快逻辑欠清晰,倾诉欲特别强,说话滔滔不绝不带丝毫停顿。为了节省时间,尽快了解患者的主要问题,医生应对患者(  )。
A. 解释其多话原因
B. 训斥其说话无主题
C. 使用封闭式提问
D. 诊断为躁狂症
E. 继续认真倾听
[答案] C
[解析]
正确答案为C。患者语速快、倾诉欲强、逻辑欠清晰，为节省时间并迅速了解主要问题，应采用封闭式提问引导谈话方向。A在初次治疗时解释原因可能中断倾诉；B训斥会破坏治疗关系；D仅凭一次表现不能诊断为躁狂症；E继续倾听无法提高效率。本题考察心理咨询中的提问技巧。

[题目] 11. 异常行为是持久性学习或环境适应不良的结果,因此,可以通过消除条件反射的方法或通过改变学习的方法来矫正。行为是机体在与环境相互作用下的学习过程,异常行为和病理.生理变化既可通过各种条件反射习得和消除外,也可借助于观察.模仿或示范的学习方式获得或消除。在此心理治疗的理论中,决定治疗效果的因素是(  )。
A. 适应性条件反射的形成
B. 移情过程
C. 无条件积极关注
D. 领悟
E. 以上都不是
[答案] A
[解析]
正确答案为A。题干描述的是行为治疗理论，该理论认为治疗效果的决定因素是适应性条件反射的形成。B移情是精神分析概念；C无条件积极关注是人本主义概念；D领悟是认知治疗和精神分析的概念。本题考察行为治疗的核心机制。

[题目] 12. 让病人直接面对能产生强烈焦虑的环境,并保持一段时间,不允许病人逃避。这种心理治疗属于()。
A. 系统脱敏法
B. 释梦
C. 满灌法
D. 自信和社交技巧训练
E. 自由联想
[答案] C
[解析]
正确答案为C。满灌法（冲击疗法）是让患者直接面对强烈焦虑的环境并保持一段时间，不允许逃避。A系统脱敏需分等级和放松训练；B释梦是精神分析技术；D自信训练是行为治疗；E自由联想是精神分析技术。本题考察满灌法的定义。

[题目] 13. 巴甫洛夫根据高级神经活动类型的特征对气质进行分类,与希波克拉底的四种类型相对应。不属于上述四种类型的为(  )。
A. 活泼型
B. 安静型
C. 外向型
D. 兴奋型
E. 抑制型
[答案] C
[解析]
正确答案为C。巴甫洛夫将气质分为兴奋型（胆汁质）、活泼型（多血质）、安静型（黏液质）、抑制型（抑郁质），对应希波克拉底四类型。外向型不属于巴甫洛夫分类，是荣格提出的概念。本题考察巴甫洛夫气质类型。

[题目] 14. 在酒中加⼊戒酒药使酗酒者饮用后痛苦的恶心呕吐,抵消了饮酒的欣快感,从而促使戒酒,这种方法属于( )。
A. 系统脱敏疗法
B. 厌恶疗法
C. 标记奖励法
D. 生物反馈疗法
E. 放松训练
[答案] B
[解析]
正确答案为B。厌恶疗法是将不良行为（酗酒）与厌恶刺激（恶心呕吐）反复结合，抑制不良行为。A系统脱敏用于焦虑；C标记奖励法是正强化；D生物反馈通过仪器反馈生理信号；E放松训练是放松身心。本题考察厌恶疗法的应用。

[题目] 15. —位来访者因婚姻危机,离婚与否难以决断而来求助。而你作为心理咨询员不能代替她作出任何决定,你遵守的原则是 (     ) 。
A. 真诚原则
B. 耐心原则
C. 保密原则
D. 中立原则
E. 回避原则
[答案] D
[解析]
正确答案为D。中立原则要求咨询师不代替来访者做出决定，保持客观中立，帮助来访者自主决策。A真诚原则要求真诚一致；B耐心原则要求耐心倾听；C保密原则要求保护隐私；E回避原则要求避免双重关系。本题考察心理咨询的中立原则。

[题目] 16. 在人本主义治疗中哪项是最重要(  )
A. 表达
B. 分析
C. 指导
D. 倾听
E. 同情
[答案] D
[解析]
正确答案为D。人本主义治疗中最重要的技术是倾听，通过积极倾听理解来访者的内心世界。A表达、B分析、C指导均不是人本主义的核心技术；E同情不同于共情。本题考察人本主义治疗的核心技术。

[题目] 17. 心理治疗专业人员应当( )。
A. 相信心理治疗无所不能
B. 同情病人,关心病人,帮助病人解决实际问题
C. 不用具有敏锐的感知能⼒,只要对病人好,他们就能够得到治疗
D. 了解自⼰
E. 就算知道自⼰的能⼒有限,也要知难而上
[答案] D
[解析]
正确答案为D。心理治疗专业人员应当了解自己，具备自我觉察能力，才能避免反移情等问题的干扰。A相信无所不能是自恋表现；B解决实际问题超出治疗范畴；C过于简单化；E忽视能力边界也不对。本题考察心理治疗专业人员的素质。

[题目] 18. 下列哪一种精神障碍不宜进行心理治疗(  )
A. 焦虑障碍
B. 精神分裂症
C. 睡眠障碍
D. 学习障碍
E. 抑郁障碍
[答案] B
[解析]
正确答案为B。精神分裂症急性期不宜进行心理治疗，应以药物治疗为主。A焦虑障碍、C睡眠障碍、D学习障碍、E抑郁障碍均适合心理治疗。本题考察心理治疗的适应证。

[题目] 19. 在吮指癖小⼉的手指上涂苦味油膏的治疗属(  )。
A. 厌恶疗法
B. 厌恶想象治疗
C. 生物反馈治疗
D. 系统脱敏治疗
E. 满灌法治疗
[答案] A
[解析]
正确答案为A。在吮指癖小儿手指上涂苦味油膏，使吮指行为与苦味（厌恶刺激）结合，属于厌恶疗法。B厌恶想象治疗是想象厌恶情景；C生物反馈通过仪器反馈；D系统脱敏用于焦虑；E满灌法用于恐惧。本题考察厌恶疗法。

[题目] 20. 重视早期经验对人的影响的心理学家是(  )。
A. 弗洛伊德
B. 罗杰斯
C. 班杜拉
D. 斯金纳
E. 马斯洛
[答案] A
[解析]
正确答案为A。弗洛伊德特别重视早期经验（童年经历）对人格发展的影响。B罗杰斯关注自我实现；C班杜拉强调观察学习；D斯金纳关注操作性条件反射；E马斯洛关注需要层次。本题考察各学派对早期经验的重视程度。

[题目] 21. 女性,55岁。国家公务员,30年来因丈夫(高级工程师)有外遇,夫妻感情不佳总想离婚,但又总舍不得孩子,又怕丢面子来到心理咨询门诊,想问心理咨询师,离婚好还是不离婚好,此时心理咨询师最应注意的原则是(  )。
A. 回避原则
B. 灵活原则
C. 耐心原则
D. 综合原则
E. 中立原则
[答案] E
[解析]
正确答案为E。来访者询问离婚与否时，咨询师应保持中立原则，不替来访者做决定。A回避原则是针对双重关系；B灵活原则、C耐心原则、D综合原则均不适用。本题考察中立原则。

[题目] 22. 心理咨询与心理治疗的区别不包括(  )。
A. 工作的任务不同
B. 对象和情境不同
C. 性质和过程不同
D. 身份与工作方式不同
E. 解决问题的性质和内容不同
[答案] C
[解析]
正确答案为C。心理咨询与心理治疗的区别包括工作任务、对象和情境、身份与工作方式、解决问题的性质和内容不同，但性质与过程是相似的（都是专业助人过程），因此不包括C。本题考察心理咨询与心理治疗的区别。

[题目] 23. 有位病人在与别人发生口角后突然出现严重的胸闷.呼吸困难。他被送到医院急诊室,医生经检查没有发现任何器质性病变。最后决定给病人静脉推了一针生理盐水,并向病人说明此药对病人缓解症状有帮助。病人没注意用的是何种药,在接受治疗的同时也很自然地接受了医生的解释。结果症状果然很快消失了。医生给病人治疗的技术措施是(     )
A. 对症治疗
B. 暗示治疗
C. 鼓励治疗
D. 疏泄治疗
E. 引导治疗
[答案] B
[解析]
正确答案为B。医生给患者注射生理盐水并说明有治疗作用，患者症状消失，这是典型的暗示治疗。A对症治疗是针对病因；C鼓励治疗是支持性治疗；D疏泄治疗是宣泄情绪；E引导治疗是指导性治疗。本题考察暗示治疗的原理。

[题目] 24. 王某,女,19岁。最近因高考失利而出现情绪低落和失眠的情况。王某的母亲知道王某有位表哥是心理治疗师,比较熟悉和了解王某的情况,要求其给王某做心理治疗,但被这位表哥拒绝了。其表哥拒绝提供治疗服务所依据的原则为( )
A. 保密原则
B. 回避原则
C. 发展原则
D. 灵活原则
E. 中立原则
[答案] B
[解析]
正确答案为B。回避原则要求治疗师避免与来访者有双重关系，表哥与表妹是亲属关系，不适合担任治疗师。A保密原则涉及隐私保护；C发展原则、D灵活原则、E中立原则均不适用。本题考察回避原则。

[题目] 25. 在精神分析技术中,让病人舒适的躺着或坐好,把进入头脑中的一切都讲出来,不论其如何微不足道.荒诞不经,都要如实地报告出来。这是(    )
A. 移情
B. 自由联想
C. 释梦
D. 阻抗
E. 宣泄
[答案] B
[解析]
正确答案为B。自由联想是精神分析的核心技术，要求患者将脑中浮现的一切想法毫无保留地说出来。A移情是患者对治疗师的情感；C释梦是对梦的分析；D阻抗是阻碍治疗的行为；E宣泄是情绪释放。本题考察自由联想的概念。

[题目] 26. 关于心理治疗,以下不正确的是(  )。
A. 运用的是心理学的理论
B. 主要采用语言交流的方式进行
C. 心理治疗可以治疗好所有心理障碍
D. 保密是心理治疗的道德原则
E. 良好的医患关系是心理治疗取得效果的根本保证
[答案] C
[解析]
正确答案为C。心理治疗不能治疗所有心理障碍，如严重精神分裂症急性期需药物治疗。A、B、D、E均为心理治疗的正确描述。本题考察心理治疗的局限性。

[题目] 27. 患者能从治疗性医患关系中感受到重视.真诚.理解.协调.信赖,患者在直接经验.平等合作.促进成长的治疗方式中实现态度和行为的转变。这种心理治疗方法属于(  )。
A. 精神分析疗法
B. 自由联想法
C. 放松训练法
D. 合理情绪法
E. 患者中心疗法
[答案] E
[解析]
正确答案为E。患者中心疗法（罗杰斯）强调治疗关系中的真诚、接纳、共情，让患者在平等合作中自我成长。A精神分析注重潜意识冲突；B自由联想是精神分析技术；C放松训练是行为技术；D合理情绪法是认知疗法。本题考察患者中心疗法的特征。

[题目] 28. 女,28岁。在心理咨询中谈到所交的两个男朋友她都很喜欢,不知道该与哪一个继续相处,难以作出选择,希望得到帮助。而根据心理治疗的原则,心理咨询师没有替她作出决定。该咨询师遵循的原则是(  )。
A. 灵活原则
B. 综合原则
C. 中立原则
D. 耐心原则
E. 回避原则
[答案] C
[解析]
正确答案为C。来访者面临两个男友的选择困难，咨询师不替她做决定，是遵守中立原则。A灵活原则、B综合原则、D耐心原则、E回避原则均不准确。本题考察中立原则。

[题目] 29. 某肥胖患者为了控制血糖,在医师建议下准备和营养师一起制订一份饮食计划,她虽然知道饮食控制的好处,但总认为无法管住自己,计划难以实施。对于这样的患者,干预的重点是()。
A. 提高自我效能
B. 培养行为能力
C. 提高结果预期
D. 提供社会支持
E. 建立支持性环境
[答案] A
[解析]
正确答案为A。患者知道饮食控制的好处但认为自己无法管住自己，缺乏自我效能，干预重点是提高自我效能。B培养能力、C提高结果预期、D提供社会支持、E建立支持性环境均不是最核心的问题。本题考察自我效能理论。

[题目] 30. 男,46岁,投资顾问,因社交焦虑接受心理治疗,在心理治疗师的帮助下焦虑明显改善。患者心存感激,欲将掌握的投资信息告知心理治疗师以作报答,但被婉言谢绝,在此治疗关系中,该心理治疗师遵循的原则是(  )。
A. 保密性
B. 正式性
C. 单向性
D. 时限性
E. 系统性
[答案] C
[解析]
正确答案为C。单向性原则指治疗关系是单向的，治疗师不应从患者处获取私利。患者想用投资信息报答，治疗师婉拒，体现了单向性。A保密性涉及隐私；B正式性指关系正式；D时限性指治疗有时间限制；E系统性指治疗有系统性。本题考察治疗关系的单向性原则。

[题目] 31. 男孩,8岁,孤独症患者。心理治疗师在对其进行治疗的过程中,每当了解到他有主动向老师问好.递给小朋友玩具或整理好自己的衣服等情形时,就奖励他一个纸质小星星作为强化物。该心理治疗师采用的行为治疗技术是(  )。
A. 自我管理
B. 代币疗法
C. 系统脱敏
D. 满灌疗法
E. 差别强化
[答案] B
[解析]
正确答案为B。代币疗法是通过奖励代币（小星星）来强化目标行为，代币可兑换实物。A自我管理是自我监控；C系统脱敏用于焦虑；D满灌疗法是直接暴露；E差别强化是强化某一行为抑制其他行为。本题考察代币疗法。

[题目] 32. 人类和所有生物与生俱来就有一种不断发展增长和延续其机体的趋势,这是哪个学派的观点(  )。
A. 精神分析学派
B. 行为主义学派
C. 人本主义学派
D. 心理生理学理论
E. 完形学派
[答案] C
[解析]
正确答案为C。人本主义学派认为人具有自我实现和自我发展的内在潜能。A精神分析强调本能驱力；B行为主义强调环境塑造；D心理生理学关注生理机制；E完形学派强调整体知觉。本题考察人本主义的人性观。

[题目] 33. 男,40岁,某公司总经理,在公司某次业务培训会的开幕式上致辞后出现口误,宣布“会议闭幕”。此次口误背后折射出该总经理的心理活动为( )。
A. 潜意识
B. 前意识
C. 超我
D. 意识
E. 本我
[答案] A
[解析]
正确答案为A。口误是潜意识内容的流露，该总经理潜意识中希望会议早些结束，故将"开幕"说成"闭幕"。B前意识是能回忆的内容；C超我是道德原则；D意识是当前感知到的；E本我是原始欲望。本题考察潜意识在口误中的表现。

[题目] 34. 提出治疗过程要信任和依靠来访者自身的潜力,而不是依靠治疗师的指导性工作,持这种观点的是(   )。
A. 精神分析
B. 行为主义
C. 人本主义
D. 认识心理
E. 折中主义
[答案] C
[解析]
正确答案为C。人本主义强调信任和依靠来访者自身的潜力，治疗师不进行指导性工作。A精神分析强调分析解释；B行为主义强调指导矫正；D认知心理学强调改变认知；E折中主义是整合多种方法。本题考察人本主义的治疗观。

[题目] 35. “人本主义”的主要代表人物除马斯洛外,还有(  )。
A. 弗洛伊德
B. 巴甫洛夫
C. 卡特尔
D. 艾森克
E. 罗杰斯
[答案] E
[解析]
正确答案为E。人本主义主要代表人物是马斯洛和罗杰斯。A弗洛伊德是精神分析创始人；B巴甫洛夫是经典条件反射创始人；C卡特尔是特质理论家；D艾森克是人格理论家。本题考察人本主义代表人物。

[题目] 36. 在下列方法中,下列哪项为精神分析治疗常用?(  )
A. 系统脱敏
B. 厌恶治疗
C. 患者中心
D. 催眠治疗
E. 自由联想
[答案] E
[解析]
正确答案为E。自由联想是精神分析疗法的常用技术。A系统脱敏、B厌恶治疗是行为治疗；C患者中心是人本主义；D催眠治疗虽与精神分析有渊源但不是最常用技术。本题考察精神分析的治疗技术。

[题目] 37. 某心理咨询师在某超市遇见一位他的患者正与其熟人在一起购物,这位治疗师故意未理睬他的患者。他所遵循的心理治疗原则是( )。
A. 真诚原则
B. 保密原则
C. 中立原则
D. 回避原则
E. 灵活原则
[答案] B
[解析]
正确答案为B。在超市遇到患者有熟人在场时故意不理睬，是为了保护患者隐私，遵守保密原则。A真诚原则要求真诚一致；C中立原则要求保持中立；D回避原则是避免双重关系；E灵活原则是灵活变通。本题考察保密原则。

[题目] 38. 某病人怕狗,一见到狗,狗的图片,乃至狗⽑都会吓得发抖,因此他一直回避这些场景,不敢到可能有狗出现的场所,不敢去阅读可能会出现狗图片的报纸.杂志等。心理医生详尽地了解了病人焦虑的场合和回避的程度,制定了一张恐怖等级表,并让患者逐步接受这些曾经令他恐怖的场景。这种治疗方法称为()。
A. 快速暴露法
B. 自控技术
C. 行为塑造法
D. 系统脱敏法
E. 厌恶疗法
[答案] D
[解析]
正确答案为D。系统脱敏法包括了解焦虑等级、训练放松、按等级逐步暴露并配合放松。题干描述了制定恐怖等级表并逐步接受的过程。A快速暴露法是冲击疗法；B自控技术是自我管理；C行为塑造是通过强化塑造行为；E厌恶疗法结合厌恶刺激。本题考察系统脱敏法的步骤。

[题目] 39. 关于来访者中心疗法,下列表述正确的是(       )
A. 注重挖掘来访者潜意识的内容
B. 注重来访者对治疗师的毫无保留的倾诉
C. 治疗者在来访者心中必须有权威性和指导性
D. 为来访者提供一种真诚.尊重和接纳的气氛
E. 以上都不对
[答案] D
[解析]
正确答案为D。来访者中心疗法（患者中心疗法）的核心是为来访者提供真诚、尊重和接纳的气氛。A挖掘潜意识是精神分析；B无保留倾诉是自由联想；C权威性和指导性不符合人本主义理念。本题考察来访者中心疗法的特点。

[题目] 40. 一位学习成绩一直保持班中领先的中学生,在某一次考试中因不及格而出现挫折感。他感到十分沮丧,不能接受这次失败。他认为,我是学校的优秀生,理应每次考试名列前茅,绝对不可出现不及格这样丢脸的事。此后,便一蹶不振,学习状态开始滑坡。这个学生的想法上有功能失调。这种想法称为(       )
A. 绝对性思考
B. 以偏概全
C. 过度引申
D. 主观臆断
E. 消极注视
[答案] A
[解析]
正确答案为A。绝对性思考（绝对化要求）以绝对化的方式看待事物，如"理应""绝对不可"。B以偏概全是一事件概括整体；C过度引申是将事件引申到其他方面；D主观臆断是无根据的结论；E消极注视是只关注负面。本题考察认知歪曲类型。

[题目] 41. 下列哪项不是人本主义疗法的特点(  )。
A. 把心理治疗看成一个转变过程
B. 放松训练
C. 以询者为中心
D. 非指令性治疗的技巧
E. 言语操作性条件试验
[答案] B
[解析]
正确答案为B。放松训练属于行为治疗技术，不是人本主义疗法的特点。人本主义特点包括：将治疗看成一个转变过程（A）、以询者为中心（C）、非指令性治疗（D）。本题考察人本主义疗法的特点。

[题目] 42. 女大学生,20岁。自述不能见马路上的汽车,因为当汽车经过时总感觉汽车就是向自己开来,很可能撞上自己,因此十分恐惧来心理门诊就诊。心理医生对该患者采用的最好的行为治疗方法为(  )。
A. 冲击疗法
B. 厌恶治疗
C. 生物反馈
D. 前提操纵
E. 系统脱敏
[答案] E
[解析]
正确答案为E。患者对汽车恐惧，最好采用系统脱敏法，通过等级表并配合放松训练逐步消除恐惧。A冲击疗法有效但患者可能难以承受；B厌恶治疗用于不良行为；C生物反馈用于心身疾病；D前提操纵是改变环境前提。本题考察恐怖症的治疗选择。

[题目] 43. 心理咨询的对象⼤多数是(  )。
A. 躯体疾病患者
B. 精神病人
C. 心理异常的病人
D. 人格障碍者
E. 心理困难的正常人
[答案] E
[解析]
正确答案为E。心理咨询的对象主要是心理困难的正常人（一般心理问题人群）。A躯体疾病患者属医学治疗；B精神病人属精神科治疗；C心理异常和D人格障碍者也属心理治疗但非大多数。本题考察心理咨询的对象。

[题目] 44. 不适于心理治疗的是(  )。
A. 神经症
B. 行为障碍
C. 心身疾病
D. 重症精神障碍的急性期
E. 某些慢性病患者的恢复期
[答案] D
[解析]
正确答案为D。重症精神障碍急性期不宜心理治疗，应以药物治疗为主。A神经症、B行为障碍、C心身疾病、E慢性病恢复期均适合心理治疗。本题考察心理治疗的禁忌证。

[题目] 45. 由治疗师帮助创造一种充满关怀与信任的⽓氛,使患者原已被扭曲了的自我得到自然的恢复,使自我完善的潜能得到发挥,从而使他们能更好地适应生活。这种治疗属于()。
A. 患者中心疗法
B. 精神分析疗法
C. 行为治疗
D. 认知治疗
E. 暗示治疗
[答案] A
[解析]
正确答案为A。患者中心疗法（罗杰斯）强调创造关怀与信任的气氛，使患者扭曲的自我得到恢复。B精神分析注重潜意识冲突；C行为治疗注重行为矫正；D认知治疗注重认知改变；E暗示治疗注重暗示。本题考察患者中心疗法的核心理念。

[题目] 46. 某治疗师邀请患者及其家人一起在治疗室⾥就患者的心理障碍问题进行讨论。这种治疗形式属于(   )。
A. 个别心理治疗
B. 社会心理治疗
C. 集体心理治疗
D. 家庭心理治疗
E. ⽀持性治疗
[答案] D
[解析]
正确答案为D。治疗师邀请患者及家人一起参与治疗，属于家庭心理治疗。A个别心理治疗是一对一；B社会心理治疗概念较广；C集体治疗是多名患者同时治疗；E支持性治疗是一种取向非形式。本题考察心理治疗的形式。

[题目] 47. 心理治疗中,医生要设身处地的理解患者,把患者的内心世界理解为好像是自己的,能分享患者的情感。这是()
A. 理解
B. 同情
C. 移情
D. 反移情
E. 共情
[答案] E
[解析]
正确答案为E。共情是治疗师设身处地理解患者，感受患者内心世界但不失去自我。A理解较笼统；B同情是怜悯；C移情是患者对治疗师的情感；D反移情是治疗师对患者的情感。本题考察共情概念。

[题目] 48. 一位来访者单位的同事,要求了解当事人心理治疗的情况,心理治疗师婉言谢绝,这是因为( )。
A. 出于对来访者的尊重
B. 保持客观中立的立场
C. 不认识来访者的同事
D. 心理治疗的关系限定原则
E. 心理治疗的保密原则
[答案] E
[解析]
正确答案为E。治疗师拒绝透露患者情况给其同事，是遵守保密原则。A尊重来访者虽是原因但具体原则是保密；B中立原则是价值观中立；C不认识不是专业理由；D关系限定原则指治疗关系范围。本题考察保密原则。

[题目] 49. 女,22岁。在与恋人的一次激烈争吵之后,倍感气愤.烦闷,次晨出现双下肢瘫痪无法起立行走的症状,经查无神经系统器质性病变的临床依据。如欲对该患者实施尝试性心理治疗,首选的方法为(  )。
A. 暗示疗法
B. 认知疗法
C. 自由联想
D. 支持疗法
E. 放松训练
[答案] A
[解析]
正确答案为A。患者争吵后出现双下肢瘫痪，无器质性病变，考虑转换性障碍（癔症性瘫痪），首选暗示疗法。B认知疗法用于认知歪曲；C自由联想用于精神分析；D支持疗法提供情感支持；E放松训练用于焦虑。本题考察转换性障碍的治疗。

[题目] 50. 关于移情的说法,下列不正确的是(   )。
A. 移情包括正移情与负移情
B. 移情分析是精神分析的重要方法
C. 移情是患者与生活中重要人物关系在咨询室中的再现
D. 移情是心理治疗深⼊的重要标志
E. 移情是需要尽可能避免的
[答案] E
[解析]
正确答案为E。移情是心理治疗中的正常现象，是治疗深入的重要标志，不应避免而要分析和利用。A移情包括正负移情；B移情分析是精神分析重要方法；C移情是重要关系的再现；D移情是治疗深入的标志。本题考察移情的概念。

[题目] 51. 下列哪项是脱敏治疗的最佳适应证(  )
A. 精神分裂症
B. 恐怖症
C. 躁狂症
D. 神经衰弱
E. 强迫症
[答案] B
[解析]
正确答案为B。脱敏治疗（系统脱敏）的最佳适应证是恐怖症（恐惧症）。A精神分裂症急性期不适合；C躁狂症以药物为主；D神经衰弱和E强迫症可配合脱敏但不是最佳适应证。本题考察系统脱敏的适应证。

[题目] 52. 不代表精神分析的观点有( )。
A. 潜意识理论
B. 自我实现理论
C. 心理防御理论
D. 性心理发展阶段论
E. 性驱⼒理论
[答案] B
[解析]
正确答案为B。自我实现理论是人本主义（马斯洛）的观点，不属于精神分析。A潜意识理论、C心理防御理论、D性心理发展阶段论、E性驱力理论均为精神分析核心观点。本题考察精神分析理论的核心内容。

[题目] 53. 行为学派认为人后天的行为源于(   )。
A. 本能
B. 学习
C. 社会
D. 情绪
E. 人格
[答案] B
[解析]
正确答案为B。行为学派认为人的行为是通过学习获得的。A本能是精神分析的观点；C社会、D情绪、E人格均不是核心概念。本题考察行为主义关于行为起源的观点。

[题目] 54. 下列哪项是脱敏治疗的最佳适应证( )
A. 精神分裂症
B. 恐怖症
C. 躁狂症
D. 神经衰弱
E. 强迫症
[答案] B
[解析]
正确答案为B。脱敏治疗的最佳适应证是恐怖症。与第51题相同，本题重复考察系统脱敏的适应证。

[题目] 55. 女,35岁。丈夫因车祸去世,令其痛不欲生,遂到心理咨询门诊寻求帮助。该女性在诉说其目前的心境时痛哭流涕。对此,心理咨询师在初始阶段一般不应采取的措施是( )。
A. 对质其懦弱
B. 帮助其领悟
C. 增强其自控
D. 指导其放松
E. 接受其宣泄
[答案] A
[解析]
正确答案为A。患者丧夫痛哭的初始阶段，不应采取对质其懦弱的措施，这会破坏治疗关系。B帮助领悟、C增强自控、D指导放松、E接受宣泄均为可取措施。本题考察心理咨询初始阶段的处理原则。

[题目] 56. 心理治疗的最终目标是(  )。
A. 改善患者的人格体系
B. 改善患者的症状
C. 改善患者的情绪
D. 提高患者的觉悟
E. 改善患者的外貌
[答案] A
[解析]
正确答案为A。心理治疗的最终目标是改善患者的人格体系，促进心理成长。B改善症状和C改善情绪是近期目标；D提高觉悟是思想教育目标；E改善外貌不是目标。本题考察心理治疗的目标层次。

[题目] 57. 心理咨询可以解决的问题是(   )。
A. 人生选择问题
B. 政治思想问题
C. 情绪问题
D. 工作环境问题
E. 社会环境问题
[答案] C
[解析]
正确答案为C。心理咨询主要解决情绪问题和心理困扰。A人生选择不能替代决策；B政治思想属思想教育；D工作环境和E社会环境属社会工作。本题考察心理咨询的适用范围。

[题目] 58. 按一定的练习程序,学习有意识地控制或调节自身的心理.生理活动,以降低机体唤醒水平,调整因紧张刺激而紊乱的功能,这种疗法属于(  )。
A. 厌恶疗法
B. 系统脱敏法
C. 条件操作法
D. 模仿疗法
E. 放松训练法
[答案] E
[解析]
正确答案为E。放松训练法是通过系统练习有意识地控制心理生理活动，降低唤醒水平。A厌恶疗法结合厌恶刺激；B系统脱敏包含放松但不限于此；C条件操作法通过强化惩罚；D模仿疗法通过观察学习。本题考察放松训练法。

[题目] 59. 弗洛伊德认为人格包含(  )。
A. 意识、前意识、潜意识
B. 本我、自我、超我
C. 知、情、意
D. 性格、脾气、能力
E. 兴趣、需要、动机
[答案] B
[解析]
正确答案为B。弗洛伊德认为人格由本我（快乐原则）、自我（现实原则）、超我（道德原则）组成。A意识前意识潜意识是精神划分结构；C知情意是心理过程；D是人格特质描述；E是动力系统。本题考察弗洛伊德人格结构。

[题目] 60. 男,45岁。因焦虑症接受心理治疗,在治疗过程中患者多次约治疗师看电影,并多次打电话叮嘱治疗师“可能下雨要带雨伞”或者“气温下降要添加衣”等。患者的这种表现是 (   )
A. 象征
B. 移情
C. 认同
D. 阻抗
E. 投射
[答案] B
[解析]
正确答案为B。患者多次约治疗师看电影并关心其生活细节，是将对重要人物的情感转移到治疗师身上，属于移情。A象征是潜意识表达方式；C认同是向他人看齐；D阻抗是阻碍治疗；E投射是将自身情感投射他人。本题考察移情的表现。

[题目] 61. 来访者询问:“我该与谁结婚?”,治疗师不予明确答复,这属于心理治疗原则中的(    )
A. 回避原则
B. 灵活原则
C. 耐心原则
D. 综合原则
E. 中立原则
[答案] E
[解析]
正确答案为E。来访者询问应与谁结婚，治疗师不予明确答复，遵守中立原则。A回避原则是针对双重关系；B灵活原则、C耐心原则、D综合原则均不适用。本题考察中立原则。

[题目] 62. 患者,男性,23岁,大学生。自述不能看见马路上的汽车,当汽车经过时总感觉汽车很可能撞上自己,因此⼗分恐惧,来心理门诊就诊,最好采用的治疗方法是( )。
A. 系统脱敏
B. 厌恶治疗
C. 生物反馈
D. 自由联想
E. 梦的分析
[答案] A
[解析]
正确答案为A。患者对汽车恐惧，最好采用系统脱敏法治疗。B厌恶治疗用于不良行为；C生物反馈用于心身疾病；D自由联想和E梦的分析是精神分析技术。本题考察恐怖症的治疗方法。

[题目] 63. 以患者为中心疗法中,下列哪项叙述不恰当?( )
A. 医生在治疗中具有权威作用
B. 注意调动病人心理上的积极因素
C. 适用于感到有压⼒的病人
D. 医生是患者的朋友,必要时加以引导
E. 病人要受到充分理解
[答案] A
[解析]
正确答案为A。患者中心疗法强调非指导性，治疗师不具有权威作用。B、C、D、E均为正确描述。本题考察患者中心疗法的治疗关系。

[题目] 64. 心理治疗的目标是促进求助者的成长和自⽴,不能代替病人做出任何选择与决定,这是心理治疗的什么原则( )。
A. 耐心原则
B. 真诚原则
C. 保密原则
D. 中⽴原则
E. 回避原则
[答案] D
[解析]
正确答案为D。中立原则要求治疗师不代替患者做决定，促进求助者成长和自立。A耐心原则、B真诚原则、C保密原则、E回避原则均不准确。本题考察中立原则的内涵。

[题目] 65. 给恋物癖者电击的方法属于( )。
A. 家庭脱敏
B. 冲击疗法
C. 厌恶疗法
D. 松弛疗法
E. 自由联想
[答案] C
[解析]
正确答案为C。给恋物癖者电击，将不良行为与厌恶刺激结合，属于厌恶疗法。A家庭脱敏是在家庭脱敏；B冲击疗法是直接暴露；D松弛疗法是放松；E自由联想是精神分析。本题考察厌恶疗法。

[题目] 66. 男,22岁,因为怕脏和反复洗手等被诊断为强迫症。心理治疗师要求患者触摸地面.门把手等,之后不允许其洗手并要求其必须接着做事。经治疗,该患者的强迫症状逐渐减轻。这种治疗方法属于(  )。
A. 系统脱敏疗法
B. 行为塑造法
C. 厌恶疗法
D. 冲击疗法
E. 逐级暴露疗法
[答案] D
[解析]
正确答案为D。与第8题相同，冲击疗法让患者接触恐惧刺激并阻止洗手，不允许逃避。A系统脱敏需逐步暴露和放松；B行为塑造通过强化；C厌恶疗法结合厌恶刺激；E逐级暴露是系统脱敏部分。本题考察冲击疗法。

[题目] 67. 某患者单独进⼊百货商场购物时,就会感到胸闷.出冷汗,一直回避这些场所。心理治疗师详尽了解了患者焦虑的场合和回避的程度,训练患者学习放松技术,制定了等级表进行分级暴露。这种治疗方法属于(  )。
A. 快速暴露法
B. 厌恶疗法
C. 示范法
D. 系统脱敏法
E. 消退法
[答案] D
[解析]
正确答案为D。患者对商场恐惧，治疗师训练放松并制定等级表分级暴露，是系统脱敏法。A快速暴露法是冲击疗法；B厌恶疗法需厌恶刺激；C示范法通过观察学习；E消退法抑制不当行为。本题考察系统脱敏法。

[题目] 68. 为了戒除烟瘾,在每次吸烟后,应用某种引起恶心.呕吐的药物,反复⼏次就再不想吸烟了。 这种戒烟方法属于(  )。
A. 条件操作法
B. 系统脱敏法
C. 自我调整疗法
D. 厌恶疗法
E. 暴露疗法
[答案] D
[解析]
正确答案为D。吸烟后服用恶心呕吐药物，使吸烟与厌恶反应结合，是厌恶疗法。A条件操作法通过强化惩罚；B系统脱敏用于焦虑；C自我调整是自我放松；E暴露疗法是直接面对恐惧。本题考察厌恶疗法戒烟。

[题目] 69. 患者,男,33岁,因不敢与异性交往前来咨询。咨询师请患者回忆,自幼年时成长过程中与异性交往的经过及心理状态。该咨询师使用的治疗方法为(     )。
A. 认知领悟疗法
B. 行为疗法
C. 精神分析疗法
D. 来访者中心疗法
E. 格式塔疗法
[答案] C
[解析]
正确答案为C。咨询师让患者回忆童年与异性交往经历，探索童年经验，是精神分析疗法。A认知领悟疗法结合认知与领悟；B行为疗法关注行为；D来访者中心关注当下；E格式塔关注整体。本题考察精神分析疗法。

[题目] 70. 认为人格结构由本我.自我和超我三个部分组成的心理学派是(   )。
A. 人本主义学派
B. 精神分析学派
C. 行为主义学派
D. 认知心理学学派
E. 精神心理学学派
[答案] B
[解析]
正确答案为B。人格结构由本我自我超我三部分组成，由弗洛伊德提出，属精神分析学派。A人本主义强调自我实现；C行为主义强调环境；D认知心理学强调认知过程；E不是标准分类。本题考察精神分析人格结构理论。

[题目] 71. 王某,女,19岁。最近因高考失利而出现情绪低落和失眠的情况。王某的母亲知道王某有位表哥是心理治疗师,比较熟悉和了解王某的情况,要求其给王某做心理治疗,但被这位表哥拒绝了。其表哥拒绝提供治疗服务所依据的原则为(  )。
A. 保密原则
B. 回避原则
C. 发展原则
D. 灵活原则
E. 中立原则
[答案] B
[解析]
正确答案为B。与第24题相同，表哥给表妹做治疗违反回避原则。本题重复考察回避原则。

[题目] 72. 男性,19岁,无业青年,父亲是生意人,该青年5年来一直在购买收藏女性的高跟鞋而感到满足,而且晚上要抱着高跟鞋睡觉在心理咨询门诊诊断为“恋物癖”,对此类患者的治疗方法最好选择(  )。
A. 人本主义
B. 厌恶治疗
C. 自由联想
D. 系统脱敏
E. 梦的分析
[答案] B
[解析]
正确答案为B。恋物癖首选厌恶疗法，将恋物行为与厌恶刺激结合消除不良行为。A人本主义非首选；C自由联想不直接矫正行为；D系统脱敏用于焦虑；E梦的分析用于精神分析。本题考察恋物癖的治疗方法。

[题目] 73. 最适宜采用心理治疗的是( )。
A. 胃溃疡
B. 抑郁症
C. 冠心病
D. 精神分裂症
E. 精神发育迟滞
[答案] B
[解析]
正确答案为B。抑郁症最适宜采用心理治疗。A胃溃疡、C冠心病是心身疾病需医学与心理结合；D精神分裂症以药物为主；E精神发育迟滞以康复训练为主。本题考察心理治疗的适应证。

[题目] 74. 女,22岁。在与恋人的一次激烈争吵之后,倍感气愤.烦闷,次晨出现双下肢瘫痪. 无法起立行走的症状,经查无神经系统器质性病变的临床依据。如欲对该患者实施尝试性心理治疗,首选的方法为( )
A. 暗示疗法
B. 认知疗法
C. 自由联想
D. 支持疗法
E. 放松训练
[答案] A
[解析]
正确答案为A。与第49题相同，患者争吵后下肢瘫痪，考虑癔症性转换障碍，首选暗示疗法。B认知疗法用于认知歪曲；C自由联想用于精神分析；D支持疗法用于情感支持；E放松训练用于焦虑。本题考察转换性障碍的治疗。

[题目] 75. 女,20岁,主诉自初中毕业后,越来越不能与陌生人接触,近1年来发展为见到熟人也害怕与之说话,且一说话就脸红,对于该患者心理治疗首选的方法为(  )。
A. 生物反馈
B. 系统脱敏
C. 自由联想
D. 催眠治疗
E. 人本主义
[答案] B
[解析]
正确答案为B。患者社交恐惧，首选系统脱敏法，通过制定社交焦虑等级逐步消除恐惧。A生物反馈用于心身疾病；C自由联想是精神分析；D催眠治疗非首选；E人本主义注重关系但行为治疗更直接。本题考察社交恐惧症的治疗。

[题目] 76. 对病人的适应性行为进行奖励的方法是(  )。
A. 行为塑造疗法
B. 精神分析治疗
C. 认知行为治疗
D. 生物反馈治疗
E. 询者中心治疗
[答案] A
[解析]
正确答案为A。行为塑造疗法对适应性行为进行奖励（正强化），塑造和维持良好行为。B精神分析关注潜意识；C认知行为关注认知；D生物反馈通过仪器；E询者中心强调非指导性。本题考察行为塑造疗法的原理。

[题目] 77. 行为主义理论认为,心理障碍的心理学原因为(   )。
A. 不良的认知模式
B. 潜意识内的心理冲突
C. 获得性学习结果
D. 个人成长受到阻抑
E. 心理-神经-内分泌-免疫机制作用
[答案] C
[解析]
正确答案为C。行为主义认为心理障碍源于获得性学习结果（条件反射习得的不良行为）。A不良认知是认知学派观点；B潜意识冲突是精神分析观点；D成长受阻是人本主义观点；E是心身医学观点。本题考察行为主义的心理障碍观。

[题目] 78. 男,12岁,因频发时轻时重的口吃就诊,经谈话,心理治疗师认为患儿的口吃症状与其父母感情不好,总在他面前争吵并动辄以离婚相威胁有关,遂要求三人一起接受心理治疗,并采用了循环提问等技术,该心理治疗法称为(  )。
A. 家庭治疗
B. 精神分析疗法
C. 人本主义疗法
D. 行为疗法
E. 认知疗法
[答案] A
[解析]
正确答案为A。治疗师认为口吃与家庭环境有关，一家三口共同治疗并采用循环提问，是家庭治疗。B精神分析注重个体潜意识；C人本主义注重自我成长；D行为疗法注重行为矫正；E认知疗法注重认知。本题考察家庭治疗。

[题目] 79. “心理障碍⼤多为幼年压抑的潜意识冲突而引起” 。持这种观点的学派是(  )。
A. 心理生理学派
B. 人本主义学派
C. 认知行为学派
D. 行为主义学派
E. 精神分析学派
[答案] E
[解析]
正确答案为E。认为心理障碍源于幼年压抑的潜意识冲突，是精神分析学派的核心观点。A心理生理学派关注生理机制；B人本主义关注自我实现受阻；C认知行为学派关注认知行为；D行为主义关注不良学习。本题考察精神分析的心理障碍病因观。

[题目] 80. 提出治疗过程要信任和依靠来访者自⾝的潜力,而不是依靠治疗师的指导性工作,持这种观点的是(   )。
A. 精神分析
B. 行为主义
C. 人本主义
D. 认识心理
E. 折中主义
[答案] C
[解析]
正确答案为C。与第34题相同，信任来访者自身潜力而非治疗师指导，是人本主义疗法的核心观点。本题重复考察。

[题目] 81. 下列哪项为心理治疗医生是否成熟.称职的重要条件及心理治疗成败的关键()。
A. 心理治疗实施的计划性
B. 医生的技术水平
C. 是否坚持保密原则
D. 建立良好的医患关系
E. 治疗方法的灵活性
[答案] D
[解析]
正确答案为D。良好的医患关系是心理治疗成败的关键。A计划性、B技术水平、C保密原则、E灵活性虽然重要但不如治疗关系关键。本题考察医患关系的重要性。

[题目] 82. 女,22岁。每逢路过商店时就会有被售货员怀疑偷窃的想法,无法自制,十分痛苦。遂到心理门诊寻求帮助,心理治疗师指导其每当出现该想法时就用力拉弹手腕上的橡皮筋,使其产生疼痛,从而逐步消除其强迫症状这种方法是( )。
A. 厌恶疗法
B. 系统脱敏疗法
C. 习惯转换法
D. 冲击疗法
E. 代币疗法
[答案] A
[解析]
正确答案为A。患者出现强迫想法时弹橡皮筋产生疼痛，将疼痛与强迫想法结合，是厌恶疗法。B系统脱敏用于焦虑；C习惯转换法不是标准术语；D冲击疗法是直接暴露；E代币疗法是正强化。本题考察厌恶疗法。

[题目] 83. 男性,19岁,无业青年,父亲是生意人,该青年5年来一直在购买收藏女性的高跟鞋而感到满足,而且晚上要抱着高跟鞋睡觉,在心理咨询门诊诊断为恋物癖,对此类患者的治疗最好选择(  )。
A. 人本主义
B. 厌恶治疗
C. 自由联想
D. 系统脱敏
E. 梦的分析
[答案] B
[解析]
正确答案为B。与第72题相同，恋物癖治疗首选厌恶疗法。本题重复考察。

[题目] 84. 提出“行为主义”心理学观点的主要代表人物为(  )。
A. 华生
B. 马斯洛
C. 罗杰斯
D. 弗洛伊德
E. 卡特尔
[答案] A
[解析]
正确答案为A。华生是行为主义心理学创始人。B马斯洛和C罗杰斯是人本主义；D弗洛伊德是精神分析创始人；E卡特尔是特质理论家。本题考察行为主义代表人物。

[题目] 85. 下列关于精神分析解释技术的说法不正确的是(  )。
A. 要在病人有接受解释的准备再进行解释
B. 要根据病人以前的评论和描述进行
C. 解释是揭示思想和行为的潜意识含义的一种方法
D. 解释是治疗师对患者的理解,与病人的领悟无关
E. 要少量解释
[答案] D
[解析]
正确答案为D。精神分析的解释技术需要患者的领悟才能真正发挥作用，因此与病人领悟无关是错误的。A、B、C、E均为解释技术的正确描述。本题考察精神分析解释技术的要点。

[题目] 86. 男。43岁。吸烟10年,每天一包,不想戒烟。他说:“我从不生病,即使吸烟也不会得肺癌。”针对该患者的想法,应首先向他指出的是(  )。
A. 吸烟有关疾病的易感性
B. 行为改变的有效性
C. 行为改变的障碍
D. 吸烟相关疾病的严重性
E. 自我效能的重要性
[答案] A
[解析]
正确答案为A。患者否认自己对疾病的易感性，应首先指出吸烟有关疾病的易感性。B行为改变有效性、C障碍、D疾病严重性、E自我效能均非首要。本题考察健康信念模式。

[题目] 87. 为保证材料真实,也为了维护心理治疗本身的声誉及权威性,心理治疗必须坚持( )。
A. 耐心原则
B. 真诚原则
C. 保密原则
D. 中⽴原则
E. 回避原则
[答案] C
[解析]
正确答案为C。为保证材料真实，维护心理治疗声誉和权威性，必须坚持保密原则。A耐心原则、B真诚原则、D中立原则、E回避原则均不适用。本题考察保密原则的意义。

[题目] 88. 患者,男,33岁,因不敢与异性交往前来咨询。咨询师请患者回忆,自幼年时成长过程中与异性交往的经过及心理状态。该咨询师使用的治疗方法为(  )。
A. 认知领悟疗法
B. 行为疗法
C. 精神分析疗法
D. 来访者中心疗法
E. 格式塔疗法
[答案] C
[解析]
正确答案为C。与第69题相同，让患者回忆童年与异性交往经历，是精神分析疗法。本题重复考察。

[题目] 89. “人本主义”的主要代表人物除马斯洛外,还有(   )。
A. 弗洛伊德
B. 巴甫洛夫
C. 卡特尔
D. 艾森克
E. 罗杰斯
[答案] E
[解析]
正确答案为E。与第35题相同，人本主义代表人物除马斯洛外还有罗杰斯。本题重复考察。

[题目] 90. 男,12岁。因频发时轻时重的口吃就诊,经晤谈,心理治疗师认为患儿的口吃症状与其父母感情不好,总在他面前争吵并动辄以离婚相威胁有关,遂要求三人一起接受心理治疗,并采用了循环提问等技术,该心理治疗法称为()
A. 家庭治疗
B. 精神分析疗法
C. 人本主义疗法
D. 行为疗法
E. 认知疗法
[答案] A
[解析]
正确答案为A。与第78题相同，一家三口共同治疗采用循环提问，是家庭治疗。本题重复考察。

[题目] 91. 向一孤僻.忧郁.被动的病人讲明,每当能主动接触人.与人亲切交谈时,就给他⼏枚代币,他可用代币换取他所喜爱的物品。经过一段时间,病人原有症状逐渐消失。这种疗法属于( )
A. 条件操作法
B. 模仿疗法
C. 系统脱敏疗法
D. 自我调整疗法
E. 厌恶疗法
[答案] A
[解析]
正确答案为A。条件操作法通过给予代币强化目标行为（主动接触交谈），代币可兑换物品。B模仿疗法通过观察学习；C系统脱敏用于焦虑；D自我调整是自我放松；E厌恶疗法结合厌恶刺激。本题考察操作性条件反射。

[题目] 92. “心理障碍⼤多为幼年压抑的潜意识冲突而引起”。持这种观点的学派是(   )。
A. 心理生理学派
B. 人本主义学派
C. 认知行为学派
D. 行为主义学派
E. 精神分析学派
[答案] E
[解析]
正确答案为E。与第79题相同，心理障碍源于幼年压抑的潜意识冲突是精神分析观点。本题重复考察。

[题目] 93. 某学生参加⾼考前数⽉产生了严重的焦虑。来到咨询室后,讲述了其内心的恐惧与担心,治疗师只是认真地倾听,不做指令性指导。这种心理疗法的理论属于(  )
A. 精神分析理论
B. 认知理论
C. 人本主义理
D. 心理生理理
E. 行为理论
[答案] C
[解析]
正确答案为C。治疗师认真倾听不做指令性指导，是人本主义疗法的特点，相信来访者有自我成长能力。A精神分析注重分析；B认知理论注重改变认知；D心理生理学关注生理机制；E行为理论注重行为矫正。本题考察人本主义疗法的治疗态度。

[题目] 94. 行为主义治疗常用的技术包括(  )。
A. 解释
B. 共情
C. 移情
D. 系统脱敏
E. 无条件积极关注
[答案] D
[解析]
正确答案为D。系统脱敏是行为主义治疗的常用技术。A解释、B共情、C移情是精神分析和人本主义概念；E无条件积极关注是人本主义概念。本题考察行为主义治疗的常用技术。

[题目] 95. 患者,女,55岁,10年来主要因丈夫有外遇,夫妻感情不佳,总想离婚,但又舍不得孩子,怕丢面子。来到心理咨询门诊,想问心理咨询师离婚好还是不离婚好。此时,心理咨询师最应遵守的原则是(  )。
A. 回避原则
B. 中立原则
C. 耐心原则
D. 综合原则
E. 灵活原则
[答案] B
[解析]
正确答案为B。与第21题类似，患者询问离婚与否，咨询师应遵守中立原则。A回避原则是针对双重关系；C耐心原则、D综合原则、E灵活原则均不适用。本题考察中立原则。

[章节] 心理应激

[单选题]

[题目] 1. 关于应对的说法不正确的是(  )。
A. 应对是一种心理现象
B. 应对是一种心理行为策略
C. 应对是人面对应激源时的一种反应
D. 应对都能消除自己的紧张
E. 应对过程是通过努力克服困难的过程
[答案] D
[解析]
正确答案为D。应对是指个体面对应激源时，通过努力克服困难、消除或缓解紧张状态的心理行为过程。A应对确实是一种心理现象；B应对包括各种心理行为策略；C应对是面对应激源时的反应；E应对过程是通过努力克服困难的过程，均正确。D错误，因为应对不一定能完全消除紧张，有时只能缓解。本题考察应对的基本概念与特征。

[题目] 2. 下列哪项为心理应激概念的核心(  )。
A. 适应和应对“过程”
B. 生理反应
C. 心理反应
D. 生理刺激物
E. 心理刺激物
[答案] A
[解析]
正确答案为A。心理应激概念的核心是适应和应对“过程”，强调个体与环境相互作用的过程。B生理反应、C心理反应是应激的结果而非核心；D生理刺激物、E心理刺激物属于应激源范畴。本题考察心理应激的概念核心。

[题目] 3. 持久的心理应激可导致以下疾病,除了(  )。
A. 过敏
B. 溃疡病
C. 哮喘
D. 肿瘤
E. 高血压
[答案] A
[解析]
正确答案为A。持久的心理应激与多种心身疾病相关，如B溃疡病（消化性溃疡）、C哮喘、D肿瘤、E高血压，均已被证实与长期应激有关。而A过敏主要是免疫系统对特定过敏原的反应，与持久心理应激的直接因果关系证据不足。本题考察心理应激与心身疾病的关系。

[题目] 4. 有些人在面对应激事件时易采用“钻牛角尖”的方式应对,这种应对方式属于(  )。
A. 自我防御反应
B. 情绪反应
C. 行为反应
D. 生理反应
E. 认知反应
[答案] E
[解析]
正确答案为E。“钻牛角尖”是指思维方式陷入僵化、固执，属于认知层面的反应。A自我防御反应是无意识的，B情绪反应涉及焦虑、抑郁等，C行为反应涉及具体行动，D生理反应涉及躯体变化。本题考察应激反应的分类，注意认知反应的特征。

[题目] 5. 移民美国的中国人,其谦逊的美德与个人至上的环境常发生冲突,因此而适应不良,这种心理冲突属于(  )。
A. 职业性应激源
B. 文化性应激源
C. 社会性应激源
D. 心理性应激源
E. 躯体性应激源
[答案] B
[解析]
正确答案为B。文化性应激源指因文化环境改变（如价值观、习俗、语言等差异）而产生的应激。移民美国后中国文化所推崇的谦逊美德与美国个人主义文化冲突，属于典型的文化性应激源。A职业性、C社会性、D心理性、E躯体性均不准确。本题考察应激源的分类。

[题目] 6. 人们在应激源的刺激下,产生的最常见的情绪性应激反应是( )。
A. 抑郁
B. 焦虑
C. 恐惧
D. 愤怒
E. 痛苦
[答案] B
[解析]
正确答案为B。焦虑是心理应激中最常见的情绪性应激反应，表现为紧张、不安、担忧。A抑郁、C恐惧、D愤怒、E痛苦也都是情绪反应，但人群中发生率最高、最普遍的应激情绪是焦虑。本题考察应激情绪反应的特点。

[题目] 7. 女,19 岁。因急性白血病接受骨髓移植治疗,术后被安置于无菌病房中。根据病情,需限制亲属探视。在此期间患者常常出现心情烦躁.不安。针对此情况,心理治疗师指导其采用冥想结合深呼吸的方法来改善自己的情绪。这种应对方式属于 (    )
A. 取消社会支持
B. 消除应激来源
C. 调整认知评价
D. 心理防御机制
E. 自我调节放松
[答案] E
[解析]
正确答案为E。冥想结合深呼吸是典型的自我调节放松技术，通过主动调节身心状态来缓解不良情绪。A取消社会支持与题干所述限制探视不符；B消除应激来源不可能实现；C调整认知评价未涉及；D心理防御机制是无意识的。本题考察应对方式中的自我调节策略。

[题目] 8. 关于心理应激的错误说法是 (  )
A. 塞里的应激学说,忽略了个体的心理反应过程
B. 心理应激反应都是消极的
C. 心理应激反应有急性的,也有慢性的
D. 可能会危及个体的生存与地位
E. 在应激过程中,生理反应和心理反应会相互影响.相互作用.相互转化
[答案] B
[解析]
正确答案为B。心理应激反应并非都是消极的，适度的应激可动员机体潜能、促进成长（积极应激）。A塞里早期应激学说确实忽视心理过程；C应激有急性和慢性之分；D可危及个体生存与地位；E生理与心理反应相互影响，均正确。本题考察心理应激的双重性。

[题目] 9. 以下不属于心理应激的是 (  )
A. 心率和呼吸加快
B. 恐惧
C. 抑郁
D. 敌对与攻击
E. 物质滥用
[答案] A
[解析]
正确答案为A。心理应激是指个体在应激源作用下产生的心理和行为反应。B恐惧、C抑郁属于情绪反应，D敌对与攻击属于行为反应，E物质滥用属于行为反应，均属于心理应激范畴。A心率和呼吸加快是生理反应，不属于心理应激。本题考察心理应激与生理反应的区别。

[题目] 10. 关于应对的说法不正确的是(   )。
A. 应对是一种心理现象
B. 应对是一种心理行为策略
C. 应对是人面对应激源时的一种反应
D. 应对都能消除自己的紧张
E. 应对有多种表现方式
[答案] D
[解析]
正确答案为D。与第1题类似，应对不一定能消除紧张。A应对是一种心理现象；B应对是一种心理行为策略；C应对是人面对应激源时的一种反应；E应对有多种表现方式，均正确。D过于绝对，应对的效果有个体差异。本题考察应对的特点。

[题目] 11. 一位外科手术前的患者,坐卧不安,眉头紧锁,小动作多。这一现象是(  )。
A. 应激的行为反应
B. 应激的情绪反应
C. 应激的生理反应
D. 应激的防御反应
E. 应激的认知反应
[答案] B
[解析]
正确答案为B。坐卧不安、眉头紧锁、小动作多均属于情绪紧张的外在表现，是情绪性应激反应。A行为反应指向具体行动，C生理反应是躯体内部变化，D防御反应是无意识的，E认知反应涉及思维认知。题干描述的紧张情绪外显为行为表现，本质属于情绪反应。本题考察应激情绪反应的外在表现。

[题目] 12. 下列哪一项不属于急性应激反应?()
A. 易疲劳、失眠
B. 心理休克
C. 激情爆发
D. 焦虑
E. 恐惧
[答案] A
[解析]
正确答案为A。急性应激反应是在突然强烈应激下出现的短暂反应，包括B心理休克（呆滞、茫然）、C激情爆发、D焦虑、E恐惧等。A易疲劳、失眠属于慢性应激反应的表现，起病缓慢、持续时间长。本题考察急性与慢性应激反应的鉴别。

[题目] 13. 关于心理应激的错误说法是(   )。
A. 塞里的应激学说,忽略了个体的心理反应过程
B. 心理应激反应都是消极的
C. 心理应激反应有急性的,也有慢性的
D. 可能会危及个体的生存与地位
E. 在应激过程中,生理反应和心理反应会相互影响、相互作用、相互转化
[答案] B
[解析]
正确答案为B。与第8题相同，心理应激反应不全是消极的，适度应激可激发潜能、增强适应能力。A塞里学说忽视心理因素；C应激有急慢性之分；D可危及个体生存地位；E身心反应相互影响，均正确。本题考察心理应激的双重效应。

[题目] 14. 以下生活事件应激最高的是(   )。
A. 配偶死亡
B. 判刑
C. 离婚
D. 结婚
E. 患癌症
[答案] A
[解析]
正确答案为A。根据Holmes和Rahe的社会再适应评定量表（SRRS），生活事件应激值排序中配偶死亡（100分）排第一。B判刑、C离婚、D结婚、E患癌症虽均为高应激事件，但配偶死亡的LCU评分最高。本题考察生活事件定量评估。

[题目] 15. 对于作为应激源的生活事件的说法正确的是(   )。
A. 不包括工作问题
B. 没有正性的生活事件
C. 生活事件的致病性与其性质无关
D. 生活事件的数量可以决定其对健康和疾病的影响程度
E. 生活事件是不可以量化的
[答案] D
[解析]
正确答案为D。生活事件的数量可以累积影响健康，LCU累积值越高患病风险越大。A生活事件包括工作问题；B有正性生活事件（如结婚、晋升）；C生活事件的致病性与其性质密切相关；E生活事件可以量化（如SRRS量表）。故D正确。本题考察生活事件的基本概念。

[题目] 16. 以下对生活事件的理解错误的是( )。
A. 生活事件是在生活中遇到的重要事件
B. 不同的生活事件所产生的心理应激量是不同的
C. 相同的生活事件所产生的心理应激量是相同的
D. 可以有正性的生活事件
E. 可以有负性的生活事件
[答案] C
[解析]
正确答案为C。相同生活事件对不同个体产生的心理应激量不同，因认知评价、人格特征等中介因素不同而有差异。A生活事件是重要事件；B不同事件应激量不同；D有正性事件；E有负性事件，均正确。C忽略了认知评价的个体差异。本题考察生活事件的个体差异。

[题目] 17. 当机体处于强烈的应激状态时,可表现出心率加快、血压升高、呼吸加速、血糖升高,这些生理反应说明(  )系统活动增强。
A. 下丘脑-垂体-肾上腺⽪质轴
B. 下丘脑-垂体-甲状腺轴
C. 交感-肾上腺髓质轴
D. 下丘脑-垂体-性腺轴
E. 下丘脑-神经垂体轴
[答案] C
[解析]
正确答案为C。心率加快、血压升高、呼吸加速、血糖升高是交感-肾上腺髓质轴兴奋的表现，释放儿茶酚胺（肾上腺素、去甲肾上腺素）引起“战斗或逃跑”反应。A下丘脑-垂体-肾上腺皮质轴主要分泌糖皮质激素。本题考察应激的生理机制。

[题目] 18. 以下属于应对应激以减轻紧张的措施的是(  )。
A. 分散对消极应激源的注意
B. 努力忘却消极应激的情景状态
C. 增加对威胁情境的回避能力
D. 利用各种放松技术
E. 锻炼意志
[答案] D
[解析]
正确答案为D。利用各种放松技术（如深呼吸、渐进性肌肉放松、冥想）是有效的减轻紧张的方法。A分散注意力、B努力忘却、C增加回避能力均属消极应对，不能从根本上减轻紧张。E锻炼意志是长期策略，非直接减轻紧张的措施。本题考察应对应激的方法。

[题目] 19. 下列有关生活变化单位()与健康的关系,哪项不正确(   )。
A. LCU与健康关系非常密切,与疾病发生明显相关
B. LCU表示个体面对不同生活事件去重新适应时所需付出的努力大小
C. 若一年内累积的生活事件小于150,说明第二年不会出现任何问题
D. 若LCU累积为150~300,来年有50%患病的可能性
E. LCU分值升高与心肌梗死、糖尿病、工伤事故等多种疾病有明显相关
[答案] C
[解析]
正确答案为C。LCU小于150提示来年患病可能性较低（约30%），但并非“不会出现任何问题”，C表述过于绝对化。A、B、D、E均是对LCU与健康关系的正确描述。本题考察生活变化单位（LCU）的临床应用。

[题目] 20. 个体为维持自己生存和种族延续适应不断变化的复杂环境所做出的各种反应,称为()。
A. 应激
B. 学习
C. 行为
D. 动机
E. 需要
[答案] C
[解析]
正确答案为C。行为是指个体为维持生存和适应环境所作出的各种反应的总和。A应激是机体对刺激的非特异性反应；B学习是获得经验的过程；D动机是推动行为的内在动力；E需要是机体某种缺乏的状态。本题考察行为的基本概念。

[题目] 21. 小刚正在忙于高考、压力很大,可是母亲又突然去世了,他的心理承受了重大的打击,下列不正确的是( )
A. 周围的⼈应该给予他支持和关怀
B. 他只遭遇了亲⼈去世一个应激事件
C. 改善他的情绪
D. ⽼师.同学在他情绪缓解后多指导他的学习
E. ⽗亲是他最大的支持
[答案] B
[解析]
正确答案为B。该生同时遭遇高考压力和母亲去世两个应激事件，B说“只遭遇亲人去世一个事件”是错误的。A应给予社会支持；C改善情绪是重要干预；D老师同学应协助学习；E父亲是重要支持来源，均正确。本题考察应激事件的叠加效应。

[题目] 22. 男,35岁,其妻在一场车祸中丧生其后患者表现为依赖性增强,兴趣变得狭窄,以自我为中心。心理医生认为患者的表现属于应激反应。这类应激反应属( )。
A. 或战或逃”反应
B. 行为退缩反应
C. 认知反应
D. 自我防御反应
E. 情绪反应
[答案] B
[解析]
正确答案为B。该患者表现为依赖性增强、兴趣狭窄、以自我为中心，属于行为退缩反应——个体在面对巨大应激时退回依赖状态、减少对外界活动。A或战或逃反应是急性应激反应；C认知反应涉及思维；D自我防御反应是无意识的；E情绪反应涉及情感。本题考察应激行为反应的分类。

[题目] 23. 面对威胁性的应激源,通过各种适当的心理和行为对策来消除或缓解个体的紧张状态,称之为(  )。
A. 解脱
B. 激励
C. 回避
D. 应对
E. 超脱
[答案] D
[解析]
正确答案为D。应对（coping）是指个体面对威胁性应激源时，运用各种心理和行为策略以消除或缓解紧张状态的过程。A解脱、B激励、C回避、E超脱均不是该概念的正式术语。本题考察应对的定义。

[题目] 24. 生活事件、日常困扰、重大变故和文化冲突等心理应激源所属的类型为( )。
A. 社会性应激源
B. 职业性应激源
C. 生物性应激源
D. 环境性应激源
E. 物理性应激源
[答案] A
[解析]
正确答案为A。社会性应激源包括生活事件、日常困扰、重大变故和文化冲突等直接来源于社会生活的应激源。B职业性应激源仅限于工作领域；C生物性、D环境性、E物理性均侧重物质环境因素。本题考察心理应激源的社会性分类。

[题目] 25. 人生会遇到无数应激源的作用,只有那些对人有意义的刺激物才能引起心理应激反应,这些事物是否对人有意义。很大程度上取决于( )。
A. 应激源的强度
B. 应激源的性质
C. 应激源的数量
D. 人的认知评价
E. 人的智力水平
[答案] D
[解析]
正确答案为D。个体对应激源的认知评价决定了该刺激是否具有意义以及引起多大程度的应激反应。A强度、B性质、C数量是客观因素，但最终是否产生应激取决于D人的认知评价（Lazarus认知交互作用理论）。E智力水平影响认知能力但不直接决定意义评价。本题考察应激的中介机制——认知评价。

[题目] 26. 布雷迪曾做过这样的实验:两只猴子各自坐在被约束的椅子上，每隔一定时间通一次电，其中一只(A) 猴子能自己断电而避免电击，另一只猴子(B)则不能。最终(  )。
A. A得了溃疡病
B. B得了溃疡病
C. AB均得了溃疡病
D. AB均未得病
E. AB均得了高血压
[答案] A
[解析]
正确答案为A。布雷迪实验（“执行猴”实验）中，A猴能主动断电（有控制力但需持续警觉），长期高度紧张导致消化性溃疡；B猴不能控制但被动接受电击，反而应激较小。该实验说明控制性压力（心理负荷）比被动接受更易导致心身疾病。本题考察心理应激与心身疾病的经典实验。

[题目] 27. 陈女士在下岗后出现了头痛、失眠、情绪低落、十分消极的情况。这种应激反应称为( )。
A. 焦虑
B. 恐惧
C. 抑郁
D. 心理休克
E. 激情爆发
[答案] C
[解析]
正确答案为C。抑郁以情绪低落、兴趣减退、自我评价降低为主要表现，常伴有头痛、失眠等躯体症状。A焦虑以紧张不安为核心；B恐惧是对具体威胁的反应；D心理休克表现为情感麻木、呆滞；E激情爆发是短暂强烈爆发。本题考察抑郁性应激反应的临床表现。

[题目] 28. 应激的概念可理解为(  )。
A. 外果刺激和环境要求
B. 对外界刺激和环境要求的反应
C. 对环境不适应或适应的反应
D. 对环境要求与应付能力评估后的状态
E. 内外刺激因素
[答案] D
[解析]
正确答案为D。现代应激理论认为，应激是个体对环境需求与自身应对能力进行评估后产生的身心状态。A只强调外部刺激；B只强调反应；C过于笼统；E只强调刺激因素。D准确概括了应激的认知评估过程。本题考察应激的现代定义。

[题目] 29. 可以减弱心理应激的负面影响的方法除外(  )。
A. 学会放松技术
B. 保持乐观的心情
C. 坚持面对严酷的现实
D. 增强自己的应对能力
E. 取得社会支持
[答案] C
[解析]
正确答案为C。“坚持面对严酷的现实”有时可能使个体长期暴露于应激源下而不采取适应性调整，反而加剧应激。A放松技术、B乐观心态、D增强应对能力、E社会支持均是有效的缓解方法。本题考察心理应激的干预策略。

[题目] 30. 塞里认为在应激源持续作用下,出现一般性的长期躯体反应称为(   )。
A. 慢性应激反应综合征
B. 特殊反应综合征
C. 应激适应综合征
D. 一般适应综合征
E. 急性应激反应综合征
[答案] D
[解析]
正确答案为D。塞里（Selye）提出一般适应综合征（GAS），分为警戒期、抵抗期和衰竭期三个阶段。A、B、C、E均非塞里提出的经典术语。本题考察塞里应激学说的核心概念。

[题目] 31. 以下关于心理应激的说法错误的是(   )。
A. 应激源是心理社会因素
B. 肯定对工作产生不良影响
C. 可危及个⼈的生存和地位
D. 可产生心理反应
E. 可产生生理反应
[答案] B
[解析]
正确答案为B。心理应激不一定对工作产生不良影响，适度应激可提高工作效率和创造力（积极应激）。A应激源包括心理社会因素；C可危及个人生存地位；D可产生心理反应；E可产生生理反应，均正确。本题考察心理应激的双重性。

[题目] 32. 女,22岁,医学生。最近与男友发生激烈争执,以致两人分手,情绪极度低落,也十分愤恨,来找学校心理咨询师寻求帮助。心理咨询师针对其情绪的调节提出的办法不适合的是(  )。
A. 不断宣泄
B. 降低期望
C. 心理应对
D. 改变认知
E. 放松训练
[答案] A
[解析]
正确答案为A。“不断宣泄”不适用于情绪调节，过度宣泄可能强化负性情绪、损害人际关系。B降低期望、C心理应对、D改变认知、E放松训练均为合适的情绪调节方法。本题考察情绪调节策略的合理选择。

[题目] 33. 女,18岁,某大学一年级新生。学后对新的学习环境和教学模式不适应,出现情绪焦虑.失眠等情况。该生的辅导员.老师及同学们给予其热情的帮助疏导和安慰,使该生逐渐走出适应不良的状态。这种应对应激的方法属于(  )。
A. 回避应激源
B. 催眠心理治疗
C. 专业思想教育
D. 运用自我防御机制
E. 取得社会支持
[答案] E
[解析]
正确答案为E。辅导员、老师及同学们给予帮助、疏导和安慰，属于社会支持（情感性支持和信息性支持）。A回避应激源不是积极应对；B催眠治疗未采用；C专业思想教育不相关；D自我防御机制是无意识的。本题考察社会支持在应激应对中的作用。

[题目] 34. 哪项是有效应对应激的评价调整方法( )。
A. 分散对消极应激源的注意
B. 努力忘却消极应激的情景状态
C. 增加对威胁情境的回避能力
D. 利用各种放松技术
E. 锻炼意志
[答案] A
[解析]
正确答案为A。有效应对应激的评价调整方法是通过调整认知评价来降低应激的影响，分散对消极应激源的注意属于认知调整策略。B努力忘却并不现实且属压抑；C增加回避是消极应对；D放松技术是情绪调节而非评价调整；E锻炼意志是长期策略。本题考察认知评价调整在应对中的作用。

[题目] 35. 下述哪项不是心理应激对健康的消极影响(  )。
A. 使原有的疾病复发
B. 适应性调整,恢复内稳态
C. 使已有的疾病加重
D. 损害适应能力,引发心身症状
E. 与其他因素共同影响引发新的疾病
[答案] B
[解析]
正确答案为B。适应性调整、恢复内稳态是心理应激对健康的积极影响（促进适应），而非消极影响。A使原有疾病复发、C使疾病加重、D损害适应能力、E引发新疾病均属于消极影响。本题考察心理应激的双重效应。

[题目] 36. 小李,男,25岁,硕士研究生毕业后参加工作。半年来对上级领导布置的任务总感觉不能胜任,屡屡出错,收到多次批评后内心受挫,选择了辞职,小李的这种选择在应激反应属于(  )。
A. 认知反应
B. 生理反应
C. 情绪反应
D. 行为反应
E. 防御反应
[答案] D
[解析]
正确答案为D。辞职是面对工作应激时采取的具体行动，属于行为反应（逃避/回避行为）。A认知反应涉及思维评价改变；B生理反应涉及躯体变化；C情绪反应涉及情感体验；E防御反应是无意识的心理保护。本题考察应激行为反应的表现。

[题目] 37. 关于心理应激的说法错误的是(  )。
A. 相信事件是可控制可预测的可以减轻心理应激
B. 适度的应激可以促进健康
C. 长期的超强度应激会损害健康
D. 心理防御机制的应用可以从根本上消除解除焦虑
E. 有效的放松训练可以降低心理应激水
[答案] D
[解析]
正确答案为D。心理防御机制可在短期内缓解焦虑，但不能从根本上消除焦虑，长期使用可能导致适应不良。A相信事件可控可预测可减轻应激；B适度应激促进健康；C长期超强度应激损害健康；E放松训练可降低应激水平。本题考察心理防御机制的局限。

[题目] 38. 不影响个体对应激的认知评价的是(   )。
A. 当时个体的心身状态
B. ⼈格特征
C. 应激源性质
D. 对应激源的敏感度
E. 生活经历
[答案] D
[解析]
正确答案为D。对应激源的敏感度是应激反应的结果或表现，而非影响认知评价的因素。影响认知评价的因素包括A当时个体心身状态、B人格特征、C应激源性质、E生活经历等。本题考察影响应激认知评价的因素。

[题目] 39. 当一个⼈认为自己对所处环境没有控制力并无力改变它的时候,就会产生(   )。
A. 愤怒
B. 猜疑
C. 自我中心加强
D. 失助感
E. 主观感觉异常
[答案] D
[解析]
正确答案为D。失助感（helplessness）是指个体认为对所处环境没有控制力、无力改变现状的心理状态。A愤怒、B猜疑、C自我中心加强、E主观感觉异常均不属于题干描述的特定概念。本题考察失助感的概念。

[题目] 40. 下列哪项为心理应激对健康影响的表现( )
A. 促进健康
B. 加重已有疾病
C. 与心身疾病的发病有关
D. 与心理障碍的发病有关
E. 以上都正确
[答案] E
[解析]
正确答案为E。心理应激对健康的影响是多方面的：A适度应激可促进健康（积极影响）；B可加重已有疾病；C与心身疾病发病有关；D与心理障碍发病有关。四个选项均正确，故E“以上都正确”为最佳答案。本题考察心理应激与健康的关系。

[题目] 41. 面对应激源,个体通过各种适当的行为和心理对策来消除紧张状态,叫做( )。
A. 超脱
B. 应对
C. 压抑
D. 解脱
E. 回避
[答案] B
[解析]
正确答案为B。应对（coping）是指面对应激源时，个体通过各种适当的行为和心理对策来消除紧张状态的过程。A超脱、C压抑、D解脱、E回避均不是该定义的准确对应术语。本题考察应对的基本定义。

[题目] 42. ⼈们在遇到压力、痛苦、困境时,引起自杀主要是由于(   )。
A. 排除应激源
B. 逃避应激源
C. 难以应对应激源
D. 没意识到应激源
E. 想超越应激源
[答案] C
[解析]
正确答案为C。人们在遇到压力、痛苦、困境时，因感到难以应对（无法承受）而产生绝望，从而导致自杀行为。A排除、B逃避、D没意识到、E想超越均不是导致自杀的核心心理原因。本题考察应激与自杀行为的关系。

[题目] 43. 常见的应激行为反应包括( )。
A. 焦虑
B. 攻击
C. 否认
D. 恐惧
E. 抑郁
[答案] B
[解析]
正确答案为B。常见的应激行为反应包括攻击（指向他人或自身）、退缩、逃避等。A焦虑、D恐惧、E抑郁属于情绪反应；C否认属于心理防御机制。故B攻击是行为反应。本题考察应激反应的分类。

[题目] 44. 下列哪一项不属于心理应激对健康的消极影响(   )。
A. 使机体免疫功能下降
B. 是事故、车祸、自杀的主要原因之一
C. 加重原有的躯体和精神疾病
D. 使个体丧失工作.学习能力
E. 是导致物质滥用及依赖的主要原因之一
[答案] D
[解析]
正确答案为D。“使个体丧失工作、学习能力”表述过于绝对化，心理应激不一定会导致完全丧失工作学习能力，程度因人而异。A免疫功能下降、B事故自杀原因之一、C加重原有疾病、E物质滥用原因之一均属于心理应激的消极影响。本题考察心理应激消极影响的合理表述。

[章节] 心理评估

[单选题]

[题目] 1. 依据一定的法则,用数量化的手段对心理现象或行为加以确定和测定为(   )
A. 心理测量
B. 心理评估
C. 心理诊断
D. 心理咨询
E. 心理治疗
[答案] A
[解析]
正确答案为A。心理测量是依据法则用数量化手段测定心理现象的过程。B心理评估是更综合的概念，包含测量、观察、会谈等；C心理诊断是对障碍的判断；D心理咨询和E心理治疗属干预手段。本题考察心理测量的定义。

[题目] 2. 某学生进行斯坦福-比奈智力测验的结果为120,此学生的智力是(  )。
A. 超常智力
B. 高常智力
C. 平常智力
D. 边界智力
E. 低下智力
[答案] B
[解析]
正确答案为B。斯坦福-比奈智力量表将IQ 110~119评为高常（中上）智力，120~129为超常，130以上为极优。本题中IQ为120，按标准归入高常范围。A超常一般指130以上；C平常为90~109；D边界为70~79；E低下为69以下。本题考察智力等级划分。

[题目] 3. 患者,男,由家人强制来就诊。家人叙述,患者近来说话神神秘秘,总是嘱咐家里人出门当心,别被人害了,不允许孩子在外面逗留,说会被坏人“绑架”,但家里并未得罪过什么人。若对该患者进行心理测试,首选(  )。
A. SCL-90
B. MMPI
C. EPQ
D. 16PF
E. SAS
[答案] B
[解析]
正确答案为B。患者表现出被害妄想（怀疑被陷害），MMPI（明尼苏达多项人格调查表）包含疑病、偏执、精神分裂症等临床量表，适合评估精神病性症状。A SCL-90是症状评定量表；C EPQ测人格维度；D 16PF测正常人格；E SAS测焦虑。本题考察MMPI的临床应用。

[题目] 4. 下列选项不是SCL-90的症状维度的是(  )。
A. 躯体化
B. 强迫
C. 抑郁
D. 精神质
E. 智力
[答案] E
[解析]
正确答案为E。SCL-90包含躯体化、强迫、人际敏感、抑郁、焦虑、敌意、恐惧、偏执、精神病性9个因子，无智力维度。A躯体化、B强迫、C抑郁、D精神质均为SCL-90的因子。本题考察SCL-90的因子构成。

[题目] 5. 一个儿童的智商低于(   )称之为低常儿童。
A. 60
B. 65
C. 70
D. 75
E. 80
[答案] C
[解析]
正确答案为C。根据ICD和DSM诊断标准，低常儿童（智力残疾）诊断切点为IQ低于70。A、B、D、E均高于70，不符合低常标准。本题考察智力残疾的划界标准。

[题目] 6. 临床评定量表的用途主要是,除了(  )。
A. 病理现象的筛选
B. 人格测定
C. 症状程度的描述
D. 协助诊断
E. 疗效观察
[答案] B
[解析]
正确答案为B。临床评定量表主要用于病理现象筛选（A）、症状程度描述（C）、协助诊断（D）和疗效观察（E）。人格测定应使用专门人格测验如MMPI、EPQ等。本题区分评定量表与人格测验的功能。

[题目] 7. 成功的心理测验以下条件不正确的是(  )。
A. 良好的效度
B. 良好的信度
C. 必须有常模
D. 测验指导语必须因人而异
E. 测验条件必须固定
[答案] D
[解析]
正确答案为D。心理测验要求标准化，指导语必须统一固定，不能因人而异。A良好的效度、B良好的信度、C必须有常模、E测验条件固定均为成功测验的必要条件。本题考察测验的标准化原则。

[题目] 8. 心理测验的原则是(  )。
A. 标准化
B. 稳定性
C. 社会化
D. 道德性
E. 独特性
[答案] A
[解析]
正确答案为A。标准化是心理测验最根本的原则，包括统一内容、指导语、时限、评分标准和常模。B稳定性是信度特征；C社会化、D道德性、E独特性非测验核心原则。本题考察心理测验的基本原则。

[题目] 9. “比奈-西蒙量表”属于一种(  )。
A. 智力测验
B. 人格测验
C. 投射测验
D. 评定量表
E. 神经心理测验
[答案] A
[解析]
正确答案为A。比奈-西蒙量表由比奈和西蒙于1905年编制，是世界上第一个智力测验量表。B人格测验、C投射测验、D评定量表、E神经心理测验均不匹配。本题考察智力测验的历史与分类。

[题目] 10. 采用问卷法进行测验的为(  )。
A. 洛夏墨迹测验
B. 韦氏记忆测验
C. 比奈-西蒙量表
D. 艾森克人格问卷
E. 主题统觉测验
[答案] D
[解析]
正确答案为D。EPQ（艾森克人格问卷）采用自陈问卷形式。A洛夏墨迹测验和E主题统觉测验属投射法；B韦氏记忆测验和C比奈-西蒙量表属作业法。本题区分问卷法与投射法、作业法。

[题目] 11. 有关心理测验的原则,以下错误的是(  )。
A. 符合评估的目的
B. 常模样本符合被试的条件
C. 可以直接使用国外的测验工具
D. 标准化程度高
E. 要对被试的信息保密
[答案] C
[解析]
正确答案为C。直接使用国外测验工具未经本土化修订和建立常模，违反标准化原则。A符合评估目的、B常模样本匹配、D标准化程度高、E保密均为正确原则。本题强调测验工具的跨文化适用性。

[题目] 12. 男,37岁。因有明显的幻觉及妄想表现而到医院就诊。经询问病情后,医生欲采用心理测验对其进行评估,以协助诊断。针对该患者,通常可采用的心理测验工具为( )。
A. EPQ
B. MMPI
C. SAS
D. SCL-90
E. TAT
[答案] B
[解析]
正确答案为B。患者有幻觉、妄想等精神病性症状，MMPI含有精神分裂症（Sc）、偏执（Pa）等临床量表，可辅助诊断。A EPQ测人格维度；C SAS测焦虑；D SCL-90做症状筛查；E TAT是投射测验。本题考察不同量表对精神病性症状的评估能力。

[题目] 13. 效度是指(      )
A. 心理测验的测验结果分数是否符合测验要求
B. 测验结果与测量的心理特点之间符合的程度
C. 选用心理测验时首先必须鉴定它的可靠性
D. 同一测验测量结果分数相同,解释也应相同
E. 相同测验,同一个人不同时间做,结果相同
[答案] B
[解析]
正确答案为B。效度是指测验实际测到所要测量心理特质的程度。A表述模糊；C描述的是信度的重要性；D和E描述结果一致性（信度特征）。本题通过定义辨析效度与信度的区别。

[题目] 14. “受试者根据自⼰的理解和感受对一些意义不明的图像.墨迹作出回答,借以诱导出受试者的经验.情绪或内心冲突”称为一种(    )。
A. 智力测验
B. 投射测验
C. 运动测验
D. 感知测验
E. 人格测验
[答案] B
[解析]
正确答案为B。投射测验采用意义模糊的刺激（如墨迹图），让受试者自由反应，使其无意识心理内容投射出来。A智力测验、C运动测验、D感知测验均不符合；E人格测验范畴大，但具体方法属投射测验。本题考察投射测验的核心特征。

[题目] 15. 测验工具在几次测验中所得结果的一致程度称为(  )
A. 效度
B. 效率
C. 信度
D. 可信
E. 常模
[答案] C
[解析]
正确答案为C。信度指测验的稳定性、一致性，即多次测量结果的一致程度。A效度指有效性；B效率不是测量学术语；D可信是日常用语；E常模是比较标准。本题考察信度的定义。

[题目] 16. 依据心理学的理论和方法对人的心理品质及水平所作出的鉴定称为(   )
A. 心理测验
B. 心理测量
C. 心理评估
D. 心理诊断
E. 心理咨询
[答案] C
[解析]
正确答案为C。心理评估是运用心理学理论和方法对个体心理品质及水平作出的全面鉴定。A心理测验是工具；B心理测量是量化过程；D心理诊断侧重障碍判断；E心理咨询是干预。本题考察心理评估与相关概念的区分。

[题目] 17. 采用作业法进行测验的为( )。
A. MMPI
B. EPQ
C. 16PF
D. SAS
E. WAIS
[答案] E
[解析]
正确答案为E。WAIS（韦氏成人智力量表）包含操作量表（积木、拼图等），要求被试动手操作，属作业法。A MMPI、B EPQ、C 16PF、D SAS均为问卷法。本题区分问卷法与作业法。

[题目] 18. 反映一个测验工具的正确性属于测验的(  )。
A. 效度
B. 信度
C. 样本
D. 常模
E. 概念
[答案] A
[解析]
正确答案为A。效度即测验的有效性，反映测验工具能否准确测量到所要测的心理特质。B信度是稳定性和一致性；D常模是参照标准。本题直接考察效度的核心含义。

[题目] 19. 上述哪项是⼼理测验工作应遵守的原则?()
A. 真诚.中立.回避
B. 自强.自立.自省
C. 信度.效度.常模
D. 客观.保密.标准化
E. 自主.学习.实效
[答案] D
[解析]
正确答案为D。心理测验的原则包括客观、保密、标准化。A真诚中立回避是心理咨询原则；C信度效度常模是测验质量指标而非工作原则。本题考察测验实施中的职业伦理规范。

[题目] 20. 以下不是评定量表的是(  )。
A. SCL-90
B. SDS
C. LES
D. EPQ
E. SAS
[答案] D
[解析]
正确答案为D。EPQ是人格问卷，不属于评定量表。A SCL-90（症状自评量表）、B SDS（抑郁自评量表）、C LES（生活事件量表）、E SAS（焦虑自评量表）均属于评定量表。本题区分人格测验与评定量表。

[题目] 21. 洛夏墨迹试验相当于(  )。
A. 诊断测验
B. 人格测验
C. 神经心理测验
D. 智力测验
E. 评定量表
[答案] B
[解析]
正确答案为B。洛夏墨迹试验是经典的投射式人格测验，用于评估人格结构和心理冲突。A诊断测验、C神经心理测验、D智力测验、E评定量表均不匹配。本题考察洛夏试验的性质归类。

[题目] 22. 艾森克认为人格具有下列几个维度(  )。
A. 情绪性维度.气质性维度.稳定性维度
B. 情绪性维度.内外向维度.精神质维度
C. 气质性维度.内外向维度.稳定性维度
D. 气质性维度.情绪性维度.意志性维度
E. 内外向维度.精神质维度.稳定性维度
[答案] B
[解析]
正确答案为B。艾森克人格理论提出三个基本维度：内外向（E）、神经质/情绪性（N）、精神质（P）。A、C、D、E均不符合艾森克的理论划分。本题考察EPQ的理论基础——艾森克人格三因素模型。

[题目] 23. ⼼理医生欲对病人进行人格测定,可以选用以下哪个工具?( )
A. MMPI
B. WAIS
C. S-B
D. SCL-90
E. HAMD
[答案] A
[解析]
正确答案为A。MMPI是经典的人格测验，用于评估人格特征和精神病理。B WAIS是智力量表；C S-B是比奈智力测验；D SCL-90是症状评定量表；E HAMD是抑郁评定量表。本题根据目的（人格测定）选择合适工具。

[题目] 24. 男,55岁。一周来感觉右手和右脚麻木,心烦意乱,但生活工作仍能进行。心理治疗可以选择的心理测试是(  )。
A. EPQ问卷
B. 16PF问卷
C. MMPI调查表
D. H-R成套测验
E. IAI测验
[答案] A
[解析]
正确答案为A。患者有肢体麻木、心烦等非特异性症状，EPQ可评估其人格特征维度（内外向、神经质等），辅助了解心理背景。B 16PF也可但EPQ更常用；C MMPI偏重精神病理；D H-R测试神经心理；E IAI非常见量表。本题结合临床表现选择人格测验。

[题目] 25. 目前我国最常用的智力量表是(  )。
A. 斯坦福-比纳智力量表
B. 洛奇-桑代克智力量表
C. 韦克斯勒智力量表
D. 瑟斯顿智力量表
E. 勒特国际操作量表
[答案] C
[解析]
正确答案为C。韦克斯勒智力量表（WAIS成人版、WISC儿童版）是我国临床和科研中最常用的智力测验。A斯坦福-比奈量表使用相对较少；B、D、E在国内应用不广。本题考察实际临床工作中的工具选择。

[题目] 26. 以下哪个测验不属于人格测验的是(  )。
A. MMPI
B. SDS
C. EPQ
D. TAT
E. 16PF
[答案] B
[解析]
正确答案为B。SDS（抑郁自评量表）是症状评定量表，用于评估抑郁程度，不属于人格测验。A MMPI、C EPQ、E 16PF是经典人格测验；D TAT是投射式人格测验。本题区分人格测验与症状评定量表。

[题目] 27. 不属于用问卷法进行测验的为( )。
A. MMPI
B. TAT
C. EPQ
D. 16PF
E. SCL-90
[答案] B
[解析]
正确答案为B。TAT（主题统觉测验）是投射测验，受试者根据图片编故事，不是问卷作答。A MMPI、C EPQ、D 16PF、E SCL-90均采用自陈问卷形式。本题区分问卷法与投射法。

[题目] 28. 在心理评估中,向受试者展示一幅简单的几何图形,并要求受试者回答,以观察其视觉空间能力,这种方法属于(  )。
A. 会谈法
B. 投射法
C. 问卷法
D. 观察法
E. 作业法
[答案] D
[解析]
正确答案为D。观察法指评估者有目的、有计划地观察被试的行为表现。本题通过展示图形并观察被试的回答来评估视觉空间能力，属观察法。A会谈法、B投射法、C问卷法、E作业法均不匹配。本题考察观察法在心理评估中的应用。

[题目] 29. 不属于人格投射类测验的是( )。
A. 主题统觉测验
B. 洛夏墨迹测验
C. 霍兹曼墨迹测验
D. 词语联想测验
E. 范畴测验
[答案] E
[解析]
正确答案为E。范畴测验（Category Test）是Halstead-Reitan神经心理成套测验的一部分，评估抽象思维，不属于投射测验。A TAT、B洛夏、C霍兹曼、D词语联想测验均为投射测验。本题考察投射测验的识别与排除。

[题目] 30. 临床⼼理评估是⼼理治疗和⼼理咨询的(  )。
A. 依据
B. 前提
C. 效果判定
D. 效果评价
E. 以上都是
[答案] E
[解析]
正确答案为E。心理评估是心理咨询与治疗的基础和前提，也是疗效判断和评价的依据。A、B、C、D各表述不全面，只有E涵盖所有方面（依据、前提、效果判定、效果评价）。本题考察评估在治疗中的多重作用。

[题目] 31. “一种心理测量的工具”称为(  )。
A. 心理观察
B. 心理鉴定
C. 心理测验
D. 心理评估
E. 心理调查
[答案] C
[解析]
正确答案为C。心理测验是心理测量的标准化工具。A心理观察是方法，B心理鉴定是结论，D心理评估是整体过程，E心理调查是研究方式。本题考察心理测验的准确定义。

[题目] 32. 用16种人格因素测验量表测验某人的人格特征,这一方法是依据(  )。
A. 弗洛伊德人格理论
B. 卡特尔人格理论
C. 艾森克人格理论
D. 斯金纳的人格理论
E. 罗杰斯的人格理论
[答案] B
[解析]
正确答案为B。16PF由卡特尔（Cattell）基于其人格特质理论编制，通过因素分析提取16种根源特质。A弗洛伊德是精神动力学理论；C艾森克是三因素理论；D斯金纳是行为主义；E罗杰斯是人本主义。本题考察16PF的理论渊源。

[题目] 33. 用16种人格因素测验量表(16PF)测验某人的人格特征,这一⽅法是依据( )
A. 弗洛伊德人格理论
B. 卡特尔人格理论
C. 艾森克人格理论
D. 斯⾦纳的人格理论
E. 罗杰斯的人格理论
[答案] B
[解析]
正确答案为B。16PF由卡特尔编制，依据其人格特质理论。A弗洛伊德（精神分析）、C艾森克（三因素模型）、D斯金纳（行为主义）、E罗杰斯（人本主义）均非16PF的理论基础。本题与第32题相同，考察16PF的理论依据。

[题目] 34. 心理评估中最常用的方法(   )
A. 会谈法
B. 调查法
C. 观察法
D. 临床评定量表
E. 心理测验法
[答案] A
[解析]
正确答案为A。会谈法是心理评估中最常用、最基本的方法，是收集信息的主要途径。B调查法、C观察法、D评定量表、E心理测验虽也常用，但会谈法是基础和首选。本题考察心理评估方法的临床运用频率。

[题目] 35. “受试者根据自己的理解和感受对一些意义不明的图像,墨迹作出回答,借以诱导出受试者的经验情绪或内心冲突”称为一种(  )。
A. 智力测试
B. 投射测验
C. 运动测验
D. 感知测验
E. 人格测验
[答案] B
[解析]
正确答案为B。投射测验采用模糊刺激（如墨迹），让受试者自由联想，投射其内心冲突和情感。A智力测验、C运动测验、D感知测验均不符合；E人格测验范围过大，该具体方法为投射测验。本题与14题相同。

[题目] 36. 研究生小王为研究癌症病人的生活质量,从因特网上下载了一份英文版的“生活质量问卷”,翻译后直接用于临床调查,并将结果写成论文投到某学术刊物。不久小王收到退稿,原因最有可能是违反了心理测验的(  )。
A. 保密原则
B. 标准化原则
C. 客观原则
D. 协调关系原则
E. 道德原则
[答案] B
[解析]
正确答案为B。直接翻译国外量表未经标准化修订（缺乏本土常模），结果不可靠，违反标准化原则。A保密原则、C客观原则、D协调关系、E道德原则均不直接针对本题情境。本题强调跨文化测验使用必须标准化。

[题目] 37. 根据韦氏智力测验结果,个体智商大于多少叫极优秀,智商小于多少为智力缺损(  )。
A. 120,84
B. 120,70
C. 120,54
D. 130,84
E. 130,69
[答案] E
[解析]
正确答案为E。韦氏智力量表划分：IQ≥130为极优秀（超优），IQ≤69为智力缺损。A中84不是智力缺损界值；B、C、D数值组合均不正确。本题考察韦氏智力等级的具体数值界限。

[题目] 38. 关于“适应行为量表”,不正确的为( )。
A. 评估个体维持生存的能力
B. 属于心理测验工具的一种
C. 适应行为与智力有较大关联
D. 常配合智力测验一起使用
E. “自理能力”属基本的适应行为
[答案] B
[解析]
正确答案为B。适应行为量表属于评定量表而非严格的心理测验（心理测验指有常模的标准化认知/人格测验）。A、C、D、E均为正确表述。本题区分适应行为量表与心理测验的概念范畴。

[题目] 39. 为了了解被检者的思维品质,检查者使用了填词测验,这种方法属于( )。
A. 投射法
B. 操作法
C. 作业法
D. 问卷法
E. 个案法
[答案] A
[解析]
正确答案为A。填词测验（如语句完成测验）使用不完整的句子或词语作为刺激，让受试者自由补充，属投射测验。B操作法、C作业法、D问卷法、E个案法均不符合。本题考察投射测验的具体形式。

[题目] 40. 根据某人的书信推断他当时的心理发展水平.情绪状态,这种方法属于( )。
A. 作品分析法
B. 投射法
C. 观察法
D. 调查法
E. 会谈法
[答案] A
[解析]
正确答案为A。作品分析法是通过分析个体的作品（书信、日记、绘画等）来推断其心理特征的方法。B投射法需特定工具；C观察法、D调查法、E会谈法均不涉及作品分析。本题考察作品分析法的定义。

[题目] 41. 常用的心理评估方法不包括(  )。
A. 观察法
B. 调查法
C. 实验法
D. 会谈法
E. 测验法
[答案] C
[解析]
正确答案为C。实验法是心理学研究方法之一，但不属于常规的心理评估方法。观察法、调查法、会谈法、测验法是心理评估的常用方法。本题考察心理评估方法体系的外延。

[题目] 42. 下列哪项为目前心理测验中最常用的常模形式(  )。
A. 均数
B. 标准分
C. 百分位
D. 划界分
E. 比率
[答案] B
[解析]
正确答案为B。标准分（Z分、T分、IQ分等）是心理测验中最常使用的常模形式，便于横向比较。A均数、C百分位、D划界分、E比率虽用于常模，但使用频率不如标准分高。本题考察常模的常见形式。

[题目] 43. 一位心理学专家为了对一3岁幼儿做心理评估,去孩子所在的幼儿园观看该幼儿在游戏中的表现,这种心理评估的方法属于(     )。
A. 自由式会谈法
B. 现状调查法
C. 控制观察法
D. 自然观察法
E. 心理测验法
[答案] D
[解析]
正确答案为D。自然观察法指在不干预的自然情境中观察被试的行为表现。去幼儿园观看幼儿游戏属于典型的自然观察。A会谈法、B调查法、C控制观察法（需控制变量）、E心理测验均不符合。本题考察自然观察法的特征。

[题目] 44. 关于智商,以下说法正确的是( )。
A. 智力和智商是同一个概念
B. 离差智商的计算公式:IQ=MA/CA×100
C. 韦克斯勒提出了⽐率智商
D. 离差智商表⽰被试者的成绩偏离同年龄组平均成绩的距离
E. 韦⽒量表分在40~54,代表个体轻度智力缺损
[答案] D
[解析]
正确答案为D。离差智商表示个体成绩偏离同年龄组平均成绩的差距。A智力和智商不同（智商是智力商数）；B公式为比率智商；C韦氏提出的是离差智商；E 40~54为中度智力缺损。本题综合辨析智商相关概念。

[题目] 45. SCL-90(90项症状核查表)属于(  )。
A. 人格问卷
B. 适应行为量表
C. 症状评定量表
D. 多项病态人格调查表
E. 临床记忆量表
[答案] C
[解析]
正确答案为C。SCL-90（90项症状清单）属于精神症状自评量表，用于评估个体在多个精神症状维度上的严重程度。A人格问卷、B适应行为量表、D多项病态人格调查表、E临床记忆量表均不属于SCL-90的分类。本题考察SCL-90的性质。

[章节] 心身疾病

[单选题]

[题目] 1. 以下哪项不属于治疗心身疾病的措施(  )。
A. 行为矫正
B. 不用药物解除症状
C. 学会自我放松和自我调节的方法
D. 协调人际关系
E. 有针对性地进心理治疗与心理护理
[答案] B
[解析] 正确答案为B。心身疾病的治疗强调心身综合干预，药物缓解症状是重要手段之一。"不用药物解除症状"违背了综合治疗原则。A行为矫正、C自我放松、D协调人际关系、E心理治疗与心理护理均为正确的治疗措施。本题考察心身疾病的综合治疗原则。

[题目] 2. 与心身疾病诊断无关的是()。
A. 器质性病变的临床特点
B. 有明确的心理社会因素参与发病
C. 排除神经症和精神病
D. 单纯生物医学措施疗效甚微
E. 由某种躯体疾病引发心理障碍
[答案] E
[解析] 正确答案为E。心身疾病的诊断要点包括：有器质性病变、心理社会因素参与、排除精神疾病、单纯生物医学疗效不佳。E选项描述的是"躯体疾病引发心理障碍"，属于继发性心理问题，与心身疾病（心理因素导致躯体疾病）方向相反，故与诊断无关。本题考察心身疾病的诊断标准。

[题目] 3. 下列不属于心身疾病的是(  )。
A. 精神分裂症
B. 冠状动脉性心脏病
C. 消化性溃疡
D. 糖尿病
E. 高血压
[答案] A
[解析] 正确答案为A。心身疾病是指心理社会因素在发病、发展、转归中起重要作用的躯体疾病，必须有器质性病变。精神分裂症属于功能性精神疾病，无器质性躯体病变，故不属于心身疾病。B冠心病、C消化性溃疡、D糖尿病、E高血压均为经典心身疾病。本题考察心身疾病与精神疾病的区分。

[题目] 4. 王某是位部门主管,工作能力强,可他平时竞争性强.好胜.时间观念强,常常有过分的敌意。这种行为特征最有可能导致的疾病是(  )。
A. 神经性贪食
B. 偏头痛
C. 支气管哮喘
D. 冠心病
E. 消化性溃疡
[答案] D
[解析] 正确答案为D。题干描述的行为特征（竞争性强、好胜、时间紧迫感、敌意）是典型的A型行为模式。大量研究证实A型行为是冠心病的独立危险因素，其发病率是B型行为的2~3倍。A神经性贪食为进食障碍；B偏头痛、C支气管哮喘、E消化性溃疡虽属心身疾病，但与A型行为无特异性关联。本题考察A型行为与冠心病的关系。

[题目] 5. 内科的心身疾病一般不包括(  )。
A. 冠状动脉性心脏病
B. 高血压
C. 支气管哮喘
D. 肺结核
E. 消化性溃疡
[答案] D
[解析] 正确答案为D。肺结核是由结核分枝杆菌引起的感染性疾病，病因明确为生物因素，非心理社会因素主导，故不属于心身疾病。A冠心病、B高血压、C支气管哮喘、E消化性溃疡均为经典的内科心身疾病，心理因素在其发生发展中起重要作用。本题考察内科心身疾病的范畴。

[题目] 6. 心身疾病的诊断原则之一是(  )。
A. 培养健全人格,锻炼应对能力,获取社会支持
B. 药物治疗
C. 病情变化与心理社会因素有关
D. 心身相结合的原则
E. 心理治疗
[答案] C
[解析] 正确答案为C。心身疾病的诊断原则包括：①有明确器质性病变；②心理社会因素参与发病；③病情变化与心理社会因素相关；④排除精神疾病及神经症。C选项直接指出了诊断中需确认心理社会因素与病情的关联。A是预防措施，B和E是治疗手段，D是治疗原则。本题考察心身疾病诊断与治疗原则的区分。

[题目] 7. 长期的负性情绪可能导致心身疾病的发生,是因为(  )。
A. 负性情绪可以对人的神经、内分泌和免疫系统产生不良影响
B. 负性情绪可使人体免疫功能低下
C. 负性情绪可使交感神经兴奋
D. 负性情绪可使内分泌紊乱
E. 负性情绪对某一器官产生不良影响
[答案] A
[解析] 正确答案为A。负性情绪通过心理-神经-内分泌-免疫网络途径致病：激活交感神经、扰乱内分泌、抑制免疫功能，三者协同导致躯体器质性病变。B、C、D、E各选项分别描述了其中单一环节，均不全面。A选项综合概括了神经、内分泌、免疫三大中介机制，最为完整。本题考察心身疾病的生理中介机制。

[题目] 8. 根据心身疾病的定义,以下不属于心身疾病的是(  )。
A. 原发性高血压
B. 腹股沟斜疵
C. 神经性皮炎
D. 消化性溃疡
E. 支气管哮喘
[答案] B
[解析] 正确答案为B。腹股沟斜疝是解剖结构缺陷（腹壁薄弱或缺损）导致的机械性病变，病因以生物和解剖因素为主，与心理社会因素无明确关联。A原发性高血压、C神经性皮炎、D消化性溃疡、E支气管哮喘均为心理因素参与发病的经典心身疾病。本题考察心身疾病的核心定义——必须有心理社会因素参与。

[题目] 9. A型行为性格与下列(  )疾病有关。
A. 溃疡病
B. 风湿性心脏病
C. 冠心病
D. 癌症
E. 神经症
[答案] C
[解析] 正确答案为C。A型行为由Friedman和Rosenman提出，核心特征为竞争性、时间紧迫感、敌意和攻击性，是冠心病的独立危险因素。流行病学研究证实A型行为者冠心病发病率是B型者的2~3倍。A溃疡病与心理因素有关但与A型行为无特异关联；B风湿性心脏病由链球菌感染所致；D癌症与C型行为相关；E神经症属精神障碍。本题考察A型行为的概念及其与冠心病的关系。

[题目] 10. 可预防心身疾病的措施不包括(  )。
A. 减少负性情绪对健康的不良影响
B. 正确认识各种生活事件
C. 养成健康的行为习惯和生活方式
D. 长期超负荷工作
E. 劳逸结合不超负荷工作
[答案] D
[解析] 正确答案为D。心身疾病的预防核心是减少心理应激、增强应对能力。A减少负性情绪、B正确认知生活事件、C健康生活方式、E劳逸结合均为有效预防措施。而D"长期超负荷工作"本身就是心身疾病的重要危险因素，会直接增加身心压力，不能作为预防措施。本题考察心身疾病的三级预防策略。

[题目] 11. 有关心身疾病的治疗原则,不包括(  )。
A. 药物缓解症状
B. 自我心理调节
C. 矫正不良习惯
D. 不间断发泄
E. 心理护理
[答案] D
[解析] 正确答案为D。心身疾病的治疗遵循"心身同治"原则：药物控制症状、心理治疗调整认知、行为矫正改善习惯、心理护理提供支持。D"不间断发泄"并非科学治疗原则，过度发泄可能强化负性情绪和不良行为模式，不利于心身健康。本题考察心身疾病的综合治疗原则，注意区分适应性情绪表达与"不间断发泄"。

[题目] 12. 心理社会因素参与的躯体疾病称为( )。
A. 心身反应
B. 情绪反应
C. 心理障碍
D. 精神疾病
E. 心身疾病
[答案] E
[解析] 正确答案为E。心身疾病（psychosomatic diseases）的定义即为：心理社会因素在疾病的发生、发展、转归中起重要作用的躯体器质性疾病。A心身反应是心理刺激引起的短暂生理反应，不达疾病程度；B情绪反应为正常心理反应；C心理障碍和D精神疾病均属精神心理范畴，不强调躯体病变。本题考察心身疾病的基本定义。

[题目] 13. 哪种躯体疾病明显与心理因素相关(  )。
A. 癔病
B. 疑病性精神病
C. 疼痛
D. 反应性精神病
E. 心身疾病
[答案] E
[解析] 正确答案为E。题干明确要求"躯体疾病"，心身疾病正是心理因素参与发病的躯体器质性疾病。A癔病（转换障碍）属于神经症，虽有躯体症状但无器质性病变；B疑病性精神病和D反应性精神病为精神障碍；C疼痛是症状而非独立疾病。本题考察心身疾病作为躯体疾病与精神障碍的鉴别。

[题目] 14. 某人,因工作压力大,多年来经常反复出现心烦.心跳过速.胸部不适.出汗,经心电图、血压、血脂、心脏多普勒检查均正常这个患者有可能为(  )。
A. 躯体疾病
B. 心身障碍
C. 心理症状
D. 神经衰弱
E. 精神疾病
[答案] B
[解析] 正确答案为B。患者表现为躯体症状（心悸、胸闷、出汗）但各项检查正常，提示心理社会因素（工作压力）导致的功能性躯体不适，符合心身障碍（psychosomatic disorders）的特征——有躯体症状但尚未形成器质性病变。A躯体疾病应有阳性检查结果；D神经衰弱以精神易兴奋和易疲劳为特征；C和E不准确。本题考察心身障碍与心身疾病的层级区分。

[题目] 15. 某患者,竞争意识强,总想胜过他人;老觉得时间不够用,说话快.走路快;脾气暴躁,容易激动,常与他人的意见不一致。其行为类型属于()。
A. A型行为
B. B型行为
C. C型行为
D. D型行为
E. E型行为
[答案] A
[解析] 正确答案为A。题干描述完美匹配A型行为特征：①竞争性强、好胜；②时间紧迫感（说话快、走路快、时间不够用）；③敌意与攻击性（脾气暴躁、易激动）。B型行为与A型相反，表现为从容、耐心；C型行为与癌症相关，特征为压抑情绪、过分合作；D型行为为"忧伤型"人格。本题考察行为类型分类及其核心特征。

[题目] 16. 有关心理社会因素对心身疾病的影响,不正确的是(  )。
A. 社会因素通过心理因素起作用
B. 紧张和竞争激烈的社会生活方式易导致心血管疾病、车祸和自杀
C. 心理因素必须通过生理的中介才能引起心身疾病
D. 心理因素主要有个体的人格,情绪,认知、评价方式和应对方式等
E. 人格在心身疾病的发生、发展和病程的转归上作用最大
[答案] E
[解析] 正确答案为E。心身疾病的发生是多种因素综合作用的结果，心理社会因素通过神经-内分泌-免疫中介机制致病。E选项夸大了个体人格的作用，心身疾病的病因是多因素的（生物、心理、社会），没有任何单一因素可称为"作用最大"。A、B、C、D均为正确的学术表述。本题考察心身疾病的生物-心理-社会综合模式。

[题目] 17. 明显与心理因素相关的躯体疾病是(  )。
A. 瘾病
B. 反应性精神病
C. 疑病性神经症
D. 疼痛
E. 心身疾病
[答案] E
[解析] 正确答案为E。此题与第13题考点相同，强调"躯体疾病"。心身疾病是指心理社会因素参与发病的躯体器质性疾病。A癔病属于神经症性障碍，虽有躯体症状但非器质性病变；B反应性精神病和C疑病性神经症均属精神障碍；D疼痛仅为症状。本题重复考察心身疾病的核心概念——心理因素相关的躯体疾病。

[题目] 18. 有关心身疾病中的冠心病,下述说法哪项不正确( )
A. ⾼脂血症是生理原始病因
B. A型性格⼈群中冠心病发病率是B型的三倍
C. 紧张情绪不是冠心病发病的重要原因之一
D. 改变精神状态和行为方式可改善预后但不能预防其发作
E. 它是近代社会严重威胁⼈类健康的一种心身疾病
[答案] C
[解析] 正确答案为C。C选项明显错误，紧张情绪通过激活交感神经、升高血压和血脂、促进血小板聚集等机制，是冠心病发病的重要心理危险因素。A高脂血症是生物学基础；B A型行为者冠心病发病率约为B型的2~3倍；D和E均为正确的学术观点。本题考察冠心病的心身医学研究成果。

[题目] 19. 按照心身医学的观点,下列哪项属于心身疾病(   )。
A. 精神分裂症
B. 抑郁症
C. 消化性溃疡
D. 大叶性肺炎
E. 精神发育迟滞
[答案] C
[解析] 正确答案为C。消化性溃疡是经典心身疾病，心理应激通过迷走神经兴奋致胃酸分泌增加、黏膜防御下降而致病。A精神分裂症为精神病性障碍；B抑郁症为情感障碍；D大叶性肺炎为感染性疾病（肺炎链球菌）；E精神发育迟滞为神经发育障碍。三者均无心理因素介导的躯体器质性病变特征。本题考察心身疾病与各类疾病的鉴别。

[题目] 20. 公认的心身疾病在一般人口中的患病率为(  )。
A. 30%
B. 45%
C. 75%
D. 25%
E. 60%
[答案] A
[解析] 正确答案为A。根据国内外流行病学调查，心身疾病在综合医院就诊患者中约占1/3，在一般人群中的患病率约为30%。B45%、C75%均过高估计，D25%和E60%与统计数据不符。需要注意的是，该数据因诊断标准和调查方法不同略有波动，但30%是教材中较公认的参考值。本题考察心身疾病的流行病学基本数据。

[题目] 21. 可预防心身疾病的措施除外(  )。
A. 减少负性情绪对健康的不良影响
B. 正确认识各种生活事件
C. 养成健康行为习惯和生活方式
D. 多参加社会活动
E. 劳逸结合,不超负荷工作
[答案] D
[解析] 正确答案为D。心身疾病预防的核心策略是减少心理应激源、增强个体应对能力和建立健康生活方式。A减少负性情绪、B正确认知生活事件、C健康行为习惯、E劳逸结合均直接针对上述目标。D"多参加社会活动"虽然对一般心理健康有益，但并非心身疾病预防的特异性措施，且过度社交可能增加人际应激。本题考察心身疾病预防措施的特异性。

[章节] 病人心理和医患沟通

[单选题]

[题目] 1. 一般来说,病人最常见.最重要的⼼理变化是(  )。
A. 情绪变化
B. 意志变化
C. 人格变化
D. 认知功能变化
E. 以上都不是
[答案] A
[解析]
正确答案为A。疾病带来的心理变化中，情绪变化最常见，如焦虑、恐惧、抑郁等。B意志变化、C人格变化、D认知功能变化虽可出现，但均不如情绪变化普遍和直接。本题考察病人的心理反应特点。

[题目] 2. 医患交往是(  )。
A. 技术水平沟通
B. 非言语沟通
C. 语言沟通
D. 非技术水平沟通
E. 以上都正确
[答案] E
[解析]
正确答案为E。医患交往包括技术水平沟通（诊断治疗）和非技术水平沟通（情感交流），后者又包含语言沟通和非语言沟通（表情、姿态等），故以上都正确。本题考察医患交往的多样性。

[题目] 3. 共同参与型的医患关系模式比较适合于(  )。
A. 慢性病人
B. 急性病人
C. 绝症病人
D. 重症病人
E. 成年病人
[答案] A
[解析]
正确答案为A。共同参与型医患关系中，患者主动参与诊疗决策，适用于慢性病人（如糖尿病、高血压），他们久病成医，有能力参与决策。B急性病人、C绝症病人、D重症病人多需指导-合作或主动-被动模式。

[题目] 4. 医患间交往障碍的原因,医生⽅面可能有( )。
A. 以是否有“科研价值”为标准对待病人
B. 对病人的病痛缺乏同情⼼
C. 关⼼对⽅能否给自⼰带来物质利益
D. 情绪不稳
E. 以上原因都可能
[答案] E
[解析]
正确答案为E。医生方面的交往障碍包括以科研价值衡量病人、对病痛缺乏同情心、以物质利益为导向、情绪不稳定等，A、B、C、D均可能，故全选。本题考察医患交往障碍的多源性。

[题目] 5. 对于切除阑尾的术后病人,下列哪种医患模式⽐较合理( )
A. 共同参与型
B. 被动-主动型
C. 指导-合作型
D. 主动-被动型
E. 合作-指导型
[答案] C
[解析]
正确答案为C。阑尾切除术后患者意识清醒、有自主能力，但需遵从医嘱进行术后康复，医生指导、患者配合，故为指导-合作型。A共同参与型适合慢性病；D主动-被动型适合昏迷等无自主能力者。

[题目] 6. 医生在与某慢性病患者的交往中,医患关系最理想的模式是()
A. 主动-被动型
B. 共同参与型
C. 主动型
D. 服从型
E. 指导-合作型
[答案] B
[解析]
正确答案为B。慢性病患者病程长、自我管理经验丰富，理想的医患关系模式是共同参与型，医患双方共同决策。A主动-被动型适合危重患者；E指导-合作型适合急性病患者。

[题目] 7. 下列不属于医务人员非语言沟通技巧的是(  )。
A. 语调
B. 表情
C. 身体姿势
D. ⽬光
E. ⽂字暗⽰
[答案] E
[解析]
正确答案为E。非语言沟通包括语调、表情、身体姿势、目光等，而文字暗示属于语言沟通的书面形式。本题考察非语言沟通与语言沟通的区分。

[题目] 8. 病人安于已适应的角色,小病大养,该出院而不愿意出院,此时病人的状态属于角色行为(  )。
A. 减退
B. 缺如
C. 冲突
D. 强化
E. 异常
[答案] D
[解析]
正确答案为D。角色行为强化指病人安于病人角色，小病大养，不愿出院。A角色减退是过早脱离角色；B缺如是不承认有病；C冲突是角色间矛盾。本题考察病人角色适应不良的类型。

[题目] 9. 适用于“主动-被动型”医患关系模式的患者群体一般不包括(  )。
A. 昏迷患者
B. 婴幼儿患者
C. 焦虑症患者
D. 痴呆患者
E. 精神分裂症缺乏自知力患者
[答案] C
[解析]
正确答案为C。主动-被动型适用于无决策能力的患者，如昏迷、婴幼儿、痴呆、精神分裂症无自知力者。焦虑症患者意识清晰、有自主能力，应适用指导-合作或共同参与型。

[题目] 10. 对于病人来说,下列哪项是最重要.最优先的需要?( )
A. 尊重的需要
B. 爱与归属的需要
C. 生理需要
D. 安全的需要
E. 获得诊疗信息的需要
[答案] D
[解析]
正确答案为D。根据马斯洛需要层次理论，安全需要是最基本需要之一。患病后患者首先担心疾病对生命的威胁，因此安全需要最为优先。A尊重需要、B爱与归属均在其后。本题考察病人需要层次。

[题目] 11. 医务人员与患者沟通时,适宜的方式是(   )
A. 回避目光
B. 多用自我表露
C. 加快语速
D. 多用术语
E. 注意倾听
[答案] E
[解析]
正确答案为E。注意倾听是医患沟通的核心技巧，体现尊重和关注。A回避目光会让患者感到不被重视；B多用自我表露不恰当；C加快语速不利于理解；D多用术语会造成沟通障碍。

[题目] 12. 某位病人患了性传播疾病,接受治疗。医生把此事告诉了病人单位⾥的其他人。单位⾥人得知此事后,都回避病人,和他断绝了一切来往。此现象表明病人下列哪项权利受到侵犯(  )。
A. 免除健康时的社会责任
B. 病人的经济利益
C. 享受医疗服务
D. 被尊重和保守个人秘密的权利
E. 以上都不是
[答案] D
[解析]
正确答案为D。医生将患者隐私告知他人，侵犯了患者被尊重和保守个人秘密的权利。A免除社会责任、B经济利益、C享受医疗服务均未直接涉及。本题考察患者隐私权。

[题目] 13. 医患间的沟通方式中,哪项不属于非言语沟通(  )。
A. 面部表情
B. 说话声调
C. 身体姿态
D. 眼神手势
E. 书面通知
[答案] E
[解析]
正确答案为E。非言语沟通包括面部表情、说话声调、身体姿态、眼神手势等身体语言，书面通知是文字形式的言语沟通。本题考察非言语沟通的范畴。

[题目] 14. 良好的医患关系的重要性体现在(   )。
A. 有利于医疗工作的顺利进⾏
B. 有利于医务人员的身⼼健康
C. 本身就是一种治疗手段
D. 提高病人对医务人员的信任度
E. 以上都正确
[答案] E
[解析]
正确答案为E。良好医患关系有利于医疗顺利开展、医务人员身心健康、本身就是治疗手段、提高患者信任度，A、B、C、D全部正确。本题考察医患关系的重要性。

[题目] 15. 某青年在一次事故中失去双腿,当从昏迷中醒来后,就不吃不喝,不与任何人讲话,三天后曾用刀片割腕自杀,这属于病人角色转化中的(  )。
A. 角色行为冲突
B. 角色行为强化
C. 角色行为缺如
D. 角色行为减弱
E. 角色行为异常
[答案] E
[解析]
正确答案为E。角色行为异常指病人受病痛折磨而出现自杀、自伤等异常行为。A冲突是角色间的矛盾；B强化是安于病人角色；C缺如是不承认有病；D减退是过早脱离角色。

[题目] 16. 患者在患病后变得以自我为中心.兴趣狭窄.依赖性增强,并过分关注自己的机体功能。这种心理反应属于(   )
A. 猜疑加重
B. 行为退化
C. 感情淡漠
D. 焦虑增强
E. 情绪低落
[答案] B
[解析]
正确答案为B。行为退化（退行）是指患者行为表现与年龄和社会角色不符，以自我为中心、兴趣狭窄、依赖性增强。A猜疑加重、C感情淡漠、D焦虑增强、E情绪低落均不符合该描述。

[题目] 17. 不属于医患关系的重要性的是(   )。
A. 本身就是一种治疗手段
B. 有利于医患关系模式转变为共同参与型
C. 造就良好的⼼理⽓氛
D. 提高病人的社交能⼒
E. 提高病人依从性
[答案] D
[解析]
正确答案为D。提高病人社交能力不是医患关系的重要性。医患关系的作用包括：本身就是治疗手段、造就良好心理气氛、提高病人依从性、有利于模式转变等。本题考察医患关系作用。

[题目] 18. 不属于病人权利内容的是( )。
A. 享受医疗服务
B. 遵守医疗部门规章制度
C. 受到社会尊重和理解
D. 保守个人秘密
E. 免除或部分免除健康时的社会责任
[答案] B
[解析]
正确答案为B。遵守医疗部门规章制度是患者的义务而非权利。患者权利包括：享受医疗服务、受社会尊重和理解、保守个人秘密、免除或部分免除健康时的社会责任。

[题目] 19. 医生判断患者疾病已经康复,但患者要求再治疗一个疗程,以巩固疗效,属于()。
A. 角色行为冲突
B. 角色行为减退
C. 角色行为异常
D. 角色行为强化
E. 角色行为缺如
[答案] D
[解析]
正确答案为D。患者疾病已康复但仍要求再治疗，属于角色行为强化（安于病人角色，不愿脱离）。A冲突是角色间矛盾；B减退是过早脱离角色；C异常是出现极端行为；E缺如是不承认有病。

[题目] 20. 不属于病人权利内容的是(  )。
A. 享受医疗服务
B. 遵守医疗部门规章制度
C. 受到社会尊重和理解
D. 保守个人秘密
E. 免除或部分免除健康时的社会责任
[答案] B
[解析]
正确答案为B。同第18题，遵守医疗部门规章制度是病人的义务，不是权利。其他选项均属于病人权利内容。本题考察病人权利与义务的区分。

[题目] 21. 男性,61岁。刚刚从岗位上退休下来被诊断患有肝硬化合并腹水。他承认有病,但他仍想完成某本书的写作任务,甚至搬到办公室住,废寝忘食而忽略了治疗。该患者的行为属于病人角色行为的(  )。
A. 缺如
B. 冲突
C. 减退
D. 强化
E. 异常
[答案] C
[解析]
正确答案为C。角色行为减退指病人因其他角色（如作家、工作者）的职责而忽略治疗。患者承认有病但废寝忘食写作，属于角色减退。A缺如是不承认有病；B冲突是角色间矛盾；D强化是安于病人角色。

[题目] 22. 青年住院患者常见的心理问题一般不包括(  )。
A. 盲目乐观
B. 焦虑
C. 抑郁
D. 依从性差
E. 生理功能减退
[答案] E
[解析]
正确答案为E。生理功能减退是疾病本身或老化的生理表现，并非心理问题。青年住院患者的常见心理问题包括：盲目乐观、焦虑、抑郁、依从性差。本题考察不同年龄段患者的心理特点。

[题目] 23. 下列关于病人的退化行为的表现不包括( )。
A. 不配合治疗
B. 自我中心加强
C. 依赖性加强
D. 兴趣狭窄
E. 行为表现与年龄、社会角色不相称
[答案] A
[解析]
正确答案为A。退化行为表现为自我中心加强、依赖性加强、兴趣狭窄、行为表现与年龄和社会角色不相称。不配合治疗不属于退化行为，可能是其他心理反应如愤怒、抵触。

[题目] 24. 某位病人患了性传播疾病,接受治疗。医生把此事告诉了病人单位⾥的其他人。单位⾥人得知此事后,都回避病人,和他断绝了一切来往。此现象表明病人下列哪项权利受到侵犯()。
A. 免除健康时的社会责任
B. 病人的经济利益
C. 享受医疗服务
D. 被尊重和保守个人秘密的权利
E. 以上都不是
[答案] D
[解析]
正确答案为D。同第12题，医生泄露患者隐私（性病诊断），侵犯了患者被尊重和保守个人秘密的权利。本题重复考察患者隐私权这一核心知识点。

[题目] 25. 医患关系的重要性不包括(  )。
A. 提高遵医嘱率
B. 有利于医患关系模式转变为共同参与型
C. 造就良好的心理气氛
D. 提高病人的社交能力
E. 本身就是一种治疗手段
[答案] D
[解析]
正确答案为D。同第17题，提高病人社交能力不属于医患关系的重要性。医患关系的重要性包括：有利于治疗、提高依从性、本身就是治疗手段、造就良好心理气氛等。

[题目] 26. 指导—合作型医患关系中(  )。
A. 病人是医疗的(服从)合作者
B. 医患关系如同父母—婴儿
C. 病人多是慢性疾病
D. 医生帮助病人自助
E. 病人指导医生
[答案] A
[解析]
正确答案为A。指导-合作型中医患关系是指导与被指导的关系，患者是合作的服从者。B父母-婴儿是主动-被动型的特点；C慢性疾病多适合共同参与型；D帮助病人自助是共同参与型。

[题目] 27. 医生判断患者疾病已经康复,但患者本人认为自己还需要住院治疗,属于(  )
A. 角色行为减退
B. 角色行为异常
C. 角色行为强化
D. 角色行为冲突
E. 角色行为缺如
[答案] C
[解析]
正确答案为C。医生认为已康复但患者认为仍需住院，属于角色行为强化——患者不愿脱离病人角色。A减退是过早脱离角色；B异常是极端行为；D冲突是角色间矛盾；E缺如是不承认有病。

[题目] 28. 影响医患关系的社会⽂化因素是指(  )。
A. 心理应激
B. 性格特征
C. 社会角色
D. 兴趣.信念与价值观
E. 以上都正确
[答案] C
[解析]
正确答案为C。影响医患关系的社会文化因素主要指社会角色——医患双方在社会结构中的角色定位及期望。A心理应激、B性格特征、D兴趣信念价值观属于心理因素。

[题目] 29. 医务人员凭借自己的医学知识和技术为病人作出诊断并进行治疗,这种医患间的交往是(  )。
A. 技术水平的交往
B. 非技术水平的交往
C. 病人的依附性
D. 病人的依从性
E. 以上都不是
[答案] A
[解析]
正确答案为A。医务人员凭借医学知识和技术进行诊断治疗，属于技术水平的交往（围绕诊疗技术的沟通）。B非技术水平交往指情感、社会方面的交流。本题考察医患交往的层次划分。

[题目] 30. 随着病情的变化,医患关系可以(   )。
A. 一直保持不变
B. 由主动-被动转化为指导-合作
C. 最终都要进⼊到共同参与型
D. 由主动-被动转化为共同参与
E. 由一种模式转向另一种模式
[答案] E
[解析]
正确答案为E。医患关系模式随着病情变化而动态转换，从一种模式转向另一种模式。A保持不变不符合实际；B、C、D的转化路径过于绝对。本题考察医患关系模式的动态性。

[题目] 31. 三种医患关系中,医生需努力调动病人积极性的是(  )。
A. 主动—被动型
B. 指导—合作型
C. 共同-参与型
D. 患者至上型
E. 互惠型
[答案] C
[解析]
正确答案为C。共同参与型要求医生充分调动患者的积极性，鼓励患者参与自身健康管理。A主动-被动型患者完全被动；B指导-合作型患者只需服从。本题考察三种模式的本质区别。

[题目] 32. 当个体产生不适感或病感时,自觉地做出决定而产生求医行为的属于(  )。
A. 主动求医
B. 被动求医
C. 强制求医
D. 被迫求医
E. 延迟求医
[答案] A
[解析]
正确答案为A。个体自觉产生不适感后主动就医，属于主动求医行为。B被动求医是他人决定就医；C强制求医是法律强制；D被迫求医是迫于外界压力。

[题目] 33. 一般来说,病人最常见.最重要的心理变化是(   )。
A. 情绪变化
B. 意志变化
C. 人格变化
D. 认知功能变化
E. 价值观变化
[答案] A
[解析]
正确答案为A。同第1题，病人最常见、最重要的心理变化是情绪变化。疾病作为一种应激源，首先引发焦虑、恐惧、抑郁等情绪反应。本题重复考察核心知识点。

[题目] 34. 病人痊愈出院后,迟迟不愿重返工作岗位,这种情况属于病人角色变化的哪一种(   )。
A. 病人角色缺如
B. 病人角色强化
C. 病人角色冲突
D. 病人角色恐惧
E. 病人角色减退
[答案] B
[解析]
正确答案为B。病人痊愈出院后迟迟不愿重返工作岗位，属于角色行为强化——安于病人角色，享受免除社会责任的待遇。A缺如是不承认有病；C冲突是角色间矛盾；D恐惧是对疾病的过度害怕。

[题目] 35. 不属于医患关系的重要性的是( )。
A. 本身就是一种治疗手段
B. 有利于医患关系模式转变为共同参与型
C. 造就良好的⼼理⽓氛
D. 提高病人的社交能⼒
E. 提高病人依从性
[答案] D
[解析]
正确答案为D。同第17/25题，提高病人社交能力不是医患关系的重要性。其他四项均为良好医患关系的重要作用。本题反复考察以强化记忆。

[题目] 36. 一位⼥医生声调柔和,⽬光亲切,讲话面带微笑,她在哪⽅面做得好( )
A. 言语沟通
B. 非言语沟通
C. 言语沟通和非言语沟通
D. ⽬光沟通
E. 以上都不是
[答案] B
[解析]
正确答案为B。声调柔和、目光亲切、面带微笑均属于非语言沟通（体态语和副语言）。A言语沟通指语言文字交流；C言语沟通和非言语沟通的说法过于宽泛。

[题目] 37. 一位慢性白血病患者化疗期间在家出现发热,再次⼊院,患者要求医生按“感冒”治疗,医生耐心解释病情,患者大吵大闹,并有攻击行为。这是病人角色的()。
A. 角色行为缺如
B. 角色行为冲突
C. 角色行为减退
D. 角色行为强化
E. 角色行为异常
[答案] E
[解析]
正确答案为E。患者大吵大闹并有攻击行为，属于角色行为异常——出现暴力、攻击等极端行为。A缺如是不承认有病；B冲突是角色内心矛盾；C减退是过早脱离角色；D强化是安于病人角色。

[题目] 38. 危重昏迷病人经治疗后脱离危险,进⼊康复期,医患关系交往模式的类型将发生的变化为( )
A. 主动-被动型转化为指导-合作型
B. 主动-被动型转化为共同参与型
C. 指导-合作型转化为共同参与型
D. 指导-合作型转化为主动-被动型
E. 共同参与型转化为主动-被动型
[答案] B
[解析]
正确答案为B。危重昏迷时患者无自主能力，适用主动-被动型；进入康复期后患者可参与决策，转为共同参与型。C指导-合作型转共同参与型不符合初始昏迷状态。

[题目] 39. 对于麻醉病人,一般适宜采用的医患关系模式是(  )。
A. 指导-合作型
B. 共同参与型
C. 接近-疏远型
D. 主动-被动型
E. 依赖-反依赖型
[答案] D
[解析]
正确答案为D。麻醉病人无意识、无自主决策能力，适合主动-被动型模式，医生完全主导。A指导-合作型适合意识清醒的急性患者；B共同参与型适合慢性病患者。

[题目] 40. 以下关于病人的义务不包括( )。
A. 认真遵守医嘱
B. 公开自⼰的经济收⼊
C. 及时就医
D. 遵守医学部门的规章制度
E. 早⽇康复
[答案] B
[解析]
正确答案为B。公开自己的经济收入不是病人的义务。病人义务包括：认真遵守医嘱、及时就医、遵守规章制度、早日康复等。本题考察病人义务的范围。

[题目] 41. 医患关系建立的原则是(  )。
A. 疾病性质和病人年龄
B. 疾病性质和病人的人格特征
C. 疾病病程和病人的经济状况
D. 病人的文化程度和情绪反应
E. 病人的社会地位和经济状况
[答案] B
[解析]
正确答案为B。医患关系建立的原则主要依据疾病性质和病人的人格特征。疾病性质决定需要的医疗照护类型，人格特征影响沟通方式和合作程度。A年龄、C经济状况、D文化程度等均非首要原则。

[题目] 42. 下列关于影响求医⾏为的主要因素不包括(   )。
A. 对症状的认识与评价
B. 医疗保健系统的特点
C. 社会经济情况
D. 病人的⼼理特征
E. 症状发生的部位
[答案] E
[解析]
正确答案为E。症状发生的部位不影响求医行为。影响求医行为的因素包括：对症状的认识与评价、医疗保健系统的特点、社会经济情况、病人的心理特征等。

[题目] 43. 某医院急诊医生接诊了一位遭遇车祸后昏迷的患者,⽴即给予了心肺复苏.⽓管插管等抢救 措施。此时的医患关系所属的模式是( )。
A. 共同参与模式
B. 主动-被动模式
C. 指导-合作模式
D. 合作监督模式
E. 主动权威模式
[答案] B
[解析]
正确答案为B。昏迷患者无自主意识，医生完全主导抢救，属于主动-被动模式。C指导-合作模式需要患者配合；A共同参与模式需要患者参与决策，均不适用于昏迷状态。

[题目] 44. 不影响病人遵医⾏为的因素是(  )。
A. 病人的经济状况
B. 疾病严重程度
C. 医患关系
D. 病人的人⼜统计学特点
E. 治疗计划特点
[答案] A
[解析]
正确答案为A。病人的经济状况一般不直接影响遵医行为。影响遵医行为的因素包括：疾病严重程度、医患关系质量、病人人口学特点、治疗计划特点等。本题考察遵医行为的影响因素。

[题目] 45. Rogers认为医生对患者应具备的成功态度是,除了(  )。
A. 尊重
B. 同感
C. 真诚
D. 关心
E. 保证
[答案] E
[解析]
正确答案为E。人本主义心理学家Rogers认为医生对患者应具备的成功态度包括：尊重、同感（共情）、真诚、关心。「保证」不属于Rogers提出的核心条件。本题考察以人为中心疗法的核心态度。

[题目] 46. 下列关于医患双方权利与义务关系的说法,不正确的是()
A. 维护医务人员权利的关键是尊重其人格尊严
B. 只有维护了患者的权利,医患人员的权利才能真正的维护
C. 保障医疗质量与安全是维护患者权利的关键
D. 作为弱势群体的患者,只享有权利而不承担义务
E. 在医疗实践活动中,医患双方应当履行好各自的义务
[答案] D
[解析]
正确答案为D。患者既是权利主体也是义务主体，不存在只享有权利不承担义务的情况。A、B、C、E说法均正确。本题考察医患双方权利义务的对等性。

[题目] 47. 病人最重要.最优先的需要常常是( )。
A. 生理的需要
B. 爱和归属的需要
C. 安全的需要
D. 尊重的需要
E. 获取信息的需要
[答案] C
[解析]
正确答案为C。同第10题，患者最重要、最优先的需要是安全需要——对疾病预后和生命安全的担忧。A生理需要、D尊重需要等均排在其后。本题反复考察病人需要层次。

[题目] 48. 医生与患者的交谈原则应具有(  )。
A. 隐蔽性
B. 情绪性
C. 广泛性
D. 针对性
E. 指令性
[答案] D
[解析]
正确答案为D。医生与患者的交谈应具有针对性，围绕疾病和诊疗展开，有的放矢。A隐蔽性、B情绪性、C广泛性、D指令性均不是医患交谈应遵循的原则。

[题目] 49. 昏迷入院的病人抢救时医患关系模式是(  )
A. 主动-被动型
B. 指导-合作型
C. 共同参与型
D. 患者至上型
E. 互惠型
[答案] A
[解析]
正确答案为A。昏迷入院患者无意识、无自主能力，需要医生完全主导抢救治疗，属于主动-被动型。B指导-合作型需要患者配合；C共同参与型需要患者参与决策。

[题目] 50. 男,55岁,工程师。因膀胱癌入院准备接受手术治疗。在术前准备期间,患者方面希望尽快恢复健康而配合各种检查和治疗,另一方面又担心自己主持的工程项目出问题而自行离院回单位开会。这种患者角色的状态属于(  )。
A. 角色行为强化
B. 角色行为异常
C. 角色行为适应
D. 角色行为缺如
E. 角色行为冲突
[答案] E
[解析]
正确答案为E。角色行为冲突指患者在承担病人角色的同时，与其他社会角色（如工程师）产生矛盾。该患者既想配合治疗又担心工作，内心冲突。A强化、B异常、D缺如均不符合。

[题目] 51. 医学模式的转变,医患关系应特别注重哪种水平上的交流(  )。
A. 技术水平
B. 非技术水平
C. 言语水平
D. 非言语水平
E. 以上都是
[答案] B
[解析]
正确答案为B。生物-心理-社会医学模式强调心理和社会因素，因此医患关系应特别注重非技术水平（心理情感层面）的交流。A技术水平是传统模式侧重点；C言语、D非言语均属于具体方式。

[题目] 52. 一位急性菌痢的成年患者,头脑清醒.具有知情同意能⼒并信任为他诊疗的医生,他所适用的医患关系模式是( )。
A. 契约模式
B. 指导-合作模式
C. 主动-被动模式
D. 家长制模式
E. 共同参与模式
[答案] B
[解析]
正确答案为B。成年急性菌痢患者意识清晰、有知情同意能力并信任医生，适合指导-合作模式——医生指导，患者主动配合。C主动-被动模式适合无自主能力者；E共同参与模式适合慢性病。

[题目] 53. 下列哪项主要表现病人角色所具有的特征(  )。
A. 治疗行为
B. 求医行为
C. 有疾病行为
D. 与医疗系统发生关系
E. 以上都包括
[答案] E
[解析]
正确答案为A。同第43/49题，昏迷患者无自主意识，医患关系模式为主动-被动型，医生完全主导抢救和治疗。B指导-合作型、C共同参与型均需患者具备自主能力。

[题目] 54. 当一个人真正意识到病情严重,初次感到死亡的威胁时,典型的反应是(  )。
A. 感到抑郁
B. 感到异常愤怒
C. 感到震惊并否认疾病
D. 接受事实,并寻找可能的补救办法
E. 与医生讨价还价
[答案] C
[解析]
正确答案为E。昏迷时主动-被动型，意识恢复后患者能配合，转为指导-合作型；进入康复期后患者可参与决策，进一步转为共同参与型。本题考察模式的动态转化路径。

[题目] 55. 在病人处于急性感染但⽆意识障碍的情况下,通常采用的医患关系模式是(   )。
A. 主动-被动型
B. 指导-合作型
C. 共同参与型
D. ⽗母与婴⼉式的关系
E. 以上四种都不是
[答案] B
[解析]
正确答案为E。冠心病康复期患者需长期自我管理，最理想的模式是共同参与型，医患双方共同制定康复方案。A主动-被动型、B指导-合作型均不适合康复期的自主管理需求。

[题目] 56. 病人的闷闷不乐、忧愁、压抑、悲观、失望、自怜、绝望等消极情绪,属于(   )。
A. 焦虑
B. 恐惧
C. 愤怒
D. 抑郁
E. 接受
[答案] D
[解析]
正确答案为B。昏迷患者无自主能力，医疗完全由医生主导，属于被动-主动型（即主动-被动型）。A指导-合作型、C共同参与型均不适合。本题考察模式的适用条件。

[题目] 57. 患有躯体疾病的病人出现抑郁、压抑、想自杀的状况,该角色⾏为是( )。
A. 强化
B. 冲突
C. 缺如
D. 减退
E. 异常
[答案] E
[解析]
正确答案为B。急性病患者病情紧急但意识清晰，需要医生指导、患者配合，适合指导-合作型。A主动-被动型适合无自主能力者；C共同参与型适合慢性病康复期。

[题目] 58. 未经本人同意,某吸毒者被公安人员送到戒毒所戒毒,这种求医类型是()。
A. 主动型
B. 被动型
C. 合作型
D. 强制型
E. 服从型
[答案] D
[解析]
正确答案为C。角色行为减退指患者在承担病人角色的同时，因其他角色需要而忽略治疗。该患者逃避病人角色去从事其他活动，属于角色减退。A冲突是内心矛盾；B缺如是不承认有病。

[题目] 59. 一位女医生声调柔和,目光亲切,讲话面带微笑,她做得好的是(  )。
A. 言语沟通
B. 非言语沟通
C. 技术沟通
D. 目光沟通
E. 非技术沟通
[答案] B
[解析]
正确答案为B。患者因家庭事务（儿子结婚）而忽略自身治疗，属于角色行为减退——其他社会角色压倒了病人角色。A强化是安于病人角色；C冲突是心理矛盾；D缺如是否认有病。

[题目] 60. 某病人,由于急性胰腺炎被送入监护病房,入监护病房后病人得了“ICU综合征”。所谓的“ICU综合征”是指病人进入监护病房后所产生的(  )。
A. 情绪反应和意志改变
B. 认知改变和情绪反应
C. 感觉异常和知觉异常
D. 意识改变和行为异常
E. 认知改变和行为异常
[答案] B
[解析]
正确答案为E。医患沟通的形式包括言语沟通（交谈、书面）和非言语沟通（表情、姿态、眼神等），A、B、C、D均为具体形式。本题考察医患沟通形式的全面性。

[题目] 61. 病人抑郁、厌世、以至自杀,属于(    )。
A. 角色行为强化
B. 角色行为异常
C. 角色行为冲突
D. 角色行为减退
E. 角色行为缺如
[答案] B
[解析]
正确答案为B。患者因疾病折磨出现厌世、自杀行为，属于角色行为异常——极端消极行为。A强化是安于病人角色；C冲突是角色矛盾；D减退是过早脱离角色；E缺如是不承认有病。

[题目] 62. 在医患互动中,非语言沟通的技巧不包括()
A. 注意倾听
B. 身段表情
C. 人际距离
D. 面部表情
E. 目光接触
[答案] A
[解析]
正确答案为A。注意倾听是言语沟通中的技巧，不属于非语言沟通。非语言沟通包括身段表情、人际距离、面部表情、目光接触等。本题考察非语言沟通与语言沟通的区分。

[题目] 63. 心理护理的主要目标是( )。
A. 明确患者的人生目标
B. 消除不良的情绪反应
C. 树立良好的道德观念
D. 提高患者的智力水平
E. 改善患者的躯体症状
[答案] B
[解析]
正确答案为B。心理护理的主要目标是帮助患者消除不良的情绪反应（焦虑、抑郁、恐惧等），恢复心理平衡。A明确人生目标、C树立道德观念、D提高智力水平均不是心理护理的直接目标。

[题目] 64. 女,48岁,某乡镇企业负责人。5个月前被确诊为乳腺癌并接受了手术治疗。术后患者仅休息了 2个月,便全身心投入了工作,同患病前一样从事日常工作,参加各种会议和活动。对于自己身体的康复情况并不重视,不按要求到医院复查,也不愿再接受任何其他的治疗。该女性角色行为改变类型属于( )
A. 角色行为冲突
B. 角色行为缺如
C. 角色行为异常
D. 角色行为减退
E. 角色行为强化
[答案] D
[解析]
正确答案为D。角色行为减退指患者因其他角色（工作）而忽略自身疾病管理和治疗。该患者术后仅休息2个月便投入工作，不复查、不接受治疗，属于典型的角色减退。

[题目] 65. 某癌症患者,心理状态较差且预后不良,治疗过程中需要家属的积极配合。对此, 医生关于患者的最佳告知方式是( )
A. 告知家属部分病情并向患者保密
B. 告知家属实情并对患者适度告知
C. 告知患者部分病情并向家属保密
D. 直接告知患者实情
E. 告知患者及家属实情
[答案] B
[解析]
正确答案为B。对于癌症患者，最佳告知方式是告知家属实情，同时根据患者心理状况适度告知患者，既保障知情权又避免打击。A完全保密侵犯知情权；C、D、E均未考虑患者心理承受力。

[题目] 66. 医患互动中,非言语沟通的技巧不包括(   )。
A. 注意倾听
B. 身段表情
C. 人际距离
D. 面部表情
E. 语调表情
[答案] A
[解析]
正确答案为A。同第62题，注意倾听属于言语沟通技巧，不属于非言语沟通。身段表情、人际距离、面部表情、语调表情均是非言语沟通方式。本题重复考察以强化区分。

[题目] 67. ⼉童患者住院后常见的⼼理问题一般不包括()。
A. 不安全感
B. 分离性焦虑
C. 依赖感
D. 抑郁⼼理
E. 对陌生环境的恐惧
[答案] D
[解析]
正确答案为D。儿童住院常见的心理问题包括：不安全感、分离性焦虑、依赖感、对陌生环境的恐惧。抑郁心理在儿童中相对少见，更多见于成人患者。本题考察不同年龄段的心理特点。

[题目] 68. 男,55岁。机关干部。患胃溃疡多年本次因胃出血入院,手术治疗后,病情平稳。此时,医患关系模式为( )。
A. 共同参与型
B. 指导-合作型
C. 被动-主动型
D. 主动-主动型
E. 主动-被动型
[答案] B
[解析]
正确答案为B。胃溃疡术后患者病情平稳、意识清晰，需要遵从医嘱进行康复，适合指导-合作型。E主动-被动型适合昏迷等无自主能力者；A共同参与型适合慢性病长期管理。

[题目] 69. 下列关于医患关系特点的表述错误的是(    )
A. 医者应保持情感的中立性
B. 双方目的的一致性
C. 人格尊严.权利上的平等性
D. 医学知识和能力的对称性
E. 医患矛盾存在的必然
[答案] D
[解析]
正确答案为D。医患双方在医学知识和能力上是不对称的——医生掌握专业知识，患者相对欠缺。A情感中立性、B目的一致性、C人格平等性、E矛盾必然性均属正确表述。

[题目] 70. 医患关系的本质特征是( )
A. 具有互利性质的经济关系
B. 具有买卖性质的依附关系
C. 具有协作性质的买卖关系
D. 具有依附性质的非平等关系
E. 具有契约性质的信托关系
[答案] E
[解析]
正确答案为E。医患关系的本质特征是具有契约性质的信托关系——患者在信任基础上将健康权益托付给医生，同时通过挂号等行为形成契约关系。A、B、C、D均片面。

[题目] 71. 医患交往障碍在医生方面的原因可能是(  )。
A. 医疗技术不过硬
B. 只看病不看人
C. 以科研价值衡量病人
D. 以物质利益确定医患关系
E. 以上都是
[答案] E
[解析]
正确答案为E。医生方面的交往障碍包括：医疗技术不过硬、只看病不看人、以科研价值衡量病人、以物质利益确定医患关系等，A、B、C、D均为可能的原因。

[题目] 72. 对同一个病人(  )。
A. 医患关系模式应保持不变
B. 医患关系模式应根据病人的情绪变化改变
C. 医患关系模式应根据病人的病情变化改变
D. 医患关系模式应根据病人的年龄变化改变
E. 医患关系模式应根据当地医疗水平变化改变
[答案] C
[解析]
正确答案为C。对同一个病人，医患关系模式应根据病情变化而改变——如从昏迷到清醒到康复，模式依次转换。A永远不变、B随时在变、D依年龄变化、E依医疗水平变化均不准确。

[题目] 73. 胃出血患者,入院手术治疗采取的模式是()
A. 主动-被动型
B. 共同参与型
C. 主动型
D. 服从型
E. 指导-合作型
[答案] E
[解析]
正确答案为E。胃出血患者入院手术治疗，患者意识清晰、可配合，医生指导、患者合作，适合指导-合作型。A主动-被动型适合无自主能力者；B共同参与型适合慢性病长期管理。

[题目] 74. 病人对医务人员出现攻击性行为属于(      )
A. 病人角色减退
B. 病人角色缺如
C. 病人角色冲突
D. 病人角色强化
E. 病人角色异常
[答案] E
[解析]
正确答案为E。病人对医务人员出现攻击性行为，属于角色行为异常——以暴力方式表达不满或痛苦。A减退是过早脱离角色；B缺如是否认有病；C冲突是内心矛盾；D强化是安于病人角色。

[题目] 75. 对于慢性病患者,较常采用的医患关系模式是( )。
A. 共同-参与型
B. 指导-合作型
C. 主动-被动型
D. ⽗母与⼉童式的关系
E. 以上都不是
[答案] A
[解析]
正确答案为A。慢性病患者需要长期自我管理，适合共同参与型（共同-参与型），医患双方共同制定治疗方案。B指导-合作型适合急性病；C主动-被动型适合无自主能力者。

[题目] 76. 有些患者常莫名其妙的没事时站在护士办公室门外,这反映患者何种心理()。
A. 焦虑
B. 依赖
C. 孤独
D. 同情
E. 择优
[答案] C
[解析]
正确答案为C。患者没事时站在护士办公室门外，反映其孤独心理，渴望与人接触和交流。A焦虑表现为紧张不安；B依赖表现为过度依附他人；D同情是对他人的同理。

[题目] 77. 某病人现年53岁,在一次⼼肌梗死发作后长期卧床,病情好转并且稳定后仍拒绝参加任何活动,每次吃饭要妻⼦喂⾷,起床要妻⼦帮助穿⾐。他的⾏为表现属于(  )
A. 病人角色⾏为异常
B. 病人角色⾏为强化
C. 病人角色⾏为缺如
D. 病人角色⾏为减退
E. 以上都不是
[答案] B
[解析]
正确答案为B。患者病情好转后仍拒绝活动、依赖他人喂食穿衣，属于角色行为强化——安于被照顾的病人角色。A异常是极端行为；C缺如是否认有病；D减退是过早脱离角色。

[题目] 78. 病人的闷闷不乐.忧愁.压抑.悲观.失望.自怜.绝望等消极情绪,属于(  )。
A. 焦虑
B. 恐惧
C. 愤怒
D. 抑郁
E. 接受
[答案] D
[解析]
正确答案为D。闷闷不乐、忧愁、压抑、悲观、失望、自怜、绝望等描述均属于抑郁的典型表现。A焦虑以紧张担忧为主；B恐惧以害怕为主；C愤怒以敌意为主。本题考察常见情绪反应的区分。

[题目] 79. 某乙肝患者升学体检中掩盖病情,报考了一所要求肝功能正常的大学。这种行为属于病人角色适应不良的(  )。
A. 角色行为冲突
B. 角色行为减退
C. 角色行为缺如
D. 角色行为异常
E. 角色行为强化
[答案] C
[解析]
正确答案为C。角色行为缺如指患者不承认自己有病或否认病情的严重性。该乙肝患者掩盖病情，不接受病人角色，属于角色行为缺如。A冲突、B减退、D异常、E强化均不符合。

[题目] 80. 患者表现平静,客观面对患病现实,关注自身疾病,遵行医嘱所体现的患者角色行为类型()
A. 角色行为冲突
B. 角色行为减退
C. 角色行为异常
D. 角色行为确如
E. 角色行为适应
[答案] E
[解析]
正确答案为E。角色行为适应指患者能平静接受患病现实，主动配合治疗。患者表现平静、客观面对、遵行医嘱，符合角色行为适应的特征。A、B、C、D均为适应不良的类型。

[题目] 81. 在医患交往的过程中,医护人员不恰当的交往⽅式是(   )。
A. 用专业术语进⾏交流
B. 重视患者的自我感受
C. 关注疾病本身和相关话题
D. 采取封闭和开放式的提问
E. 了解患者的安全需要
[答案] A
[解析]
正确答案为A。用专业术语进行交流是不恰当的沟通方式，会造成患者的理解障碍。B重视患者自我感受、C关注疾病和相关话题、D采用合适的提问方式、E了解患者安全需要均属恰当方式。

[题目] 82. 在病人常见的⼼理问题中,常表现为⾏为与年龄.社会角色不相符合,想回到婴⼉时期,此病人的⼼理状态属于(   )。
A. 焦虑
B. 回避
C. 猜疑
D. 愤怒
E. 退化
[答案] E
[解析]
正确答案为E。退化（退行）指患者行为表现与年龄、社会角色不相符合，回到较幼稚的行为模式。A焦虑、B回避、C猜疑、D愤怒均不能准确描述该表现。

[题目] 83. 医患冲突的结果,可能造成(  )。
A. 病人难以公开谈出自⼰的需要
B. 病人不遵从医嘱
C. 病人的被动一攻击⾏为
D. 病人情绪不好
E. 上述情况都可能发生
[答案] E
[解析]
正确答案为E。医患冲突可能导致：患者难以公开表达需要、不遵从医嘱、出现被动-攻击行为、情绪不良等，A、B、C、D均为可能后果。本题考察医患冲突的消极影响。

[题目] 84. 医患之间技术水平的交往和非技术水平交往的关系是(   )
A. 相互支持
B. 没有关系
C. 非此即彼
D. 相互抵消
E. 以上都不对
[答案] A
[解析]
正确答案为A。技术水平的交往和非技术水平的交往相互支持、相辅相成——良好的技术水平可增强信任，良好的非技术水平有助于治疗配合。B没有关系、C非此即彼、D相互抵消均错误。

[题目] 85. 经抢救意识逐渐恢复,此时的医患关系模式是(  )。
A. 主动-被动型
B. 指导-合作型
C. 共同-参与型
D. 患者至上型
E. 互惠型
[答案] B
[解析]
正确答案为B。经抢救意识逐渐恢复后，患者可配合治疗，医患关系模式从主动-被动型转为指导-合作型。A主动-被动型适合无意识状态；C共同参与型适合康复期。

[题目] 86. 下列哪项是医患之间最主要的人际交往方式(  )
A. 表情
B. 人际距离
C. 目光接触
D. 交谈
E. 以上都是
[答案] D
[解析]
正确答案为D。医患之间最主要的人际交往方式是交谈（言语沟通）。A表情、B人际距离、C目光接触均为非语言沟通的辅助方式。本题考察医患沟通的主要形式。

[题目] 87. 某位病人患了性传播疾病,接受治疗。医生把此事告诉了病人单位⾥的其他人。单位⾥人得知此事后,都回避病人,和他断绝了一切来往。此现象表明病人下列哪项权利受到侵犯(    )
A. 免除健康时的社会责任
B. 病人的经济利益
C. 享受医疗服务
D. 被尊重和保守个人秘密的权利
E. 以上都不是
[答案] D
[解析]
正确答案为D。同第12/24题，医生泄露患者隐私（性传播疾病），侵犯了患者被尊重和保守个人秘密的权利。本题第三次出现，强化对患者隐私权的认识。

[题目] 88. 对于糖尿病人,一般适宜采用的医患关系模式是(  )。
A. 指导-合作型
B. 共同参与型
C. 接近-疏远型
D. 主动-被动型
E. 互助互惠型
[答案] B
[解析]
正确答案为B。糖尿病属于慢性病，需要患者长期自我管理（饮食、运动、监测血糖），适合共同参与型医患关系模式。A指导-合作型适合急性病；D主动-被动型适合无自主能力者。

[题目] 89. 下列哪项不是提高病人依从性的⽅法(   )。
A. 及时纠正病人的不良⾏为
B. 纠正病人对检查和治疗措施的错误认识
C. 建⽴融洽的医患关系
D. 提高病人对医嘱的理解和记忆程度
E. 教会病人自我监测
[答案] A
[解析]
正确答案为A。及时纠正病人的不良行为不是提高依从性的方法，反而可能引起抵触。提高依从性的方法包括：纠正错误认识、建立融洽关系、提高理解和记忆、教会自我监测。

[题目] 90. 某教授在患病期间听说自己的科研项目出现难题,不顾医务人员的劝说,坚决要求出院。这种行为属于病人角色适应不良的(  )。
A. 角色行为冲突
B. 角色行为减退
C. 角色行为缺如
D. 角色行为异常
E. 病人角色强化
[答案] A
[解析]
正确答案为A。角色行为冲突指病人角色与其他社会角色（教授、科研负责人）之间的矛盾。该教授不顾劝阻要求出院处理科研难题，内心存在角色冲突。B减退、C缺如、D异常、E强化均不符合。

[题目] 91. 连某因患严重躁狂抑郁障碍,正在精神病专科医院住院治疗,因病情恶化,患者出现伤人毁物等行为,医院在没有其他可替代措施的情况下,对其实施了约束身体的措施,但实施后没有及时通知连某的监护人。连某的父亲作为监护人探视时,看到儿子被捆绑在病床上非常气愤。该案例中所形成的医患关系模式是()
A. 主动-被动型
B. 指导-合作型
C. 契约许可型
D. 指导参与型
E. 共同参与型
[答案] A
[解析]
正确答案为A。严重躁狂抑郁障碍患者无自知力，医院实施约束措施，属于主动-被动型模式——医生完全主导，患者被动接受。B指导-合作型、E共同参与型均需要患者具备自主能力。

[题目] 92. 经抢救意识逐渐恢复,此时的医患关系模式是(      )
A. 主动—被动型
B. 指导—合作型
C. 共同参与型
D. 患者至上型
E. 互惠型
[答案] B
[解析]
正确答案为B。同第85题，意识恢复后患者可配合治疗，医患关系模式从主动-被动型转为指导-合作型。A主动-被动型、C共同参与型均不适合当前恢复初期的状态。

[题目] 93. 一位年轻的住院医师建议一位高血压患者要注意清淡饮⾷,这位患者认为自⼰的生活经验 ⽐这位医生多得多,故⽽没有听从。出现这种情况最根本的原因是( )。
A. 患者常常自以为是
B. 没有建⽴良好信任的医患关系
C. 患者的角色⾏为缺如
D. 医生没有丰富的经验
E. 医生太年轻,说话没有分量
[答案] B
[解析]
正确答案为B。患者不听从年轻医生建议的根本原因是未建立起良好信任的医患关系。A表面归因；C角色行为缺如是因素之一但不根本；D、E过于片面。信任是医患合作的基础。

[题目] 94. 医生与患者交谈的原则应具有(    )
A. 隐蔽性
B. 情绪性
C. 广泛性
D. 指令性
E. 针对性
[答案] E
[解析]
正确答案为E。同第48题，医生与患者的交谈应具有针对性，围绕病情和诊疗展开。A隐蔽性、B情绪性、C广泛性、D指令性均不是医患交谈原则。本题重复考察。

[题目] 95. 下列是病人最常见的情绪反应的是(  )
A. 抑郁
B. 焦虑
C. 愤怒
D. 沮丧
E. 恐惧
[答案] B
[解析]
正确答案为B。焦虑是病人最常见的情绪反应，源于对疾病不确定性的担忧。A抑郁、C愤怒、D沮丧、E恐惧虽常见但发生率次于焦虑。本题考察病人情绪反应的流行病学特点。

[题目] 96. 患者今晨上班途中突发晕厥,路人将其送往医院途中自行清醒,到医院后医生建议其入院性系统检查,但其坚决决绝,声称自己平素体健,不可能有病,该表现为(  )
A. 角色行为强化
B. 角色行为冲突
C. 角色行为减退
D. 角色行为异常
E. 角色行为缺如
[答案] E
[解析]
正确答案为E。患者突发晕厥后坚决拒绝检查，声称自己不可能有病，属于角色行为缺如——否认疾病，不接受病人角色。A强化是安于病人角色；B冲突是角色矛盾；C减退是过早脱离角色。

[题目] 97. 处于恢复期时最理想的医患关系模式是(  )。
A. 主动-被动型
B. 指导-合作型
C. 共同参与型
D. 患者至上型
E. 互惠型
[答案] C
[解析]
正确答案为C。恢复期患者已具备自主管理能力，最理想的医患关系模式是共同参与型，鼓励患者积极参与康复决策。A主动-被动型、B指导-合作型均不适合恢复期的自主需求。

[题目] 98. 运用传统医患关系模式进行医疗活动的医生,所关心的问题不包括(   )。
A. 疾病的诊断
B. 科学知识的解释
C. 标准技术的应用
D. 疾病的处理
E. 病人的满意程度
[答案] E
[解析]
正确答案为E。传统医患关系模式（主动-被动型）以疾病为中心，关心疾病诊断、科学解释、技术应用和疾病处理，不关心患者的满意程度。本题考察传统模式与生物-心理-社会模式的差异。

[题目] 99. 急性病人的主导心理活动是(  )。
A. 焦虑
B. 恐惧
C. 愤怒
D. 害怕
E. 接受
[答案] B
[解析]
正确答案为B。急性病人（如心梗、创伤）起病急骤，主导心理活动是恐惧——对生命威胁和剧烈症状的害怕。A焦虑是慢性过程中更常见；C愤怒、D害怕均不主导。

[题目] 100. 医患交流中,能够使得沟通更为有效与顺畅的方法是(   )
A. 尽量多用书面沟通
B. 避免表达态度和情感
C. 善用问句引导话题
D. 尽量使用医学术语
E. 提供的信息越多越好
[答案] C
[解析]
正确答案为C。善用问句引导话题是有效沟通的方法，可以围绕病情收集信息、引导患者表达。A书面沟通不能替代当面交流；B避免表达态度情感不利于共情；D多用术语会阻碍理解。

[题目] 101. 下列哪项属于良好医患关系的作用( )
A. 有利于实施预防措施
B. 有利于诊断和治疗
C. 有利于病人的情绪
D. 有利于医务人员的健康
E. 以上都是
[答案] E
[解析]
正确答案为E。良好医患关系有利于实施预防措施、有利于诊断和治疗、有利于病人情绪、有利于医务人员健康，A、B、C、D均正确。本题考察良好医患关系的多方面积极作用。

[题目] 102. 业务员纪某因身体不适去医院就诊,被初步诊断为疑似传染性非典型肺炎,并被实施单独隔离治疗。2天后,纪某厌倦了被隔离治疗的状态,要求出院;医院反复劝说,不予批准。纪某于当晚溜出医院并回家。医院发现纪某失踪后立即向有关部门报告。家人得知纪某情况后动员其尽快返回医院接受隔离治疗,被纪某拒绝。纪某接受隔离治疗后又擅自脱离医院的角色行为属于()
A. 角色行为冲突
B. 角色行为确如
C. 角色行为强化
D. 角色行为减退
E. 角色行为异常
[答案] D
[解析]
正确答案为D。患者接受隔离治疗后又擅自脱离医院，属于角色行为减退——逃避病人角色，去履行其他角色（回家）。A冲突是矛盾心理；B缺如是否认有病；C强化是安于角色。

[题目] 103. 下列哪项属于医患关系的性质( )
A. 一般的契约关系
B. 纯粹的信托关系
C. 在信托关系基础上的契约关系
D. 是信托关系就不是契约关系
E. 是契约关系就不是信托关系
[答案] C
[解析]
正确答案为C。医患关系是一种在信托关系基础上的契约关系——双方基于信任建立联系，同时通过挂号、知情同意等形式形成契约关系。A、B、D、E均片面。

[题目] 104. 对于良好的医患沟通,最重要的是(  )。
A. 患者良好的表达能力
B. 患者正确的态度
C. 医护人员良好的态度
D. 医护人员良好的沟通技巧
E. 患者的服从行为
[答案] D
[解析]
正确答案为D。对于良好的医患沟通，最重要的是医护人员具备良好的沟通技巧。A患者表达能力、B患者态度、C医护人员态度均重要但不最关键。沟通技巧可主动改善沟通效果。

[题目] 105. 运用传统医患关系模式进行医疗活动的医生,所关心的问题不包括( )
A. 疾病的诊断
B. 科学知识的解释
C. 标准技术的应用
D. 疾病的处理
E. 病人的满意程度
[答案] E
[解析]
正确答案为E。同第98题，传统医患关系模式（主动-被动型）关心疾病诊断、科学解释、标准技术应用、疾病处理，不关心病人的满意程度。本题重复考察传统模式的特点。

[题目] 106. 病人受病痛折磨感到悲观、失望、不良心境导致行为异常,反映病人( )。
A. 角色行为减退
B. 角色行为强化
C. 角色行为冲突
D. 角色行为缺如
E. 角色行为异常
[答案] E
[解析]
正确答案为E。患者受病痛折磨感到悲观、失望，不良心境导致行为异常（如自伤、攻击），属于角色行为异常。A减退、B强化、C冲突、D缺如均不符合行为异常的特点。

[题目] 107. 男,45岁,被确诊为胃溃疡,但是他本人却否认自己有病,此患者的角色行为的改变属于()
A. 角色行为异常
B. 角色行为缺如
C. 角色行为强化
D. 角色行为冲突
E. 角色行为减退
[答案] B
[解析]
正确答案为B。患者被确诊为胃溃疡但否认自己有病，不接受病人角色，属于角色行为缺如。A异常是极端行为；C强化是安于病人角色；D冲突是角色矛盾；E减退是过早脱离角色。

[题目] 108. 青年住院患者常见的⼼理问题一般不包括( )。
A. 盲⽬乐观
B. 焦虑
C. 抑郁
D. 依从性差
E. 生理功能减退
[答案] E
[解析]
正确答案为E。同第22题，生理功能减退是生理性改变而非心理问题。青年住院患者常见心理问题包括盲目乐观、焦虑、抑郁、依从性差。本题重复考察不同年龄段的心理特点。

[题目] 109. 医患关系中“患”指的是( )。
A. 就诊病人
B. 病人亲属
C. 做体检的健康人
D. 到医院进⾏咨询的人
E. 以上都是
[答案] E
[解析]
正确答案为E。医患关系中「患」不仅指就诊病人，还包括病人亲属、做体检的健康人、到医院进行咨询的人等所有接受医疗服务的个体。本题考察「患」的广义含义。

[题目] 110. 对同一个病人(  )。
A. 医患关系模式永远不变
B. 医患关系模式随时在变
C. 依年龄变化改变医患关系模式
D. 依病情变化改变医患关系模式
E. 依医疗水平改变医患关系模式
[答案] D
[解析]
正确答案为D。同第72题，对同一个病人，医患关系模式应根据病情变化而调整。A永远不变不符合实际；B随时在变过于绝对；C依年龄变化、E依医疗水平变化均非主要依据。

[章节] 第一章 绪论

[题目] 1. 下列关于医学心理学的表述不正确的是( )
A. 是一门交叉学科
B. 是康复医学的分支学科
C. 以维护和促进人类整体健康为目的
D. 以人作为主要研究和服务对象
E. 研究医学领域中的心理学问题
[答案] B
[解析]
正确答案为B。医学心理学是心理学与医学的交叉学科，研究医学领域中的心理问题，以维护人类健康为目的，以人为主要研究对象。A正确——交叉学科是其基本属性；B错误——它不是康复医学的分支学科；C和D是医学心理学的基本目标；E正确描述了其研究内容。本题考察医学心理学的学科定位。

[题目] 2. 运用传统医患关系模式进行医疗活动的医生,所关心的问题不包括( )
A. 疾病的诊断
B. 科学知识的解释
C. 标准技术的应用
D. 疾病的处理
E. 病人的满意程度
[答案] E
[解析]
正确答案为E。传统医患关系模式以疾病为中心，医生关注疾病的诊断(A)、处理(D)、科学知识的解释(B)和标准技术的应用(C)，而不关注病人的满意程度(E)。现代医学模式要求医生同时关注患者的心理感受。本题考察传统与现代医患关系模式的区别。

[题目] 3. 下列不属于生物-心理-社会医学模式观点的( )
A. 心理对健康和疾病有能动作用
B. 心身观是统一的
C. 心理因素、社会因素和生物因素都影响人体健康
D. 在健康和疾病问题上应将人视为一个整体
E. 对医德修养和医德教育的最全面认识
[答案] E
[解析]
正确答案为E。生物-心理-社会医学模式强调心理对健康的能动作用(A)、心身统一(B)、生物-心理-社会多因素影响健康(C)以及整体观(D)。E选项"对医德修养和医德教育的最全面认识"属于医学伦理范畴，不是该医学模式的观点。本题考察生物-心理-社会医学模式的核心内涵。

[题目] 4. 下列不属于医学心理学的研究方法有()
A. 实验法
B. 调查法
C. 临床法
D. 观察法
E. 心理测验法
[答案] C
[解析]
正确答案为C。医学心理学常用研究方法包括实验法(A)、调查法(B)、观察法(D)、心理测验法(E)等。临床法(C)不是独立的医学心理学研究方法，而是医学实践中的一般工作方法。本题考察医学心理学研究方法的分类。

[题目] 5. 对于心身关系,下列最正确的是( )
A. 神灵支配论
B. 心身统一论
C. 心⾝二元论
D. 心身还原论
E. 心身平行论
[答案] B
[解析]
正确答案为B。医学心理学持心身统一论(B)，认为心理与身体相互影响、不可分割。A神灵支配论是古代朴素观点；C心身二元论将身心割裂；D心身还原论过分简化；E心身平行论认为身心互不干扰。本题考察医学心理学对心身关系的基本立场。

[题目] 6. 关于医学心理学的实验研究方法,其主要特点是( )
A. 只在实验室中完成
B. 只以人为被试对象
C. 只记录生物学指标
D. 只在有目的的一定控制条件下进行
E. 只使用各种现代仪器设备
[答案] D
[解析]
正确答案为D。实验研究方法的核心特征是在有目的、一定控制条件下进行(D)，以探明因果关系。A错误——不限于实验室(现场实验也可)；B错误——动物也可作为被试；C、E错误——心理指标和行为指标同样重要。本题考察实验法的本质特征。

[题目] 7. 医学心理学在现代医学中的地位，以下不正确的是()
A. 有利于医学模式的转变
B. 有利于预防疾病理念的转变
C. 有利于提⾼临床⼯作质量
D. 有利于减少精神分裂症的发⽣
E. 有利于改善医患关系
[答案] D
[解析]
正确答案为D。医学心理学在现代医学中的地位体现为促进医学模式转变(A)、预防理念转变(B)、提高临床工作质量(C)和改善医患关系(E)。D"减少精神分裂症的发生"不是医学心理学的直接功能，精神分裂症的病因复杂，涉及生物学因素。本题考察医学心理学的作用范围。

[题目] 8. 面对同样的社会应激，有人难以适应而得病，有人很快渡过难关。医学心理学解释此现象的基本观点为（ ）
A. 社会影响的观点
B. 情绪作用的观点
C. 人格特征的观点
D. 心身统一的观点
E. 主动调节的观点
[答案] C
[解析]
正确答案为C。面对相同应激，不同人反应不同，主要因个体的人格特征(C)差异所致。A社会影响关注外部环境；B情绪作用是应激反应的表现而非解释；D心身统一是基本立场；E主动调节是应对策略。人格特征决定了应激易感性和应对方式。本题考察人格在应激反应中的作用。

[题目] 9. 不属于医学心理学研究任务的是( )
A. 研究和改进职业测试
B. 研究心理行为因素影响人体健康的机制
C. 研究通过调节心理活动来达到健身、防病和治病的作⽤
D. 心理评估手段在疾病的预防中的作用
E. 研究心理因素在疾病发生过程中的作用
[答案] A
[解析]
正确答案为A。医学心理学研究任务包括：心理行为因素影响健康的机制(B)、心理调节在防治病中的作用(C)、心理评估在预防中的作用(D)、心理因素在疾病发生中的作用(E)。A"研究和改进职业测试"属于工业与组织心理学范畴，不是医学心理学的任务。本题考察医学心理学的任务边界。

[题目] 10. 关于医学模式的观点错误的是( )
A. 是一种哲学观在医学上的反映
B. 随历史的发展而不断发展变化
C. “生物-心理-社会”医学模式的提出并不排斥生物医学的研究
D. 新的医学模式以身心一元论为基本指导思想,坚持病因一元论的观点
E. 医学心理学促进和推动了医学模式的转化
[答案] D
[解析]
正确答案为D。D错误——新的生物-心理-社会医学模式坚持病因多元论(生物、心理、社会多因素)，而非一元论。A正确反映医学模式的哲学属性；B正确反映其发展性；C正确说明新模式不否定生物医学研究；E正确描述医学心理学的推动作用。本题考察新医学模式的核心观点。

[题目] 11. 不属于医学心理学研究对象的是( )
A. 动物的心理发育
B. 人的不良行为
C. 人际关系紧张
D. 病人的焦虑
E. 人群心理健康水平
[答案] A
[解析]
正确答案为A。医学心理学研究对象是人的心理健康与疾病相关的心理行为问题，如不良行为(B)、人际关系紧张(C)、病人焦虑(D)和人群心理健康水平(E)。A"动物的心理发育"属于比较心理学或动物心理学的研究对象，不是医学心理学的研究对象。本题考察医学心理学的研究对象范围。

[题目] 12. 通过交谈或问卷的⽅法了解某些⼈对某一事件的感受、态度和行为,这种研究方法在医学心理学上称为( )
A. 观察研究
B. 调查研究
C. 个案研究
D. 实验研究
E. 测验研究
[答案] B
[解析]
正确答案为B。通过交谈或问卷了解个体对事件的感受、态度和行为，属于调查研究(B)。A观察研究侧重外显行为记录；C个案研究针对单个案例深入分析；D实验研究需控制变量；E测验研究使用标准化心理测量工具。本题考察不同研究方法的区分。

[题目] 13. 医学心理学居于（）
A. 康复医学的范畴
B. 基础心理学范畴
C. 应用心理学范畴
D. 生理学范畴
E. 精神病学范畴
[答案] C
[解析]
正确答案为C。医学心理学属于应用心理学范畴(C)，它将心理学理论和方法应用于医学实践。A康复医学是医学分支而非心理学的归属；B基础心理学研究一般心理规律；D生理学研究生命活动规律；E精神病学是临床医学分支。本题考察医学心理学的学科归属。

[题目] 14. 现代医学模式是()
A. 宗教医学模式
B. 哲学医学模式
C. 生物医学模式
D. 心理医学模式
E. 生物-心理-社会医学模式
[答案] E
[解析]
正确答案为E。现代医学模式是生物-心理-社会医学模式(E)，由恩格尔(Engel)于1977年提出。A宗教医学模式、B哲学医学模式是古代模式；C生物医学模式是近代模式；D心理医学模式不是正式分类。本题考察医学模式的发展阶段。

[题目] 15. 医学心理学的研究途径有()
A. 心理学途径
B. 生物学途径
C. 社会学途径
D. 心理学、生物学、社会学途径
E. 遗传学
[答案] D
[解析]
正确答案为D。医学心理学的研究途径包括心理学途径、生物学途径和社会学途径(D)，体现生物-心理-社会医学模式的整体观。A、B、C各仅涵盖单一途径，不全面；E遗传学只是生物学途径的一部分。本题考察医学心理学的多学科研究途径。

[题目] 16. 关于医学心理学研究方法的描述不正确的是( )
A. 心理学最基本的研究方法是观察法和实验法
B. 观察法的观察是指对被观察者的外显行为进行观察、测量以及记录
C. 实验法的数据资料收集需要观察获得
D. 实验法区别于观察法的最主要特征是控制条件
E. 实验法可以探索因果关系
[答案] C
[解析]
正确答案为C。C表述错误——实验法的数据收集并非必须通过观察获得(可使用仪器、问卷等)。A正确描述心理学基本方法；B正确描述观察法含义；D正确指出控制条件是实验法与观察法的关键区别；E正确说明实验法的优势。本题考察观察法与实验法的区别。

[题目] 17. 医学心理学的研究任务不包括( )
A. 人格特征或行为模式在健康中的意义
B. 如何运⽤心理治疗的方法达到保健的目的
C. 医学管理中存在的心理问题解决办法
D. 疾病的发展和变化过程中影响因素作用的规律
E. ⼼理评估手段在疾病的预防中的作用
[答案] C
[解析]
正确答案为C。医学心理学研究任务包括：人格特征与健康的关系(A)、心理治疗应用(B)、疾病发展中心理因素作用规律(D)、心理评估在预防中的作用(E)。C"医学管理中存在的心理问题解决办法"属于医院管理心理学范畴，不是医学心理学的主要研究任务。本题考察医学心理学的任务范围。

[题目] 18. 医学心理学的定义是( )
A. 研究心理与健康和疾病之间关系的学科
B. 可以促进医学模式向生物模式转变
C. 是护理心理学的分支学科
D. 由心理学家弗洛伊德首次提出
E. 关注疾病预防和治疗
[答案] A
[解析]
正确答案为A。医学心理学的定义是研究心理与健康和疾病之间关系的学科(A)。B错误——医学心理学促进模式向生物-心理-社会模式转变而非生物模式；C错误——护理心理学是医学心理学的分支而非相反；D错误——弗洛伊德提出精神分析而非医学心理学；E过于宽泛。本题考察医学心理学的定义。

[题目] 19. “⼀种心理测量的工具”称为( )
A. 心理观察
B. 心理鉴定
C. 心理测验
D. 心理诊断
E. 心理调查
[答案] C
[解析]
正确答案为C。心理测验(C)是一种标准化的心理测量工具，用于评估个体的心理特征。A心理观察是研究方法；B心理鉴定是评估过程；D心理诊断是临床结论；E心理调查是收集资料的方法。本题考察心理测验的概念界定。

[题目] 20. 医学心理学是属于( )
A. 医学的分支学科
B. 社会学的分支学科
C. 生理学的分支学科
D. 医学和心理学的交叉学科
E. 伦理学的分支学科
[答案] D
[解析]
正确答案为D。医学心理学是医学和心理学的交叉学科(D)。A不准确——它不是单纯的医学分支；B、C、E更加偏离——与社会学、生理学、伦理学有关联但不是其分支。医学心理学同时运用医学和心理学两大学科的知识和方法。本题考察医学心理学的学科性质。

[题目] 21. 下列属于医学心理学的研究对象的是()
A. 疾病的发生发展的规律
B. 人类行为的科学发展
C. 心理活动的规律的学科
D. 影响健康的有关心理问题和行为
E. 疾病的预防和治疗的原则
[答案] D
[解析]
正确答案为D。医学心理学的研究对象是影响健康的有关心理问题和行为(D)。A是病理学研究范畴；B是行为科学研究范畴；C是基础心理学研究范畴；E是临床医学研究范畴。本题考察医学心理学研究对象的专指性。

[题目] 22. 医学心理学的研究范围不包括( )
A. 脑与行为的关系
B. 心身关系
C. 心理障碍
D. 医患关系
E. 职业发展
[答案] E
[解析]
正确答案为E。医学心理学研究范围包括脑与行为的关系(A)、心身关系(B)、心理障碍(C)和医患关系(D)。E"职业发展"属于职业心理学或人力资源管理范畴，不属于医学心理学的研究范围。本题考察医学心理学的研究边界。

[题目] 23. 医学心理学的研究任务不正确的是()
A. 心理行为的生物学和社会学基础及其对健康与疾病的意义
B. 人们在各类疾病发生、发展及转化过程中心理行为的变化及其影响
C. 通过心理行为调整及干预达到预防疾病、治疗疾病和促进疾病康复的作用与机制

E. 医院管理机制的进一步完善
[答案] E
[解析]
正确答案为E。A、B、C、D均属医学心理学的研究任务：研究心理行为的生物学和社会学基础及其意义(A)、疾病过程心理行为变化(B)、心理行为干预的防治作用与机制(C)、心理因素在疾病发展中的作用规律(D)。E"医院管理机制的完善"属于医院管理学范畴。本题考察医学心理学任务的界定。

[题目] 24. 一位心理学专家为了对一3岁幼儿做心理评估,去孩⼦所在的幼儿园观看该幼儿在游戏中的表现,这种心理评估的方法属于( )。

D. 自然观察法
E. 心理测验法

[解析]
正确答案为D。在自然情境下(幼儿园)观察幼儿游戏中的表现，不施加任何干预，属于自然观察法(D)。A自由式会谈法需要言语交流，3岁幼儿难以配合；B现状调查法需问卷调查；C控制观察法需控制条件；E心理测验法需使用标准化工具。本题考察自然观察法的应用场景。

const state = {
