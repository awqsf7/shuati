[解析] 【正解E】组胺为肥大细胞和嗜碱性粒细胞预合成并储存于分泌颗粒中的介质(非新合成),在脱颗粒时即刻释放。新合成介质为细胞活化后通过花生四烯酸代谢途径新生成。【排除】A.环氧合酶(COX)为新合成介质合成酶参与前列腺素合成。B.PGD2为新合成脂质介质(花生四烯酸-COX途径)。C.PAF为新合成脂质介质。D.LTs为新合成脂质介质(花生四烯酸-脂氧合酶途径)。
[题目] 839. 下列选项中哪一项未参与Ⅲ型超敏反应
A. 沉积的IC激活补体
B. 血管活性物质的释放
C. 中性粒细胞释放过敏毒素
D. 中等大小循环IC的形成
E. 可通过攻膜复合体加重组织损伤
[答案] C
[解析] 【正解C】过敏毒素(C3a/C5a)是补体被IC激活后C3和C5裂解产生的补体片段,具有促进肥大细胞脱颗粒和趋化中性粒细胞作用,非中性粒细胞释放的产物。【排除】A.沉积IC激活补体参与III型正确。B.血管活性胺(肥大细胞释放)促进IC沉积正确。D.中等大小循环IC形成是III型始动因素正确。E.C5b-9(MAC)可加重组织损伤正确。
[题目] 840. 补体不参与下列哪种超敏反应性疾病的发生
A. 溶血性贫血
B. 输血反应
C. 肾小球肾炎
D. 血清过敏症
E. 血小板减少性紫癜
[答案] D
[解析] 【正解D】血清过敏症为I型超敏反应(IgE/肥大细胞脱颗粒介导),补体不参与I型全过程。【排除】A.溶血性贫血为II型(补体参与红细胞溶解)。B.输血反应为II型(补体参与溶血)。C.肾小球肾炎为III型(补体被IC激活)。E.血小板减少性紫癜为II型(补体参与血小板破坏)。
[题目] 841. Ⅰ型超敏反应中新合成的介质不包括
A. PGD2
B. LTs
C. PAF
D. IL-1
E. 激肽原酶
[答案] E
[解析] 【正解E】激肽原酶预存于肥大细胞嗜碱性颗粒中(预合成介质),脱颗粒时释放至胞外作用于血浆激肽原产生缓激肽。新合成介质为细胞活化后从头合成。【排除】A.PGD2为新合成脂质介质(COX途径)。B.LTs为新合成脂质介质(脂氧合酶途径)。C.PAF为新合成脂质介质。D.IL-1为新合成细胞因子。
[题目] 842. 下列哪种因素出现时可能发生血清病
A. 存在抗肾小球基膜抗体
B. 大量IgE产生
C. 补体水平升高
D. 中等大小可溶性免疫复合物形成
E. 巨噬细胞功能亢进
[答案] D
[解析] 【正解D】血清病发生的关键前提是中等大小可溶性IC(约19S,Ag/Ab约4:1)形成——此大小IC不易被单核吞噬系统有效清除,在循环中持续存在并随血流沉积于肾小球/关节滑膜/血管壁等组织,激活补体引发中性粒细胞浸润和组织损伤。【排除】A.抗肾小球基膜抗体为Goodpasture综合征(II型)特征非血清病。B.大量IgE产生为I型机制非III型。C.补体水平升高非血清病核心因素。E.巨噬细胞功能亢进有利于IC清除(可预防)。
[题目] 843. 下列哪种物质不参与药物过敏性休克
A. 组胺
B. D因子
C. 激肽
D. 白三烯
E. 前列腺素
[答案] B
[解析] 【正解B】D因子为补体旁路途径C3转化酶形成所需丝氨酸蛋白酶,不参与药物过敏性休克(I型超敏反应)。I型由肥大细胞脱颗粒释放预合成介质(组胺)和新合成介质(白三烯/前列腺素/PAF)以及激肽系统激活引起。【排除】A.组胺为I型速发相主要介质。C.激肽(缓激肽)由激肽原酶释放参与I型。D.白三烯参与I型迟发相。E.前列腺素(PGD2)参与I型。
[题目] 844. 在免疫复合物引起的组织损伤中，起主要作用的细胞是
A. Mφ
B. 血小板
C. 淋巴细胞
D. 中性粒细胞
E. NK细胞
[答案] D
[解析] 【正解D】在免疫复合物引起的组织损伤(III型超敏反应)中,中性粒细胞起主要作用——IC沉积激活补体产生C5a趋化中性粒细胞浸润,中性粒细胞在吞噬IC过程中释放大量溶酶体酶(蛋白水解酶/胶原酶/弹性蛋白酶/组织蛋白酶等)直接破坏血管壁基底膜和周围组织。【排除】A.巨噬细胞参与但非主要细胞。B.血小板参与微血栓形成和血管活性胺释放。C.淋巴细胞主要为IV型效应细胞。E.NK细胞为II型ADCC效应细胞。
[题目] 845. 下列与Ⅲ型超敏反应炎症无关的是
A. 中性蛋白水解酶
B. 弹性纤维酶
C. IL-4
D. 胶原酶
E. 血管活性胺类物质
[答案] C
[解析] 【正解C】IL-4是Th2型细胞因子主要参与I型超敏反应(促进IgE类别转换和Th2分化),与III型超敏反应炎症无关。III型炎症介质主要为补体裂解片段(C3a/C5a)、中性粒细胞释放的溶酶体酶(中性蛋白水解酶/弹性纤维酶/胶原酶)和血管活性胺类物质(肥大细胞释放)。【排除】A.中性蛋白水解酶参与III型。B.弹性纤维酶参与III型。D.胶原酶参与III型。E.血管活性胺类参与III型。
[题目] 846. 下列物质中既能引起Ⅰ型又能引起Ⅲ型超敏反应的物质是
A. 牛奶
B. 鱼虾
C. 血清
D. 尘螨
E. 豚草
[答案] C
[解析] 【正解C】异种血清(如马血清抗毒素)注入人体后可同时引发I型和III型超敏反应——I型:血清过敏性休克(IgE/肥大细胞介导速发型);III型:血清病(约7-14天后产生抗血清抗体与残余抗原形成IC沉积于组织)。【排除】A.牛奶仅引起I型(食物过敏)。B.鱼虾仅引起I型(食物过敏)。D.尘螨仅引起I型(吸入过敏)。E.豚草仅引起I型(花粉症)。
[题目] 847. 以下关于皮内注射DNP后引起DTH反应明显降低的原因分析中，正确的是
A. 接受抗组胺的治疗
B. 接受大量X线照射
C. 补体水平下降
D. 脾脏切除
E. 接受抗中性粒细胞血清治疗
[答案] B
[解析] 【正解B】大量X线照射可杀伤淋巴细胞(包括T细胞),导致DTH反应(IV型/T细胞依赖性)明显降低。DTH完全依赖于记忆性T细胞识别抗原后应答,去除T细胞后反应消失。【排除】A.抗组胺治疗抑制I型(速发型)非IV型。C.补体水平下降影响II/III型非IV型(补体不参与IV型)。D.脾脏切除主要影响抗体产生。E.抗中性粒细胞血清影响III型效应细胞。
[题目] 848. 以下不属于Ⅰ型超敏反应的有
A. 过敏性休克
B. 荨麻疹
C. 湿疹
D. 鱼虾过敏引起的过敏性胃肠炎
E. 接触性皮炎 题型:A2 (共2题,共2分)批量改分
[答案] E
[解析] 【正解E】接触性皮炎为IV型迟发型超敏反应(T细胞介导),不属于I型速发型超敏反应。【排除】A.过敏性休克为典型I型(IgE引发全身血管扩张和支气管痉挛)。B.荨麻疹为I型(局部组胺释放致风团)。C.湿疹(特应性皮炎)主要为I型机制(IgE/Th2参与)。D.鱼虾过敏性胃肠炎为I型(食物变应原致敏后再次摄入。
[题目] 849. 一养鸽者长期吸入鸽子粪便等变应原，再次吸入后发生过敏性肺泡炎，最可能是发生了
A. Ⅰ型超敏反应速发相反应
B. Ⅰ型超敏反应迟发相反应
C. Ⅱ型超敏反应
D. Ⅲ型超敏反应
E. Ⅳ型超敏反应
[答案] D
[解析] 【正解D】养鸽者长期吸入鸽子粪便/羽毛等变应原(禽类蛋白)再次吸入后发生过敏性肺泡炎(外源性过敏性肺泡炎/农民肺类似),最可能为III型超敏反应——吸入抗原与已产生的IgG抗体在肺泡壁形成IC,激活补体募集中性粒细胞导致肺泡壁炎症和纤维化。【排除】A.I型速发相不符(症状非数分钟出现且以肺泡间质炎症为主)。B.I型迟发相不符。C.II型不符(非细胞毒机制)。E.IV型不符(非肉芽肿炎症为主,鸽子肺以III型为主)。
[题目] 850. 一油漆工人刷油漆时皮肤出现红肿、皮疹和水泡，高度怀疑此工人发生了
A. Ⅰ型超敏反应速发相
B. Ⅰ型超敏反应迟发相
C. Ⅱ型超敏反应
D. Ⅲ型超敏反应
E. Ⅳ型超敏反应
[答案] E
[解析] 【正解E】油漆工人接触油漆(含化学物质如有机溶剂/树脂等)后皮肤出现红肿、皮疹和水泡,高度怀疑为接触性皮炎——典型IV型迟发型超敏反应,油漆中半抗原与皮肤蛋白结合致敏T细胞,再次接触后引发局部单个核细胞浸润的湿疹样病变。【排除】A.I型速发相符(荨麻疹样风团为主,发生快消退快)。B.I型迟发相符(嗜酸性粒细胞浸润为主)。C.II型不符(非细胞毒机制)。D.III型不符(非免疫复合物机制且无中性粒细胞浸润为主特征)。
[题目] 851. 一患者因注射抗毒素发生血清病，最佳的处理措施是
A. 输全血
B. 输白蛋白
C. 停止注射抗毒素
D. 注射抗生素
E. 输血小板
[答案] C
[解析] 【正解C】血清病是因注射异种血清抗毒素后约7-14天机体产生抗血清抗体与残余抗原形成IC沉积所致免疫复合物病(III型),最佳处理为立即停止注射引起疾病的抗毒素,给予抗组胺药/糖皮质激素等对症支持治疗,一般病程自限性。【排除】A.输全血无效且可能加重IC沉积。B.输白蛋白无效(扩容非病因治疗)。D.抗生素无效(非感染性疾病)。E.输血小板无效。
[题目] 852. 使胎儿Rh＋红细胞发生溶解破坏的主要抗体是
A. 免疫抗体IgA
B. 免疫抗体IgM
C. 天然抗体IgM
D. 免疫抗体IgG
E. 亲细胞性IgE
[答案] D
[解析] 【正解D】使胎儿Rh+红细胞发生溶解破坏的主要抗体是母体产生的免疫性IgG抗Rh(D)抗体——IgG可通过胎盘FcRn介导的主动转运进入胎儿循环,与胎儿Rh+红细胞结合后通过补体和ADCC导致红细胞溶解。【排除】A.IgA不能通过胎盘。B.免疫性IgM为五聚体不能通过胎盘。C.天然IgM不能通过胎盘且针对ABO血型非Rh血型。E.IgE不介导II型(细胞毒)。
[题目] 853. 下列可引起Ⅲ型超敏反应的物质是
A. 细胞因子
B. 单核巨噬细胞
C. IgA
D. IgE
E. 免疫复合物
[答案] E
[解析] 【正解E】免疫复合物(IC)是引起III型超敏反应的始动因素——中等大小可溶性IC沉积于血管壁/肾小球/关节滑膜等组织后激活补体经典途径产生C3a/C5a和趋化因子,招募中性粒细胞等炎症细胞释放溶酶体酶导致组织损伤。【排除】A.细胞因子为后续炎症介质非始动因素。B.单核巨噬细胞参与IC清除,功能低下可促进IC沉积但非始动因素。C.IgA主要见于IgA肾病。D.IgE为I型介导抗体。
[题目] 854. 下列可被动转移Ⅳ型超敏反应的成分是
A. 巨噬细胞
B. 淋巴细胞
C. 血清Ig
D. 血清补体
E. 中性粒细胞
[答案] B
[解析] 【正解B】IV型超敏反应(迟发型)可经致敏淋巴细胞(T细胞)被动转移——这是IV型区别于I-III型的关键特征。将致敏个体的T细胞输注给正常个体后,该正常个体接受相同抗原也可出现DTH反应。【排除】A.巨噬细胞不能转移特异性免疫记忆。C.血清Ig可转移I-III型非IV型。D.血清补体不携带特异性免疫信息。E.中性粒细胞非特异性免疫细胞。
[题目] 855. 介导Ⅰ型超敏反应速发相的最主要介质是
A. 组胺
B. 白三烯
C. 肝素
D. 腺苷酸环化酶
E. 血小板活化因子
[答案] A
[解析] 【正解A】组胺预存于肥大细胞和嗜碱性粒细胞分泌颗粒中,是介导I型超敏反应速发相(抗原刺激后数分钟内出现)的最主要介质——通过H1受体引起毛细血管扩张、通透性增加、平滑肌收缩和黏液分泌增多。【排除】B.白三烯主要参与迟发相(持续性收缩)。C.肝素为抗凝因子非主要炎性介质。D.腺苷酸环化酶为cAMP合成酶非效应介质。E.PAF为新合成脂质介质非速发相最主要介质。
[题目] 856. 对食物过敏的最佳预防方法是
A. 脱敏治疗
B. 免疫生物疗法
C. 过敏反应试验
D. 避免接触过敏原
E. 服用抗过敏药
[答案] D
[解析] 【正解D】食物过敏的最佳预防方法是严格避免接触已知致敏食物(回避饮食),是最安全、最有效且无副作用的预防策略。【排除】A.脱敏治疗对食物过敏效果有限(严重食物过敏脱敏有诱发过敏性休克风险)。B.免疫生物疗法(抗IgE等)主要用于吸入性过敏非食物过敏首选预防。C.过敏反应试验用于诊断非预防。E.服用抗过敏药为治疗措施非预防措施。
[题目] 857. 关于特异性变应原脱敏疗法描述错误的是
A. 少量多次
B. 短间隔
C. 反复皮下注射
D. 诱导产生特异性IgG
E. 诱导特异性Treg细胞产生
[答案] B
[解析] 【正解B】特异性变应原脱敏疗法(特异性免疫治疗/SIT)采用少量、多次、长间隔(通常每周1次递增至维持量后4-8周1次维持)、反复皮下注射变应原提取物,机制为诱导特异性IgG封闭抗体和Treg细胞,并促使Th2向Th1偏移。【排除】A.少量多次正确。C.反复皮下注射正确。D.诱导特异性IgG正确。E.诱导特异性Treg正确。
[题目] 858. T细胞介导的超敏反应是
A. Ⅰ型超敏反应
B. Ⅱ型超敏反应
C. Ⅲ型超敏反应
D. Ⅳ型超敏反应
E. 速发型超敏反应
[答案] D
[解析] 【正解D】IV型超敏反应(DTH)由T细胞介导——包括CD4+TDTH(Th1)释放细胞因子活化巨噬细胞和CD8+CTL直接杀伤靶细胞,I-III型均由抗体介导。【排除】A.I型为IgE/肥大细胞介导。B.II型为IgG/IgM抗体+补体介导。C.III型为IC+补体+中性粒细胞介导。E.速发型为I型别名。
[题目] 859. 在脱敏治疗中，诱导机体产生的封闭性抗体是
A. IgA
B. IgE
C. IgG
D. IgM
E. sIgA
[答案] C
[解析] 【正解C】脱敏治疗(特异性免疫治疗)诱导机体产生大量特异性IgG4(封闭性抗体),IgG4可竞争性捕获和中和进入体内的变应原,阻断变应原与肥大细胞表面IgE-FcεRI复合物交联,从而抑制脱颗粒。【排除】A.IgA非脱敏治疗诱导的封闭抗体。B.IgE为致敏抗体非封闭抗体。D.IgM非脱敏治疗主要诱导的封闭抗体。E.sIgA为分泌型IgA在黏膜局部发挥屏障作用。
[题目] 860. 下列分子中参与胞外寄生菌激活CD4+ T细胞的抗原提呈过程的是
A. TAP
B. LMP
C. HLA-A
D. HLA-B
E. HLA-DM
[答案] E
[解析] 【正解E】HLA-DM(非经典MHC-II类分子)定位于内体/溶酶体(MIIC),催化CLIP肽从MHC-II类分子肽结合槽中释放,促进高亲和力外源性抗原肽加载,是胞外寄生菌抗原经MHC-II途径提呈给CD4+T细胞的关键分子。【排除】A.TAP参与MHC-I途径(内源性抗原)。B.LMP参与MHC-I途径(蛋白酶体亚基)。C.HLA-A为MHC-I类分子。D.HLA-B为MHC-I类分子。
[题目] 861. 下列疾病中属于免疫复合物型超敏反应的是
A. 过敏性休克
B. 特应性皮炎
C. 新生儿溶血症
D. 链球菌感染后肾小球肾炎
E. 肺出血肾炎综合征
[答案] D
[解析] 【正解D】链球菌感染后肾小球肾炎为经典的免疫复合物型(III型)超敏反应——链球菌抗原与相应抗体在血液循环中形成IC沉积于肾小球基底膜,激活补体募集中性粒细胞释放溶酶体酶导致肾小球损伤。【排除】A.过敏性休克为I型。B.特应性皮炎为I型。C.新生儿溶血症为II型。E.肺出血肾炎综合征为II型(抗基底膜抗体)。
[题目] 862. 介导Ⅰ型超敏反应的生物活性物质主要是由下列哪一种细胞释放的
A. 单核细胞
B. 巨噬细胞
C. 嗜碱性粒细胞
D. B细胞
E. 中性粒细胞
[答案] C
[解析] 【正解C】嗜碱性粒细胞(血液中)和肥大细胞(组织中)是释放介导I型超敏反应生物活性物质的主要细胞——两者表面高表达FcεRI,结合IgE后被多价抗原交联触发脱颗粒释放组胺、蛋白水解酶等预合成介质并新合成LTs/PGD2/PAF。【排除】A.单核细胞不表达FcεRI不介导I型。B.巨噬细胞不表达FcεRI。D.B细胞产生IgE但非释放介质的主要细胞。E.中性粒细胞非I型效应细胞。
[题目] 863. 释放介导Ⅰ型超敏反应的生物活性介质的主要细胞是
A. 巨噬细胞
B. 单核细胞
C. 肥大细胞
D. B细胞
E. 中性粒细胞
[答案] C
[解析] 【正解C】肥大细胞定居于组织中(呼吸道/消化道黏膜下和皮肤结缔组织等),是释放介导I型超敏反应生物活性介质(组胺/LTs/PGD2/PAF/ECF/蛋白水解酶等)的最主要细胞,对I型超敏反应炎症至关重要。【排除】A.巨噬细胞不表达高亲和力FcεRI。B.单核细胞不参与I型脱颗粒。D.B细胞产生IgE致敏肥大细胞但非介质释放细胞。E.中性粒细胞非I型效应细胞。
[题目] 864. 介导Ⅰ型超敏反应晚期相的最主要介质是
A. 组胺
B. 白三烯
C. 肝素
D. 腺苷酸环化酶
E. 血小板活化因子
[答案] B
[解析] 【正解B】白三烯(LTs,特别是半胱氨酰白三烯LTC4/LTD4/LTE4即慢反应物质SRS-A)是介导I型超敏反应晚期相(迟发相,4-24h达高峰)的最主要介质——引起支气管平滑肌强烈而持续性收缩(比组胺强100-1000倍)、黏液分泌增多和黏膜水肿,是维持哮喘持续性气道阻塞的关键介质。【排除】A.组胺为速发相最主要介质(作用快持续时间短)。C.肝素为抗凝因子。D.腺苷酸环化酶为cAMP合成酶非效应介质。E.PAF为新合成介质参与迟发相但非最主要。
[题目] 865. 关于Ⅳ型超敏反应描述正确的是
A. 以中性粒细胞浸润为主的炎症
B. 抗原注入后4小时达到反应高峰
C. 补体参与炎症的发生
D. 能通过血清Ig被动转移
E. 以单个核细胞浸润为主的炎症
[答案] E
[解析] 【正解E】IV型超敏反应以单个核细胞(淋巴细胞和巨噬细胞)浸润为主的慢性炎症反应为特征,抗原注入后24-72小时达到反应高峰。【排除】A.中性粒细胞浸润为主是III型特征。B.4小时达高峰不符(IV型在24-72h达高峰,I型速发相在15-30min达高峰)。C.补体不参与IV型。D.IV型可经T细胞非血清Ig被动转移。
[题目] 866. 脱敏治疗可用于
A. 输血反应
B. 肾小球肾炎
C. 血清病
D. 接触性皮炎
E. 血清过敏症
[答案] E
[解析] 【正解E】脱敏治疗(特异性免疫治疗/特异性变应原免疫疗法)可用于血清过敏症(I型超敏反应),通过少量多次皮下注射递增剂量的异种血清,逐步消耗肥大细胞上结合的IgE,并诱导特异性IgG封闭抗体和Treg,预防再次大量注射时的过敏性休克。【排除】A.输血反应为II型脱敏治疗不适用。B.肾小球肾炎为III型脱敏不适用。C.血清病为III型脱敏不适用。D.接触性皮炎为IV型脱敏不适用。
[题目] 867. 以下不属于Ⅰ型超敏反应性疾病的是
A. 荨麻疹
B. 支气管哮喘
C. 血清过敏性休克
D. 过敏性鼻炎
E. 链球菌感染后的肾小球肾炎
[答案] E
[解析] 【正解E】链球菌感染后肾小球肾炎为III型超敏反应(免疫复合物沉积于肾小球基底膜),不属于I型超敏反应性疾病。【排除】A.荨麻疹为I型(肥大细胞释放组胺引起风团)。B.支气管哮喘为I型(IgE/肥大细胞/嗜酸性粒细胞)。C.血清过敏性休克为I型(IgE介导速发型)。D.过敏性鼻炎为I型(IgE/肥大细胞)。
[题目] 868. 下列细胞中兼具适应性免疫功能的APC是
A. 自然杀伤细胞
B. 树突状细胞
C. B细胞
D. T细胞
E. 巨噬细胞
[答案] C
[解析] 【正解C】B细胞兼具适应性免疫功能和专职APC功能——作为适应性免疫细胞产生特异性抗体介导体液免疫;作为专职APC通过BCR内化特异性抗原后经MHC-II类分子提呈给CD4+T细胞,在低浓度抗原条件下尤为高效。【排除】A.NK细胞为固有免疫细胞非专职APC。B.树突状细胞为专职APC但非适应性免疫效应细胞。D.T细胞为适应性免疫细胞但非APC。E.巨噬细胞为固有免疫细胞和APC但非适应性免疫效应细胞。
[题目] 869. 以下属于Ⅱ型超敏反应性疾病的是
A. 新生儿溶血症
B. 系统性红斑狼疮
C. 血清病
D. 接触性皮炎
E. 青霉素过敏性休克
[答案] A
[解析] 【正解A】新生儿溶血症(Rh或ABO血型不符)为经典II型超敏反应(细胞毒型)——母体抗红细胞IgG抗体通过胎盘进入胎儿循环特异性结合胎儿红细胞表面血型抗原,激活补体经典途径(形成MAC致血管内溶血)和FcγRIII+NK细胞介导ADCC(脾脏血管外溶血)破坏红细胞,严重者致胎儿水肿、核黄疸甚至死亡。【排除】B.系统性红斑狼疮为III型为主(免疫复合物沉积多种组织)。C.血清病为III型(IC沉积)。D.接触性皮炎为IV型(T细胞介导)。E.青霉素过敏性休克为I型(IgE介导)。 
[题目] 870. 介导Ⅰ型超敏反应的抗体主要是
A. IgA
B. IgD
C. IgE
D. IgG
E. IgM
[答案] C
[解析] 【正解C】I型超敏反应(速发型/过敏反应)由IgE抗体介导——IgE Fc段(Cε3功能区)以极高亲和力(Kd~10^-10M)结合肥大细胞和嗜碱性粒细胞表面FcεRIα链D2结构域,极微量血清IgE即可使效应细胞处于致敏状态,多价抗原交联两个相邻FcεRI-IgE复合物→ITAM磷酸化→Syk激活→Ca²⁺内流→融合性胞吐脱颗粒释放预合成介质(组胺/激肽原酶)和新合成介质(LTs/PGD2/PAF)。【排除】A.IgA为黏膜免疫抗体不介导I型。B.IgD主要作为B细胞BCR。D.IgG介导II/III型。E.IgM介导II/III型。
[题目] 871. 关于新生儿溶血症描述错误的是
A. 全身换血可治疗新生儿溶血症
B. 母子间ABO血型不符可引起此病
C. 可以采用给患儿注射抗Rh抗体预防此病
D. 可以采用给Rh阴性母亲注射抗Rh抗体预防此病
E. 母子间Rh血型不符可引起此病
[答案] C
[解析] 【正解C】给已出生患儿注射抗Rh抗体不仅不能预防反而会加重溶血——外源性抗Rh IgG直接结合患儿Rh+红细胞表面Rh(D)抗原→通过补体经典途径(MAC)和ADCC进一步加速红细胞破坏,使胆红素急剧升高加剧核黄疸风险。正确预防措施是分娩后72h内给Rh-母体肌肉注射抗Rh IgG(抗D免疫球蛋白/RhoGAM)清除进入母体循环的胎儿Rh+红细胞,阻止母体初次致敏和产生抗Rh IgG记忆细胞,从而保护下一胎Rh+胎儿。【排除】A.全身换血可治疗(清除胆红素/致敏红细胞/母体抗体)正确。B.母子ABO血型不符可引起正确(多为O型母亲/A型或B型胎儿,症状较轻)。D.给Rh-母亲注射抗Rh抗体预防正确。E.母子Rh血型不符可引起正确(Rh-母亲/Rh+胎儿)。
[题目] 872. Graves病患者血清中存在的自身抗体是
A. 抗TSHR抗体
B. 抗TSH抗体
C. 抗内因子抗体
D. 抗胰岛素受体抗体
E. 抗乙酰胆碱受体抗体
[答案] A
[解析] 【正解A】Graves病(弥漫性毒性甲状腺肿)患者血清中存在抗TSH受体(TSHR)的刺激性自身抗体——甲状腺刺激性免疫球蛋白(TSI,属IgG),该抗体Fab段识别并结合TSHR胞外域模拟TSH生物学效应→持续激活Gs蛋白→腺苷酸环化酶/cAMP↑→甲状腺滤泡细胞过度增生和T3/T4大量合成释放不受下丘脑-垂体-甲状腺轴负反馈调控→弥漫性甲状腺肿大+甲亢(高代谢症候群+突眼+胫前黏液水肿)。属II型超敏反应特殊类型——刺激性功能亢进型而非传统细胞毒型。【排除】B.抗TSH抗体非Graves病特征。C.抗内因子抗体见于A型萎缩性胃炎/恶性贫血。D.抗胰岛素受体抗体可见于B型胰岛素抵抗。E.抗乙酰胆碱受体抗体见于重症肌无力(II型超敏反应)。
[题目] 873. 关于白三烯的描述错误的是
A. 可使平滑肌收缩
B. 可使毛细血管收缩
C. 可使毛细血管通透性增加
D. 可使外分泌腺分泌增加
E. 在迟发相发挥主要作用
[答案] B
[解析] 【正解B】白三烯(LTC4/LTD4/LTE4——慢反应物质SRS-A)是强效血管扩张剂,使毛细血管扩张和通透性增高(非收缩)——此效应比组胺强约1000倍且持续时间更长,引起血浆蛋白渗出和组织水肿。其他作用:平滑肌(特别是支气管和细支气管)持续强烈收缩痉挛、外分泌腺黏液分泌增加,在I型超敏反应迟发相(4-24h达高峰)发挥核心作用。【排除】A.平滑肌收缩正确。C.毛细血管通透性增加正确。D.外分泌腺分泌增加正确。E.迟发相主要介质正确。
[题目] 874. 以下与Ⅰ型超敏反应的发生有关的是
A. 补体依赖的细胞毒作用
B. 免疫复合物沉积激活补体
C. 特异性免疫无应答性
D. 肥大细胞脱颗粒
E. CD4＋T细胞介导的炎症反应
[答案] D
[解析] 【正解D】肥大细胞(和嗜碱性粒细胞)脱颗粒释放预合成组胺、激肽原酶和新合成LTs/PGD2/PAF等生物活性介质是I型超敏反应发生的核心关键环节——多价抗原交联FcεRI-IgE复合物→ITAM磷酸化→Syk/PLCγ→Ca²⁺内流→分泌颗粒与细胞膜融合→融合性胞吐释放介质→启动速发相(数分钟)和迟发相(4-24h)反应。【排除】A.补体依赖细胞毒作用为II型机制。B.免疫复合物沉积激活补体为III型机制。C.特异性免疫无应答性指免疫耐受非超敏反应。E.CD4+T细胞介导炎症反应为IV型机制。
[题目] 875. 氯苯那敏抗过敏的作用原理是
A. 稳定肥大细胞
B. 松弛平滑肌
C. 促IgE合成转变为IgG合成
D. 灭活组胺
E. 拮抗组胺
[答案] E
[解析] 【正解E】氯苯那敏(扑尔敏)为第一代组胺H1受体拮抗剂(反向激动剂),结构为烷基胺类化合物,通过竞争性占据组胺H1受体的结合口袋阻断组胺与H1受体结合,抑制组胺介导的血管扩张(红晕)、通透性增加(风团)、平滑肌收缩和神经末梢瘙痒信号,用于过敏性鼻炎和荨麻疹对症治疗(不影响IgE产生和肥大细胞活化),有中枢镇静副作用。【排除】A.氯苯那敏不直接稳定肥大细胞膜(稳定肥大细胞的为色甘酸钠)。B.氯苯那敏主要通过抗H1受体而非直接松弛平滑肌。C.氯苯那敏不影响Ig类别转换。D.氯苯那敏不灭活组胺(为受体拮抗非酶降解)。 
[题目] 876. 与诱发慢性哮喘无关的因素是
A. Th2细胞
B. 嗜酸性粒细胞
C. IL-4
D. IFN-γ
E. 嗜酸性粒细胞趋化因子
[答案] D
[解析] 【正解D】IFN-γ为Th1型特征性细胞因子,通过促进T-bet转录因子表达→抑制GATA-3→拮抗Th2分化和IL-4/IL-5/IL-13分泌,可抑制IgE类别转换和嗜酸性粒细胞活化,因此与诱发慢性哮喘无关甚至可能减轻哮喘。慢性哮喘由Th2优势应答驱动——Th2细胞释放IL-4(B细胞→IgE类别转换)、IL-5(骨髓嗜酸性粒细胞分化和活化存活)、IL-13(黏液分泌/气道高反应性),嗜酸性粒细胞释放MBP/ECP损伤上皮+LTs致平滑肌持续痉挛,嗜酸性粒细胞趋化因子(Eotaxin/CCL11)和ECF-A趋化嗜酸性粒细胞至气道加重慢性炎症。【排除】A.Th2细胞参与正确。B.嗜酸性粒细胞参与正确。C.IL-4参与正确。E.嗜酸性粒细胞趋化因子参与正确。 
[题目] 877. 以下属于Ⅲ型超敏反应性疾病的是
A. 新生儿溶血症
B. 输血反应
C. 血清病
D. 接触性皮炎
E. 青霉素过敏性休克
[答案] C
[解析] 【正解C】血清病为III型超敏反应(免疫复合物病)最经典代表——注射大剂量异种抗血清(如马抗破伤风毒素抗血清)后7-14天,人体免疫系统产生抗异种蛋白抗体(IgG)与循环中残余异种蛋白形成中等大小可溶性IC(约19S,Ag/Ab约4:1)→沉积于肾小球基底膜/关节滑膜/血管壁→激活补体→C5a趋化中性粒细胞浸润→释放溶酶体酶(蛋白水解酶/胶原酶/弹性蛋白酶)→血管壁纤维素样坏死/肾小球肾炎/关节炎/皮疹/发热并伴补体C3/C4水平下降。【排除】A.新生儿溶血症为II型(抗体介导红细胞溶解)。B.输血反应为II型。D.接触性皮炎为IV型(T细胞介导)。E.青霉素过敏性休克为I型(IgE介导)。 
[题目] 878. 下列哪个不是未成熟DC的优势分布部位
A. 皮肤
B. 黏膜
C. 淋巴结
D. 消化道
E. 呼吸道
[答案] C
[解析] 【正解C】未成熟树突状细胞(immature DC/iDC)高表达PRR(如TLR/CLR)和FcR/C3R,通过吞噬/巨吞饮/受体介导内吞高效摄取抗原,主要分布于机体与外界接触的非淋巴组织上皮界面——表皮(朗格汉斯细胞LC)、呼吸道黏膜、消化道黏膜、泌尿生殖道黏膜等,发挥免疫哨兵监视功能。受炎性信号/TLR配体刺激后iDC上调CCR7→沿输入淋巴管向引流淋巴结T细胞区迁移并成熟为并指状DC(IDC),淋巴结是成熟DC而非未成熟DC的定居部位。【排除】A.皮肤为iDC分布部位正确(朗格汉斯细胞)。B.黏膜为iDC分布部位正确。D.消化道为iDC分布部位正确。E.呼吸道为iDC分布部位正确。 
[题目] 879. 下列哪一种物质与Ⅰ型超敏反应无关
A. 组胺
B. 备解素
C. 激肽
D. 白三烯
E. 前列腺素
[答案] B
[解析] 【正解B】备解素(P因子/properdin)是补体旁路途径(替代途径)的唯一正调控蛋白,由活化的中性粒细胞释放,特异性识别并结合微生物表面C3bBb(P因子使C3bBbP半衰期从~5min延长至~30min),稳定C3转化酶并促进C5转化酶(C3bBbC3bP)组装,增强补体旁路途径对病原微生物的清除效率,与I型超敏反应(IgE/肥大细胞脱颗粒/花生四烯酸代谢/激肽系统)完全无关。【排除】A.组胺为I型速发相主要预合成介质。C.激肽(缓激肽)由激肽原酶释放参与I型血管扩张。D.白三烯(LTs)为I型迟发相主要新合成脂质介质。E.前列腺素(PGD2)为新合成介质参与I型支气管收缩/血管扩张。 
[题目] 880. IgE分子中，具有高亲和性、可结合到肥大细胞上的部位是
A. Fab段
B. CH2功能区
C. H链恒定区
D. HVR区
E. Fc段
[答案] E
[解析] 【正解E】IgE通过其Fc段(ε重链恒定区Cε3功能区)以极高亲和力(Kd≈10^-10M)识别并结合肥大细胞和嗜碱性粒细胞表面FcεRIα链N端第二个Ig样结构域(D2)的膜近端区,该高亲和力结合是I型超敏反应致敏阶段的关键——单体IgE即可致敏效应细胞并可存留数月(游离IgE半衰期仅~2天但受体结合IgE极稳定)。Fab段位于N端负责识别并结合特异性抗原表位,HVR区(CDR)为Fab段内与抗原互补决定簇结合的超变环区,CH2功能区不直接参与FcεRI结合。【排除】A.Fab段识别抗原表位非结合FcεRI。B.CH2功能区不直接参与FcεRI高亲和力结合。C.重链恒定区范围过大非精确结合部位。D.HVR区位于Fab段负责抗原特异性识别。 
[题目] 881. 参与Ⅰ型超敏反应的细胞是
A. 巨噬细胞
B. NK细胞
C. T细胞
D. 肥大细胞
E. 树突状细胞
[答案] D
[解析] 【正解D】肥大细胞(mast cell)是I型超敏反应的核心(关键)效应细胞——来源于骨髓CD34+造血前体细胞,广泛分布于皮肤/呼吸道/消化道黏膜下结缔组织和血管周围,表面高表达FcεRI(~10^5-10^6个/细胞)以高亲和力结合IgE Fc段处于致敏状态,多价抗原交联两个相邻FcεRI-IgE复合物→ITAM磷酸化→Syk/PLCγ信号级联→胞内Ca²⁺升高→融合性胞吐脱颗粒→释放预合成介质(组胺/类胰蛋白酶/糜酶/激肽原酶/肝素)和新合成脂质介质(LTs/PGD2/PAF)及细胞因子(TNF-α/IL-4/IL-5/IL-13),介导速发相和迟发相反应。【排除】A.巨噬细胞参与IV型(DTH)非I型核心效应细胞。B.NK细胞参与II型(ADCC)。C.T细胞参与IV型。E.树突状细胞为专职APC提呈抗原非I型效应细胞。 
[题目] 882. 抗体介导的超敏反应有
A. Ⅰ、Ⅱ、Ⅳ型超敏反应
B. Ⅰ、Ⅱ、Ⅲ型超敏反应
C. Ⅰ、Ⅲ、Ⅳ型超敏反应
D. Ⅱ、Ⅲ、Ⅳ型超敏反应
E. Ⅱ、Ⅲ型超敏反应
[答案] B
[解析] 【正解B】按Coombs-Gell四分类:I型超敏反应(IgE抗体)、II型超敏反应(IgG/IgM抗体结合靶细胞表面抗原→补体+ADCC)、III型超敏反应(IgG/IgM抗体与可溶性抗原形成免疫复合物沉积组织→补体活化→中性粒细胞浸润)均经抗体介导体液免疫效应,可用血清(抗体)被动转移。IV型超敏反应(迟发型/细胞介导型)由特异性致敏T细胞(CD4+TDTH/Th1、CD8+CTL)介导细胞免疫效应,可经T细胞被动转移而非血清(抗体)转移。【排除】A.含IV型错误(无抗体参与)。C.含IV型错误。D.缺失I型错误(IgE为抗体)。E.缺失I型错误。 
[题目] 883. 下列叙述中不属于专职APC特点及功能的是
A. 携带抗原迁移
B. 释放穿孔素和颗粒酶
C. 表达MHC分子
D. 表达协同刺激分子
E. 处理抗原
[答案] B
[解析] 【正解B】释放穿孔素和颗粒酶是CD8+细胞毒性T淋巴细胞(CTL)和NK细胞的杀伤效应机制——穿孔素在靶细胞膜聚合形成直径~5-20nm跨膜孔道破坏细胞膜完整性;颗粒酶(GrzA/GrzB/GrzK)经穿孔素孔进入靶细胞胞质,GrzB剪切活化pro-Caspase-3→→Caspase级联凋亡,同时剪切Bid→tBid→线粒体外膜通透化MOMP→细胞色素c释放→凋亡体形成,启动内源性和外源性凋亡通路。这属于效应细胞杀伤功能,不属于专职APC(树突状细胞/巨噬细胞/B细胞)的三大核心功能。【排除】A.携带抗原通过输入淋巴管向引流淋巴结T细胞区迁移为DC成熟后功能正确。C.表达MHC分子(MHC-I/MHC-II和CD1)提呈抗原肽为APC核心功能正确。D.表达协同刺激分子(B7-1/B7-2即CD80/CD86结合T细胞CD28)提供第二信号为APC功能正确。E.处理抗原(蛋白酶体/内体溶酶体降解→抗原肽装载MHC)为APC功能正确。 
[题目] 884. 青霉素可以引起的超敏反应是
A. Ⅰ、Ⅱ型超敏反应
B. Ⅰ、Ⅱ、Ⅲ型超敏反应
C. Ⅱ、Ⅳ型超敏反应
D. Ⅰ、Ⅱ、Ⅲ、Ⅳ型超敏反应
E. Ⅰ、Ⅱ、Ⅳ型超敏反应
[答案] D
[解析] 【正解D】青霉素(~334Da)为经典半抗原,可引发全部四种超敏反应:(1)I型——青霉素降解产物青霉烯酸共价结合宿主蛋白→完全抗原→Th2辅助B细胞IgE类别转换→IgE致敏肥大细胞,再接触后多价抗原交联FcεRI-IgE→脱颗粒→过敏性休克;(2)II型——青霉素吸附红细胞表面→半抗原-载体复合物→诱导抗青霉素IgG→结合红细胞表面青霉素→补体经典途径+ADCC→溶血性贫血;(3)III型——大剂量青霉素+抗青霉素IgG形成中等大小可溶性IC→沉积于血管壁/肾小球→补体活化→中性粒细胞浸润→血清病样反应(发热/皮疹/关节痛);(4)IV型——青霉素局部涂抹→LC摄取提呈→Th1/Tc致敏→再接触24-72h→IFN-γ/TNF-α→巨噬细胞浸润→接触性皮炎。【排除】A.仅I/II型缺III/IV型。B.缺IV型。C.仅II/IV型缺I/III型。E.缺III型。 
[题目] 885. 不能通过诱导免疫耐受治疗的是
A. 花粉过敏症
B. 肝癌
C. 系统性红斑狼疮
D. 同种异体皮肤移植
E. 类风湿关节炎
[答案] B
[解析] 【正解B】诱导免疫耐受治疗会抑制机体抗肿瘤适应性免疫应答——肿瘤特异性T细胞(CTL/Th1)和抗肿瘤抗体(IgG)的生成被抑制,T细胞介导的免疫监视功能减弱,肿瘤细胞逃避免疫清除加速生长、侵袭和转移扩散,因此不能用于肝癌(恶性肿瘤)的治疗。而以控制过度或异常免疫应答为目的的超敏反应性疾病(花粉过敏症/I型)、自身免疫病(SLE/类风湿关节炎)和移植排斥反应(同种异体皮肤移植/IV型)可通过诱导免疫耐受策略减轻病理损伤。【排除】A.花粉过敏症为I型可尝试诱导耐受。C.系统性红斑狼疮为自身免疫病可尝试诱导耐受。D.同种异体皮肤移植需诱导供者特异性耐受。E.类风湿关节炎为自身免疫病可尝试诱导耐受。 
[题目] 886. 重组可溶性IL-4受体能够治疗Ⅰ型超敏反应的可能机制是
A. 降低Th1型细胞的活性
B. 升高Th2型细胞的活性
C. 减少IgG4的产生
D. 减少组胺酶的产生
E. 减少IgE的产生
[答案] E
[解析] 【正解E】重组可溶性IL-4受体(sIL-4R/altrakincept)作为诱饵受体结合并中和游离IL-4,竞争性阻断IL-4与B细胞/Th2细胞表面IL-4Rα链结合→抑制Jak1/Jak3→STAT6磷酸化二聚化入核→不能启动Cε胚系转录(Iε启动子)→B细胞不能完成从Cμ→Cε的类别转换重组(CSR)→IgE重链VDJ重排连接Cε→减少IgE合成和分泌,从源头切断I型超敏反应致敏阶段(B细胞产生IgE抗体),是I型超敏反应的病因治疗策略。【排除】A.降低Th1活性反而不利(Th1/Th2平衡向Th2偏移加重I型)。B.升高Th2活性会加重I型(促进IL-4/IL-5分泌)。C.IgG4为阻断抗体(保护性)减少无益甚至有害。D.组胺酶可降解组胺减少反而不利。 
[题目] 887. 不能引起肥大细胞和嗜碱性粒细胞脱颗粒的因素是
A. 细胞表面IgE与多价Ag结合
B. C3a、C5a
C. 植物血凝素与细胞表面IgE结合
D. 细胞表面IgE与单价Ag结合
E. 抗FcεR1抗体
[答案] D
[解析] 【正解D】触发肥大细胞和嗜碱性粒细胞脱颗粒的前提是FcεRI-IgE复合物被多价抗原（抗原分子上至少同时存在2个相同或不同表位）交联——多价抗原使两个相邻FcεRI-IgE复合物在细胞膜上相互靠近聚集→FcεRIβ链和γ链胞内ITAM酪氨酸残基被Lyn磷酸化→Syk激酶募集活化→LAT/SLP-76→PLCγ→IP3/DAG→胞内Ca²⁺升高→分泌颗粒与细胞膜融合→融合性胞吐脱颗粒释放介质。单价抗原（仅含1个抗原表位/单表位半抗原）只能结合单个IgE Fab段,不能交联两个相邻FcεRI-IgE→无法触发脱颗粒信号,是临床单表位半抗原可抑制过敏反应的机制基础。【排除】A.细胞表面IgE与多价Ag结合可触发脱颗粒正确。B.C3a/C5a(过敏毒素)通过与肥大细胞表面C3aR/C5aR结合直接触发脱颗粒正确。C.植物血凝素(凝集素)与IgE糖基侧链结合交联FcεRI可触发脱颗粒正确。E.抗FcεRI抗体直接交联受体可触发脱颗粒正确。 
[题目] 888. 在支气管哮喘发生过程中，以下哪种物质对维持支气管处于持续性哮喘状态有重要作用
A. 组胺
B. 白三烯
C. 5-羟色胺
D. 前列腺素
E. 激肽原酶 题型:A2 (共1题,共1分)批量改分
[答案] B
[解析] 【正解B】半胱氨酰白三烯(特别是LTC4/LTD4/LTE4——即慢反应物质SRS-A)为花生四烯酸经5-脂氧合酶(5-LO)/FLAP途径新合成的脂质介质,通过结合支气管平滑肌CysLT1受体→Gq蛋白→PLC→IP3/Ca²⁺→持续强烈收缩痉挛,效果比组胺强约1000倍且不被组胺酶降解持续时间长达数小时,同时促进黏液分泌(CysLT2受体)和嗜酸性粒细胞趋化,是维持支气管持续性哮喘(气道痉挛)状态的最关键介质——孟鲁司特/扎鲁司特等CysLT1受体拮抗剂为哮喘控制一线药物。【排除】A.组胺引起速发相支气管痉挛但持续时间短且被组胺酶快速灭活非维持因素。C.5-羟色胺(5-HT)在哮喘中作用较弱非主要维持介质。D.前列腺素(PGD2/PGF2α)参与但非维持哮喘状态最主要介质。E.激肽原酶释放缓激肽参与I型但非维持哮喘状态的核心介质。 
[题目] 889. 1型糖尿病患者局部反复注射胰岛素后导致注射部位出现红肿、出血和坏死，明确非感染所致，最可能的原因是局部发生了
A. Ⅰ型超敏反应速发相反应
B. Ⅰ型超敏反应迟发相反应
C. Ⅱ型超敏反应
D. Ⅲ型超敏反应
E. Ⅳ型超敏反应
[答案] D
[解析] 【正解D】1型糖尿病患者局部反复注射胰岛素后注射部位红肿、出血和坏死为典型局部III型超敏反应(类Arthus反应)——血循环中胰岛素特异性IgG抗体与皮下反复注射的胰岛素(抗原)在注射局部小血管壁相遇形成中等大小可溶性免疫复合物沉积→激活补体经典途径产生C5a→趋化大量中性粒细胞浸润至IC沉积部位→中性粒细胞吞噬IC过程中释放大量溶酶体酶(蛋白水解酶/胶原酶/弹性蛋白酶)→血管壁纤维素样坏死、管壁破裂出血和周围组织液化性坏死,呈局部红肿→出血→坏死演变过程,非感染所致。反复注射胰岛素产生抗胰岛素IgG抗体是发生前提条件,与I型局部速发风团(II型荨麻疹样反应也可出现)的鉴别要点是III型以出血坏死为主要特征。【排除】A/B.I型超敏反应速发相(肥大细胞脱颗粒→风团/红晕)和迟发相(嗜酸性粒细胞浸润)均不以出血坏死为特征。C.II型超敏反应为抗体直接结合靶细胞或基底膜致补体溶解,非局部IC沉积型。E.IV型为T细胞介导单个核细胞浸润肉芽肿,出现较晚(24-72h),非以出血坏死为主。 
[章节] 第十四章 自身免疫病
[单选题]
[题目] 890. 关于自身抗体的正确说法是
A. 检出自身抗体即可诊断患有自身免疫病
B. 检出自身反应性T细胞即可诊断患自身免疫病
C. 检出自身抗体的浓度越高，患自身免疫病的可能性越大
D. 健康个体没有自身抗体产生
E. 自身抗体都能导致组织损伤
[答案] C
[解析] 【正解C】自身抗体浓度越高患自身免疫病的可能性越大（抗体滴度与疾病活动度常呈正相关），但诊断需结合临床症状和体征综合判断。健康个体血清中也可存在低滴度天然自身抗体（参与免疫稳态维持），其滴度和亲和力均低，不导致组织损伤。【排除】A.检出自身抗体不能直接诊断自身免疫病——需结合临床表现、其他实验室检查和排除其他疾病。B.检出自身反应性T细胞同样不能直接诊断，因其在健康个体也可能存在。D.健康个体可产生低水平天然自身抗体，并非完全没有。E.并非所有自身抗体都能导致组织损伤——致病性自身抗体需满足一定滴度、亲和力和靶抗原可及性等条件。 
[题目] 891. 与寻常性天胞疮相关联的HLA分子是
A. HLA-DR2
B. HLA-DR3
C. HLA-DR4
D. HLA-DR5
E. HLA-B27
[答案] C
[解析] 【正解C】寻常性天疱疮与HLA-DR4相关联——自身抗体（抗桥粒芯蛋白3/Desmoglein 3）攻击表皮细胞间桥粒连接，导致表皮棘层松解和水疱形成。【排除】A.HLA-DR2与多发性硬化症和肺出血-肾炎综合征关联。B.HLA-DR3与重症肌无力和突眼性甲状腺肿关联。D.HLA-DR5与桥本甲状腺炎关联。E.HLA-B27与强直性脊柱炎关联。 
[题目] 892. 与重症肌无力相关联的HLA分子是
A. HLA-DR2
B. HLA-DR3
C. HLA-DR4
D. HLA-DR5
E. HLA-B27
[答案] B
[解析] 【正解B】重症肌无力（MG）与HLA-DR3相关联——由抗乙酰胆碱受体（AChR）自身抗体介导，抗体竞争性阻断神经肌肉接头处ACh与AChR的结合，导致骨骼肌无力和易疲劳。【排除】A.HLA-DR2与多发性硬化症关联。C.HLA-DR4与类风湿关节炎和寻常性天疱疮关联。D.HLA-DR5与桥本甲状腺炎关联。E.HLA-B27与强直性脊柱炎关联。 
[题目] 893. 类风湿关节炎的自身抗体属于
A. IgG
B. IgM
C. IgA
D. IgD
E. IgE
[答案] B
[解析] 【正解B】类风湿关节炎的自身抗体——类风湿因子（RF）主要为IgM型（也有IgG和IgA型），IgM-RF识别变性IgG分子Fc段的抗原决定簇，形成IgM-抗IgG免疫复合物沉积于关节滑膜等组织，激活补体引起炎症损伤。【排除】A.IgG型RF也存在但非主要形式。C.IgA型RF也可检出但非主体。D.IgD和E.IgE不形成RF。 
[题目] 894. 与强直性脊柱炎关联的HLA分子是
A. HLA-DR2
B. HLA-DR3
C. HLA-DR4
D. HLA-DR5
E. HLA-B27
[答案] E
[解析] 【正解E】强直性脊柱炎（AS）与HLA-B27高度关联，相对危险度（RR）大于100，是HLA与疾病关联最经典的例子——约90%以上AS患者HLA-B27阳性，但HLA-B27阳性者并非全部发病，提示其他遗传和环境因素共同参与。【排除】A.HLA-DR2与多发性硬化症关联。B.HLA-DR3与重症肌无力关联。C.HLA-DR4与类风湿关节炎关联。D.HLA-DR5与桥本甲状腺炎关联。 
[题目] 895. 与类风湿关节炎关联的HLA分子是
A. HLA-DR2
B. HLA-DR3
C. HLA-DR4
D. HLA-DR5
E. HLA-B27
[答案] C
[解析] 【正解C】类风湿关节炎（RA）与HLA-DR4高度关联，特别是DRB1*0401和*0404等亚型——HLA-DR4分子beta链第70-74位氨基酸为"共享表位"（QKRAA/QRRAA基序），选择性提呈瓜氨酸化自身抗原肽给CD4+T细胞，是RA发病的核心遗传易感因素。【排除】A/B/D/E为其他自身免疫病的关联HLA型别。 
[题目] 896. 与肺出血-肾炎综合征相关联的HLA分子是
A. HLA-DR2
B. HLA-DR3
C. HLA-DR4
D. HLA-DR5
E. HLA-B27
[答案] A
[解析] 【正解A】肺出血-肾炎综合征（Goodpasture综合征）与HLA-DR2相关联——抗基底膜抗体（抗GBM抗体）靶向肾小球和肺泡基底膜IV型胶原alpha3链的NC1结构域，导致肺出血和急进性肾小球肾炎。【排除】B.HLA-DR3与重症肌无力关联。C.HLA-DR4与RA关联。D.HLA-DR5与桥本甲状腺炎关联。E.HLA-B27与AS关联。 
[题目] 897. Graves病患者血清中的自身抗体属于
A. IgG
B. IgM
C. IgA
D. IgD
E. IgE
[答案] A
[解析] 【正解A】Graves病患者血清中抗TSH受体自身抗体（TRAb/TSI）属于IgG类——IgG是唯一能穿过胎盘的Ig类别，孕妇TRAb可经胎盘进入胎儿体内刺激胎儿甲状腺，导致新生儿暂时性甲亢。【排除】B.IgM分子量大不能穿过胎盘。C.IgA主要存在于黏膜分泌液中。D.IgD表达于初始B细胞表面。E.IgE参与过敏反应。 
[题目] 898. 下列哪一项与自身反应性T淋巴细胞介导的自身免疫病的病理损伤机制有关
A. 肥大细胞
B. 嗜酸性粒细胞
C. 嗜碱性粒细胞
D. CD4+Th1细胞
E. CD4+Th2细胞
[答案] D
[解析] 【正解D】CD4+Th1细胞通过分泌IFN-gamma活化巨噬细胞，是自身反应性T淋巴细胞介导的自身免疫病（IV型超敏反应/DTH）的核心效应机制——活化的巨噬细胞释放TNF-alpha、活性氧、溶酶体酶等炎性介质导致组织损伤。【排除】A.肥大细胞参与I型超敏反应。B.嗜酸性粒细胞参与过敏和抗寄生虫免疫。C.嗜碱性粒细胞参与过敏反应。E.CD4+Th2细胞辅助体液免疫而非直接介导IV型组织损伤。 
[题目] 899. 与突眼性甲状腺肿相关联的HLA分子是
A. HLA-DR2
B. HLA-DR3
C. HLA-DR4
D. HLA-DR5
E. HLA-B27
[答案] B
[解析] 【正解B】突眼性甲状腺肿（Graves病伴眼病/Graves眼病）与HLA-DR3相关联——Graves眼病由自身免疫反应攻击眼眶后组织（成纤维细胞和脂肪细胞表面表达TSHR），导致球后组织增生和眼球外突。【排除】A.HLA-DR2与MS关联。C.HLA-DR4与RA和天疱疮关联。D.HLA-DR5与桥本甲状腺炎关联。E.HLA-B27与AS关联。 
[题目] 900. 与桥本甲状腺炎相关联的HLA分子是
A. HLA-DR2
B. HLA-DR3
C. HLA-DR4
D. HLA-DR5
E. HLA-B27
[答案] D
[解析] 【正解D】桥本甲状腺炎（HT/慢性淋巴细胞性甲状腺炎）与HLA-DR5相关联——自身抗原为甲状腺球蛋白（TG）和甲状腺过氧化物酶（TPO），由自身反应性CD4+Th1细胞和抗TPO/TG抗体共同介导甲状腺滤泡破坏，导致甲状腺功能减退。【排除】A/B/C/E为其他自身免疫病的关联HLA型别。 
[题目] 901. 主要由III型超敏反应引起的自身免疫病是
A. 自身免疫性溶血性贫血
B. 毒性弥漫性甲状腺肿
C. 重症肌无力
D. 系统性红斑狼疮
E. I型糖尿病
[答案] D
[解析] 【正解D】系统性红斑狼疮（SLE）主要由III型超敏反应（免疫复合物介导）引起——抗核抗体（ANA/抗dsDNA抗体）与自身抗原形成中等大小免疫复合物，沉积于肾小球基底膜、皮肤基底膜和关节滑膜等处，激活补体和FcgammaR介导的炎症反应导致组织损伤。【排除】A.自身免疫性溶血性贫血属II型超敏反应（抗体直接破坏红细胞）。B.Graves病属II型（刺激性抗体模拟TSH）。C.重症肌无力属II型（抗AChR抗体阻断功能）。E.1型糖尿病以IV型超敏反应为主（CD8+CTL破坏胰岛beta细胞）。 
[题目] 902. Graves病的自身抗原是
A. 甲状腺球蛋白
B. 甲状腺激素
C. 甲状腺激素受体
D. 促甲状腺激素
E. 促甲状腺激素受体
[答案] E
[解析] 【正解E】Graves病的自身抗原是促甲状腺激素受体（TSHR）——刺激性自身抗体LATS/TRAb与TSHR结合后模拟TSH效应，持续激活腺苷酸环化酶-cAMP通路，刺激甲状腺滤泡上皮细胞过度分泌甲状腺激素（T3/T4），导致甲状腺功能亢进。【排除】A.甲状腺球蛋白为桥本甲状腺炎自身抗原。B.甲状腺激素非自身抗原。C.甲状腺激素受体为核受体非膜受体。D.促甲状腺激素（TSH）为垂体激素非自身抗原。 
[题目] 903. 下列哪一种自身免疫病的病理损伤机制属于III型超敏反应
A. Graves病
B. 重症肌无力
C. 自身免疫性溶血性贫血
D. 系统性红斑狼疮
E. 多发性硬化症
[答案] D
[解析] 【正解D】系统性红斑狼疮（SLE）的病理损伤机制属于III型超敏反应——抗核抗体与自身抗原形成免疫复合物，沉积于肾小球（狼疮性肾炎）、皮肤（蝶形红斑）、关节（关节炎）等组织，激活补体和炎症细胞导致组织损伤。SLE可同时涉及II型和IV型机制，但以III型最为突出。【排除】A.Graves病属II型（抗体介导功能亢进）。B.重症肌无力属II型（抗体阻断AChR）。C.自身免疫性溶血性贫血属II型（抗体直接破坏红细胞）。E.多发性硬化症属IV型（T细胞介导脱髓鞘）。 
[题目] 904. IFN-γ转基因小鼠易发生糖尿病的机制是由于
A. 免疫忽视的打破
B. 淋巴细胞的多克隆激活
C. 活化诱导的细胞死亡障碍
D. Treg功能异常
E. MHCII类分子表达异常
[答案] E
[解析] 【正解E】IFN-gamma转基因小鼠胰岛beta细胞异常表达MHC-II类分子——正常情况下胰岛beta细胞不表达MHC-II类分子（免疫忽视状态），IFN-gamma诱导其异位表达MHC-II类分子，向自身反应性CD4+T细胞提呈自身抗原，打破免疫忽视引发糖尿病。【排除】A.免疫忽视打破是结果而非直接机制。B.非多克隆激活。C.非AICD障碍。D.非Treg功能异常。 
[题目] 905. 桥本甲状腺炎的自身抗原是
A. 甲状腺激素
B. 甲状腺激素受体
C. 促甲状腺激素
D. 促甲状腺激素受体
E. 甲状腺球蛋白
[答案] E
[解析] 【正解E】桥本甲状腺炎（慢性淋巴细胞性甲状腺炎）的主要自身抗原为甲状腺球蛋白（TG）和甲状腺过氧化物酶（TPO）——抗TG和抗TPO抗体是诊断桥本甲状腺炎最敏感的血清学指标，自身反应性T细胞和抗体共同介导甲状腺滤泡细胞破坏，导致甲状腺功能减退。【排除】A.甲状腺激素非自身抗原。B.甲状腺激素受体非桥本自身抗原。C.促甲状腺激素（TSH）非自身抗原。D.TSHR为Graves病自身抗原。 
[题目] 906. Graves病的损伤机制属于
A. I型超敏反应
B. II型超敏反应
C. III型超敏反应
D. IV型超敏反应
E. 与超敏反应无关
[答案] B
[解析] 【正解B】Graves病的损伤机制属于II型超敏反应——抗TSHR自身抗体（TRAb/LATS）模拟TSH配体作用，与TSHR结合后持续激活受体信号通路，导致甲状腺滤泡上皮细胞功能亢进和甲状腺激素过度分泌，属II型超敏反应中的抗体介导细胞功能异常型（刺激型）。【排除】A.I型为IgE介导的过敏反应。C.III型为免疫复合物沉积介导。D.IV型为T细胞介导。E.Graves病明确与超敏反应有关。 
[题目] 907. 自身免疫性肾小球肾炎的发生机制主要是
A. 免疫隔离部位抗原的释放
B. 自身抗原的改变
C. 分子模拟
D. 表位扩展
E. 免疫忽视
[答案] C
[解析] 【正解C】自身免疫性肾小球肾炎（链球菌感染后肾小球肾炎）的主要发生机制为分子模拟——A族溶血性链球菌M蛋白与肾小球基底膜成分存在共同抗原表位，抗链球菌抗体交叉识别肾小球基底膜，激活补体和炎症反应导致肾小球损伤。【排除】A.隐蔽抗原释放非主要机制（交感性眼炎更典型）。B.自身抗原改变非主要机制。D.表位扩展非主要机制。E.免疫忽视非肾小球肾炎的主要发生机制。 
[题目] 908. 自身免疫性中性粒细胞减少症的损伤机制主要是
A. I型超敏反应
B. II型超敏反应
C. III型超敏反应
D. IV型超敏反应
E. 与超敏反应无关
[答案] B
[解析] 【正解B】自身免疫性中性粒细胞减少症的损伤机制主要为II型超敏反应——抗中性粒细胞抗体（如抗HNA抗体）与中性粒细胞表面抗原结合后，通过激活补体（MAC介导裂解）和调理吞噬（FcgammaR/CR介导）导致中性粒细胞破坏减少。【排除】A.I型为IgE介导过敏反应。C.III型为免疫复合物沉积介导。D.IV型为T细胞介导。E.明确与超敏反应（II型）有关。 
[题目] 909. 下列哪一种自身免疫病的病理损伤机制属于IV型超敏反应
A. Graves病
B. 重症肌无力
C. 自身免疫性溶血性贫血
D. 系统性红斑狼疮
E. 多发性硬化症
[答案] E
[解析] 【正解E】多发性硬化症（MS）的病理损伤机制属于IV型超敏反应——自身反应性CD4+Th1细胞和CD8+CTL穿过血脑屏障，识别攻击中枢神经系统髓鞘碱性蛋白（MBP）和髓鞘少突胶质细胞糖蛋白（MOG），导致脱髓鞘病变和神经功能障碍。【排除】A.Graves病属II型（刺激性抗体）。B.重症肌无力属II型（抗AChR抗体）。C.自身免疫性溶血性贫血属II型（抗红细胞抗体）。D.SLE以III型为主。 
[题目] 910. 自身免疫性血小板减少性紫癜的损伤机制主要是
A. I型超敏反应
B. II型超敏反应
C. III型超敏反应
D. IV型超敏反应
E. 与超敏反应无关
[答案] B
[解析] 【正解B】自身免疫性血小板减少性紫癜（ITP）的损伤机制主要为II型超敏反应——抗血小板膜糖蛋白（GPIIb/IIIa、GPIb/IX等）抗体包被血小板后，经脾脏巨噬细胞FcgammaR介导的调理吞噬和补体介导的溶解导致血小板减少，引起出血倾向。【排除】A.I型为过敏反应。C.III型为免疫复合物沉积。D.IV型为T细胞介导。E.明确与超敏反应（II型）相关。 
[题目] 911. 自身免疫性血小板减少性紫癜的病理损伤机制主要是
A. 自身抗体直接介导细胞破坏
B. 自身抗体介导细胞功能异常
C. 自身抗体与自身抗原形成免疫复合物介导组织损伤
D. 自身反应性T淋巴细胞介导的自身免疫病
E. 自身抗体和自身反应性T淋巴细胞共同作用的结果
[答案] A
[解析] 【正解A】自身免疫性血小板减少性紫癜（ITP）的病理损伤机制主要是自身抗体直接介导血小板破坏——抗血小板抗体（主要为IgG型）结合血小板膜糖蛋白后，通过FcgammaR介导的巨噬细胞吞噬（主要在脾脏）和补体激活介导的血小板裂解，导致外周血小板计数显著下降。【排除】B.抗体介导功能异常（如Graves病和MG）非ITP主机制。C.免疫复合物介导损伤为III型机制（如SLE）。D.自身反应性T细胞介导为IV型。E.ITP主要为抗体介导的II型机制。 
[题目] 912. 恶性贫血的损伤机制主要是
A. 自身抗体直接介导细胞破坏
B. 自身抗体介导细胞功能异常
C. 自身抗体与自身抗原形成免疫复合物介导组织损伤
D. 自身反应性T淋巴细胞介导的自身免疫病
E. 自身抗体和自身反应性T淋巴细胞共同作用的结果
[答案] A
[解析] 【正解A】恶性贫血的损伤机制主要为自身抗体直接介导细胞破坏和功能阻断——抗胃壁细胞抗体破坏胃壁细胞（导致胃酸和内因子分泌减少），抗内因子抗体（阻断型和结合型）阻断内因子与维生素B12的结合，导致维生素B12吸收障碍和巨幼细胞性贫血。【排除】B.抗体介导功能异常非主要（虽内因子阻断属于功能异常但主效应是细胞破坏和吸收障碍）。C.免疫复合物介导非主要机制。D.T细胞介导非主要。E.SLE等疾病有二者共同作用，非恶性贫血主要模式。 
[题目] 913. 转录因子Foxp3基因敲除小鼠易发生自身免疫病的机制是由于
A. 免疫忽视的打破
B. 淋巴细胞的多克隆激活
C. 活化诱导的细胞死亡障碍
D. Treg功能异常
E. MHCII类分子表达异常
[答案] D
[解析] 【正解D】转录因子Foxp3是天然调节性T细胞（nTreg/CD4+CD25+Foxp3+）的关键转录因子——Foxp3基因敲除小鼠（Scurfy小鼠）因Treg发育和功能缺失，丧失外周免疫耐受，CD4+效应T细胞失控活化，导致多器官自身免疫病（类似人类IPEX综合征）。【排除】A.免疫忽视打破非直接机制。B.Treg缺陷不等于淋巴细胞多克隆激活。C.非AICD障碍。E.非MHC-II类分子表达异常。 
[题目] 914. 关于全身性自身免疫病，说法错误的是
A. 可见于多种器官和组织
B. 一般局限于某一特定器官
C. 病变可发生在皮肤、肾脏和关节等多处
D. 是由针对多种器官和组织的靶抗原的自身免疫反应引起的
E. 又叫做系统性自身免疫病
[答案] B
[解析] 【正解B】全身性（系统性）自身免疫病病变广泛，累及多种器官和组织（如SLE累及皮肤、肾脏、关节、血液系统等），其自身抗体针对广泛分布的自身抗原（如DNA、组蛋白、核糖核蛋白等），而非局限于某一特定器官——病变局限于某一特定器官是器官特异性自身免疫病的特征。【排除】A.可见于多种器官和组织（正确——系统性特点）。C.病变可发生在皮肤肾脏和关节（正确——SLE典型表现）。D.由针对多种器官靶抗原的自身免疫反应引起（正确）。E.又叫做系统性自身免疫病（正确——同义名称）。 
[题目] 915. 下列哪一种属于免疫复合物介导的自身免疫病
A. 自身免疫性溶血性贫血
B. 桥本甲状腺炎
C. 重症肌无力
D. 强直性脊柱炎
E. 多发性硬化症
[答案] D
[解析] 【正解A】SLE属于免疫复合物介导的自身免疫病（III型超敏反应）——抗核抗体与自身抗原形成免疫复合物沉积于肾小球、皮肤、关节等组织引起损伤。【排除】B.桥本甲状腺炎以IV型（T细胞介导甲状腺破坏）为主伴II型参与。C.重症肌无力以II型为主（抗AChR抗体阻断功能）。D.强直性脊柱炎与HLA-B27高度关联，发病机制涉及固有免疫（IL-23/IL-17轴）和适应性免疫，超敏反应分型不易归类。E.多发性硬化症以IV型为主。 
[题目] 916. 下列各项中，与自身抗原改变无关的是
A. 肺炎支原体感染
B. 类风湿关节炎
C. 青霉素
D. 头孢菌素
E. 肺炎衣原体感染
[答案] E
[解析] 【正解E】肺炎衣原体感染通过分子模拟机制（肺炎衣原体热休克蛋白60与血管壁自身HSP60存在共同抗原表位）诱发冠状血管疾病，属于分子模拟而非自身抗原改变——肺炎衣原体感染不直接改变自身组织和细胞的抗原结构。【排除】A.肺炎支原体感染可改变红细胞抗原表位导致冷凝集素病。B.类风湿关节炎涉及瓜氨酸化等自身抗原翻译后修饰改变。C.青霉素和D.头孢菌素可吸附红细胞表面形成新抗原表位，属于药物引起的自身抗原改变。 
[题目] 917. 由于自身抗体直接介导细胞破坏引发的自身免疫病是
A. Graves病
B. 重症肌无力
C. 恶性贫血
D. 系统性红斑狼疮
E. 类风湿关节炎
[答案] C
[解析] 【正解C】恶性贫血由抗胃壁细胞抗体和抗内因子(VitB12结合蛋白)抗体介导——抗体直接结合胃壁细胞通过补体溶解和ADCC导致胃壁细胞破坏，同时封闭内因子阻断VitB12吸收致巨幼细胞性贫血，属于II型超敏反应中自身抗体直接介导细胞破坏的经典范例。【排除】A.Graves病抗TSHR抗体为刺激性抗体(模拟TSH致甲亢),属抗体介导功能异常非细胞破坏。B.重症肌无力抗AChR抗体主要为阻断受体功能致肌无力,非破坏性。D.SLE主要为DNA-抗DNA免疫复合物沉积(III型),非直接细胞破坏。E.类风湿关节炎主要为RF-IgG免疫复合物沉积于关节(III型为主)。
[题目] 918. 免疫自稳功能异常可引起下列哪些疾病
A. 感染
B. 肿瘤
C. 自身免疫病
D. 移植排斥
E. 免疫缺陷病
[答案] C
[解析] 【正解C】免疫自稳（immune homeostasis）功能异常时，机体不能维持对自身抗原的免疫耐受，自身反应性淋巴细胞被激活，产生自身抗体和/或自身反应性T细胞攻击自身组织，可导致自身免疫病——免疫自稳是免疫系统三大功能之一（防御、监视、自稳）。【排除】A.感染由免疫防御功能低下引起。B.肿瘤由免疫监视功能低下引起。D.移植排斥是免疫防御对外来组织细胞的正常免疫应答。E.免疫缺陷病由免疫系统组成或功能先天/后天缺陷所致。 
[题目] 919. 下列自身免疫病的诱发因素中，与糖尿病无关的是
A. 分子模拟
B. 表位扩展
C. CTLA-4等位基因突变
D. HLA分子
E. 自身抗原的改变
[答案] E
[解析] 【正解E】1型糖尿病的诱发因素包括分子模拟（柯萨奇病毒B4与谷氨酸脱羧酶GAD存在共同表位）、表位扩展（自身抗原谱从单一表位扩展至多个beta细胞抗原）、CTLA-4等位基因突变（T细胞负调控减弱）和HLA易感基因（DR3/DR4），与自身抗原的直接改变（如药物修饰或物理化学因素改变自身抗原结构）无关。【排除】A-D均为1型糖尿病的已知诱发因素。 
[题目] 920. 属于全身性自身免疫病的是
A. I型糖尿病
B. Graves病
C. 支气管哮喘
D. 类风湿关节炎
E. 重症肌无力
[答案] D
[解析] 【正解D】类风湿关节炎（RA）为全身性（系统性）自身免疫病——病变累及多关节及其他器官（如肺、心包、血管等），自身抗体RF和抗CCP抗体靶向广泛分布的抗原（变性IgG和瓜氨酸化蛋白）。1型糖尿病、Graves病和重症肌无力为器官特异性自身免疫病。【排除】A/B/E均为器官特异性自身免疫病。C.支气管哮喘为超敏反应性疾病非经典自身免疫病。 
[题目] 921. 下列哪一项与多发性硬化症的损伤机制无关
A. 髓鞘碱性蛋白
B. 表位扩展
C. CD4+Th1细胞
D. CD4+Th2细胞
E. HLA-DR2
[答案] D
[解析] 【正解D】多发性硬化症（MS）主要由CD4+Th1细胞和CD8+CTL介导（IV型超敏反应），与CD4+Th2细胞无关——Th1分泌IFN-gamma激活巨噬细胞，Th2主要参与体液免疫和过敏反应，在MS发病中不起主要作用，甚至可能通过分泌IL-4/IL-10起保护性作用。【排除】A.髓鞘碱性蛋白（正确——MS的主要自身抗原）。B.表位扩展（正确——MS病程中自身抗原谱逐渐扩大）。C.CD4+Th1细胞（正确——MS主要效应细胞）。E.HLA-DR2（正确——MS的遗传易感HLA型别）。 
[题目] 922. 下列哪一项自身免疫病的治疗方案是错误的
A. 口服自身抗原诱导免疫耐受
B. 应用 MHCII 类分子的单抗抑制 APC 的功能
C. 应用重组 IL-2 促进 T 细胞的增殖活化
D. 应用 FK-506 治疗自身免疫病
E. 应用 TCR/BCR 独特型抗体清除自身反应性 T/B 淋巴细胞
[答案] C
[解析] 【正解C】自身免疫病治疗应抑制而非增强自身反应性T细胞的增殖活化，应用重组IL-2促进T细胞增殖活化会加重自身免疫病——IL-2是T细胞增殖的关键生长因子，增加IL-2会促进自身反应性T细胞克隆扩增，加重组织损伤。【排除】A.口服自身抗原诱导免疫耐受（正确——黏膜耐受策略）。B.应用MHC-II类分子单抗抑制APC功能（正确——阻断抗原提呈）。D.应用FK-506（他克莫司/钙调磷酸酶抑制剂）治疗（正确——抑制T细胞活化）。E.应用TCR/BCR独特型抗体清除自身反应性淋巴细胞（正确——独特型网络调节策略）。 
[题目] 923. 自身免疫病的病理损伤机制不包括
A. 自身抗体介导细胞功能异常，可引发自身免疫病
B. 自身抗体直接介导细胞破坏，可引发自身免疫病
C. 自身抗体与自身抗原形成免疫复合物介导组织损伤
D. 自身反应性 T 淋巴细胞可引发自身免疫病
E. 所有的自身免疫病均是由自身抗体或自身反应性 T 细胞单独作用的结果，不存在二者的共同作用
[答案] E
[解析] 【正解E】自身免疫病的病理损伤机制包括自身抗体介导（II型、III型）和自身反应性T细胞介导（IV型），许多自身免疫病并非由单一机制引起，而可同时涉及自身抗体和自身反应性T细胞的共同作用——如SLE同时涉及II型（抗血细胞抗体）、III型（免疫复合物沉积）和IV型（T细胞介导）机制。表述"所有的自身免疫病均是由单一因素单独作用"是错误的。【排除】A.自身抗体介导细胞功能异常可引发自身免疫病（正确——如Graves病和MG）。B.自身抗体直接介导细胞破坏可引发自身免疫病（正确——如ITP）。C.免疫复合物介导组织损伤（正确——如SLE狼疮肾炎）。D.自身反应性T细胞可引发自身免疫病（正确——如MS和1型糖尿病）。 
[题目] 924. 关于诱发自身免疫病的性别因素说法错误的是
A. 女性患多发性硬化症的可能性比男性大
B. 系统性红斑狼疮患者的雌激素水平普遍下降
C. 患自身免疫性甲状腺疾病的女性在产后容易出现甲状腺功能低下
D. 妊娠时类风湿关节炎患者的病情通常减轻
E. 男性患强直性脊柱炎的可能性比女性大
[答案] B
[解析] 【正解B】SLE患者雌激素水平普遍升高而非下降——雌激素可促进Th2细胞分化和B细胞活化，增强自身抗体产生，是SLE女性发病率显著高于男性（约9:1）的重要原因之一。【排除】A.女性MS风险大于男性（正确）。C.产后甲状腺功能低下（正确——产后免疫反弹现象）。D.妊娠时RA病情减轻（正确——妊娠期免疫抑制状态）。E.男性AS可能性大于女性（正确——AS男性发病率约为女性的2-3倍）。 
[题目] 925. 关于诱发自身免疫病的性别因素错误的是
A. 女性患多发性硬化症的可能性比男性大
B. 系统性红斑狼疮患者的雌激素水平普遍下降
C. 患自身免疫性甲状腺疾病的女性在产后容易出现甲状腺功能低下
D. 妊娠时类风湿关节炎患者的病情通常减轻
E. 男性患强直性脊柱炎的可能性比女性大
[答案] B
[解析] 【正解B】SLE患者雌激素水平普遍升高而非下降——雌激素促进Th2细胞分化和B细胞产生抗体，增强自身抗体（如ANA/抗dsDNA）水平，是SLE女性发病率远超男性（约9:1）的重要内分泌基础。【排除】A.女性MS可能性大于男性（正确——男女比约1:2-3）。C.产后易出现甲状腺功能低下（正确——产后免疫状态反弹）。D.妊娠时RA病情减轻（正确——妊娠期免疫抑制环境）。E.男性AS可能性大于女性（正确——AS男女比约2-3:1）。 
[题目] 926. 关于恶性贫血说法错误的是
A. 是由抗内因子的自身抗体引起的
B. 维生素B12缺乏引起贫血
C. 自身抗体直接结合自身抗原，阻断其生物学作用
D. 自身抗体与自身抗原形成免疫复合物，介导组织损伤
E. 属于I型超敏反应
[答案] C
[解析] 【正解E】恶性贫血不属于I型超敏反应（即发型过敏反应/IgE介导），其属II型超敏反应——抗胃壁细胞抗体破坏胃壁细胞，抗内因子抗体阻断维生素B12吸收。描述"C.自身抗体直接结合自身抗原阻断其生物学作用"是正确的（抗内因子抗体阻断内因子与B12结合）。【排除】A.由抗内因子抗体引起（正确）。B.维生素B12缺乏引起贫血（正确——内因子缺乏导致B12吸收障碍）。C.自身抗体阻断生物学作用（正确——内因子被阻断）。D.自身抗体与抗原形成免疫复合物也是恶性贫血的部分机制。注意：此题答案为E，可能教材以I型为错误选项（肯定错误）而C有争议。 
[题目] 927. 关于隐蔽抗原说法错误的是
A. 通过表位扩展诱发自身免疫病
B. 和免疫系统在解剖位置上相对隔离
C. 外伤、手术或感染等情况可诱发自身免疫病
D. 胚胎期未曾与免疫系统发生接触
E. 在免疫系统发育过程中，针对隐蔽抗原的淋巴细胞克隆未被诱导免疫而保留
[答案] A
[解析] 【正解A】隐蔽抗原诱发自身免疫病的机制是通过解剖屏障破坏后释放被隔离的自身抗原进入免疫系统，而非通过表位扩展——隐蔽抗原（如晶状体蛋白、精子、髓鞘碱性蛋白等）在胚胎期未与免疫系统接触，外伤/手术/感染破坏屏障后释放，被识别为"非己"激发免疫应答。【排除】B.与免疫系统解剖位置相对隔离（正确）。C.外伤手术或感染可诱发（正确——屏障破坏释放隐蔽抗原）。D.胚胎期未曾与免疫系统接触（正确——中枢耐受未建立）。E.针对隐蔽抗原的淋巴细胞克隆被保留（正确——未被阴性选择清除）。 
[题目] 928. 关于自身免疫病诱发因素的说法错误的是
A. 外伤不能引发自身免疫病
B. 自身免疫病具有遗传倾向
C. 性别和年龄与自身免疫病相关
D. 某些药物可引起自身免疫病的发生
E. 病原体感染可诱发自身免疫病
[答案] A
[解析] 【正解A】外伤可引发自身免疫病——眼外伤可释放晶状体蛋白和葡萄膜抗原（隐蔽抗原）进入免疫系统，诱发交感性眼炎；睾丸外伤可释放精子抗原诱发自身免疫性睾丸炎。说法"外伤不能引发自身免疫病"是错误的。【排除】B.自身免疫病有遗传倾向（正确——HLA关联和基因多态性）。C.性别和年龄与自身免疫病相关（正确——女性多发、老年多发）。D.某些药物可诱发自身免疫病（正确——如普鲁卡因胺诱发SLE样综合征）。E.病原体感染可诱发自身免疫病（正确——分子模拟和旁路激活等机制）。 
[题目] 929. 发生机制主要与表位扩展有关的疾病是
A. 风湿性心脏病
B. 系统性红斑狼疮
C. 自身交感性眼炎
D. Graves病
E. 药物引起的自身免疫性溶血性贫血
[答案] B
[解析] 【正解B】系统性红斑狼疮（SLE）的发生机制主要与表位扩展有关——病程中自身抗原谱从最初针对单一表位（如dsDNA某一表位）逐渐扩展至同一抗原的不同表位（分子内扩展）和不同自身抗原（分子间扩展），如扩展至组蛋白、Smith抗原、RNP等，导致多系统多器官损伤。【排除】A.风湿性心脏病主要与分子模拟有关。C.交感性眼炎主要与隐蔽抗原释放有关。D.Graves病主要与抗体模拟配体有关。E.药物引起的自身免疫性溶血性贫血主要与自身抗原改变有关。 
[题目] 930. 发生机制主要与分子模拟有关的疾病是
A. 风湿性心脏病
B. 重症肌无力
C. 交感性眼炎
D. 药物诱发的自身免疫溶血性贫血
E. 睾丸外伤后的不育症
[答案] A
[解析] 【正解A】风湿性心脏病的发生机制主要为分子模拟——A族溶血性链球菌M蛋白与人心肌肌球蛋白和心瓣膜糖蛋白存在共同抗原表位，抗链球菌抗体和自身反应性T细胞交叉识别心肌组织，导致风湿性全心炎（心内膜炎、心肌炎、心包炎）和慢性风湿性心脏瓣膜病。【排除】B.重症肌无力为抗AChR抗体介导的II型超敏反应。C.交感性眼炎为隐蔽抗原释放。D.药物诱发溶血为自身抗原改变。E.睾丸外伤不育为隐蔽抗原释放。 
[题目] 931. 关于Graves病的描述错误的是
A. 是甲状腺亢进为特征的自身免疫病
B. 自身抗体可高亲和持续结合TSH受体，模拟TSH效应
C. 甲状腺上皮细胞长期分泌过量的甲状腺素
D. 病理损伤机制是自身抗体直接介导细胞破坏
E. 其自身抗体又被称为长效甲状腺刺激抗体
[答案] D
[解析] 【正解D】Graves病中自身抗体（TRAb/LATS/TSI）为刺激性抗体，与TSHR结合后模拟TSH配体效应持续激活甲状腺滤泡细胞，导致甲状腺激素过度分泌——病理损伤机制是抗体介导细胞功能异常（刺激型），并非自身抗体直接介导细胞破坏（如ITP的细胞毒型）。【排除】A.甲状腺功能亢进为特征（正确）。B.自身抗体高亲和力持续结合TSHR模拟TSH效应（正确）。C.甲状腺上皮细胞长期分泌过量甲状腺素（正确）。E.自身抗体被称为长效甲状腺刺激抗体（正确——LATS）。 
[题目] 932. 自身抗体竞争性阻断配体导致细胞和组织功能紊乱，从而引发的自身免疫病是
A. 自身免疫性中性粒细胞减少症
B. 恶性贫血
C. 重症肌无力
D. 系统性红斑狼疮
E. 1型糖尿病
[答案] C
[解析] 【正解C】重症肌无力（MG）自身抗体（抗AChR抗体）竞争性阻断神经肌肉接头处乙酰胆碱（ACh）与乙酰胆碱受体（AChR）的结合，阻碍神经肌肉信号传递，导致骨骼肌无力和易疲劳——属II型超敏反应中抗体介导细胞功能异常型（阻断型）。【排除】A.自身免疫性中性粒细胞减少症属抗体直接介导细胞破坏。B.恶性贫血同时涉及抗体阻断内因子功能和破坏胃壁细胞。D.SLE以III型免疫复合物沉积为主。E.1型糖尿病以IV型T细胞介导为主。 
[题目] 933. 下列属于自身免疫病的是
A. 多发性骨髓瘤
B. 肺出血 - 肾炎综合征
C. 原发性肝癌
D. 艾滋病
E. 乙型脑炎
[答案] B
[解析] 【正解B】肺出血-肾炎综合征（Goodpasture综合征）是经典自身免疫病——抗基底膜抗体靶向肾小球和肺泡基底膜IV型胶原alpha3链，导致肺出血和急进性肾小球肾炎。【排除】A.多发性骨髓瘤为浆细胞恶性肿瘤。C.原发性肝癌为恶性肿瘤。D.艾滋病（AIDS）为HIV感染导致CD4+T细胞耗竭的免疫缺陷病。E.乙型脑炎为乙型脑炎病毒感染引起的传染病。 
[题目] 934. 多发性硬化症的主要发生机制是
A. I型超敏反应
B. II型超敏反应
C. III型超敏反应
D. IV型超敏反应
E. 免疫缺陷
[答案] D
[解析] 【正解D】多发性硬化症（MS）的主要发生机制为IV型超敏反应（细胞免疫介导/迟发型超敏反应）——自身反应性CD4+Th1细胞和CD8+CTL识别中枢神经系统髓鞘蛋白（MBP、MOG、PLP等），释放促炎因子，募集和活化巨噬细胞、小胶质细胞，导致脱髓鞘斑块形成和轴突损伤。【排除】A.I型为IgE介导过敏反应。B.II型为抗体直接介导细胞损伤。C.III型为免疫复合物沉积。E.MS非免疫缺陷病。 
[题目] 935. 下列自身免疫病的病理损伤机制中，哪一项不属于自身抗体直接介导的细胞破坏
A. 激活补体系统，裂解细胞
B. 形成中等大小的免疫复合物，沉积在毛细血管基底膜
C. ADCC
D. 补体裂解片段招募中性粒细胞，释放酶和介质引起细胞损伤
E. 补体裂解片段通过调理吞噬作用损伤自身细胞
[答案] B
[解析] 【正解B】形成中等大小的免疫复合物沉积在毛细血管基底膜属于III型超敏反应机制（Arthus反应/血清病型），非自身抗体直接介导的细胞破坏（II型细胞毒型）——III型机制涉及抗原-抗体复合物沉积后激活补体和FcgammaR介导的炎症，而II型是抗体直接结合细胞/组织抗原后激活补体、ADCC或调理吞噬破坏靶细胞。【排除】A.激活补体系统裂解细胞（正确——II型机制之一/CDC）。C.ADCC（正确——II型机制之一）。D.补体片段募集中性粒细胞释放酶和介质（正确——II型炎症放大）。E.调理吞噬作用（正确——II型机制之一）。 
[题目] 936. 关于诱发自身免疫病的相关因素，说法错误的是
A. 自身免疫病多发于老年人
B. 女性患系统性红斑狼疮的可能性比男性大
C. 女性分娩后有的个体会出现自身免疫病加重的情况
D. 自身免疫病多发于儿童
E. 在SLE中，皮肤暴露于紫外线可诱发自身免疫应答
[答案] D
[解析] 【正解D】自身免疫病多发于老年人，非多发于儿童——随年龄增长，胸腺萎缩导致T细胞输出减少、Treg功能下降、累积的体细胞突变和外源性抗原暴露增加，免疫功能紊乱的风险逐渐积累，自身免疫病发病率随年龄增高。【排除】A.自身免疫病多发于老年人（正确）。B.SLE女性可能性大于男性（正确——约9:1）。C.女性分娩后可能出现自身免疫病加重（正确——产后免疫反弹）。E.SLE中紫外线可诱发自身免疫应答（正确——紫外线诱导角质形成细胞凋亡释放自身抗原）。 
[题目] 937. 肺炎衣原体感染引起的冠状血管疾病，其诱发原因属于
A. 免疫隔离部位抗原的释放
B. 自身抗原的改变
C. 表位扩展
D. 分子模拟
E. 免疫忽视
[答案] D
[解析] 【正解D】肺炎衣原体感染引起的冠状血管疾病（动脉粥样硬化相关）其诱发原因属于分子模拟——肺炎衣原体热休克蛋白60（HSP60）与人血管内皮细胞HSP60氨基酸序列高度同源，抗衣原体HSP60免疫应答交叉识别血管壁自身HSP60，导致血管慢性炎症和动脉粥样硬化。【排除】A.免疫隔离部位抗原释放非此机制。B.自身抗原改变非此机制。C.表位扩展非此机制（可能在疾病进展后期参与）。E.免疫忽视非此机制。 
[题目] 938. 与HLA-DR5关联的自身免疫病是
A. 类风湿关节炎
B. 重症肌无力
C. 多发性硬化症
D. 桥本甲状腺炎
E. 系统性红斑狼疮
[答案] D
[解析] 【正解D】桥本甲状腺炎与HLA-DR5相关联——自身反应性CD4+T细胞和抗TPO/TG抗体共同导致甲状腺滤泡细胞损伤和甲状腺功能减退。【排除】A.类风湿关节炎（RA）与HLA-DR4关联。B.重症肌无力（MG）与HLA-DR3关联。C.多发性硬化症（MS）与HLA-DR2关联。E.系统性红斑狼疮（SLE）与HLA-DR2/DR3均有关联，非单一HLA型别。 
[题目] 939. 可通过分子模拟而导致自身免疫性疾病的病原体主要是
A. 金黄色葡萄球菌
B. 伤寒杆菌
C. 痢疾杆菌
D. 肺炎支原体
E. 溶血性链球菌
[答案] E
[解析] 【正解E】溶血性链球菌（A族beta溶血性链球菌/化脓性链球菌）M蛋白与人心肌肌球蛋白、心瓣膜糖蛋白和肾小球基底膜存在共同抗原表位（分子模拟），是风湿热、风湿性心脏病和链球菌感染后肾小球肾炎的关键诱因。【排除】A.金黄色葡萄球菌主要引起化脓性感染和毒素性疾病，非经典分子模拟模型。B.伤寒杆菌和C.痢疾杆菌非主要分子模拟病原体。D.肺炎支原体可通过分子模拟诱发冷凝集素病但非最主要模型。 
[题目] 940. 下列属于自身免疫病的是
A. 艾滋病
B. 白血病
C. 多发性骨髓瘤
D. 乙型脑炎
E. 1型糖尿病
[答案] E
[解析] 【正解E】1型糖尿病（T1DM）是经典自身免疫病——自身反应性CD8+CTL和CD4+Th1细胞攻击破坏胰岛beta细胞，导致胰岛素绝对缺乏和高血糖，属器官特异性自身免疫病。【排除】A.艾滋病为HIV感染导致的获得性免疫缺陷综合征，非自身免疫病。B.白血病为造血系统恶性肿瘤。C.多发性骨髓瘤为浆细胞恶性肿瘤。D.乙型脑炎为病毒感染性传染病。 
[题目] 941. 下列哪一项不会改变自身组织和细胞的免疫原性
A. 外伤
B. 电离辐射
C. 药物
D. 免疫接种
E. 感染
[答案] D
[解析] 【正解D】免疫接种（疫苗）通常不改变自身组织和细胞的免疫原性——疫苗通过引入减毒/灭活病原体或重组抗原来激发保护性免疫应答，不直接修饰自身抗原结构。而外伤可释放隐蔽抗原，电离辐射可导致蛋白质变性，药物（如青霉素、甲基多巴）可吸附细胞表面形成新表位，感染可改变自身抗原结构。【排除】A.外伤可改变暴露/释放隐蔽抗原。B.电离辐射可致蛋白质变性和氧化修饰。C.药物可吸附细胞表面或与自身蛋白结合形成新抗原。E.感染可通过多种机制改变自身抗原或分子模拟诱发。 
[题目] 942. 重症肌无力的病理机制属于
A. 细胞免疫功能缺陷
B. II型超敏反应
C. IV型超敏反应
D. 巨噬细胞缺陷
E. NK细胞活性低下
[答案] B
[解析] 【正解B】重症肌无力（MG）的病理机制属于II型超敏反应（抗体介导的细胞功能障碍型）——抗乙酰胆碱受体（AChR）抗体与神经肌肉接头突触后膜AChR结合后，通过竞争性阻断ACh结合（功能阻断）、加速AChR内化和降解（抗原调变），以及补体介导的突触后膜破坏导致神经肌肉信号传递障碍和骨骼肌无力。【排除】A.非细胞免疫功能缺陷（免疫功能正常甚至亢进）。C.非IV型（T细胞介导）为主。D.非巨噬细胞缺陷。E.非NK细胞活性低下。 
[题目] 943. 药物引起的自身免疫性溶血性贫血的原因是
A. 药物诱导红细胞基因突变，产生新抗原
B. 药物吸附红细胞表面，形成新的抗原表位
C. 药物与红细胞有相同的抗原表位
D. 药物可多克隆激活B细胞
E. 药物抑制Treg细胞活性
[答案] B
[解析] 【正解B】药物引起的自身免疫性溶血性贫血的原因是药物（如青霉素、头孢菌素、甲基多巴等）吸附于红细胞表面，与红细胞膜蛋白结合形成新的抗原表位（半抗原-载体复合物），被免疫系统识别为"非己"，诱导产生抗红细胞抗体，导致II型超敏反应介导的溶血性贫血。【排除】A.药物不直接诱导基因突变产生新抗原。C.药物与红细胞表位相同（分子模拟）非主要机制。D.多克隆B细胞激活非药物性溶血性贫血主机制。E.抑制Treg活性非药物性溶血性贫血的主要机制。 
[题目] 944. 属于免疫复合物介导的自身免疫病是
A. 类风湿关节炎
B. 恶性贫血
C. 自身免疫性血小板减少性紫癜
D. 多发性硬化症
E. 肺出血 - 肾炎综合征
[答案] A
[解析] 【正解A】类风湿关节炎（RA）属于免疫复合物介导的自身免疫病（III型超敏反应）——类风湿因子（RF/IgM抗-IgG）与变性IgG形成免疫复合物，沉积于关节滑膜和血管等处，激活补体（C5a募集炎症细胞）和FcgammaR信号通路，导致滑膜炎症、血管翳形成和关节破坏。【排除】B.恶性贫血属II型（抗体直接破坏胃壁细胞和阻断内因子）。C.ITP属II型（抗体直接破坏血小板）。D.MS属IV型（T细胞介导）。E.肺出血-肾炎综合征属II型（抗GBM抗体）。 
[题目] 945. 自身免疫调节因子(AIRE)基因突变或缺失，引起自身免疫病理性改变的机制是由于
A. 清除自身反应性淋巴细胞克隆的异常
B. 免疫忽视的打破
C. 淋巴细胞的多克隆激活
D. 活化诱导的细胞死亡障碍
E. Treg功能的异常
[答案] A
[解析] 【正解A】AIRE（Autoimmune Regulator/自身免疫调节因子）基因突变或缺失导致胸腺髓质上皮细胞（mTEC）不能异位表达组织特异性自身抗原（如胰岛素、甲状腺球蛋白等），胸腺阴性选择缺陷——针对这些组织特异性抗原的自身反应性T细胞克隆不能被有效清除而进入外周，攻击相应组织器官，引起多腺体自身免疫综合征1型（APS-1/APECED）。【排除】B.免疫忽视打破非AIRE缺陷的直接机制。C.非淋巴细胞多克隆激活。D.非AICD障碍。E.非Treg功能异常（AIRE主要影响阴性选择而非Treg生成）。 
[题目] 946. 环孢菌素A治疗自身免疫性疾病的机制是由于
A. 阻断抗原和抗体的结合
B. 抑制抗原提呈
C. 抑制IL-2基因的信号转导
D. 抑制CD28的表达
E. 降低自身抗原含量
[答案] C
[解析] 【正解C】环孢菌素A（CsA）与胞内亲环素（cyclophilin）结合形成复合物后，抑制钙调磷酸酶（calcineurin）的磷酸酶活性，阻断活化T细胞核因子（NFAT）的去磷酸化和核转位，从而抑制IL-2基因转录、T细胞活化和增殖——是临床最经典的免疫抑制剂之一。【排除】A.非阻断抗原抗体结合。B.非直接抑制抗原提呈（对APC作用弱）。D.非抑制CD28表达（CsA作用于TCR信号下游而非共刺激分子）。E.非降低自身抗原含量。 
[题目] 947. 自身抗体模拟配体作用导致细胞和组织功能紊乱，从而引发的自身免疫病是
A. 自身免疫性血小板减少性紫癜
B. Graves病
C. 多发性硬化症
D. 1型糖尿病
E. 系统性红斑狼疮
[答案] B
[解析] 【正解B】Graves病中自身抗体（TRAb/TSI）模拟TSH配体作用，与TSHR结合后持续激活受体下游信号通路（cAMP-PKA），导致甲状腺滤泡上皮细胞功能亢进和甲状腺激素过度分泌——属II型超敏反应中抗体模拟配体导致细胞功能紊乱型（刺激型）。【排除】A.ITP属抗体直接介导细胞破坏。C.MS属T细胞介导（IV型）。D.1型糖尿病属T细胞介导beta细胞破坏（IV型）。E.SLE以III型免疫复合物沉积为主。 
[题目] 948. 关于重症肌无力的叙述错误的是
A. 自身抗原是乙酰胆碱受体(ACR)
B. 属于器官特异性自身免疫病
C. 在补体的参与下损伤骨骼肌细胞
D. 有遗传倾向
E. 与胸腺病变有一定关系
[答案] C
[解析] 【正解C】重症肌无力（MG）的自身抗体主要通过阻断AChR功能和加速AChR内化降解导致肌肉无力，补体参与的突触后膜溶解虽可发生但非主要机制；MG一般不直接通过补体系统损伤骨骼肌细胞本身——而是损伤神经肌肉接头突触后膜结构。教材可能强调MG主要为抗体阻断功能型而非补体介导的细胞毒型。【排除】A.自身抗原是AChR（正确）。B.属于器官特异性自身免疫病（正确——限于神经肌肉接头）。D.有遗传倾向（正确——与HLA-DR3关联）。E.与胸腺病变有关（正确——胸腺增生或胸腺瘤常见）。 
[题目] 949. 下列自身免疫病中哪一种不是II型超敏反应介导的
A. Graves病
B. 重症肌无力
C. 恶性贫血
D. 多发性硬化症
E. 自身免疫性溶血性贫血
[答案] D
[解析] 【正解D】多发性硬化症（MS）为IV型超敏反应介导（T细胞免疫/迟发型超敏反应），非II型超敏反应——MS由自身反应性CD4+Th1和CD8+CTL攻击中枢神经系统髓鞘导致脱髓鞘病变，而Graves病、重症肌无力、恶性贫血和自身免疫性溶血性贫血均属II型超敏反应（抗体介导的细胞毒型或功能异常型）。【排除】A.Graves病属II型（刺激性抗体）。B.重症肌无力属II型（阻断性抗体）。C.恶性贫血属II型（抗内因子和胃壁细胞抗体）。E.自身免疫性溶血性贫血属II型（抗红细胞抗体）。 
[题目] 950. 下列关于自身免疫病相关因素的叙述错误的是
A. 一些自身免疫病的易感性和性激素相关
B. 自身免疫病的易感性和年龄有关，多发生于老年人
C. 自身免疫病的发生可能与寒冷、潮湿、日晒等环境有关
D. 自身免疫病的发生与补体基因缺陷无关
E. 自身免疫病的易感性与遗传因素密切相关
[答案] D
[解析] 【正解D】自身免疫病的发生与补体基因缺陷密切相关——补体C1q、C1r/C1s、C4等经典途径成分缺陷导致免疫复合物和凋亡细胞清除障碍，凋亡细胞释放的自身抗原持续刺激免疫系统，是SLE的重要遗传危险因素（C1q缺陷者SLE风险>90%）。【排除】A.与性激素相关（正确——雌激素促SLE）。B.多发生于老年人（正确）。C.与寒冷潮湿日晒等环境因素有关（正确——紫外线诱发SLE）。E.与遗传因素密切相关（正确——HLA关联和单基因缺陷）。 
[题目] 951. 发生机制主要与隐蔽抗原释放有关的疾病是
A. 风湿性心脏病
B. 重症肌无力
C. 交感性眼炎
D. 药物诱发的自身免疫性溶血性贫血
E. Graves病
[答案] C
[解析] 【正解C】交感性眼炎的主要发生机制为隐蔽抗原释放——一侧眼球穿通伤后，正常情况下与免疫系统隔离的晶状体蛋白和葡萄膜色素抗原释放进入免疫系统，激活自身反应性T细胞，导致健侧眼发生肉芽肿性全葡萄膜炎（交感性眼炎）。【排除】A.风湿性心脏病主要与分子模拟有关。B.重症肌无力为抗AChR抗体介导。D.药物诱发的自身免疫性溶血性贫血为自身抗原改变。E.Graves病为抗体模拟配体作用。 
[题目] 952. 关于自身反应性T淋巴细胞介导的自身免疫病，说法错误的是
A. CD4+Th1细胞作为效应细胞参与组织损伤
B. CD4+Th2细胞作为效应细胞参与组织损伤
C. CD8+T细胞作为效应细胞参与组织损伤
D. 属于IV型超敏反应
E. 是淋巴细胞、单核/巨噬细胞浸润为主的炎症反应
[答案] B
[解析] 【正解B】自身反应性T淋巴细胞介导的自身免疫病（IV型超敏反应）主要由CD4+Th1细胞（分泌IFN-gamma活化巨噬细胞）和CD8+CTL（直接杀伤靶细胞）作为效应细胞参与组织损伤——CD4+Th2细胞主要辅助体液免疫应答（B细胞活化和抗体产生），不直接作为IV型超敏反应的效应细胞。【排除】A.CD4+Th1作为效应细胞参与（正确）。C.CD8+T细胞作为效应细胞参与（正确——如1型糖尿病）。D.属于IV型超敏反应（正确）。E.淋巴细胞和单核/巨噬细胞浸润为主（正确——DTH典型病理特征）。 
[题目] 953. CTLA - 4等位基因突变的个体易发生
A. 糖尿病
B. 类风湿关节炎
C. 重症肌无力
D. 肾小球肾炎
E. 风湿性心脏病
[答案] A
[解析] 【正解A】CTLA-4作为T细胞活化的关键负调控分子（与CD28竞争结合B7分子，传递抑制信号），CTLA-4等位基因突变导致T细胞活化负调控减弱，T细胞过度活化和增殖，易发生器官特异性自身免疫病如1型糖尿病（T1DM）、自身免疫性甲状腺病（AITD/Graves病和桥本甲状腺炎）等。【排除】B-E也可与CTLA-4多态性有不同程度关联，但1型糖尿病与CTLA-4基因多态性的关联最为明确且教材常见。 
[题目] 954. 下列哪一项不属于免疫耐受异常诱发自身免疫病的机制
A. Fas/FasL基因突变
B. MHC - II类分子表达异常
C. MHC - I类分子表达异常
D. 活化诱导的细胞死亡障碍
E. Treg功能异常
[答案] C
[解析] 【正解C】MHC-I类分子表达异常一般不影响经典的免疫耐受建立（主要通过影响CD8+T细胞识别病毒/肿瘤抗原），不属于免疫耐受异常诱发自身免疫病的主要机制。Fas/FasL基因突变（AICD障碍/Autoimmune Lymphoproliferative Syndrome）、MHC-II类分子异常表达（异常提呈自身抗原）、活化诱导的细胞死亡（AICD）障碍和Treg功能异常均直接破坏免疫耐受，可诱发自身免疫病。【排除】A.Fas/FasL突变属于耐受异常（正确——导致AICD缺陷）。B.MHC-II类分子异常表达可打破免疫忽视（正确——如IFN-gamma诱导beta细胞表达MHC-II）。D.AICD障碍属于耐受异常（正确）。E.Treg功能异常属于耐受异常（正确——Foxp3突变/IPEX综合征）。 
[题目] 955. 关于自身免疫病叙述错误的是
A. 器官特异性自身免疫病病变分布广泛，如皮肤、肾脏和关节均发生病变
B. 全身性自身免疫病是针对多种器官和组织的靶抗原的病变
C. 自身免疫病分为器官特异性自身免疫病和全身性自身免疫病
D. 全身性自身免疫病又叫做系统性自身免疫病
E. 器官特异性自身免疫病是针对特定器官的靶抗原的自身免疫反应引起的
[答案] A
[解析] 【正解A】器官特异性自身免疫病病变局限于某一特定器官——如Graves病限于甲状腺、1型糖尿病限于胰岛beta细胞、重症肌无力限于神经肌肉接头，而非"病变分布广泛"。病变分布广泛（皮肤、肾脏和关节均发生病变）是系统性自身免疫病（如SLE）的特征。【排除】B.全身性自身免疫病针对多种器官组织的靶抗原（正确）。C.自身免疫病分为器官特异性和全身性两类（正确）。D.全身性亦称系统性自身免疫病（正确）。E.器官特异性针对特定器官靶抗原（正确）。 
[题目] 956. 引起自身免疫性肾小球肾炎的抗原主要是
A. 链球菌M蛋白
B. SPA
C. 肺炎球菌荚膜多糖
D. PPD
E. LPS
[答案] A
[解析] 【正解A】链球菌M蛋白（A族溶血性链球菌的M蛋白）与肾小球基底膜成分存在共同抗原表位（分子模拟），抗M蛋白抗体交叉识别肾小球基底膜，激活补体沉积导致链球菌感染后肾小球肾炎。【排除】B.SPA为金黄色葡萄球菌A蛋白（与IgG Fc段结合），非肾炎相关。C.肺炎球菌荚膜多糖为TI抗原非自身免疫肾炎诱因。D.PPD为结核菌素纯蛋白衍生物用于结核检测。E.LPS为脂多糖（内毒素）可多克隆激活B细胞但非肾炎主要抗原。 
[题目] 957. 以下与1型糖尿病相关的是
A. HLA-B7
B. HLA-B27
C. HLA-DR3/DR4
D. HLA-DR5
E. HLA-DQ
[答案] C
[解析] 【正解C】1型糖尿病（T1DM）与HLA-DR3和/或HLA-DR4高度关联——同时携带DR3和DR4的杂合子个体发病风险最高（RR约20-40），HLA-DQbeta链第57位氨基酸（非天冬氨酸）也是关键易感位点。【排除】A.HLA-B7非1型糖尿病关联型别。B.HLA-B27与强直性脊柱炎关联。D.HLA-DR5与桥本甲状腺炎关联。E.HLA-DQ虽参与T1DM易感性但DR3/DR4为更经典答案。 
[题目] 958. 肺出血-肾炎综合征的自身抗原是
A. 基底膜IV型胶原
B. 线粒体
C. 细胞因子
D. 组织相容性抗原
E. 变性IgA
[答案] A
[解析] 【正解A】肺出血-肾炎综合征（Goodpasture综合征）的自身抗原为肾小球和肺泡基底膜IV型胶原alpha3链的NC1结构域（非胶原区1/Goodpasture epitope）——抗GBM抗体特异性靶向该抗原决定簇，导致肺出血和急进性肾小球肾炎的临床综合征。【排除】B.线粒体为原发性胆汁性肝硬化的自身抗原。C.细胞因子非经典自身抗原。D.组织相容性抗原非Goodpasture自身抗原。E.变性IgA为过敏性紫癜（IgA血管炎）相关而非Goodpasture。 
[题目] 959. 下列哪一项与1型糖尿病的主要病理损伤机制有关
A. 自身反应性CD8+T细胞
B. 中性粒细胞
C. HLA - B27
D. 抗核抗体
E. 变性IgG
[答案] A
[解析] 【正解A】1型糖尿病（T1DM）的主要病理损伤机制为自身反应性CD8+CTL直接识别破坏胰岛beta细胞（IV型超敏反应）——CTL通过TCR识别beta细胞表面MHC-I-自身抗原肽（如胰岛素原、GAD65、IA-2等）复合物，释放穿孔素/颗粒酶诱导beta细胞凋亡，导致胰岛素绝对缺乏。【排除】B.中性粒细胞非T1DM主要效应细胞。C.HLA-B27与强直性脊柱炎关联非T1DM。D.抗核抗体（ANA）为SLE标志非T1DM。E.变性IgG与RA的RF相关非T1DM。 
[题目] 960. 关于自身耐受、自身免疫和自身免疫病的叙述正确的是
A. 淋巴细胞经克隆清除产生自身免疫
B. 淋巴细胞逃避克隆清除形成耐受
C. 自身免疫的发生是由于自身耐受的终止或破坏
D. 维持导致自身耐受破坏的因素，有利于自身免疫病的防治
E. 自身免疫病的发生是由于免疫调节功能的异常
[答案] C
[解析] 【正解C】自身免疫的发生是由于自身耐受的终止或破坏——中枢耐受（阴性选择缺陷/克隆清除不全）和/或外周耐受（Treg功能不足、AICD障碍、免疫忽视打破等）的破坏，导致自身反应性T/B淋巴细胞被激活，产生自身抗体和/或自身反应性效应T细胞攻击自身组织。【排除】A.淋巴细胞经克隆清除产生自身耐受（非自身免疫）——克隆清除是建立耐受的机制。B.淋巴细胞逃避克隆清除形成自身免疫（非耐受）——逃避清除可导致自身免疫。D.维持耐受破坏因素不利于防治（应消除这些因素）。E.免疫调节功能异常是自身免疫病发生的原因之一，但C更全面准确。 
[题目] 961. 下列疾病中主要由体液免疫介导的是
A. 肺结核空洞
B. 系统性红斑狼疮
C. 肾移植排斥反应
D. 化妆品引起的接触性皮炎
E. 栗粒性结核
[答案] B
[解析] 【正解B】系统性红斑狼疮（SLE）主要由体液免疫介导——B细胞过度活化产生大量自身抗体（ANA/抗dsDNA/抗Sm等），抗体与自身抗原形成免疫复合物沉积于组织，激活补体和FcgammaR介导炎症损伤。而肺结核空洞和接触性皮炎主要由细胞免疫（IV型超敏反应）介导。【排除】A.肺结核空洞以细胞免疫（IV型/Th1-巨噬细胞活化形成肉芽肿后干酪样坏死液化）为主。C.肾移植排斥反应以细胞免疫为主（CD8+CTL和Th1）。D.接触性皮炎为IV型超敏反应（T细胞介导）。E.粟粒性结核为细胞免疫应答不足所致播散。 
[题目] 962. 下列各项中，诱发因素与表位扩展无关的自身免疫病是
A. 系统性红斑狼疮
B. 交感性眼炎
C. 类风湿关节炎
D. 多发性硬化症
E. 1型糖尿病
[答案] B
[解析] 【正解B】交感性眼炎的诱发因素与表位扩展无关，其主要机制为隐蔽抗原（晶状体蛋白、葡萄膜抗原）因眼外伤释放进入免疫系统——隐蔽抗原释放是独立于表位扩展的自身免疫病诱发机制。而SLE、RA、MS和1型糖尿病发病过程中均有表位扩展参与（自身抗原谱从单一表位扩展至多个表位）。【排除】A/C/D/E均有表位扩展参与发病机制。 
[题目] 963. 下列哪一项是器官特异性自身免疫病
A. 系统性红斑狼疮
B. 类风湿关节炎
C. Graves病
D. 胆囊炎
E. 支气管哮喘
[答案] C
[解析] 【正解C】Graves病为器官特异性自身免疫病——自身抗体（TRAb）特异性靶向甲状腺滤泡上皮细胞表面TSH受体，病变局限于甲状腺（伴或不伴眼病和胫前黏液水肿），不累及其他器官。【排除】A.SLE和B.RA均为全身性（系统性）自身免疫病。D.胆囊炎为感染或结石等原因引起的炎症，非自身免疫病。E.支气管哮喘为超敏反应性气道炎症（I型为主），非经典自身免疫病。 
[题目] 964. 下列哪一项不可用于自身免疫病的治疗
A. 应用TNF-α单抗治疗类风湿关节炎
B. 切除脾脏治疗自身免疫性血小板减少性紫癜
C. 补充维生素B12治疗恶性贫血
D. 应用免疫抑制剂FK - 506
E. 补充免疫球蛋白或细胞因子
[答案] E
[解析] 【正解E】补充免疫球蛋白或细胞因子不可用于自身免疫病的治疗——自身免疫病治疗原则为抑制免疫应答而非补充增强免疫功能的制剂，补充免疫球蛋白可能增加免疫复合物形成，补充促炎细胞因子（如IL-2、IFN-gamma）会加重疾病。自身免疫病治疗包括抗炎（TNF-alpha单抗治RA）、免疫抑制（FK-506/CsA）、外科（脾切除治ITP）和对症（补充VB12治恶性贫血）。【排除】A.TNF-alpha单抗治疗RA（正确——生物制剂精准抑制炎症）。B.切除脾脏治疗ITP（正确——脾为血小板破坏和抗体产生场所）。C.补充VB12治疗恶性贫血（正确——因内因子缺乏致B12吸收障碍）。D.FK-506为钙调磷酸酶抑制剂可抑制T细胞活化（正确）。 
[题目] 965. 关于自身抗体介导的自身免疫病说法错误的是
A. 自身抗体可通过I型超敏反应引起自身免疫病
B. 自身抗体可通过直接结合自身抗原，阻断其生物学作用，从而诱发自身免疫病
C. 自身抗体可通过模拟配体的作用诱发自身免疫病
D. 自身抗体可以竞争性阻断配体的效应，从而诱发自身免疫病
E. 自身抗体可以和相应的自身抗原形成免疫复合物，诱发自身免疫病
[答案] A
[解析] 【正解A】自身抗体不能通过I型超敏反应引起自身免疫病——I型超敏反应由IgE介导（肥大细胞/嗜碱性粒细胞脱颗粒），主要引起过敏性疾病（如过敏性鼻炎、哮喘、荨麻疹），目前无确凿证据表明I型超敏反应是自身免疫病的主要致病机制。自身免疫病的病理机制主要包括II型（抗体直接介导细胞破坏/功能异常）、III型（免疫复合物沉积）和IV型（T细胞介导）。【排除】B.自身抗体可直接结合自身抗原阻断其生物学作用（正确——MG抗AChR抗体阻断信号传递）。C.自身抗体可模拟配体作用（正确——Graves病TRAb模拟TSH）。D.自身抗体可竞争性阻断配体效应（正确——MG抗AChR抗体阻断ACh结合）。E.自身抗体可与自身抗原形成免疫复合物（正确——SLE的III型机制）。 
[题目] 966. 下列各项中，与HLA-B27相关联的自身免疫病是
A. 肺出血-肾炎综合征
B. 类风湿关节炎
C. 重症肌无力
D. 桥本甲状腺炎
E. 强直性脊柱炎
[答案] E
[解析] 【正解E】与HLA-B27相关联的自身免疫病是强直性脊柱炎（AS）——HLA-B27与AS的关联强度极高（RR>100），约90%以上AS患者HLA-B27阳性，是MHC与自身免疫病关联最经典的范例之一。此外HLA-B27还与反应性关节炎、银屑病关节炎等脊柱关节病相关。【排除】A.肺出血-肾炎综合征与HLA-DR2关联。B.类风湿关节炎与HLA-DR4关联。C.重症肌无力与HLA-DR3关联。D.桥本甲状腺炎与HLA-DR5关联。 
[题目] 967. 下列各项中，与甲状腺疾病有关的是
A. CTLA - 4等位基因突变
B. HLA - B27
C. HLA - DR2
D. 分子模拟
E. 表位扩展
[答案] A
[解析] 【正解A】与甲状腺疾病（Graves病和桥本甲状腺炎等自身免疫性甲状腺病/AITD）相关的遗传因素是CTLA-4等位基因突变——CTLA-4是T细胞活化的负调控分子，其基因多态性（如+49A/G、CT60等）导致CTLA-4表达或功能降低，T细胞活化抑制减弱，易发生Graves病和桥本甲状腺炎。【排除】B.HLA-B27与AS关联非甲状腺疾病。C.HLA-DR2与MS关联非甲状腺疾病。D.分子模拟（如链球菌→风湿热）也非甲状腺疾病主要机制。E.表位扩展虽可参与AITD进展但CTLA-4基因突变是最特异性关联因素。 
[章节] 第十五章 肿瘤免疫
[单选题]
[题目] 968. 有关肿瘤免疫诊断,错误的是
A. 肿瘤特异性抗原在肿瘤的免疫诊断中应用广泛
B. 血清中甲胎蛋白水平增高有助于原发性肝癌的诊断
C. CEA升高对结肠癌的诊断不具有特异性
D. 检测分化抗原有助于白血病和淋巴瘤的组织分型
E. 乙型肝炎病毒抗原阳性有助于原发性肝癌的诊断
[答案] A
[解析] 【正解A】肿瘤特异性抗原（TSA）在临床上尚未广泛应用于肿瘤免疫诊断——目前临床广泛应用的肿瘤标志物如AFP、CEA、PSA、CA19-9等均为肿瘤相关抗原（TAA），TSA如MAGE等由于表达谱局限且检测技术复杂，主要限于研究用途，远未达到临床常规诊断应用的程度。【排除】B.甲胎蛋白水平增高有助于原发性肝癌诊断，是临床常用肝癌标志物 C.CEA升高对结肠癌诊断不具有特异性，在胰腺癌、胃癌、肺癌等多种恶性肿瘤中均可升高，也可见于某些良性疾病 D.分化抗原（如CD分子）有助于白血病和淋巴瘤的组织分型和免疫表型分析 E.乙型肝炎病毒抗原阳性有助于原发性肝癌诊断，HBV感染是肝癌最重要的危险因素。
[题目] 969. 下列叙述中正确的是
A. 目前尚未在人体发现确切的TSA
B. TAA不包括组织特异性分化抗原
C. AFP主要存在于肿瘤细胞表面
D. 同种病毒诱发的不同类型肿瘤，其表达的抗原不同
E. HPV与人宫颈癌发生有关
[答案] E
[解析] 【正解E】HPV（人乳头瘤病毒，特别是高危型16/18型）感染与宫颈癌发生密切相关——HPV E6/E7癌蛋白分别与p53和Rb抑癌蛋白结合并促进其降解，导致细胞周期失控和恶性转化，这是宫颈癌最重要的病因学因素。【排除】A.目前已在人体发现肿瘤特异性抗原（如MAGE、NY-ESO-1、SSX等癌-睾抗原家族），并非"尚未发现" B.TAA包括组织特异性分化抗原，如PSA（前列腺）、酪氨酸酶（黑色素细胞）等均为TAA C.AFP（甲胎蛋白）主要存在于血清中，由肝癌细胞分泌，并非主要存在于肿瘤细胞表面 D.同种病毒诱发的不同类型肿瘤可表达相同的病毒编码肿瘤抗原，如EBV相关肿瘤均表达EBNA、LMP等共同的病毒抗原。
[题目] 970. 在抗肿瘤免疫效应机制中起主导作用的是
A. 体液免疫
B. 细胞免疫
C. 巨噬细胞杀伤肿瘤
D. NK细胞杀伤肿瘤
E. 细胞因子杀瘤作用
[答案] B
[解析] 【正解B】细胞免疫（特别是CD8+CTL和CD4+Th1细胞）在抗肿瘤免疫效应机制中起主导作用——CTL通过TCR特异性识别肿瘤抗原肽-MHC-I复合物，释放穿孔素/颗粒酶直接杀伤肿瘤细胞，是抗肿瘤免疫的核心效应机制；体液免疫（抗体）通过ADCC、补体激活和调理作用等发挥辅助效应。【排除】A.体液免疫仅起辅助作用，不能主导清除实体瘤 C.巨噬细胞杀伤肿瘤是固有免疫的一部分，起辅助作用 D.NK细胞杀伤为非特异性固有免疫，其效应不受MHC限制，但非主导机制 E.细胞因子是效应分子而非独立的效应机制，由免疫细胞介导。
[题目] 971. 目前证实,可在小鼠诱发肿瘤的是
A. 甲胎蛋白
B. 白喉毒素
C. 小牛血清白蛋白
D. 卡介苗
E. 甲基胆蒽
[答案] E
[解析] 【正解E】甲基胆蒽（MCA）是多环芳烃类化学致癌剂，通过嵌入DNA引起基因突变导致细胞恶性转化，可在小鼠实验中稳定诱发肉瘤，是肿瘤免疫学研究中经典的化学致癌模型。【排除】A.甲胎蛋白（AFP）是肝癌的血清标志物，非致癌物质 B.白喉毒素是白喉棒状杆菌产生的外毒素，抑制蛋白质合成，非致癌剂 C.小牛血清白蛋白（BSA）是异种可溶性蛋白抗原，用于免疫学实验，非致癌物 D.卡介苗（BCG）是减毒活菌苗，作为免疫佐剂用于肿瘤免疫治疗，非致癌物。
[题目] 972. 宿主内抗肿瘤抗体最可能直接针对
A. MHCⅠ类抗原
B. 病毒诱发的肿瘤抗原
C. 分化抗原
D. MHCⅡ类抗原
E. 胚胎抗原
[答案] B
[解析] 【正解B】宿主抗肿瘤抗体最可能直接针对病毒诱发的肿瘤抗原——病毒编码蛋白（如EBV的LMP1/LMP2/EBNA、HPV的E6/E7、HBV的HBx等）是异己抗原，具有较强的免疫原性，能有效激活B细胞产生特异性抗体应答，是宿主产生抗肿瘤抗体的主要靶点。【排除】A.MHC-I类抗原为自身分子，受免疫耐受限制，难以产生强抗体应答 C.分化抗原是组织或细胞谱系特异性的自身抗原，免疫原性弱 D.MHC-II类抗原为自身分子，免疫原性弱 E.胚胎抗原（如AFP、CEA）在胚胎期正常表达，成年后被免疫系统视为自身抗原，免疫原性弱。 
[题目] 973. 针对肿瘤细胞的细胞免疫应答不包括
A. CTL特异性杀伤肿瘤细胞
B. 抗体的中和作用
C. NK细胞通过释放穿孔素杀伤肿瘤细胞
D. 巨噬细胞吞噬肿瘤细胞
E. 巨噬细胞杀伤肿瘤细胞
[答案] B
[解析] 【正解B】抗体的中和作用属于体液免疫效应，不属于细胞免疫应答——抗体由B细胞/浆细胞产生分泌，通过与肿瘤抗原结合发挥中和病毒抗原、封闭生长因子受体等作用，是体液免疫（抗体介导免疫）的效应机制，而非细胞免疫的范畴。【排除】A.CTL通过TCR识别肿瘤抗原肽-MHC-I复合物并释放穿孔素/颗粒酶直接特异性杀伤肿瘤细胞，是细胞免疫的核心 C.NK细胞通过穿孔素和颗粒酶非特异性杀伤肿瘤细胞，属于固有细胞免疫 D.巨噬细胞通过吞噬作用清除肿瘤细胞，属于固有细胞免疫 E.巨噬细胞通过释放TNF-alpha、NO等杀伤肿瘤细胞，属于固有细胞免疫。 
[题目] 974. 以下属于肿瘤特异性抗原的是
A. 癌胚抗原
B. 黑色素瘤抗原MAGE
C. CA19-9
D. 甲胎蛋白
E. 胚胎抗原
[答案] B
[解析] 【正解B】MAGE（黑色素瘤抗原基因）产物属于肿瘤特异性抗原（TSA），是癌-睾抗原（cancer-testis antigen）家族的典型代表——正常组织中仅在睾丸生殖细胞和胎盘滋养层中表达，而睾丸细胞不表达MHC-I类分子，故不被T细胞识别为自身，具有严格的肿瘤表达特异性。【排除】A.癌胚抗原（CEA）为肿瘤相关抗原（TAA），在胚胎肠道、肝和胰腺等正常组织以及成人结肠黏膜等也有少量表达 C.CA19-9是肿瘤相关糖类抗原，在正常胰腺、胆管上皮等也有表达，为TAA D.甲胎蛋白（AFP）为肿瘤相关抗原，在胚胎期肝脏和卵黄囊中大量表达，肝癌时重新高表达 E.胚胎抗原（包括CEA和AFP）均属于肿瘤相关抗原，非肿瘤特异性抗原。 
[题目] 975. 关于巨噬细胞抗肿瘤作用机制的正确叙述是
A. 杀伤肿瘤细胞具有MHC限制性
B. 通过ADCC途径杀伤肿瘤细胞
C. 通过释放穿孔素杀伤肿瘤细胞
D. 不能通过直接接触杀伤肿瘤细胞
E. 可释放自然杀伤细胞毒因子(NKCF)溶解瘤细胞
[答案] B
[解析] 【正解B】巨噬细胞可通过ADCC（抗体依赖性细胞介导的细胞毒作用）途径杀伤肿瘤细胞——巨噬细胞表面表达FcgR（CD16/CD32/CD64），与包被在肿瘤细胞表面的IgG抗体Fc段结合后被激活，释放TNF-alpha、活性氧中间体（ROI）和一氧化氮（NO）等杀伤靶细胞，此过程无MHC限制性。【排除】A.巨噬细胞杀伤肿瘤细胞不具有MHC限制性，不同于CTL的MHC-I限制性 C.释放穿孔素是CTL和NK细胞的杀伤机制，非巨噬细胞的主要效应方式 D.巨噬细胞可通过直接接触方式杀伤肿瘤细胞 E.NKCF（自然杀伤细胞毒因子）是NK细胞释放的细胞毒介质，非巨噬细胞产物。 
[题目] 976. CTL杀伤肿瘤细胞机制不包括
A. 分泌穿孔素溶解破坏瘤细胞
B. 分泌TNF等细胞因子间接杀伤肿瘤细胞
C. 通过ADCC途径诱导肿瘤细胞凋亡
D. 分泌颗粒酶诱导肿瘤细胞凋亡
E. 通过表达FasL介导肿瘤细胞凋亡
[答案] C
[解析] 【正解C】CTL杀伤肿瘤细胞的机制不包括ADCC途径——ADCC是NK细胞和巨噬细胞/中性粒细胞通过其表面FcgRIII（CD16）等Fc受体识别结合在肿瘤细胞表面的抗体Fc段而介导的杀伤，CTL不表达FcgRIII，其杀伤完全依赖TCR对MHC-I-抗原肽复合物的特异性识别。【排除】A.CTL可通过分泌穿孔素在靶细胞膜上聚合形成跨膜孔道，造成渗透性溶解 B.CTL可通过分泌TNF-alpha和LT-alpha等细胞因子间接诱导肿瘤细胞凋亡 D.CTL可通过穿孔素孔道向靶细胞内递送颗粒酶（Granzyme A/B），激活caspase级联反应诱导凋亡 E.CTL可通过表达膜型FasL与肿瘤细胞表面Fas结合，通过外源性凋亡途径介导肿瘤细胞凋亡。 
[题目] 977. NK细胞杀伤肿瘤细胞是通过
A. 特异性地识别肿瘤细胞表面的MHCⅠ类分子
B. 将肿瘤细胞内化杀伤
C. 释放自然杀伤细胞毒因子
D. 释放TNF-β
E. 释放IFN-α
[答案] C
[解析] 【正解C】NK细胞杀伤肿瘤细胞的主要机制是释放自然杀伤细胞毒因子（NKCF）、穿孔素和颗粒酶——NK细胞无需预先致敏，通过missing self机制识别MHC-I类分子表达下调的肿瘤细胞（KIR识别自身MHC-I传递抑制信号，肿瘤细胞MHC-I下调时抑制信号减弱，NK细胞被活化），直接释放细胞毒颗粒杀伤靶细胞。【排除】A.NK细胞不特异性识别肿瘤细胞表面的MHC-I类分子——KIR识别MHC-I产生的是抑制信号而非激活信号 B.NK细胞不通过内化方式杀伤目标，其杀伤是胞吐穿孔素/颗粒酶 D.TNF-beta主要由活化Th1和CTL产生，非NK细胞的主要效应分子 E.NK细胞主要产生IFN-gamma（非IFN-alpha）参与抗肿瘤免疫，IFN-alpha主要由pDC产生。 
[题目] 978. 非巨噬细胞的抗肿瘤功能是
A. 吞噬杀伤
B. 分泌TNF-α
C. ADCC
D. 释放穿孔素
E. 产生一氧化氮
[答案] D
[解析] 【正解D】释放穿孔素是CTL和NK细胞的杀伤机制，非巨噬细胞的主要抗肿瘤功能——穿孔素由CTL和NK细胞的细胞毒颗粒释放，在靶细胞膜上聚合形成跨膜孔道，介导渗透性溶解和颗粒酶进入靶细胞，巨噬细胞主要依赖吞噬、ADCC、TNF-alpha和NO等途径杀伤肿瘤细胞。【排除】A.吞噬杀伤是巨噬细胞抗肿瘤的主要方式之一 B.分泌TNF-alpha是巨噬细胞杀伤肿瘤的重要效应分子 C.ADCC是巨噬细胞通过FcgR介导的抗肿瘤功能 E.产生一氧化氮（NO）由iNOS催化，是活化巨噬细胞杀伤肿瘤的重要效应机制。 
[题目] 979. 正确描述肿瘤细胞的免疫逃逸机制的是
A. 肿瘤细胞MHCⅡ类分子表达下降或缺失
B. 肿瘤细胞可分泌免疫抑制分子
C. 肿瘤细胞表面黏附分子表达水平上升
D. 肿瘤细胞在遗传上稳定，不易产生变异
E. 肿瘤细胞表达大量Fas
[答案] B
[解析] 【正解B】肿瘤细胞可分泌多种免疫抑制分子导致免疫逃逸——肿瘤细胞可分泌TGF-beta抑制CTL和NK细胞功能并诱导Treg分化、分泌IL-10抑制DC成熟和Th1应答、分泌VEGF抑制DC分化和T细胞募集、分泌PGE2和IDO产生免疫抑制性微环境，这些可溶性抑制因子协同抑制抗肿瘤免疫应答。【排除】A.MHC-I类分子（非MHC-II）表达下降或缺失是免疫逃逸的关键机制 C.肿瘤细胞表面黏附分子如ICAM-1等表达下降（非上升）有利于肿瘤细胞逃逸 D.肿瘤细胞在遗传上高度不稳定，易产生抗原变异和免疫选择 E.肿瘤细胞表达FasL（非大量Fas），通过Fas反击诱导肿瘤特异性T细胞凋亡。 
[题目] 980. 肿瘤细胞低表达MHC I 类抗原，主要导致下列哪类免疫细胞的免疫监视功能障碍
A. Th细胞
B. NK细胞
C. 树突状细胞
D. CTL
E. 巨噬细胞
[答案] D
[解析] 【正解D】MHC-I类分子低表达主要导致CTL（CD8+细胞毒性T细胞）的免疫监视功能障碍——CTL通过TCR特异性识别肿瘤细胞表面肿瘤抗原肽-MHC-I类分子复合物才能被激活并实施杀伤，MHC-I下调使CTL丧失对肿瘤细胞的识别能力，是肿瘤免疫逃逸最常见的机制之一。【排除】A.Th细胞（CD4+T）识别的是MHC-II类分子提呈的抗原肽，不受MHC-I下调的直接影响 B.NK细胞在MHC-I类分子下调时反而被活化——NK细胞KIR识别自身MHC-I传递抑制信号，MHC-I缺失使抑制信号减弱 C.树突状细胞交叉提呈肿瘤抗原的能力不受肿瘤细胞MHC-I表达影响 E.巨噬细胞杀伤肿瘤不受MHC-I限制，其抗肿瘤作用不依赖MHC-I识别。 
[题目] 981. 关于肿瘤免疫,下列叙述正确的是
A. 抗体在抗肿瘤过程中不发挥作用
B. MHCⅠ类分子表达升高介导肿瘤免疫逃逸
C. 肿瘤细胞表面表达PD-L1等负共刺激信号介导免疫逃逸
D. IL-10、IL-2和IL-4均可增强机体抗肿瘤的免疫效应
E. CD4+T细胞因无直接杀伤功能，在抗肿瘤免疫中作用甚微
[答案] C
[解析] 【正解C】肿瘤细胞表面表达PD-L1（程序性死亡配体1，又称B7-H1）与肿瘤浸润T细胞表面的PD-1（程序性死亡受体1）结合，传递负性共抑制信号，通过招募SHP-2磷酸酶抑制TCR和CD28下游信号转导，导致T细胞耗竭和功能障碍，是肿瘤免疫逃逸的重要机制，也是免疫检查点阻断治疗（抗PD-1/PD-L1单抗）的靶点。【排除】A.抗体在抗肿瘤免疫中可通过ADCC、CDC和调理作用发挥辅助效应 B.MHC-I类分子表达下降（非升高）导致CTL无法识别杀伤，介导免疫逃逸 D.IL-10抑制抗肿瘤免疫效应，IL-2和IL-4可增强抗肿瘤免疫，但不是均可增强——IL-10不利于抗瘤 E.CD4+T细胞虽无直接杀伤功能，但通过辅助CTL活化、激活巨噬细胞和NK细胞、分泌细胞因子等发挥重要抗肿瘤作用。 
[题目] 982. MHCⅠ类分子表达低下
A. 共刺激信号异常
B. 诱导肿瘤特异性T细胞凋亡
C. 抗凋亡作用
D. 无法诱导CTL活化
E. 抗原调变
[答案] D
[解析] 【正解D】MHC-I类分子表达低下导致肿瘤细胞无法将内源性肿瘤抗原肽有效提呈给CD8+T细胞（CTL前体），CTL无法通过TCR识别肿瘤抗原肽-MHC-I复合物获得活化的第一信号，因此不能诱导CTL的活化和特异性杀伤，是肿瘤免疫逃逸中最重要的机制之一。【排除】A.共刺激信号异常指CD80/CD86表达低下和/或PD-L1等负性共刺激分子表达上调，非MHC-I低下的直接后果 B.肿瘤细胞FasL高表达可诱导肿瘤特异性T细胞凋亡 C.Bcl-2高表达赋予肿瘤细胞抗凋亡能力 E.抗原调变（antigenic modulation）指肿瘤抗原表达减少或丢失。 
[题目] 983. Bcl-2高表达
A. 共刺激信号异常
B. 诱导肿瘤特异性T细胞凋亡
C. 抗凋亡作用
D. 无法诱导CTL活化
E. 抗原调变
[答案] C
[解析] 【正解C】Bcl-2高表达赋予肿瘤细胞抗凋亡能力——Bcl-2定位于线粒体外膜，通过抑制线粒体细胞色素c释放和阻断caspase-9/caspase-3激活来抑制内源性（线粒体）凋亡途径，使肿瘤细胞耐受CTL/NK细胞通过穿孔素/颗粒酶或Fas/FasL途径诱导的凋亡。【排除】A.共刺激信号异常指CD80/CD86与PD-L1等分子的表达异常 B.FasL高表达可诱导肿瘤特异性T细胞凋亡（Fas反击假说） D.MHC-I类分子表达低下导致无法诱导CTL活化 E.抗原调变指肿瘤抗原在免疫压力下表达减少或丢失。 
[题目] 984. 患者，女，60岁，被检查出患有肿瘤，下列可用于肿瘤过继免疫治疗的是
A. 卡介苗
B. 灭活瘤苗
C. 细胞因子诱导的杀伤细胞(CIK)
D. 5-氟尿嘧啶
E. 单克隆抗体结合的蓖麻毒素
[答案] C
[解析] 【正解C】CIK（细胞因子诱导的杀伤细胞）用于肿瘤过继免疫治疗——CIK细胞是外周血单个核细胞在体外经IFN-gamma、抗CD3单抗和IL-2等刺激扩增获得的异质性杀伤细胞群，以CD3+CD56+双阳性细胞为主要效应细胞，具有非MHC限制性杀伤肿瘤的特性，属于过继细胞免疫治疗。【排除】A.卡介苗（BCG）属于主动非特异性免疫治疗 B.灭活瘤苗属于主动特异性免疫治疗 D.5-氟尿嘧啶是化疗药物，非免疫治疗 E.单克隆抗体结合的蓖麻毒素属于抗体导向治疗（免疫毒素），非过继免疫治疗。 
[题目] 985. 与B细胞淋巴瘤发病有关的病原是
A. EBV
B. HTLV-1
C. HPV
D. HCV和HBV
E. HIV
[答案] A
[解析] 【正解A】EBV（EB病毒）与B细胞淋巴瘤发病密切相关——EBV感染B细胞后表达LMP1和LMP2等潜伏期膜蛋白，LMP1模拟CD40信号持续激活NF-kB通路，促进B细胞增殖和转化，与地方性Burkitt淋巴瘤、霍奇金淋巴瘤和移植后淋巴增殖性疾病等密切相关。【排除】B.HTLV-1与成人T细胞白血病/淋巴瘤（ATL）有关 C.HPV与宫颈癌和口咽癌有关 D.HCV与肝细胞癌有关，HBV与肝细胞癌有关 E.HIV通过破坏CD4+T细胞导致AIDS相关淋巴瘤，非直接致B细胞淋巴瘤的主要病毒。 
[题目] 986. 血清PSA可以作为下列哪种肿瘤的标志物
A. 肺癌
B. 前列腺癌
C. 肝癌
D. 胃癌
E. 大肠癌
[答案] B
[解析] 【正解B】PSA（前列腺特异性抗原）是前列腺癌的血清肿瘤标志物——PSA是前列腺上皮细胞分泌的丝氨酸蛋白酶，血清PSA水平增高有助于前列腺癌的筛查、诊断和疗效监测，是临床上应用最广泛的前列腺癌肿瘤标志物。【排除】A.肺癌标志物包括NSE、CYFRA21-1、CEA等 C.肝癌标志物主要是AFP D.胃癌标志物包括CEA、CA19-9、CA72-4等 E.大肠癌标志物包括CEA、CA19-9等。 
[题目] 987. 属于主动生物治疗的是
A. 外源给予白细胞介素-2
B. 外源给予LAK细胞
C. 外源给予TIL细胞
D. 外源给予NK细胞
E. 外源给予结核菌素
[答案] E
[解析] 【正解E】外源给予结核菌素（BCG，卡介苗）属于主动非特异性免疫治疗——BCG通过激活巨噬细胞、NK细胞和DC等固有免疫细胞，诱导Th1型细胞因子（IL-12、IFN-gamma）产生，非特异性增强机体抗肿瘤免疫应答，属主动免疫治疗范畴。【排除】A.外源给予IL-2属于被动/过继免疫治疗（细胞因子治疗） B.外源给予LAK细胞属于过继免疫治疗 C.外源给予TIL细胞属于过继免疫治疗 D.外源给予NK细胞属于过继免疫治疗。 
[题目] 988. 关于肿瘤免疫的正确描述是
A. 肿瘤抗原只存在于细胞表面
B. 血清中抗甲胎蛋白抗体水平增高有助于原发性肝癌诊断
C. 血清中癌胚抗原水平增高有助于结肠癌诊断
D. 同种类型的肿瘤表达的肿瘤抗原相同
E. HIV与成人T淋巴细胞白血病的发病有关
[答案] C
[解析] 【正解C】血清癌胚抗原（CEA）水平增高有助于结肠癌诊断——CEA是广谱肿瘤标志物，在结直肠癌中升高最为常见，用于辅助诊断、疗效评估和术后复发监测。【排除】A.肿瘤抗原也可存在于细胞内和血清中，非仅细胞表面 B.是检测AFP本身（非抗AFP抗体）水平增高有助于肝癌诊断 D.同种类型的肿瘤在不同个体间表达的肿瘤抗原可不完全相同 E.HTLV-1（非HIV）与成人T淋巴细胞白血病发病有关，HIV与卡波西肉瘤和淋巴瘤有关。 
[题目] 989. 靶向抗原为CD20的基因工程抗体主要用于治疗哪类肿瘤
A. 宫颈癌
B. 乳腺癌
C. B细胞淋巴瘤
D. 肝癌
E. 前列腺癌
[答案] C
[解析] 【正解C】靶向CD20的单克隆抗体（如利妥昔单抗/Rituximab）主要用于治疗CD20阳性的B细胞淋巴瘤——CD20是B细胞谱系特异性表面抗原，在B细胞淋巴瘤中高表达，利妥昔单抗通过ADCC、CDC和直接诱导凋亡等机制清除CD20+B细胞淋巴瘤细胞，是B细胞非霍奇金淋巴瘤的一线靶向治疗药物。【排除】A.宫颈癌靶向治疗以抗VEGF（贝伐珠单抗）等为主 B.乳腺癌靶向治疗以抗HER2（曲妥珠单抗）等为主 D.肝癌靶向治疗以索拉非尼等多靶点TKI为主 E.前列腺癌以内分泌治疗为主。 
[题目] 990. 关于肿瘤疫苗正确的叙述是
A. 肿瘤疫苗多用于预防自发性肿瘤的发生
B. 肿瘤疫苗中不包括抗独特型抗体疫苗
C. 肿瘤疫苗必须包含能激活保护性免疫应答的肿瘤抗原
D. 树突状细胞瘤苗的优点是无MHC限制性
E. 肿瘤相关抗原一般不用于开发肿瘤疫苗
[答案] C
[解析] 【正解C】肿瘤疫苗必须包含能激活机体保护性抗肿瘤免疫应答的肿瘤抗原——只有包含有效肿瘤抗原（如肿瘤特异性抗原、肿瘤相关抗原或新抗原），肿瘤疫苗才能被DC摄取加工提呈，激活肿瘤特异性T细胞和B细胞，产生保护性或治疗性抗肿瘤免疫应答。【排除】A.肿瘤疫苗目前主要用于治疗已发生的肿瘤（治疗性疫苗），预防性疫苗仅用于病毒相关肿瘤（如HPV疫苗、HBV疫苗） B.肿瘤疫苗包括抗独特型抗体疫苗——模拟肿瘤抗原构象 D.树突状细胞瘤苗的优点在于高效提呈肿瘤抗原，但仍受MHC限制（需匹配患者HLA型别） E.肿瘤相关抗原（如CEA、HER2/neu、MUC1等）已广泛用于肿瘤疫苗的开发研究。 
[题目] 991. 关于肿瘤标志物，以下说法错误的是
A. 常用检测方法包括CLIA、RIA和ELISA等
B. 其种类包括蛋白质、激素、酶、多胺及癌基因产物等
C. 肿瘤标志物具有相对特异性
D. 肿瘤相关抗原不能作为肿瘤标志物
E. 肿瘤标志物的动态监测，应用价值较高
[答案] D
[解析] 【正解D】肿瘤相关抗原（TAA）可以作为肿瘤标志物——临床上广泛应用的肿瘤标志物如CEA、AFP、PSA、CA19-9、CA125等均属于TAA，它们在肿瘤组织中过度表达或异常表达，释放入血可被定量检测，用于肿瘤筛查、诊断和疗效监测。【排除】A.常用检测方法包括CLIA（化学发光免疫分析）、RIA（放射免疫分析）和ELISA等，均为免疫学检测方法 B.肿瘤标志物种类广泛，包括蛋白质、激素（如HCG）、酶（如NSE）、多胺及癌基因产物等 C.肿瘤标志物具有相对特异性——多数肿瘤标志物非肿瘤绝对特异，良性疾病也可升高 E.肿瘤标志物的动态监测比单次检测更具临床应用价值，可反映治疗效果和复发。 
[题目] 992. 肿瘤抗原
A. 能引起抗肿瘤免疫反应的所有抗原物质
B. 指细胞癌变过程中出现的新抗原或肿瘤细胞过度表达的抗原物质
C. 能引起免疫反应的所有抗原物质
D. 能诱导机体产生抗体的所有抗原物质
E. 能诱导机体产生CTL的抗原物质
[答案] B
[解析] 【正解B】肿瘤抗原指细胞癌变过程中出现的新抗原或肿瘤细胞过度表达的抗原物质——包括肿瘤特异性抗原（TSA，如癌睾抗原和新抗原）和肿瘤相关抗原（TAA，如胚胎抗原和分化抗原），能被免疫系统识别并诱导免疫应答。【排除】A.定义过于宽泛，肿瘤抗原是癌变过程中出现的特定抗原 C.范围过大，肿瘤抗原是引起抗肿瘤免疫反应（而非所有免疫反应）的特定物质 D.过窄，肿瘤抗原也可诱导CTL应答 E.过窄，肿瘤抗原也可诱导抗体应答。 
[题目] 993. 靶向CD19的CAR-T可用于治疗
A. 肺癌
B. 肝癌
C. 急性淋巴细胞白血病
D. 脑胶质瘤结肠癌
[答案] C
[解析] 【正解C】靶向CD19的CAR-T细胞治疗主要用于CD19阳性的急性淋巴细胞白血病（ALL）和B细胞淋巴瘤——CD19是B细胞谱系从pre-B细胞至成熟B细胞广泛表达的表面抗原，在B-ALL和B细胞淋巴瘤中持续高表达，CD19 CAR-T（如tisagenlecleucel）是复发/难治性B-ALL的突破性疗法。【排除】A.肺癌不表达CD19 B.肝癌不表达CD19 D.脑胶质瘤和结肠癌不表达CD19（且选项中D含[结肠癌]为多余字样）。 
[题目] 994. 抗体抗肿瘤的机制不包括
A. CDC
B. ADCC
C. 调理作用
D. 使肿瘤细胞的黏附特性改变或丧失
E. 封闭肿瘤细胞上的转铁蛋白受体
[答案] D
[解析] 【正解D】抗体抗肿瘤的作用机制不包括使肿瘤细胞的黏附特性改变或丧失——抗体抗肿瘤的经典机制包括：CDC（补体依赖性细胞毒作用）、ADCC（抗体依赖性细胞介导的细胞毒作用）、调理作用和封闭肿瘤细胞表面受体。改变黏附特性并非抗体抗肿瘤的已知机制。【排除】A.CDC——抗体结合肿瘤抗原后激活补体经典途径，形成MAC溶解肿瘤细胞 B.ADCC——NK细胞和巨噬细胞通过FcgR识别抗体Fc段杀伤肿瘤细胞 C.调理作用——抗体包被肿瘤细胞促进巨噬细胞吞噬 E.封闭受体——抗体封闭肿瘤细胞表面转铁蛋白受体等，抑制肿瘤生长信号。 
[题目] 995. 肿瘤发生的主要机制是
A. 免疫防御功能的障碍
B. 免疫监视功能的障碍
C. 免疫自稳功能的障碍
D. 免疫调节功能的障碍
E. 免疫功能亢进
[答案] B
[解析] 【正解B】肿瘤发生的主要机制是免疫监视功能的障碍——免疫监视学说认为，免疫系统（特别是NK细胞和CTL）能持续识别并清除体内出现的突变细胞，当免疫监视功能缺陷或降低时，突变细胞可逃避免疫清除而发展为肿瘤。【排除】A.免疫防御功能障碍主要导致反复感染，非肿瘤发生的主要机制 C.免疫自稳功能障碍主要导致自身免疫病 D.免疫调节功能障碍涉及免疫应答的强度和范围的调控异常 E.免疫功能亢进（如过度炎症反应）一般不直接导致肿瘤发生。 
[题目] 996. 下列各种细胞中抗肿瘤免疫的主要效应细胞不包括
A. NK细胞
B. Treg
C. CD8+T细胞
D. TCRγδ+T细胞
E. CD4+T细胞
[答案] B
[解析] 【正解B】Treg（调节性T细胞，CD4+CD25+Foxp3+）不是抗肿瘤免疫的主要效应细胞——Treg通过分泌IL-10和TGF-beta抑制CTL、NK细胞和DC功能，促进肿瘤免疫逃逸，实际上不利于机体清除肿瘤。【排除】A.NK细胞通过固有免疫非特异性杀伤肿瘤细胞，是抗肿瘤效应细胞 C.CD8+T细胞（CTL）是抗肿瘤细胞免疫的最主要效应细胞 D.TCRgd+T细胞通过识别非肽类抗原非MHC限制性杀伤肿瘤 E.CD4+T细胞通过辅助CTL活化、激活巨噬细胞和分泌细胞因子参与抗肿瘤。 
[题目] 997. 下列肿瘤细胞表面分子中,
A. IDO
B. MHC I类分子
C. bcl-2
D. FasL
E. PD-L1
[答案] B
[解析] 【正解B】肿瘤细胞表面MHC-I类分子表达有利于抗肿瘤免疫而非免疫逃逸——MHC-I类分子将内源性肿瘤抗原肽提呈给CD8+CTL，诱导特异性杀伤。肿瘤细胞常下调MHC-I以逃逸CTL识别。IDO、FasL和PD-L1等分子则有利于肿瘤免疫逃逸（IDO消耗色氨酸抑制T细胞，FasL反击T细胞，PD-L1抑制T细胞活化）。【排除】A.IDO——吲哚胺2,3-双加氧酶，消耗色氨酸抑制T细胞功能，有利于逃逸 C.bcl-2——抗凋亡蛋白，赋予肿瘤细胞抗凋亡能力 D.FasL——与T细胞表面Fas结合诱导T细胞凋亡，有利于逃逸 E.PD-L1——与T细胞PD-1结合传递负性信号，有利于逃逸。 
[题目] 998. 肿瘤疫苗的治疗原理
A. 诱导非特异性抗肿瘤免疫反应
B. 诱导特异性抗肿瘤免疫反应
C. 诱导抗体的产生
D. 靶向机体的免疫抑制分子
E. 直接杀伤肿瘤细胞
[答案] B
[解析] 【正解B】肿瘤疫苗的治疗原理是诱导特异性抗肿瘤免疫反应——通过向患者体内引入肿瘤抗原（蛋白、肽、DC负载抗原、病毒载体等），由DC摄取加工并通过MHC-I和MHC-II途径交叉提呈肿瘤抗原，激活肿瘤特异性CD8+CTL和CD4+Th细胞，诱导针对肿瘤抗原的特异性细胞免疫和体液免疫应答。【排除】A.肿瘤疫苗诱导的是特异性（非非特异性）抗肿瘤免疫反应 C.诱导抗体产生仅为部分效应，主要目的是诱导CTL应答 D.靶向免疫抑制分子是免疫检查点抑制剂（如抗PD-1）的机制，非疫苗 E.肿瘤疫苗自身不直接杀伤肿瘤细胞，依赖激活的免疫效应细胞。 
[题目] 999. 患者，女，60岁，被检查出患有肿瘤，下列可用于肿瘤特异主动免疫治疗的是
A. 卡介苗
B. 灭活瘤苗
C. IL-2和LAK细胞
D. 5-氟尿嘧啶
E. 单克隆抗体结合的蓖麻毒素
[答案] B
[解析] 【正解B】灭活瘤苗（自体或异体肿瘤细胞疫苗）用于肿瘤特异性主动免疫治疗——灭活瘤苗含有完整的肿瘤抗原谱，接种后可诱导机体产生针对多种肿瘤抗原的特异性T细胞和抗体应答，属于主动特异性免疫治疗。【排除】A.卡介苗（BCG）属于主动非特异性免疫治疗 C.IL-2和LAK细胞属于被动/过继免疫治疗 D.5-氟尿嘧啶属于化学治疗药物 E.单克隆抗体-蓖麻毒素偶联物属于被动靶向免疫治疗（免疫毒素）。 
[题目] 1000. 患者，男，76岁，左下颌淋巴结肿大，病理诊断为非霍奇金B细胞淋巴瘤，可考虑使用
A. 抗CD3单克隆抗体
B. 抗CD8单克隆抗体
C. 抗CD20单克隆抗体
D. 抗CD40单克隆抗体
E. 抗CD56单克隆抗体
[答案] C
[解析] 【正解C】非霍奇金B细胞淋巴瘤表达CD20分子，抗CD20单克隆抗体（利妥昔单抗/Rituximab）是B细胞淋巴瘤的一线靶向治疗方案——利妥昔单抗为人鼠嵌合型抗CD20单抗，通过ADCC、CDC和直接诱导凋亡选择性清除CD20+的B细胞淋巴瘤细胞。【排除】A.抗CD3单抗靶向T细胞，非B细胞淋巴瘤的靶标 B.抗CD8单抗靶向CD8+T细胞 D.抗CD40单抗靶向CD40（B细胞活化分子），非B细胞淋巴瘤的标准靶向药物 E.抗CD56单抗靶向NK细胞和神经内分泌肿瘤。 
[题目] 1001. 抗肿瘤免疫的主要效应细胞是
A. NK细胞
B. CD4+T细胞
C. CD8+T细胞 D。γδT细胞 E.巨噬细胞
[答案] C
[解析] 【正解C】CD8+T细胞（CTL）是抗肿瘤免疫的主要效应细胞——CTL通过TCR特异性识别肿瘤细胞表面的肿瘤抗原肽-MHC-I类分子复合物，释放穿孔素/颗粒酶和表达FasL/TRAIL直接杀伤肿瘤细胞，是抗肿瘤特异性细胞免疫的核心和最有力效应。【排除】A.NK细胞参与固有免疫抗肿瘤，但非主要特异性效应细胞 B.CD4+T细胞辅助CTL活化和抗肿瘤，但非直接杀伤的主要效应细胞 D.gdT细胞参与固有免疫抗肿瘤，但数量有限、效应较弱 E.巨噬细胞参与固有免疫抗肿瘤，但非特异性免疫的主要效应细胞。 
[题目] 1002. 增强抗体
A. 增强补体溶解肿瘤细胞的作用
B. 增强抗肿瘤ADCC效应
C. 促进肿瘤生长，促进肿瘤细胞转移
D. 增强肿瘤细胞间的黏附作用
E. 具有较强的免疫调理作用
[答案] C
[解析] 【正解C】增强抗体（enhancing antibody/封闭抗体）可促进肿瘤生长和转移——增强抗体与肿瘤抗原结合后，通过阻断CTL的TCR对抗原肽-MHC-I复合物的识别（空间位阻效应），或通过交联肿瘤抗原诱导内吞导致抗原调变，反而保护肿瘤细胞免受免疫效应细胞杀伤，是肿瘤免疫逃逸的机制之一。【排除】A.增强抗体不增强补体溶解作用 B.增强抗体不增强ADCC效应 D.增强抗体不增强肿瘤细胞间黏附 E.增强抗体不具有免疫调理作用（或反而封闭了调理作用所需的表位）。 
[题目] 1003. 活化的单核-巨噬细胞用于肿瘤治疗
A. 是非特异性细胞免疫治疗
B. 杀伤肿瘤周围正常组织
C. 对多种肿瘤的临床疗效确切
D. 不能用于过继细胞免疫治疗
E. 不能与放疗、化疗等常规疗法联合应用
[答案] A
[解析] 【正解A】活化单核-巨噬细胞用于肿瘤治疗属于非特异性细胞免疫治疗——通过IFN-gamma、GM-CSF等细胞因子或BCG等激活巨噬细胞，使其非特异性增强吞噬和杀伤活性，广谱杀伤多种肿瘤细胞，不依赖肿瘤抗原特异性识别。【排除】B.活化巨噬细胞在杀伤肿瘤的同时可能损伤正常组织为潜在风险，但非其固有的杀伤特点 C.单一巨噬细胞治疗的临床疗效有限，多作为辅助手段 D.活化的巨噬细胞可用于过继细胞免疫治疗 E.可与放疗、化疗等常规疗法联合应用以增强疗效。 
[题目] 1004. Th细胞的抗肿瘤作用不包括
A. 激活巨噬细胞、NK细胞杀瘤
B. 辅助CTL细胞杀瘤
C. 募集CTL和巨噬细胞到肿瘤局部
D. 分泌IL-2、TNF等细胞因子杀瘤
E. 不可直接杀瘤细胞
[答案] E
[解析] 【正解E】Th细胞不可直接杀伤肿瘤细胞——CD4+Th细胞通过辅助CTL活化（分泌IL-2、IFN-gamma）、激活巨噬细胞和NK细胞、募集CTL和巨噬细胞到肿瘤局部以及分泌TNF-alpha等细胞因子间接参与抗肿瘤免疫，但Th细胞不表达穿孔素/颗粒酶等细胞毒分子，不能直接杀伤肿瘤细胞。【排除】A.Th通过IFN-gamma激活巨噬细胞和NK细胞杀瘤是正确的 B.Th通过IL-2辅助CTL杀瘤是正确的 C.Th通过分泌趋化因子募集CTL和巨噬细胞到肿瘤局部是正确的 D.Th分泌IL-2、TNF-alpha等细胞因子杀瘤是正确的。 
[题目] 1005. 关于体液免疫抗肿瘤作用机制的正确叙述是
A. 当产生抗肿瘤细胞封闭抗体时，肿瘤可以自愈
B. 通过IgE介导ADCC效应杀伤肿瘤细胞
C. 增强抗体可以加强NK细胞的杀伤作用
D. 通过抗体封闭肿瘤细胞上的某些受体，抑制肿瘤生长
E. 补体不参与抗肿瘤免疫
[答案] D
[解析] 【正解D】体液免疫抗肿瘤的作用机制包括——抗体可通过封闭肿瘤细胞表面的某些受体（如转铁蛋白受体、EGFR等）阻断生长因子信号，抑制肿瘤细胞增殖和生长。【排除】A.封闭抗体（增强抗体）时可促进而非使肿瘤自愈，产生CTL和NK为主的免疫应答时肿瘤才可能自愈 B.ADCC效应由IgG（非IgE）介导，通过NK细胞和巨噬细胞FcgR C.增强抗体可抑制而非加强NK细胞的杀伤作用（阻断表位识别） E.补体通过CDC参与抗肿瘤免疫，补体系统在抗体介导的肿瘤溶解中发挥作用。 
[题目] 1006. 属于主动免疫治疗肿瘤的方法是
A. 注射BCG
B. 输入携带肿瘤抗原肽的树突状细胞
C. 注射IFN-γ
D. 输入LAK
E. 抗肿瘤导向治疗
[答案] B
[解析] 【正解B】输入携带肿瘤抗原肽的树突状细胞（DC疫苗）属于主动特异性免疫治疗——DC疫苗将负载肿瘤抗原肽的DC回输体内，DC作为专职APC有效提呈肿瘤抗原并通过MHC-I交叉提呈途径激活肿瘤特异性CTL，诱导患者自身的主动抗肿瘤免疫应答。【排除】A.注射BCG属于主动非特异性免疫治疗 C.注射IFN-gamma属于被动免疫治疗（细胞因子治疗） D.输入LAK细胞属于过继免疫治疗（被动） E.抗肿瘤导向治疗（如免疫毒素）属于被动靶向免疫治疗。 
[题目] 1007. 分化抗原是指
A. 特定组织正常分化到一定阶段所特有的标志
B. 同一肿瘤不同分化阶段的特征性抗原
C. 同一组织良恶性肿瘤的标志性抗原
D. 不同肿瘤的特异性抗原
E. 区分正常组织和癌变组织的特异性抗原
[答案] A
[解析] 【正解A】分化抗原是特定组织细胞正常分化到一定阶段所特有的标志——属于肿瘤相关抗原（TAA），在肿瘤细胞上仍保留表达，如CD分子谱系抗原可用于白血病和淋巴瘤的免疫分型（CD3为T细胞标志，CD19/CD20为B细胞标志），PSA为前列腺上皮分化抗原。【排除】B.定义描述的是同一肿瘤不同分化阶段的抗原特征，非分化抗原定义 C.定义描述的是良恶性肿瘤的标志抗原区别 D.不同肿瘤的特异性抗原各有不同，非分化抗原的定义 E.区分正常和癌变组织的是肿瘤特异性抗原（TSA）的概念，非分化抗原。 
[题目] 1008. 抗EB病毒抗体阳性的不同B细胞淋巴瘤患者
A. 同一病毒诱发的肿瘤均表达相同的抗原
B. 同一病毒诱发的肿瘤表达不同的抗原
C. 由病毒基因编码，与病毒本身的抗原完全相同
D. 由病毒基因编码，与病毒本身的抗原完全不同
E. 抗原性弱，但特异性高
[答案] A
[解析] 【正解A】同一病毒（如EBV）诱发的不同B细胞淋巴瘤患者肿瘤细胞均表达相同的病毒编码肿瘤抗原——病毒诱发的肿瘤中，病毒基因组整合至宿主细胞基因组并持续表达相同的病毒癌蛋白（如EBV表达的LMP1、LMP2、EBNA1-3等），这些由病毒基因编码的蛋白在不同患者中结构相同，具有共享性。【排除】B.与事实相反，同一病毒诱发的肿瘤表达相同的病毒抗原 C.由病毒基因编码，与病毒本身的部分抗原相同或相似（如EBNA），非[完全相同] D.由病毒基因编码，部分与病毒本身的抗原相同 E.病毒诱发的肿瘤抗原免疫原性较强（异己抗原），非抗原性弱。 
[题目] 1009. 患者，女，60岁，持续低热，胸闷，气短，近一个月体重下降明显。影像学检查右肺部占位性病变，考虑肺癌。介导癌细胞免疫逃逸的最可能机制是
A. 癌细胞MHCⅠ类分子表达增强
B. 癌细胞MHCⅠ类分子表达减弱
C. 癌细胞MHCⅡ类分子表达增强
D. 癌细胞MHCⅡ类分子表达减弱
E. 癌细胞MHCⅠ类分子和Ⅱ类分子表达均减弱
[答案] B
[解析] 【正解B】癌细胞MHC-I类分子表达减弱是介导癌细胞免疫逃逸的最可能机制——MHC-I类分子表达下调或缺失导致CTL无法识别肿瘤细胞表面的肿瘤抗原肽-MHC-I复合物，丧失对肿瘤细胞的免疫监视和杀伤能力，是多种实体瘤（包括肺癌）最普遍的免疫逃逸机制。【排除】A.MHC-I表达增强有利于CTL识别杀伤，不利于逃逸 C.MHC-II表达增强有利于CD4+T细胞识别和辅助抗肿瘤免疫 D.MHC-II表达减弱可能影响CD4+T细胞辅助，但CTL通过MHC-I识别是抗肿瘤核心，MHC-II减弱非最主要逃逸机制 E.虽然两者均减弱也可能逃逸，但MHC-I减弱是最关键因素。 
[题目] 1010. 肿瘤细胞常高表达下述哪类分子
A. MHC I 类分子
B. MHC II 类分子
C. CD80
D. CD86
E. TGF-β、IL-10等免疫抑制分子
[答案] E
[解析] 【正解E】肿瘤细胞常高表达TGF-beta、IL-10等免疫抑制分子——TGF-beta抑制CTL和NK细胞的增殖及效应功能，促进Treg和MDSC分化；IL-10抑制DC成熟和IL-12产生，阻碍Th1应答；这些免疫抑制性细胞因子构成肿瘤免疫抑制微环境的核心，是肿瘤免疫逃逸的重要机制。【排除】A.肿瘤细胞常低表达MHC-I类分子以逃逸CTL识别 B.肿瘤细胞一般不表达或低表达MHC-II类分子 C.CD80（B7-1）为T细胞活化的正性共刺激分子，肿瘤细胞常低表达 D.CD86（B7-2）同为T细胞活化的正性共刺激分子，肿瘤细胞常低表达。 
[题目] 1011. 人嗜T淋巴细胞病毒1(HTLV-1)与下列哪种肿瘤的发生有关
A. 宫颈癌
B. 乳腺癌
C. 黑色素瘤
D. 成人T细胞白血病
E. 前列腺癌
[答案] D
[解析] 【正解D】HTLV-1（人嗜T淋巴细胞病毒1型）与成人T细胞白血病/淋巴瘤（ATL）发病密切相关——HTLV-1编码Tax蛋白激活NF-kB通路，促进CD4+T细胞增殖和恶性转化，感染后潜伏期可长达数十年，约3-5%的HTLV-1感染者最终发展为ATL。【排除】A.宫颈癌与HPV（特别是16/18型）相关 B.乳腺癌与BRCA1/2基因突变和激素因素相关 C.黑色素瘤主要与紫外线照射和BRAF突变等相关 E.前列腺癌与年龄、种族和雄激素等因素相关。 
[题目] 1012. 化学致癌物诱导的肿瘤通常
A. 表达特异的TSA
B. 具有相同的抗原性
C. 不具有明显的个体特异性
D. 可用免疫抑制疗法治疗
E. 可以自愈
[答案] A
[解析] 【正解A】化学致癌物（如甲基胆蒽MCA）诱导的肿瘤通常表达个体特异的肿瘤特异性抗原（TSA）——化学致癌物随机诱导基因突变产生独特的突变蛋白（新抗原），每个个体因突变位点不同而产生不同的肿瘤特异性抗原，因此不同小鼠MCA诱发的肉瘤抗原不具有交叉免疫保护性。【排除】B.化学致癌物诱导的肿瘤抗原性各不相同（个体特异性），非具有相同的抗原性 C.化学致癌物诱导的肿瘤具有明显的个体特异性，D.免疫抑制疗法会促进而非治疗肿瘤 E.化学致癌物诱导的肿瘤不会自愈。 
[题目] 1013. 病毒可诱发肿瘤，下列病毒与其诱发的肿瘤错配的是
A. EBV和鼻咽癌
B. HBV和肝癌
C. HTLV-1和前列腺癌
D. HPV和宫颈癌
E. EBV和B细胞淋巴瘤
[答案] C
[解析] 【正解C】HTLV-1与成人T细胞白血病/淋巴瘤（ATL）发病相关，非前列腺癌——HTLV-1编码Tax蛋白激活NF-kB通路导致CD4+T细胞恶性转化。正确的配对为：EBV与鼻咽癌和B细胞淋巴瘤、HBV/HCV与肝细胞癌、HPV与宫颈癌和口咽癌。【排除】A.EBV与鼻咽癌正确 B.HBV与肝癌正确 D.HPV与宫颈癌正确 E.EBV与B细胞淋巴瘤正确。
[题目] 1014. 介导肿瘤免疫监视功能的是
A. 肥大细胞
B. 中性粒细胞
C. 郎格罕氏细胞
D. NK细胞
E. 抗原提呈细胞
[答案] D
[解析] 【正解D】NK细胞是免疫监视（immune surveillance）的核心执行细胞——NK细胞通过missing-self机制识别MHC-I类分子表达下调的肿瘤细胞，并通过NKG2D识别肿瘤细胞表面应激诱导的MICA/MICB和ULBP等配体，无需预先致敏即可直接杀伤突变的肿瘤细胞，是免疫监视理论的主要实验依据。【排除】A.肥大细胞主要参与过敏反应和抗寄生虫免疫 B.中性粒细胞主要参与化脓性细菌感染 C.朗格汉斯细胞（LC）是皮肤中的未成熟DC，负责抗原提呈而非免疫监视 E.抗原提呈细胞负责激活适应性免疫，NK细胞才是免疫监视的直接执行者。
[题目] 1015. 抗肿瘤治疗后，在原发灶附近复发的肿瘤细胞通常不具有的特点是
A. 抗原缺失
B. 抗原调变
C. MHC I 类分子表达缺失
D. Fas分子表达消失
E. TGF-β表达下调
[答案] E
[解析] 【正解E】抗肿瘤治疗后复发的肿瘤细胞通常高表达TGF-beta等免疫抑制分子以抑制抗肿瘤免疫——复查肿瘤具有多种免疫逃逸特征，包括肿瘤抗原缺失或调变、MHC-I类分子表达缺失和Fas表达消失以抵抗凋亡，而TGF-beta表达应该是上调（非下调）以维持免疫抑制微环境。【排除】A.抗原缺失是复发肿瘤的常见特征（免疫选择压力下抗原丢失） B.抗原调变是免疫压力导致的肿瘤抗原表达减少 C.MHC-I类分子表达缺失使CTL无法识别，有利于免疫逃逸 D.Fas表达消失使肿瘤抵抗FasL介导的凋亡。
[题目] 1016. 肿瘤细胞表达减少时，有利于免疫逃逸的是
A. TGF-β
B. PD-L1
C. Fas-L
D. Fas
E. Bcl-2
[答案] D
[解析] 【正解D】Fas（CD95）为死亡受体，其表达减少使肿瘤细胞抵抗CTL通过FasL/Fas途径诱导的外源性凋亡，有利于免疫逃逸——当肿瘤细胞Fas表达降低时，即使CTL表达FasL也无法有效诱导肿瘤细胞凋亡。【排除】A.TGF-beta表达减少不利于免疫逃逸，肿瘤细胞通常高表达TGF-beta B.PD-L1表达减少有利于T细胞活化，不利于免疫逃逸 C.FasL表达减少不利于肿瘤细胞对T细胞的反击，不利于免疫逃逸 E.Bcl-2表达减少促进凋亡，不利于肿瘤细胞抗凋亡逃逸。
[题目] 1017. 固有免疫细胞的抗肿瘤效应主要是
A. 封闭肿瘤细胞表面转铁蛋白受体
B. CTL杀伤肿瘤细胞
C. NK细胞杀伤肿瘤细胞
D. 肿瘤细胞抗原调变
E. TNF-α诱导肿瘤细胞凋亡
[答案] C
[解析] 【正解C】固有免疫抗肿瘤的主要效应是NK细胞杀伤肿瘤细胞——NK细胞通过missing-self机制（KIR识别自身MHC-I传递抑制信号减弱）和NKG2D识别应激分子（MICA/MICB）双重信号激活，释放穿孔素和颗粒酶非特异性杀伤肿瘤细胞，是固有免疫抗肿瘤的第一道防线。【排除】A.封闭转铁蛋白受体是抗体的作用 B.CTL杀伤肿瘤细胞属于适应性（特异性）免疫，非固有免疫 D.肿瘤细胞抗原调变是免疫逃逸机制，非抗肿瘤效应 E.TNF-alpha主要由巨噬细胞产生，是固有免疫效应分子之一但非最主要机制。
[题目] 1018. 细胞介导的特异性抗肿瘤免疫效应主要是
A. 封闭肿瘤细胞表面转铁蛋白受体
B. CTL杀伤肿瘤细胞
C. NK细胞杀伤肿瘤细胞
D. 肿瘤细胞抗原调变
E. TNF-α诱导肿瘤细胞凋亡
[答案] B
[解析] 【正解B】细胞介导的特异性抗肿瘤免疫效应主要是CTL（CD8+细胞毒性T细胞）通过TCR特异性识别肿瘤细胞表面肿瘤抗原肽-MHC-I类分子复合物，释放穿孔素/颗粒酶和表达FasL/TRAIL直接杀伤肿瘤细胞——这属于适应性（特异性）细胞免疫，与NK细胞的固有免疫杀伤（非特异性）不同。【排除】A.封闭转铁蛋白受体是体液免疫中抗体的效应 C.NK细胞杀伤为非特异性固有免疫，非特异性适应性免疫 D.肿瘤细胞抗原调变是免疫逃逸机制 E.TNF-alpha诱导凋亡是固有免疫效应机制之一。
[题目] 1019. 肿瘤局部的Gr-1+CD11b+髓系来源的抑制性细胞主要发挥下述作用
A. 杀伤肿瘤细胞
B. 激活树突状细胞
C. 参与肿瘤免疫逃逸
D. 产生抗体
E. 协助CTL抗肿瘤
[答案] C
[解析] 【正解C】Gr-1+CD11b+髓系来源抑制性细胞（MDSC）主要发挥参与肿瘤免疫逃逸的作用——MDSC是肿瘤微环境中重要的免疫抑制性细胞群体，通过高表达精氨酸酶1（ARG1）消耗L-精氨酸、诱导型一氧化氮合酶（iNOS）产生NO和过氧亚硝酸盐、产生活性氧（ROS）、分泌IL-10和TGF-beta及诱导Treg分化等多种机制，强烈抑制CTL和NK细胞的抗肿瘤功能。【排除】A.MDSC抑制而非杀伤肿瘤细胞 B.MDSC抑制DC功能而非激活 D.MDSC不产生抗体 E.MDSC抑制而非协助CTL抗肿瘤。
[题目] 1020. 以下叙述正确的是
A. CD4+ T细胞不能直接杀伤肿瘤细胞
B. 巨噬细胞可能抑制机体的抗肿瘤功能
C. 巨噬细胞不能递呈肿瘤抗原
D. 使用TGF-β有利于免疫细胞杀伤肿瘤细胞
E. 活化的T细胞可分泌IL-2直接杀伤肿瘤细胞
[答案] B
[解析] 【正解B】肿瘤相关巨噬细胞(TAM)常极化为M2型，可分泌IL-10/TGF-beta/VEGF等免疫抑制因子抑制抗肿瘤免疫，促进肿瘤血管生成和转移，故'巨噬细胞可能抑制机体的抗肿瘤功能'是正确的。【排除】A.CD4+Th1可通过辅助CTL和活化巨噬间接抗瘤(非完全不能杀伤,某些CD4+CTL可直接杀伤)。C.巨噬细胞为专职APC可提呈肿瘤抗原给T细胞。D.TGF-beta强烈抑制抗肿瘤免疫功能(使用TGF-beta反而不利于免疫杀伤)。E.IL-2促进T细胞增殖但不能直接杀伤肿瘤(杀伤需CTL/NK效应机制)。
[题目] 1021. 肿瘤细胞可主动诱导荷瘤机体产生下述哪种细胞实现免疫逃逸
A. CD4+CD25+调节性T细胞(Treg)
B. CTL
C. γδT细胞
D. NK细胞
E. 肥大细胞
[答案] A
[解析] 【正解A】肿瘤细胞可分泌TGF-beta/IL-10/IDO等因子主动诱导Treg(CD4+CD25+Foxp3+)在肿瘤微环境中扩增和募集，Treg通过分泌IL-10/TGF-beta、表达CTLA-4竞争B7、消耗IL-2(高表达CD25)等多种机制抑制抗肿瘤效应T细胞功能，是肿瘤免疫逃逸的重要机制。【排除】B.CTL杀伤肿瘤细胞(是抗肿瘤效应细胞,非逃逸细胞)。C.gamma-delta T细胞可识别并杀伤肿瘤细胞。D.NK细胞为抗肿瘤固有免疫效应细胞。E.肥大细胞在肿瘤中作用复杂，非免疫逃逸主要诱导细胞。
[题目] 1022. 关于CTL介导的抗肿瘤免疫正确的是
A. CTL杀伤肿瘤细胞无需预先致敏
B. CTL杀伤肿瘤细胞受MHC限制
C. IL-4可增强CTL的杀伤活性
D. CTL可以通过ADCC效应杀伤肿瘤细胞
E. CTL杀伤肿瘤细胞需经IL-2体外刺激
[答案] B
[解析] 【正解B】CTL(CD8+)通过TCR特异性识别肿瘤细胞表面MHC-I类分子提呈的肿瘤抗原肽，严格受MHC-I类分子限制，这是CTL杀伤的高度特异性基础。【排除】A.CTL杀伤靶细胞需预先致敏(初始CD8+T细胞需抗原致敏分化为效应CTL后方可杀伤)。C.IL-4为Th2型细胞因子，主要促进体液免疫/IgE，非增强CTL杀伤(增强CTL活性的主要是IL-2/IFN-gamma/IL-12)。D.ADCC是NK细胞和巨噬细胞通过FcgammaRIII(CD16)/FcgammaRI杀伤抗体包被靶细胞的机制，非CTL主要杀伤途径(CTL主要用穿孔素/颗粒酶/FasL)。E.CTL杀伤不需要体外IL-2刺激(体内CTL活化依赖Th1辅助和APC提供的共刺激信号，体外扩增才常用IL-2)。
[题目] 1023. CD80、CD86表达低下，PD-L1表达上调
A. 共刺激信号异常
B. 诱导肿瘤特异性T细胞凋亡
C. 抗凋亡作用
D. 无法诱导CTL活化
E. 抗原调变
[答案] A
[解析] 【正解A】CD80/CD86(B7-1/B7-2)表达低下意味着肿瘤细胞缺乏T细胞活化所需的正性共刺激信号(CD28-B7)，而PD-L1表达上调则通过PD-1/PD-L1通路传递负性共抑制信号，二者协同导致T细胞活化受抑或进入失能/anergy状态，属于共刺激信号异常。【排除】B.FasL高表达才会诱导T细胞凋亡(CD80/CD86低下+PD-L1上调不直接诱导凋亡,而是导致失能)。C.抗凋亡作用由Bcl-2高表达等机制实现,与共刺激信号异常无关。D.MHC-I分子低下会导致无法诱导CTL活化(此题侧重共刺激信号异常)。E.抗原调变指肿瘤抗原表达减少或丢失。
[题目] 1024. FasL高表达
A. 共刺激信号异常
B. 诱导肿瘤特异性T细胞凋亡
C. 抗凋亡作用
D. 无法诱导CTL活化
E. 抗原调变
[答案] B
[解析] 【正解B】肿瘤细胞高表达FasL(CD95L)可利用Fas/FasL死亡受体途径反向杀伤浸润的肿瘤特异性T细胞(T细胞活化后上调Fas表达)，即'Fas反击/Fas counter-attack'假说——肿瘤细胞通过表达FasL诱导肿瘤特异性CTL和Th细胞凋亡，是肿瘤免疫逃逸的重要机制。【排除】A.共刺激信号异常主要指CD80/CD86/PD-L1表达异常。C.抗凋亡作用由Bcl-2/Bcl-xL高表达或Fas/FasL通路defect实现。D.无法诱导CTL活化主要由MHC-I下调或共刺激信号缺陷所致。E.抗原调变指肿瘤抗原自身表达减少或缺失。
[题目] 1025. 肿瘤抗原表达减少或丢失
A. 共刺激信号异常
B. 诱导肿瘤特异性T细胞凋亡
C. 抗凋亡作用
D. 无法诱导CTL活化
E. 抗原调变
[答案] E
[解析] 【正解E】肿瘤抗原表达减少或丢失(抗原调变/antigenic modulation)是在抗肿瘤免疫选择压力下，肿瘤细胞通过下调或丢失靶抗原表位逃避特异性CTL识别和杀伤的免疫逃逸机制——类似病毒在抗体压力下的抗原变异。【排除】A.共刺激信号异常(CD80/CD86低下+PD-L1上调)属于另一逃逸机制。B.诱导肿瘤特异性T细胞凋亡为FasL高表达机制。C.抗凋亡作用为Bcl-2高表达机制。D.无法诱导CTL活化可由MHC-I下调或共刺激信号缺陷所致,本题描述的是抗原调变。
[题目] 1026. 能够抵抗免疫系统清除的肿瘤细胞不具有的特点是
A. MHCⅠ类分子表达低下
B. 表达特异性抗原
C. 分泌抑制性细胞因子
D. 缺乏共刺激信号
E. 抗原表位的缺失
[答案] B
[解析] 【正解B】能抵抗免疫系统清除的肿瘤细胞经免疫选择(immunoselection)后通常丢失或下调特异性肿瘤抗原(MHC-I下调/抗原丢失变异体)，若照常表达特异性抗原则容易被CTL识别和清除，故'表达特异性抗原'是已被成功清除的肿瘤细胞的标志，不是抵抗清除的细胞具有的特点。【排除】A.MHC-I类分子表达低下是免疫逃逸常见特点(有利于抵抗清除)。C.分泌抑制性细胞因子(TGF-beta/IL-10)是逃逸特点。D.缺乏共刺激信号使T细胞失能，是逃逸特点。E.抗原表位缺失(抗原调变)是逃逸特点。
[题目] 1027. 在细胞介导的抗肿瘤免疫中，下述正确的是
A. CD8+ CTL是抗肿瘤免疫的主要效应细胞
B. CTL杀伤肿瘤细胞不受MHC限制
C. 用巨噬细胞抑制剂可抑制机体内肿瘤生长
D. 中性粒细胞可特异杀伤人体内多种肿瘤
E. NK细胞通过表面的IgE Fc段受体与瘤细胞上的抗体结合发挥ADCC效应
[答案] A
[解析] 【正解A】CD8+CTL通过TCR特异性识别肿瘤细胞表面MHC-I-肿瘤抗原肽复合物，经穿孔素/颗粒酶和FasL途径直接特异性杀伤肿瘤细胞，是细胞介导的抗肿瘤免疫中最核心的效应细胞。【排除】B.CTL杀伤肿瘤细胞严格受MHC-I类分子限制(非不受MHC限制)。C.巨噬细胞抑制剂会损害M1型巨噬细胞的抗肿瘤和抗原提呈功能,反而促进肿瘤生长(非抑制肿瘤生长)。D.中性粒细胞为固有免疫细胞不具有特异性抗肿瘤功能。E.NK细胞通过FcgammaRIII(CD16)结合IgG抗体Fc段介导ADCC(非IgE Fc段受体，FcepsilonRI参与I型超敏反应和抗寄生虫免疫,且ADCC主要介导分子是IgG而非IgE)。
[章节] 第十六章 移植免疫
[单选题]
[题目] 1028. 环抱素的主要作用是
A. 抑制T细胞活化、增殖
B. 干扰T细胞对移植抗原的识别
C. 阻断B细胞分化成为浆细胞
D. 抑制APC表面HLA的表达
E. 以上均是
[答案] A
[解析] 【正解A】环孢素A（CsA）的主要作用是抑制T细胞活化和增殖——CsA与细胞内亲环素（cyclophilin）结合形成复合物，抑制钙调磷酸酶（calcineurin）的磷酸酶活性，阻止NFAT（活化T细胞核因子）去磷酸化和核转位，从而阻断IL-2、IL-4等细胞因子基因的转录，选择性抑制T细胞活化增殖。【排除】B.CsA作用在T细胞活化阶段而非APC识别阶段 C.CsA主要抑制T细胞，对B细胞分化为浆细胞的直接抑制作用较弱 D.CsA不直接抑制APC表面HLA的表达。 
[题目] 1029. 关于器官移植的正确描述是
A. 不需ABO血型符合
B. 不需HLA-DR抗原一致
C. 靶抗原只是HLAⅠ类抗原
D. 供体最好从同胞中筛选
E. 使用免疫抑制剂就不用组织配型
[答案] D
[解析] 【正解D】器官移植供体最好从同胞（兄弟姐妹）中筛选——同胞间HLA全相合（HLA-identical）的概率为25%，HLA单倍体相合的概率为50%，从同胞中选择HLA匹配的供者可显著降低移植排斥反应的发生率和严重程度，是活体移植的首选。【排除】A.器官移植一般需ABO血型符合，以免发生超急性排斥反应 B.HLA-DR抗原一致性对肾移植结局影响最大，必须考虑 C.靶抗原包括HLA-I类和HLA-II类抗原 E.即使使用免疫抑制剂，组织配型仍必不可少，HLA匹配越好免疫抑制剂用量可越少。 
[题目] 1030. 可同时存在HVGR和GVHR两种移植排斥反应的是
A. 心脏移植
B. 肾脏移植
C. 肝脏移植
D. 骨髓移植
E. 肺脏移植
[答案] D
[解析] 【正解D】骨髓移植可同时存在HVGR（宿主抗移植物反应）和GVHR（移植物抗宿主反应）——骨髓移植物中含有供者成熟T细胞，可识别宿主同种异体抗原引起GVHR（攻击皮肤、肝脏和肠道）；受者残留的免疫细胞也可产生针对供者HLA的HVGR（排斥供者造血干细胞）。【排除】A.心脏移植只存在HVGR，不含有足以引起GVHR的免疫细胞 B.肾脏移植原则上只存在HVGR C.肝脏移植只存在HVGR E.肺脏移植原则上只存在HVGR。 
[题目] 1031. 慢性排斥反应的主要免疫学机制是
A. CD4+T细胞介导的慢性迟发型超敏反应性炎症
B. 抗ABO血型抗体或HLAⅠ类分子抗体
C. NK细胞
D. 抑制细胞的活化
E. 对HLA抗原的耐受
[答案] A
[解析] 【正解A】慢性排斥反应的主要免疫学机制是CD4+T细胞介导的慢性迟发型超敏反应性炎症——CD4+Th1细胞识别同种异体MHC-II类分子后释放IFN-gamma等细胞因子，持续激活巨噬细胞导致慢性炎症，引起移植物血管内膜平滑肌细胞增生和间质纤维化，最终导致移植物血管闭塞和功能丧失。【排除】B.抗ABO血型抗体和抗HLA-I抗体主要介导超急性排斥反应 C.NK细胞在慢性排斥中作用有限，非主要机制 D.抑制细胞的活化与免疫耐受相关而非排斥 E.对HLA抗原的耐受可避免而非诱发排斥。 
[题目] 1032. 一般在移植的数天或数月后发生，主要由细胞免疫反应引起，移植物的主要病理变化是实质细胞的坏死。这种移植排斥反应的类型是
A. 超急性排斥反应
B. 急性排斥反应
C. 慢性排斥反应
D. GVHR
E. HVG
[答案] B
[解析] 【正解B】移植后数天至数月发生、主要由细胞免疫引起、实质细胞坏死的排斥反应是急性排斥反应——急性排斥以CD8+CTL直接杀伤移植物实质细胞和CD4+Th1细胞介导的DTH炎症为特征，淋巴细胞和多形核白细胞大量浸润致实质细胞坏死，是最常见且最重要的移植排斥类型。【排除】A.超急性排斥在移植后数分钟至48小时内发生，由预存抗体介导 C.慢性排斥在移植后数月至数年发生，以血管内膜纤维化为特征 D.GVHR是移植物中供者T细胞攻击宿主组织 E.HVGR泛指宿主抗移植物反应。 
[题目] 1033. 应用抗淋巴细胞单克隆抗体(McAb)可治疗的疾病是
A. 宿主抗移植物病
B. 皮肤上皮癌
C. 严重免疫缺陷
D. 再生障碍性贫血
E. 白血病
[答案] A
[解析] 【正解A】抗淋巴细胞单克隆抗体（如抗CD3单抗/OKT3、抗CD25单抗/巴利昔单抗、抗CD52单抗/阿仑珠单抗等）可抑制受者T细胞功能，用于治疗和预防宿主抗移植物病（HVGR）——通过消除或抑制受者T细胞阻断同种异体识别和排斥效应。【排除】B.皮肤上皮癌非抗淋巴细胞抗体的适应症 C.严重免疫缺陷需要免疫重建而非免疫抑制 D.再生障碍性贫血为骨髓造血功能衰竭 E.白血病为血液系统恶性肿瘤，非抗淋巴细胞抗体的主要适应症。 
[题目] 1034. 关于移植物抗宿主反应(GVHR)的描述，下列哪项是错误的
A. 宿主与移植物之间的HLA型别不符
B. 移植物中含有足够数量的成熟T细胞
C. 宿主处于免疫无能或免疫功能严重缺陷状态
D. 主要见于骨髓移植后
E. 急性排斥反应多转为慢性排斥反应
[答案] E
[解析] 【正解E】GVHR（移植物抗宿主反应）与HVGR的急性排斥转为慢性排斥是两个不同的病理过程——GVHR的特点为供者T细胞攻击宿主组织，而急性排斥向慢性排斥转化是HVGR范畴，描述用于HVGR而非GVHR，该选项错误地将HVGR的概念用于GVHR。【排除】A.GVHR发生的条件是供者与宿主HLA型别不符（正确） B.移植物中含有足够数量的成熟T细胞是GVHR的必要条件（正确） C.宿主处于免疫无能或免疫功能严重缺陷状态是GVHR的发生条件（正确） D.GVHR主要见于骨髓移植后，也可发生于实体器官移植（正确）。 
[题目] 1035. 肾移植组织配型中，HLA复合体中哪个位点的相容性对移植后果影响最大
A. A
B. B
C. C
D. DR
E. DQ
[答案] D
[解析] 【正解D】HLA-DR位点的相容性对肾移植后果影响最大——HLA-DR（HLA-II类分子）分子主要提呈外源性抗原肽给CD4+Th细胞，DR不匹配可直接激活受者CD4+T细胞产生强烈的Th1应答，辅助CTL和B细胞产生排斥反应；临床数据证明DR匹配对移植物存活率影响远大于HLA-A和HLA-B。【排除】A.HLA-A为I类分子，对移植影响小于DR B.HLA-B为I类分子，重要性次于DR C.HLA-C表达水平低，影响较小 E.HLA-DQ为II类分子，重要性次于DR。 
[题目] 1036. 下列与超急性排斥反应无关的情况是
A. 多次输血
B. 真菌感染
C. 妊娠
D. 再次移植
E. 长期血液透析
[答案] B
[解析] 【正解B】真菌感染与超急性排斥反应无关——超急性排斥反应由受者体内预存的抗供者HLA抗体或抗A/B血型抗体介导，在移植后数分钟至48小时内发生。预存抗体的来源包括多次输血、妊娠、再次移植和长期血液透析，但与真菌感染无关。【排除】A.多次输血可致敏产生抗HLA抗体（正确相关） C.妊娠过程中胎儿父系HLA可致敏母体产生抗HLA抗体（正确相关） D.再次移植时已有前次移植致敏产生的HLA抗体（正确相关） E.长期血液透析可致敏产生抗HLA抗体（正确相关）。 
[题目] 1037. 供者APC表面的抗原肽-供者MHC分子复合物
A. 可模拟新抗原肽-受者MHC分子复合物的空间构象
B. 是一种超抗原
C. 是一种T细胞有丝分裂原
D. 是一种异嗜性抗原
E. 不能被受者同种反应性T细胞识别
[答案] A
[解析] 【正解A】供者APC表面的抗原肽-供者MHC分子复合物可模拟自身MHC-抗原肽复合物的空间构象，被受者同种反应性T细胞直接识别（直接识别途径）——TCR具有一定程度的交叉反应性（cross-reactivity），能直接识别完整的同种异体MHC分子（含或不含供者自身肽），无需受者APC加工提呈。【排除】B.供者MHC-肽复合物非超抗原，超抗原不需加工直接连接TCR Vbeta与MHC-II C.非T细胞有丝分裂原，有丝分裂原非特异性激活T细胞 D.非异嗜性抗原，异嗜性抗原是不同物种间的共同抗原 E.供者MHC-肽复合物能被受者同种反应性T细胞识别（正是排斥的基础）。 
[题目] 1038. 以下是器官移植供者和受者匹配的HLA基因座位，最适合进行移植的是
A. HLA-A、HLA-
B. HLA-C B.HLA-DP、HLA-DQ、HLA-C
C. HLA-A、HLA-B、HLA-DR
D. HLA-A、HLA-C、HLA-DR
E. HLA-A、HLA-B、HLA-DP
[答案] C
[解析] 【正解C】HLA-A、HLA-B、HLA-DR三个位点同时匹配最适合进行器官移植——HLA-DR的匹配最为关键，其次为HLA-B和HLA-A，这三个经典HLA位点供受者匹配可最大程度降低排斥反应风险，是临床肾移植配型的基本要求。【排除】A.仅HLA-A不完整匹配不足 B.缺少HLA-DR（最重要位点）的匹配 D.缺少HLA-B的匹配，不如三者全匹配理想 E.缺少HLA-DR的匹配，缺少最重要的位点。 
[题目] 1039. 关于移植供者的选择，错误的是
A. 一般情况下血型需相配
B. 需要检测供者血清中预存的细胞毒性HLA抗体
C. HLA位点不必全部匹配
D. 兄弟姊妹间配型成功的几率高
E. 骨髓移植需交叉配型
[答案] B
[解析] 【正解B】移植前需检测的是受者血清中预存的抗供者HLA抗体（而非供者血清中预存的细胞毒性HLA抗体）——交叉配型（crossmatch）中将受者血清与供者淋巴细胞孵育，检测受者是否有预存抗体可攻击供者细胞，阳性则禁忌移植。【排除】A.一般情况下需ABO血型相配（正确） C.HLA位点不必全部匹配（但越匹配越好）（正确） D.兄弟姐妹间HLA配型成功的几率高（同胞全相合概率25%）（正确） E.骨髓移植需交叉配型以防止超急排斥和严重GVHR（正确）。 
[题目] 1040. 不能用于诱导同种移植耐受的方法是
A. 应用供者抗原主动诱导移植耐受
B. 阻断共刺激通路
C. 诱生和过继耐受性DC
D. 建立免疫细胞混合嵌合体
E. 消除体内调节性T细胞
[答案] E
[解析] 【正解E】消除体内调节性T细胞（Treg）不能用于诱导同种移植耐受——Treg（CD4+CD25+Foxp3+）是维持外周免疫耐受的关键细胞，通过细胞间接触（CTLA-4、GITR）和分泌IL-10、TGF-beta抑制同种反应性T细胞，诱导和维持移植耐受。消除Treg会破坏而非诱导移植耐受。【排除】A.应用供者抗原主动诱导移植耐受是可行策略（口服耐受、胸腺内注射等） B.阻断共刺激通路（如抗CD40L、CTLA-4-Ig）可诱导T细胞无能/耐受 C.诱生和过继耐受性DC可抑制同种反应性T细胞 D.建立免疫细胞混合嵌合体是诱导中枢和外周耐受的有效策略。 
[题目] 1041. 异卵双生子间的移植
A. 自身移植
B. 同系移植
C. 同种移植
D. 异种移植
[答案] C
[解析] 【正解C】异卵双生子（DZ双胎）之间的移植属于同种异基因移植（同种移植）——异卵双生子由两个不同的受精卵发育而来，遗传学上如同普通兄弟姐妹，HLA型别不完全相同，为同一物种不同个体间的同种移植。同卵双生子（MZ）遗传学完全相同，其间的移植为同系移植。【排除】A.自身移植是同一个体内的移植 B.同系移植是同基因个体间的移植（如同卵双生子、近交系动物） D.异种移植是不同物种个体间的移植。 
[题目] 1042. 新生儿受者与供者HLA型别不符时，移植物中如果含有足够数量的成熟T细胞，可能导致
A. 超急性排斥反应
B. 急性移植物抗宿主反应(GVHR)
C. 急性排斥反应
D. 慢性排斥反应
E. 移植耐受
[答案] B
[解析] 【正解B】新生儿受者与供者HLA型别不符时，移植物中如含有足够数量的成熟T细胞，可能导致急性移植物抗宿主反应（GVHR）——新生儿免疫功能尚未发育成熟，处于免疫无能状态，无法排斥移植物中含有的供者成熟T细胞，供者T细胞识别受者的同种异体HLA抗原后活化增殖，攻击受者皮肤、肝脏和肠道等组织导致GVHR。【排除】A.超急性排斥由预存抗体（非T细胞）介导 C.急性排斥反应为HVGR，需受者免疫功能正常 D.慢性排斥为长期慢性炎症 E.新生儿免疫功能低下时难以产生移植耐受。 
[题目] 1043. 取供者淋巴细胞和受者血清进行交叉细胞毒试验用于防止
A. 超急性排斥反应
B. 急性移植物抗宿主反应(GVHR)
C. 急性排斥反应
D. 慢性排斥反应
E. 移植耐受
[答案] A
[解析] 【正解A】交叉细胞毒试验（取供者淋巴细胞和受者血清混合，加入补体，观察细胞死亡）用于检测受者血清中预存抗供者HLA抗体——若受者血清中存在抗供者HLA抗体则与供者淋巴细胞结合并激活补体导致溶解，试验阳性提示移植后超急性排斥反应风险极高，应取消移植。【排除】B.GVHR由供者T细胞攻击宿主，交叉配型检测受者抗体而非供者T细胞 C.急性排斥反应主要由T细胞免疫介导 D.慢性排斥反应为长期的炎症过程 E.交叉配型与诱导移植耐受无关。 
[题目] 1044. 诱发同种异体急性移植物排斥反应的最重要的靶抗原是
A. 超抗原
B. HLA抗原
C. Rh血型抗原
D. ABO血型抗原
E. 组织特异性抗原
[答案] B
[解析] 【正解B】HLA抗原（MHC-I和MHC-II类分子）是诱发同种异体急性移植物排斥反应最重要的靶抗原——供受者间HLA型别差异是移植排斥反应的根本原因，HLA-I类抗原主要激活CD8+CTL直接杀伤移植物，HLA-II类抗原激活CD4+Th细胞辅助CTL和B细胞产生排斥反应。【排除】A.超抗原非特异性激活T细胞但非排斥反应的主要靶抗原 C.Rh血型抗原主要在输血反应和新生儿溶血症中重要 D.ABO血型抗原主要与超急性排斥反应相关，非急性排斥的主要靶抗原 E.组织特异性抗原（如次要组织相容性抗原）在HLA全相合的移植中也可诱发排斥，但重要性低于HLA抗原。 
[题目] 1045. 直接识别是
A. 受者APC提呈供者抗原肽给受者TCR
B. 受者APC提呈受者抗原肽给供者TCR
C. 供者APC提呈受者抗原肽给供者TCR
D. 供者APC提呈供者MHC分子给受者TCR
E. 供者APC提呈供者抗原肽给供者TCR
[答案] D
[解析] 【正解D】直接识别是指受者T细胞通过TCR直接识别供者APC表面的完整供者MHC分子（含或不含供者自身抗原肽）——这是移植排斥反应特有的识别方式，不经过受者APC加工提呈，同种反应性T细胞前体频率高（约1-10%），主要介导急性排斥反应。【排除】A.受者APC提呈供者抗原肽给受者TCR是间接识别途径 B.受者APC提呈受者抗原肽给供者TCR是GVHR中的间接识别 C.供者APC提呈受者抗原肽给供者TCR在移植排斥中无实际意义 E.供者APC提呈供者抗原肽给供者TCR也与直接识别概念不符。 
[题目] 1046. 移植免疫的直接识别
A. 其机制与TCR的交叉识别相关
B. 主要激活 CD4⁺T 细胞
C. 主要引起慢性排斥反应
D. 受者APC提呈供者MHC抗原
E. 需要经过抗原提呈
[答案] A
[解析] 【正解A】移植免疫直接识别的机制与TCR的交叉识别（cross-reactivity）相关——TCR在胸腺选择时被约束为识别自身MHC分子，但TCR具有一定的构象识别灵活性，可以将同种异体MHC分子（含或不含供者肽）当作自身MHC-外来抗原肽复合物的类似物进行识别，这种TCR识别自身MHC与外源肽的进化机制导致了交叉识别同种异体MHC的能力。【排除】B.直接识别主要激活CD4+T细胞和CD8+T细胞，非仅CD4+ C.直接识别主要引起急性排斥反应（非慢性排斥） D.直接识别由供者APC提呈供者MHC（非受者APC）给受者T细胞 E.直接识别不需要受者APC的抗原加工提呈处理。 
[题目] 1047. 慢性排斥反应中，移植物的血管病变特点是
A. 血管内膜纤维化
B. 血管肌层肥厚
C. 血管壁玻璃样变性
D. 血管壁坏死
E. 以大量中性粒细胞浸润为主的血管炎
[答案] A
[解析] 【正解A】慢性排斥反应中移植物的特征性血管病变为血管内膜纤维化（移植物动脉硬化/闭塞性血管病变）——由CD4+T细胞和巨噬细胞介导的慢性炎症刺激血管平滑肌细胞从血管中膜迁移至内膜并增殖，细胞外基质沉积导致血管内膜向心性增厚、管腔狭窄，最终移植物缺血坏死和功能丧失。【排除】B.血管肌层肥厚非慢性排斥的典型病变 C.血管壁玻璃样变性见于高血压病，非移植慢性排斥的特征 D.血管壁坏死多见于急性排斥或超急性排斥 E.以大量中性粒细胞浸润为主的血管炎多见于急性排斥反应（超急性排斥也有中性粒细胞浸润）。 
[题目] 1048. 为避免或减轻移植排斥反应，移植物的预处理应该
A. 清除过路细胞
B. 清除移植物中抗体
C. 保持移植物的活性
D. 抗生素处理
E. 灭菌处理
[答案] A
[解析] 【正解A】为减轻移植排斥反应，移植物预处理应清除过路细胞（passenger leukocytes）——过路细胞主要是移植物中残留的供者树突状细胞和巨噬细胞等APC，它们高表达供者MHC-II类分子和共刺激分子（CD80/CD86），是直接识别途径中激活受者T细胞的主要细胞，清除过路细胞可显著降低移植物的免疫原性。【排除】B.移植物中残存的抗体非主要免疫原 C.保持移植物活性固然重要，但不清除过路细胞不能减轻排斥 D.抗生素处理针对细菌感染，非针对移植免疫排斥 E.灭菌处理针对微生物污染。 
[题目] 1049. 相对免疫抑制方案，免疫耐受在
A. 特异性针对移植物抗原低应答或不应答，不影响其他免疫应答
B. 成本较低
C. 方案更成熟
D. 机制更简单
E. 操作更容易
[答案] A
[解析] 【正解A】与免疫抑制方案相比，免疫耐受的优势在于特异性针对移植物抗原产生低应答或不应答，不影响机体对其他抗原的正常免疫应答——理想的移植耐受使受体对移植物产生抗原特异性无应答，同时保留对感染性病原体和肿瘤的免疫监视功能，而免疫抑制剂非特异性地抑制整个免疫系统，增加感染和肿瘤风险。【排除】B.免疫耐受方案技术复杂、成本更高 C.免疫耐受方案尚不成熟，多数处于实验研究阶段 D.免疫耐受机制比免疫抑制更为复杂 E.免疫耐受的操作（如嵌合体诱导、Treg过继等）比给免疫抑制剂更为复杂和困难。 
[题目] 1050. 移植免疫主要是指哪种类型的免疫反应
A. 自身免疫
B. 同种异体免疫
C. 超敏反应
D. 免疫缺陷
[答案] B
[解析] 【正解B】移植免疫主要指同种异体免疫反应——同一物种（如人类）中不同个体之间，由于HLA多态性导致的供受者组织相容性抗原差异引起的免疫应答，包括受者T细胞识别供者同种异体MHC分子产生的排斥反应和供者T细胞识别受者同种异体MHC产生的GVHR。【排除】A.自身免疫是对自身抗原的免疫应答 C.超敏反应是异常或过度的免疫应答 D.免疫缺陷是免疫系统功能低下或缺失。 
[题目] 1051. 为了降低器官移植后的免疫排斥反应，通常会采取哪种措施
A. 使用抗生素
B. 使用免疫抑制剂
C. 进行放疗
D. 增加营养摄入
[答案] B
[解析] 【正解B】降低器官移植后免疫排斥反应的首要措施是使用免疫抑制剂——临床常用的免疫抑制方案包括钙调磷酸酶抑制剂（环孢素A、他克莫司）、抗增殖药物（霉酚酸酯、硫唑嘌呤）、糖皮质激素以及生物制剂（抗CD25单抗、抗CD3单抗等），联合用药可协同抑制受者T细胞活化增殖，预防排斥反应。【排除】A.抗生素用于预防和治疗感染，非针对排斥反应 C.放疗非器官移植后常规免疫抑制措施 D.增加营养摄入不能降低免疫排斥反应。 
[题目] 1052. 移植免疫中的“免疫耐受”是指什么
A. 受体对移植物完全不产生免疫反应
B. 受体对移植物产生强烈的免疫反应
C. 受体对移植物产生的免疫反应逐渐减弱
D. 受体对自身组织产生免疫反应
[答案] A
[解析] 【正解A】移植免疫中的'免疫耐受'是指受体对移植物完全不产生免疫反应（或产生抗原特异性低应答）——在无免疫抑制剂维持的情况下，受体免疫系统对供者移植物抗原产生特异性无应答状态，不排斥移植物，同时仍保留对其他外来抗原的正常免疫应答能力。这是器官移植追求的理想状态。【排除】B.受体对移植物产生强烈的免疫反应是排斥反应而非耐受 C.受体对移植物产生的免疫反应逐渐减弱是适应性而非真正的免疫耐受 D.受体对自身组织产生免疫反应是自身免疫病。 
[题目] 1053. 在器官移植后，为了监测免疫排斥反应的发生，通常需要定期检查哪种指标
A. 血糖水平
B. 肝功能指标
C. 免疫细胞数量和功能
D. 电解质水平
[答案] C
[解析] 【正解C】器官移植后需定期检查免疫细胞数量和功能——包括T细胞亚群（CD4+/CD8+比率）、供者特异性抗体（DSA）水平、淋巴细胞增殖功能、细胞因子谱（IL-2、IFN-gamma等）和移植物活检病理检查等，以早期发现排斥反应并调整免疫抑制方案。【排除】A.血糖水平是糖尿病和胰岛移植后的监测指标，非常规排斥反应监测 B.肝功能指标是肝脏移植后肝细胞损伤的监测指标，为移植物功能而非免疫排斥 特有的监测 D.电解质水平反映水电平衡，非免疫排斥反应的特异性监测指标。 
[题目] 1054. 移植排斥反应主要介导的细胞
A. A.B淋巴细胞
B. T淋巴细胞
C. 巨噬细胞
D. NK细胞
E. 粒细胞
[答案] B
[解析] 【正解B】T淋巴细胞是移植排斥反应的主要介导细胞——CD4+Th细胞识别同种异体MHC-II类分子后被活化，分泌IL-2和IFN-gamma辅助CD8+CTL的活化增殖，CD8+CTL直接识别同种异体MHC-I类分子杀伤移植物实质细胞，CD4+Th细胞同时辅助B细胞产生抗供者HLA抗体参与排斥。【排除】A.B淋巴细胞通过产生抗供者抗体参与体液排斥（超急性排斥），但非急性细胞排斥的主要介导细胞 C.巨噬细胞参与慢性排斥的炎症反应和急性排斥的效应阶段，但非始动细胞 D.NK细胞参与固有免疫排斥，但非T细胞介导的特异性排斥的主角 E.粒细胞参与急性排斥的炎症浸润，但非主导细胞。 
[题目] 1055. 临床上进行的器官移植主要是
A. 细胞移植
B. 自体移植
C. 同种同基因移植
D. 异种移植
E. 同种异基因移植
[答案] E
[解析] 【正解E】临床上进行的器官移植主要是同种异基因移植（同种异体移植）——供者和受者属于同一物种（均为人类），但遗传学不同（HLA型别不同），是目前临床肾移植、肝移植、心脏移植和肺移植等实体器官移植以及骨髓移植的主要类型。【排除】A.细胞移植（如胰岛细胞移植）是器官移植的一种特殊形式，非临床器官移植的主体 B.自体移植为同一个体内的移植（如自体皮肤移植），非主要类型 C.同种同基因移植仅限于同卵双生子间，极罕见 D.异种移植因免疫障碍尚未广泛应用于临床。 
[题目] 1056. 异种移植成功的最大障碍是
A. 超急性排斥反应
B. 感染动物的微生物
C. Ⅰ型超敏反应
D. 急性排斥反应
E. 迟发性异种移植排斥反应
[答案] A
[解析] 【正解A】异种移植成功的最大障碍是超急性排斥反应——人体内天然存在抗alpha-半乳糖基（Galalpha1-3Gal）的IgM抗体，该表位在猪等非灵长类动物血管内皮细胞上大量表达，抗体与异种内皮细胞结合后激活补体经典途径，在数分钟至数小时内导致血管内血栓形成和移植物坏死。虽然通过alpha-1,3-半乳糖基转移酶基因敲除猪可克服此障碍，但迟发性异种排斥反应仍面临挑战。【排除】B.感染动物微生物可通过SPF动物和严密筛查控制 C.I型超敏反应非异种移植主要障碍 D.急性排斥反应可使用免疫抑制剂控制 E.迟发性异种移植排斥反应（DXR）是超急排斥后的次要障碍，可通过基因编辑猪改善。 
[题目] 1057. 抗体在超急性移植排斥反应中的作用机制是
A. 抗体与血管内皮细胞抗原结合激活补体经典途径
B. 抗原抗体复合物激活补体旁路途径
C. 抗原抗体复合物激活补体MBL途径
D. 中和作用
E. ADCC作用
[答案] A
[解析] 【正解A】抗体在超急性移植排斥反应中通过与血管内皮细胞抗原结合激活补体经典途径——受者预存IgG/IgM抗体与移植物血管内皮细胞表面的ABO血型抗原或HLA-I类抗原结合，形成抗原-抗体复合物后通过C1q激活补体经典途径，产生C3a/C5a（过敏毒素和趋化因子）和MAC（膜攻击复合物），导致内皮细胞损伤、血小板聚集和血管内血栓形成，移植物迅速坏死。【排除】B.抗体-抗原复合物激活的是补体经典途径而非旁路途径，旁路途径由病原体表面直接激活 C.MBL途径由甘露糖结合凝集素识别病原体糖基启动，非超急性排斥的主要途径 D.中和作用是抗体阻断受体/配体结合，非超急排斥机制 E.ADCC效应由NK/巨噬细胞介导，超急性排斥主要由补体介导。 
[章节] 第十七章 免疫缺陷病
[单选题]
[题目] 1058. 一名男性婴幼儿，出生8个月后开始发病，出现反复化脓性细菌感染，实验室检查可见血清中成熟B细胞缺乏、各类Ig缺乏，特异性抗体水平低下，该患者的治疗应首先考虑选择
A. 基因治疗
B. 注射丙种球蛋白
C. 输注重组IFN-γ
D. 输注重组IL-2
E. 骨髓移植
[答案] B
[解析] 【正解B】反复化脓性细菌感染+成熟B细胞缺乏+各类Ig缺乏提示XLA（X连锁无丙种球蛋白血症/Bruton病），首选治疗为注射丙种球蛋白（IVIG）替代治疗——定期静脉或皮下输注人免疫球蛋白可补充功能性IgG抗体，有效预防和控制感染，是B细胞缺陷病的基础治疗。【排除】A.基因治疗目前多为研究阶段，针对Btk基因缺陷的基因治疗尚未成为首选 C.输注重组IFN-gamma用于慢性肉芽肿病（CGD）的辅助治疗 D.输注重组IL-2非免疫缺陷病常规治疗 E.骨髓移植用于SCID等重症联合免疫缺陷的重建治疗。 
[题目] 1059. 患儿反复感染，尤其是呼吸道感染，表现严重，实验室检查发现血清IgM升高而IgG、IgA、IgE水平低下，外周血和淋巴组织中有大量分泌IgM的浆细胞，该患儿最可能的诊断是
A. 重症联合免疫缺陷病
B. X连锁无丙种球蛋白血症
C. X连锁高IgM综合征
D. 选择性IgA缺陷
E. AIDS
[答案] C
[解析] 【正解C】X连锁高IgM综合征（CD40L/CD154缺陷）的典型实验室特征是血清IgM升高而IgG、IgA、IgE水平显著低下，外周血和淋巴组织中有大量分泌IgM的浆细胞——CD40L缺陷导致T细胞不能通过CD40L-CD40相互作用辅助B细胞进行类别转换重组（CSR），B细胞只能产生IgM而不能切换到IgG/IgA/IgE。【排除】A.SCID表现为T、B细胞数量和功能均严重缺陷 B.XLA（Bruton病）表现为成熟B细胞缺乏、各类Ig均低下 D.选择性IgA缺陷仅IgA低下，不伴IgM升高 E.AIDS为获得性免疫缺陷，CD4+T细胞严重减少。 
[题目] 1060. 下列哪一项是遗传性血管神经性水肿发生的原因
A. HIV感染
B. C1INH缺乏
C. 在胚胎发育中，第三、四咽囊发育障碍
D. Bruton酪氨酸激酶基因缺乏
E. 整合素β2基因突变
[答案] B
[解析] 【正解B】遗传性血管神经性水肿（HAE）由C1INH（C1酯酶抑制剂）缺乏引起——C1INH缺陷导致C1r/C1s的自发活化失控，不断裂解C4和C2产生C2激肽（C2 kinin）和缓激肽（bradykinin）积累，缓激肽增加血管通透性导致皮肤和黏膜的发作性非凹陷性水肿，累及喉头时可因窒息致死。【排除】A.HIV感染导致AIDS（获得性免疫缺陷） C.第三四咽囊发育障碍导致DiGeorge综合征（胸腺发育不全/T细胞缺陷） D.Bruton酪氨酸激酶（Btk）基因缺乏导致XLA（B细胞缺陷） E.整合素beta2（CD18）基因突变导致LAD-I（白细胞黏附缺陷症I型）。 
[题目] 1061. 下列疾病不属于SCID的是
A. 嘌呤核苷酸磷酸化酶缺陷
B. 腺苷脱氢酶缺陷病
C. 裸淋巴细胞综合征
D. 遗传性血管神经性水肿
E. X连锁重症联合免疫缺陷病
[答案] D
[解析] 【正解D】遗传性血管神经性水肿（HAE）属于补体缺陷病，不属于SCID（重症联合免疫缺陷病）——SCID的特征是T细胞和B细胞均严重缺陷，包括腺苷脱氨酶（ADA）缺陷、嘌呤核苷酸磷酸化酶（PNP）缺陷、裸淋巴细胞综合征（MHC-II分子表达缺陷）和X-SCID（gammac链缺陷）等。【排除】A.嘌呤核苷酸磷酸化酶缺陷属于SCID（T-B+NK-或T-B-NK-型） B.腺苷脱氨酶缺陷病属于SCID（T-B-NK-型） C.裸淋巴细胞综合征属于SCID（MHC-II分子不能表达导致CD4+T选择缺陷） E.X连锁重症联合免疫缺陷病（gammac链缺陷）属于SCID（T-B+NK-型）。 
[题目] 1062. 关于X连锁重症联合免疫缺陷病，下列哪一项描述不正确
A. 为性染色体遗传缺陷
B. 发病机制为IL-2Rγ链基因缺陷
C. 患者外周血T细胞减少
D. 患者体内B细胞数可正常但缺乏功能
E. 血清Ig水平正常
[答案] E
[解析] 【正解E】X-SCID患者血清Ig水平显著降低（非正常）——由于gammac链（IL-2Rgammac/IL2RG）基因缺陷，IL-2、IL-4、IL-7、IL-9、IL-15和IL-21等多种细胞因子受体信号转导障碍，导致T细胞和NK细胞严重发育缺陷，B细胞数目可正常但因缺乏T细胞辅助而无功能，各类Ig水平极低甚至测不出。【排除】A.X-SCID为X连锁隐性遗传（正确） B.发病机制为IL-2Rgammac链基因缺陷（正确） C.患者外周血T细胞显著减少甚至缺乏（正确） D.患者体内B细胞数目可正常但缺乏功能（正确）。 
[题目] 1063. 关于Bruton病的免疫学特点，下列描述正确的是
A. 外周血T细胞数降低或缺乏
B. B细胞数量和功能基本正常
C. 血清中IgG含量升高
D. 淋巴组织中有浆细胞
E. 淋巴结缺乏生发中心和淋巴滤泡
[答案] E
