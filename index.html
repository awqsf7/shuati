[解析] 【正解B】Treg细胞（CD4+CD25hiFoxp3+）高表达CD25（IL-2受体α链），CD25与IL-2Rβ/γc组成高亲和力IL-2受体（Kd约10^-11M），可竞争性大量消耗免疫微环境中维持效应T细胞存活和增殖所必需的IL-2——这是Treg免疫抑制的重要机制之一（"IL-2消耗/剥夺机制"）。IL-2被Treg消耗后，效应T细胞因缺乏生长因子而增殖受抑、凋亡增加。【排除】A.CTLA-4通过与B7竞争结合和传导抑制信号发挥抑制，非竞争IL-2。C.PD-1结合PD-L1/PD-L2传导抑制信号。D.FasL结合Fas诱导凋亡。E.CD28与B7结合提供活化性共刺激信号。 
[题目] 562. TGF-β在T细胞分化中的作用是?
A. 促进Th1和CTL分化
B. 诱导Treg和Th17分化
C. 抑制所有T细胞活化
D. 增强IL-2分泌
E. 促进B细胞类别转换
[答案] B
[解析] 【正解B】TGF-β在T细胞分化中具有独特的双重作用——单独TGF-β存在时（低浓度）诱导初始CD4+T细胞表达Foxp3，分化为Treg（iTreg/peripherally induced Treg），发挥免疫抑制作用；当TGF-β与促炎因子IL-6（或IL-21）同时存在时，TGF-β转而协同IL-6通过STAT3通路诱导RORγt表达，驱动初始CD4+T细胞分化为Th17细胞（促炎/致病性），抑制Foxp3表达。这一平衡转换决定了免疫应答是走向抑制（Treg）还是炎症（Th17）。【排除】A.促进Th1和CTL分化为IL-12和IFN-γ。C.抑制所有T细胞活化——TGF-β的确抑制效应T细胞但诱导Treg，非"抑制所有"。D.IL-2分泌不受TGF-β直接增强（TGF-β抑制IL-2分泌）。E.促进B细胞类别转换为IgA是TGF-β的功能之一但非直接促进所有类别转换。 
[章节] 第八章 B淋巴细胞
[单选题]
[题目] 563. 抗体的基本结构是
A. 单体轻链+二聚体重链
B. 两条重链(H链)+两条轻链(L链)通过二硫键连接
C. 三条重链+一条轻链
D. 四聚体糖蛋白
E. 三条轻链和一条重链
[答案] B
[解析] 【正解B】抗体基本结构为两条重链(H链)和两条轻链(L链)通过链间二硫键共价连接,形成Y形四肽链对称结构。【排除】A.轻链和重链均为两条,非单体轻链+二聚体重链。C.抗体为2H+2L结构,非3H+1L。D.抗体本质为免疫球蛋白,非普通的四聚体糖蛋白。E.抗体含两条轻链和两条重链,非三条轻链一条重链。
[题目] 564. 决定抗体类别(IgG/IgM等)的关键区域是
A. 轻链恒定区(CL)
B. 重链恒定区(CH)
C. 轻链可变区(VL)
D. 重链可变区(VH)
E. CDR
[答案] B
[解析] 【正解B】抗体重链恒定区(CH)决定抗体的类别——不同类别的Ig重链CH氨基酸序列不同,分别由γ/μ/α/δ/ε基因编码对应IgG/IgM/IgA/IgD/IgE。【排除】A.轻链恒定区(CL)决定轻链型别(κ或λ),不决定抗体类别。C.轻链可变区(VL)参与抗原结合,不决定类别。D.重链可变区(VH)参与抗原结合,不决定类别。E.CDR负责抗原特异性结合,不决定类别。
[题目] 565. 抗体的“抗原结合部位”位于
A. Fc段
B. Fab段
C. CH2结构域
D. CL结构域
E. CH1结构域
[答案] B
[解析] 【正解B】Fab段(抗原结合片段)含完整轻链(VL+CL)和重链VH+CH1,VH和VL的可变区共同构成抗原结合部位,是抗体与抗原表位特异性结合的功能区域。【排除】A.Fc段负责效应功能(激活补体、结合Fc受体),不直接结合抗原。C.CH2结构域位于Fc段,含补体C1q结合位点,不参与抗原结合。D.CL结构域属恒定区,不参与抗原结合。E.CH1在Fab段内但不直接接触抗原表位。
[题目] 566. 人类抗体轻链的类型包括
A. κ和λ链
B. α和γ链
C. μ和δ链
D. ε和α链
E. ζ和γ链
[答案] A
[解析] 【正解A】人类抗体轻链仅有κ和λ两型,每个抗体分子只能含其中一种(同型排斥),正常血清中κ:λ约为2:1。【排除】B.α和γ链均为重链类型(α→IgA,γ→IgG),非轻链。C.μ和δ链均为重链类型(μ→IgM,δ→IgD),非轻链。D.ε和α链均为重链类型(ε→IgE,α→IgA),非轻链。E.ζ链是TCR-CD3复合物组分,非抗体轻链。
[题目] 567. 下列抗体以五聚体形式存在的是
A. IgG
B. IgM
C. IgA
D. IgE
E. IgD
[答案] B
[解析] 【正解B】IgM为五聚体结构(5个IgM单体+J链),分子量最大(约970kDa),主要存在于血管内,是初次免疫应答最早产生的抗体。【排除】A.IgG为单体结构。C.血清IgA主要为单体,分泌型IgA为二聚体。D.IgE为单体结构。E.IgD为单体结构,主要表达于初始B细胞表面。
[题目] 568. 抗体Fc段的主要功能是
A. 结合抗原
B. 激活补体、结合Fc受体
C. 介导抗体类别转换
D. 参与体细胞高频突变
E. 将单体分子连接为二聚体或多聚体分子
[答案] B
[解析] 【正解B】Fc段(可结晶片段)定位于抗体CH2/CH3区域,主要功能为:激活补体经典途径(CH2区结合C1q),结合各类Fc受体介导调理吞噬、ADCC和ADCP等效应功能。【排除】A.结合抗原是Fab段(V区)的功能。C.类别转换由AID酶在基因水平介导,非Fc段蛋白功能。D.SHM是生发中心B细胞V区基因突变,非Fc段功能。E.J链负责连接Ig单体成多聚体,非Fc段功能。
[题目] 569. 下列属于IgA的特征性结构的是
A. J链和分泌片
B. 跨膜区
C. 糖基化位点
D. 二硫键数量
E. 五聚体
[答案] A
[解析] 【正解A】分泌型IgA(sIgA)的特征性结构含J链(连接两个IgA单体形成二聚体)和分泌片(保护sIgA抵抗黏膜蛋白酶水解),两者是sIgA区别于其他Ig的独特结构组分。【排除】B.跨膜区是膜型Ig(mIg)的特征,非分泌型抗体特征。C.所有抗体均有糖基化,非IgA特征性。D.各类抗体均含二硫键,非IgA特征性。E.五聚体是IgM的结构特征,非IgA。
[题目] 570. 抗体可变区(V区)中高变区(CDR)的主要功能是
A. 维持抗体空间构象
B. 结合抗原表位
C. 介导ADCC作用
D. 激活补体经典途径
E. 与Fc受体结合
[答案] B
[解析] 【正解B】CDR(互补决定区/高变区)位于抗体可变区,是抗体分子中直接与抗原表位特异性互补结合的区域,其氨基酸序列决定抗体的抗原特异性和亲和力。【排除】A.框架区(FR)维持V区空间构象,不直接参与抗原结合。C.ADCC由Fc段结合NK细胞FcγRIII介导,非CDR功能。D.补体激活由Fc段CH2区介导,非CDR功能。E.Fc受体结合由Fc段介导,非CDR功能。
[题目] 571. 下列抗体不能通过胎盘的是
A. IgG1
B. IgG3
C. IgM
D. IgG4
E. 以上都不能通过
[答案] C
[解析] 【正解C】IgM为五聚体(分子量约970kDa),体积过大不能通过胎盘屏障;IgG是唯一能通过胎盘的Ig(通过FcRn主动转运),其中IgG1和IgG3转运效率最高。【排除】A.IgG1可通过胎盘。B.IgG3可通过胎盘。D.IgG4可通过胎盘。E.并非以上都不能通过,IgG即可通过胎盘。
[题目] 572. 抗体分子中与抗原表位直接接触的区域是
A. 框架区(FR)
B. 互补决定区(CDR)
C. 铰链区
D. 恒定区
E. 以上都不是
[答案] B
[解析] 【正解B】CDR(互补决定区/HVR高变区)是抗体V区中序列变异最大的三个环状区域(CDR1/CDR2/CDR3),其氨基酸残基直接与抗原表位接触形成非共价键(氢键/疏水力/范德华力/静电),是决定抗体特异性的分子基础。【排除】A.框架区(FR)构成V区β-片层骨架,维持CDR构象但不直接接触抗原。C.铰链区连接Fab与Fc提供柔韧性,不接触抗原。D.恒定区负责效应功能,不直接结合抗原。
[题目] 573. 分泌型IgA(sIgA)的结构特点是
A. 单体+J链
B. 二聚体+分泌片
C. 五聚体+J链
D. 三聚体+跨膜区
E. 二聚体+J链
[答案] B
[解析] 【正解B】分泌型IgA(sIgA)结构为二聚体(J链连接两个IgA单体)+分泌片(SC),两项缺一不可。E选项描述不完整——无分泌片的二聚体IgA仅为血清形式,不能在黏膜表面抵抗蛋白酶发挥功能。【排除】A.单体IgA为血清型,非分泌型。C.五聚体+J链为IgM结构。D.不存在三聚体形式的生理性抗体。E.缺少分泌片,非完整sIgA结构。
[题目] 574. IgE的Fc段特异性结合的受体是
A. FcγR
B. FcαR
C. FcεRI
D. FcδR
E. 以上都是
[答案] C
[解析] 【正解C】IgE的Fc段(CH3/CH4结构域)以极高亲和力(Kd~10⁻¹⁰M)特异性结合肥大细胞和嗜碱性粒细胞表面的FcεRI,使细胞致敏;再次接触过敏原时抗原交联FcεRI触发脱颗粒介导I型超敏反应。【排除】A.FcγR是IgG-Fc的受体。B.FcαR是IgA-Fc的受体。D.FcδR非公认命名。E.不可能全是,FcεRI才是IgE特异性受体。
[题目] 575. 抗体的“同种型(isotype)”差异由下列哪项决定
A. 个体遗传差异
B. 抗原刺激类型
C. 种属特异性重链恒定区
D. 抗体可变区序列
E. 以上都是
[答案] C
[解析] 【正解C】同种型(isotype)表位由重链恒定区(CH)的种属特异性氨基酸序列决定,同一物种所有健康个体共享该抗原决定簇(如所有人IgG的CH区序列相同)。【排除】A.个体遗传差异决定同种异型(allotype)。B.抗原刺激不影响isotype表位结构。D.V区决定独特型(idiotype)。
[题目] 576. 抗体分子中重链和轻链之间的连接通过
A. 氢键
B. 离子键
C. 二硫键
D. 范德华力
E. 以上都有
[答案] C
[解析] 【正解C】抗体H链与L链之间以链间二硫键共价连接(H链CH1区与L链CL区之间),是最关键的共价连接。此外氢键、疏水作用、离子键和范德华力等非共价力也辅助稳定四肽链构象。【排除】A.氢键为辅助稳定力,非主要连接方式。B.离子键为辅助。D.范德华力为弱非共价力。E.选项含混,链间主要连接为二硫键,非共价力仅辅助。
[题目] 577. 抗体分子的可变区位于
A. 重链 C 端
B. 轻链 C 端
C. 重链和轻链的 N 端
D. 重链和轻链的 C 端
E. 以上都是
[答案] C
[解析] 【正解C】抗体分子重链和轻链的可变区(V区)均位于N端(氨基端),恒定区位于C端(羧基端)。V区是识别和特异性结合抗原表位的功能区域,每条肽链含1个V区结构域(约110个氨基酸)。【排除】A.重链C端为恒定区CH3。B.轻链C端为恒定区CL。D.C端均为恒定区。E.显然C正确。
[题目] 578. 以下关于抗体轻链的说法正确的是
A. 只有 κ 型
B. 只有 λ 型
C. 有 κ 型和 λ 型两种
D. 有 α 型和 β 型两种
E. 可分为五种
[答案] C
[解析] 【正解C】抗体轻链有κ型和λ型两种,每个抗体分子只含其中一种类型(同型排斥——一条染色体上κ或λ重排成功后抑制另一型重排)。【排除】A.仅有κ型不完整,还有λ型。B.仅有λ型不完整,还有κ型。D.不存在α和β轻链型别。E.五种分类是重链(Cγ/Cμ/Cα/Cδ/Cε)的分类,非轻链。
[题目] 579. 抗体分子的恒定区主要功能是
A. 识别并结合抗原
B. 决定抗体的类型
C. 介导免疫细胞的活性
D. B 和 C
E. 以上都是
[答案] D
[解析] 【正解D】抗体恒定区(CH和CL)有两项核心功能:决定抗体类别/同种型——CH区氨基酸序列决定IgG/IgM/IgA/IgD/IgE;介导免疫效应功能——CH2/CH3区激活补体和结合Fc受体。【排除】A.识别结合抗原是V区功能。E.以上都是包含A,但A错误,故D正确。
[题目] 580. 构成抗体基本结构的 Y 形四肽链中，连接两个臂的部位称为
A. 铰链区
B. 可变区
C. 恒定区
D. 超变区
E. 高变区
[答案] A
[解析] 【正解A】铰链区位于CH1与CH2之间,含丰富的脯氨酸和半胱氨酸残基,赋予Fab臂极大柔韧性,使抗体可结合不同空间距离的抗原表位,并能从"Y"形转变为"T"形暴露C1q结合位点。【排除】B.可变区负责抗原结合。C.恒定区负责效应功能。D/E.超变区/高变区即CDR,负责特异结合抗原表位。
[题目] 581. 下列哪种成分是抗体的辅助成分
A. J 链和分泌片
B. CD28
C. 补体
D. Igα/Igβ
E. CD40
[答案] A
[解析] 【正解A】J链和分泌片(SC)是抗体的辅助成分:J链由浆细胞合成,通过二硫键连接Ig单体形成IgM五聚体和IgA二聚体;分泌片是pIgR的胞外段,保护sIgA抵抗蛋白酶降解。【排除】B.CD28是T细胞共刺激分子。C.补体是独立效应系统,非抗体结构成分。D.Igα/Igβ是BCR复合物的信号转导亚基。E.CD40是B细胞表面受体,与CD40L结合。
[题目] 582. J 链的作用是
A. 结合sIgA并转运道黏膜表面
B. 保护Ig铰链区不受蛋白酶水解
C. 将重链连接起来
D. 将重链和轻链偶联
E. 将免疫球蛋白单体分子连接成多聚体
[答案] E
[解析] 【正解E】J链由浆细胞合成,富含半胱氨酸,通过二硫键将免疫球蛋白单体分子连接成多聚体:连接5个IgM单体形成五聚体,连接2个IgA单体形成二聚体。【排除】A.结合sIgA并转运至黏膜表面是pIgR的功能。B.J链不保护铰链区。C.J链不连接重链。D.重链和轻链由二硫键直接连接,非J链功能。
[题目] 583. 下列关于sIgA的描述错误的是
A. 由两个单体IgA、一个J链和一个分泌片组成
B. 单体IgA由淋巴结中的浆细胞产生
C. 分泌片由黏膜上皮细胞产生
D. 分泌片的功能是保护sIgA不被蛋白水解酶破坏
E. 母亲可将sIgA通过乳汁传递给婴儿
[答案] B
[解析] 【正解B】错误描述为"单体IgA由淋巴结中的浆细胞产生"——实际sIgA的IgA单体由黏膜固有层的浆细胞产生,然后经pIgR介导的上皮细胞转运并附上分泌片形成sIgA。【排除】A/C/D/E均为sIgA的正确描述:A正确(二聚体+J链+分泌片),C正确(分泌片由黏膜上皮细胞产生),D正确(分泌片保护sIgA),E正确(乳汁sIgA传递)。
[题目] 584. 分泌片主要存在于
A. 血清 IgG 中
B. 黏膜表面的 sIgA 中
C. 血清 IgM 中
D. 细胞膜表面 IgD 中
E. 血清中IgM中
[答案] B
[解析] 【正解B】分泌片(SC/secretory component)是pIgR的胞外段,在sIgA转运至黏膜表面后由蛋白酶切割释放,共价结合于sIgA二聚体上,保护其抵抗黏膜环境中蛋白酶的水解。【排除】A.IgG不含分泌片。C.IgM虽含J链但不含分泌片。D.IgD为膜型Ig,不含分泌片。E.重复C选项内容。
[题目] 585. 胃蛋白酶水解 IgG 的片段是
A. 2 个 Fab 段和 1 个 Fc 段
B. F (ab')₂段和 pFc' 段
C. 1 个 Fab 段和 1 个 Fc 段
D. 2 个 F (ab')₂段和 1 个 Fc 段
E. 2 个 F (ab')₂段和 1 个 pFc’ 段
[答案] B
[解析] 【正解B】胃蛋白酶在铰链区重链间二硫键的C端侧切割IgG,产生一个保留双价抗原结合能力的F(ab')2段和被打断降解的pFc'段(不具有完整Fc效应功能)。【排除】A.2个Fab+1个Fc是木瓜蛋白酶的水解产物。C.1Fab+1Fc不是常见酶切结果。D/E.非标准产物。
[题目] 586. 木瓜蛋白酶水解 IgG 产生的片段中，能与抗原结合的是
A. Fab 段
B. Fc 段
C. F (ab')₂段
D. pFc' 段
[答案] A
[解析] 【正解A】木瓜蛋白酶在铰链区重链间二硫键的N端侧切割IgG,产生2个单价Fab段(各含完整轻链和重链Fd段VH+CH1)和1个Fc段;每个Fab段保留单价抗原结合能力。【排除】B.Fc段为效应功能区,不能结合抗原。C.F(ab')2是胃蛋白酶产物(双价)。D.pFc'是胃蛋白酶降解Fc的片段,无抗原结合能力。
[题目] 587. 具有补体结合位点的抗体片段是
A. Fab 段
B. Fc 段
C. F (ab')₂段
D. pFc' 段
E. CH2区
[答案] B
[解析] 【正解B】Fc段(CH2结构域)含有补体C1q的结合位点,抗体与抗原结合后Fc段构象改变暴露C1q结合位点,从而激活补体经典途径级联反应。【排除】A.Fab段负责抗原结合,不含补体结合位点。C.F(ab')2保留抗原结合但无Fc段,不能结合补体。D.pFc'被降解,失去完整补体结合功能。E.CH2在Fc段内,题目问片段,完整Fc才有补体结合功能。
[题目] 588. 抗体分子中决定其抗原特异性的关键部位是
A. 恒定区
B. 铰链区
C. 超变区
D. 骨架区
E. 分泌片
[答案] C
[解析] 【正解C】超变区即CDR(互补决定区),是抗体V区中氨基酸序列变异最大的三个环状区域,直接与抗原表位形状互补结合,决定抗体的抗原特异性(每个B细胞克隆V区CDR序列不同)。【排除】A.恒定区负责效应功能。B.铰链区负责柔韧性。D.骨架区(FR)维持V区构象支架。E.分泌片保护sIgA。
[题目] 589. 用木瓜蛋白酶水解 IgG 后，不能得到的片段是
A. Fab
B. Fc
C. F (ab')₂
D. 以上都不是
E. pFC’
[答案] C
[解析] 【正解C】木瓜蛋白酶在铰链区二硫键的N端侧切割IgG,产生2个单价Fab段和1个Fc段。F(ab')2段是胃蛋白酶在铰链区二硫键C端侧切割的产物,因此木瓜蛋白酶不能得到F(ab')2。【排除】A.Fab可得到。B.Fc可得到。D.以上都不是(错误,可得到Fab和Fc)。E.pFc'是胃蛋白酶产物。
[题目] 590. 胃蛋白酶水解抗体后，其保留的生物学活性是
A. 与抗原结合
B. 激活补体
C. 结合 Fc 受体
D. 以上都是
E. 没有生物活性
[答案] A
[解析] 【正解A】胃蛋白酶水解IgG产生F(ab')2段,保留双价抗原结合能力(含两个Fab段通过铰链区二硫键相连),但因缺乏Fc段,不能激活补体、不能结合Fc受体、不能介导ADCC和调理作用。【排除】B.F(ab')2无Fc段不能激活补体。C.F(ab')2无Fc段不能结合Fc受体。D.以上都不是(错误)。E.F(ab')2有生物活性——能与抗原结合。
[题目] 591. 抗体分子中，轻链和重链的可变区又称为
A. C 区
B. V 区
C. H 区
D. L 区
E. Fc段
[答案] B
[解析] 【正解B】抗体分子中轻链和重链的N端氨基酸序列在不同抗体间变异极大,称为可变区(V区);V区又可分为超变区(CDR)和相对保守的框架区(FR)。【排除】A.C区即恒定区,位于C端,序列保守。C.H区非规范命名。D.L区非规范命名。E.Fc段为恒定区的一部分,非可变区。
[题目] 592. 关于抗体的辅助成分，以下说法错误的是
A. J 链能使 IgA 形成二聚体
B. 分泌片由黏膜上皮细胞合成
C. Igα/Igβ 与 B 细胞表面 Ig 组成 BCR 复合物
D. 补体是抗体发挥效应的必需辅助成分
E. J链由浆细胞合成
[答案] D
[解析] 【正解D】补体不是抗体发挥效应功能的必需辅助成分——抗体可通过结合FcγR介导ADCC和调理吞噬、结合FcRn实现胎盘转运和半衰期延长、以及直接中和作用等不依赖补体的途径发挥效应。【排除】A/B/C/E均为正确描述:J链使IgA形成二聚体,分泌片由黏膜上皮细胞合成,Igα/Igβ与mIg组成BCR复合物,J链由浆细胞合成。
[题目] 593. 以下关于抗体水解片段的应用，错误的是
A. Fab 片段可用于阻断抗原与细胞表面受体结合
B. Fc 片段可用于研究抗体的效应功能
C. F (ab')₂片段保留了双价结合抗原的能力，可用于免疫诊断
D. pFc' 片段具有与 Fc 段相同的生物学活性
E. Fab结合单个抗原表位
[答案] D
[解析] 【正解D】pFc'是胃蛋白酶将Fc段进一步降解后产生的片段,已失去完整Fc段的空间构象,不具备结合补体C1q和Fc受体的能力。【排除】A.Fab可用于阻断抗原(正确)。B.Fc段可研究效应功能(正确)。C.F(ab')2保留双价结合能力可用于免疫诊断(正确)。E.Fab结合单个抗原表位(正确)。
[题目] 594. 抗体多样性的主要遗传机制是
A. 体细胞高频突变(SHM)
B. 基因重排(V(D)J重组)
C. 类别转换重组(CSR)
D. 受体编辑
E. 以上都是
[答案] E
[解析] 【正解E】抗体多样性由多种遗传机制协同贡献:V(D)J基因重排产生组合多样性和接头多样性,体细胞高频突变(SHM)在生发中心进一步增加V区多样性,类别转换(CSR)产生不同效应功能的Ig类,受体编辑纠正自身反应性并贡献额外多样性。【排除】A/B/C/D各单一选项均不完整,抗体多样性是多机制协同结果。
[题目] 595. 抗体的“同种异型(allotype)”表位存在于
A. 同一物种不同个体的抗体恒定区
B. 同一物种所有个体的抗体可变区
C. 不同物种抗体的可变区
D. 同一B细胞产生的抗体独特型
E. 以上都是
[答案] A
[解析] 【正解A】同种异型(allotype)是同一物种不同个体间抗体恒定区氨基酸序列的等位基因多态性——由CH或CL基因的等位基因变异决定(如人类IgG的Gm标志、IgA的Am标志),不同个体可携带不同allotype。【排除】B.同一物种所有个体共享的表位为同种型(isotype)。C.不同物种间差异的本质也是同种型。D.同一B细胞克隆产生的抗体独特型(Id)。
[题目] 596. “独特型(idiotype)”表位的本质是
A. 抗体恒定区的种属特异性表位
B. 抗体可变区的抗原结合位点结构
C. 抗体Fc段的糖基化位点
D. 抗体铰链区的构象表位
E. 抗体J链的构象表位
[答案] B
[解析] 【正解B】独特型(idiotype/Id)表位本质是抗体可变区(特别是CDR)形成的独特抗原结合位点的三维结构,每个B细胞克隆产生的抗体具有独特Id(由CDR和部分FR残基共同构成抗原结合位点构象)。【排除】A.恒定区种属特异性表位是同种型(isotype)。C.Fc段糖基化位点非Id表位。D.铰链区非抗原结合位点。E.J链非抗体V区组分。
[题目] 597. “抗抗体”(anti-antibody)主要针对抗体的
A. 独特型表位(Id)
B. 同种异型表位(Allo)
C. 同种型表位(Isotype)
D. 以上都是
E. 以上都不是
[答案] D
[解析] 【正解D】抗抗体(anti-antibody/second antibody)可针对抗体的三种血清学表位:独特型(Id,针对V区独特结构)、同种异型(Allo,针对CH等位基因多态性)和同种型(Isotype,针对CH种属特异性序列)。例如二抗通常针对同种型表位,抗独特型网络调控中针对Id。【排除】A/B/C各选项均不完整,三种表位均可作为抗抗体的靶点。
[题目] 598. “同种型”表位存在于
A. 同一物种不同个体的抗体恒定区
B. 同一物种所有个体的抗体可变区
C. 不同物种抗体的可变区
D. 同一B细胞产生的抗体独特型
E. 以上都是
[答案] C
[解析] 【正解A】同种型(isotype)表位存在于同一物种所有健康个体的抗体恒定区——由种属特异的CH基因编码,所有健康个体共享(如所有人IgG的CH区有共同的isotype)。选项A描述的是"同一物种不同个体的抗体恒定区"——isotype在这些个体间完全相同(无个体差异),这恰是isotype区别于allotype的核心特征。【排除】B.isotype在恒定区非可变区。C.不同物种间isotype不同。D.独特型为单克隆抗体V区特异性表位。
[题目] 599. BCR复合物的核心信号转导亚基是
A. mIgM/mIgD
B. Igα(CD79a)/Igβ(CD79b)异源二聚体
C. CD19
D. CD21
E. CD81
[答案] B
[解析] 【正解B】BCR复合物中Igα(CD79a)/Igβ(CD79b)异源二聚体是核心信号转导亚基,其胞质区含ITAM(免疫受体酪氨酸活化基序),BCR交联后Src家族激酶(Lyn)磷酸化ITAM,募集Syk启动下游信号。【排除】A.mIgM/mIgD负责抗原识别但胞质区太短无法传递信号。C.CD19是共受体组分放大信号。D.CD21是共受体的补体配体结合亚基。E.CD81是共受体复合物稳定蛋白。
[题目] 600. BCR中直接结合抗原的结构域是
A. mIg的VH/VL可变区
B. Igα/Igβ的胞外段
C. CD19的胞内段
D. CD81的跨膜区
E. CD3的胞内段
[答案] A
[解析] 【正解A】BCR中mIg(膜型免疫球蛋白)的VH/VL可变区直接识别并结合天然抗原表位,实现抗原特异性识别。这是BCR与TCR的根本区别——BCR识别完整天然抗原,不需要MHC提呈。【排除】B.Igα/Igβ胞外段不结合抗原,仅负责信号转导。C.CD19胞内段募集信号分子。D.CD81稳定共受体跨膜结构。E.CD3是TCR复合物的信号转导亚基。
[题目] 601. Igα/Igβ的胞内段特征性结构是
A. ITIM(免疫受体酪氨酸抑制基序)
B. ITAM(免疫受体酪氨酸激活基序)
C. PDZ结合结构域
D. 死亡结构域
E. CH3结构域
[答案] B
[解析] 【正解B】Igα(CD79a)/Igβ(CD79b)的胞内段含ITAM(免疫受体酪氨酸活化基序),其共有序列为YxxL/Ix(6-8)YxxL/I。BCR交联后Src激酶磷酸化ITAM中的酪氨酸,募集含SH2结构域的Syk酪氨酸激酶,启动下游信号级联。【排除】A.ITIM是抑制性基序(如CD22/FcγRIIB)。C.PDZ非BCR信号基序。D.死亡结构域参与凋亡信号。E.CH3是抗体结构域非信号基序。
[题目] 602. 成熟B细胞表面BCR的主要形式是
A. 单体mIgM
B. 单体mIgD
C. mIgM与mIgD共表达
D. 五聚体IgM
E. 分泌型IgD
[答案] C
[解析] 【正解C】成熟初始B细胞表面共表达mIgM和mIgD——两者通过同一VDJ-Cμ/Cδ初级转录本的差异剪接产生,具有完全相同的V区(抗原特异性相同)但C区不同,是B细胞成熟的标志。【排除】A/B各单一表型非成熟B细胞特征(仅mIgM+是未成熟B细胞)。D.五聚体IgM为分泌型非膜型。E.分泌型IgD极少且非BCR主要形式。
[题目] 603. 以下不是BCR复合物的组分的是
A. mIgG
B. mIgM
C. Igα
D. Igβ
E. mIgD
[答案] A
[解析] 【正解A】初始/成熟B细胞的BCR为mIgM和mIgD,mIgG不属于初始B细胞BCR复合物组分。mIgG是经过类别转换后的记忆B细胞或浆母细胞才表达的膜型Ig。【排除】B/C/D均为BCR复合物组分:B.mIgM(未成熟/成熟B细胞BCR),C.Igα(信号转导亚基),D.Igβ(信号转导亚基),E.mIgD(成熟B细胞BCR)。
[题目] 604. Igα/Igβ的主要功能是
A. 识别抗原表位
B. 传递BCR结合抗原后的活化信号
C. 结合Fc受体
D. 促进抗体类别转换
E. 激活补体
[答案] B
[解析] 【正解B】Igα/Igβ(CD79a/b)的主要功能是传递BCR识别抗原后产生的活化信号——mIg胞质区仅含3个氨基酸(KVK)无法传递信号,信号由Igα/Igβ胞质区ITAM磷酸化后介导。【排除】A.识别抗原表位是mIg V区的功能。C.结合Fc受体是IgG Fc段的功能。D.类别转换由AID酶在基因水平介导。E.补体激活由Fc段CH2区介导。
[题目] 605. BCR的核心功能是
A. 识别抗原并启动
B. 细胞活化 B. 分泌抗体
C. 提呈抗原至T细胞
D. 介导ADCC作用
E. 激活补体
[答案] A
[解析] 【正解A】BCR的核心功能是特异性识别抗原并通过Igα/Igβ启动B细胞活化信号级联——抗原与mIg V区结合导致BCR交联,触发ITAM磷酸化-Syk激活信号通路。【排除】B.分泌抗体是浆细胞的功能非BCR功能。C.抗原提呈是B细胞的APC功能(通过MHC-II)非BCR功能。D.ADCC由抗体Fc段介导非BCR。E.补体激活由抗体Fc段介导非BCR。
[题目] 606. 抗体多样性的主要遗传机制不包括: A. V
A. J基因重排
B. 体细胞高频突变(SHM)
C. 类别转换重组(CSR)
D. MHC分子多态性
E. 受体编辑
[答案] D
[解析] 【正解D】MHC分子多态性参与T细胞识别抗原的多样性(决定提呈哪些抗原肽),但不参与抗体/BCR多样性的产生。抗体多样性由V(D)J重组、接头多样性、SHM、CSR和受体编辑等BCR基因特异性机制产生。【排除】A.V(D)J基因重排是抗体组合多样性和接头多样性的基础。B.SHM是生发中心亲和力成熟的机制。C.CSR是抗体效应功能多样性的机制。E.受体编辑纠正自身反应性或增加多样性。
[题目] 607. BCR复合物中负责信号转导的亚基是
A. mIgM/mIgD
B. Igα/Igβ(CD79a/b)
C. CD19-CD21
D. CD81
E. C40
[答案] B
[解析] 【正解B】Igα(CD79a)/Igβ(CD79b)是BCR复合物中负责信号转导的亚基,胞内ITAM磷酸化后募集Syk激酶启动PI3K-Akt、NF-κB和MAPK等多条信号通路。【排除】A.mIgM/mIgD负责抗原识别不直接传递信号。C.CD19-CD21是共受体放大信号非核心信号转导。D.CD81稳定共受体复合物。E.CD40是第二信号受体。
[题目] 608. B细胞共受体复合体的核心组分是
A. CD19-CD21-CD81
B. CD40-CD40L
C. CD28-B7
D. LFA-1-ICAM-1
E. BCR
[答案] E
[解析] 【正解A】B细胞共受体复合体核心组分为CD19-CD21-CD81,三者非共价连接,可显著增强BCR信号(约1000-10000倍)。【排除】B.CD40-CD40L是B细胞第二信号分子对非共受体。C.CD28-B7是T细胞共刺激分子对。D.LFA-1-ICAM-1是黏附分子对。E.BCR是抗原识别受体,虽含Igα/Igβ但不包含共受体CD19-CD21-CD81。
[题目] 609. CD21(CR2)的配体是
A. 抗原-C3d复合物
B. 抗-Ig抗体
C. 细胞因子IL-6
D. 补体C5a
E. CD4
[答案] A
[解析] 【正解A】CD21(CR2)的配体是补体C3d(及其降解片段iC3b/C3dg)——当抗原同时被C3d共价标记后,BCR结合抗原而CD21结合C3d,使BCR与共受体交联,信号放大1000-10000倍。【排除】B.抗Ig抗体非CD21的生理配体。C.IL-6受体与CD21无关。D.C5a受体是C5aR/CD88。E.CD4是TCR共受体非CD21配体。
[题目] 610. CD19在共受体中的主要作用是
A. 胞外段结合C3d
B. 胞内段募集信号分子(如PI3K、Src激酶)
C. 跨膜段连接CD21和CD81
D. 抑制磷酸酶活性
E. 胞外段结合抗原
[答案] B
[解析] 【正解B】CD19胞内段含多个保守的酪氨酸磷酸化位点,被磷酸化后可募集PI3K(结合p85亚基)、Src家族激酶(Lyn/Fyn/Blk)和Vav等信号分子,是共受体放大BCR信号的核心信号转导亚基。【排除】A.胞外段结合C3d由CD21完成。C.跨膜段连接是CD81的功能。D.CD19不是抑制性受体(CD22/SHP-1才是)。E.胞外段不结合抗原。
[题目] 611. CD81(TAPA-1)的功能是
A. 稳定共受体复合物的跨膜结构
B. 直接结合抗原
C. 激活补体旁路途径
D. 介导B细胞凋亡
E. 结合抗原
[答案] A
[解析] 【正解A】CD81(TAPA-1)属于四次跨膜蛋白超家族(tetraspanin),主要功能是通过与其他tetraspanin和CD19/CD21相互作用稳定共受体复合体的跨膜结构,促进CD19和CD21在B细胞表面形成功能性复合物。【排除】B.CD81不直接结合抗原。C.CD81不参与补体激活。D.CD81不介导凋亡信号。E.CD81不结合抗原。
[题目] 612. CD21与CD35(CR1)的共同配体是
A. C3b/C3d
B. C5a
C. C1q
D. C9
E. C3a
[答案] A
[解析] 【正解A】CD21(CR2)识别的配体主要为C3d/C3dg/iC3b,CD35(CR1)识别的配体为C3b/C4b,两者在iC3b处有部分重叠。CD35通过辅因子活性进一步将C3b裂解为iC3d和C3dg供CD21识别。【排除】B.C5a是C5aR的配体。C.C1q是C1qR的配体。D.C9不结合CR1/CR2。E.C3a是C3aR的配体(过敏毒素受体)。
[题目] 613. 以下不是共受体复合体的组分的是
A. CD22
B. CD19
C. CD21
D. CD81
E. CR2
[答案] A
[解析] 【正解A】CD22(Siglec-2)是B细胞表面的抑制性受体,胞内段含ITIM基序,可募集SHP-1磷酸酶负调控BCR信号,不是BCR共受体复合体组分。共受体复合体为CD19-CD21-CD81。【排除】B.CD19是共受体信号转导核心。C.CD21(CR2)是共受体补体结合亚基。D.CD81是共受体稳定蛋白。E.CR2即CD21,是共受体组分。
[题目] 614. 靶向CD19的治疗药物主要用于
A. A.
B. 细胞淋巴瘤(如CAR-T细胞治疗) B. T细胞白血病
C. 自身免疫病(如红斑狼疮)
D. 感染性疾病
E. EB病毒感染
[答案] A
[解析] 【正解A】靶向CD19的CAR-T细胞治疗已成功应用于B细胞淋巴瘤和急性B淋巴细胞白血病(B-ALL)——患者T细胞经基因工程表达抗CD19嵌合抗原受体(CAR),回输后特异性杀伤CD19+肿瘤B细胞(如Kymriah/Yescarta/Tecartus等已获批)。【排除】B.T细胞白血病CD19阴性。C/E自身免疫病和EBV感染虽也是CD19靶向的探索方向,但目前主要适应证为B细胞恶性肿瘤。
[题目] 615. 人类Ig重链基因簇的组成是
A. V、D、J片段
B. V、J片段
C. V、C片段
D. D、J、C片段
E. D、J片段
[答案] A
[解析] 【正解A】人类Ig重链基因簇(IGH,位于14q32)含V(variable)/D(diversity)/J(joining)三种基因片段,在B细胞发育中通过VDJ重组产生功能性VH外显子;轻链基因簇(κ和λ)仅有V和J片段,无D片段。【排除】B.V+J仅轻链基因簇结构。C/D/E各类不完整组合均错误。
[题目] 616. 抗体多样性的“组合多样性”主要来源于
A. V、D、J片段的随机组合
B. 接头处的核苷酸插入/缺失
C. 体细胞高频突变
D. 类别转换
E. 受体编辑
[答案] A
[解析] 【正解A】抗体组合多样性主要来源于V/D/J基因片段的随机组合——重链V-D-J和轻链V-J的多种组合方式产生巨大多样性(如人类约40个VHx25个DHx6个JH=6000种重链,30个Vκx5个Jκ=150种轻链,理论组合约9x10^5种)。【排除】B.接头多样性是V(D)J重组连接处核苷酸插入/缺失产生的,不同于组合多样性。C.SHM是生发中心B细胞V区点突变。D.类别转换改变CH不影响V区。E.受体编辑改变轻链。
[题目] 617. 在B细胞发育中，首先完成重链基因重排的阶段是
A. 祖
B. 细胞(Pro-B cell) B. 前B细胞(Pre-B cell)
C. 未成熟B细胞(Immature B cell)
D. 成熟B细胞(Mature B cell)
E. 浆细胞
[答案] B
[解析] 【正解B】重链V-DJ重组完成于前B细胞(Pre-B cell)阶段——祖B细胞完成D-J重排,前B细胞完成V-DJ重排后表达pre-BCR(μ重链+替代轻链VpreB/λ5+Igα/Igβ)。【排除】A.祖B细胞仅完成D-J重排,非V-DJ重组完成。C.未成熟B细胞已完成轻链重排表达完整BCR。D.成熟B细胞已表达mIgM+mIgD。E.浆细胞为终末分化细胞。
[题目] 618. 在抗体基因重排中，λ轻链基因簇位于
A. 第2号染色体
B. 第14号染色体
C. 第22号染色体
D. 第2号和第22号染色体
E. 第2号染色体和第14染色体
[答案] C
[解析] 【正解C】λ轻链基因簇(IGL)位于第22号染色体(22q11.2);κ轻链基因簇(IGK)位于第2号染色体(2p12);重链基因簇(IGH)位于第14号染色体(14q32)。【排除】A.第2号染色体是κ基因位点。B.第14号染色体是IGH重链位点。D.第2号和第22号分别对应κ和λ,解析不准确。E.第2号和第14号分别是κ和IGH。
[题目] 619. 在B细胞发育中，BCR首次完整表达于
A. 祖
B. 细胞(Pro-B cell，仅重链基因重排) B. 前B细胞(Pre-B cell，pre-BCR表达)
C. 未成熟B细胞(Immature B cell，mIgM+)
D. 成熟B细胞(Mature B cell，mIgM+mIgD+)
E. 效应T细胞
[答案] C
[解析] 【正解C】未成熟B细胞(Immature B cell)在轻链V-J重排完成后首次在细胞表面表达完整的BCR——mIgM+(膜型IgM单体+Igα/Igβ),是B细胞发育中第一个表达功能性BCR的阶段。【排除】A.祖B细胞无BCR表达。B.前B细胞表达pre-BCR(重链+替代轻链)非完整BCR。D.成熟B细胞表达mIgM+mIgD+,但BCR早在未成熟阶段即已完整表达。E.效应T细胞不表达BCR。
[题目] 620. 与T细胞表面CD40L(CD154)结合的B细胞分子是
A. CD40
B. CD28
C. CD80
D. CD86
E. CD19
[答案] A
[解析] 【正解A】T细胞(特别是活化Th/Tfh细胞)表面CD40L(CD154)与B细胞表面CD40(肿瘤坏死因子受体超家族成员)特异性结合,是T细胞向B细胞提供辅助的核心分子对,缺陷导致高IgM综合征。【排除】B.CD28是T细胞共刺激受体,配体为CD80/CD86。C.CD80/CD86是B细胞共刺激分子配体,受体为CD28/CTLA-4。D.CD19是B细胞共受体组分。
[题目] 621. CD80/CD86的主要配体是
A. T细胞的CD28和CTLA-4
B. B细胞的CD19
C. 巨噬细胞的CR3
D. 树突状细胞的CD40
E. B细胞的CD79
[答案] A
[解析] 【正解A】CD80(B7-1)/CD86(B7-2)的主要配体是T细胞表面的CD28(共刺激受体,促进T细胞活化/存活/增殖)和CTLA-4(CD152,共抑制受体与CD80/CD86亲和力更高,负调节T细胞应答)。【排除】B.CD19是B细胞共受体组分。C.CR3是补体受体。D.CD40是B细胞受体配体为CD40L。E.CD79是BCR信号转导亚基。
[题目] 622. 共刺激分子的主要功能是
A. 提供
B. 细胞活化的第二信号，协同BCR第一信号 B. 直接识别抗原表位
C. 抑制B细胞增殖
D. 介导抗体分泌
E. 激活补体
[答案] A
[解析] 【正解A】共刺激分子通过受体-配体对的相互作用为B细胞活化提供必需的第二信号(共刺激信号):CD40-CD40L提供T-B协作信号,CD28-B7/CD80/CD86提供双向共刺激,协同BCR介导的第一信号(抗原识别信号)共同促进B细胞充分活化。【排除】B.直接识别抗原表位是BCR的功能。C.共刺激分子促进而非抑制B细胞活化。D.抗体分泌由浆细胞完成。E.补体激活是抗体效应功能。
[题目] 623. CD40信号通路的关键作用是
A. 诱导抗体类别转换和亲和力成熟
B. 促进B细胞凋亡
C. 抑制共受体复合体激活
D. 增强补体结合能力
E. 抑制T细胞激活
[答案] A
[解析] 【正解A】CD40信号通路(通过TRAF蛋白-NF-κB等)的关键作用是诱导抗体类别转换重组(CSR,由AID酶介导)和体细胞高频突变(SHM,亲和力成熟),是生发中心反应的核心驱动力。【排除】B.CD40信号促进B细胞存活和增殖而非凋亡。C.CD40增强而非抑制共受体激活。D.补体结合由Fc段介导与CD40无关。E.CD40信号辅助而非抑制T细胞。
[题目] 624. CD80/CD86在静息B细胞表面的表达水平是
A. 高表达
B. 低表达，激活后上调
C. 不表达
D. 组成性表达
E. 以上都不对
[答案] B
[解析] 【正解B】CD80(B7-1)/CD86(B7-2)在静息B细胞表面低水平表达,经BCR识别抗原+CD40信号刺激后迅速上调,为活化T细胞提供共刺激信号(CD28结合),是T-B协作的重要环节。【排除】A.高表达是活化后的状态。C.不表达错误(有低水平)。D.组成性高表达错误(需诱导上调)。E.以上都不对错误。
[题目] 625. B细胞共受体复合体的核心组分是
A. CD19-CD21-CD81
B. CD40-CD40L
C. CD28-B7
D. LFA-1-ICAM-1
E. 以上都不是
[答案] A
[解析] 【正解A】B细胞共受体复合体的核心组分为CD19(信号转导)-CD21(补体C3d配体结合)-CD81(稳定跨膜结构),三者协同可增强BCR信号约1000-10000倍,尤其对低浓度抗原的识别至关重要。【排除】B.CD40-CD40L是第二信号分子对。C.CD28-B7是T细胞共刺激分子。D.LFA-1-ICAM-1是黏附分子对。E.以上都不是(错误)。
[题目] 626. CD81的功能是
A. 稳定共受体复合体的跨膜结构
B. 直接结合抗原
C. 激活补体旁路途径
D. 介导B细胞凋亡
E. 抑制B细胞活化
[答案] A
[解析] 【正解A】CD81(TAPA-1)是四次跨膜蛋白(tetraspanin)超家族成员,在共受体复合体中的功能是通过与CD19和CD21的跨膜区相互作用,稳定CD19-CD21-CD81复合体的跨膜空间构象和膜表达。【排除】B.CD81不直接结合抗原。C.CD81不参与补体激活。D.CD81不介导凋亡(促存活)。E.CD81促进而非抑制B细胞活化。
[题目] 627. B-1细胞的特征性表面分子是
A. CD5
B. CD23
C. CD11c
D. CD27
E. CD4
[答案] A
[解析] 【正解A】B-1细胞的特征性表面分子是CD5(CD5+CD23-IgMhiIgDlo),由此区别于B-2细胞(CD5-CD23+),B-1a为CD5+。B-1细胞主要存在于腹腔和胸腔,产生天然IgM抗体。【排除】B.CD23是B-2/滤泡B细胞标志。C.CD11c是树突状细胞标志。D.CD27是记忆B细胞标志。E.CD4是Th细胞标志。
[题目] 628. 记忆B细胞的特征性表面分子是
A. CD27(标记重链类别转换)
B. CD45RA(初始B细胞标志)
C. CD38(浆细胞标志)
D. CD138(浆细胞标志)
E. CD19
[答案] A
[解析] 【正解A】记忆B细胞特征性表达CD27(TNF受体超家族成员),是区分记忆B细胞(CD27+)与初始B细胞(CD27-)的经典标志。记忆B细胞经类别转换后也可表达mIgG/mIgA/mIgE替代mIgM/mIgD。【排除】B.CD45RA是初始T/B细胞标志。C.CD38在浆细胞和生发中心B细胞高表达。D.CD138(Syndecan-1)是浆细胞标志。E.CD19在各类B细胞均表达非记忆特异性。
[题目] 629. B细胞发育的场所是
A. 胸腺
B. 骨髓(哺乳动物)/法氏囊(鸟类)
C. 脾脏
D. 淋巴结
E. MALT
[答案] B
[解析] 【正解B】B细胞在哺乳动物的骨髓(Bone marrow)中发育成熟——骨髓相当于鸟类的法氏囊(Bursa of Fabricius),B细胞得名即取自Bursa和Bone marrow的首字母。B细胞在骨髓中经历Pro-B/Pre-B/未成熟B/成熟B各阶段。【排除】A.胸腺是T细胞发育成熟场所。C.脾脏是外周B细胞定居和应答场所。D.淋巴结是外周T/B细胞定居场所。E.MALT是黏膜免疫效应场所。
[题目] 630. B细胞发育的最早阶段是
A. 祖
B. 细胞(Pro-B cell) B. 前B细胞(Pre-B cell)
C. 未成熟B细胞(Immature B cell)
D. 成熟B细胞(Mature B cell)
E. 造血干细胞
[答案] A
[解析] 【正解A】B细胞发育的最早阶段是祖B细胞(Pro-B cell),从共同淋巴样祖细胞(CLP)分化而来,开始重链D-J基因重排,表达CD19/CD34/CD45R(B220)等早期谱系标志。【排除】B.前B细胞在祖B之后,已完成D-J进入V-DJ重排。C.未成熟B细胞在前B之后,表达完整BCR。D.成熟B细胞在未成熟B之后。E.造血干细胞是B系的前体但非B细胞发育阶段。
[题目] 631. 未成熟B细胞首次表达的膜表面免疫球蛋白是
A. mIgM
B. mIgD
C. mIgG
D. mIgA
E. IgE
[答案] A
[解析] 【正解A】未成熟B细胞在轻链V-J重排成功后首次在细胞表面表达完整BCR——mIgM(膜型IgM单体+Igα/Igβ),尚未共表达mIgD。这是B细胞发育中第一个检验点——mIgM+的未成熟B细胞接受阴性选择。【排除】B.mIgD在成熟B细胞阶段才开始共表达。C.mIgG在类别转换后表达。D.mIgA在类别转换后表达。E.IgE在类别转换后表达。
[题目] 632. 成熟B细胞的表面标志是
A. mIgM+mIgD+CD19+CD20+
B. mIgM+CD5+(B-1细胞)
C. mIgD+CD27-(记忆B细胞)
D. CD38+CD138+(浆细胞)
E. 以上都是
[答案] A
[解析] 【正解A】成熟初始B细胞(Naive B cell)表面标志为mIgM+mIgD+CD19+CD20+——这是已通过骨髓阴性选择(中枢耐受)的B细胞,离开骨髓进入外周,随时可对外来抗原产生免疫应答。【排除】B.mIgM+CD5+为B-1细胞标志。C.mIgD+CD27-不是标准记忆B表型(记忆B为CD27+)。D.CD38+CD138+为浆细胞标志。E.以上都是(错误)。
[题目] 633. B细胞发育过程中，阴性选择发生在
A. 祖
B. 细胞阶段 B. 前B细胞阶段
C. 未成熟B细胞阶段(骨髓内)
D. 成熟B细胞阶段(外周免疫器官)
E. 记忆B细胞
[答案] C
[解析] 【正解C】B细胞阴性选择发生在未成熟B细胞阶段(骨髓内)——当未成熟B细胞的mIgM与骨髓微环境中自身抗原以高亲和力结合时,触发凋亡信号导致克隆删除,是建立B细胞中枢耐受的关键机制。【排除】A.祖B细胞尚未表达BCR无法进行阴性选择。B.前B细胞仅表达pre-BCR非完整BCR。D.成熟B细胞已通过阴性选择。E.记忆B细胞已在外周。
[题目] 634. B-1细胞的发育特征是
A. 主要在胎儿期生成，表达CD5+
B. 依赖骨髓持续更新
C. 产生高亲和力抗体
D. 参与T细胞依赖型免疫应答
E. 能发生抗体的类别转换
[答案] A
[解析] 【正解A】B-1细胞主要在胎儿期由胎肝和早期骨髓生成,发育后具有自我更新能力(不依赖骨髓持续供给),表达CD5+CD23-IgMhiIgDlo,主要产生低亲和力天然IgM抗体(天然抗体),参与黏膜和固有免疫。【排除】B.B-1细胞不依赖骨髓持续更新(自我更新)。C.B-1产生低亲和力非高亲和力抗体。D.B-1参与T细胞非依赖型免疫应答。E.B-1细胞很少发生类别转换。
[题目] 635. 骨髓中B细胞发育的微环境依赖于
A. 骨髓基质细胞
B. 树突状细胞
C. 巨噬细胞
D. 红细胞
E. 中性粒细胞
[答案] A
[解析] 【正解A】骨髓基质细胞(包括成骨细胞/网状细胞/内皮细胞等)分泌IL-7(促进Pro-B至Pre-B发育)、SCF(干细胞因子)、CXCL12(SDF-1,促进前体细胞滞留)等多种细胞因子,并通过VCAM-1-VLA-4等黏附分子提供B细胞发育必需的微环境。【排除】B.树突状细胞非B细胞发育微环境核心。C.巨噬细胞清除凋亡B细胞但非发育环境核心。D.红细胞不参与B细胞发育。E.中性粒细胞不参与。
[题目] 636. 人类重链基因簇位于
A. 第2号染色体(κ链)
B. 第22号染色体(λ链)
C. 第14号染色体(IGH)
D. 第6号染色体(MHC)
E. X染色体
[答案] C
[解析] 【正解C】人类Ig重链基因簇(IGH)位于第14号染色体长臂3区2带(14q32.33),含有所有VH(约40个功能基因)、D(25个)、JH(6个)和CH(9个:μ/δ/γ3/γ1/α1/γ2/γ4/ε/α2)基因片段。【排除】A.第2号染色体是κ轻链位点。B.第22号染色体是λ轻链位点。D.第6号染色体是MHC位点。E.X染色体非Ig基因位点。
[题目] 637. Pre-B细胞阶段完成的基因重排是
A. 重链V-DJ重组+替代轻链表达
B. 轻链V-J重组
C. 重链D-J重组
D. 类别转换重组(CSR)
E. 以上都不是
[答案] A
[解析] 【正解A】前B细胞(Pre-B cell)已完成重链V-DJ重组并表达pre-BCR:由功能性的μ重链与替代轻链(VpreB+λ5,类似V区)非共价结合,加上Igα/Igβ信号亚基组成,pre-BCR的信号关闭RAG基因表达确保等位排斥。【排除】B.轻链V-J重组在Pre-B之后(大Pre-B期开始)。C.重链D-J重组在祖B细胞阶段完成。D.CSR在活化B细胞阶段发生。
[题目] 638. 轻链基因(κ/λ)的结构特点是
A. 含V、D、J片段
B. 含V、J片段(无D片段)
C. 含
D. J片段(无V片段) D. 仅有C片段
E. 含V、D片段(无J片段)
[答案] B
[解析] 【正解B】轻链基因(κ和λ)仅含V(variable)和J(joining)两种基因片段,无D(diversity)片段。重链基因有V/D/J三种片段,轻链仅V+J——这是重链与轻链基因结构的根本区别。【排除】A.含D片段是重链特征非轻链。C.含D/J片段(无V)错误。D.仅C片段错误。E.含V/D片段(无J)错误。
[题目] 639. 轻链基因重排的“同型排斥”是指
A. κ链成功重排后抑制λ链重排
B. λ链成功重排后抑制κ链重排
C. κ和λ链同时重排
D. 轻链与重链排斥
E. 以上都不是
[答案] A
[解析] 【正解A】轻链基因重排的同型排斥(isotypic exclusion)指κ链基因成功完成V-J重排产生功能性轻链后,抑制λ链基因的重排(通过RAG基因下调);若κ重排失败(两条染色体均无功能性重排),则启动λ链重排作为补救。【排除】B.λ先重排抑制κ并非生理顺序(κ优先重排)。C.κ和λ同时重排违反同型排斥。D.轻链与重链非同型排斥概念。
[题目] 640. 受体编辑(Receptor editing)发生在
A. 祖
B. 细胞阶段，重链基因二次重排 B. 未成熟B细胞阶段，轻链基因二次重排
C. 成熟B细胞阶段，重链类别转换
D. 浆细胞阶段，抗体分泌
E. 记忆B细胞生成阶段
[答案] B
[解析] 【正解B】受体编辑(Receptor editing)发生在未成熟B细胞阶段——当BCR(mIgM)与自身抗原高亲和力结合导致阴性选择信号时,细胞重新上调RAG基因,轻链基因进行二次V-J重排(替换原有轻链),改变BCR特异性,是避免克隆删除的补救机制。【排除】A.祖B细胞阶段尚未表达BCR。C.成熟B细胞阶段已离开骨髓。D.浆细胞已停止重排。E.记忆B细胞已在外周。
[题目] 641. B细胞阴性选择的主要场所是
A. 骨髓(中枢免疫器官)
B. 脾脏(外周免疫器官)
C. 淋巴结滤泡
D. 胸腺
E. 以上都不是
[答案] A
[解析] 【正解A】B细胞阴性选择主要发生在骨髓(中枢免疫器官)——未成熟B细胞在骨髓微环境中接触自身抗原,高亲和力结合者被克隆删除或受体编辑,低/无亲和力者存活并迁移至外周,建立B细胞中枢耐受。【排除】B.脾脏是外周耐受场所(非主要阴性选择)。C.淋巴结滤泡为外周B细胞应答场所。D.胸腺是T细胞阴性选择场所。
[题目] 642. 阴性选择的主要作用是
A. 筛选出能与自身抗原高亲和力结合的
B. 细胞 B. 清除或抑制自身反应性B细胞，防止自身免疫
C. 促进B细胞增殖
D. 诱导记忆B细胞形成
E. 形成MHC限制性
[答案] B
[解析] 【正解B】阴性选择的主要作用是清除或失能自身反应性B细胞——高亲和力结合自身抗原的未成熟B细胞被凋亡(克隆删除)或受体编辑改变特异性,低/中等亲和力者可能变为无反应性(anergy),从而防止自身免疫病的发生。【排除】A.阴性选择清除而非筛选自身反应细胞(措辞颠倒)。C.阴性选择不促进增殖。D.记忆细胞形成需要抗原刺激。E.MHC限制是T细胞选择概念。
[题目] 643. 完成阴性选择的B细胞进入外周后成为
A. 成熟初始
B. 细胞(Naive B cell) B. 记忆B细胞
C. 浆细胞
D. B-1细胞
E. 浆细胞
[答案] A
[解析] 【正解A】完成阴性选择并通过耐受检查后,B细胞从骨髓迁移至外周免疫器官成为成熟初始B细胞(Naive B cell),表达mIgM+mIgD+,CD19+CD20+,随时可对外来抗原产生免疫应答。【排除】B.记忆B细胞需经抗原刺激和生发中心反应后形成。C.浆细胞需抗原刺激诱导分化。D.B-1细胞有独立发育途径。E.重复C。
[题目] 644. 受体编辑的目的是
A. 改变BCR的抗原特异性，避免自身反应
B. 增强BCR对自身抗原的亲和力
C. 促进类别转换重组
D. 诱导体细胞高频突变
E. 抑制抗体分泌
[答案] A
[解析] 【正解A】受体编辑的目的是改变BCR的抗原特异性——通过轻链基因二次V-J重排产生新的轻链,替换原有的自身反应性轻链,使BCR不再高亲和力识别自身抗原,从而避免克隆删除保留该B细胞。【排除】B.增强自身抗原亲和力与目的相反。C.类别转换在活化B细胞阶段发生。D.SHM在生发中心发生。E.抗体分泌是浆细胞功能。
[题目] 645. B-1细胞的特征不包括
A. 主要在胎儿期生成，成年后自我更新
B. 表达CD5+CD23-
C. 产生低亲和力IgM抗体(天然抗体)
D. 依赖T细胞辅助应答
E. 在免疫应答的早期发挥作用
[答案] D
[解析] 【正解D】B-1细胞对TI(非胸腺依赖性)抗原产生应答,不需T细胞辅助——这是B-1细胞区别于B-2细胞的核心特征之一。B-2细胞对TD抗原应答需T辅助。【排除】A/B/C/E均为B-1细胞正确特征:A正确(胎儿期生成,成年后自我更新),B正确(CD5+CD23-),C正确(产生低亲和力天然IgM),E正确(参与固有免疫早期应答)。
[题目] 646. 滤泡B细胞(Follicular B cell)的主要定位是
A. 脾脏边缘区
B. 淋巴结和脾脏的滤泡区
C. 骨髓
D. 血液
E. 淋巴液
[答案] B
[解析] 【正解B】滤泡B细胞(FO B cell/Follicular B cell)主要定位于淋巴结皮质滤泡区和脾脏白髓的B细胞滤泡区,是对TD抗原(蛋白质类)产生免疫应答、参与生发中心反应和高亲和力抗体产生的主要B2细胞亚群。【排除】A.脾脏边缘区为MZ B细胞定位。C.骨髓为B细胞发育和长寿浆细胞定居处。D.血液中B细胞为循环状态。E.淋巴液为运输途径非定居。
[题目] 647. 边缘区B细胞(MZ B cell)的功能特点是
A. 快速应答血源性病原体(T细胞非依赖型)
B. 产生高亲和力抗体
C. 主要分泌IgA
D. 参与生发中心反应
E. 不能分化成浆细胞
[答案] A
[解析] 【正解A】脾边缘区B细胞(MZ B cell)定位于脾白髓边缘区窦,处于血流过滤的第一线,可快速应答血源性TI抗原(如荚膜多糖),T细胞非依赖型,产生早期IgM抗体,在抗荚膜菌感染中发挥关键作用。【排除】B.MZ B细胞主要产生低亲和力IgM非高亲和力。C.MZ B细胞可产生IgM和IgG(类别转换)不限于IgA。D.MZ B细胞可参与早期生发中心但非主要。E.MZ B细胞可分化为浆细胞。
[题目] 648. 浆细胞的主要功能是
A. 持续增殖并分化为记忆细胞
B. 分泌大量抗体
C. 提呈抗原至T细胞
D. 表达BCR识别抗原
E. 激活补体
[答案] B
[解析] 【正解B】浆细胞的主要功能是大量分泌抗体(免疫球蛋白)——浆细胞是B细胞终末分化效应细胞,已停止表达BCR和MHC-II,不再增殖,专门以每秒数千个分子的速率合成和分泌抗体(粗面内质网高度发达)。【排除】A.浆细胞不可逆地退出细胞周期不再增殖。C.抗原提呈功能在浆细胞阶段已丧失。D.浆细胞不表达BCR。E.补体激活是抗体Fc段效应功能。
[题目] 649. B-2细胞(常规B细胞)的主要特点是
A. 应答T细胞依赖型抗原，产生高亲和力抗体
B. 分泌天然IgM抗体
C. 无需生发中心反应
D. 表达CD5+
E. 属于固有免疫细胞
[答案] A
[解析] 【正解A】B-2细胞(常规滤泡B细胞)是适应性体液免疫的主力,应答TD抗原(蛋白质),经生发中心反应后产生高亲和力(经SHM+亲和力选择)、类别转换的抗体(IgG/IgA/IgE)和记忆B细胞,提供长期保护性免疫。【排除】B.分泌天然IgM是B-1细胞的特征。C.生发中心反应是B-2细胞应答的核心。D.B-2细胞CD5-。E.B-2属于适应性免疫细胞。
[题目] 650. 关于B细胞描述正确的是
A. 主要参与天然免疫应答
B. 介导细胞免疫应答
C. 在胸腺内发育、分化、成熟
D. 在体液免疫中，既是提呈抗原细胞，也是免疫应答细胞
E. 可直接分泌产生免疫球蛋白
[答案] D
[解析] 【正解D】在体液免疫中,B细胞兼具双重角色:既是专职抗原提呈细胞(通过BCR高效富集低浓度抗原,经MHC-II提呈给CD4+T细胞),又是免疫效应细胞(增殖分化为浆细胞大量产生抗体)。【排除】A.B细胞主要参与适应性免疫(体液免疫),虽B-1参与固有免疫但非主要。B.B细胞介导体液免疫而非细胞免疫。C.B细胞在骨髓而非胸腺发育成熟。E.B细胞需分化为浆细胞后才能大量分泌抗体。
[题目] 651. 关于B1细胞亚群的正确叙述是
A. 个体发生较晚
B. 不表达CD5分子
C. 不产生IgM类抗体
D. 对T细胞有依赖性
E. 分布在外周免疫器官
[答案] D
[解析] 【正解E】B-1细胞主要分布于腹腔、胸腔等外周免疫器官(浆膜腔),产生天然抗体参与黏膜和固有免疫。此题为多选题样式的单选题,选项A/B/C/D描述均不符合B1细胞特征:B1细胞个体发生早(胎儿期)、表达CD5、产生IgM、对TI抗原应答不依赖T细胞辅助。【排除】A.B1个体发生较早非较晚。B.B1表达CD5分子。C.B1主要产生IgM。D.B1对TI抗原应答不依赖T细胞。
[章节] 第九章 B淋巴细胞介导的体液免疫应答
[单选题]
[题目] 652. B细胞活化的第一信号由以下哪种结构传递?
A. CD28
B. CD40
C. BCR复合体
D. MHCII类分子
E. IL-4受体
[答案] C
[解析] 【正解C】B细胞活化的第一信号由BCR复合体提供——mIg的V区特异性识别抗原表位导致BCR交联,Igα/Igβ胞质区ITAM被Src激酶磷酸化,募集并激活Syk,启动B细胞活化信号级联(PI3K/NF-κB/MAPK等)。【排除】A.CD28是T细胞共刺激受体。B.CD40是B细胞第二信号受体。D.MHC-II提呈抗原肽给T细胞非第一信号。E.IL-4受体提供细胞因子信号(第三信号)。
[题目] 653. B细胞对TD抗原的应答需要哪种细胞的辅助?
A. CD8+ T细胞
B. 巨噬细胞
C. CD4+ Th细胞
D. NK细胞
E. 中性粒细胞
[答案] C
[解析] 【正解C】B细胞对TD抗原(胸腺依赖性抗原,多为蛋白质)的应答需要CD4+Th细胞(主要是Tfh)辅助——活化的Th细胞表达CD40L结合B细胞CD40(第二信号),分泌IL-4/IL-21等细胞因子促进B细胞增殖、类别转换和亲和力成熟。【排除】A.CD8+T细胞为CTL杀伤功能。B.巨噬细胞非直接辅助B细胞。D.NK细胞为固有免疫杀伤细胞。E.中性粒细胞为固有免疫吞噬细胞。
[题目] 654. 下列物质可以被动转移特异性体液免疫的是
A. TNF
B. 抗体
C. T细胞
D. IL-1
E. IL-2
[答案] B
[解析] 【正解B】抗体(免疫球蛋白)可被动转移特异性体液免疫——输入特异性抗体(如抗毒素血清/免疫球蛋白制剂)可立即提供保护,属于人工被动免疫,是特异性体液免疫被动转移的唯一方式。【排除】A.TNF为炎症细胞因子非特异性免疫成分。C.T细胞转移的是细胞免疫(过继免疫)。D.IL-1为促炎细胞因子。E.IL-2为T细胞生长因子。
[题目] 655. TI-Ag引起免疫应答的特点是
A. 只引起体液免疫
B. 可以产生各种类别的Ig
C. 有免疫记忆
D. 可以引起细胞免疫
E. 需要巨噬细胞进行加工处理
[答案] A
[解析] 【正解A】TI-Ag(非胸腺依赖性抗原)通常只引起体液免疫应答(B细胞产生抗体),不激活T细胞故不引起细胞免疫应答。TI抗原应答特点:无免疫记忆、无类别转换(仅IgM)、无亲和力成熟。【排除】B.TI抗原仅产生IgM不能产生各类Ig。C.TI抗原无免疫记忆。D.TI抗原不引起细胞免疫。E.TI-1无需APC加工处理(直接激活)。
[题目] 656. 关于再次应答，下列说法错误的是
A. 主要产生高亲和力的IgG抗体
B. 抗体浓度增加快
C. 抗体维持时间短
D. 诱发再次应答所需抗原剂量小
E. 再次应答较初次应答的潜伏期短
[答案] C
[解析] 【正解C】再次应答(二次免疫应答)产生的抗体维持时间较长(可持续数月至数年),由长寿浆细胞在骨髓中长期分泌+记忆B细胞快速激活补充,而非维持时间短。【排除】A.再次应答主要产生高亲和力IgG(正确)。B.抗体浓度升高快(正确)。D.再次应答所需抗原剂量小(正确,记忆B细胞数量多)。E.潜伏期较初次应答短(正确,约1-3天vs5-10天)。
[题目] 657. TI抗原单独可以诱导
A. 抗体亲和力成熟
B. Ig类别转换
C. 记忆B细胞形成
D. B1细胞的免疫应答
E. B2细胞的免疫应答
[答案] D
[解析] 【正解D】TI抗原(如细菌荚膜多糖)可直接诱导B-1细胞和边缘区B细胞的免疫应答,产生IgM抗体,不依赖T细胞辅助。这是TI抗原区别于TD抗原的核心特征。【排除】A.抗体亲和力成熟需生发中心反应和Tfh辅助,TI抗原无。B.类别转换需CD40L-CD40信号和细胞因子,TI抗原无。C.记忆B细胞形成需TD抗原诱导。E.B-2细胞对TD抗原应答。
[题目] 658. 生发中心大约形成于
A. 抗原进入机体时
B. 抗原进入机体第二天
C. 抗原进入机体一周后
D. 抗原进入机体两周后
E. 抗原进入机体三周后
[答案] C
[解析] 【正解C】生发中心大约在抗原进入机体后约5-7天(约一周)开始形成——活化的B细胞和Tfh细胞迁移至滤泡,B细胞快速增殖占据滤泡形成暗区,随后分化为明区,进行体细胞高频突变、亲和力选择和类别转换。【排除】A.抗原进入时尚未有活化B细胞。B.第二天为B-T初步相互作用的早期阶段。D.两周后生发中心已成熟。E.三周后为应答消退期。
[题目] 659. B细胞活化的第二信号主要由哪对分子介导?
A. CD28/B7
B. CD40/CD40L
C. TCR/pMHC
D. ICAM-1/LFA-1
E. Fas/FasL
[答案] B
[解析] 【正解B】B细胞活化的第二信号(共刺激信号)主要由CD40(B细胞)与CD40L/CD154(活化Th细胞特别是Tfh表面)的相互作用介导——CD40三聚化后通过TRAF蛋白激活NF-κB,促进B细胞增殖、存活和分化。【排除】A.CD28/B7是T细胞的共刺激分子对。C.TCR/pMHC是T细胞第一信号。D.ICAM-1/LFA-1是黏附分子增强T-B相互作用。E.Fas/FasL介导凋亡。
[题目] 660. 补体片段C3d通过结合哪种分子增强B细胞活化信号?
A. CD19
B. CD21
C. CD81
D. CD79a
E. CD28
[答案] B
[解析] 【正解B】补体片段C3d通过共价结合于抗原表面后,可同时被B细胞共受体中的CD21(CR2)识别,使BCR(结合抗原)与CD19-CD21-CD81共受体(结合C3d)交联,CD19胞内段募集PI3K等信号分子,显著放大BCR信号(约1000-10000倍)。【排除】A.CD19是共受体信号亚基不直接结合C3d。C.CD81稳定共受体结构不结合补体。D.CD79a是BCR信号亚基。E.CD28是T细胞共刺激分子。
[题目] 661. 关于T细胞和B细胞介导的免疫应答，下列说法错误的是
A. 均产生效应产物
B. 对TD-Ag的应答均需T细胞的参与
C. 效应产物的作用都是特异性的
D. 都能形成免疫耐受
E. 对TD-Ag的应答都产生记忆细胞
[答案] C
[解析] 【正解C】T细胞和B细胞介导的免疫应答中,效应产物的作用不一定都是特异性的——抗体经Fab段特异性结合抗原后,其Fc段通过补体激活、FcR介导的调理吞噬和ADCC等非特异性效应机制清除抗原,这些下游清除机制本质上是非特异性的。【排除】A.均产生效应产物(正确:抗体/细胞因子/CTL)。B.TD-Ag应答需T细胞参与(正确)。D.均能形成免疫耐受(正确)。E.TD-Ag应答均产生记忆细胞(正确)。
[题目] 662. 合成和分泌抗体的细胞是
B. 细胞 B.Th1
C. Th2
D. 浆细胞
E. CTL
[答案] D
[解析] 【正解D】浆细胞是B细胞终末分化的效应细胞,专门合成和大量分泌抗体——胞质内粗面内质网高度发达(占胞质体积>50%),以每秒数千个分子的速率合成分泌Ig。【排除】A.B细胞可合成膜型Ig(BCR)但非大量分泌型抗体。B.Th1辅助细胞免疫。C.Th2辅助B细胞但自身不分泌抗体。E.CTL通过穿孔素/颗粒酶杀伤靶细胞。
[题目] 663. 体细胞高频突变发生在以下哪个阶段?(难度系数★★★)
A. 初次应答潜伏期
B. 生发中心反应
C. 抗原提呈过程
D. T细胞活化
E. 补体激活
[答案] B
[解析] 【正解B】体细胞高频突变(SHM)发生在生发中心反应中——生发中心暗区快速增殖的B细胞(中心母细胞)在AID酶催化下,V区基因发生高频率点突变(每个细胞每次分裂约10^-3/碱基对,比正常突变高10^5-10^6倍),产生不同亲和力的BCR变体。【排除】A.初次应答潜伏期尚未形成生发中心。C.抗原提呈过程中无SHM。D.T细胞活化不涉及SHM。E.补体激活不涉及基因突变。
[题目] 664. BCR识别的对象是
A. 抗原肽-MHCⅠ类分子复合物
B. 抗原肽-MHCⅡ类分子复合物
C. TD抗原
D. 被APC加工处理过的抗原肽
E. 被DC提呈的抗原
[答案] C
[解析] 【正解C】BCR(mIg)可直接识别完整的天然TD抗原(蛋白质、糖蛋白等)的天然空间表位,不需MHC分子提呈,也不需抗原被加工处理——这是BCR与TCR的根本区别(TCR必须识别MHC提呈的抗原肽)。【排除】A.抗原肽-MHC-I是CD8+T细胞的TCR识别对象。B.抗原肽-MHC-II是CD4+T细胞的TCR识别对象。D/E.APC加工提呈的抗原肽是TCR识别对象。
[题目] 665. 下列细胞中兼具适应性免疫功能的APC是
A. 自然杀伤细胞
B. 树突状细胞
C. B细胞
D. T细胞
E. 巨噬细胞
[答案] C
[解析] 【正解C】B细胞兼具双重身份:既是适应性免疫细胞(体液免疫效应细胞,分化为浆细胞产生抗体),又是专职APC(通过BCR高效捕获低浓度抗原→内化加工→MHC-II提呈抗原肽给CD4+T细胞,在T-B协作中发挥APC功能)。【排除】A.NK是固有免疫细胞非适应性且非专职APC。B.DC是专职APC但本身为固有免疫细胞。D.T细胞非APC。E.巨噬细胞是固有免疫细胞。
[题目] 666. 对体液免疫二次应答Ab产生，叙述错误的是
A. 再次接受较少量相同Ag刺激即可诱发
B. 潜伏期大约为初次应答时的一半
C. 主要为IgG，亲和力高且较均一
D. 达平台期快，平台高且时间长
E. 抗体亲和力较低
[答案] E
[解析] 【正解E】二次应答产生的抗体亲和力较高(经生发中心SHM和亲和力选择后平均亲和力显著提高,即亲和力成熟),而非较低。E选项说"抗体亲和力较低"是错误描述。【排除】A.二次应答少量抗原即可诱发(正确,记忆B细胞数量多敏感性高)。B.潜伏期约初次应答的一半(正确,约1-3天)。C.主要为高亲和力IgG(正确)。D.平台高且时间长(正确)。
[题目] 667. 可直接调节Ig类别转换的细胞是
A. Th细胞
B. B细胞
C. Tc细胞
D. NK细胞
E. 中性粒细胞
[答案] A
[解析] 【正解A】Th细胞(特别是Tfh细胞)通过分泌不同细胞因子直接调节B细胞的Ig类别转换:IL-4诱导IgG1和IgE,IFN-γ诱导IgG2a/IgG3,TGF-β诱导IgG2b和IgA,这些细胞因子诱导特定CH基因上游的胚系转录本使S区开放AID可接近。【排除】B.B细胞是接受类别转换信号的靶细胞非调节者。C.Tc(CTL)主要杀伤靶细胞。D.NK产生IFN-γ但不直接调节CSR。E.中性粒细胞不参与CSR调节。
[题目] 668. 关于BCR，以下说法正确的是
A. 主体是一个mIgE分子
B. 主体是一个mIgG分子
C. 主体是一个mIgM分子
D. 主体是五个mIgD分子
E. 主体是五个mIgM分子
[答案] C
[解析] 【正解C】初始B细胞BCR的主体是mIgM(单体膜型IgM),通过VDJ-Cμ重排产生,是BCR的抗原识别组分。另外,此题为单选题,若考察"成熟B细胞"则mIgM+mIgD均表达,但选项C单独指出mIgM为主体是正确的。【排除】A.mIgE仅类别转换后表达。B.mIgG仅类别转换后表达。D.mIgD为单体表达量少于mIgM。E.膜型为单体非五聚体。
[题目] 669. TD抗原引起免疫应答的特点是
A. 可形成记忆细胞
B. 只诱导细胞免疫应答
C. 产生免疫应答的细胞为B1细胞
D. 只诱导体液免疫应答
E. 可直接诱导T、B细胞产生免疫应答
[答案] A
[解析] 【正解A】TD抗原(胸腺依赖性抗原)引起免疫应答的核心特点之一是可诱导免疫记忆——经生发中心反应产生长寿记忆B细胞(高亲和力+类别转换)和记忆T细胞,提供长期保护性免疫。【排除】B.TD抗原同时诱导细胞免疫和体液免疫。C.B-1细胞应答TI抗原。D.TD抗原诱导细胞免疫和体液免疫。E.TD抗原不能直接诱导,需MHC提呈。
[题目] 670. BCR识别抗原产生的活化信号传导是通过
A. Igα和Igβ
B. CD19
C. CD21
D. CD40
E. CD81
[答案] A
[解析] 【正解A】BCR识别抗原后mIg发生交联,活化信号通过Igα(CD79a)和Igβ(CD79b)胞质区ITAM基序传递——Src家族激酶(Lyn/Fyn/Blk)磷酸化ITAM的酪氨酸残基,Syk被募集至磷酸化的ITAM并被激活,启动下游信号级联。【排除】B.CD19是共受体放大信号。C.CD21是共受体补体结合亚基。D.CD40是第二信号受体。E.CD81稳定共受体结构。
[题目] 671. 下列哪个部位的浆细胞一般情况下不能产生IgE
A. 胃肠道黏膜
B. 鼻咽
C. 支气管
D. 扁桃体
E. 脾脏
[答案] E
[解析] 【正解E】脾脏浆细胞一般情况下不产生IgE——IgE主要由黏膜相关淋巴组织中(呼吸道/胃肠道/鼻咽/扁桃体等)的浆细胞产生,而脾脏和淋巴结主要产生IgG和IgM。【排除】A.胃肠道黏膜是IgE产生的重要部位(抗寄生虫)。B.鼻咽部黏膜产生IgE。C.支气管黏膜产生IgE(过敏性哮喘)。D.扁桃体产生IgE。
[题目] 672. Th细胞向B细胞提供第二信号的关键分子是:
A. IL-2
B. CD40L
C. IFN-γ
D. MHCII类分子
E. B7
[答案] B
[解析] 【正解B】Th细胞表面CD40L(CD154,TNF超家族成员)是向B细胞提供第二信号的关键分子——活化Th细胞瞬时上调CD40L表达,与B细胞CD40结合后通过TRAF/NF-κB通路提供强效共刺激信号,缺乏则导致高IgM综合征(X连锁)。【排除】A.IL-2是T细胞生长因子非第二信号。C.IFN-γ调节类别转换非直接第二信号。D.MHC-II提呈抗原肽(第一信号相关)。E.B7(CD80/CD86)是B细胞给T细胞提供共刺激。
[题目] 673. 浆细胞
A. 可发育为
B. 细胞 B.具有细胞毒作用
C. 分泌大量IFN-γ
D. 来源于Th细胞
E. 能分泌抗体
[答案] E
[解析] 【正解E】浆细胞是B细胞终末分化效应细胞,专门大量分泌抗体(免疫球蛋白),胞质粗面内质网高度发达,停止表达BCR(mIg)和MHC-II,不可逆退出细胞周期。【排除】A.浆细胞为终末分化不可发育回B细胞。B.浆细胞不具有细胞毒作用(CTL/NK才有)。C.IFN-γ由T/NK细胞分泌。D.浆细胞来源于B细胞非Th细胞。
[题目] 674. 初次免疫应答中最早产生的抗体类型是:
A. IgG
B. IgA
C. IgM
D. IgE
E. IgD
[答案] C
[解析] 【正解C】初次免疫应答中最早产生的抗体类型是IgM(约第3-5天可在血清中检测到),因初始B细胞首先表达Cμ基因(IgM),类别转换为IgG/IgA需要更长时间(AID诱导CSR约需7-10天)。【排除】A.IgG在初次应答后期(约7-10天)才出现。B.IgA在初次应答中产生较晚且量少。D.IgE在正常初次应答中极少。E.IgD主要在B细胞表面非分泌型。
[题目] 675. 抗体产生过程中，下列说法错误的是
A. TI抗原刺激
B. 细胞产生抗体需T细胞的辅助 B.应答早期主要产生低亲和力的IgM
C. Th细胞与B细胞的相互作用受MHC限制
D. Ig的类别转换需要Th细胞的辅助
E. 浆细胞是产生抗体的细胞
[答案] A
[解析] 【正解A】说法"TI抗原刺激B细胞产生抗体需T细胞的辅助"是错误的——TI抗原(非胸腺依赖性抗原)可直接激活B细胞产生抗体,不需T细胞辅助,这是TI与TD抗原的根本区别。【排除】B.应答早期主要产生低亲和力IgM(正确,亲和力尚未成熟)。C.T-B相互作用受MHC限制(正确,T细胞通过TCR识别B细胞MHC-II提呈的抗原肽)。D.Ig类别转换需Th(正确,CD40L和细胞因子)。E.浆细胞产生抗体(正确)。
[题目] 676. 再次免疫应答的特点是:
A. 潜伏期长
B. 主要产生IgM
C. 抗体亲和力低
D. 需要T细胞辅助
E. 抗体浓度快速上升
[答案] E
[解析] 【正解E】再次免疫应答的特点包括:潜伏期短(约1-3天vs初次5-10天),抗体浓度快速上升且峰值高,主要为高亲和力IgG(经亲和力成熟),维持时间长(数月-数年)。【排除】A.潜伏期短非长。B.主要产生IgG非IgM。C.抗体亲和力高非低。D.再次应答也可需T细胞辅助(记忆B细胞应答TD抗原时仍需Th辅助但更快)。
[题目] 677. FDC的主要功能是:
A. 分泌抗体
B. 捕获抗原
C. 激活补体
D. 吞噬病原体
E. 分泌细胞因子
[答案] B
[解析] 【正解B】滤泡树突状细胞(FDC,非骨髓来源的间质细胞)的主要功能是通过Fc受体和补体受体(CR1/CR2)捕获并长期滞留抗原-抗体-补体复合物(以免疫复合物包被小体/iccosome形式)于细胞表面树突上,供生发中心B细胞竞争性识别以进行亲和力选择。【排除】A.FDC不分泌抗体。C.FDC不激活补体。D.FDC非吞噬细胞。E.FDC可分泌CXCL13等趋化因子但非主要功能。
[题目] 678. 用肺炎球菌荚膜多糖免疫裸鼠，将出现下列哪种情况
A. 无细胞免疫及体液免疫应答产生
B. 有IgM抗体产生
C. 没有特异性抗体产生
D. 有肺炎球菌败血症产生
E. 有IgG抗体产生
[答案] B
[解析] 【正解B】肺炎球菌荚膜多糖是TI-2抗原,可在裸鼠(无胸腺/无T细胞)体内诱导B1细胞和边缘区B细胞产生IgM抗体——TI-2抗原不需T细胞辅助即可激活B细胞,因此裸鼠虽缺乏T细胞仍能产生特异性IgM抗体。【排除】A.裸鼠虽无细胞免疫但可有TI抗原诱导的体液免疫。C.有IgM产生故非无特异性抗体。D.有IgM保护不一定会发生败血症。E.TI-2抗原通常不诱导类别转换故无IgG。
[题目] 679. Ig的类别转换主要发生在哪个过程中
A. 从IgG转换为IgM、IgA等
B. 从IgM转换为IgG、IgA等
C. 从IgD转换为IgM、IgA等
D. 从IgE转换为IgG、IgA等
E. 从IgA转换为IgM、IgG等
[答案] B
[解析] 【正解B】Ig类别转换(CSR)的方向是从IgM(初始B细胞首先表达的Ig类别)转换为IgG/IgA/IgE——在AID酶作用下Sμ区与下游Sγ/Sα/Sε区发生重组,VDJ外显子从Cμ上游移位至新CH基因上游,V区抗原特异性保持不变。【排除】A.IgG→IgM方向错误(IgM是初级类别)。C.IgD→IgM非主要转换方向。D.IgE→IgG方向错误。E.IgA→IgM方向错误。CSR方向固定:Cμ→Cγ/Cα/Cε。
[题目] 680. B细胞识别特异性抗原
A. 需要细胞因子
B. 具有MHCⅠ类分子限制性
C. 通过CD3传递抗原信号
D. 具有MHCⅡ类分子限制性
E. 没有MHC限制性
[答案] E
[解析] 【正解E】B细胞通过BCR(mIg)直接识别完整天然抗原的空间/线性表位,没有MHC限制性——这是BCR与TCR的根本区别之一(TCR必须识别MHC分子提呈的抗原肽,受自身MHC限制)。【排除】A.细胞因子促进活化但非识别所需。B/C/D均为T细胞识别特征:B.CD8+T通过MHC-I识别,D.CD4+T通过MHC-II识别,MHC限制性是T细胞而非B细胞特征。
[题目] 681. 下列哪个不是未成熟DC的优势分布部位
A. 皮肤
B. 黏膜
C. 淋巴结
D. 消化道
E. 呼吸道
[答案] C
[解析] 【正解C】未成熟DC分布于皮肤、黏膜、消化道和呼吸道等外周非淋巴组织,在那里捕获抗原。淋巴结中主要是成熟DC(从外周迁移而来,已上调CCR7和MHC-II,具备强抗原提呈能力)。【排除】A/B/D/E均为未成熟DC的优势分布部位:皮肤(朗格汉斯细胞),黏膜,消化道,呼吸道。
[题目] 682. 抗体的中和作用由哪个结构域介导?
A. Fc段
B. 恒定区
C. 可变区(V区)
D. J链
E. 分泌片
[答案] C
[解析] 【正解C】抗体的中和作用由可变区(V区/Fab段)介导——抗体V区CDR与病原体(病毒/细菌)表面蛋白或毒素的关键表位特异性结合,通过空间位阻效应阻断病原体/毒素与宿主细胞受体的结合,从而中和其感染性和毒性。【排除】A.Fc段介导效应功能(补体/ADCC/调理)。B.恒定区含Fc段负责效应。D.J链连接Ig单体。E.分泌片保护sIgA。
[题目] 683. 关于浆细胞的描述错误的是
A. 来自
B. 细胞 B.是B细胞分化的中间阶段
C. 细胞质中富含粗面内质网
D. 不再表达BCR
E. 不再表达MHCⅡ类分子
[答案] B
[解析] 【正解B】浆细胞是B细胞终末分化的最终效应阶段,不是中间阶段——为不可逆分化,退出细胞周期,停止表达BCR和MHC-II,通过大量分泌抗体执行免疫功能。【排除】A.浆细胞来自B细胞(正确)。C.粗面内质网发达(正确)。D.不再表达BCR(正确)。E.不再表达MHC-II(正确)。
[题目] 684. 以下说法正确的是
A. CD40L是位于
B. 细胞表面的第二信号分子，是CD40的配体 B.CD40是位于B细胞表面的第二信号分子，是CD40L的受体
C. CD40L是位于B细胞表面的第二信号分子，是CD34的配体
D. CD40是位于B细胞表面的第二信号分子，是CD34的受体
E. CD40和CD40L都是位于B细胞表面的第二信号分子，两者的作用恰恰相反
[答案] B
[解析] 【正解B】CD40是位于B细胞表面的TNF受体超家族成员,是CD40L(CD154,Th/Tfh细胞表达)的受体——CD40-CD40L相互作用是T-B协作中B细胞活化的关键第二信号分子对。【排除】A.CD40L位于T细胞非B细胞。C.CD40L的配体是CD40非CD34。D.CD40不是CD34的受体。E.CD40和CD40L不在同一细胞表面(CD40在B,CD40L在T),非作用相反而是协同。
[题目] 685. 可诱导B细胞分化为分泌IgE的浆细胞的细胞因子是
A. IL-4
B. IL-2
C. IL-6
D. IFN-γ
E. TGF-β
[答案] A
[解析] 【正解A】IL-4(Th2和Tfh细胞分泌)是诱导B细胞类别转换为IgE的最关键细胞因子——通过STAT6信号通路诱导ε胚系转录本(Cε基因上游Iε启动子),使AID酶可接近Sε区完成CSR为IgE,是I型超敏反应和抗寄生虫免疫的核心细胞因子。【排除】B.IL-2促进T/B细胞增殖非CSR。C.IL-6促进B细胞终末分化为浆细胞。D.IFN-γ诱导IgG2a类别转换。E.TGF-β诱导IgA类别转换。
[题目] 686. 除B细胞和T细胞外，与抗体产生有关的细胞还有
A. FDC细胞
B. 嗜酸性粒细胞
C. 嗜碱性粒细胞
D. 肥大细胞
E. NK细胞
[答案] A
[解析] 【正解A】滤泡树突状细胞(FDC)在生发中心捕获和展示抗原-抗体复合物,参与B细胞亲和力选择和抗体亲和力成熟,是抗体高效产生的关键辅助细胞。【排除】B.嗜酸性粒细胞参与抗寄生虫和过敏反应。C/D.嗜碱性粒细胞和肥大细胞参与I型超敏反应(FcεRI结合IgE)。E.NK细胞参与ADCC和抗病毒/抗肿瘤。
[题目] 687. B细胞表面的抗原识别受体是
A. CD19
B. CD21
C. CD40
D. BCR
E. Igα/Igβ
[答案] D
[解析] 【正解D】BCR(B细胞受体)是B细胞表面的抗原识别受体——由膜型免疫球蛋白(mIgM/mIgD)和信号转导亚基Igα/Igβ(CD79a/b)组成复合体,mIg V区识别抗原,Igα/Igβ传递信号。【排除】A.CD19是共受体信号增强亚基。B.CD21(CR2)是共受体补体结合亚基。C.CD40是第二信号受体。E.Igα/Igβ是BCR复合物组分(信号转导亚基),独立不能识别抗原。
[题目] 688. 分泌型IgA(SIgA)的转运依赖哪种受体?
A. FcγR
B. pIgR
C. CD40
D. CR1
E. FcεR
[答案] B
[解析] 【正解B】分泌型IgA(sIgA)的转运依赖pIgR(多聚免疫球蛋白受体)——pIgR在黏膜上皮细胞基底侧结合IgA二聚体(通过J链),经胞吞转运穿越上皮细胞,在顶面pIgR胞外段被蛋白酶切割释放形成分泌片(SC)与sIgA共价结合。【排除】A.FcγR是IgG-Fc受体。C.CD40是B细胞表面受体。D.CR1是补体C3b受体。E.FcεR是IgE受体。
[题目] 689. 抗体依赖的细胞吞噬作用(ADCP)主要由哪种细胞介导?
A. NK细胞
B. 巨噬细胞
C. 中性粒细胞
D. 树突状细胞
E. 肥大细胞
[答案] B
[解析] 【正解B】抗体依赖性细胞吞噬作用(ADCP)主要由巨噬细胞和中性粒细胞通过表面FcγR(如FcγRI/CD64,FcγRIIA/CD32A,FcγRIIIA/CD16A)识别抗体(IgG)Fc段包被的靶细胞/病原体,触发吞噬摄取和降解。【排除】A.NK细胞主要执行ADCC而非吞噬。C.中性粒细胞也可执行ADCP,但单选题中巨噬细胞是更经典的主要效应细胞。D.树突状细胞主要功能为抗原提呈。E.肥大细胞不参与ADCP。
[题目] 690. 关于体细胞高频突变，以下说法正确的是
A. Ig恒定区基因也可能发生
B. 不需要抗原诱导
C. 不需要Th细胞的辅助
D. 导致BCR的多样性
E. 最终结果导致抗体亲和力下降
[答案] D
[解析] 【正解D】SHM在生发中心B细胞V区基因引入高频点突变,产生不同亲和力的BCR变体,导致BCR库多样性进一步增加——AID酶催化V区胞嘧啶脱氨产生U:G错配,经修复途径引入突变,为亲和力选择提供底物。【排除】A.SHM主要靶向V区非C区(AID仅作用于V区)。B.SHM需要抗原刺激和T细胞辅助。C.SHM需要Tfh细胞辅助。E.SHM最终结果经选择后亲和力升高非下降。
[题目] 691. 以下哪种细胞因子由Th细胞分泌并促进B细胞增殖?
A. IL-2
B. IL-4
C. IFN-γ
D. TNF-α
E. IL-10
[答案] B
[解析] 【正解B】IL-4由Th2和Tfh细胞分泌,是重要的B细胞生长和分化因子——促进B细胞增殖,诱导MHC-II和CD23上调,并驱动类别转换为IgE/IgG1。【排除】A.IL-2主要促进T细胞增殖,也可辅助B细胞但非最特征性。C.IFN-γ主要促进Th1分化和类别转换为IgG2a。D.TNF-α为促炎因子。E.IL-10主要抑制免疫应答(调节性)。
[题目] 692. 在B细胞对TD抗原的应答中，Th细胞不发挥作用的是
A. 抗体亲和力成熟
B. 生发中心的形成
C. 对抗原的特异性识别
D. B细胞的活化
E. Ig类别转换
[答案] C
[解析] 【正解C】在TD抗原应答的T-B协作中,Th细胞不直接识别天然抗原——B细胞通过BCR捕获天然抗原后内化加工,将抗原肽经MHC-II提呈给Th细胞,Th细胞的TCR识别B细胞表面的抗原肽-MHC-II复合物,Th细胞本身不直接对初始天然抗原进行特异性识别。【排除】A.Th辅助亲和力成熟(CD40L+细胞因子)。B.Th参与生发中心形成。D.Th提供第二信号活化B细胞。E.Th分泌细胞因子诱导类别转换。
[题目] 693. 借助抗原识别受体捕获抗原的细胞是
A. 巨噬细胞
B. 树突状细胞
C. 并指细胞
D. 朗格汉斯细胞
E. B细胞
[答案] E
[解析] 【正解E】B细胞通过BCR(mIg)特异性识别和高效捕获抗原——BCR对抗原的高亲和力使B细胞能富集和摄入极低浓度的特异性抗原(比非特异性胞饮效率高1000-10000倍),是唯一以抗原受体方式捕获抗原的APC细胞。【排除】A.巨噬细胞通过模式识别受体(PRR)和FcR/CR吞噬,非抗原特异性受体。B.DC通过PRR和巨胞饮捕获抗原。C.并指细胞为DC亚型。D.朗格汉斯细胞为皮肤DC亚型。
[题目] 694. 关于生发中心的FDC，以下说法正确的是
A. 这是
B. 细胞分化中的一个阶段 B.这是一种脂肪细胞
C. 始终与T细胞接触
D. 这是具备抗原提呈能力的DC
E. 可将抗原浓缩、滞留在细胞表面
[答案] E
[解析] 【正解E】FDC(滤泡树突状细胞)通过表面FcγR和CR1/CR2将抗原-抗体-补体复合物捕获并以免疫复合物包被小体(iccosome)的形式长期滞留于树突表面(可维持数月至数年),供生发中心B细胞竞争性识别和亲和力选择。【排除】A.FDC非B细胞分化阶段。B.FDC非脂肪细胞。C.FDC与B细胞和Tfh均有接触。D.FDC为非骨髓来源间质细胞,不表达MHC-II,不具备经典APC抗原提呈能力(不能加工和以MHC提呈抗原)。
[题目] 695. B细胞活化的第二信号中最重要的分子是
A. CD40/CD40L
B. B7/CD28
C. CTLA-4/CD28
D. CD19/CD81
E. IgM
[答案] A
[解析] 【正解A】CD40(B细胞)/CD40L(Th/Tfh细胞)是B细胞活化第二信号中最重要的分子对——CD40L(CD154)突变导致X连锁高IgM综合征1型(血清IgM升高但IgG/IgA/IgE严重缺乏,无生发中心形成),CD40突变导致常染色体隐性高IgM综合征3型,证实CD40-CD40L在B细胞活化中的核心地位。【排除】B.B7/CD28是T细胞共刺激分子对。C.CTLA-4/CD28是免疫检查点。D.CD19/CD81是共受体组分非完整第二信号对。E.IgM是BCR组分传递第一信号。
[题目] 696. 抗体依赖的细胞介导的细胞毒作用（ADCC）主要由哪种细胞执行？
A. 中性粒细胞
B. 肥大细胞
C. NK细胞
D. T细胞
E. 树突状细胞
[答案] C
[解析] 【正解C】ADCC(抗体依赖细胞介导的细胞毒作用)主要由NK细胞执行——NK细胞表面FcγRIII(CD16)识别结合靶细胞上IgG抗体的Fc段,FcγRIII交联后触发NK细胞脱颗粒释放穿孔素(在靶细胞膜上打孔)和颗粒酶(经穿孔素孔道进入诱导caspase依赖性凋亡),直接杀伤抗体包被的病毒感染细胞和肿瘤细胞。【排除】A.中性粒细胞主要执行ADCP(抗体依赖细胞吞噬)。B.肥大细胞通过FcεRI结合IgE参与I型超敏反应。D.T细胞通过TCR-MHC识别杀伤靶细胞(非ADCC)。E.树突状细胞主要功能为抗原提呈。
[题目] 697. 婴幼儿易感染含TI-2抗原的病原体的原因是
A. 婴幼儿体内的B1细胞不成熟
B. 婴幼儿体内的B2细胞不成熟
C. 婴幼儿体内的Th1细胞不成熟
D. 婴幼儿体内的Th2细胞不成熟
E. 婴幼儿体内的DC细胞不成熟
[答案] A
[解析] 【正解A】婴幼儿(尤其<2岁)易感染含TI-2抗原的病原体(如肺炎球菌/流感嗜血杆菌b型)的原因是对TI-2抗原应答的B1细胞和边缘区B细胞尚未发育成熟——无法有效产生抗荚膜多糖的IgM/IgG抗体,至2岁后逐渐成熟。【排除】B.B-2细胞对TD蛋白抗原应答,不直接对TI-2多糖抗原。C.Th1不成熟影响细胞免疫非TI-2抗体。D.Th2不成熟影响IgE产生。E.DC不成熟影响T细胞应答。
[题目] 698. TD-Ag诱导B细胞活化的第二信号是
A. 抗原信号
B. BCR提供的信号
C. 树突状细胞提供的信号
D. FC受体提供的信号
E. Th细胞提供的信号
[答案] E
[解析] 【正解E】TD-Ag诱导B细胞活化的第二信号(共刺激信号)由活化的Th细胞(特别是Tfh)提供——包括膜表面CD40L与B细胞CD40结合,以及Th分泌的细胞因子(IL-4/IL-21等),两者协同提供B细胞充分活化所需的共刺激信号。【排除】A.抗原信号为第一信号。B.BCR提供的是第一信号。C.DC向T细胞提供共刺激但不直接给B细胞第二信号。D.Fc受体介导效应功能非活化信号。
[题目] 699. 传递B细胞活化信号到细胞质中的主要是
A. CD4
B. CD81
C. CD21
D. CD79
E. BCR
[答案] D
[解析] 【正解D】CD79即Igα(CD79a)/Igβ(CD79b)异二聚体,是传递BCR活化信号到细胞质中的核心分子——mIg交联后CD79胞质区ITAM被Lyn磷酸化,募集并激活Syk,将胞外的抗原结合信号转化为胞内生化信号。【排除】A.CD4是Th细胞共受体。B.CD81是共受体稳定蛋白非信号转导。C.CD21是共受体的补体结合亚基。E.BCR作为整体复合物,其核心信号传递组分即CD79异二聚体。
[题目] 700. 体液免疫应答过程中，Th0细胞活化的第一信号是
A. MHC-Ⅰ类分子与CD8分子间相互作用
B. MHC-Ⅱ类分子与CD8分子间相互作用
C. MHC-Ⅱ类分子-抗原肽与TCR间相互作用
D. IL-2与IL-2受体间相互作用
E. 协同刺激分子与相应受体的相互作用
[答案] C
[解析] 【正解C】体液免疫应答中Th0细胞活化的第一信号是APC(特别是B细胞/DC)表面MHC-II-抗原肽复合物与Th细胞TCR-CD4的相互作用——TCR识别MHC-II沟槽中的抗原肽,CD4结合MHC-II非多态区,提供T细胞活化的第一信号。【排除】A.MHC-I-CD8是CTL活化的相互作用。B.MHC-II不与CD8相互作用。D.IL-2-IL-2R是T细胞增殖信号。E.协同刺激分子是第二信号。
[题目] 701. 记忆B细胞的主要功能是:
A. 分泌抗体
B. 提呈抗原
C. 再次感染快速应答
D. 激活补体
E. 吞噬病原体
[答案] C
[解析] 【正解C】记忆B细胞的主要功能是在再次遇到相同抗原时快速增殖分化为浆母细胞/浆细胞,产生高亲和力、类别转换的IgG/IgA/IgE抗体,提供快速和高强度的再次免疫应答保护。【排除】A.记忆B细胞本身不大量分泌抗体(需先分化为浆细胞)。B.记忆B细胞可提呈抗原但非主要功能。D.补体激活是抗体Fc段的效应。E.记忆B细胞非吞噬细胞。
[题目] 702. 对TI-1抗原描述错误的是
A. 低浓度时激活抗原特异性
B. 细胞 B.可诱导产生记忆B细胞
C. 高浓度时多克隆活化B细胞
D. 又称B细胞丝裂原
E. 诱导B细胞应答比TD抗原早
[答案] B
[解析] 【正解B】TI-1抗原(如LPS/脂多糖)不能诱导产生记忆B细胞和Ig类别转换——这是TI抗原与TD抗原的核心区别,TI抗原诱导的B细胞应答不进入生发中心,不产生记忆细胞。【排除】A.TI-1低浓度时通过BCR特异性激活抗原特异性B细胞(正确)。C.TI-1高浓度时通过TLR4等PRR多克隆活化B细胞(B细胞丝裂原,正确)。D.TI-1又称B细胞丝裂原(正确)。E.TI-1诱导B细胞应答比TD抗原更早(正确,不需T-B协作)。
[题目] 703. 初次应答中产生的抗体主要是
A. IgA
B. IgD
C. IgE
D. IgG
E. IgM
[答案] E
[解析] 【正解E】初次免疫应答中产生的抗体主要是IgM——初始B细胞活化后首先分泌IgM(第3-5天可检测),随着CD40信号和细胞因子作用,约第7-10天发生类别转换开始产生IgG等,但初次应答全程IgM仍占很大比例。【排除】A.IgA在初次应答中量极少。B.IgD主要为膜型非分泌型。C.IgE在正常初次应答中极微量。D.IgG在初次应答后期出现但非"主要"。
[题目] 704. TD-Ag引起免疫应答的特点是
A. 产生体液免疫应答的细胞为B1细胞
B. 只引起体液免疫应答，不引起细胞免疫应答
C. 可诱导T、B淋巴细胞产生免疫应答
D. 只引起细胞免疫应答，不能引起体液免疫应答
E. 不可诱导免疫记忆细胞形成
[答案] C
[解析] 【正解C】TD-Ag(胸腺依赖性抗原)可同时诱导T淋巴细胞和B淋巴细胞产生免疫应答——DC/APC将TD-Ag加工提呈给Th细胞使其活化,T细胞辅助B细胞产生抗体,形成完整的适应性免疫应答。【排除】A.产生体液免疫应答的细胞为B2细胞(滤泡B细胞)非B1细胞。B.TD-Ag既引起体液免疫也引起细胞免疫。D.TD-Ag可引起体液免疫。E.TD-Ag可诱导免疫记忆形成(反)。
[题目] 705. B细胞的体细胞高频突变是指
B. 细胞在任何时候都可能发生突变，频率远高于普通体细胞 B.B细胞在分裂时发生突变的频率远高于普通体细胞
C. B细胞在骨髓中阴性选择时突变的频率远高于普通体细胞
D. B细胞的突变频率远高于普通体细胞，大约高10倍
E. B细胞的突变频率远高于普通体细胞，大约高100倍
[答案] B
[解析] 【正解B】B细胞的体细胞高频突变(SHM)发生在生发中心暗区快速分裂增殖的B细胞(中心母细胞)中,AID酶催化V区基因点突变,突变率约为10^-3/碱基对/次细胞分裂,比普通体细胞的自发突变率高约10^5-10^6倍(即高10万-100万倍)。【排除】A.并非任何时候都发生,仅生发中心特定阶段。C.阴性选择在骨髓不在生发中心且突变率不异于普通。D/E.高10倍和100倍均远低于实际(高10^5-10^6倍)。
[题目] 706. 抗体类别转换的遗传学基础是:
A. V区基因重组
B. 转换区(S区)重排
C. J链插入
D. 体细胞高频突变
E. Fc段修饰
[答案] B
[解析] 【正解B】抗体类别转换(CSR)的遗传学基础是转换区(S区/switch region)之间的DNA重组——AID酶在供体Sμ区和受体S区(如Sγ/Sα/Sε)产生DNA双链断裂,经非同源末端连接(NHEJ)或替代末端连接(A-EJ)修复后形成Sμ-Sx重组连接,使VDJ外显子从Cμ下游移位至新CH基因上游。【排除】A.V区基因重组产生组合多样性非类别转换。C.J链插入非CSR机制。D.SHM发生在V区非S区。E.Fc段非遗传修饰。
[题目] 707. B细胞分化成浆细胞后
A. 表面表达BCR和MHC Ⅱ分子，能够继续识别抗原，并产生抗体
B. 表面表达BCR和MHC Ⅱ分子，能够继续识别抗原，不产生抗体
C. 表面不表达BCR和MHC Ⅱ分子，能够继续识别抗原，不产生抗体
D. 表面不表达BCR和MHC Ⅱ分子，能够继续识别抗原，并产生抗体
E. 表面不表达BCR和MHC Ⅱ分子，不能够继续识别抗原，但能产生抗体
[答案] E
[解析] 【正解E】B细胞分化为浆细胞后,在转录因子Blimp-1/XBP-1驱动下发生终末分化:停止表达BCR(mIgM/IgD)和MHC-II类分子,不再能识别抗原和提呈抗原,但粗面内质网高度发达,大量合成和分泌抗体(免疫球蛋白)。【排除】A/B/C/D均错误——浆细胞不表达BCR和MHC-II,不能继续识别抗原,B和C不正确,D前半正确后半错误。
[题目] 708. 对于初次免疫应答，以下解释正确的是
A. 婴儿刚出生时发生的免疫应答为初次免疫应答，此后都是再次免疫应答
B. 初次免疫应答一般都比再次免疫应答更快速
C. 初次免疫应答一般都比再次免疫应答更强大
D. 初次免疫应答一定会发病
E. 初次免疫应答的潜伏期通常在一周以上
[答案] E
[解析] 【正解E】初次免疫应答的潜伏期通常在一周以上(约5-10天)——初始B/T细胞数量稀少,需经历APC迁移、T-B协作、B细胞活化增殖和分化为浆细胞等多个步骤才能检测到血清抗体。【排除】A.初次应答定义是免疫系统首次接触某抗原时的应答非出生时。B.初次应答比再次应答慢非更快。C.初次应答强度比再次应答弱。D.初次应答不一定发病(常为隐性感染/亚临床)。
[题目] 709. B细胞活化所需的双信号是
A. SmIg-Ag表位，SmIg-MHCⅠ类分子结合
B. SmIg-Ag表位，SmIg-MHCⅡ类分子结合
C. Igα，Igβ与Ag表位结合
D. sIg-Ag表位，CD40-CD40L
E. 半抗原决定簇-MHCⅡ类分子结合
[答案] D
[解析] 【正解D】B细胞活化所需双信号:第一信号——BCR(mIg/sIg)特异性识别抗原表位导致BCR交联,通过Igα/Igβ ITAM传递信号;第二信号——CD40(B细胞)与CD40L(活化Th细胞表面)结合,经TRAF-NF-κB通路提供共刺激信号。【排除】A/B/C/E均为非标准的活化信号描述,含MHC参与的错误概念。B细胞不需MHC限制。
[题目] 710. 抗体的Fab段负责:
A. 结合补体
B. 中和抗原
C. 激活T细胞
D. 穿过胎盘
E. 结合Fc受体
[答案] B
[解析] 【正解B】抗体的Fab段(含VH+VL可变区)负责特异性结合和中和抗原——通过CDR与抗原表位互补结合,空间阻断病原体(病毒/细菌)或毒素与宿主细胞受体的结合,实现中和作用。【排除】A.补体结合由Fc段CH2区负责。C.抗体不能直接激活T细胞。D.穿过胎盘由Fc段(通过FcRn)介导。E.Fc受体结合由Fc段介导。
[题目] 711. 以下哪种分子在B细胞与Th细胞相互作用中给T细胞提供共刺激信号?
A. CD80/CD86
B. CD40L
C. ICAM-1
D. LFA-1
E. Fas
[答案] A
[解析] 【正解A】B细胞在T-B相互作用中通过表面CD80(B7-1)/CD86(B7-2)给T细胞提供共刺激信号——B细胞经BCR捕获抗原后上调CD80/CD86表达,与T细胞表面CD28结合,促进T细胞活化、存活和IL-2产生。【排除】B.CD40L是T细胞给B细胞提供第二信号的分子。C.ICAM-1是黏附分子增强T-B接触。D.LFA-1是ICAM-1的配体(黏附分子)。E.Fas/FasL介导凋亡。
[题目] 712. 记忆B细胞再次接触抗原时，分化的主要场所是:
A. 生发中心
B. 骨髓
C. 初级聚合灶
D. 黏膜组织
E. 胸腺
[答案] B
[解析] 【正解B】记忆B细胞再次接触抗原后,快速增殖分化为浆母细胞,主要迁移至骨髓——在那里分化为长寿浆细胞(LLPC)长期定居并持续分泌高亲和力抗体(IgG/IgA/IgE),维持血清抗体水平数十年。【排除】A.生发中心是初次应答中形成记忆B细胞的场所,再次应答中记忆B细胞也可进入但主要分化场所在骨髓。C.初级聚合灶是初次应答早期产生IgM的场所。D.黏膜组织非再次应答主要分化场所。E.胸腺为T细胞发育场所。
[题目] 713. TI-1抗原在高浓度时表现为:
A. 多克隆激活
B. 细胞 B.仅激活成熟B细胞
C. 需要T细胞辅助
D. 诱导类别转换
E. 产生高亲和力抗体
[答案] A
[解析] 【正解A】TI-1抗原(如LPS)在低浓度时通过BCR特异性激活抗原特异性B细胞,但在高浓度时可通过TLR4等PRR多克隆地激活大量B细胞(B细胞丝裂原效应),不依赖BCR的特异性——这是TI-1区别于TI-2的特征(TI-2无此效应)。【排除】B.高浓度时不仅激活成熟B细胞,可多克隆激活。C.TI-1不需T细胞辅助。D.TI-1不诱导类别转换。E.TI-1不产生高亲和力抗体。
[题目] 714. 五聚体IgM的抗原结合价为:
A. 2
B. 5
C. 10
D. 4
E. 1
[答案] B
[解析] 【正解B】五聚体IgM含5个IgM单体,每个单体有2个Fab,理论抗原结合价为10(10个Fab结合位点)。但因五聚体空间位阻效应,当结合大分子抗原时实际有效结合价通常计为5(每个单体约1个结合位点可用)。注意:教材中抗原结合价常以"5价"计(凝集反应价)。【排除】A.2为单体IgG结合价。C.10为理论价但受位阻。D.4非IgM价数。E.1非IgM价数。
[题目] 715. 以下哪种抗体能通过胎盘?
A. IgM
B. IgA
C. IgG
D. IgD
E. IgE
[答案] C
[解析] 【正解C】IgG是唯一能通过胎盘的抗体——通过胎盘合体滋养层细胞膜上的FcRn(新生Fc受体)与IgG-Fc段的pH依赖性结合,在酸性内体中结合IgG并转运至胎儿侧释放于中性pH,为新生儿提供母源性被动免疫。【排除】A.IgM分子量过大不能通过。B.IgA不能通过胎盘。D.IgD不能通过胎盘。E.IgE不能通过胎盘。
[题目] 716. 激活补体经典途径的抗体类型是:
A. IgG和IgM
B. IgA和IgE
C. IgD和IgG
D. IgE和IgM
E. IgA和IgD
[答案] A
[解析] 【正解A】IgG(IgG1和IgG3最强,IgG2较弱)和IgM可通过Fc段CH2区C1q结合位点激活补体经典途径——抗体与抗原结合后Fc段构象改变暴露C1q结合位点,IgM由于五聚体结构激活补体效率最高(单个IgM即可)。【排除】B.IgA通过旁路途径或MBL途径激活补体。C.IgD不能激活补体。D.IgE不能激活经典途径。E.IgA不能激活经典途径。
[题目] 717. 以下哪种细胞因子促进IgE类别转换?
A. IL-4
B. TGF-β
C. IFN-γ
D. IL-21
E. IL-5
[答案] A
[解析] 【正解A】IL-4是诱导B细胞类别转换重组(CSR)为IgE的关键细胞因子——IL-4通过STAT6信号通路诱导Cε胚系转录本(ε-germline transcript),使AID酶可接近Sε区,完成Sμ→Sε重组产生IgE。IL-13也可协同促进IgE。【排除】B.TGF-β诱导IgA和IgG2b类别转换。C.IFN-γ诱导IgG2a类别转换。D.IL-21促进B细胞分化为浆细胞。E.IL-5促进嗜酸性粒细胞发育和IgA产生。
[题目] 718. 未成熟B细胞的标志是仅表达:
A. mIgM
B. mIgD
C. mIgG
D. mIgA
E. mIgE
[答案] A
[解析] 【正解A】未成熟B细胞(Immature B cell)的标志是仅表达mIgM——轻链V-J重排完成后在表面表达mIgM+Igα/Igβ,尚未共表达mIgD(因Cδ的pre-mRNA加工尚未启动),是刚完成功能性BCR表达的阶段,接受阴性选择。【排除】B.mIgD是成熟B细胞标志。C.mIgG在类别转换后表达。D.mIgA在类别转换后。E.mIgE在类别转换后。
[题目] 719. 以下哪种抗体参与I型超敏反应?
A. IgG
B. IgA
C. IgM
D. IgE
E. IgD
[答案] D
[解析] 【正解D】IgE是I型超敏反应(速发型/过敏反应)的关键抗体——IgE-Fc段以极高亲和力结合肥大细胞和嗜碱性粒细胞表面的FcεRI,使细胞致敏;再次接触特异性过敏原时抗原交联相邻FcεRI结合的IgE,触发脱颗粒释放组胺等炎症介质。【排除】A.IgG参与II型和III型超敏反应。B.IgA参与黏膜免疫非I型。C.IgM参与II型(输血反应等)。E.IgD功能主要为BCR组分。
[题目] 720. 单克隆抗体的制备需要融合哪种细胞?
B. 细胞与T细胞 B.B细胞与骨髓瘤细胞
C. T细胞与DC
D. 巨噬细胞与NK细胞
E. 浆细胞与干细胞
[答案] B
[解析] 【正解B】单克隆抗体制备(杂交瘤技术)需要融合经免疫的B细胞(脾细胞,能产生特异性抗体但体外寿命有限)与骨髓瘤细胞(恶性浆细胞瘤细胞株,具有无限增殖能力),形成的杂交瘤细胞兼具两种亲本特性:永生化增殖和分泌单特异性单克隆抗体。【排除】A.B细胞+T细胞不能产生永生化细胞。C.T+DC不能产抗体。D.巨噬+NK不能产抗体。E.浆细胞已终末分化不能再增殖融合。
[题目] 721. 补体受体CR1和CR2主要表达在:
A. T细胞
B. FDC
C. 中性粒细胞
D. 肥大细胞
E. 红细胞
[答案] B
[解析] 【正解B】补体受体CR1(CD35)和CR2(CD21)在滤泡树突状细胞(FDC)上高表达——FDC通过这些受体捕获补体C3b/C3d标记的抗原-抗体免疫复合物并滞留于细胞树突表面,供生发中心B细胞竞争性识别和亲和力选择。【排除】A.T细胞不表达CR1/CR2。C.中性粒细胞表达CR1/CR3/CR4但非CR2且非主要表达细胞。D.肥大细胞主要表达FcεRI。E.红细胞表达CR1(清除免疫复合物)但非CR2。
[题目] 722. 以下哪种抗体在黏膜免疫中起主要作用?
A. IgG
B. IgM
C. IgA
D. IgD
E. IgE
[答案] C
[解析] 【正解C】分泌型IgA(sIgA)是黏膜表面最主要的抗体,在黏膜免疫中起核心作用——通过免疫排除(immune exclusion)阻止病原体和抗原穿过黏膜上皮,中和病毒和毒素,且sIgA不激活补体可避免黏膜炎症损伤。【排除】A.IgG主要在血清和组织液而非黏膜表面。B.IgM主要在血管内且分子量大难以穿过黏膜。D.IgD为膜型BCR组分。E.IgE参与抗寄生虫和过敏。
[题目] 723. 浆细胞的特征是:
A. 表达mIgM
B. 分泌大量抗体
C. 高增殖能力
D. 参与抗原提呈
E. 形成记忆细胞
[答案] B
[解析] 【正解B】浆细胞的特征是大量分泌抗体(免疫球蛋白)——胞质内粗面内质网高度发达(占50%以上),以每秒数千个分子速率合成Ig,是B细胞终末效应细胞,专职抗体分泌工厂。【排除】A.浆细胞不表达mIgM(BCR已丢失)。C.浆细胞不可逆退出细胞周期无增殖能力。D.浆细胞不表达MHC-II不参与抗原提呈。E.浆细胞为终末分化不形成记忆。
[题目] 724. 以下哪种抗体是五聚体结构?
A. IgG
B. IgA
C. IgM
D. IgD
E. IgE
[答案] C
[解析] 【正解C】IgM是五聚体结构——5个IgM单体(每个为2H+2L四肽链)通过J链和单体间二硫键连接成五聚体大分子(分子量约970kDa),由于分子量巨大主要存在于血管内,是初次免疫应答最早产生的抗体和天然血型抗体。【排除】A.IgG为单体。B.血清IgA为单体,sIgA为二聚体。D.IgD为单体。E.IgE为单体。
[题目] 725. 抗体的类别转换需要哪种酶的参与?(难度系数★★★★)
A. DNA聚合酶
B. AID
C. RNA聚合酶
D. 逆转录酶
E. 蛋白酶
[答案] B
[解析] 【正解B】AID(活化诱导的胞苷脱氨酶/Activation-Induced cytidine Deaminase)是体细胞高频突变(SHM)和类别转换重组(CSR)共同所需的关键酶——AID催化Ig基因V区和S区DNA上的胞嘧啶(C)脱氨转变为尿嘧啶(U),产生U:G错配,经UNG和APE1等修复酶处理产生突变(SHM)或双链断裂(CSR)。AID缺陷导致常染色体隐性高IgM综合征2型。【排除】A.DNA聚合酶参与DNA复制。C.RNA聚合酶转录。D.逆转录酶逆转录病毒。E.蛋白酶降解蛋白。
[题目] 726. 以下哪种抗体在脐带血中升高提示宫内感染?
A. IgG
B. IgM
C. IgA
D. IgD
E. IgE
[答案] B
[解析] 【正解B】脐带血中IgM升高提示宫内感染——IgM为五聚体不能通过胎盘屏障,胎儿脐带血中检出的IgM必然是胎儿免疫系统在宫内接触病原体后自身产生的,是诊断先天性/宫内感染(如TORCH:弓形虫/风疹/CMV/单纯疱疹等)的重要血清学指标。【排除】A.IgG可通过胎盘,脐带血IgG主要来自母体非胎儿产生,升高不特异提示宫内感染。C/D/E.IgA/IgD/IgE均非宫内感染诊断指标。
[题目] 727. B细胞共受体复合物包括以下哪种分子?
A. CD19/CD21/CD81
B. CD28/B7
C. CD40/CD40L
D. TCR/CD3
E. LFA-1/ICAM-1
[答案] A
[解析] 【正解A】B细胞共受体复合物由CD19(信号转导)-CD21(补体C3d受体/CR2)-CD81(四次跨膜蛋白/稳定结构)组成,三者协同可显著增强BCR信号约1000-10000倍,尤其在低浓度抗原刺激时发挥关键放大作用。【排除】B.CD28/B7是T细胞共刺激分子对。C.CD40/CD40L是B细胞第二信号分子对。D.TCR/CD3是T细胞抗原识别复合物。E.LFA-1/ICAM-1是黏附分子对。
[题目] 728. 生发中心反应中，B细胞与哪种细胞直接相互作用?
A. 中性粒细胞
B. Tfh细胞
C. 肥大细胞
D. 红细胞
E. 血小板
[答案] B
[解析] 【正解B】生发中心反应中,B细胞与Tfh(滤泡辅助T细胞)直接相互作用——Tfh细胞高表达CXCR5被CXCL13吸引定位于滤泡,通过CD40L-CD40和ICOS-ICOSL等为B细胞提供辅助信号,并分泌IL-4/IL-21驱动SHM、CSR和亲和力成熟。【排除】A.中性粒细胞不参与生发中心反应。C.肥大细胞参与过敏反应。D.红细胞不参与免疫应答。E.血小板参与凝血和炎症。
[题目] 729. 以下哪种细胞不表达MHCII类分子?
B. 细胞 B.巨噬细胞
C. FDC
D. 树突状细胞
E. Kupffer细胞
[答案] C
[解析] 【正解C】滤泡树突状细胞(FDC)不表达MHC-II类分子——FDC为非骨髓来源的间质细胞(成纤维网状细胞分化),不以MHC-II提呈抗原肽给T细胞的方式发挥功能,而是通过Fc受体和补体受体捕获完整的抗原-抗体复合物展示给B细胞。【排除】A.B细胞表达MHC-II。B.巨噬细胞表达MHC-II。D.DC高表达MHC-II。E.Kupffer细胞(肝巨噬细胞)表达MHC-II。
[题目] 730. 抗体与抗原结合后激活补体的经典途径，主要通过哪个结构域?
A. Fab段
B. Fc段
C. J链
D. 分泌片
E. 可变区
[答案] B
[解析] 【正解B】抗体与抗原结合后通过Fc段(CH2结构域)激活补体经典途径——抗体未结合抗原时Fc段C1q结合位点被Fab段遮盖,抗原结合后铰链区变构暴露CH2区的C1q结合位点,C1q结合至少2个相邻IgG Fc段或1个IgM五聚体后激活C1r/C1s启动经典途径级联。【排除】A.Fab段负责抗原结合。C.J链连接Ig单体。D.分泌片保护sIgA。E.可变区负责抗原结合。
[题目] 731. 以下哪种抗原可直接激活B细胞无需T细胞辅助?
A. TD抗原
B. TI抗原
C. 蛋白质抗原
D. 病毒抗原
E. 肿瘤抗原
[答案] B
[解析] 【正解B】TI抗原(非胸腺依赖性抗原,如细菌多糖/LPS/聚合鞭毛蛋白等)可直接激活B细胞,无需T细胞辅助——TI-1通过TLR和BCR共激活,TI-2通过广泛交联BCR激活,均不依赖T细胞提供的CD40L和细胞因子。【排除】A.TD抗原需要T辅助。C.蛋白质抗原多为TD抗原。D.病毒蛋白抗原为TD抗原。E.肿瘤抗原多为TD蛋白抗原。
[题目] 732. 抗体类别转换后，以下哪部分保持不变?
A. 重链恒定区
B. 轻链可变区
C. 铰链区
D. Fc段
E. J链
[答案] B
[解析] 【正解B】抗体类别转换后轻链可变区(VL)和重链可变区(VH)均保持不变——CSR仅改变CH基因(Sμ→Sγ/Sα/Sε重组),VDJ外显子的V区序列完全保留,因此抗体抗原特异性在类别转换前后一致(同一V区可与不同CH区组合)。【排除】A.重链恒定区改变(这是CSR的本质)。C.铰链区随CH变化。D.Fc段随CH变化。E.J链在IgM和IgA中存在。
[题目] 733. 以下哪种抗体是B细胞成熟的标志?
A. IgM
B. IgD
C. IgG
D. IgA
E. IgE
[答案] B
[解析] 【正解B】mIgD的共表达标志着B细胞从骨髓中未成熟阶段进入成熟阶段——成熟初始B细胞表面为mIgM+mIgD+(通过mRNA差异剪接同时产生),mIgD的获得性表达标志着B细胞已完成阴性选择且准备好对外来抗原产生应答。【排除】A.IgM在未成熟和成熟B细胞均表达。C.IgG在类别转换后表达。D.IgA在类别转换后。E.IgE在类别转换后。
[题目] 734. 以下哪种分子在B细胞内传递第一信号?
A. CD79a/CD79b
B. CD28
C. CD40L
D. IL-4受体
E. Fas
[答案] A
[解析] 【正解A】CD79a(Igα)/CD79b(Igβ)胞质区含ITAM基序(各含1个ITAM),BCR交联后Lyn磷酸化ITAM,募集并激活Syk,将BCR识别抗原的信号从胞膜传递至胞内——是B细胞内传递第一信号的核心分子。【排除】B.CD28是T细胞共刺激受体。C.CD40L是T细胞表面分子。D.IL-4R传递细胞因子信号(第三信号)。E.Fas传递凋亡信号。
[题目] 735. Th细胞迁移至滤泡依赖哪种趋化因子受体?(难度系数★★★★)
A. CCR7
B. CXCR5
C. CCR5
D. CXCR4
E. CCR3
[答案] B
[解析] 【正解B】Th细胞活化为Tfh细胞后上调CXCR5表达,迁移至B细胞滤泡依赖趋化因子受体CXCR5——FDC和其他滤泡基质细胞分泌CXCL13(BCA-1/BLC),通过CXCR5-CXCL13轴将Tfh吸引至B细胞滤泡与B细胞相互作用。【排除】A.CCR7介导T/B细胞归巢至淋巴结T细胞区。C.CCR5与Th1迁移相关。D.CXCR4介导浆母细胞归巢至骨髓。E.CCR3与嗜酸性粒细胞/Th2迁移相关。
[题目] 736. 抗体中和作用的机制是:
A. 激活补体
B. 阻断病原体与宿主结合
C. 促进吞噬
D. 诱导ADCC
E. 结合Fc受体
[答案] B
[解析] 【正解B】抗体中和作用的机制是通过V区(尤其是CDR)特异性结合病原体(病毒/细菌)表面蛋白或毒素的关键功能表位,以空间位阻效应阻断病原体/毒素与宿主细胞受体的结合,从而阻止感染和毒性作用——这是最直接的保护性免疫机制。【排除】A.激活补体是Fc段效应功能。C.促进吞噬(调理)是Fc段-FcγR介导。D.ADCC是Fc段-FcγRIII介导。E.Fc受体结合介导调理/ADCC而非中和。
[题目] 737. 以下哪种抗体在血清中含量最高?
A. IgG
B. IgM
C. IgA
D. IgD
E. IgE
[答案] A
[解析] 【正解A】IgG在血清中含量最高——占总血清免疫球蛋白的75-80%(约10-16mg/mL),半衰期最长(约21-23天,由FcRn介导再循环保护),是血清抗体的主要成分,广泛分布于血管内外。【排除】B.IgM占总Ig的5-10%(约0.5-2mg/mL)。C.IgA占总Ig的10-15%。D.IgD占总Ig的<1%(约0.03mg/mL)。E.IgE血清含量最低(约0.0003mg/mL)。
[题目] 738. B细胞对TD抗原的应答中，抗原提呈给Th细胞的分子是:
A. MHCI类分子
B. MHCII类分子
C. CD1
D. Fc受体
E. 补体受体
[答案] B
[解析] 【正解B】B细胞通过MHC-II类分子将加工处理后的外源性抗原肽提呈给CD4+Th细胞——BCR捕获的天然抗原内化进入内体/溶酶体途径降解为肽段,装载于MHC-II分子沟槽中表达于细胞表面,TCR识别该抗原肽-MHC-II复合物,是T-B协作的关键环节。【排除】A.MHC-I提呈内源性抗原给CD8+T细胞。C.CD1提呈脂类抗原。D.Fc受体结合抗体Fc段。E.补体受体结合补体片段。
[题目] 739. 以下哪种抗体在黏膜表面形成二聚体?
A. IgG
B. IgM
C. IgA
D. IgD
E. IgE
[答案] C
[解析] 【正解C】分泌型IgA(sIgA)在黏膜表面以二聚体形式存在——两个IgA单体通过J链连接成二聚体(部分也可为三聚体/四聚体),再通过pIgR转运时获得分泌片(SC),最终以二聚体+SC形式分泌至黏膜表面发挥作用。【排除】A.IgG为单体。B.IgM为五聚体。D.IgD为单体。E.IgE为单体。
[题目] 740. 以下哪种细胞不参与B细胞活化?
A. Th细胞
B. FDC
C. 巨噬细胞
D. NK细胞
E. 树突状细胞
[答案] D
[解析] 【正解D】NK细胞属于固有免疫细胞,主要功能为杀伤病毒感染细胞和肿瘤细胞(通过穿孔素/颗粒酶)及执行ADCC,不直接参与B细胞活化的辅助过程。B细胞活化辅助主要来自Th/Tfh细胞、FDC和APC(DC/巨噬细胞间接辅助)。【排除】A.Th/Tfh细胞直接提供CD40L和细胞因子辅助B细胞活化。B.FDC在生发中心展示抗原辅助B细胞选择。C.巨噬细胞参与抗原提呈和细胞因子分泌。E.DC提呈抗原活化T细胞间接辅助B细胞。
[题目] 741. 抗体的调理作用增强哪种细胞的吞噬功能?
A. 中性粒细胞
B. T细胞
C. B细胞
D. 肥大细胞
E. 红细胞
[答案] A
[解析] 【正解A】抗体的调理作用通过IgG-Fc段结合中性粒细胞和巨噬细胞表面的FcγR(CD64/CD32/CD16),显著增强这些吞噬细胞对抗体包被病原体的吞噬效率——是抗体介导保护性免疫的重要机制之一。【排除】B.T细胞非吞噬细胞。C.B细胞为APC和抗体产生细胞,非专职吞噬。D.肥大细胞不参与调理吞噬。E.红细胞表达CR1可结合免疫复合物但不直接吞噬。
[题目] 742. B细胞在生发中心经历的选择过程不包括:
A. 体细胞高频突变
B. 抗体亲和力成熟
C. 类别转换
D. 记忆B细胞形成
E. 抗原提呈
[答案] E
[解析] 【正解E】B细胞在生发中心经历的主要过程包括:体细胞高频突变(SHM)、亲和力选择和成熟、类别转换(CSR)以及记忆B细胞或浆细胞分化。抗原提呈功能在生发中心主要由FDC(展示完整抗原复合物)完成,B细胞在生发中心主要作为被选择者而非抗原提呈者。【排除】A.SHM在生发中心暗区发生(正确)。B.亲和力成熟是生发中心核心功能(正确)。C.类别转换在生发中心发生(正确)。D.记忆B细胞在生发中心形成(正确)。
[题目] 743. 以下哪种分子是BCR的组成部分?
A. CD3
B. CD28
C. CD79a/CD79b
D. CD40
E. CD19
[答案] C
[解析] 【正解C】CD79a(Igα)/CD79b(Igβ)异源二聚体是BCR复合物的必需信号转导组分——与mIg通过非共价键结合构成完整功能性BCR,mIg负责抗原识别,CD79a/b负责信号传递,两者缺一不可。【排除】A.CD3是TCR复合物的信号转导亚基。B.CD28是T细胞共刺激受体。C.正确。D.CD40是B细胞第二信号受体。E.CD19是B细胞共受体组分非BCR组分。
[题目] 744. 初次应答中，浆母细胞主要分化的场所是:
A. 生发中心
B. 初级聚合灶
C. 骨髓
D. 胸腺
E. 脾脏边缘区
[答案] B
[解析] 【正解B】初次免疫应答中,活化的B细胞在T-B交界区(T区-滤泡交界)形成初级聚合灶(primary focus/初级灶),浆母细胞在此处快速分化为短寿浆细胞,主要产生早期IgM抗体(低亲和力),此过程先于生发中心形成。【排除】A.生发中心在初次应答约一周后才形成。C.骨髓是再次应答中长寿浆细胞定居场所。D.胸腺为T细胞发育场所。E.脾边缘区为MZ B细胞定居和应答TI抗原场所。
[题目] 745. Th细胞分泌的哪种细胞因子促进B细胞增殖?
A. IL-2
B. IL-4
C. IFN-γ
D. TNF-α
E. IL-10
[答案] B
[解析] 【正解B】IL-4(Th2和Tfh细胞分泌)是重要的B细胞生长因子——通过IL-4R-STAT6通路促进B细胞增殖、上调MHC-II和CD23,并驱动类别转换为IgE和IgG1(小鼠)/IgG4(人),是体液免疫应答中关键的B细胞增殖和分化信号。【排除】A.IL-2主要促进T细胞增殖,对B细胞促增殖作用较弱。C.IFN-γ促进类别转换为IgG2a但非主要增殖因子。D.TNF-α为促炎因子。E.IL-10为抑制性/调节性细胞因子。
[题目] 746. 抗体类别转换后，哪种抗体的可变区不变?
A. IgG
B. IgA
C. IgE
D. 以上所有
E. 仅IgM
[答案] D
[解析] 【正解D】抗体类别转换后所有Ig类型的可变区保持不变——CSR仅改变重链恒定区基因(Cμ→Cγ/Cα/Cε),不影响重排后的VDJ外显子(V区序列),因此IgG/IgA/IgE均保留与原始IgM相同的V区抗原特异性。【排除】A.IgG的V区不变(正确描述但非"以上所有")。B.IgA的V区不变(同理)。C.IgE的V区不变(同理)。E.仅IgM错误。
[题目] 747. 补体片段C3d结合哪种受体增强B细胞信号?
A. CR1
B. CR2
C. CR3
D. FcγR
E. FcεR
[答案] B
[解析] 【正解B】C3d补体片段结合B细胞共受体中的CD21(CR2/补体受体2)——C3d共价结合于抗原后,同时被BCR(识别抗原)和CD21(结合C3d)识别,通过共受体CD19-CD21-CD81交联放大BCR信号约1000-10000倍,显著降低B细胞活化所需的抗原阈值。【排除】A.CR1(CD35)结合C3b/C4b。C.CR3(CD11b/CD18)结合iC3b。D.FcγR结合IgG-Fc。E.FcεR结合IgE-Fc。
[题目] 748. 抗体穿过胎盘依赖哪种受体?
A. FcγR
B. FcRn
C. pIgR
D. CR1
E. CD40
[答案] B
[解析] 【正解B】IgG穿过胎盘依赖FcRn(新生Fc受体/neonatal Fc receptor)——胎盘合体滋养层细胞膜上FcRn在酸性内体(pH<6.5)中与母体IgG-Fc段高亲和力结合,经胞吞转运至胎儿侧,在生理pH(pH7.4)释放IgG进入胎儿循环,为新生儿提供被动体液免疫保护。【排除】A.FcγR主要介导吞噬和ADCC。C.pIgR转运IgA多聚体。D.CR1结合C3b。E.CD40是B细胞表面受体。
[题目] 749. 以下哪种抗体是未成熟B细胞的标志?
A. mIgM
B. mIgD
C. mIgG
D. mIgA
E. mIgE
[答案] A
[解析] 【正解A】未成熟B细胞(Immature B cell)仅表达mIgM——轻链V-J重排完成后表达膜型IgM单体+Igα/Igβ,不表达mIgD。mIgM+是第一个表达功能性BCR的B细胞阶段,在此阶段接受阴性选择。【排除】B.mIgD在成熟B细胞阶段才共表达。C.mIgG在类别转换后表达。D.mIgA在类别转换后。E.mIgE在类别转换后。
[题目] 750. 抗体可变区(V区)的功能不包括:
A. 结合抗原
B. 中和毒素
C. 激活补体
D. 阻断病原入侵
E. 介导ADCC
[答案] C
[解析] 【正解C】抗体可变区(V区)的功能包括:结合抗原(特异性识别表位)、中和毒素和阻断病原入侵(空间位阻阻断受体结合)。激活补体是Fc段(CH2区/C1q结合位点)的功能——不属于V区功能。【排除】A/B/D均为V区正确功能。E.介导ADCC也是Fc段(FcγR结合)的功能非V区功能。
[题目] 751. 以下哪种抗体在血清中半衰期最长?
A. IgG
B. IgM
C. IgA
D. IgD
E. IgE
[答案] A
[解析] 【正解A】IgG在血清中半衰期最长(约21-23天)——IgG经胞饮进入血管内皮细胞等,在酸性内体中与FcRn结合后被再循环回细胞表面释放(避免溶酶体降解),FcRn介导的再循环保护机制使IgG半衰期远长于其他Ig。【排除】B.IgM半衰期约5-10天。C.IgA半衰期约6天。D.IgD半衰期约2-3天。E.IgE半衰期约2-3天(最短)。
[题目] 752. 以下哪种抗原需要T细胞辅助才能激活B细胞?
A. TD抗原
B. TI-1抗原
C. TI-2抗原
D. LPS
E. 多糖
[答案] A
[解析] 【正解A】TD抗原(胸腺依赖性抗原/Thymus-Dependent antigen,多为蛋白质)需CD4+Th/Tfh细胞辅助才能有效激活B细胞——T细胞提供CD40L-CD40信号和细胞因子,才能诱导B细胞进入生发中心反应产生高亲和力/类别转换的抗体和记忆B细胞。【排除】B.TI-1抗原(如LPS)可单独激活B细胞。C.TI-2抗原(如荚膜多糖)可单独激活B细胞。D.LPS为TI-1抗原无需T辅助。E.多糖为TI-2抗原无需T辅助。
[题目] 753. B细胞活化的共受体复合物中，CD21识别的补体片段是:
A. C3a
B. C3b
C. C3d
D. C5a
E. C1q
[答案] C
[解析] 【正解C】B细胞共受体中CD21(CR2/补体受体2)特异性识别补体片段C3d(以及iC3b和C3dg)——C3d是C3b经多次裂解后产生的终末片段(约35kDa),共价结合于抗原表面,是CD21的主要生理配体。【排除】A.C3a是过敏毒素(C3aR配体)。B.C3b是CR1(CD35)的主要配体。D.C5a是过敏毒素和趋化因子(C5aR/CD88配体)。E.C1q是C1q受体的配体。
[题目] 754. 抗体依赖的细胞吞噬作用(ADCP)中，靶细胞被哪种受体识别?
A. TCR
B. BCR
C. FcγR
D. TLR
E. CR2
[答案] C
[解析] 【正解C】抗体依赖性细胞吞噬作用(ADCP)中,抗体(IgG)包被的靶细胞/病原体通过Fc段被吞噬细胞(巨噬/中性粒细胞)表面FcγR(特别是FcγRI/CD64,高亲和力受体)识别,FcγR交联触发肌动蛋白重排和吞噬杯形成,促进吞噬摄取和降解。【排除】A.TCR识别MHC-肽复合物。B.BCR识别天然抗原。D.TLR识别病原体PAMP。E.CR2(CD21)识别C3d片段。
[题目] 755. 以下哪种细胞因子由Th细胞分泌并促进IgE类别转换?
A. IL-4
B. IL-17
C. IFN-γ
D. TGF-β
E. IL-10
[答案] A
[解析] 【正解A】IL-4(Th2和Tfh细胞分泌)通过激活STAT6信号通路诱导B细胞Cε胚系转录本表达(Iε启动子-Cε外显子的无菌转录本),使AID酶可接近Sε转换区,促进Sμ→Sε重排完成IgE类别转换。【排除】B.IL-17促进炎症反应和中性粒细胞募集。C.IFN-γ促进IgG2a类别转换。D.TGF-β促进IgA类别转换。E.IL-10为主要抑制性细胞因子。
[题目] 756. 以下哪种抗体在血清中半衰期最短?
A. IgG
B. IgM
C. IgA
D. IgD
E. IgE
[答案] E
[解析] 【正解E】IgE在血清中半衰期最短(仅约2-3天)——因IgE分子糖基化程度较高且易被蛋白酶降解。但IgE被肥大细胞/嗜碱性粒细胞表面FcεRI高亲和力结合后,可在组织中存留数周至数月,使细胞长期处于致敏状态。【排除】A.IgG半衰期最长(约21-23天)。B.IgM半衰期约5-10天。C.IgA半衰期约6天。D.IgD半衰期约2-3天(也很短,但教材通常以IgE为最短)。
[题目] 757. B细胞迁移至生发中心需要下调哪种趋化因子受体?(难度系数★★★★)
A. CCR7
B. CXCR5
C. CCR5
D. CXCR4
E. CCR2
[答案] A
[解析] 【正解A】B细胞经抗原活化后下调CCR7(CCR7配体CCL19/CCL21由T区基质细胞产生,介导初始B/T细胞归巢至T区),同时上调CXCR5表达,使活化的B细胞脱离T区向滤泡迁移(趋化CXCL13梯度),在那里形成生发中心。【排除】B.CXCR5需上调(非下调)以迁移至滤泡。C.CCR5主要与Th1迁移相关。D.CXCR4上调参与浆母细胞归巢至骨髓。E.CCR2为单核/巨噬细胞趋化因子受体。
[题目] 758. 抗体的调理作用通过结合哪种细胞表面的受体?
A. FcγR
B. TCR
C. BCR
D. TLR
E. CR1
[答案] A
[解析] 【正解A】抗体的调理作用通过IgG-Fc段结合吞噬细胞(巨噬细胞/中性粒细胞)表面Fcγ受体(包括FcγRI/CD64高亲和力,FcγRIIA/CD32A,FcγRIIIA/CD16A)介导——FcγR交联触发内化,促进对抗体包被病原体的吞噬和杀伤。【排除】B.TCR识别MHC-肽。C.BCR识别天然抗原。D.TLR识别PAMP。E.CR1识别C3b/C4b(补体调理)。
[题目] 759. 抗体的J链存在于:
A. IgG和IgM
B. IgA和IgM
C. IgD和IgE
D. IgE和IgG
E. 所有抗体类型
[答案] B
[解析] 【正解B】J链(Joining chain)由浆细胞合成,存在于多聚体抗体IgM(五聚体)和IgA(二聚体及更大寡聚体)中——通过二硫键连接Ig单体分子,使其形成多聚体结构。IgG/IgD/IgE均为单体形式不含J链。【排除】A.IgG不含J链。C.IgD和IgE均不含。D.IgE和IgG均不含。E.非所有抗体类型都含J链。
[题目] 760. 初次应答中，浆母细胞分泌的抗体主要是:
A. IgG
B. IgM
C. IgA
D. IgE
E. IgD
[答案] B
[解析] 【正解B】初次免疫应答中早期(约3-5天)浆母细胞在初级聚合灶分化为短寿浆细胞后主要分泌IgM抗体——此时类别转换尚未大量发生,IgM是初次应答的标志性抗体,后期(约7-10天)经生发中心类别转换后才产生大量IgG。【排除】A.IgG在初次应答后期(7-10天)出现。C/D/E.IgA/IgE/IgD在初次应答中产生极少。
[题目] 761. 抗体类别转换缺陷可能导致以下哪种疾病?
A. 高IgM综合征
B. 系统性红斑狼疮
C. 类风湿关节炎
D. 过敏反应
E. 重症联合免疫缺陷
[答案] A
[解析] 【正解A】抗体类别转换缺陷导致高IgM综合征(HIGM)——血清IgM水平升高或正常,但IgG/IgA/IgE显著降低或缺乏。最常见病因:X连锁HIGM(CD40L/CD154突变)和常染色体隐性HIGM(CD40或AID突变),患者反复感染尤其是机会性感染。【排除】B.SLE为自身抗体介导的多系统自身免疫病。C.类风湿关节炎为自身免疫性关节病。D.过敏反应为IgE介导的I型超敏反应。E.SCID为T/B细胞联合严重缺陷。
[题目] 762. 以下哪种抗体在抗寄生虫免疫中起重要作用?
A. IgG
B. IgM
C. IgA
D. IgE
E. IgD
[答案] D
[解析] 【正解D】IgE在抗寄生虫(尤其是蠕虫/helminth)免疫中起重要作用——IgE结合肥大细胞FcεRI触发脱颗粒释放趋化因子吸引嗜酸性粒细胞,嗜酸性粒细胞通过FcεRI/FcγR与IgE/IgG包被的寄生虫结合后释放主要碱性蛋白(MBP)和嗜酸性粒细胞阳离子蛋白(ECP)杀伤寄生虫。【排除】A.IgG可参与但非最特征性。B.IgM主要在初次应答血管内。C.IgA主要在黏膜表面。E.IgD功能不明。
[题目] 763. 抗体的分泌片(SP)来源于哪种分子?
A. pIgR
B. FcγR
C. J链
D. CD40
E. CR2
[答案] A
[解析] 【正解A】抗体的分泌片(SC/secretory component)来源于pIgR(多聚免疫球蛋白受体)——pIgR在黏膜上皮细胞基底侧结合IgA二聚体(通过J链),经胞吞转运穿过上皮细胞,在顶面pIgR胞外段(约5个Ig样结构域)被蛋白酶切割释放,与sIgA共价结合形成分泌片,保护sIgA抵抗蛋白酶降解。【排除】B.FcγR是IgG-Fc受体。C.J链连接Ig单体形成多聚体。D.CD40是B细胞表面受体。E.CR2(CD21)是补体C3d受体。
[章节] 第十三章 超敏反应
[单选题]
[题目] 764. 以下哪一项不属于迟发型超敏反应
A. 接触性皮炎
B. 干酪性肺炎
C. 移植排斥反应
D. 血清病
E. 结核菌素皮肤试验阳性
[答案] D
[解析] 【正解D】血清病为III型超敏反应(免疫复合物型),非IV型迟发型。【排除】A.接触性皮炎为IV型(DTH由致敏T细胞介导)。B.干酪性肺炎为结核感染表现属IV型(肉芽肿性炎症)。C.移植排斥反应主要由T细胞介导属IV型。E.结核菌素皮肤试验为经典DTH属IV型。
[题目] 765. 属于Ⅳ型超敏反应的疾病是
A. 新生儿溶血症
B. 支气管哮喘
C. 血清病
D. 接触性皮炎
E. 青霉素过敏性休克
[答案] D
[解析] 【正解D】接触性皮炎为典型IV型超敏反应(迟发型),由致敏T细胞识别抗原后释放细胞因子活化巨噬细胞引起局部单个核细胞浸润。【排除】A.新生儿溶血症为II型(抗红细胞IgG抗体+补体)。B.支气管哮喘为I型(IgE/肥大细胞)。C.血清病为III型(免疫复合物沉积)。E.青霉素过敏性休克为I型(IgE介导)。
[题目] 766. 关于Ⅰ型超敏反应皮肤实验，下列哪一项是错误的
A. 一般在15～20min观察结果
B. 注射局部皮肤出现红晕，风团直径＞1cm，皮试为阳性
C. 可于受试者前臂内侧皮内注射
D. 已知引起Ⅰ型超敏反应的变应原
E. 局部大量T细胞浸润
[答案] E
[解析] 【正解E】I型超敏反应皮试以肥大细胞脱颗粒释放组胺引起局部水肿、充血和风团为特征,非大量T细胞浸润(后者为IV型迟发反应的特征)。【排除】A.15-20min观察结果正确(I型速发相)。B.红晕风团>1cm为阳性标准正确。C.前臂内侧皮内注射为正确操作。D.皮试可检测已知I型变应原为正确描述。 
[题目] 767. Ⅱ型超敏反应又称为
A. 迟发型超敏反应
B. 免疫复合物型超敏反应
C. 细胞毒型超敏反应
D. 速发型超敏反应
E. 过敏反应
[答案] C
[解析] 【正解C】II型超敏反应又称细胞毒型超敏反应,核心机制为IgG/IgM抗体结合靶细胞表面抗原后激活补体经典途径形成MAC致靶细胞溶解,或通过FcR+效应细胞(ADCC/调理吞噬)清除靶细胞。【排除】A.迟发型为IV型别名。B.免疫复合物型为III型别名。D.速发型为I型别名。E.过敏反应通常指I型。 
[题目] 768. 关于Rh血型不合导致的新生儿溶血症，下列哪项是错误的
A. 补体参与该病的发生
B. 分娩后72小时内给母体注射抗Rh血清，可成功预防该疾病
C. 母亲在孕育第2胎Rh+胎儿时发生
D. 引起溶血的抗体为新生儿体内IgM抗体
E. 引起溶血的抗体为母体IgG抗体
[答案] D
[解析] 【正解D】引起溶血的抗体是母体抗Rh IgG(唯一能通过胎盘的Ig类型),非新生儿自身IgM(新生儿免疫系统尚未充分应答Rh抗原)。【排除】A.补体参与正确(IgG致敏红细胞激活补体经典途径)。B.72h内给母体注射抗Rh抗体为正确预防措施。C.第二胎或之后发生正确(首次分娩时母体被胎儿Rh+红细胞致敏)。E.母体IgG引起溶血为正确描述。 
[题目] 769. 临床上引起过敏性休克的药物中，最常见的是
A. 链霉素
B. 先锋霉素
C. 维生素B1
D. 青霉素
E. 普鲁卡因
[答案] D
[解析] 【正解D】青霉素降解产物青霉烯酸作为半抗原共价结合体内蛋白形成完全抗原诱导IgE产生,再次暴露时多价抗原交联肥大细胞/嗜碱性粒细胞表面IgE触发脱颗粒导致过敏性休克,是临床最常见的药物过敏性休克原因。【排除】A.链霉素偶可致敏但发生率远低于青霉素。B.先锋霉素与青霉素有交叉过敏但频率较低。C.维生素B1极少引起过敏性休克。E.普鲁卡因(局麻药)也可致敏但频率低于青霉素。 
[题目] 770. 引起皮肤迟发型炎症主要是由于
A. CTL特异杀伤作用
B. 中等大小可溶性IC的沉积
C. C5b-9大量形成
D. TDTH释放大量淋巴因子
E. 肥大细胞脱颗粒
[答案] D
[解析] 【正解D】皮肤迟发型超敏反应(DTH/IV型)主要由TDTH(CD4+Th1)识别抗原后释放大量淋巴因子(IFN-γ/TNF-α/MIF等)募集并活化巨噬细胞,形成以单个核细胞浸润为主的慢性炎症。【排除】A.CTL杀伤参与IV型但非引起炎症的主要机制。B.中等大小IC沉积为III型机制。C.C5b-9(MAC)为补体终末途径,参与II/III型。E.肥大细胞脱颗粒为I型速发相机制。 
[题目] 771. 下列哪些细胞可表达高亲和力的FcεRⅠ
A. 中性粒细胞、肥大细胞
B. 单核细胞、巨噬细胞
C. 中性粒细胞、嗜碱性粒细胞
D. 肥大细胞、嗜碱性粒细胞
E. 嗜酸性粒细胞、嗜碱性粒细胞
[答案] D
[解析] 【正解D】高亲和力FcεRI(Kd约10^-10M)主要表达于肥大细胞和嗜碱性粒细胞表面,单体IgE即可通过Fc段与之牢固结合,多价抗原交联后触发脱颗粒,是I型超敏反应的关键受体和效应细胞。【排除】A.中性粒细胞不表达高亲和力FcεRI。B.单核/巨噬细胞表达低亲和力FcεRII(CD23)。C.中性粒细胞不表达FcεRI。E.嗜酸性粒细胞活化表达FcεRI参与迟发相而非经典脱颗粒。 
[题目] 772. 过敏性鼻炎具有以下特点，除了
A. 具有个体差异
B. 补体参与反应
C. 一般发生快、消退快
D. 患者体内IL-4水平较高
E. 患者体内IgE水平高
[答案] B
[解析] 【正解B】过敏性鼻炎为典型I型超敏反应(IgE介导、肥大细胞脱颗粒),补体不参与I型超敏反应全过程。【排除】A.个体差异存在(特应性体质者易感)。C.I型超敏反应一般发生快、消退也快。D.IL-4促进Th2分化和B细胞IgE类别转换,患者IL-4水平较高。E.患者血清和鼻黏膜局部IgE水平升高。 
[题目] 773. 以下与Ⅱ型超敏反应发生无关的成分是
A. IgM/IgG
B. 补体
C. NK细胞
D. 吞噬细胞
E. T细胞
[答案] E
[解析] 【正解E】II型超敏反应效应阶段由抗体(IgG/IgM)介导,通过激活补体经典途径、ADCC(NK细胞)和调理吞噬(吞噬细胞)引起靶细胞损伤,T细胞不直接参与II型效应机制。【排除】A.IgM/IgG参与II型。B.补体是II型溶细胞机制的核心。C.NK细胞通过FcγRIII(CD16)介导ADCC参与II型。D.吞噬细胞通过FcγR/C3bR介导调理吞噬参与II型。 
[题目] 774. 参与Ⅰ型超敏反应的抗体是
A. IgE
B. IgD
C. IgM
D. IgA
E. IgG
[答案] A
[解析] 【正解A】I型超敏反应(速发型/过敏反应)由IgE抗体介导,IgE Fc段(CH3区)高亲和力结合肥大细胞/嗜碱性粒细胞表面FcεRI,多价抗原交联后触发脱颗粒。【排除】B.IgD主要作为成熟B细胞BCR,不参与超敏反应。C.IgM主要参与II型和III型超敏反应。D.IgA为黏膜免疫抗体,不介导I型。E.IgG参与II型(细胞毒型)和III型(免疫复合物型)超敏反应。 
[题目] 775. 属于Ⅲ型超敏反应的疾病是
A. 新生儿溶血症
B. 输血反应
C. 类Arthus反应
D. 接触性皮炎
E. 过敏性哮喘
[答案] C
[解析] 【正解C】类Arthus反应为局部III型超敏反应典型表现——抗原注射部位形成中等大小免疫复合物沉积于血管壁,激活补体,募集中性粒细胞释放溶酶体酶导致局部出血坏死性炎症。【排除】A.新生儿溶血症为II型(IgG抗红细胞)。B.输血反应为II型。D.接触性皮炎为IV型(T细胞介导)。E.过敏性哮喘为I型(IgE介导)。 
[题目] 776. 参与Ⅲ型超敏反应的成分不包括
A. 中性粒细胞
B. 血小板
C. 肥大细胞
D. IgG
E. Tc细胞
[答案] E
[解析] 【正解E】III型超敏反应由免疫复合物沉积激活补体、诱导肥大细胞释放血管活性胺、募集中性粒细胞和血小板,但Tc细胞(CTL)不参与III型而参与IV型迟发型超敏反应。【排除】A.中性粒细胞是III型主要效应细胞(释放溶酶体酶)。B.血小板参与III型微血栓形成和血管活性胺释放。C.肥大细胞释放血管活性胺促进IC沉积。D.IgG形成免疫复合物是III型始动因素。 
[题目] 777. 免疫复合物病引起血管壁损伤的最主要原因是
A. 中性粒细胞释放的溶酶体酶
B. C2a的形成
C. 细胞毒性T淋巴细胞
D. 细胞因子
E. 组胺和白三烯
[答案] A
[解析] 【正解A】免疫复合物沉积于血管壁后激活补体产生C5a趋化中性粒细胞浸润,中性粒细胞吞噬IC时释放大量溶酶体酶(蛋白水解酶/胶原酶/弹性蛋白酶等)导致血管壁基底膜破坏和周围组织损伤。【排除】B.C2a(补体片段)具有激肽样作用但非主要致损因素。C.CTL为IV型效应细胞。D.细胞因子参与炎症但非主要损伤因素。E.组胺和白三烯主要为I型介质。 
[题目] 778. 关于Ⅱ型超敏反应的描述中，哪项是不正确的
A. 需要补体参与
B. 有致敏T淋巴细胞参与
C. 有巨噬细胞参与
D. 由IgG和IgM介导
E. 有NK细胞参与
[答案] B
[解析] 【正解B】II型超敏反应由抗体(IgG/IgM)介导,效应机制包括补体经典途径活化、ADCC(NK细胞)和调理吞噬(巨噬细胞),无致敏T淋巴细胞直接参与效应阶段(致敏T细胞是IV型的核心效应细胞)。【排除】A.补体参与正确(MAC溶细胞)。C.巨噬细胞参与正确(调理吞噬)。D.IgG和IgM介导正确。E.NK细胞参与正确(ADCC)。 
[题目] 779. 肾上腺素与下列哪种作用无关
A. 松弛平滑肌
B. 可以引起支气管扩张
C. 活化腺苷酸环化酶
D. 使外周毛细血管收缩
E. 减少cAMP的合成
[答案] E
[解析] 【正解E】肾上腺素通过结合β2受体活化腺苷酸环化酶(AC),催化ATP生成cAMP,增加胞内cAMP水平(非减少),从而抑制肥大细胞脱颗粒、松弛支气管平滑肌、收缩外周血管——是I型过敏性休克的一线急救药物。【排除】A.松弛平滑肌正确(支气管/血管平滑肌)。B.支气管扩张正确。C.活化腺苷酸环化酶正确。D.外周毛细血管收缩正确(α1受体激动)。
[题目] 780. 关于Ⅰ型超敏反应的叙述，下列哪项是正确的
A. 由IgG抗体介导
B. 以释放大量细胞因子为特征
C. 只发生在人类
D. 白三烯介导Ⅰ型超敏反应迟发相
E. 24小时反应达到高峰
[答案] D
[解析] 【正解D】白三烯(LTs,特别是半胱氨酰白三烯LTC4/LTD4/LTE4)作为I型超敏反应新合成脂质介质在迟发相(晚期相)发挥主要作用,引起持续性支气管平滑肌痉挛、黏膜水肿和黏液分泌增多。【排除】A.IgG不介导I型(IgE介导)。B.I型特征为肥大细胞脱颗粒释放介质,非"大量细胞因子释放"(后者为IV型特征)。C.多种动物也可发生I型。E.I型速发相在15-30min达高峰,非24h。
[题目] 781. 表达高亲和力的FcεRI的细胞是
A. 肥大细胞、中性粒细胞
B. 中性粒细胞、嗜酸性粒细胞
C. 中性粒细胞、嗜碱性粒细胞
D. 肥大细胞、嗜碱性粒细胞
E. 嗜酸性粒细胞、嗜碱性粒细胞
[答案] D
[解析] 【正解D】高亲和力FcεRI(Kd约10^-10M)特异性表达于肥大细胞和嗜碱性粒细胞,单体IgE即可通过Fc段与之牢固结合,多价抗原交联FcεRI-IgE复合物后触发胞内信号级联导致脱颗粒,释放预合成和新合成的生物活性介质。【排除】A.中性粒细胞不表达FcεRI。B.嗜酸性粒细胞活化后表达FcεRI但参与迟发相而非脱颗粒。C.中性粒细胞不表达FcεRI。E.嗜酸性粒细胞不属经典脱颗粒细胞。
[题目] 782. 下列不属于与补体有关的超敏反应性疾病的是
A. 链球菌感染后肾小球肾炎
B. 自身免疫性溶血性贫血
C. 过敏性血小板减少性紫癜
D. 系统性红斑狼疮(SLE)
E. 支气管哮喘
[答案] E
[解析] 【正解E】支气管哮喘为典型I型超敏反应(IgE/肥大细胞脱颗粒介导),补体不参与其发病全过程。【排除】A.链球菌感染后肾小球肾炎为III型(免疫复合物+补体)。B.自身免疫性溶血性贫血为II型(IgG抗体+补体溶解红细胞)。C.过敏性血小板减少性紫癜为II型(抗血小板抗体+补体)。D.SLE为III型为主(免疫复合物沉积+补体消耗)。
[题目] 783. 血清病中引起和加剧血管损伤的机制不包括
A. 中性粒细胞释放蛋白水解酶
B. 中性粒细胞释放胶原酶酶
C. 中性粒细胞释放弹性纤维酶
D. Tc细胞大量浸润
E. 肥大细胞释放PAF集聚血小板
[答案] D
[解析] 【正解D】血清病为III型超敏反应(免疫复合物型),由异种血清抗原与抗体形成中等大小IC沉积于组织,激活补体产生C5a趋化中性粒细胞浸润并释放溶酶体酶损伤血管。Tc细胞(CTL)不参与III型而参与IV型迟发型超敏反应。【排除】A.中性粒细胞蛋白水解酶参与正确。B.中性粒细胞胶原酶参与正确。C.中性粒细胞弹性纤维酶参与正确。E.肥大细胞释放PAF聚集血小板参与正确(血管活性胺促进IC沉积)。
[题目] 784. 介导Ⅰ型超敏反应的生物活性介质是
A. 磷脂酶D
B. 组胺酶
C. IgE
D. LTs
E. IgG
[答案] D
[解析] 【正解D】LTs(白三烯,包括LTC4/LTD4/LTE4)是I型超敏反应最核心的生物活性介质之一,属于新合成脂质介质,引起支气管平滑肌强烈而持续收缩、血管通透性增加和黏液分泌增多,在迟发相发挥主要作用。【排除】A.磷脂酶D非I型主要介质。B.组胺酶可灭活组胺非介导介质。C.IgE是抗体非"生物活性介质"。E.IgG不参与I型。
[题目] 785. 不属于Ⅳ型超敏反应的现象
A. 肉芽肿
B. 实验性变态反应性脑脊髓炎
C. 移植物排斥反应
D. 化妆品引起的皮炎
E. 特应性皮炎
[答案] E
[解析] 【正解E】特应性皮炎(特应性湿疹/AD)主要为I型超敏反应机制(IgE介导、肥大细胞和Th2参与),不属于IV型迟发型。【排除】A.肉芽肿形成是IV型经典表现(持续抗原刺激巨噬细胞转化为上皮样细胞)。B.实验性变态反应性脑脊髓炎(EAE)为IV型(T细胞攻击髓鞘)。C.移植物排斥反应主要为IV型(T细胞介导)。D.化妆品皮炎为IV型(接触性皮炎,半抗原致敏T细胞)。
[题目] 786. Ⅱ型超敏反应的发生机制是
A. Mϕ直接吞噬靶细胞
B. CTL特异性杀伤靶细胞
C. 补体依赖的细胞毒作用
D. 中性粒细胞释放溶酶体酶
E. 嗜酸性粒细胞介导的ADCC
[答案] C
[解析] 【正解C】II型超敏反应核心效应机制为补体依赖的细胞毒作用(CDC)——IgG/IgM抗体Fab段识别靶细胞表面抗原后Fc段暴露C1q结合位点激活补体经典途径,形成C5b-9(MAC)直接导致靶细胞渗透性溶解。【排除】A.巨噬细胞通过调理吞噬参与但非核心机制。B.CTL杀伤靶细胞为IV型机制。D.中性粒细胞释放溶酶体酶为III型机制。E.嗜酸性粒细胞非II型主要效应细胞。
[题目] 787. 下列哪种疾病的变应原是半抗原
A. 系统性红斑狼疮
B. 农民肺
C. 青霉素治疗后发生的溶血性贫血
D. 风湿性关节炎
E. 对移植肾的排斥反应
[答案] C
[解析] 【正解C】青霉素降解产物(半抗原)吸附于红细胞表面形成新抗原表位,诱导抗青霉素-红细胞复合物IgG抗体产生,结合红细胞后通过补体溶解和调理吞噬导致II型超敏反应性溶血性贫血。【排除】A.SLE为III型为主。B.农民肺为III型(外源性过敏性肺泡炎)。D.风湿性关节炎发病机制涉及分子模拟。E.移植排斥主要为IV型(T细胞介导)。
[题目] 788. 下列哪项不是Ⅱ型超敏反应引起组织或细胞损伤的机制
A. ADCC
B. 抗体的调理吞噬
C. 补体C3b的调理吞噬
D. CTL细胞的杀伤
E. 补体介导的细胞溶解
[答案] D
[解析] 【正解D】CTL(CD8+T细胞)通过穿孔素/颗粒酶途径特异性杀伤靶细胞属于IV型超敏反应机制,不参与II型。【排除】A.ADCC(NK细胞通过FcγRIII)为II型重要机制。B.抗体调理吞噬(巨噬细胞FcγR/C3bR)为II型机制。C.补体C3b调理吞噬为II型间接机制。E.补体介导细胞溶解(MAC形成)为II型核心机制。
[题目] 789. 下面关于接触性皮炎的描述中，正确的是
A. 补体参与
B. 可经血清被动转移
C. 治疗方法是注射抗原
D. 不能采用抗原皮试的方法进行诊断
E. 可由一些半抗原与宿主蛋白结合为完全抗原而引发
[答案] E
[解析] 【正解E】接触性皮炎为IV型超敏反应,其变应原常为小分子化学物质(半抗原,如镍/染发剂/化妆品),与皮肤蛋白共价结合形成完全抗原后被朗格汉斯细胞提呈,致敏T细胞,再次接触时引发迟发型炎症反应。【排除】A.补体不参与IV型。B.IV型可经T细胞被动转移,非血清。C.IV型治疗不采用注射抗原(会加重反应)。D.斑贴试验可用于诊断接触性皮炎(将可疑抗原贴于皮肤观察迟发反应)。
[题目] 790. 关于过敏性哮喘的特点，下列哪项是错误的
A. 肥大细胞与嗜碱性粒细胞参与
B. 发生快
C. 主要抗体是IgE
D. Tc细胞参与
E. 主要表现为生理功能紊乱
[答案] D
[解析] 【正解D】过敏性哮喘为典型I型超敏反应(IgE介导),效应细胞包括肥大细胞、嗜碱性粒细胞(速发相脱颗粒)和嗜酸性粒细胞(迟发相浸润),Tc细胞(CTL/CD8+T)不参与I型超敏反应。【排除】A.肥大细胞和嗜碱性粒细胞参与正确。B.发生快正确(I型速发相)。C.主要抗体为IgE正确。E.主要表现为生理功能紊乱正确(支气管痉挛/呼吸困难等)。
[题目] 791. Ⅰ型超敏反应性疾病的防治原则中不包括
A. 查明变应原，避免接触
B. 给患者输注白蛋白
C. 药物治疗
D. 生物治疗
E. 脱敏治疗
[答案] B
[解析] 【正解B】输注白蛋白为扩容和营养支持措施,与I型超敏反应防治无关。【排除】A.查明变应原并避免接触是最基本的预防原则。C.药物治疗包括抗组胺药/肾上腺素/糖皮质激素等。D.生物治疗包括抗IgE单抗/可溶性IL-4R/IL-12等。E.脱敏治疗(特异性变应原免疫疗法)通过诱导IgG封闭抗体和Treg实现长期疗效。
[题目] 792. 关于T细胞免疫介导的免疫病理损伤，下列哪项是正确的
A. 去除巨噬细胞可以加重损伤
B. 抗组胺药可以抑制
C. 抗CD3 McAb和补体能减轻损伤
D. 去除NK细胞可以加重损伤
E. 去除T淋巴细胞可以加重损伤
[答案] C
[解析] 【正解C】抗CD3单克隆抗体结合T细胞表面CD3分子后通过补体依赖的细胞毒作用和调理吞噬清除T细胞,从而减轻T细胞介导的免疫病理损伤(IV型超敏反应)。【排除】A.去除巨噬细胞可减轻(非加重)损伤(巨噬细胞为IV型效应细胞)。B.抗组胺药仅抑制I型(肥大细胞介质)对IV型无效。D.去除NK细胞不影响IV型(NK细胞非IV型效应细胞)。E.去除T淋巴细胞可减轻(非加重)损伤(T细胞为IV型核心细胞)。
[题目] 793. Ⅲ型超敏反应又称为
A. 细胞溶解型超敏反应
B. 细胞毒型超敏反应
C. 速发型超敏反应
D. 免疫复合物型超敏反应
E. 迟发型超敏反应
[答案] D
[解析] 【正解D】III型超敏反应又称免疫复合物型超敏反应,由中等大小可溶性IC(抗原略多于抗体时约19S)沉积于血管壁和基底膜,激活补体产生C3a/C5a等过敏毒素和趋化因子,募集中性粒细胞释放溶酶体酶所致。【排除】A.细胞溶解型为II型别名。B.细胞毒型为II型别名。C.速发型为I型别名。E.迟发型为IV型别名。
[题目] 794. DTH皮肤试验阳性可能与下列哪种情况有关
A. IgG抗体、抗原和肥大细胞
B. 抗原、抗原致敏的T淋巴细胞和巨噬细胞
C. 抗原抗体复合物、补体和中性粒细胞
D. 抗体、补体和细胞因子
E. 抗原、补体和巨噬细胞
[答案] B
[解析] 【正解B】DTH(迟发型超敏反应/IV型)皮肤试验阳性涉及三个核心成分:特异性致敏T细胞(TDTH/CD4+Th1)识别皮内注入的抗原,释放IFN-γ/TNF-α/MIF等细胞因子,激活和募集巨噬细胞到局部,形成以单个核细胞浸润为主的炎症反应。【排除】A.IgG/肥大细胞涉及I型。C.IC/补体/中性粒细胞涉及III型。D.抗体/补体涉及II型。E.补体不参与IV型。
[题目] 795. 预防Rh血型不合的新生儿溶血症的方法是
A. 用抗Rh血清给新生儿进行人工被动免疫
B. 给胎儿输入母亲的红细胞
C. 用过量的抗原中和母亲的抗Rh球蛋白
D. 用免疫抑制剂抑制母体产生抗Rh抗体
E. 分娩72小时内给产妇注射抗Rh免疫血清
[答案] E
[解析] 【正解E】分娩72小时内给Rh-母亲注射抗Rh(D)免疫球蛋白(RhoGAM),可中和并清除分娩过程中进入母体循环的胎儿Rh+红细胞,阻止母体初次免疫应答产生抗Rh IgG抗体,从而预防下一胎Rh+胎儿发生新生儿溶血症。【排除】A.给新生儿注射无效(胎儿红细胞已在宫内被母体IgG致敏)。B.输入母亲红细胞无效且不合理。C.过量抗原不能中和已产生的抗体。D.免疫抑制剂不能特异性阻断抗Rh抗体产生。
[题目] 796. 同哮喘和湿疹发生无关的遗传因素是
A. 编码FcεRⅠ的基因
B. 编码IL-4的基因
C. 编码IL-12的基因
D. 编码IL-13的基因
E. 编码FcγRⅢ的基因
[答案] E
[解析] 【正解E】哮喘和湿疹(特应性皮炎)均为I型超敏反应,遗传易感基因涉及FcεRI(高亲和力IgE受体)、IL-4/IL-13(Th2分化和IgE类别转换)以及相关趋化因子受体基因,FcγRIII(CD16,IgG低亲和力受体)与I型超敏反应无关。【排除】A.FcεRI基因多态性与特应性体质相关。B.IL-4基因多态性影响IgE产生。C.IL-12基因多态性(非IL-12本身)可影响Th1/Th2平衡。D.IL-13基因多态性与IgE水平和气道高反应性相关。
[题目] 797. 引起Ⅲ型超敏反应的始动因素是
A. 细胞因子
B. 单核吞噬细胞系统
C. 补体
D. 免疫球蛋白
E. 免疫复合物
[答案] E
[解析] 【正解E】III型超敏反应的始动因素是中等大小可溶性免疫复合物(约19S,Ag/Ab约4:1时形成),其不易被单核吞噬系统清除而在血液循环中长期存在,因流体静压和血管通透性增高而沉积于肾小球/关节滑膜/血管壁等部位。【排除】A.细胞因子为后续炎症介质非始动因素。B.单核吞噬系统功能低下可促进IC沉积但非始动因素。C.补体被IC激活后放大炎症。D.免疫球蛋白是形成IC的成分非始动因素。
[题目] 798. 属于Ⅰ型超敏反应的疾病是
A. 新生儿溶血症
B. 系统性红斑狼疮性肾炎
C. 接触性皮炎
D. Graves病
E. 血清过敏性休克
[答案] E
[解析] 【正解E】血清过敏性休克为典型I型超敏反应——首次注射异种血清(如马血清抗毒素)诱导IgE产生并结合于肥大细胞/嗜碱性粒细胞,再次注射时抗原交联FcεRI-IgE复合物触发脱颗粒释放大量组胺等介质,导致毛细血管扩张、血压骤降等休克表现。【排除】A.新生儿溶血症为II型。B.狼疮性肾炎为III型为主。C.接触性皮炎为IV型。D.Graves病为II型(抗体刺激型)。
[题目] 799. Ⅳ型超敏反应可经下列哪种成分被动转移
A. 单核细胞
B. 血清补体
C. 血清Ig
D. T细胞
E. 中性粒细胞
[答案] D
[解析] 【正解D】IV型超敏反应(迟发型)由T细胞介导,可经致敏T淋巴细胞(而非血清)被动转移——这是IV型区别于I-III型(均可经血清抗体转移)的关键特征。将致敏个体的T细胞输注给正常个体后,正常个体接受相同抗原也可出现DTH反应。【排除】A.单核细胞不能转移免疫记忆。B.血清补体不携带特异性免疫信息。C.血清Ig可转移I-III型非IV型。E.中性粒细胞非特异性免疫细胞。
[题目] 800. 发病机制属于Ⅰ型超敏反应的是
A. 结核病
B. 输血反应
C. 肾小球肾炎
D. 花粉症
E. 新生儿溶血症
[答案] D
[解析] 【正解D】花粉症(季节性过敏性鼻炎)为典型I型超敏反应——花粉变应原被鼻黏膜DC摄取后呈递给Th2细胞,IL-4/IL-13驱动B细胞产生特异性IgE,结合于肥大细胞FcεRI,再次吸入花粉时交联触发脱颗粒,释放组胺引起打喷嚏/流涕/鼻塞。【排除】A.结核病为IV型(肉芽肿形成)。B.输血反应为II型(抗体介导红细胞溶解)。C.肾小球肾炎多为III型(IC沉积)。E.新生儿溶血症为II型。
[题目] 801. 下述哪一项不是T细胞介导的超敏反应结果
A. 染发剂所致的剥脱性皮炎
B. 麻风患者肉芽肿的形成
C. 移植排斥反应
D. 结核患者肺空洞形成
E. 青霉素皮试阳性结果
[答案] E
[解析] 【正解E】青霉素皮试阳性为I型超敏反应(IgE/肥大细胞介导的速发型皮试),非T细胞介导的IV型迟发型反应。【排除】A.染发剂所致剥脱性皮炎为IV型(接触性皮炎)。B.麻风患者肉芽肿形成为IV型(持续抗原→巨噬细胞活化→肉芽肿)。C.移植排斥反应主要为IV型(T细胞介导)。D.结核患者肺空洞形成为IV型(DTH/干酪样坏死)。
[题目] 802. 用于Ⅰ型超敏反应性疾病治疗的生物制剂不包括
A. IL-4
B. IL-12
C. 人源化抗IL-4单克隆抗体
D. 可溶性IL-4R
E. 人源化抗IgE单克隆抗体
[答案] A
[解析] 【正解A】IL-4是Th2分化和IgE类别转换的关键促进因子,给予外源性IL-4会加重I型超敏反应而不用于治疗。【排除】B.IL-12促进Th1分化拮抗Th2,可用于I型治疗。C.人源化抗IL-4单抗可中和IL-4减少IgE产生。D.可溶性IL-4R可捕获IL-4阻断其功能。E.人源化抗IgE单抗(Omalizumab)可中和游离IgE阻断FcεRI交联。
[题目] 803. 关于Ⅰ型超敏反应皮肤试验，下列哪一项描述是错误的
A. 一般在15～20分钟观察结果
B. 局部皮肤有丘疹，周围有红晕
C. 组织改变为局部水肿、充血
D. 可检测引起Ⅰ型超敏反应的变应原
E. 可有单个核细胞浸润
[答案] E
[解析] 【正解E】I型超敏反应皮试(速发型)以肥大细胞脱颗粒、局部水肿充血和风团为特征,非单个核细胞(淋巴细胞/巨噬细胞)浸润,后者是IV型(迟发型)皮试特征。【排除】A.15-20min观察为I型皮试正确标准。B.局部丘疹周围红晕为正确描述。C.组织改变为局部水肿充血正确。D.可检测引起I型的变应原正确。
[题目] 804. 与IgE类抗体无关的是
A. 花粉症
B. 血清过敏症
C. 变态反应性鼻炎
D. 赫氏反应
E. 青霉素皮肤试验阳性
[答案] D
[解析] 【正解D】赫氏反应(Jarisch-Herxheimer反应)为抗生素(如青霉素)治疗梅毒后螺旋体大量裂解释放内毒素样物质引发全身性炎症反应,与IgE及超敏反应无关,属内毒素介导的非免疫性反应。【排除】A.花粉症为I型(IgE介导)。B.血清过敏症为I型(IgE介导)。C.变态反应性鼻炎为I型(IgE介导)。E.青霉素皮试阳性为I型(IgE介导)。
[题目] 805. 引起迟发型皮肤试验阳性的相关物质是
A. 抗原、抗体与补体
B. 沉积的免疫复合物
C. 淋巴因子和补体
D. 特异性TDTH及释放的细胞因子
E. 抗原、NK细胞
[答案] D
[解析] 【正解D】迟发型(DTH/IV型)皮肤试验阳性由特异性TDTH(CD4+Th1)细胞识别皮内注入抗原后释放IFN-γ/TNF-α/MIF/IL-3/GM-CSF等细胞因子,趋化并活化大量巨噬细胞到局部,通过释放溶酶体酶和活性氧引起组织损伤形成硬结和红斑。【排除】A.抗体和补体参与II型/III型。B.沉积IC为III型机制。C.补体不参与IV型。E.NK细胞非IV型效应细胞。
[题目] 806. 下列哪种细胞不参与Ⅰ型超敏反应
A. Tc细胞
B. 肥大细胞
C. 嗜碱性粒细胞
D. B细胞
E. 嗜酸性粒细胞
[答案] A
[解析] 【正解A】Tc细胞(CD8+CTL)是IV型超敏反应效应细胞,通过穿孔素/颗粒酶杀伤靶细胞,不参与I型超敏反应(速发型)。【排除】B.肥大细胞为I型核心效应细胞(脱颗粒)。C.嗜碱性粒细胞为I型效应细胞(表达FcεRI)。D.B细胞产生IgE是I型致敏阶段关键细胞。E.嗜酸性粒细胞参与I型迟发相浸润和炎症维持。
[题目] 807. 一般不引起Ⅰ型超敏反应的物质是
A. 尘螨
B. 青霉素
C. 鱼、虾
D. 动物皮屑
E. 结核菌素
[答案] E
[解析] 【正解E】结核菌素(PPD)为结核杆菌纯化蛋白衍生物,注入已致敏个体后由特异性TDTH细胞识别引发IV型迟发型超敏反应(DTH),一般不引起I型速发型超敏反应。【排除】A.尘螨是常见吸入性I型变应原(过敏性鼻炎/哮喘)。B.青霉素可作为半抗原引发I型(过敏性休克)。C.鱼虾是常见食物性I型变应原(荨麻疹)。D.动物皮屑为常见吸入性I型变应原。
[题目] 808. 速发型超敏反应中引起皮肤奇痒的物质是
A. 前列腺素
B. 白三烯
C. 组胺
D. 激肽
E. 嗜酸性粒细胞趋化因子(ECF)
[答案] C
[解析] 【正解C】组胺是I型超敏反应速发相最主要介质(预存于肥大细胞/嗜碱性粒细胞颗粒中),通过结合H1受体刺激皮肤感觉神经末梢引起剧烈瘙痒,扩张毛细血管和小静脉导致红斑和风团形成。【排除】A.前列腺素参与I型引起血管扩张和疼痛但非主要致痒介质。B.白三烯参与迟发相(持续性支气管收缩)。D.激肽引起血管扩张和疼痛但非主要致痒介质。E.ECF趋化嗜酸性粒细胞参与迟发相。
[题目] 809. 与Ⅱ型超敏反应发生无关的是
A. 补体
B. 吞噬细胞
C. 肥大细胞
D. IgG
E. IgM
[答案] C
[解析] 【正解C】肥大细胞表面表达FcεRI参与I型超敏反应(脱颗粒),不参与II型超敏反应。【排除】A.补体为II型核心效应机制(经典途径→MAC溶细胞)。B.吞噬细胞通过FcγR/C3bR介导调理吞噬参与II型。D.IgG为II型主要介导抗体(CDC/ADCC)。E.IgM为II型介导抗体(高效激活补体)。
[题目] 810. 关于金属镍引起的皮肤过敏反应，下列哪种描述是正确的
A. 可用P-K试验诊断
B. 由嗜碱性粒细胞的浸润引起
C. 是由IgE介导
D. 是由对镍和蛋白复合物致敏的T细胞引起
E. 可用组胺拮抗药进行有效治疗
[答案] D
[解析] 【正解D】金属镍(半抗原)穿透皮肤后与自身蛋白共价结合形成镍-蛋白完全抗原,被皮肤朗格汉斯细胞摄取提呈给T细胞致敏,再次接触时特异性T细胞释放细胞因子引发IV型迟发型接触性皮炎。【排除】A.P-K试验用于检测I型(IgE介导)非IV型,斑贴试验用于诊断接触性皮炎。B.浸润主要为淋巴细胞和巨噬细胞(单个核细胞)非嗜碱性粒细胞。C.非IgE介导。E.组胺拮抗药对IV型无效。
[题目] 811. 不参与Ⅳ型超敏反应发生的成分是
A. CD4+T细胞
B. 巨噬细胞
C. 细胞因子
D. CD8+T细胞
E. 补体
[答案] E
[解析] 【正解E】IV型超敏反应(DTH/迟发型)由T细胞(CD4+Th1/TDTH和CD8+CTL)、巨噬细胞和多种细胞因子(IFN-γ/TNF-α/IL-2/MIF等)介导,补体不参与IV型全过程。【排除】A.CD4+T细胞参与IV型(TDTH)。B.巨噬细胞为IV型主要效应细胞。C.细胞因子介导IV型炎症。D.CD8+T细胞参与IV型(CTL杀伤靶细胞)。
[题目] 812. 能使胎儿Rh+红细胞发生溶解破坏的抗体是
A. IgM
B. IgA
C. IgD
D. IgG
E. IgE
[答案] D
[解析] 【正解D】IgG是唯一能通过胎盘(FcRn介导主动转运)进入胎儿循环的Ig类型,母体产生的抗Rh(D)IgG经胎盘进入Rh+胎儿体内,与胎儿红细胞表面Rh抗原结合,通过补体和ADCC导致红细胞溶解破坏。【排除】A.IgM为五聚体不能通过胎盘(天然IgM未接触过Rh抗原)。B.IgA不能通过胎盘。C.IgD不能通过胎盘。E.IgE不介导II型且不能通过胎盘。
[题目] 813. 下列超敏反应性疾病的发生没有补体参与的是
A. 溶血性贫血
B. 花粉症
C. 肾小球肾炎
D. 血清病
E. 血小板减少性紫癜
[答案] B
[解析] 【正解B】花粉症(过敏性鼻炎)为I型超敏反应(IgE/肥大细胞脱颗粒介导),补体不参与I型全过程。【排除】A.溶血性贫血为II型(抗体+补体溶解红细胞)。C.肾小球肾炎多为III型(IC沉积+补体活化)。D.血清病为III型(IC沉积+补体)。E.血小板减少性紫癜为II型(抗体+补体/调理吞噬破坏血小板)。
[题目] 814. 下列哪项属于Ⅲ型超敏反应性疾病
A. Graves病
B. 特应性皮炎
C. 重症肌无力
D. 血清病
E. 肺出血肾炎综合征
[答案] D
[解析] 【正解D】血清病是典型的III型超敏反应性疾病——注入大量异种血清后约7-14天,机体产生抗异种血清抗体,与循环中残余抗原形成中等大小IC沉积于血管壁/肾小球/关节等部位,激活补体募集中性粒细胞所致。【排除】A.Graves病为II型(抗TSHR刺激性抗体)。B.特应性皮炎为I型(IgE介导)。C.重症肌无力为II型(抗AChR阻断性抗体)。E.肺出血肾炎综合征为II型(抗基底膜IV型胶原抗体)。
[题目] 815. 下列与免疫复合物型疾病发生无关的因素是
A. 血管活性物质的释放
B. 免疫复合物在血管壁沉积
C. 激活补体活化产生大量C3a、C5a
D. 大量免疫复合物形成
E. 大量淋巴细胞局部浸润
[答案] E
[解析] 【正解E】III型超敏反应病理特征为中性粒细胞浸润为主的急性坏死性血管炎,非大量淋巴细胞浸润(后者为IV型特征)。【排除】A.血管活性胺释放促进IC沉积正确。B.IC在血管壁沉积为III型核心环节正确。C.补体活化产生C3a/C5a正确。D.大量IC形成是III型前提正确。
[题目] 816. 重症肌无力的自身抗原是
A. 平滑肌
B. 乙酰胆碱受体
C. 胰岛素受体
D. 细胞核
E. 血小板
[答案] B
[解析] 【正解B】重症肌无力(MG)的自身抗原是神经肌肉接头突触后膜上的乙酰胆碱受体(AChR,主要为烟碱型),抗AChR IgG抗体与AChR结合后阻断乙酰胆碱结合、加速AChR交联内化和补体介导的突触后膜破坏,导致神经肌肉信号传递障碍和骨骼肌无力。【排除】A.平滑肌非MG靶抗原。C.胰岛素受体与胰岛素抵抗相关非MG。D.细胞核为SLE靶抗原。E.血小板为ITP靶抗原。
[题目] 817. 下列哪项因素不是导致Ⅲ型超敏反应免疫复合物清除能力降低、免疫复合物沉积的原因
A. 免疫复合物的量过大
B. 血管内形成涡流
C. 血管通透性降低
D. 吞噬细胞缺陷
E. 血管内高压
[答案] C
[解析] 【正解C】血管通透性降低不利于免疫复合物沉积——血管通透性增加(肥大细胞释放血管活性胺等介导)才是促进IC向血管壁外渗和沉积的关键因素。【排除】A.IC量过大超出清除能力促进沉积正确。B.血管内涡流(湍流部位如分叉处)促进IC沉积正确。D.吞噬细胞功能缺陷导致IC清除障碍正确。E.血管内高压(肾小球毛细血管)促进IC沉积正确。
[题目] 818. 下列关于Rh血型不符引发的新生儿溶血症的描述，正确的是
A. IgG抗体造成母亲的Rh+RBC溶解
B. IgG抗体造成胎儿Rh+RBC溶解
C. IgM抗体造成Rh+RBC溶解
D. 抗体是天然IgM
E. IgE引起
[答案] B
[解析] 【正解B】Rh血型不符引发的新生儿溶血症中,母体(IgG型抗Rh抗体)通过胎盘进入胎儿循环,与胎儿Rh+红细胞结合,通过补体经典途径(MAC)和调理吞噬导致红细胞溶解破坏,胎儿出生后表现为黄疸和贫血。【排除】A.母体红细胞的Rh抗原型与母体自身抗体不会互相反应。C.IgM不能通过胎盘且非Rh不符溶血症的致病抗体。D.抗Rh抗体是免疫性IgG而非天然IgM。E.IgE不参与II型。
[题目] 819. Ⅰ型超敏反应可通过下列哪种成分被动转移
A. T细胞
B. 患者的血清
C. 特异性转移因子
D. 生物活性介质
E. 特异性IgE形成细胞
[答案] B
[解析] 【正解B】I型超敏反应可通过患者血清(含特异性IgE抗体)被动转移给正常个体——Prausnitz-Kustner(P-K)试验即为将过敏患者血清皮内注射至正常受试者,24h后同部位注射变应原出现速发型风团反应。【排除】A.T细胞可转移IV型非I型。C.转移因子可转移特异性DTH非I型。D.生物活性介质半衰期极短无法转移。E.特异性IgE形成细胞不能直接转移。
[题目] 820. 不属于Ⅰ型超敏反应预合成介质的是
A. 组胺
B. 蛋白水解酶
C. 激肽原酶
D. 嗜酸性粒细胞趋化因子
E. PAF
[答案] E
[解析] 【正解E】PAF(血小板活化因子)是I型超敏反应中新合成的脂质介质(膜磷脂经PLA2和乙酰转移酶途径合成),不属于预合成并储存于颗粒中的介质。【排除】A.组胺为预合成介质(组氨酸脱羧生成后储存于颗粒)。B.蛋白水解酶为预合成介质(储存于颗粒中)。C.激肽原酶为预合成介质(储存于颗粒中)。D.ECF为预合成介质(储存于颗粒中)。
[题目] 821. 迟发型超敏反应的组织病理学特点为
A. 小血管扩张、水肿
B. 单个核细胞浸润
C. 嗜酸性粒细胞浸润
D. 中性粒细胞浸润
E. 小血管壁内外IC沉积
[答案] B
[解析] 【正解B】迟发型超敏反应(IV型/DTH)的组织病理学特征为单个核细胞(淋巴细胞和巨噬细胞)浸润为主的慢性炎症反应,形成肉芽肿时为上皮样细胞和多核巨细胞包裹的结节性病变。【排除】A.小血管扩张水肿为I型速发相特征。C.嗜酸性粒细胞浸润为I型迟发相特征。D.中性粒细胞浸润为III型(IC沉积)特征。E.小血管壁IC沉积为III型特征。
[题目] 822. Ⅰ型超敏反应迟发相中浸润的细胞不包括
A. 嗜酸性粒细胞
B. 中性粒细胞
C. 巨噬细胞
D. Th2细胞
E. Tc细胞
[答案] E
[解析] 【正解E】I型超敏反应迟发相(晚期相,4-24h达高峰)浸润细胞主要为嗜酸性粒细胞(标志性)、中性粒细胞、Th2细胞和少量巨噬细胞,Tc细胞(CD8+CTL)不参与I型迟发相。【排除】A.嗜酸性粒细胞为迟发相标志性浸润细胞正确。B.中性粒细胞参与迟发相正确。C.巨噬细胞参与迟发相正确(少量)。D.Th2细胞产生IL-4/IL-5/IL-13参与迟发相正确。
[题目] 823. 下述未参与Ⅳ型超敏反应的是
A. 补体
B. T细胞
C. 巨噬细胞
D. 淋巴因子
E. 单核因子
[答案] A
[解析] 【正解A】补体不参与IV型超敏反应(DTH/细胞介导型),IV型核心参与者为特异性致敏T细胞(CD4+TDTH和CD8+CTL)、巨噬细胞(主要效应细胞)以及淋巴因子(IFN-γ/TNF-α/MIF/IL-2等)和单核因子(IL-1/TNF-α等)。【排除】B.T细胞参与正确。C.巨噬细胞参与正确。D.淋巴因子参与正确。E.单核因子参与正确。
[题目] 824. 关于Ⅲ型超敏反应的特点，下列哪项是错误的
A. 由IgG和IgM介导
B. 有补体参与
C. 为中性粒细胞浸润为主的炎症
D. Ag、Ab在血液循环中形成中等大小免疫复合物
E. 发生快，消退也快
[答案] E
[解析] 【正解E】III型超敏反应(免疫复合物型)发生和消退均不如I型速发型迅速——I型在接触变应原后数分钟至半小时内发生、消退也快,而III型因需Ag/Ab形成中等大小可溶性IC沉积于组织→激活补体→趋化并活化中性粒细胞→释放溶酶体酶,常在接触抗原后数天至数周才发病,病程迁延较久,非"发生快消退也快"。【排除】A.IgG/IgM介导正确。B.补体参与正确(IC激活补体经典途径)。C.中性粒细胞浸润为主正确(III型特征)。D.Ag/Ab在血循环中形成中等大小IC正确。
[题目] 825. 临床常见的可引起Ⅰ型超敏反应的半抗原不包括
A. 青霉素
B. 磺胺
C. 破伤风抗毒素
D. 普鲁卡因
E. 安替比林
[答案] C
[解析] 【正解C】破伤风抗毒素(马血清制剂)为异种蛋白,属于完全抗原(蛋白质大分子可直接被免疫系统识别并诱导抗体产生),非半抗原。半抗原为小分子化学物质(分子量通常<1000Da)单独不能诱导免疫应答。【排除】A.青霉素降解产物为半抗原。B.磺胺为半抗原。D.普鲁卡因为半抗原。E.安替比林为半抗原。
[题目] 826. 异种免疫血清脱敏治疗可用于预防
A. 冷空气过敏
B. 食物过敏
C. 血清病
D. 接触性皮炎
E. 血清过敏性休克
[答案] E
[解析] 【正解E】异种免疫血清脱敏治疗(少量多次皮下注射递增剂量)通过逐步消耗致敏肥大细胞/嗜碱性粒细胞上结合的IgE,并诱导特异性IgG封闭抗体产生,用于预防血清过敏性休克(I型超敏反应)。【排除】A.冷空气过敏为物理性荨麻疹非血清脱敏适应症。B.食物过敏首选避免接触。C.血清病为III型(IC沉积)脱敏治疗无效。D.接触性皮炎为IV型脱敏治疗无效。
[题目] 827. 关于DTH反应的特点，以下哪种描述是正确的
A. 可经血清被动转移
B. 抗体可以增强其反应
C. 依赖于T细胞
D. 去除补体后，可以增强其发病程度
E. 去除巨噬细胞，可以增强其发病程度
[答案] C
[解析] 【正解C】DTH(迟发型超敏反应/IV型)完全依赖于T细胞(CD4+TDTH和CD8+CTL)介导,去除T细胞后DTH反应消失,可经致敏T细胞被动转移。【排除】A.DTH可经T细胞非血清被动转移(IV型区别于I-III型的关键)。B.抗体不能增强DTH(IV型为细胞免疫非体液免疫)。D.补体不参与IV型,去除补体不影响DTH。E.去除巨噬细胞会减轻(非增强)发病程度(巨噬细胞为IV型效应细胞)。
[题目] 828. 不属于Ⅱ型超敏反应疾病的是
A. 自身免疫性溶血性贫血
B. 输血反应
C. 肺出血-肾炎综合征
D. 接触性皮炎
E. 新生儿溶血症
[答案] D
[解析] 【正解D】接触性皮炎为IV型超敏反应(T细胞/迟发型),非II型(细胞毒型/抗体介导)。【排除】A.自身免疫性溶血性贫血为II型(抗红细胞抗体+补体)。B.输血反应为II型(同种抗体介导红细胞溶血)。C.肺出血-肾炎综合征为II型(抗基底膜IV型胶原抗体)。E.新生儿溶血症为II型(母体IgG抗胎儿红细胞)。
[题目] 829. Ⅲ型超敏反应的重要病理学特征是
A. 巨噬细胞浸润
B. 淋巴细胞浸润
C. 嗜酸性粒细胞浸润
D. 中性粒细胞浸润
E. 红细胞浸润
[答案] D
[解析] 【正解D】III型超敏反应的重要病理学特征是中性粒细胞浸润为主的急性坏死性血管炎——IC沉积后激活补体产生C5a趋化中性粒细胞到沉积部位,中性粒细胞吞噬IC过程中释放大量溶酶体酶(蛋白水解酶/胶原酶/弹性蛋白酶)导致血管壁和周围组织坏死。【排除】A.巨噬细胞浸润为IV型特征。B.淋巴细胞浸润为IV型特征。C.嗜酸性粒细胞浸润为I型迟发相特征。E.红细胞浸润非超敏反应特征。
[题目] 830. 关于特点Ⅰ型超敏反应描述不正确的是
A. 发生快，消退亦快，为不可逆反应
B. 由IgE抗体介导
C. 主要病变在小动脉
D. 有遗传背景
E. 补体不参与反应
[答案] A
[解析] 【正解A】I型超敏反应虽然"发生快、消退快",但本质为可逆性反应(非"不可逆反应")——脱离变应原后或经及时抗组胺药/肾上腺素等治疗,肥大细胞释放的组胺被组胺酶(N-甲基转移酶/二胺氧化酶)快速代谢,LTs/PGD2等介质半衰期短,病变可完全恢复不留永久性组织损伤。【排除】B.IgE抗体介导正确。C.主要病变在小动脉(毛细血管后微静脉)正确。D.有遗传背景(特应性体质)正确。E.补体不参与I型正确。
[题目] 831. 关于青霉素皮肤试验的叙述，下列哪项是错误的
A. 一般在15～30分钟观察结果
B. 注射局部出现红晕，风团直径＞1cm为阳性
C. 注射局部水肿、充血
D. 皮试阳性提示受试者对青霉素处于过敏状态
E. 注射局部大量单个核细胞浸润
[答案] E
[解析] 【正解E】青霉素皮肤试验为I型超敏反应(速发型皮试),以局部肥大细胞脱颗粒引起水肿、充血和风团为特征,非单个核细胞浸润(单个核细胞浸润是IV型迟发型皮试的特征,如PPD试验48-72h观察)。【排除】A.15-30min观察为一正确。B.红晕风团>1cm阳性标准正确。C.局部水肿充血正确。D.阳性提示受试者对青霉素处于致敏状态正确。
[题目] 832. 接触性皮炎中以下哪种说法不正确
A. 其发生与IL-2有密切关系
B. 可由小分子化学物质引起
C. 通常在接触变应原后迅速出现
D. 局部以单个核细胞浸润为主
E. 其发生与IFN-γ和TNF-α有密切关系
[答案] C
[解析] 【正解C】接触性皮炎为典型IV型迟发型超敏反应(DTH),再次接触变应原后局部皮肤中特异性记忆T细胞(Th1/Tc)需经24-72h才能被活化→释放IFN-γ/TNF-α/MIF等→募集循环单核细胞分化为巨噬细胞→浸润表皮真皮交界处形成以单个核细胞浸润为主的湿疹样皮炎,因此"迅速出现"错误——此迟发特征是与I型速发型的重要鉴别点。【排除】A.IL-2参与IV型(DTH中T细胞增殖活化)正确。B.小分子化学物质(半抗原→完全抗原)可引起正确。D.局部单个核细胞浸润为主正确(IV型特征)。E.IFN-γ和TNF-α参与IV型正确(Th1主要细胞因子)。
[题目] 833. 下列不属于免疫复合物病的是
A. 自身免疫性溶血性贫血
B. 链球菌感染后肾小球肾炎
C. 血清病
D. 血管炎
E. Arthus反应
[答案] A
[解析] 【正解A】自身免疫性溶血性贫血为II型超敏反应(抗红细胞自身抗体IgG/IgM直接介导红细胞通过补体溶解和调理吞噬破坏),不属于免疫复合物病(III型)。免疫复合物病以IC在组织中沉积为特征。【排除】B.链球菌感染后肾小球肾炎为III型(IC沉积于肾小球基底膜)。C.血清病为III型(异种血清IC沉积)。D.血管炎可为III型(IC沉积于血管壁)。E.Arthus反应为III型(局部IC沉积)。
[题目] 834. 与类Arthus反应发生无关的成分是
A. 血小板
B. IgG或IgM
C. 补体
D. 中性粒细胞
E. Tc细胞
[答案] E
[解析] 【正解E】类Arthus反应为局部III型超敏反应——抗原注射部位形成IC沉积于血管壁,激活补体产生C5a趋化中性粒细胞,血小板参与微血栓形成和释放血管活性胺,Tc细胞(CD8+CTL)不参与III型超敏反应。【排除】A.血小板参与正确(释放PAF/血管活性胺)。B.IgG或IgM形成IC正确。C.补体被IC激活正确。D.中性粒细胞为III型主要效应细胞正确。
[题目] 835. Ⅰ型超敏反应性炎症迟发相以哪种细胞浸润为主
A. 嗜酸性粒细胞
B. 肥大细胞
C. 单核细胞
D. T淋巴细胞
E. 中性粒细胞
[答案] A
[解析] 【正解A】I型超敏反应迟发相(晚期相,刺激后4-24h达高峰)以嗜酸性粒细胞浸润为主(Eotaxin和ECF趋化),同时伴有CD4+Th2细胞和少量中性粒细胞/巨噬细胞浸润,嗜酸性粒细胞释放MBP/ECP等进一步加重组织损伤和慢性炎症。【排除】B.肥大细胞定居于组织非浸润细胞。C.单核细胞非I型迟发相主要浸润细胞。D.T淋巴细胞非I型迟发相主要浸润细胞(少量Th2)。E.中性粒细胞少量浸润非主要细胞。
[题目] 836. Ⅳ型超敏反应又称为
A. 迟发型超敏反应
B. 速发型超敏反应
C. 细胞毒型超敏反应
D. 免疫复合物型超敏反应
E. 细胞溶解型超敏反应
[答案] A
[解析] 【正解A】IV型超敏反应又称迟发型超敏反应(DTH,Delayed Type Hypersensitivity),由T细胞介导,再次接触抗原后24-72小时才达到反应高峰,区别于I型速发型(数分钟内发生)。【排除】B.速发型为I型别名。C.细胞毒型为II型别名。D.免疫复合物型为III型别名。E.细胞溶解型为II型别名。
[题目] 837. 关于Ⅱ型超敏反应的特点，下列哪项是错误的
A. 需要补体参与
B. 有致敏淋巴细胞参与
C. 需要Mφ和NK细胞参与
D. 一般引起靶细胞溶解
E. 由IgG和IgM介导
[答案] B
[解析] 【正解B】II型超敏反应效应阶段由抗体(IgG/IgM)介导,通过补体经典途径、ADCC和调理吞噬清除靶细胞,无致敏T淋巴细胞直接参与(致敏T淋巴细胞是IV型超敏反应的核心效应细胞)。【排除】A.补体参与正确(CDC)。C.巨噬细胞和NK细胞参与正确(ADCC/调理吞噬)。D.靶细胞溶解正确。E.IgG和IgM介导正确。
[题目] 838. 与Ⅰ型超敏反应的新合成介质无关的是
A. 环氧合酶
B. PGD2
C. PAF
D. LTs
E. 组胺
[答案] E
