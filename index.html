[解析] 【正解D】"体现在Tc细胞活化中的限制性"错误——Tc细胞（CD8+CTL）活化中体现的是MHC-I类分子限制性（识别MHC-I-肽复合物），而非MHC-II类分子限制性。MHC-II类分子限制性体现在Th细胞（CD4+辅助T细胞）活化中。【排除】A.MHC-II类分子分布在APC表面，正确。B.MHC-II类分子由HLA-DP、DQ、DR编码，正确。C.MHC-II类分子限制性体现在Th细胞活化中，正确。E.T细胞激活后可表达MHC-II类分子，正确。
[题目] 337. 可提呈外源性抗原的细胞是
A. CD4+T细胞
B. CD8+T细胞
C. 表达MHCⅠ类分子的细胞
D. 表达MHCⅡ类分子的细胞
E. 表达MHCⅢ类分子的细胞
[答案] D
[解析] 【正解D】表达MHC-II类分子的细胞（专职APC：树突状细胞、巨噬细胞和B细胞）可提呈外源性抗原给CD4+T细胞识别。外源性抗原被APC吞噬或内吞后，在吞噬溶酶体/内体中被降解为肽段，与MHC-II类分子结合后提呈至APC表面。【排除】A.CD4+T细胞不表达MHC-II类分子（除活化后少量表达），非专职APC。B.CD8+T细胞不提呈外源性抗原。C.表达MHC-I类分子的细胞提呈内源性抗原。E.MHC-III类分子不参与抗原提呈。
[题目] 338. 与强直性脊柱炎密切相关的HLA分子是
A. HLA-A5分子
B. HLA-B8分子
C. HLA-B7分子
D. HLA-B27分子
E. HLA-DR3分子
[答案] D
[解析] 【正解D】HLA-B27与强直性脊柱炎（ankylosing spondylitis，AS）高度相关，是MHC与疾病关联的最经典例子之一，相对风险（RR）超过100。约90-95%的强直性脊柱炎患者为HLA-B27阳性，而正常人群中的阳性率仅约5-8%。其致病机制尚不完全清楚，可能与HLA-B27提呈特定致病抗原肽或HLA-B27重链异常折叠等有关。【排除】A/B/C/E.均与强直性脊柱炎无强关联。B5与白塞病相关，B8与多种自身免疫病相关，DR3与1型糖尿病、SLE等相关。
[题目] 339. APC呈递外源性抗原的关键性分子是
A. MHC-I类分子
B. CD1分子
C. MHC-Ⅱ类分子
D. 粘附分子
E. MHC-Ⅲ类分子
[答案] C
[解析] 【正解C】MHC-II类分子是APC提呈外源性抗原给CD4+T细胞的关键性分子。外源性抗原经APC摄取、加工处理后以抗原肽-MHC-II类分子复合物的形式表达于APC表面，被CD4+T细胞的TCR识别并激活Th细胞。【排除】A.MHC-I类分子提呈内源性抗原给CD8+T细胞。B.CD1分子提呈脂类/糖脂类抗原给NKT细胞。D.粘附分子提供共刺激/辅助信号，非抗原提呈关键分子。E.MHC-III类分子不参与抗原提呈。
[题目] 340. 一般来说，与靶细胞呈递内源性抗原有关的分子是
A. MHC-I类分子
B. MHC-Ⅱ类分子
C. CD1分子
D. 粘附分子
E. MHC-Ⅲ类分子
[答案] A
[解析] 【正解A】MHC-I类分子与靶细胞提呈内源性抗原（细胞内合成的蛋白质抗原，如病毒蛋白、肿瘤抗原）有关。内源性抗原经蛋白酶体降解后由TAP转运至内质网，与MHC-I类分子结合后表达于所有有核细胞表面，供CD8+CTL的TCR识别和杀伤。【排除】B.MHC-II类分子提呈外源性抗原。C.CD1分子提呈脂类抗原。D.粘附分子参与细胞间粘附和共刺激。E.MHC-III类分子不参与抗原提呈。
[题目] 341. 下列细胞间相互作用时受MHC-Ⅱ类分子限制的是
A. NK细胞杀伤肿瘤细胞
B. APC呈递抗原给Th细胞
C. Mφ吞噬靶细胞 C.Tc细胞杀伤靶细胞 E.B淋巴细胞识别外来抗原
[答案] B
[解析] 【正解B】APC（表达MHC-II类分子）向Th细胞（CD4+T细胞，TCR识别MHC-II-肽复合物）提呈外源性抗原时，细胞间的相互作用受MHC-II类分子限制——Th细胞的TCR必须在识别抗原肽的同时识别自身MHC-II类分子才能被活化。这是MHC-II类限制性的经典体现。【排除】A.NK细胞杀伤肿瘤不受MHC-II类分子限制。C.选项中包含Tc细胞杀伤靶细胞（受MHC-I类限制）和Mφ吞噬（不受MHC限制）。E.B细胞通过BCR直接识别外来抗原，不受MHC限制。
[题目] 342. HLA I类分子肽结合槽可容纳
A. 6～8个氨基酸残基
B. 8～10个氨基酸残基
C. 10～12个氨基酸残基
D. 12～14个氨基酸残基
E. 14～16个氨基酸残基
[答案] B
[解析] 【正解B】HLA-I类分子的肽结合槽由α1和α2结构域构成，N端和C端封闭，通常容纳8-10个氨基酸残基的短肽。I类分子肽结合槽封闭结构的特点使得肽段长度受到严格限制，锚定残基多位于肽的N端和C端。【排除】A.6-8aa偏短（部分非经典I类分子可容纳更短肽段，但经典I类以8-10aa为主）。C/D/E.10-16aa为II类分子容纳的肽段长度。
[题目] 343. APC细胞与T细胞之间相互作用受II类分子限制的是
A. 病毒感染细胞与Th细胞
B. 病毒感染细胞与Tc细胞
C. 单核-巨噬细胞与Th细胞
D. 肿瘤细胞与Th细胞
E. 肿瘤细胞与Tc细胞
[答案] C
[解析] 【正解C】单核-巨噬细胞作为专职APC表达MHC-II类分子，通过吞噬/内吞摄取外源性抗原（如细菌），经加工后以抗原肽-MHC-II类分子复合物的形式提呈给Th细胞（CD4+T细胞），此相互作用受MHC-II类分子限制。【排除】A.病毒感染细胞与Th细胞的相互作用中，通常需要DC交叉提呈而非直接MHC-II限制性相互作用。B.病毒感染细胞与Tc细胞受MHC-I类限制。D.肿瘤细胞通常不表达MHC-II类分子。E.肿瘤细胞与Tc细胞受MHC-I类限制。
[题目] 344. 静止T淋巴细胞表达哪类MHC分子
A. 只表达MHC-I类分子
B. 只表达MHC-Ⅱ类分子
C. 同时表达MHC-I、Ⅱ类分子
D. 同时表达MHC-I、Ⅲ类分子
E. 同时表达MHC-Ⅱ、Ⅲ类分子
[答案] A
[解析] 【正解A】静止（静息）T淋巴细胞仅表达MHC-I类分子（几乎所有有核细胞均组成性表达MHC-I类分子），不表达MHC-II类分子。T细胞被活化后（受到抗原刺激或细胞因子作用），诱导MHC-II类分子基因转录和表达，成为MHC-I+II+双阳性。【排除】B.静止T细胞不表达MHC-II类分子。C.静止T细胞仅表达I类分子。D.静止T细胞不表达MHC-III类分子。E.静止T细胞不表达II类和III类分子。
[题目] 345. 关于MHC限制性的叙述正确的是
A. 是指TCR在识别抗原肽的同时必须识别自身MHC分子
B. Tc-靶细胞、Mφ-靶细胞间相互作用受MHC-I类分子限制
C. APC-Th、Th-B间相互作用受MHC-Ⅱ类分子限制
D. T淋巴细胞在胸腺内经过阴性选择获得MHC限制性
E. T淋巴细胞在识别同种属细胞的非己MHC抗原时也受MHC限制
[答案] A
[解析] 【正解A】MHC限制性的核心含义是：T细胞（通过TCR）在识别抗原肽的同时，必须识别自身的MHC分子（即T细胞仅识别"自身MHC+抗原肽"复合物），对仅表达"非己MHC+相同抗原肽"的靶细胞无应答。这种限制性是T细胞在胸腺阳性选择中获得的特性。【排除】B.Tc-靶细胞间受MHC-I类限制，Mφ-靶细胞不受MHC限制。C.Th-B间相互作用受MHC-II类限制，但APC-Th间也受II类限制，表述不完整。D.T细胞在胸腺阳性选择中获得MHC限制性，非阴性选择（阴性选择获得自身耐受）。E.T细胞识别同种异体MHC时可直接识别（直接识别），不严格受自身MHC限制。
[题目] 346. 非经典的I类基因位于
A. HLA-DO座位
B. HLA-A、B、
C. 座位 C. HLA-E、F、G座位
D. HLA-DM座位
E. HLA-DP、DQ、DR座位
[答案] C
[解析] 【正解C】非经典MHC-I类基因（亦称Ib类基因）包括HLA-E、F、G三个座位，其编码产物多态性低、组织分布与经典I类分子不同，功能多样（如HLA-E提呈leader peptide给NK细胞CD94/NKG2受体、HLA-G参与母胎免疫耐受等），不与经典I类分子（A、B、C）混淆。【排除】A.DO为非经典II类基因。B.A、B、C为经典I类基因。D.DM为非经典II类基因。E.DP、DQ、DR为经典II类基因。
[题目] 347. 下列关于MHC的叙述错误的是
A. 人HLA复合体是位于第6号染色体短臂上一群紧密连锁的基因群
B. 编码的产物参与移植物排斥反应
C. 参与免疫应答及免疫调节
D. 不同种属的哺乳类动物其MHC有不同的命名
E. MHC分子实质上是一种异嗜性抗原
[答案] E
[解析] 【正解E】"MHC分子实质上是一种异嗜性抗原"错误——MHC分子本质上是同种异型抗原（alloantigen），而非异嗜性抗原（heterophile antigen）。MHC分子在同一物种不同个体间因等位基因多态性存在结构差异，是移植排斥反应的主要靶抗原；而异嗜性抗原是存在于不同种属之间的共同抗原（如链球菌与人心肌共同抗原）。【排除】A.正确：HLA位于第6号染色体短臂。B.正确：MHC产物参与移植物排斥。C.正确：MHC参与免疫应答及调节。D.正确：不同种属命名不同（人HLA、小鼠H-2、大鼠RT1等）。
[题目] 348. HLAⅡ类分子表达于
A. 红细胞表面
B. 有核细胞和血小板表面
C. 神经细胞表面
D. 肥大细胞表面
E. 树突状细胞表面
[答案] E
[解析] 【正解E】HLA-II类分子表达于树突状细胞（DC）等专职APC表面，DC是表达MHC-II类分子水平最高的细胞类型，与其作为最有效的专职抗原提呈细胞的功能相称。【排除】A.红细胞不表达MHC-II类分子（也缺乏MHC-I类分子）。B.有核细胞和血小板表达MHC-I类分子而非II类分子。C.神经细胞通常不表达MHC-II类分子。D.肥大细胞不表达MHC-II类分子（组成性表达MHC-I类）。
[题目] 349. 对人而言，HLA抗原属于
A. 异种抗原
B. 改变的自身抗原
C. 同种异型抗原
D. 隐蔽抗原
E. 异嗜性抗原
[答案] C
[解析] 【正解C】HLA抗原在人群中存在高度多态性（不同个体的HLA等位基因不同），对人类个体而言是同种异型抗原（alloantigen）——即同一种属（人类）中不同个体间因等位基因差异而产生的抗原。这是同种异体器官移植排斥反应的免疫学基础。【排除】A.异种抗原为不同种属间抗原（如动物蛋白对人）。B.改变的自身抗原为自身成分经化学或物理修饰后产生新抗原性。D.隐蔽抗原为被屏障隔离的自身抗原（如晶状体蛋白）。E.异嗜性抗原为跨种属共同抗原。
[题目] 350. 关于MHC-I类分子的功能，下列错误的是
A. 为CD8+杀伤性T细胞的识别分子
B. 诱导对病毒感染细胞的杀伤
C. 诱导对肿瘤细胞的杀伤
D. 参与内源性抗原递呈
E. 参与外源性抗原递呈
[答案] E
[解析] 【正解E】"参与外源性抗原递呈"错误——MHC-I类分子的主要功能是参与内源性抗原提呈（与CD8+CTL的识别相关），不参与外源性抗原提呈。外源性抗原提呈由MHC-II类分子负责。【排除】A.MHC-I类分子为CD8+杀伤T细胞的识别分子，正确。B.MHC-I类分子诱导对病毒感染细胞的杀伤，正确。C.MHC-I类分子诱导对肿瘤细胞的杀伤，正确。D.MHC-I类分子参与内源性抗原递呈，正确。
[题目] 351. 关于MHC-Ⅱ类分子的功能，下列错误的是
A. 参与免疫应答调节
B. 诱导对病毒感染细胞的直接杀伤
C. 参与外源性抗原递呈
D. 为CD4+辅助性T细胞的识别分子
E. 参与同种移植物排斥反应
[答案] B
[解析] 【正解B】"诱导对病毒感染细胞的直接杀伤"错误——MHC-II类分子提呈抗原给CD4+Th细胞（辅助/调节功能），不直接介导对靶细胞的杀伤。对病毒感染细胞的直接杀伤由CD8+CTL经MHC-I类分子识别靶细胞后通过穿孔素/颗粒酶和Fas/FasL途径执行。【排除】A.参与免疫应答调节（Th细胞激活后分泌细胞因子调节免疫），正确。C.参与外源性抗原递呈（外源性抗原-MHC-II复合物提呈给CD4+T细胞），正确。D.为CD4+Th细胞的识别分子，正确。E.参与同种移植物排斥反应（供者MHC-II分子被受者T细胞识别），正确。
[题目] 352. 小鼠H-2复合体的I类基因包括
A. K、D、L座位
B. A、B、
C. 座位 C.E、F、G座位
D. DP、DQ、DR座位
E. DM、DO座位
[答案] A
[解析] 【正解A】小鼠H-2复合体的I类基因包括K、D、L三个座位，编码经典的MHC-I类分子（H-2K、H-2D、H-2L）。小鼠MHC-II类基因为A、E座位（编码I-A和I-E分子）。小鼠的MHC命名与人HLA不同，但基本结构和功能高度保守。【排除】B.A、B、C为人HLA-I类基因座位。C.E、F、G为人非经典I类基因。D.DP、DQ、DR为人HLA-II类基因。E.DM、DO为人非经典II类基因。
[题目] 353. 不属于MHC经典I类和Ⅱ类基因的是
A. HLA-A
B. HLA-B
C. HLA-C
D. HLA-DR
E. HLA-E
[答案] E
[解析] 【正解E】HLA-E属于非经典MHC-I类基因（Ib类基因），编码产物多态性低，功能与经典I类分子不同（如作为NK细胞CD94/NKG2受体的配体）。经典MHC-I类基因为HLA-A、B、C，经典MHC-II类基因为HLA-DR、DQ、DP。【排除】A.HLA-A为经典I类基因。B.HLA-B为经典I类基因。C.HLA-C为经典I类基因。D.HLA-DR为经典II类基因。
[题目] 354. MHC分子中不构成Ag结合槽的结构域是
A. I类分子的α1
B. I类分子的α2
C. I类分子的α3
D. Ⅱ类分子的αl
E. Ⅱ类分子的β1
[答案] C
[解析] 【正解C】MHC-I类分子的α3结构域（膜近端Ig样结构域）不参与构成抗原肽结合槽。MHC-I类分子的肽结合槽由膜远端的α1和α2结构域共同构成（α螺旋形成槽壁，β折叠片构成槽底）；α3结构域的功能是与辅助受体CD8分子结合并提供MHC-I分子的结构支撑。【排除】A.I类分子α1结构域参与构成肽结合槽。B.I类分子α2结构域参与构成肽结合槽。D.II类分子α1结构域参与构成肽结合槽。E.II类分子β1结构域参与构成肽结合槽。
[题目] 355. 对MHC的TAP分子描述错误的是
A. 即抗原加工相关转运体
B. 为内质网上一个异二聚体分子
C. 双链分别由TAP1和TAP2两个座位基因编码
D. 使内源性抗原肽从胞质溶胶进入内质网腔与MHCI类分子结合
E. 使外源性抗原肽从胞质溶胶进入内质网腔与MHCII类分子结合
[答案] E
[解析] 【正解E】"使外源性抗原肽从胞质溶胶进入内质网腔与MHC-II类分子结合"错误——TAP（抗原加工相关转运体）仅参与内源性抗原提呈途径（MHC-I类途径），负责将胞质蛋白酶体降解产生的内源性抗原肽从胞质溶胶转运至内质网腔与MHC-I类分子结合，不参与外源性抗原肽的转运和MHC-II类途径。【排除】A.TAP即抗原加工相关转运体，正确。B.TAP为内质网膜上的TAP1/TAP2异二聚体，正确。C.分别由TAP1和TAP2编码，正确。D.使内源性抗原肽进入内质网与MHC-I类分子结合，正确。
[题目] 356. 对外源性抗原作用的MHC抗原加工提呈相关基因是
A. LMP基因和TAP基因
B. LMP基因和tapasin基因
C. TAP基因和tapasln基因
D. HLA-DM基因和HLA-DO基因
E. HLA-DM基因和TAP基因
[答案] D
[解析] 【正解D】对外源性抗原加工提呈起作用的MHC相关基因是HLA-DM基因和HLA-DO基因——HLA-DM在MHC-II类小室（MIIC）中催化CLIP肽从MHC-II类分子释放并促进外源性抗原肽加载；HLA-DO主要表达于B细胞，调节HLA-DM的活性。二者均参与MHC-II类抗原提呈途径。【排除】A.LMP和TAP基因参与内源性抗原（MHC-I类）途径。B.LMP和tapasin参与MHC-I类途径。C.TAP和tapasin参与MHC-I类途径。E.TAP参与MHC-I类途径。
[题目] 357. 细胞癌变时，HLA分子的变化是
A. HLA-I类分子表达减少
B. HLA-I类分子表达增加
C. HLA-II类分子表达减少
D. HLA-II类分子表达增加
E. HLA-I和II类分子表达均减少
[答案] A
[解析] 【正解A】细胞癌变时HLA-I类分子表达常下调或缺失（down-regulation or loss），这是肿瘤免疫逃逸（immune evasion）的重要机制之一。HLA-I类分子表达下调使肿瘤细胞无法有效提呈肿瘤抗原肽给CD8+CTL识别，从而逃避免疫杀伤。部分肿瘤也可异常表达非经典HLA分子（如HLA-G）以抑制NK细胞功能。【排除】B.癌变时I类分子表达通常减少而非增加。C/D.II类分子在癌变时的变化不如I类分子下调显著和恒定。E.主要为I类分子减少。
[题目] 358. 人类HLA I类分子β链编码基因的染色体定位是
A. 第15号染色体短臂
B. 第6号染色体长臂
C. 第9号染色体长臂
D. 第2号染色体短臂
E. 第6号染色体短臂
[答案] A
[解析] 【正解A】人类HLA-I类分子的β链（即β2微球蛋白，β2-m）编码基因位于第15号染色体短臂（15q21-22），不在第6号染色体的MHC区域。HLA-I类分子的重链（α链）由第6号染色体MHC-I类基因区编码。【排除】B.第6号染色体长臂非MHC区域。C.第9号染色体非MHC/β2m位点。D.第2号染色体非相关位点。E.第6号染色体短臂编码HLA-I类重链和II类分子等，但不编码β2m。
[题目] 359. 下列分子中，非MHC基因编码的是
A. β2微球蛋白
B. HLA I类分子的α链
C. HLA II类分子的α链
D. HLA II类分子的β链
E. HLA Ⅲ类分子
[答案] A
[解析] 【正解A】β2微球蛋白（β2-m）编码基因位于第15号染色体（15q21-22），不由MHC基因（第6号染色体HLA复合体）编码，因此β2-m是非MHC基因编码的产物。【排除】B.HLA-I类分子α链由第6染色体MHC-I类基因编码。C.HLA-II类分子α链由MHC-II类基因编码。D.HLA-II类分子β链由MHC-II类基因编码。E.HLA-III类分子由MHC-III类基因编码。
[题目] 360. HLA Ⅲ类基因的编码产物是
A. β2m
B. TAP
C. LMP
D. Bf
E. HLA-DM分子
[答案] D
[解析] 【正解D】HLA-III类基因的编码产物包括补体成分B因子（Bf）、补体C4、补体C2等，这些是III类基因区的主要表达产物，参与补体活化途径。【排除】A.β2-m由第15号染色体编码，非III类区。B.TAP由MHC-II类区附近基因编码（免疫功能相关基因），非III类基因。C.LMP由MHC-II类区附近基因编码，非III类基因。E.HLA-DM为非经典II类基因产物。
[题目] 361. HLA II类基因位于
A. HLA-A座位
B. HLA-A、B、
C. 座位 C. HLA-E、F、G座位
D. HLA-DP、DQ、DR座位
E. HLA-DM、DO座位
[答案] D
[解析] 【正解D】HLA-II类基因（经典II类基因）位于HLA-DP、DQ、DR座位所在的HLA-D区（占HLA复合体的一部分），编码MHC-II类分子的α链和β链，是外源性抗原提呈的核心分子。【排除】A.HLA-A为经典I类基因。B.HLA-A、B、C为经典I类基因。C.HLA-E、F、G为非经典I类基因。E.HLA-DM、DO为非经典II类基因。
[题目] 362. 经典的I类基因包括
A. HLA-DO座位
B. HLA-A、B、
C. 座位 C. HLA-E、F、G座位
D. HLA-DP、DQ、DR座位
E. HLA-DM座位
[答案] B
[解析] 【正解B】经典的HLA-I类基因包括HLA-A、B、C三个座位，编码高度多态性的经典MHC-I类分子（HLA-A、HLA-B、HLA-C），表达于几乎所有有核细胞表面，负责内源性抗原提呈给CD8+CTL。【排除】A.DO为非经典II类基因。C.HLA-E、F、G为非经典I类基因。D.DP、DQ、DR为经典II类基因。E.DM为非经典II类基因。
[题目] 363. 可介导内源性抗原肽转运至内质网的分子是
A. LMP
B. HLA II类分子
C. TAP
D. HLA-DM分子
E. HLA I类分子
[答案] C
[解析] 【正解C】TAP（抗原加工相关转运体/Transporter associated with Antigen Processing）负责将经蛋白酶体降解产生的内源性抗原肽从胞质溶胶转运至内质网腔，使抗原肽与MHC-I类分子结合后经高尔基体运输至细胞表面提呈给CD8+CTL。TAP是MHC-I类抗原提呈途径的关键转运分子。【排除】A.LMP（低分子量多肽）编码蛋白酶体亚单位，参与肽的降解而非转运。B.HLA-II类分子参与外源性抗原提呈。D.HLA-DM参与MHC-II类途径。E.HLA-I类分子是肽的载体而非转运体。
[题目] 364. MHCⅡ类分子抗原提呈途径中，外源性抗原降解的部位是
A. 吞噬溶酶体
B. 内质网
C. 蛋白酶体
D. 高尔基体
E. MHCⅡ类小室
[答案] A
[解析] 【正解A】在MHC-II类分子抗原提呈途径中，外源性抗原被APC吞噬或内吞后首先形成吞噬体/内体，随后与溶酶体融合形成吞噬溶酶体（phagolysosome），在酸性环境中由组织蛋白酶（cathepsins）等蛋白酶将抗原蛋白降解为可供MHC-II类分子结合的肽段（约13-17aa）。【排除】B.内质网是MHC-I类途径中肽加载的场所。C.蛋白酶体是内源性抗原（MHC-I类途径）的降解场所。D.高尔基体是MHC-II类分子运输的中间站。E.MHC-II类小室（MIIC）是肽加载于MHC-II类分子的场所，非降解场所。
[题目] 365. 下列关于朗格汉斯细胞(LC)的叙述，不正确的是
A. 属于未成熟DC
B. 抗原加工能力强
C. 抗原提呈能力强
D. 抗原摄取能力强
E. 分布于皮肤部位
[答案] C
[解析] 【正解C】"抗原提呈能力强"对朗格汉斯细胞（LC）的描述不正确。LC是位于皮肤表皮层的未成熟树突状细胞（immature DC），其特点是摄取和加工抗原的能力强（高表达Fc受体、模式识别受体），但抗原提呈能力弱（低表达MHC-II类分子和共刺激分子CD80/CD86）。LC捕获抗原后迁移至引流淋巴结，在此过程中分化为成熟的并指状DC（interdigitating DC），才获得强大的抗原提呈能力。【排除】A.属于未成熟DC，正确。B.抗原加工能力强，正确。D.抗原摄取能力强，正确。E.分布于皮肤部位（表皮层），正确。
[题目] 366. 属于专职性APC的淋巴细胞是
A. B1细胞
B. B2细胞
C. Th细胞
D. NKT细胞
E. CTL细胞
[答案] B
[解析] 【正解B】B2细胞（常规B细胞/follicular B cells）属于专职性抗原提呈细胞。B2细胞通过其表面BCR（膜型Ig）特异性结合和摄入抗原（受体介导的内吞），经加工后以抗原肽-MHC-II类分子复合物形式提呈给CD4+T细胞，在T-B细胞协作和生发中心反应中发挥关键作用。【排除】A.B1细胞为固有样B细胞，主要产生天然IgM，非专职APC。C.Th细胞为T细胞，非APC淋巴细胞（活化Th可表达MHC-II但不以抗原提呈为主要功能）。D.NKT细胞非专职APC。E.CTL细胞非APC。
[题目] 367. TAP在APC加工提呈抗原过程中的作用是
A. 转运外源性抗原肽至MⅡC
B. 转运内源性抗原肽至内质网
C. 转运至MHCⅡ类分子至MⅡC
D. 转运至MHCⅠ类分子至高尔基体
E. 转运抗原至蛋白酶体
[答案] B
[解析] 【正解B】TAP（抗原加工相关转运体）在内源性抗原提呈途径中的核心作用是转运经蛋白酶体降解产生的内源性抗原肽从胞质溶胶进入内质网腔，使抗原肽能与MHC-I类分子结合形成肽-MHC-I复合物，再经高尔基体转运至细胞表面供CD8+CTL识别。【排除】A.转运外源性抗原肽至MⅡC为MHC-II类途径的机制（不涉及TAP）。C.转运MHC-II类分子至MⅡC为高尔基体/Ii链的功能。D.转运MHC-I类分子至高尔基体非TAP功能（为膜运输过程）。E.转运抗原至蛋白酶体非TAP功能（泛素化等负责）。
[题目] 368. 巨噬细胞摄取链球菌后，最有可能激活的细胞是
A. B1细胞
B. B2细胞
C. CD4+T细胞
D. CD8+T细胞
E. NKT细胞
[答案] C
[解析] 【正解C】巨噬细胞摄取链球菌（胞外菌）后，细菌抗原经吞噬溶酶体降解为肽段，由MHC-II类分子提呈给CD4+T细胞，激活CD4+Th细胞辅助体液免疫应答——胞外菌抗原属外源性抗原，走MHC-II类途径。【排除】A.B1细胞为固有样B细胞，不依赖T细胞辅助。B.B2细胞需CD4+T细胞辅助才能活化。D.CD8+T细胞识别MHC-I类分子提呈的内源性抗原，链球菌为胞外菌不通过此途径。E.NKT细胞识别CD1d提呈的脂类抗原。 
[题目] 369. 初次应答中，提呈抗原的APC是
A. DC
B. Mϕ
C. B细胞
D. 内皮细胞
E. 成纤维细胞
[答案] A
[解析] 【正解A】初次免疫应答中，DC（树突状细胞）是唯一能激活初始T细胞（naive T cell）的专职APC——DC组成性高表达MHC-II类分子和共刺激分子CD80/CD86，可同时提供第一信号和第二信号启动初次免疫应答。【排除】B.巨噬细胞和C.B细胞诱导性/组成性表达MHC-II类分子但共刺激分子表达不足，只能激活效应或记忆T细胞而不能激活初始T细胞。D.内皮细胞和E.成纤维细胞非专职APC，不表达MHC-II类分子。 
[题目] 370. 能刺激初始T细胞增殖的是
A. DC
B. Mϕ
C. B细胞
D. 内皮细胞
E. 成纤维细胞
[答案] A
[解析] 【正解A】DC是唯一能有效刺激初始T细胞增殖的APC——DC高表达MHC-II类分子和共刺激分子CD80/CD86，为初始T细胞提供完整双信号活化条件；其他APC共刺激分子表达不足，仅能激活已活化的效应或记忆T细胞。【排除】B.巨噬细胞诱导性表达MHC-II类分子，主要激活效应/记忆T细胞。C.B细胞以BCR特异性摄取抗原后提呈，主要激活已活化的Th细胞。D.内皮细胞和E.成纤维细胞非专职APC。 
[题目] 371. 下列细胞中，既是抗原提呈细胞，又是体液免疫应答中效应细胞的是
A. 树突状细胞
B. 巨噬细胞
C. B细胞
D. 上皮细胞
E. 内皮细胞
[答案] C
[解析] 【正解C】B细胞既是专职APC——通过MHC-II类分子提呈外源性抗原给CD4+T细胞，又是体液免疫应答的效应细胞——活化后分化为浆细胞大量产生特异性抗体，是唯一兼具抗原提呈和抗体产生双重功能的细胞。【排除】A.树突状细胞为最强专职APC但不产生抗体。B.巨噬细胞为专职APC但非抗体产生效应细胞。D.上皮细胞和E.内皮细胞非专职APC，也不产生抗体。 
[题目] 372. 具有抗原提呈功能的细胞是
A. T细胞
B. 中性粒细胞
C. 血小板
D. 巨噬细胞
E. 红细胞
[答案] D
[解析] 【正解D】巨噬细胞具有抗原提呈功能，属专职APC——经吞噬作用摄取外源性抗原后在吞噬溶酶体中降解，由MHC-II类分子提呈给CD4+T细胞；也可通过交叉提呈经MHC-I类途径激活CD8+T细胞。【排除】A.T细胞为抗原识别细胞，不具抗原提呈功能。B.中性粒细胞为吞噬效应细胞，不表达MHC-II类分子。C.血小板无核，不表达MHC分子。E.红细胞无MHC分子。 
[题目] 373. 下列不属于内源性抗原的是
A. 细胞内合成的蛋白质抗原
B. 病毒感染细胞合成的病毒蛋白
C. 肿瘤细胞合成的肿瘤抗原
D. 细胞内体中的蛋白质抗原
E. 细胞内的胞浆蛋白质抗原
[答案] D
[解析] 【正解D】内源性抗原指细胞内自身合成的蛋白质抗原；细胞内体中的蛋白质抗原经胞外吞噬/内吞进入内体系统，属外源性抗原的加工途径，不属于内源性抗原的定义范畴。【排除】A.细胞内合成的蛋白质为内源性抗原。B.病毒感染细胞合成的病毒蛋白为内源性抗原。C.肿瘤细胞合成的肿瘤抗原为内源性抗原。E.胞浆蛋白质抗原为内源性抗原。 
[题目] 374. 巨噬细胞摄取李斯特菌后，对该细菌抗原的提呈途径是
A. 经蛋白酶体降解为多肽，由MHCⅠ类分子提呈给CD8+T细胞
B. 经溶酶体降解为多肽，由MHCⅠ类分子提呈给CD8+T细胞
C. 经蛋白酶体降解为多肽，由MHCⅡ类分子提呈给CD4+T细胞
D. 经吞噬溶酶体降解为多肽，由MHCⅡ类分子提呈给CD4+T细胞
E. 经蛋白酶体降解为多肽，由MHCⅡ类分子提呈给CD8+T细胞
[答案] D
[解析] 【正解D】李斯特菌被巨噬细胞吞噬摄取后，细菌抗原在吞噬溶酶体中降解为肽段，加载于MHC-II类分子后提呈给CD4+T细胞——虽李斯特菌为胞内寄生菌，但被吞噬后的加工属外源性抗原提呈途径（MHC-II类途径）。【排除】A/B/E.蛋白酶体是内源性抗原降解场所，不参与外源性抗原加工。C.外源性抗原不走蛋白酶体-内质网途径。 
[题目] 375. 下列关于并指状DC的叙述，正确的是
A. 属于未成熟DC
B. 分布于非免疫器官组织间质
C. 免疫激活能力强
D. 摄取抗原能力强
E. 处于迁移期的DC
[答案] C
[解析] 【正解C】并指状DC（IDC/interdigitating DC）为成熟DC，分布于淋巴结深皮质区（T细胞区），高表达MHC-II类分子和共刺激分子CD80/CD86，免疫激活（抗原提呈）能力最强，但摄取加工抗原能力已减弱——成熟DC由未成熟DC受抗原刺激后分化而来。【排除】A.IDC为成熟DC，非未成熟DC（朗格汉斯细胞和间质DC属未成熟DC）。B.IDC分布于淋巴结等淋巴器官，非组织间质。D.摄取抗原能力强是未成熟DC的特征。E.迁移期DC为隐蔽细胞。 
[题目] 376. 脂类抗原被CD1d提呈后激活的细胞是
A. Th
B. CTL
C. NKT
D. αβT
E. Treg
[答案] C
[解析] 【正解C】脂类/糖脂类抗原被CD1d分子（CD1家族成员，属非经典MHC-I类样分子）提呈后，NKT细胞的半恒定TCR识别CD1d-脂类抗原复合物而被激活——这是非MHC限制性的抗原提呈第三条途径，NKT细胞在固有免疫与适应性免疫之间起桥梁作用。【排除】A.Th（辅助T细胞）识别MHC-II-肽复合物。B.CTL识别MHC-I-肽复合物。D.αβT细胞（常规T细胞）识别MHC-肽复合物。E.Treg识别MHC-II-自身肽复合物。 
[题目] 377. DC区别于其他APC的最大特点是
A. 组成性表达MHCⅡ类分子
B. 诱导性表达MHCⅡ类分子
C. 能直接激活效应T细胞
D. 能直接激活记忆T细胞
E. 能直接激活初始T细胞
[答案] E
[解析] 【正解E】DC区别于其他APC的最大特点是能有效激活初始T细胞（naive T cell）——DC组成性高表达MHC-II类分子和共刺激分子CD80/CD86，是唯一能启动初次免疫应答的专职APC，被誉为"专职APC之冠"。【排除】A.组成性表达MHC-II类分子是DC特征之一，但非最核心区别（B细胞也组成性表达MHC-II）。B.诱导性表达MHC-II是巨噬细胞的特征。C/D.激活效应或记忆T细胞是巨噬细胞和B细胞的功能，非DC独特之处。 
[题目] 378. 下列细胞中，属于迁移期DC的是
A. 隐蔽细胞
B. 间质DC
C. 朗格汉斯细胞
D. 并指状DC
E. 浆细胞样DC
[答案] A
[解析] 【正解A】隐蔽细胞（veiled cell）是朗格汉斯细胞从皮肤经输入淋巴管向淋巴结迁移过程中的过渡形态——在淋巴液中呈面纱状而得名，属迁移期DC，是DC生命周期中未成熟DC向成熟DC转化的中间阶段。【排除】B.间质DC为分布于非淋巴组织中的未成熟DC（定居型）。C.朗格汉斯细胞为皮肤黏膜中未成熟DC。D.并指状DC为淋巴结T细胞区成熟DC。E.浆细胞样DC分布于血液和淋巴组织，主要产生I型IFN。 
[题目] 379. B细胞以BCR介导内化的抗原，通过下列途径被提呈给T细胞
A. MHCⅠ类分子途径提呈给CD4+T细胞
B. MHCⅡ类分子途径提呈给CD4+T细胞
C. MHCⅠ类分子途径提呈给CD8+T细胞
D. MHCⅡ类分子途径提呈给CD8+T细胞
E. 交叉途径提呈给CD4+T细胞
[答案] B
[解析] 【正解B】B细胞以BCR特异性识别并结合抗原后，经受体介导内吞将外源性抗原内化进入内体-溶酶体系统，降解为肽段后加载于MHC-II类分子，提呈给CD4+T细胞（Th细胞）——属MHC-II类分子限制性提呈途径，是体液免疫应答中B-T协作的基础。【排除】A.MHC-I类途径提呈内源性抗原给CD8+T细胞。C.MHC-I类途径不针对CD4+T细胞。D.MHC-II类途径提呈给CD4+T而非CD8+T。E.交叉提呈指外源性抗原经MHC-I类途径提呈，非B细胞抗原提呈的主要途径。 
[题目] 380. 不属于专职性APC的是
A. 朗格汉斯细胞
B. Mϕ
C. B细胞
D. 内皮细胞
E. 隐蔽细胞
[答案] D
[解析] 【正解D】专职性APC包括三类：树突状细胞（DC）、巨噬细胞（Mφ）和B细胞；内皮细胞属于非专职APC，不组成性表达MHC-II类分子和共刺激分子，只有在IFN-γ等细胞因子诱导下才可能表达MHC-II类分子，抗原提呈能力极弱。【排除】A.朗格汉斯细胞为皮肤中未成熟DC，属专职APC。B.巨噬细胞和C.B细胞均为经典专职APC。E.隐蔽细胞为迁移期DC，属专职APC。 
[题目] 381. 下列APC中抗原提呈能力最强的是
A. 巨噬细胞
B. B淋巴细胞
C. 成纤维细胞
D. 并指状DC
E. 朗格汉斯细胞
[答案] D
[解析] 【正解D】并指状DC（IDC/成熟DC）高表达MHC-II类分子和共刺激分子CD80/CD86，抗原提呈能力在所有APC中最强，是唯一能有效激活初始T细胞启动初次免疫应答的APC。【排除】A.巨噬细胞诱导性表达MHC-II类分子，提呈能力弱于DC。B.B细胞提呈低浓度抗原效率最高（BCR特异性浓缩抗原），但总体提呈能力不及成熟DC。C.成纤维细胞非专职APC。E.朗格汉斯细胞为未成熟DC，摄取抗原能力强但提呈能力弱（MHC-II和共刺激分子表达低）。 
[题目] 382. 促进MHCⅡ类分子从内质网向高尔基体转运的分子是
A. LMP
B. HLA-DM
C. Ii
D. HLA-DO
E. TAP
[答案] C
[解析] 【正解C】Ii链（恒定链/CD74）在内质网中与MHC-II类分子αβ二聚体结合形成(αβIi)3九聚体，促进II类分子从内质网向高尔基体转运；Ii链的CLIP片段占据肽结合槽，阻止内源性肽与MHC-II类分子提前结合，确保II类分子到达正确的荷肽区室（MII C）。【排除】A.LMP为蛋白酶体组分，参与内源性抗原降解。B.HLA-DM在MII C中催化CLIP解离使外源性肽加载。D.HLA-DO在B细胞中调节HLA-DM活性。E.TAP为内质网膜转运蛋白，转运内源性抗原肽入内质网。 
[题目] 383. MHCⅡ类分子抗原提呈途径中，抗原肽-MHCⅡ类分子复合物形成的部位是
A. 高尔基体
B. 内质网
C. 蛋白酶体
D. MⅡC
E. 溶酶体
[答案] D
[解析] 【正解D】抗原肽-MHC-II类分子复合物在MHC-II类小室（MII C/MHC class II compartment）中形成——MII C含HLA-DM分子，催化CLIP从II类分子解离，使外源性抗原肽加载至MHC-II类分子肽结合槽，完成荷肽过程后转运至细胞膜表面。【排除】A.高尔基体为MHC-II类分子运输途经区室，非荷肽场所。B.内质网为MHC-I类分子荷肽场所。C.蛋白酶体为内源性抗原降解场所。E.溶酶体为抗原降解场所，荷肽在MII C而非经典溶酶体中进行。 
[题目] 384. B细胞识别结合特异性抗原后可发生系列变化，其中错误的是
A. 以BCR摄取抗原
B. 作为APC加工处理抗原
C. 细胞表面表达抗原肽-MHC分子复合物
D. 为CD4+T细胞提供协同刺激信号
E. 为CD8+T细胞提供协同刺激信号
[答案] E
[解析] 【正解E】B细胞作为APC通过MHC-II类分子提呈抗原给CD4+T细胞并提供协同刺激信号（CD40-CD40L和B7-CD28）；B细胞不为CD8+T细胞提供协同刺激信号，因CD8+T细胞识别MHC-I类分子提呈的抗原肽，与B细胞表面的MHC-II类分子不匹配。【排除】A.以BCR摄取抗原（正确——B细胞抗原提呈的第一步）。B.作为APC加工处理抗原（正确）。C.细胞表面表达抗原肽-MHC分子复合物（正确——表达抗原肽-MHC-II复合物）。D.为CD4+T细胞提供协同刺激信号（正确——B7-CD28和CD40-CD40L）。 
[题目] 385. 不参与MHCⅡ类分子抗原提呈途径的分子是
A. HLA-A
B. HLA-DM
C. HLA-DR
D. CLIP
E. li
[答案] A
[解析] 【正解A】HLA-A属于经典MHC-I类分子，参与内源性抗原提呈途径（向CD8+T细胞提呈），不参与MHC-II类分子抗原提呈途径。【排除】B.HLA-DM在MII C中催化CLIP解离促进外源性肽加载。C.HLA-DR为经典MHC-II类分子，直接提呈抗原肽。D.CLIP为Ii链降解残留肽段，占据MHC-II类分子肽结合槽。E.Ii链（恒定链）促进MHC-II类分子转运并封闭肽结合槽。 
[题目] 386. 经典抗原加工提呈途径中，外源性抗原的加工提呈方式是
A. 加工后由MHCⅠ类分子提呈给CD4+T细胞
B. 加工后由MHCⅠ类分子提呈给CD8+T细胞
C. 加工后由MHCⅡ类分子提呈给CD4+T细胞
D. 加工后由MHCⅡ类分子提呈给CD8+T细胞
E. 加工后由MHCⅠ类分子和MHCⅡ类分子分别提呈给CD4+T和CD8+T细胞
[答案] C
[解析] 【正解C】经典抗原加工提呈途径中，外源性抗原（经吞噬/内吞从胞外摄取的抗原）经MHC-II类分子提呈给CD4+T细胞——外源性抗原在内体-溶酶体系统中降解为肽段，在MII C中加载于MHC-II类分子，转运至细胞表面供CD4+T细胞识别。【排除】A/B.MHC-I类分子提呈内源性抗原给CD8+T细胞。D.MHC-II类分子提呈给CD4+T细胞而非CD8+T细胞。E.不同来源抗原走不同途径，非同时经两种途径提呈。 
[题目] 387. 脂类抗原主要通过下列哪种途径进行提呈
A. 交叉致敏途径
B. 交叉提呈途径
C. CD1分子提呈途径
D. MHCⅠ类分子途径
E. MHCⅡ类分子途径
[答案] C
[解析] 【正解C】脂类抗原（脂类/糖脂/分枝菌酸等疏水性抗原）主要通过CD1分子提呈途径进行提呈——CD1分子为非经典MHC-I类样分子，其肽结合槽深且疏水，专门结合脂类抗原的疏水尾部，向NKT细胞和γδT细胞提呈。【排除】A/B.交叉致敏和交叉提呈涉及MHC-I类途径提呈外源性抗原，非脂类提呈机制。D.MHC-I类途径提呈肽类内源性抗原。E.MHC-II类途径提呈肽类外源性抗原。 
[题目] 388. MHCⅡ类分子抗原提呈途径中，内质网中MHCⅡ类分子的存在形式为
A. αβIi
B. αβCLIP
C. (αβIi)3
D. (αβCLIP)3
E. αβ
[答案] C
[解析] 【正解C】MHC-II类分子在内质网中以(αβIi)3九聚体形式存在——3个MHC-II类分子αβ异二聚体各结合1个Ii链组成九聚体结构，Ii链的CLIP片段占据αβ二聚体的肽结合槽，阻止内源性肽与MHC-II类分子在内质网中提前结合。【排除】A.αβIi为二聚体与Ii的简单结合形态，非完整九聚体。B.αβCLIP为Ii被降解后的中间体形式。D.(αβCLIP)3中的CLIP为Ii降解产物而非初始状态。E.αβ为无Ii链的游离形式，不含保护机制。 
[题目] 389. 下列哪种细胞可有效提呈抗原并诱导初始T细胞的活化
A. A.B细胞
B. 巨噬细胞
C. 树突状细胞
D. 上皮细胞
E. 内皮细胞
[答案] C
[解析] 【正解C】树突状细胞（DC）是唯一能有效提呈抗原并诱导初始T细胞活化的APC，是公认最强的专职APC——DC组成性高表达MHC-II类分子和共刺激分子CD80/CD86，能提供初始T细胞活化所需的完整双信号。【排除】A.A.B细胞（原文含重复前缀）及B细胞仅能激活效应/记忆T细胞。B.巨噬细胞诱导性表达MHC-II类分子，提呈能力弱于DC。D.上皮细胞和E.内皮细胞为非专职APC，不能激活初始T细胞。 
[题目] 390. MHCⅠ类分子抗原提呈途径中，抗原肽-MHCⅠ类分子复合物形成的部位是
A. 内体
B. 高尔基体
C. 吞噬溶酶体
D. MⅡC
E. 内质网
[答案] E
[解析] 【正解E】MHC-I类分子抗原提呈途径中，抗原肽-MHC-I类分子复合物在内质网中形成——TAP将蛋白酶体降解的内源性抗原肽转运入内质网腔，肽加载于新合成的MHC-I类分子肽结合槽，完成荷肽后经高尔基体转运至细胞表面。【排除】A.内体为外源性抗原加工区室。B.高尔基体为转运途经区室，非I类分子荷肽场所。C.吞噬溶酶体为外源性抗原降解区室。D.MII C为MHC-II类分子荷肽场所。 
[题目] 391. APC用以提呈内源性抗原的最关键分子是
A. MHCⅠ类分子
B. MHCⅡ类分子
C. MHCⅢ类分子
D. 黏附分子
E. 共刺激分子
[答案] A
[解析] 【正解A】MHC-I类分子是APC提呈内源性抗原的最关键分子——所有有核细胞均组成性表达MHC-I类分子，将细胞内合成的内源性抗原肽提呈给CD8+CTL，是机体免疫监视（抗病毒、抗肿瘤）的分子基础。【排除】B.MHC-II类分子提呈外源性抗原给CD4+T细胞。C.MHC-III类分子主要指补体C4、C2、B因子等，不参与抗原提呈。D.黏附分子介导细胞间黏附。E.共刺激分子提供第二信号。 
[题目] 392. MHCⅡ类分子与恒定链(Ii)形成九聚体，其中关于Ii作用的叙述，错误的是
A. 促进MHCⅡ类分子αβ二聚体形成
B. 促进MHCⅡ类分子的转运
C. 结合MHCⅡ类分子抗原结合槽
D. 促进MHCⅡ类分子与外源性多肽的结合
E. 阻止MHCⅡ类分子与内源性多肽结合
[答案] D
[解析] 【正解D】Ii链（恒定链/CD74）的作用是封闭MHC-II类分子抗原结合槽阻止内源性肽结合（非阻止与外源性肽结合），并促进II类分子的转运和折叠；Ii链并不促进MHC-II类分子与外源性多肽的结合——HLA-DM才行使此功能。【排除】A.促进αβ二聚体形成（正确——Ii帮助MHC-II正确折叠）。B.促进转运（正确——引导II类分子从内质网经高尔基体到达MII C）。C.结合抗原结合槽（正确——CLIP片段占据肽结合槽）。E.阻止与内源性多肽结合（正确——防止内质网中与内源性肽提前结合）。 
[题目] 393. MHCⅠ类分子抗原提呈途径中，内源性抗原降解的部位是
A. 溶酶体
B. 蛋白酶体
C. MHC Ⅱ类小室
D. 内质网
E. 吞噬体
[答案] B
[解析] 【正解B】MHC-I类分子抗原提呈途径中，内源性抗原在胞质中被泛素化标记后，经蛋白酶体（proteasome）降解为8-12氨基酸肽段——蛋白酶体是内源性抗原降解的核心场所，免疫蛋白酶体（含LMP2/LMP7/MECL-1亚基）可产生更适合MHC-I类分子结合的肽段。【排除】A.溶酶体为外源性抗原降解场所。C.MHC II类小室为MHC-II类分子荷肽场所。D.内质网为MHC-I类分子荷肽场所。E.吞噬体为外源性抗原内化后形成的囊泡。 
[题目] 394. 下列关于内质网在抗原加工提呈过程中的作用，错误的是
A. MHCⅠ类分子合成的场所
B. MHCⅡ类分子合成的场所
C. MHCⅠ类分子荷肽的场所
D. MHCⅡ类分子荷肽的场所
E. 多肽存在的场所
[答案] D
[解析] 【正解D】内质网是MHC-I类分子荷肽的场所（也是MHC-I和MHC-II类分子αβ链合成的场所），但不是MHC-II类分子荷肽的场所——MHC-II类分子荷肽发生在MHC-II类小室（MII C），内质网中的MHC-II类分子被Ii链封闭着肽结合槽以防止荷肽。【排除】A.MHC-I类分子在内质网合成（正确）。B.MHC-II类分子在内质网合成（正确）。C.内质网是MHC-I类分子荷肽场所（正确）。E.内质网中有多肽存在（正确——TAP转运的肽和内源性肽）。 
[题目] 395. 下列事件中，不属于MHCⅠ类分子抗原提呈途径的是
A. 胞浆蛋白的泛素化
B. 泛素化蛋白进入LMP降解为抗原肽
C. TAP转运抗原肽至MⅡC
D. 内质网内MHCⅠ类分子的合成与荷肽
E. 抗原肽-MHCⅠ类分子复合物转运并表达于细胞表面
[答案] C
[解析] 【正解C】TAP（抗原加工相关转运蛋白）将胞质蛋白酶体降解的肽段转运至内质网腔与MHC-I类分子结合——TAP定位于内质网膜，不参与向MII C的转运；MII C是MHC-II类途径的荷肽区室，与TAP转运无关。【排除】A.胞浆蛋白泛素化（正确——I类途径的第一步）。B.泛素化蛋白经蛋白酶体（含LMP亚基）降解为抗原肽（正确）。D.内质网内MHC-I类分子合成与荷肽（正确）。E.抗原肽-MHC-I复合物转运至细胞表面表达（正确）。 
[题目] 396. 下列外源性抗原提呈过程中的事件，不包括
A. 吞噬体的形成
B. 吞噬体与溶酶体融合
C. 吞噬溶酶体与MⅡC融合
D. MⅡC与高尔基体融合
E. 内体的形成
[答案] D
[解析] 【正解D】外源性抗原提呈过程中，高尔基体发出的含MHC-II-Ii复合物的囊泡与含抗原肽的内体/吞噬溶酶体融合形成MII C进行荷肽，但MII C不与高尔基体发生融合——MII C形成后直接向细胞膜转运。【排除】A.吞噬体的形成（正确——外源性抗原内化的第一步）。B.吞噬体与溶酶体融合（正确——形成吞噬溶酶体降解抗原）。C.吞噬溶酶体与MII C融合（正确——在MII C中完成荷肽）。E.内体的形成（正确——抗原内吞后形成内体）。 
[题目] 397. 单纯疱疹病毒感染的树突状细胞最有可能激活的细胞是
A. CD4+T细胞
B. CD8+T细胞
C. NKT细胞
D. B1细胞
E. B2细胞
[答案] B
[解析] 【正解B】单纯疱疹病毒感染DC后，病毒蛋白在DC胞质中合成，作为内源性抗原经蛋白酶体降解→TAP转运入内质网→MHC-I类分子荷肽途径提呈给CD8+T细胞（CTL），激活CTL特异性杀伤病毒感染的靶细胞。【排除】A.CD4+T细胞识别MHC-II类分子提呈的外源性抗原肽，而非病毒内源性合成蛋白。C.NKT细胞识别CD1d提呈的脂类抗原。D/E.B1细胞和B2细胞识别天然抗原，不识别MHC-肽复合物。 
[题目] 398. 下列细胞中，不属于APC的是
A. A.B细胞
B. LC
C. FDC
D. IDC
E. cDC
[答案] C
[解析] 【正解C】滤泡树突状细胞（FDC）定位于淋巴滤泡生发中心，不表达MHC-II类分子，不属于经典APC——其主要功能是通过Fc受体和补体受体（CR1/CR2）捕获以免疫复合物形式存在的抗原，将完整抗原展示给B细胞进行亲和力成熟选择，而非向T细胞提呈抗原肽。【排除】A.B细胞（原文选项含重复前缀）为专职APC。B.朗格汉斯细胞（LC）为皮肤DC属APC。D.并指状DC（IDC）为淋巴结T细胞区成熟DC。E.常规DC（cDC）为经典专职APC。 
[题目] 399. 抗原提呈细胞中最不可能含有抗原肽-MHC分子复合物的部位是
A. 蛋白酶体
B. 高尔基体
C. 细胞膜
D. MHCⅡ类小室
E. 内质网
[答案] A
[解析] 【正解A】蛋白酶体是内源性抗原降解的蛋白酶复合体，位于胞质中，功能仅为将蛋白质降解为肽段——不含MHC分子，也不含抗原肽-MHC分子复合物。抗原肽-MHC复合物形成于内质网（MHC-I途径）、MII C（MHC-II途径）或细胞膜表面。【排除】B.高尔基体为运输途经，可能有刚合成的MHC分子尚未荷肽。C.细胞膜表面表达完整的抗原肽-MHC复合物。D.MII C含抗原肽-MHC-II复合物。E.内质网含抗原肽-MHC-I复合物。 
[题目] 400. 下列固有免疫细胞中最可能具有抗原提呈功能的是
A. γδT细胞
B. 肥大细胞
C. 巨噬细胞
D. NK细胞
E. 中性粒细胞
[答案] C
[解析] 【正解C】巨噬细胞是最可能具有抗原提呈功能的固有免疫细胞——可诱导性表达MHC-II类分子（IFN-γ诱导上调），将吞噬降解的外源性抗原肽经MHC-II类分子提呈给CD4+T细胞，是固有免疫与适应性免疫的桥梁。【排除】A.γδT细胞属固有样T细胞但非APC。B.肥大细胞参与过敏反应非APC。D.NK细胞杀伤靶细胞非APC。E.中性粒细胞为吞噬效应细胞，不表达MHC-II类分子。 
[题目] 401. 外源性抗原提呈途径中，HLA-DM的作用是
A. 将转运MHCⅡ类分子由内质网转运至MⅡC
B. 阻止内源性多肽与MHCⅡ类分子的结合
C. 促进MHCⅡ类分子α链和β链的折叠
D. 促进CLIP与MHCⅡ类分子的解离
E. 促进Ii链与MHCⅡ类分子的结合
[答案] D
[解析] 【正解D】外源性抗原提呈途径中，HLA-DM定位于MII C，催化CLIP（MHC-II类分子相关恒定链肽段/Ii链残留片段）从MHC-II类分子肽结合槽解离，使外源性抗原肽能够加载到肽结合槽中——HLA-DM是II类途径荷肽的关键催化剂。【排除】A.转运MHC-II类分子是Ii链的功能。B.阻止内源性肽与II类分子结合是Ii链的CLIP的被动功能，非HLA-DM的作用。C.促进α链和β链折叠非HLA-DM功能。E.HLA-DM促进CLIP解离而非促进Ii结合。 
[题目] 402. 具有抗原提呈能力的吞噬细胞是
A. 树突状细胞
B. B淋巴细胞
C. 肥大细胞
D. 中性粒细胞
E. 巨噬细胞
[答案] E
[解析] 【正解E】巨噬细胞是兼具强吞噬能力和抗原提呈能力的细胞——既可通过吞噬作用清除病原体（固有免疫功能），又可经MHC-II类分子提呈抗原给CD4+T细胞（适应性免疫功能），是连接固有免疫和适应性免疫的关键细胞。【排除】A.树突状细胞虽是APC但吞噬能力弱（主要靠巨胞饮和受体介导内吞）。B.B细胞为APC但无吞噬功能（通过BCR介导内吞）。C.肥大细胞非APC。D.中性粒细胞吞噬能力强但不具抗原提呈功能。 
[题目] 403. 属于专职APC的是
A. 成纤维细胞
B. 树突细胞
C. NK细胞
D. 内皮细胞
E. 线粒体
[答案] B
[解析] 【正解B】树突状细胞（DC）是经典专职APC，是最重要的专职性抗原提呈细胞，包括朗格汉斯细胞、并指状DC、间质DC等多种亚型。【排除】A.成纤维细胞为非专职APC，不组成性表达MHC-II类分子。C.NK细胞为固有免疫杀伤细胞，非APC。D.内皮细胞为非专职APC。E.线粒体为细胞器，非免疫细胞。 
[题目] 404. 提呈脂类抗原的分子
A. CD1分子
B. CD3分子
C. HLA-Ⅰ类分子
D. HLA-Ⅱ类分子
E. TAP分子
[答案] A
[解析] 【正解A】CD1分子（非经典MHC-I类样分子）专门提呈脂类、糖脂和分枝菌酸等疏水性抗原——其抗原结合槽深且疏水，适合容纳脂类抗原的烷基链，是独立于MHC-I/II类途径的第三条抗原提呈途径。【排除】B.CD3分子为TCR复合体的信号转导分子。C/D.HLA-I类和II类分子提呈肽类抗原。E.TAP为内质网膜上转运内源性抗原肽的蛋白。 
[题目] 405. 下列关于成熟DC的说法，错误的是
A. 高表达ICAM-1
B. 高表达CD40
C. 高表达CD40L
D. 高表达CD80
E. 高表达CD86
[答案] C
[解析] 【正解C】成熟DC高表达ICAM-1（CD54）、CD40、CD80（B7-1）、CD86（B7-2）和MHC-II类分子，但不表达CD40L（CD154）——CD40L表达于活化的CD4+T细胞表面，与DC表面的CD40结合激活DC（反向信号），促进DC进一步成熟和IL-12分泌。【排除】A.高表达ICAM-1（正确——黏附分子）。B.高表达CD40（正确——与T细胞CD40L相互作用）。D/E.高表达CD80和CD86（正确——提供T细胞共刺激信号）。 
[题目] 406. 能特异性识别结合APC表面抗原肽-MHC分子复合物的淋巴细胞是
A. γδT细胞
B. αβT细胞
C. B1细胞
D. B2细胞
E. NKT细胞
[答案] B
[解析] 【正解B】αβT细胞（常规T细胞）通过αβTCR特异性识别结合APC表面抗原肽-MHC分子复合物，是适应性免疫高度特异性的分子基础——MHC限制性使T细胞只能识别由自身MHC分子提呈的抗原肽。【排除】A.γδT细胞识别非肽类抗原，不受MHC限制，不识别MHC-肽复合物。C/D.B1和B2细胞通过BCR识别完整天然抗原，不识别MHC-肽复合物。E.NKT细胞识别CD1d-脂类复合物。 
[题目] 407. 经典抗原加工提呈途径中，内源性抗原的加工提呈方式是
A. 加工后由MHCⅠ类分子提呈给CD4+T细胞
B. 加工后由MHCⅠ类分子提呈给CD8+T细胞
C. 加工后由MHCⅡ 类分子提呈给CD4+T细胞
D. 加工后由MHCⅡ类分子提呈给CD8+T细胞
E. 加工后由MHCⅠ类和Ⅱ类分子分别提呈给CD4+T细胞和CD8+T细胞
[答案] B
[解析] 【正解B】经典抗原加工提呈途径中，内源性抗原（胞内合成的蛋白质）经蛋白酶体降解→TAP转运入内质网→MHC-I类分子荷肽→提呈给CD8+T细胞（CTL），是机体抗病毒感染和抗肿瘤免疫的核心效应机制。【排除】A.MHC-I类分子提呈给CD8+T细胞而非CD4+T细胞。C.外源性抗原经MHC-II类分子提呈给CD4+T细胞。D.MHC-II类分子提呈给CD4+T细胞而非CD8+T细胞。E.不同来源抗原走不同经典途径，非同时经双途径。 
[题目] 408. 未成熟树突状细胞表面膜分子的表达特征是
A. 高表达调理性受体和MHCⅡ类分子
B. 低表达调理性受体和MHCⅡ类分子
C. 高表达调理性受体，低表达MHCⅡ类分子
D. 低表达调理性受体，高表达MHCⅡ类分子
E. 只表达调理性受体，不表达MHCⅡ类分子
[答案] C
[解析] 【正解C】未成熟树突状细胞位于外周组织，高表达调理性受体（FcγR、补体受体、模式识别受体等利于抗原摄取），低表达MHC-II类分子和共刺激分子（CD80/CD86），抗原提呈能力弱但摄取加工能力强。【排除】A.高表达两者为成熟DC特征。B.低表达两者——调理性受体低表达不利于抗原摄取。D.低表达调理性受体高表达MHC-II为成熟DC特征。E.只表达调理性受体不表达MHC-II类分子则完全丧失提呈功能。 
[题目] 409. 抗原提呈细胞所不具备的作用是
A. 促进T细胞表达抗原受体
B. 降解抗原为小分子肽段
C. 使MHC分子与抗原肽结合
D. 为T细胞活化提供第二信号
E. 摄取抗原
[答案] A
[解析] 【正解A】APC所不具备的作用是促进T细胞表达抗原受体（TCR）——TCR由T细胞自身在胸腺发育过程中通过V(D)J基因重排表达，APC不参与TCR基因的表达调控。APC的四大功能是：摄取抗原、降解抗原为肽段、促成MHC-肽结合、提供第二信号。【排除】B.降解抗原为小分子肽段（正确——APC核心功能之一）。C.使MHC分子与抗原肽结合（正确——荷肽功能）。D.为T细胞活化提供第二信号（正确——共刺激分子B7-CD28）。E.摄取抗原（正确——APC基本功能）。 
[题目] 410. 只能激活效应或记忆T细胞的APC是
A. 中性粒细胞
B. B细胞
C. γδT细胞
D. NK细胞
E. DC
[答案] B
[解析] 【正解B】B细胞作为APC仅能激活效应或记忆T细胞，不能激活初始T细胞——因B细胞需要先被活化的CD4+T细胞（通过CD40L-CD40和细胞因子）辅助激活后，才能有效发挥APC功能，故其主要作用是进一步活化已致敏的T细胞。【排除】A.中性粒细胞非APC不具抗原提呈功能。C.γδT细胞非APC。D.NK细胞非APC。E.DC是唯一能激活初始T细胞的APC。 
[题目] 411. 提呈低浓度抗原最有效的APC是
A. 巨噬细胞
B. DC
C. 内皮细胞
D. B细胞
E. 上皮细胞
[答案] D
[解析] 【正解D】B细胞通过BCR特异性识别并结合抗原，经受体介导内吞高效浓缩内化抗原——在抗原浓度极低时（远低于DC和巨噬细胞所需浓度），B细胞即可高效提呈抗原给T细胞，是提呈低浓度抗原最有效的APC。【排除】A.巨噬细胞通过非特异性吞噬摄取抗原，低浓度时效率低。B.DC通过巨胞饮和受体介导内吞摄取，低浓度效率不及B细胞的BCR特异性摄取。C.内皮细胞和E.上皮细胞为非专职APC，抗原提呈效率极低。 
[题目] 412. 摄取抗原和迁移能力最强的APC是
A. 滤泡树突细胞
B. 并指树突状细胞
C. 浆细胞样树突状细胞
D. 间质树突状细胞
E. 朗格汉斯细胞
[答案] E
[解析] 【正解E】朗格汉斯细胞（LC）分布于皮肤表皮层，属未成熟DC，摄取抗原和迁移能力在所有APC中最强——摄取抗原后被激活，下调趋化因子受体上调CCR7，沿输入淋巴管从皮肤迁移至引流淋巴结T细胞区，分化为并指状DC发挥提呈功能。【排除】A.滤泡树突细胞（FDC）定居于淋巴滤泡不迁移。B.并指状DC为淋巴结定居成熟DC。C.浆细胞样DC主要通过血液迁移。D.间质DC为组织中定居DC。 
[题目] 413. 分布于皮肤黏膜组织中的未成熟树突状细胞称为
A. 滤泡树突状细胞
B. 并指树突状细胞
C. 朗格汉斯细胞
D. 间质树突状细胞
E. 隐蔽树突状细胞
[答案] C
[解析] 【正解C】分布于皮肤表皮层和黏膜组织中的未成熟树突状细胞称为朗格汉斯细胞（Langerhans cell, LC），含特征性Birbeck颗粒（网球拍状细胞器）和Langerin（CD207），高表达调理性受体能有效摄取抗原。【排除】A.滤泡树突状细胞（FDC）分布于淋巴滤泡，非皮肤黏膜。B.并指状DC分布于淋巴结深皮质区，属成熟DC。D.间质DC分布于非淋巴组织间质中。E.隐蔽DC为迁移期DC形态。 
[题目] 414. 分布于淋巴结深皮质区的树突状细胞称为
A. 滤泡树突状细胞
B. 并指树突状细胞
C. 朗格汉斯细胞
D. 间质树突状细胞
E. 隐蔽树突状细胞
[答案] B
[解析] 【正解B】分布于淋巴结深皮质区（副皮质区/T细胞区）的成熟树突状细胞称为并指树突状细胞（IDC/interdigitating DC），高表达MHC-II类分子和共刺激分子CD80/CD86，是提呈抗原给初始T细胞的最强APC。【排除】A.滤泡树突状细胞（FDC）分布于淋巴滤泡B细胞区。C.朗格汉斯细胞分布于皮肤黏膜。D.间质DC分布于组织间质。E.隐蔽DC为迁移期DC。 
[题目] 415. 可特异性识别摄取加工抗原的免疫细胞是
A. 髓样树突状细胞
B. 滤泡树突状细胞
C. 巨噬细胞
D. B细胞
E. T细胞
[答案] D
[解析] 【正解D】B细胞通过BCR（膜表面免疫球蛋白）可特异性识别并结合抗原，经受体介导内吞摄取和加工处理抗原——BCR对抗原的特异性识别使B细胞成为唯一以抗原特异性方式摄取抗原的APC，而DC和巨噬细胞以非特异性方式摄取抗原。【排除】A.髓样DC通过非特异性方式（巨胞饮、模式识别受体、Fc受体）摄取抗原。B.滤泡树突状细胞不摄取加工抗原仅捕获展示免疫复合物。C.巨噬细胞通过非特异性吞噬摄取抗原。E.T细胞不摄取加工抗原。 
[题目] 416. 树突状细胞主要激活的T细胞是
A. CD8+CTL
B. CD4+Th2细胞
C. CD4+Thl细胞
D. CD4+记忆T细胞
E. CD4+初始T细胞
[答案] E
[解析] 【正解E】树突状细胞（DC）主要激活CD4+初始T细胞（naive CD4+ T cell）——DC是唯一能有效激活初始T细胞的APC，通过MHC-II-肽-TCR（第一信号）和B7-CD28（第二信号）诱导初始T细胞活化、增殖并向Th1/Th2/Th17/Tfh等亚群分化。【排除】A/B/C/D.巨噬细胞主要激活CD4+Th1细胞、B细胞主要激活CD4+Th2细胞，但这些为效应或记忆T细胞亚群，非初始T细胞。 
[题目] 417. B细胞作为专职抗原提呈细胞主要激活的T细胞是
A. CD4+Th1 细胞
B. CD4+Th2细胞
C. CD4+初始T细胞
D. CD8+初始T细胞
E. CD8+记忆T细胞
[答案] B
[解析] 【正解B】B细胞作为专职APC主要激活CD4+Th2细胞——体液免疫应答中，B细胞通过BCR特异性摄取并提呈抗原给Th2细胞，Th2细胞提供CD40L和IL-4等辅助信号促进B细胞增殖和类别转换，形成T-B协作正反馈环路，促进抗体产生。【排除】A.CD4+Th1主要由巨噬细胞激活。C.CD4+初始T细胞由DC激活。D/E.CD8+T细胞识别MHC-I类分子提呈的抗原，B细胞表面主要为MHC-II类分子。 
[题目] 418. 巨噬细胞主要激活的T细胞是
A. CD4+Th1细胞
B. CD4+Th2细胞
C. CD4+Tfh细胞
D. CD8+初始T细胞
E. CD4+初始T细胞
[答案] A
[解析] 【正解A】巨噬细胞主要激活CD4+Th1细胞——抗胞内菌感染免疫中，巨噬细胞吞噬胞内菌后经MHC-II类途径提呈抗原给Th1细胞，Th1分泌IFN-γ反过来活化巨噬细胞增强杀菌能力，形成Th1-巨噬细胞正反馈环路介导细胞免疫应答。【排除】B.CD4+Th2主要由B细胞激活。C.Tfh细胞主要在生发中心由DC启动分化。D/E.巨噬细胞主要激活已活化的CD4+效应T细胞而非初始T细胞，且不主要针对CD8+亚群。 
[题目] 419. 内源性抗原在抗原提呈细胞内消化降解的部位是
A. 内体-溶酶体
B. MHC类器室
C. 内质网
D. 高尔基体
E. 蛋白酶体
[答案] E
[解析] 【正解E】内源性抗原在胞质中被泛素化标记后，进入蛋白酶体（proteasome）降解为8-12个氨基酸的肽段——蛋白酶体是内源性抗原消化的核心部位，免疫蛋白酶体（含LMP2/LMP7）可产生更适宜MHC-I类分子结合的肽段。【排除】A.内体-溶酶体为外源性抗原降解场所。B.MHC类器室为MHC-II类分子荷肽场所。C.内质网为MHC-I类分子荷肽场所。D.高尔基体为转运途经区室。 
[题目] 420. 外源性抗原在巨噬细胞内消化降解的部位是
A. 内体-溶酶体
B. MHCⅡ类器室
C. 内质网
D. 高尔基体
E. 蛋白酶体
[答案] A
[解析] 【正解A】外源性抗原在巨噬细胞内经吞噬体与溶酶体融合形成吞噬溶酶体（内体-溶酶体系统）消化降解——在酸性环境中被组织蛋白酶等水解酶降解为肽段，随后与MHC-II类分子结合提呈。【排除】B.MHC-II类器室（MII C）为荷肽场所而非降解场所。C.内质网为MHC-I类分子合成和荷肽场所。D.高尔基体为MHC分子运输途经。E.蛋白酶体为内源性抗原降解场所。 
[题目] 421. 外源性抗原肽与MHC类分子结合的部位是
A. 内体-溶酶体
B. MHCⅡ类小室
C. 内质网
D. 高尔基体
E. 酸化内噬囊泡
[答案] B
[解析] 【正解B】外源性抗原肽与MHC-II类分子结合的部位是MHC-II类小室（MII C/II类区室）——在该区室中，HLA-DM催化CLIP解离，外源性肽加载至MHC-II类分子肽结合槽，完成荷肽过程。【排除】A.内体-溶酶体为抗原降解场所而非荷肽场所。C.内质网为MHC-I类分子荷肽场所。D.高尔基体为转运途经区室。E.酸化内吞囊泡为抗原内吞早期囊泡非荷肽场所。 
[题目] 422. 能够识别APC表面脂类抗原-CD1分子复合物的免疫细胞是
A. CD4+T细胞
B. CD8+T细胞
C. γδT细胞
D. 肥大细胞
E. NK细胞
[答案] C
[解析] 【正解C】γδT细胞可识别APC表面脂类抗原-CD1分子复合物——γδT细胞不受MHC限制，其TCR可直接识别CD1分子提呈的脂类/糖脂/磷酸抗原等非肽类抗原，是固有免疫与适应性免疫之间的重要效应细胞。【排除】A.CD4+T细胞识别MHC-II-肽复合物。B.CD8+T细胞识别MHC-I-肽复合物。D.肥大细胞通过FcεRI识别IgE。E.NK细胞通过KIR/KAR识别MHC-I类分子。 
[题目] 423. 兼备抗原加工提呈和执行适应性免疫应答的细胞是
A. 巨噬细胞
B. B2细胞
C. B1细胞
D. Thl细胞
E. Th2细胞
[答案] B
[解析] 【正解B】B2细胞（滤泡B细胞/常规B细胞）兼具抗原加工提呈功能（通过MHC-II类分子提呈外源性抗原给CD4+T细胞）和执行适应性体液免疫应答功能（分化为浆细胞产生高亲和力抗体和形成记忆B细胞）——是联系特异性细胞免疫和体液免疫的关键细胞。【排除】A.巨噬细胞为APC兼固有免疫效应细胞（吞噬杀菌），非适应性免疫效应细胞。C.B1细胞为固有样B细胞产生天然IgM，抗原提呈功能弱。D/E.Th1和Th2细胞辅助其他免疫细胞但不执行抗体产生等体液免疫效应功能。 
[章节] 第六章 T淋巴细胞
[单选题]
[题目] 424. Th1 细胞不分泌的细胞因子是
A. IL-2
B. IL-4
C. IFN-γ
D. TNF-β
E. GM-CSF
[答案] B
[解析] 【正解B】IL-4是Th2细胞的特征性细胞因子，通过STAT6信号通路诱导B细胞类别转换为IgE，参与抗寄生虫免疫和过敏反应；Th1细胞不分泌IL-4，Th1分泌IFN-γ、IL-2、TNF-β和GM-CSF等促炎因子，主要介导细胞免疫应答。【排除】A.IL-2由Th1细胞分泌，是T细胞增殖的关键生长因子。C.IFN-γ是Th1细胞的特征性细胞因子，可活化巨噬细胞并拮抗Th2分化。D.TNF-β由Th1和CTL细胞分泌。E.GM-CSF由Th1和Th2细胞均可分泌，促进髓系细胞分化。 
[题目] 425. 胞质区含有 ITAM的 CD 分子是
A. CD3
B. CD28
C. CD4
D. CD8
E. CD152
[答案] A
[解析] 【正解A】CD3分子（γ、δ、ε和ζ链）胞质区含有ITAM（免疫受体酪氨酸活化基序），TCR识别抗原后Lck磷酸化ITAM中的酪氨酸残基，募集并激活ZAP-70，启动下游信号级联反应，是T细胞活化第一信号传递不可或缺的分子。【排除】B.CD28胞质区含YxxM基序募集PI3K，传递共刺激信号。C.CD4和D.CD8为辅助受体，胞质区与Lck结合增强第一信号，不含ITAM。E.CD152（CTLA-4）胞质区含ITIM，传递抑制信号。
[题目] 426. T 细胞活化的第二信号产生主要是
A. CD8 与 MHCI 类分子作用
B. CD4 与 MHCⅡ类分子作用
C. CD40 与 CD40L之间作用
D. CD28 与 B7 分子之间的作用
E. CD152 与 B7 分子之间的作用
[答案] D
[解析] 【正解D】T细胞活化第二信号（共刺激信号）主要由T细胞表面CD28与APC表面B7分子（CD80/CD86）相互作用提供。仅有第一信号（TCR识别抗原肽-MHC）而无第二信号时，T细胞进入失能（anergy）状态——不能增殖和分泌细胞因子，故第二信号是T细胞充分活化的必要条件。【排除】A.CD8与MHC-I和B.CD4与MHC-II均加固第一信号而非提供第二信号。C.CD40-CD40L为T-B协作关键信号。E.CD152与B7结合传递抑制信号，负调控免疫应答。
[题目] 427. HIV 壳膜蛋白 gp120受体是
A. CD2
B. CD3
C. CD4
D. CD8
E. CD25
[答案] C
[解析] 【正解C】HIV包膜糖蛋白gp120与CD4分子高亲和力结合后，构象改变暴露辅助受体结合位点，与CCR5或CXCR4结合，介导病毒包膜与宿主细胞膜融合，病毒核心进入CD4+T细胞。HIV持续感染导致CD4+T细胞进行性减少，最终引发获得性免疫缺陷综合征（AIDS）。【排除】A.CD2为黏附分子和绵羊红细胞受体。B.CD3为TCR信号转导分子。D.CD8为CTL辅助受体，HIV不通过其感染。E.CD25为IL-2受体α链，非HIV受体。
[题目] 428. CD4 分子与 MHCⅡ类分子结合的区域是
A. αl功能区
B. β1 功能区
C. α2 功能区
D. β2 功能区
E. α3 功能区
[答案] D
[解析] 【正解D】MHC-II类分子由α链（α1、α2结构域）和β链（β1、β2结构域）组成。CD4分子D1结构域与MHC-II类分子β2结构域特异性非共价结合，作为辅助受体加固TCR-CD3复合体与抗原肽-MHC-II复合物的相互作用，显著增强T细胞对抗原的敏感性（约100倍）。【排除】A.α1和B.β1构成MHC-II类分子的肽结合槽。C.α2含部分CD4结合位点但不主要。E.α3为MHC-I类分子结构域，与CD8结合。 
[题目] 429. 可与MHCI 类分子结合增强T 细胞和靶细胞之间的相互作用的CD分子是
A. CD3
B. CD4
C. CD8
D. CD28
E. CD40
[答案] C
[解析] 【正解C】CD8分子（αα同源二聚体或αβ异源二聚体）与MHC-I类分子重链α3结构域非共价结合，作为辅助受体拉近TCR与靶细胞表面抗原肽-MHC-I复合物的空间距离，增强CTL识别和杀伤靶细胞的特异性与效率，是CD8+T细胞发挥效应功能的关键辅助受体。【排除】A.CD3与TCR组成复合体传递第一信号。B.CD4与MHC-II结合而非MHC-I。D.CD28与B7结合提供共刺激信号。E.CD40在Th-B协作中发挥作用。 
[题目] 430. 胞质区含有ITIM, 与 B7 结合后可抑制T 细胞活化的 CD分子是
A. CD3
B. CD28
C. CD4
D. CD8
E. CD152
[答案] E
[解析] 【正解E】CD152（CTLA-4/CD152）胞质区含有ITIM（免疫受体酪氨酸抑制基序），与B7分子（CD80/CD86）结合后募集SHP-1/SHP-2磷酸酶，去磷酸化TCR信号通路中的关键分子，传递抑制信号，负调控T细胞活化和增殖，维持免疫稳态、防止过度免疫应答。【排除】A.CD3胞质区含ITAM传递活化信号。B.CD28与B7结合传递共刺激活化信号。C.CD4和D.CD8为辅助受体，胞质区与Lck结合增强活化信号。 
[题目] 431. Th2 细胞不分泌的细胞因子是
A. IL-10
B. IL-4
C. IFN-γ
D. TNF-α
E. IL-5
[答案] C
[解析] 【正解C】IFN-γ是Th1细胞的特征性细胞因子（由Th1、CTL和NK细胞产生），Th2细胞不分泌IFN-γ。Th2细胞分泌IL-4（促进IgE类别转换）、IL-5（活化嗜酸性粒细胞）、IL-10（抑制Th1和巨噬细胞）和TNF-α等，主要辅助体液免疫应答和抗寄生虫感染。【排除】A.IL-10由Th2和Tr1细胞分泌。B.IL-4是Th2的特征性细胞因子。D.TNF-α由Th2和巨噬细胞等分泌。E.IL-5由Th2细胞分泌。 
[题目] 432. 初始T 细胞表达的 CD分子是
A. CD45RA
B. CD44
C. CD45RO
D. CD40
E. CD28
[答案] A
[解析] 【正解A】初始T细胞（naive T cell）表达CD45RA异构体（CD45高分子量形式），由于CD45基因外显子A未被剪接所致。T细胞活化后CD45异构体由CD45RA转变为CD45RO（低分子量形式），CD45RO是记忆/效应T细胞的表面标志，可用于区分初始T细胞和记忆T细胞。【排除】B.CD44为黏附分子，初始和效应T细胞均表达。C.CD45RO是记忆/效应T细胞标志。D.CD40主要表达于B细胞。E.CD28是共刺激受体，各阶段T细胞均表达。 
[题目] 433. 通过分泌TGF-β 对免疫应答发挥负调节的T 细胞是
A. Th₁
B. Th2
C. Th3
D. CTL
E. Tc
[答案] C
[解析] 【正解C】Th3细胞主要分泌TGF-β，对免疫应答发挥负调节作用，主要参与黏膜免疫中口服耐受的诱导。Th3细胞通过分泌TGF-β抑制Th1和Th2细胞的活化与增殖，同时促进B细胞类别转换为IgA，在肠道黏膜免疫稳态维持中发挥关键作用。【排除】A.Th1分泌IFN-γ介导细胞免疫，起正调节作用。B.Th2分泌IL-4/IL-5/IL-10辅助体液免疫。D.CTL和E.Tc均通过穿孔素/颗粒酶和FasL途径杀伤靶细胞，非负调节细胞。 
[题目] 434. T 细胞阴性选择中，被清除的细胞是
A. 不能与抗原肽-MHCI 有效结合的 DP细胞
B. 与抗原肽-MHCI 亲和力过高的 DP 细胞
C. 与抗原肽-MHCI 亲和力过高的 SP 细胞
D. 不与抗原肽-MHCI 发生结合的 SP
E. 与抗原肽-MHCI 有低亲和力的 SP细胞
[答案] C
[解析] 【正解C】胸腺阴性选择（negative selection）中，TCR与胸腺皮髓质交界处DC和巨噬细胞表面自身抗原肽-MHC复合物高亲和力结合的SP（CD4+或CD8+单阳性）胸腺细胞被克隆性删除（经凋亡清除），从而建立中枢自身耐受，防止自身反应性T细胞进入外周攻击自身组织。【排除】A.不能有效结合MHC的DP细胞在阳性选择中被忽略死亡。B.阴性选择发生在DP分化为SP之后。D.不与MHC结合者被忽略死亡。E.低亲和力结合者被阳性选择存活。 
[题目] 435. 可促进Thl 细胞进一步分化，同时抑制Th2 细胞增生的细胞因子是
A. IL-2
B. IL-4
C. IFN-γ
D. TNF-β
E. IL-13
[答案] C
[解析] 【正解C】IFN-γ通过STAT1信号通路促进Th0细胞向Th1方向分化，并同时抑制Th2细胞增殖，形成Th1正反馈环路——Th1分泌的IFN-γ进一步促进Th1分化、抑制Th2分化，使免疫应答向细胞免疫方向极化。IFN-γ还能活化巨噬细胞增强杀菌能力。【排除】A.IL-2促进所有T细胞增殖，对Th1/Th2无方向性选择。B.IL-4促进Th2分化并抑制Th1，与题目要求相反。D.TNF-β无Th1/Th2方向性选择作用。E.IL-13由Th2分泌，促进Th2方向。 
[题目] 436. 关于γδT 细胞，描述错误的是
A. 不受 MHC 限制
B. 受体缺乏多样性
C. 多为 CD4~CD8~细胞
D. 识别非肽类分子
E. 主要分布在外周血
[答案] E
[解析] 【正解E】γδT细胞主要分布于皮肤、肠道、呼吸道和泌尿生殖道等上皮组织中（上皮内淋巴细胞），而非主要分布于外周血——外周血中T细胞绝大多数为αβT细胞（占90-99%）。γδT细胞识别非肽类抗原（如磷酸抗原、脂类），不受MHC限制，多为CD4-CD8-双阴性表型，受体多样性有限。【排除】A.γδT细胞不受MHC限制（正确）。B.γδT细胞受体多样性确实低于αβT细胞（正确）。C.γδT细胞多为CD4-CD8-（正确）。D.γδT细胞识别非肽类分子如脂类抗原（正确）。 
[题目] 437. CD8 分子与 MHCI 类分子结合的区域是
A. αl 功能区
B. β1 功能区
C. α2 功能区
D. β2 功能区
E. α3 功能区
[答案] E
[解析] 【正解E】CD8分子（αα或αβ二聚体）与MHC-I类分子重链α3结构域非共价结合。MHC-I类分子由重链α链（含α1、α2、α3三个胞外结构域）和β2微球蛋白组成——α1和α2构成肽结合槽，α3是CD8辅助受体的结合位点。【排除】A.α1和C.α2构成MHC-I的肽结合槽，不与CD8结合。B.β1和D.β2为MHC-II类分子结构域，不存在于MHC-I类分子。 
[题目] 438. 通过分泌 IL-10 抑制巨噬细胞的功能的细胞是
A. Th₁
B. Th2
C. Th3
D. Tc
E. Trl
[答案] E
[解析] 【正解E】Tr1细胞（1型调节性T细胞/CD4+Foxp3-）主要分泌高水平的IL-10，通过IL-10抑制巨噬细胞的抗原提呈功能和促炎因子分泌，属于适应性/诱导性调节性T细胞（iTreg），在外周免疫耐受中发挥重要作用，与天然Treg（nTreg/Foxp3+）通过不同机制抑制免疫应答。【排除】A.Th1分泌IFN-γ活化巨噬细胞。B.Th2分泌IL-4/IL-5辅助体液免疫。C.Th3分泌TGF-β抑制免疫。D.Tc（CTL）杀伤靶细胞。 
[题目] 439. T 细胞在胸腺发育过程中，通过阳性选择获得
A. 自身MHC限制性
B. 自身耐受
C. TCR的表达
D. TCRa链基因重排
E. TCRβ链基因重排
[答案] A
[解析] 【正解A】T细胞在胸腺皮质阳性选择（positive selection）中，能适度识别胸腺皮质上皮细胞表面自身MHC-自身肽复合物的DP胸腺细胞获得存活信号，分化成为SP细胞，从而获得自身MHC限制性——即成熟T细胞在外周只能识别由自身MHC分子提呈的抗原肽。这是T细胞适应性免疫特异性的重要基础。【排除】B.自身耐受通过阴性选择建立，非阳性选择。C.TCR表达在阳性选择前已完成（DN阶段）。D/E.TCR基因重排发生于DN阶段，远早于阳性选择。 
[题目] 440. 能特异性直接杀伤靶细胞的细胞是
A. Th 细胞
B. CTL 细胞
C. NK 细胞
D. 巨噬细胞
E. 中性粒细胞
[答案] B
[解析] 【正解B】CTL细胞（CD8+细胞毒性T淋巴细胞）是适应性免疫中唯一能特异性直接杀伤靶细胞的效应细胞，通过TCR特异性识别靶细胞表面MHC-I-抗原肽复合物后，释放穿孔素和颗粒酶（颗粒胞吐途径）及表达FasL（Fas/FasL途径）诱导靶细胞凋亡。【排除】A.Th细胞通过分泌细胞因子辅助其他免疫细胞，不直接杀伤。C.NK细胞杀伤无抗原特异性和MHC限制。D.巨噬细胞通过吞噬和释放活性氧等非特异性杀伤。E.中性粒细胞通过吞噬和脱颗粒非特异性杀伤。 
[题目] 441. 有关γδT细胞的阐述哪项是错误的
A. 占外周血淋巴细胞的少数
B. 主要为 CD8*细胞
C. 表面标记为 CD3*的细胞
D. 杀伤作用的特异性不高
E. 具有杀伤肿瘤细胞作用
[答案] B
[解析] 【正解B】γδT细胞主要为CD4-CD8-（双阴性，DN）细胞，少数为CD8+，几乎不表达CD4；题干称"主要为CD8+细胞"是错误的。γδT细胞占外周血淋巴细胞的少数（1-10%），表达CD3（与γδTCR组成复合体），杀伤特异性不高（非MHC限制），具有抗肿瘤和抗感染作用。【排除】A.占外周血少数（正确）。C.表面表达CD3分子（正确）。D.杀伤特异性不高（正确，无需MHC提呈）。E.具有杀伤肿瘤细胞作用（正确）。 
[题目] 442. T 细胞特有的分化抗原是
A. CD3
B. CD4
C. CD5
D. CD8
E. CD19
[答案] A
[解析] 【正解A】CD3是T细胞特有的分化抗原，是所有成熟T细胞均表达的泛T细胞标志，与TCR组成TCR-CD3复合体，是T细胞谱系最可靠的特征性表面分子。临床上流式检测CD3+T细胞用于计数外周血总T细胞。【排除】B.CD4表达于Th/Treg等亚群及单核/巨噬细胞，非T细胞特有。C.CD5表达于T细胞和B-1a细胞。D.CD8表达于CTL、部分NK细胞和γδT细胞。E.CD19是B细胞特有标志（除浆细胞）。 
[题目] 443. 按 T 淋巴细胞识别抗原受体在结构上的差异可将T 淋巴细胞分为
A. Th1 和 Th2 细胞
B. TCRγδ+和 TCRγδ-T 细胞
C. TCRaβ+ 和 TCRaβ-T 细胞
D. TDTH 和 Tc 细胞
E. TCRaβ 和 TCRγδT 细胞
[答案] E
[解析] 【正解E】T淋巴细胞根据T细胞抗原识别受体（TCR）在结构上的差异，分为TCRαβT细胞和TCRγδT细胞两大类。这是T细胞最根本的分类方式——两类细胞的TCR由不同的基因编码、识别不同类型的抗原、分布部位和功能均不同。【排除】A.Th1和Th2是按功能分类的CD4+T亚群。B/C均为错误表述（TCRγδ+和TCRγδ-是对γδT的划分，不是对全部T细胞的分类）。D.TDTH和Tc是按效应功能分类。 
[题目] 444. 可分泌穿孔素和颗粒酶的细胞有
A. CTL 细胞和
B. 细胞 B.CTL 细胞和 NK 细胞
C. B 细胞和 NK 细胞
D. CTL 细胞和巨噬细胞
E. B淋巴细胞和巨噬细胞
[答案] B
[解析] 【正解B】CTL细胞（CD8+）和NK细胞均可通过颗粒胞吐途径分泌穿孔素（perforin）和颗粒酶（granzyme）杀伤靶细胞——穿孔素在靶细胞膜上聚合形成孔道，颗粒酶经孔道进入胞内裂解DNA诱导凋亡。CTL为特异性杀伤（MHC-I限制），NK为非特异性杀伤（无MHC限制），但二者共享颗粒胞吐这一效应机制。【排除】A.选项文字不完整。C.B细胞不分泌穿孔素/颗粒酶。D.巨噬细胞通过吞噬、释放活性氧和一氧化氮等杀伤，非穿孔素/颗粒酶。E.B细胞和巨噬细胞均不分泌穿孔素/颗粒酶。 
[题目] 445. CD4+T 细胞的表型是
A. TCRaβ+CD2-CD3+CD4+CD8-
B. TCRaβ+CD2-CD3-CD4+CD8-
C. TCRaβ+CD2+CD3+CD4+CD8-
D. TCRγδ+CD2+CD3+CD4+CD8-
E. TCRγδ+CD2+CD3+CD4+CD8-
[答案] C
[解析] 【正解C】CD4+T细胞（辅助性T细胞）的正确表型为TCRαβ+CD2+CD3+CD4+CD8-。成熟T细胞表达TCRαβ（外周T细胞绝大部分为αβT），CD2为绵羊红细胞受体/黏附分子，CD3是T细胞泛标志，CD4是辅助受体，不表达CD8（CD8为CTL标志）。【排除】A.缺少CD2+（所有T细胞均表达CD2）。B.缺少CD3+（成熟T细胞均表达CD3）。D/E.TCRγδ+为γδT细胞表型，外周血CD4+T细胞为αβT细胞。 
[题目] 446. 参与T 细胞分化与活化的 CD 分子是
A. CD40
B. CD21
C. CD19
D. CD56
E. CD3
[答案] E
[解析] 【正解E】CD3分子（与TCR非共价结合形成TCR-CD3复合体）是参与T细胞分化与活化的关键CD分子，其胞质区ITAM基序在TCR识别抗原后被磷酸化，启动胞内信号转导级联反应，是T细胞从初始细胞到效应细胞分化和活化所必需的信号转导分子。【排除】A.CD40主要表达于B细胞和APC，参与Th-B协作而非T细胞活化信号转导。B.CD21为EBV受体和补体受体CR2，表达于B细胞。C.CD19为B细胞辅助受体复合体组分。D.CD56为NK细胞标志，非T细胞。 
[题目] 447. T 细胞分化成熟的场所是
A. 骨髓
B. 淋巴结
C. 胸腺
D. 脾脏
E. 黏膜淋巴组织
[答案] C
[解析] 【正解C】胸腺是T细胞分化成熟的场所（中枢免疫器官）。骨髓来源的淋巴样前体细胞迁入胸腺后，经过DN（CD4-CD8-双阴性）→DP（CD4+CD8+双阳性）→SP（CD4+或CD8+单阳性）三个阶段，经历TCR基因重排、阳性选择（获得MHC限制性）和阴性选择（建立自身耐受），最终成熟为功能性初始T细胞释放至外周。【排除】A.骨髓是B细胞分化成熟场所和所有血细胞来源。B/D/E.淋巴结、脾脏和黏膜淋巴组织均为外周免疫器官，是成熟T细胞定居和免疫应答场所，非发育场所。 
[题目] 448. 人类T 细胞不具备的受体是
A. E受体
B. IgG Fc受体
C. C3b受体
D. PHA受体
E. IL-2受体
[答案] B
[解析] 【正解B】人类T细胞不表达IgG Fc受体（FcγR/CD16）。FcγR主要表达于巨噬细胞、中性粒细胞、NK细胞（CD16/FcγRIII）、DC和B细胞（FcγRIIb）等，介导调理吞噬、ADCC和免疫复合物清除等功能。T细胞通过TCR特异性识别抗原，不需要Fc受体介导抗原识别。【排除】A.E受体即CD2（绵羊红细胞受体），所有T细胞均表达。C.C3b受体（CR1/CD35）表达于T细胞表面。D.PHA受体（有丝分裂原受体）T细胞有表达。E.IL-2受体（CD25）活化T细胞高表达。注意：少数已报道活化的T细胞亚群可能表达低水平FcγR，但常规人类成熟T细胞不表达FcγR。 
[题目] 449. 与 CTL细胞活化、增殖、分化无关的是
A. 协同刺激分子受体
B. MHCⅡ 类分子
C. IL- 12
D. IFN-γ
E. IL-2
[答案] B
[解析] 【正解B】CTL（CD8+T）细胞活化、增殖和分化受MHC-I类分子限制，其TCR识别靶细胞表面MHC-I-抗原肽复合物。MHC-II类分子主要与CD4+Th细胞相互作用，与CTL活化无直接关系。CTL需要IL-2（关键生长因子）、IFN-γ和IL-12（促进CTL分化）等细胞因子参与。【排除】A.协同刺激分子受体（CD28）为CTL活化所必需的第二信号。C.IL-12促进CTL分化。D.IFN-γ促进CTL功能和MHC-I表达。E.IL-2促进CTL克隆扩增。 
[题目] 450. 用直接免疫荧光法检测T 细胞上 CD4抗原，荧光素应标记在
A. CD4 抗原上
B. CD4 单克隆抗体上
C. 固相载体上
D. 抗人 Ig抗体上
E. 某种动物红细胞上
[答案] B
[解析] 【正解B】直接免疫荧光法（direct immunofluorescence）检测细胞表面CD4抗原时，荧光素标记在CD4单克隆抗体上。标记抗体直接与细胞表面CD4抗原结合，洗涤去除未结合抗体后，通过流式细胞仪或荧光显微镜检测荧光信号，荧光强度反映CD4表达水平。【排除】A.直接法标记抗体而非抗原。C.固相载体用于ELISA而非直接荧光法。D.抗人Ig抗体标记用于间接免疫荧光法（二抗法）。E.绵羊红细胞用于E玫瑰花环试验检测T细胞。 
[题目] 451. CD4*T 细胞的生物学作用不包括
A. 促进免疫细胞的增殖和分化
B. 协调免疫细胞之间的相互作用
C. 参与对靶细胞的特异性直接杀伤
D. 受 MHCⅡ 类分子限制
E. 任何状态下均可通过产生 CK 而发挥作用
[答案] C
[解析] 【正解C】CD4+T细胞（Th细胞）的生物学作用不包括"参与对靶细胞的特异性直接杀伤"——这是CD8+CTL的功能。CD4+T细胞主要通过分泌细胞因子辅助B细胞产生抗体和CTL活化增殖，同时协调免疫细胞间相互作用，其抗原识别受MHC-II类分子限制。【排除】A.促进免疫细胞增殖分化是CD4+T核心功能。B.协调免疫细胞相互作用是Th功能。D.受MHC-II类分子限制正确（CD4与MHC-II结合）。E.Th在活化状态下通过产生细胞因子发挥作用，选项E不严谨但C是明确错误。 
[题目] 452. T 细胞表面的协同信号分子受体是
A. CD28 分子
B. CD40 分子
C. ICAM- 1
D. CD4 分子
E. CD8 分子
[答案] A
[解析] 【正解A】CD28分子是T细胞表面最重要的协同刺激信号分子受体（co-stimulatory receptor），其与APC表面B7分子（CD80/CD86）结合提供T细胞活化必需的第二信号。CD28胞质区含YxxM基序，结合后募集PI3K，协同TCR信号促进IL-2转录和T细胞存活。【排除】B.CD40是B细胞/APC表面的协同刺激分子受体。C.ICAM-1是APC表面的黏附分子配体。D.CD4和E.CD8是辅助受体（co-receptor），增强第一信号而非提供第二信号。 
[题目] 453. T/B 细胞表面共有的标志是
A. CD3
B. PWM-R
C. 绵羊红细胞受体
D. 补体受体
E. CD80 分子
[答案] B
[解析] 【正解B】PWM-R（美洲商陆丝裂原受体/PWM receptor）在T细胞和B细胞表面均有表达，因此PWM可同时非特异性地刺激T细胞和B细胞增殖分化，常用于体外淋巴细胞转化试验评估体液—细胞联合免疫功能。【排除】A.CD3为T细胞特有标志。C.绵羊红细胞受体（CD2）为T细胞表面分子。D.补体受体主要表达于B细胞、巨噬细胞等，非T细胞共有。E.CD80（B7-1）主要表达于专职APC表面。 
[题目] 454. CD4 分子存在于
A. Th1 、Tc 细胞
B. Treg 、CTL 细胞
C. Th0 、Th1 、Th2 细胞
D. 所有成熟T 细胞
E. 肥大细胞
[答案] C
[解析] 【正解C】CD4分子存在于Th0（未分化前体）、Th1（细胞免疫辅助）、Th2（体液免疫辅助）等辅助性T细胞亚群以及Treg（调节性T细胞）表面，是CD4+T细胞谱系的共同标志。【排除】A.Tc（CTL/CD8+）不表达CD4，表达CD8。B.Treg确有CD4，但CTL不表达CD4。D.CTL和部分NK细胞不表达CD4，不是所有成熟T细胞。E.肥大细胞表达FcεRI和c-Kit等，不表达CD4。 
[题目] 455. 人 T 细胞区别于B 细胞及其他细胞的特征是
A. 形态
B. Fc受体
C. 胞质颗粒
D. TCR
E. Ig表面标志
[答案] D
[解析] 【正解D】TCR（T细胞受体）是T细胞区别于B细胞及其他细胞的最特征性标志。T细胞通过TCR特异性识别APC表面MHC-抗原肽复合物，启动适应性免疫应答。TCR是T细胞独有的抗原识别受体，B细胞表达BCR（膜Ig），其他细胞不表达TCR或BCR。【排除】A.形态不能可靠区分T/B细胞（均为小淋巴细胞形态相似）。B.Fc受体在B、NK、巨噬细胞等均有表达，非T细胞独有特征。C.胞质颗粒见于CTL、NK和粒细胞等。E.Ig表面标志（BCR）是B细胞特征而非T细胞。 
[题目] 456. 可用于检测外周T 细胞总数的 CD分子是
A. CD1
B. CD2
C. CD3
D. CD4
E. CD8
[答案] C
[解析] 【正解C】CD3分子在所有成熟T细胞表面表达（与TCR组成TCR-CD3复合体），是泛T细胞标志，临床流式细胞术中检测CD3+T细胞用于外周血T细胞总数测定（正常人约占总淋巴细胞的60-80%）。【排除】A.CD1表达于胸腺皮质细胞和朗格汉斯细胞。B.CD2在所有T细胞表达，但也在NK细胞表达，特异性不如CD3。D.CD4仅标记Th/Treg亚群，约占T细胞2/3。E.CD8仅标记CTL亚群，约占T细胞1/3。 
[题目] 457. 能介导与APC 非特异结合的 T 细胞表面黏附分子是
A. LFA-1
B. CD2
C. ICAM- 1
D. 上列 A 和 B两项
E. 上列 A 、B和 C 三项
[答案] E
[解析] 【正解E】T细胞与APC间的非特异性黏附涉及多对黏附分子：LFA-1（T细胞/CD11a-CD18）与ICAM-1（APC/CD54）结合；CD2（T细胞/LFA-2）与LFA-3（APC/CD58）结合。这两对黏附分子对均参与初始的非特异性可逆结合，为TCR扫描抗原肽-MHC复合物创造条件。A项LFA-1在T细胞表面，B项CD2在T细胞表面，C项ICAM-1虽在APC表面但也参与结合。【排除】三项均参与，无单独一项可覆盖全部。 
[题目] 458. 可抑制T 细胞活化的配对分子是
A. B7/CD28
B. CTLA-4/B7
C. LFA-1/ICAM- 1
D. 上列 A和 B 两项
E. 上列 A 、B和 C 三项
[答案] B
[解析] 【正解B】CTLA-4/B7（CD152-CD80/CD86）是抑制性配受体对。CTLA-4胞质区含ITIM基序，与B7分子（CD80/CD86）结合后募集SHP-1/SHP-2磷酸酶，去磷酸化TCR通路信号分子，传递抑制信号，负调控T细胞活化，是重要的免疫检查点分子。【排除】A.B7/CD28是活化性共刺激配受体对，促进T细胞活化。C.LFA-1/ICAM-1是黏附分子对，非抑制信号。D和E包含了活化性配对，不完全正确。 
[题目] 459. 关于共刺激分子描述正确的是
A. 激活的专职 APC 高表达共刺激分子
B. 静止的 APC 不表达或仅低表达共刺激分子
C. 正常组织不表达或仅低表达共刺激分子
D. 上列 A 和 B 两项
E. 上列 A 、B和 C 三项
[答案] E
[解析] 【正解E】激活的专职APC（DC、巨噬细胞、活化B细胞）高表达共刺激分子CD80/CD86；静息/未成熟APC不表达或仅低表达共刺激分子；正常组织细胞通常不表达或极低表达共刺激分子。这一表达模式确保T细胞仅在接受专职APC提呈的抗原肽-MHC（第一信号）和共刺激分子（第二信号）双信号时才被活化，防止对自身组织的免疫攻击。【排除】A、B、C均正确但单独不完整，三项全对故答案为E。 
[题目] 460. naive T cell 是
A. 已初次接触过Ag的成熟T 细胞
B. 未接触过Ag的成熟T 细胞
C. 已初次接触过 Ag 的未成熟T 细胞
D. 未接触过Ag的未成熟T 细胞
E. 尚未离开胸腺的T 细胞
[答案] B
[解析] 【正解B】Naive T cell（初始T细胞）是指已在胸腺中完成发育（TCR重排、阳性/阴性选择）成为成熟T细胞、释放至外周淋巴器官但从未接触过特异性抗原的T细胞。其高表达CD45RA、CD62L和CCR7，在淋巴结副皮质区循环，需DC提呈抗原并提供共刺激信号才能活化分化为效应细胞。【排除】A.已接触抗原者为效应/记忆T细胞。C.未成熟T细胞在胸腺内（DN/DP阶段），尚未释放外周。D.未成熟+未接触——错误叠加。E.尚未离开胸腺者为胸腺细胞（thymocyte），非naive T cell。 
[题目] 461. 与 TCR构成复合体的分子是
A. CD2
B. CD4
C. CD8
D. CD28
E. CD3
[答案] E
[解析] 【正解E】CD3分子（γ、δ、ε、ζ链）与TCR（αβ或γδ异源二聚体）非共价结合构成TCR-CD3复合体，TCR的可变区负责识别抗原肽-MHC复合物（第一信号），CD3链的胞质区ITAM基序负责将识别信号跨膜传递至胞内，启动信号转导级联反应。二者功能分工明确——TCR管识别，CD3管信号转导，缺一不可。【排除】A.CD2是黏附分子。B.CD4和C.CD8是辅助受体。D.CD28是共刺激受体。 
[题目] 462. 传递 TCR 识别抗原的信号的是
A. CD2
B. CD3
C. CD4
D. Iga/Igβ
E. CD8 40,MHCⅡ类分子的受体是(B) A.CD2 B.CD4 C.CD8 D.CD25 E.CD28
[答案] B
[解析] 【正解B】CD3分子传递TCR识别抗原后的活化信号——CD3链（γ、δ、ε、ζ）的胞质区含ITAM基序，TCR结合抗原肽-MHC后，Lck磷酸化ITAM酪氨酸残基，募集ZAP-70并磷酸化，启动下游MAPK、NF-κB和NFAT等信号通路，最终激活IL-2等基因转录。【排除】A.CD2是黏附分子，不直接传递TCR信号。C.CD4和E.CD8为辅助受体，增强第一信号但不直接传递TCR信号。D.Igα/Igβ（CD79a/CD79b）是BCR的信号转导分子，对应B细胞。 
[题目] 463. MHCI类分子的受体是
A. CD2
B. CD4
C. CD8
D. CD25
E. CD28
[答案] C
[解析] 【正解C】CD8分子是MHC-I类分子的辅助受体（co-receptor），以αα同源二聚体或αβ异源二聚体形式存在，其α链与MHC-I类分子重链α3结构域非共价结合。此结合拉近TCR与靶细胞膜距离，增强TCR对抗原肽-MHC-I复合物的亲和力和信号传导效率。【排除】A.CD2为黏附分子和绵羊红细胞受体。B.CD4是MHC-II类分子的辅助受体。D.CD25是IL-2受体α链。E.CD28是共刺激受体与B7结合。 
[题目] 464. 抗原肽与MHC分子的结合是通过
A. 静电引力
B. 锚定残基
C. 疏水作用
D. 共价键
E. 离子键
[答案] B
[解析] 【正解B】抗原肽通过其锚定残基（anchor residues）嵌入MHC分子肽结合槽中的对应袋（pockets）非共价结合——锚定残基是肽链中特定位置的氨基酸，其侧链与MHC分子结合袋的物理化学特性互补。不同MHC等位基因的结合袋结构不同，决定了每个MHC分子所能结合抗原肽的基序（binding motif）。【排除】A/C/E.静电引力、疏水作用和离子键均参与结合但非决定特异性的关键机制。D.抗原肽与MHC分子间为可逆的非共价结合，非共价键。 
[题目] 465. T细胞对超抗原的识别特点下列错误的是
A. 不需要 APC 参与
B. 无 MHC 限制性
C. TCR 通过 Vβ与超抗原结合
D. 需要MHCⅡ类分子的参与
E. 仅能激活少量T 细胞
[答案] E
[解析] 【正解E】超抗原（superantigen, SAg）的识别特点是可激活大量T细胞（占T细胞总数的2-20%），因为SAg不需APC内加工处理，直接以完整蛋白形式在MHC-II类分子肽结合槽外侧与TCR Vβ链结合，无需特异性识别抗原肽，也无MHC限制性——正因如此可多克隆激活携带特定Vβ家族的T细胞。【排除】A.需要APC参与（MHC-II+细胞）——该选项说"不需要"是错误的（应选正确项，但题目问"错误的是"，而E的错误词是"仅能激活少量"，超抗原实际激活大量T细胞）。注意：题目要求选"错误的是"，E为错误——超抗原激活大量T细胞而非少量。 
[题目] 466. 胞质区含 ITIM
A. CD3
B. CD4
C. CD8
D. CD28
E. CD152
[答案] E
[解析] 【正解E】CD152（CTLA-4/CD152）胞质区含ITIM（免疫受体酪氨酸抑制基序），与B7分子（CD80/CD86）高亲和力结合后，募集SHP-1/SHP-2磷酸酶，去磷酸化TCR通路中ZAP-70和LAT等关键分子，终止活化信号传导，是T细胞活化后负反馈调控的核心分子之一。【排除】A.CD3胞质区含ITAM（活化基序）。B.CD4胞质区与Lck结合传递辅助信号。C.CD8胞质区也与Lck结合。D.CD28胞质区含YxxM基序传递共刺激活化信号。 
[题目] 467. 分泌 TGF-β 为主
A. Th0
B. Th1
C. Th2
D. Th3
E. Trl
[答案] D
[解析] 【正解D】Th3细胞主要分泌TGF-β，在黏膜免疫中发挥负调节作用，通过TGF-β抑制Th1和Th2细胞活化增殖并促进B细胞类别转换为IgA，是口服耐受诱导的关键调节细胞（低剂量抗原经肠道摄取后诱导Th3分化）。【排除】A.Th0为未分化前体，分泌多种低水平细胞因子但无主导方向。B.Th1以分泌IFN-γ为标志。C.Th2以分泌IL-4为标志。E.Tr1以分泌高水平IL-10为标志。 
[题目] 468. 与其他细胞相互作用时受 MHCⅡ限制的是
A. Tc
B. Ts
C. Th
D. NK 细胞
E. 嗜酸性粒细胞
[答案] C
[解析] 【正解C】Th细胞（CD4+辅助性T细胞）表面TCR-CD3复合体识别APC/B细胞等表面MHC-II类分子提呈的抗原肽，CD4分子作为辅助受体与MHC-II类分子β2结构域结合加固相互作用，因此Th细胞与其他细胞相互作用时受MHC-II类分子限制。【排除】A.Tc（CTL/CD8+）受MHC-I类分子限制。B.Ts（抑制性T细胞，概念较老）功能上也属于CD8+群体，受MHC-I限制。D.NK细胞不受MHC限制。E.嗜酸性粒细胞不通过TCR-MHC机制识别靶标。 
[题目] 469. 与其他细胞相互作用时受MHCI 限制的是
A. Tc
B. Ts
C. Th
D. NK 细胞
E. 嗜酸性粒细胞
[答案] A
[解析] 【正解A】Tc（CD8+细胞毒性T细胞/CTL）通过TCR-CD3复合体特异性识别靶细胞表面MHC-I类分子提呈的抗原肽，CD8分子作为辅助受体与MHC-I类分子α3结构域结合加固相互作用。CTL杀伤靶细胞具有严格的MHC-I类分子限制性和抗原特异性。【排除】B.Ts功能上为CD8+群体，同样受MHC-I限制。C.Th受MHC-II限制。D.NK细胞不受MHC限制（MHC-I类分子反而通过KIR/Ly49抑制NK杀伤）。E.嗜酸性粒细胞不涉及MHC限制性识别。 
[题目] 470. 对细胞免疫和体液免疫均起辅助作用的是
A. Tc
B. Ts
C. Th
D. NK 细胞
E. 嗜酸性粒细胞
[答案] C
[解析] 【正解C】Th细胞（CD4+辅助性T细胞）对细胞免疫和体液免疫均起辅助作用：Th1细胞通过分泌IFN-γ和IL-2辅助CTL活化和巨噬细胞杀菌功能（细胞免疫）；Th2细胞通过分泌IL-4/IL-5/IL-13辅助B细胞活化、增殖和类别转换（体液免疫）；Tfh细胞通过CD40L-CD40和IL-21辅助生发中心B细胞应答。【排除】A.Tc仅参与细胞免疫的效应阶段。B.Ts起免疫抑制作用而非辅助。D.NK为固有免疫效应细胞，不辅助适应性免疫。E.嗜酸性粒细胞参与抗寄生虫免疫和过敏。 
[题目] 471. 具有 CD4分子表面标志的是
A. Tc
B. Ts
C. Th
D. NK 细胞
E. 嗜酸性粒细胞
[答案] C
[解析] 【正解C】Th细胞（CD4+辅助性T细胞）表面表达CD4分子标志，CD4是Th细胞谱系的特征性表型标志，由MHC-II限制性选择决定（阳性选择中识别MHC-II的DP细胞分化为CD4+SP细胞）。CD4分子不仅是表型标志，也作为辅助受体与MHC-II类分子结合增强T细胞活化。【排除】A.Tc表达CD8而非CD4。B.Ts也表达CD8而非CD4。D.NK细胞表达CD56和CD16，不表达CD4。E.嗜酸性粒细胞不表达CD4（部分嗜酸性粒细胞在特定条件下可表达极低水平，但非特征性标志）。 
[题目] 472. 对细胞免疫和体液免疫均起辅助作用的是
A. Tc
B. Ts
C. Th
D. NK 细胞
E. 嗜酸性粒细胞
[答案] C
[解析] 【正解C】本题与第470题重复。Th细胞对细胞免疫和体液免疫均起辅助作用：通过分泌IFN-γ和IL-2辅助CTL活化增殖（细胞免疫），通过分泌IL-4/IL-5/IL-13并表达CD40L辅助B细胞活化和抗体产生（体液免疫）。Th细胞是适应性免疫应答的中枢调节细胞，CD4+T细胞数量减少（如HIV感染）将导致全面的免疫功能缺陷。【排除】A.Tc仅介导细胞免疫效应阶段。B.Ts起负调节作用。D.NK杀伤靶细胞不受MHC限制，非适应性免疫。E.嗜酸性粒细胞不辅助适应性免疫。 
[题目] 473. CD8+CTL 细胞活化的第一信号开始于
A. TCR 识别自身 MHCI 靶细胞表面的Ag
B. CD4+Th与 APC 间黏附分子及协同刺激分子的作用
C. DP细胞与胸腺皮质上皮细胞表面 MHC 分子发生有效结合
D. 胸腺细胞与位于胸腺皮髓质交界处的DC和 Mφ 细胞上的自身Ag-MHC复合物发生有效结合
E. 胸腺细胞与位于胸腺皮髓质交界处的 DC和 Mφ 细胞上的自身Ag-MHC 复合物未发生结合
[答案] A
[解析] 【正解A】CD8+CTL细胞活化的第一信号由CTL表面TCR-CD3复合体特异性识别靶细胞（或交叉提呈DC）表面自身MHC-I类分子提呈的抗原肽所产生。TCR对抗原肽-MHC-I复合物的特异性识别是启动CTL活化的必要条件，也是适应性细胞免疫特异性的基础。【排除】B.CD4+Th与APC间相互作用为CTL提供辅助和共刺激信号，非第一信号。C.DP细胞与胸腺皮质上皮细胞MHC有效结合是阳性选择。D.胸腺细胞与DC和Mφ上的自身肽-MHC复合物有效结合是阴性选择。E.未结合事件不产生活化信号。 
[题目] 474. CD8+Th胞活化的第二信号开始于
A. TCR 识别自身 MHCI 靶细胞表面的Ag
B. CD4+Th与 APC 间黏附分子及协同刺激分子的作用
C. DP细胞与胸腺皮质上皮细胞表面 MHC分子发生有效结合
D. 胸腺细胞与位于胸腺皮髓质交界处的DC和 Mφ 细胞上的自身Ag-MHC复合物发生有效结合
E. 胸腺细胞与位于胸腺皮髓质交界处的 DC和 Mφ 细胞上的自身Ag-MHC 复合物未发生结合
[答案] B
[解析] 【正解B】CD8+T细胞（CTL）活化第二信号来自CD4+Th细胞提供的辅助——Th细胞被APC活化后，通过CD40L-CD40与APC相互作用上调APC的共刺激分子表达，同时分泌IL-2和IFN-γ等细胞因子，促进CTL对第一信号的有效应答（Th依赖性CTL活化途径）。此外，直接交叉提呈途径中DC高表达共刺激分子可直接提供第二信号（Th非依赖性途径）。【排除】A.TCR识别MHC-I-抗原肽为CTL第一信号。C.DP与胸腺皮质上皮细胞MHC结合为阳性选择。D.胸腺细胞与自身肽-MHC高亲和力结合为阴性选择。E.未结合无活化效应。 
[题目] 475. 胸腺中的阳性选择过程开始于
A. TCR 识别自身 MHCI 靶细胞表面的Ag
B. CD4*Th与 APC 间黏附分子及协同刺激分子的作用
C. DP细胞与胸腺皮质上皮细胞表面 MHC 分子发生有效结合
D. 胸腺细胞与位于胸腺皮髓质交界处的DC和 Mφ 细胞上的自身Ag-MHC复合物发生有效结合
E. 胸腺细胞与位于胸腺皮髓质交界处的 DC和 Mφ 细胞上的自身Ag-MHC 复合物未发生结合
[答案] C
[解析] 【正解C】胸腺中的阳性选择（positive selection）开始于DP（CD4+CD8+双阳性）胸腺细胞与胸腺皮质上皮细胞（cTEC）表面的MHC-自身肽复合物发生适度有效结合。能识别MHC-I的DP分化为CD8+SP，能识别MHC-II的DP分化为CD4+SP；不能结合MHC或结合过弱的DP细胞被"忽略死亡"（death by neglect）。【排除】A.TCR识别MHC-I-抗原肽为外周效应阶段。B.CD4+Th与APC相互作用为外周免疫应答。D.自身肽-MHC高亲和力结合为阴性选择（清除自身反应细胞）。E.未结合为忽略死亡而非阳性选择。 
[题目] 476. 胸腺中的自身耐受过程开始于
A. TCR 识别自身 MHCI 靶细胞表面的Ag
B. CD4*Th与 APC 间黏附分子及协同刺激分子的作用
C. DP细胞与胸腺皮质上皮细胞表面 MHC 分子发生有效结合
D. 胸腺细胞与位于胸腺皮髓质交界处的DC和 Mφ 细胞上的自身Ag-MHC复合物发生有效结合
E. 胸腺细胞与位于胸腺皮髓质交界处的 DC和 Mφ 细胞上的自身Ag-MHC 复合物未发生结合
[答案] D
[解析] 【正解D】胸腺中的自身耐受建立过程——阴性选择（negative selection）开始于胸腺细胞（已分化为SP的CD4+或CD8+细胞）在胸腺皮髓质交界处与DC和巨噬细胞（mTEC和胸腺DC）表面的自身抗原肽-MHC复合物发生高亲和力有效结合时，该胸腺细胞被克隆性删除（凋亡），从而清除自身反应性T细胞克隆，建立中枢免疫耐受。【排除】A.TCR识别MHC-I-抗原肽为外周效应。B.Th与APC相互作用为外周免疫应答。C.DP与皮质上皮细胞MHC适度结合为阳性选择。E.未结合者存活进入外周（前提是通过阳性选择）。 
[题目] 477. T 细胞获得MHC 限制性的基础是
A. TCR 识别自身 MHCI 靶细胞表面的Ag
B. CD4*Th与 APC 间黏附分子及协同刺激分子的作用
C. DP细胞与胸腺皮质上皮细胞表面 MHC 分子发生有效结合
D. 胸腺细胞与位于胸腺皮髓质交界处的DC和 Mφ 细胞上的自身Ag-MHC复合物发生有效结合
E. 胸腺细胞与位于胸腺皮髓质交界处的 DC和 Mφ 细胞上的自身Ag-MHC 复合物未发生结合
[答案] D
[解析] 【正解C】T细胞获得MHC限制性的基础是阳性选择——DP细胞与胸腺皮质上皮细胞表面MHC分子发生有效结合后被选择存活并获得MHC限制性。但题目以此形式以D为答案，因为列出的选项更契合教材中对"获得MHC限制性"的表述逻辑（选项D强调有效结合=阳性选择的事件本质）。建议以教材为准：阳性选择（选项C描述）赋予MHC限制性，阴性选择（选项D描述）赋予自身耐受。此题为共用选项题组，答案可能存在选项与题干匹配度的问题。 
[题目] 478. 胸腺细胞继续发育为SP 细胞的前提是
A. TCR 识别自身 MHCI 靶细胞表面的Ag
B. CD4*Th与 APC 间黏附分子及协同刺激分子的作用
C. DP细胞与胸腺皮质上皮细胞表面 MHC 分子发生有效结合
D. 胸腺细胞与位于胸腺皮髓质交界处的DC和 Mφ 细胞上的自身Ag-MHC复合物发生有效结合
E. 胸腺细胞与位于胸腺皮髓质交界处的 DC和 Mφ 细胞上的自身Ag-MHC 复合物未发生结合
[答案] E
[解析] 【正解E】胸腺细胞继续发育为SP（单阳性/成熟）细胞的前提是在阴性选择中，其TCR不能与胸腺皮髓质交界处DC和Mφ表面的自身抗原肽-MHC复合物发生高亲和力结合——即成功通过阴性选择（未被克隆删除），获得自身耐受后在外周发挥免疫功能。题组中选项E描述的"未发生结合"即指未发生能触发凋亡的高亲和力结合，胸腺细胞得以存活并继续发育成熟。【排除】A为CTL活化第一信号。B为Th辅助信号。C为阳性选择。D为触发阴性选择（凋亡信号）。 
[题目] 479. FasL由下列哪种细胞特征性表达
A. Treg
B. Th2
C. Th3
D. CTL
E. Trl
[答案] D
[解析] 【正解D】FasL（Fas配体/CD95L）特征性表达于CTL（CD8+细胞毒性T细胞）和NK细胞表面。CTL活化后上调FasL表达，与靶细胞表面Fas（CD95）结合后，通过FADD和Caspase-8/10启动死亡受体凋亡通路，诱导靶细胞凋亡。这是CTL杀伤靶细胞的两大主要机制之一（另一机制为穿孔素/颗粒酶途径）。【排除】A.Treg主要表达CTLA-4和分泌IL-10/TGF-β。B.Th2分泌IL-4/IL-5/IL-13。C.Th3主要分泌TGF-β。E.Tr1主要分泌IL-10。 
[题目] 480. IL-13由下列哪种细胞特征性表达
A. Treg
B. Th2
C. Th3
D. CTL
E. Trl
[答案] B
[解析] 【正解B】IL-13由Th2细胞特征性表达和分泌，与IL-4共用受体IL-4Rα链和STAT6信号通路，功能上与IL-4部分重叠——促进B细胞类别转换为IgE（但作用弱于IL-4）、诱导气道上皮细胞分泌黏液（哮喘关键因子）、促进平滑肌收缩，在抗寄生虫免疫（蠕虫清除）和过敏性疾病发病中发挥重要作用。【排除】A.Treg分泌IL-10和TGF-β。C.Th3主要分泌TGF-β。D.CTL分泌穿孔素、颗粒酶和FasL。E.Tr1分泌高水平IL-10。 
[题目] 481. IL-10由下列哪种细胞特征性表达
A. Treg
B. Th2
C. Th3
D. CTL
E. Trl
[答案] E
[解析] 【正解E】IL-10由Tr1细胞（1型调节性T细胞/CD4+Foxp3-）特征性表达和分泌（此外Th2、Treg、巨噬细胞和B细胞也产生）。IL-10是强力免疫抑制性细胞因子——抑制巨噬细胞和DC的抗原提呈和促炎因子（IL-12、TNF-α）分泌、抑制Th1细胞增殖和IFN-γ产生，是维持免疫稳态和防止免疫病理损伤的关键分子。【排除】A.Treg虽也分泌IL-10但特征性表达为Foxp3和CTLA-4。B.Th2分泌IL-4/IL-5/IL-13。C.Th3主要分泌TGF-β。D.CTL不分泌IL-10。 
[题目] 482. TGF-β由下列哪种细胞特征性表达
A. Treg
B. Th2
C. Th3
D. CTL
E. Trl
[答案] C
[解析] 【正解C】TGF-β由Th3细胞特征性表达和分泌（此外Treg、巨噬细胞、血小板等也产生），是重要的多效性免疫调节细胞因子——抑制T细胞和B细胞增殖、抑制Th1/Th2分化、抑制巨噬细胞活化、促进B细胞类别转换为IgA、诱导Foxp3+Treg分化、诱导口服耐受，在维持免疫稳态和黏膜免疫中起核心作用。【排除】A.Treg分泌TGF-β和IL-10，但以产生IL-10和Foxp3表达为特点。B.Th2分泌IL-4/IL-5/IL-13。D.CTL分泌穿孔素/颗粒酶和FasL。E.Tr1以分泌高水平IL-10为特征。 
[章节] 第七章 T淋巴细胞介导的细胞免疫应答
[单选题]
[题目] 483. 构成TCR特异性识别肽段的是该分子的
A. 胞内区
C. 区 C.跨膜区
D. 恒定区
E. CDR1～3
[答案] E
[解析] 【正解E】TCRα链和β链（或γδ链）可变区各含三个高变区/互补决定区——CDR1、CDR2和CDR3，共同构成抗原结合位点。其中CDR3可变性最高（由V(D)J重排连接区的高度多样性产生），位于结合位点中央，直接接触抗原肽中心残基；CDR1和CDR2位于两侧，主要识别MHC分子的α螺旋。【排除】A.胞内区负责信号转导。B.跨膜区含带正电氨基酸，与CD3链带负电氨基酸形成盐桥。C.题干选项中无此内容。D.恒定区不参与抗原识别。 
[题目] 484. Th细胞活化B细胞主要靠下列哪两种分子间的相互作用
A. CD4和MHCⅡ类分子
B. CD40L和CD40
C. B7和CD28
D. B7和CTLA-4
E. ICAM和LFA-1
[答案] B
[解析] 【正解B】Th细胞（Tfh细胞）活化B细胞主要依赖CD40L（CD154，活化Th细胞表面）与CD40（B细胞组成性表达）的相互作用，这是T-B细胞协作的关键分子信号——CD40信号激活B细胞内NF-κB通路，诱导B细胞增殖、生发中心形成、类别转换和体细胞高频突变，CD40L基因突变导致X连锁高IgM综合征。【排除】A.CD4-MHC-II提供Th细胞自身活化信号而非活化B细胞信号。C.B7-CD28为T细胞共刺激信号。D.B7-CTLA-4为抑制信号。E.ICAM-LFA-1为黏附分子。 
[题目] 485. 不识别由MHC分子递呈的蛋白质抗原，只识别由CD1分子递呈的脂类或糖脂类抗原的细胞是
A. Th细胞
B. CTL细胞
C. NKT细胞
D. NK细胞
E. APC细胞
[答案] C
[解析] 【正解C】NKT细胞（自然杀伤T细胞）表达TCR（多为固定TCRα链Vα14-Jα18，在小鼠）和NK细胞标志（如NK1.1），其TCR不识别MHC分子提呈的蛋白抗原肽，而是识别CD1d分子（非经典MHC-I类样分子）提呈的脂类或糖脂类抗原（如α-半乳糖神经酰胺）。NKT细胞兼具固有免疫（快速反应）和适应性免疫（特异性识别）特征，活化后迅速分泌大量Th1/Th2细胞因子。【排除】A.Th细胞和B.CTL细胞均识别MHC分子提呈的蛋白质抗原肽。D.NK细胞无TCR，通过NCR和KIR等受体识别。E.APC不是识别细胞而是提呈细胞。 
[题目] 486. 下列细胞因子哪个是由Th2细胞分泌的
A. IFN-γ
B. TNF-α
C. IL-2
D. IL-5
E. IL-17
[答案] D
[解析] 【正解D】IL-5由Th2细胞和2型固有淋巴样细胞（ILC2）分泌，主要生物学作用是促进嗜酸性粒细胞分化、增殖、活化和趋化（在抗寄生虫感染和过敏性炎症中至关重要），在小鼠中还促进B-1细胞增殖和IgA产生。【排除】A.IFN-γ由Th1细胞分泌，活化巨噬细胞。B.TNF-α由Th1、巨噬细胞等多种细胞分泌。C.IL-2由Th1细胞分泌，是T细胞生长因子。E.IL-17由Th17细胞分泌，招募中性粒细胞。 
[题目] 487. 能够促进Th0细胞向Th1分化的细胞因子是
A. IL-1
B. IL-4
C. IL-6
D. IL-12
E. IL-23
[答案] D
[解析] 【正解D】IL-12（p35+p40亚基，由活化的DC和巨噬细胞产生）是促进Th0细胞向Th1方向分化的最关键细胞因子。IL-12与Th0细胞表面IL-12R结合后，通过STAT4信号通路诱导主转录因子T-bet表达，启动IFN-γ基因转录和Th1分化程序，同时抑制Th2/Th17分化。【排除】A.IL-1为促炎因子，不决定Th0方向性分化。B.IL-4通过STAT6诱导GATA-3表达，促进Th0向Th2分化。C.IL-6联合TGF-β诱导Th17分化。E.IL-23促进Th17维持和致病性。 
[题目] 488. 树突状细胞表面提供T细胞活化第二信号的分子主要是
A. MHCⅡ类分子
B. CD19
C. CD28
D. CD58
E. CD80/CD86
[答案] E
[解析] 【正解E】CD80（B7-1）和CD86（B7-2）是DC（树突状细胞）表面提供T细胞活化第二信号（共刺激信号）的主要分子，与初始T细胞表面CD28结合后，通过PI3K-AKT通路协同TCR信号促进IL-2转录和抗凋亡蛋白Bcl-xL表达，是T细胞充分活化、避免失能的关键。【排除】A.MHC-II分子提供T细胞第一信号的配体。B.CD19为B细胞辅助受体组分。C.CD28在T细胞表面（非DC表面）表达。D.CD58（LFA-3）为黏附分子，在DC表面表达但与CD2结合传递黏附/辅助信号而非主要共刺激信号。 
[题目] 489. naive T cell是
A. 已初次接触过Ag的成熟T细胞
B. 未接触过Ag的成熟T细胞
C. 已初次接触过Ag的未成熟T细胞
D. 未接触过Ag的未成熟T细胞
E. 尚未离开胸腺的T细胞
[答案] B
[解析] 【正解B】初始T细胞（naive T cell）是已通过胸腺选择发育成熟并释放至外周淋巴器官，但从未在外周遭遇过其TCR识别的特异性抗原的T细胞。其表型特征为CD45RA+CD45RO-CD62LhiCCR7hi（初始/中枢记忆标志），在淋巴结副皮质区循环巡逻，被DC提呈的抗原激活后才分化为效应T细胞（CD45RA-CD45RO+）。【排除】A.已接触抗原者为效应/记忆T细胞。C.已接触抗原者为活化的成熟T细胞，非初始状态。D.未接触抗原的未成熟细胞不存在于外周（在胸腺内发育）。E.尚未离开胸腺者为胸腺细胞。 
[题目] 490. T细胞活化最重要的共刺激信号是
A. CD4与MHC Ⅱ类分子
B. CD8与MHC Ⅰ类分子
C. CD28与B7
D. CD2与LFA-3
E. LFA-1与ICAM-1
[答案] C
[解析] 【正解C】CD28（T细胞表面组成性表达）与B7分子（CD80/CD86，专职APC表面）的相互作用是T细胞活化最重要和最经典的共刺激信号（第二信号）。缺乏此信号时，仅有第一信号导致T细胞失能（anergy）或凋亡，无法有效活化。CD28信号促进IL-2转录、稳定IL-2 mRNA、上调抗凋亡蛋白。【排除】A.CD4-MHC-II和B.CD8-MHC-I均为辅助受体与MHC结合加固第一信号。D.CD2-LFA-3为黏附分子对，辅助初始接触。E.LFA-1-ICAM-1也为黏附分子对，非共刺激信号。 
[题目] 491. 参与T细胞与APC细胞间非特异性相互作用的T细胞表面分子有
A. LFA-1
B. LFA-3
C. CD40
D. CD80
E. CD86
[答案] A
[解析] 【正解A】题目问"参与T细胞与APC细胞间非特异性相互作用的T细胞表面分子"。LFA-1（CD11a/CD18，淋巴细胞功能相关抗原-1）表达于T细胞表面，与APC表面ICAM-1（CD54）结合介导非特异性可逆黏附，为TCR扫描抗原肽-MHC复合物提供条件，是免疫突触形成初期的关键黏附分子。【排除】B.LFA-3（CD58）表达于APC表面而非T细胞表面。C.CD40和D/E.CD80/CD86（B7）均表达于APC表面，虽然参与T-APC相互作用但不在T细胞表面表达。注意审题——问的是"T细胞表面分子"，仅LFA-1符合。 
[题目] 492. 下列细胞中兼具适应性免疫功能的APC是
A. 自然杀伤细胞
B. 树突状细胞
C. B细胞
D. T细胞
E. 巨噬细胞
[答案] C
[解析] 【正解C】B细胞兼具适应性免疫功能（通过BCR特异性识别抗原后活化为浆细胞产生特异性抗体，介导体液免疫）和专职APC功能（通过MHC-II类分子高效提呈BCR内化摄取的抗原给Th细胞，尤其在低浓度抗原时因BCR对抗原的高亲和力浓缩效应，提呈效率极高），是唯一兼具这两种功能的细胞类型。【排除】A.NK细胞为固有免疫效应细胞，无TCR/BCR介导的适应性免疫功能，也非专职APC。B.DC是最强专职APC但无适应性免疫功能（无TCR/BCR）。D.T细胞为适应性免疫细胞但非专职APC。E.巨噬细胞非适应性免疫效应细胞，虽是专职APC但不能产生特异性抗体。 
[题目] 493. 拮抗Th2细胞分化的细胞因子是
A. IL-1
B. IL-2
C. IL-4
D. IL-5
E. IFN-γ
[答案] E
[解析] 【正解E】IFN-γ可拮抗/抑制Th2细胞分化，同时促进Th1分化，是Th1/Th2平衡向Th1方向偏移的关键调节因子。IFN-γ通过STAT1信号通路诱导T-bet表达，T-bet不仅促进Th1分化还直接抑制GATA-3（Th2主转录因子）和IL-4基因转录，形成"促进Th1+抑制Th2"的双重效应。【排除】A.IL-1为促炎因子无方向性选择。B.IL-2促进所有T细胞增殖分化无方向性。C.IL-4促进Th2分化（与题意要求"拮抗Th2"相反）。D.IL-5为Th2效应因子，非分化调节因子。 
[题目] 494. 穿孔素分子不具有下列哪项特点
A. 与补体成分C9作用相似
B. 可在靶细胞膜上聚合成孔道样结构
C. 存在于CTL细胞的胞浆颗粒中
D. 可使靶细胞发生凋亡
E. 可使靶细胞发生溶解
[答案] D
[解析] 【正解D】穿孔素（perforin）分子不具有"使靶细胞发生凋亡"的特点——穿孔素在靶细胞膜上聚合成跨膜孔道样结构（类似补体MAC/C5b-9），导致细胞膜通透性增加、渗透性溶解和坏死。而靶细胞凋亡由颗粒酶（丝氨酸蛋白酶，经穿孔素孔道进入胞内后裂解caspase和DNA）和Fas/FasL途径诱导。【排除】A.与C9作用相似——穿孔素与补体C9在结构和功能上高度同源（正确）。B.可在靶细胞膜聚合成孔道（正确）。C.存在于CTL胞浆颗粒中（正确）。E.可使靶细胞发生溶解（正确，通过渗透性裂解）。 
[题目] 495. 胞质区含有ITIM，与B7结合后可抑制T细胞活化的CD分子是
A. CD3
B. CD4
C. CD8
D. CD28
E. CD152
[答案] E
[解析] 【正解E】CD152（CTLA-4/CD152）是经典的免疫共抑制受体（免疫检查点分子）。其胞质区含有ITIM（免疫受体酪氨酸抑制基序），与B7分子（CD80/CD86）以比CD28高约20倍的亲和力结合后，募集SHP-1/SHP-2磷酸酶，去磷酸化ZAP-70及LAT等TCR通路关键分子，终止活化信号，负调控T细胞活化和增殖。CTLA-4在活化T细胞上诱导性表达（CD28为组成性表达）。【排除】A.CD3胞质区含ITAM传递活化信号。B.CD4和C.CD8为辅助受体。D.CD28与B7结合传递活化信号，其胞质区含YxxM基序。 
[题目] 496. 致敏CTL细胞杀伤靶细胞时，导致靶细胞DNA裂解的物质是
A. 穿孔素
B. Fas蛋白
C. 蛋白聚糖
D. 颗粒酶
E. 白细胞介素
[答案] D
[解析] 【正解D】致敏CTL细胞杀伤靶细胞时，颗粒酶（granzyme，主要为granzyme B）是导致靶细胞DNA裂解的物质。CTL通过免疫突触定向释放胞浆颗粒中的穿孔素和颗粒酶——穿孔素在靶细胞膜形成跨膜孔道，颗粒酶经孔道进入靶细胞胞质，裂解caspase-3/7前体和ICAD（caspase活化的DNase抑制剂），释放CAD切割核DNA为寡核苷酸片段（约200bp的梯状条带），诱导caspase依赖性和非依赖性凋亡。【排除】A.穿孔素形成孔道但不裂解DNA。B.Fas蛋白介导外源性凋亡通路但不直接裂解DNA。C.蛋白聚糖为颗粒支架非杀伤效应分子。E.白细胞介素不具杀伤活性。 
[题目] 497. 能促进T细胞生长的细胞因子是
A. IL-1
B. IL-2
C. IFN-γ
D. TNF-α
E. TNF-β
[答案] B
[解析] 【正解B】IL-2（白细胞介素-2）是促进T细胞生长（存活和增殖）的最关键细胞因子。活化T细胞通过自分泌（autocrine）和旁分泌方式产生IL-2，与高亲和力IL-2受体（α/β/γ三链）结合后激活JAK-STAT、PI3K-AKT和MAPK信号通路，驱动T细胞克隆扩增和效应分化（其中CD8+T细胞对IL-2依赖性最强）。IL-2也是维持Treg存活的重要因子。【排除】A.IL-1主要作为促炎因子和共刺激因子。C.IFN-γ主要活化巨噬细胞，非T细胞生长因子。D.TNF-α和E.TNF-β为促炎和细胞毒因子，非T细胞生长因子。 
[题目] 498. 对细胞免疫应答起负调节作用的细胞因子是
A. IL-1
B. IL-2
C. IL-6
D. IL-12
E. TGF-β
[答案] E
[解析] 【正解E】TGF-β（转化生长因子-β）是对细胞免疫应答起负调节作用的最重要细胞因子之一——抑制T细胞（尤其是Th1和CTL）增殖和效应功能，抑制IL-2和IFN-γ产生，促进Foxp3+Treg分化和维持，抑制巨噬细胞活化和促炎因子分泌，是维持免疫稳态和防止自身免疫的关键调节分子。TGF-β基因敲除小鼠发生多器官致死性自身免疫炎症。【排除】A/B/C/D.IL-1、IL-2、IL-6、IL-12均对细胞免疫起正向促进或增强作用（促炎、促T细胞增殖或促Th1分化）。 
[题目] 499. 可抑制T细胞活化的配对分子是
A. B7/CD28
B. CTLA-4/B7
C. LFA-1/ICAM-1
D. CD40L/CD40
E. CD2/LFA-3
[答案] B
[解析] 【正解B】CTLA-4（CD152）/B7（CD80/CD86）是可抑制T细胞活化的抑制性配受体对。CTLA-4在活化T细胞上诱导表达，与B7的亲和力比CD28高约20倍，竞争性阻断CD28-B7共刺激信号，同时胞质区ITIM募集SHP-1/SHP-2磷酸酶传导抑制信号，双重机制负调控T细胞活化，防止过度免疫应答。【排除】A.B7/CD28为活化性配受体对（促进活化）。C.LFA-1/ICAM-1为黏附分子对（非抑制信号）。D.CD40L/CD40为T-B协作活化信号。E.CD2/LFA-3也为黏附分子对，促进而非抑制T细胞活化。 
[题目] 500. T细胞耗竭时，以下哪种分子表达显著升高?
A. CD28
B. PD-1
C. IL-2R
D. Fas
E. Bcl-2
[答案] B
[解析] 【正解B】T细胞耗竭（T cell exhaustion）时，PD-1（程序性死亡受体-1/CD279）表达显著升高，是耗竭T细胞最特征性的标志。在慢性病毒感染（如HIV/HCV）和肿瘤微环境中，持续抗原刺激导致T细胞功能性无能——PD-1、TIM-3、LAG-3、CTLA-4等共抑制分子高表达，CD28表达下调，IL-2产生减少，效应功能（细胞毒活性、细胞因子分泌）进行性丧失，呈阶梯式进展。【排除】A.CD28表达下调而非升高。C.IL-2R表达降低（IL-2产生能力丧失）。D.Fas在耗竭T细胞中可表达但非特异性标志。E.Bcl-2表达不变或降低（抗凋亡能力减弱）。 
[题目] 501. 下列哪项不是调节性T细胞的作用特点
A. 分泌抑制性细胞因子
B. 通过细胞间直接接触抑制
C. 抑制APC抗原提呈
D. 抑制肿瘤的发生
E. 抑制自身免疫性疾病的发生
[答案] D
[解析] 【正解D】"抑制肿瘤的发生"不属于调节性T细胞（Treg）的正常生理作用特点。事实上，Treg在肿瘤微环境中大量聚集，通过抑制抗肿瘤效应T细胞（CTL和Th1）的功能，反而促进肿瘤免疫逃逸和肿瘤进展。Treg的正常生理功能是抑制自身免疫、维持外周耐受和限制生理性免疫应答强度。【排除】A.分泌抑制性细胞因子（IL-10/TGF-β）——Treg的特点。B.通过细胞间直接接触抑制（CTLA-4-B7、颗粒酶/穿孔素）——Treg的特点。C.抑制APC抗原提呈功能——Treg的特点。E.抑制自身免疫性疾病的发生——Treg的核心生理功能。 
[题目] 502. 初始T细胞是
A. 未接触抗原的成熟T细胞
B. 具有记忆功能的T细胞
C. 经抗原活化过的T细胞
D. 未接触抗原的未成熟T细胞
E. 表达高亲和力IL-2受体的T细胞
[答案] A
[解析] 【正解A】初始T细胞（naive T cell）是指已完成胸腺发育和选择、成熟并释放至外周淋巴器官，但从未在外周接触过其TCR所识别的特异性抗原的T细胞。其表型为CD45RA+CD45RO-CD62LhiCCR7hi，在淋巴结和脾脏中循环，一旦遇到DC提呈的特异性抗原并被活化，则转变为效应T细胞（CD45RA-CD45RO+），增殖分化并发挥免疫功能。【排除】B.具有记忆功能的T细胞为记忆T细胞（表达CD45RO）。C.经抗原活化过的是效应T细胞或记忆T细胞。D.未接触抗原的未成熟T细胞不在外周存在（外周T细胞均已完成胸腺发育）。E.表达高亲和力IL-2R的是活化T细胞，初始T细胞仅表达中/低亲和力IL-2R（βγ链）。 
[题目] 503. Th1细胞对Tc细胞(CTL)的辅助作用是
A. 分泌细胞因子，促进CTL的增殖、分化
B. 协助传递第一信号
C. 促进CTL表面MHCⅡ类分子的表达
D. 促进CTL表面MHCⅠ类分子的表达
E. 促进CTL释放穿孔素
[答案] A
[解析] 【正解A】Th1细胞对CTL（Tc细胞）的辅助作用主要通过分泌细胞因子实现：IL-2是CD8+T细胞增殖和分化为效应CTL的最关键生长因子（CD8+T细胞自身IL-2产量有限，对Th1来源的IL-2有依赖性）；IFN-γ促进CTL效应功能、上调靶细胞MHC-I表达增强抗原提呈和杀伤效率。Th1通过"经典间接活化途径"辅助CTL——先活化APC上调共刺激分子，再辅助CTL活化。【排除】B.第一信号由TCR识别MHC-I-抗原肽提供，Th1不参与传递。C/D.CTL表面MHC分子表达不受Th1调控，CTL表达的MHC-I类分子为所有有核细胞的共性。E.穿孔素释放是CTL自身效应功能而非Th1促进。 
[题目] 504. 拮抗Th1细胞分化的细胞因子是
A. IL-2
B. IL-4
C. IL-7
D. IL-12
E. IFN-γ
[答案] B
[解析] 【正解B】IL-4是拮抗Th1细胞分化的关键细胞因子。IL-4通过STAT6信号通路诱导Th2主转录因子GATA-3表达，GATA-3不仅激活Th2相关基因（IL-4/IL-5/IL-13）还通过多种机制抑制Th1分化——直接抑制T-bet和STAT1活性、下调IL-12Rβ2链表达（使Th0对IL-12不敏感）。IL-4和IFN-γ构成Th分化方向性决定的最经典交叉拮抗对。【排除】A.IL-2促进所有T细胞增殖无方向性。C.IL-7维持初始T细胞和记忆T细胞存活。D.IL-12促进Th1分化（与题目要求"拮抗Th1"相反）。E.IFN-γ促进Th1分化（与题目要求相反）。 
[题目] 505. 提供T细胞活化的第二信号的分子对是
A. CD28-B7
B. CD4-MHCⅡ类分子
C. CD8-MHCⅠ类分子
D. TCR-抗原肽
E. TCR-MHC分子
[答案] A
[解析] 【正解A】CD28（T细胞）与B7分子（CD80/CD86，APC）是提供T细胞活化第二信号（共刺激信号）的经典和最重要分子对。CD28信号通过PI3K-AKT和Ras-MAPK通路协同TCR信号，促进IL-2转录和mRNA稳定、上调抗凋亡蛋白Bcl-xL、促进细胞周期进展，是T细胞从初始状态转变为完全活化状态的关键开关。【排除】B.CD4-MHC-II提供第一信号加固（辅助受体作用）。C.CD8-MHC-I提供第一信号加固（辅助受体作用）。D.TCR-抗原肽为第一信号的核心识别事件。E.TCR-MHC分子不准确——TCR识别的是抗原肽-MHC复合物。 
[题目] 506. 下列细胞间作用受MHCⅠ类分子限制的是
A. APC与Th细胞
B. NK细胞与靶细胞
C. Th细胞与巨噬细胞
D. CTL细胞与靶细胞
E. Th细胞与B细胞
[答案] D
[解析] 【正解D】CTL细胞（CD8+T细胞）与靶细胞的相互作用受MHC-I类分子限制——CTL的TCR特异性识别靶细胞表面由自身MHC-I类分子提呈的内源性抗原肽（如病毒肽、肿瘤肽），CD8辅助受体与MHC-I类分子α3结构域结合加固识别，这是CTL杀伤靶细胞的抗原特异性前提和MHC限制性基础。【排除】A.APC与Th细胞间——受MHC-II类分子限制（Th为CD4+）。B.NK细胞与靶细胞——无MHC限制（NK反而被自身MHC-I类分子通过KIR抑制）。C.Th细胞与巨噬细胞——受MHC-II限制。E.Th细胞与B细胞——Th识别B细胞表面MHC-II-肽复合物，受MHC-II限制。 
[题目] 507. 下列细胞因子中，哪一个对T细胞增殖至关重要
A. IL-2
B. IL-4
C. IL-6
D. IL-10
E. IL-12
[答案] A
[解析] 【正解A】IL-2对T细胞增殖至关重要。T细胞经TCR和CD28信号协同活化后，迅速产生并分泌IL-2，同时上调高亲和力IL-2受体（α/β/γ三链）表达。IL-2通过自分泌环路驱动T细胞进入细胞周期、促进克隆扩增（对数期增殖），是T细胞从单个初始细胞扩增至大量效应细胞群的关键生长因子。IL-2基因敲除或IL-2信号阻断将严重抑制T细胞增殖应答。【排除】B.IL-4为Th2分化和B细胞IgE类别转换因子，非T细胞增殖关键因子。C.IL-6为促炎因子和Th17分化辅助因子。D.IL-10为抑制性因子。E.IL-12为Th1分化诱导因子。 
[题目] 508. CD4＋ Th1细胞不产生下列哪项细胞因子
A. IL-2
B. IL-4
C. IFN-γ
D. TNF
E. GM-CSF
[答案] B
[解析] 【正解B】CD4+Th1细胞的特征性细胞因子谱为IFN-γ、IL-2、TNF（TNF-α/TNF-β/LTα）和GM-CSF，不产生IL-4。IL-4是Th2细胞的特征性细胞因子，其基因位点在Th1细胞中被T-bet通过染色质重塑机制沉默（IFN-γ基因位点则被开放），反之Th2细胞中GATA-3沉默IFN-γ表达，构成了Th1/Th2稳定的细胞因子表达谱互斥模式。【排除】A.IL-2由Th1细胞产生（Th1是IL-2的主要来源之一）。C.IFN-γ是Th1细胞的标志性细胞因子。D.TNF（TNF-α）由Th1细胞产生参与抗胞内菌。E.GM-CSF由Th1细胞产生促进髓系造血。 
[题目] 509. T细胞耗竭时，以下哪种分子不会高表达?
A. PD-1
B. CD28
C. TIM-3
D. LAG-3
E. CTLA-4
[答案] B
[解析] 【正解B】T细胞耗竭（T cell exhaustion）时，多个共抑制分子/免疫检查点（PD-1、TIM-3、LAG-3、CTLA-4、TIGIT等）均显著高表达，但CD28（共刺激受体）不发生高表达——在严重耗竭阶段CD28表达反而下调甚至丢失。共抑制分子高表达与共刺激分子低表达的失衡是T细胞耗竭功能进行性丧失的核心分子机制。【排除】A.PD-1在耗竭T细胞高表达（耗竭标志）。C.TIM-3在耗竭T细胞高表达。D.LAG-3在耗竭T细胞高表达。E.CTLA-4在耗竭T细胞高表达（活化T细胞即高表达，耗竭时持续高表达）。 
[题目] 510. T细胞表面的协同信号分子受体是
A. CD4分子
B. CD8分子
C. CD28分子
D. CD40分子
E. ICAM-1
[答案] C
[解析] 【正解C】CD28分子是T细胞表面最重要的协同刺激信号分子受体（co-stimulatory receptor），是免疫球蛋白超家族成员，以同源二聚体形式组成性表达于初始T细胞表面。其配体为APC表面B7分子（CD80/CD86），结合后提供T细胞活化的第二信号（共刺激信号），是T细胞充分活化的必要条件。【排除】A.CD4和B.CD8为辅助受体（co-receptor），增强第一信号。C.CD28为协同信号受体。D.CD40分子表达于B细胞/APC表面而非T细胞表面（Th表面有CD40L）。E.ICAM-1表达于APC表面而非T细胞。 
[题目] 511. MHCⅡ类分子的受体是
A. CD2
B. CD4
C. CD8
D. CD25
E. CD28
[答案] B
[解析] 【正解B】CD4分子是MHC-II类分子的辅助受体（co-receptor），其膜远端D1结构域与MHC-II类分子β2结构域非共价结合。CD4胞质区通过其连接的Lck（Src家族酪氨酸激酶）磷酸化TCR-CD3复合体中的ITAM基序，增强抗原识别信号的传导效率（约100倍），是CD4+Th细胞识别APC表面抗原肽-MHC-II复合物的关键辅助分子。【排除】A.CD2为黏附分子和绵羊红细胞受体，非MHC-II受体。C.CD8为MHC-I类分子受体。D.CD25为IL-2受体α链。E.CD28为共刺激受体，与B7结合。 
[题目] 512. 关于初始T细胞与APC间黏附分子的非特异性结合，错误的是
A. 发生在淋巴结的副皮质区
B. 包括LFA-1与ICAM-1的结合
C. 包括CD2与LFA-3的结合
D. 是不可逆的
E. 为TCR识别特异性抗原肽提供机会
[答案] D
[解析] 【正解D】初始T细胞与APC间黏附分子的非特异性结合是可逆的（非不可逆）——通过反复结合和快速解离，使T细胞能与多个APC依次接触，为TCR筛选和识别特异性抗原肽-MHC复合物提供机会。若为不可逆结合，T细胞将被锁定在单个APC上，无法高效扫描大量APC寻找罕见特异性抗原，将严重妨碍免疫监视。【排除】A.正确:淋巴结副皮质区为T细胞区(有HEV)，是初始T与DC首次相遇的主要场所。B.正确:LFA-1(CD11a/CD18)-ICAM-1(CD54)提供低亲和力黏附。C.正确:CD2(T细胞)-LFA-3(CD58/APC)参与非特异性互作。E.正确:非特异性黏附使细胞间足够接近,为TCR扫描抗原肽-MHC创造机会。
[题目] 513. 效应T细胞凋亡的主要机制不包括?
A. Fas/FasL途径
B. 线粒体途径
C. 穿孔素/颗粒酶途径
D. 细胞因子剥夺
E. CTLA-4信号
[答案] B
[解析] 【正解B】效应T细胞凋亡（活化诱导的细胞死亡/AICD）的主要机制包括Fas/FasL途径（活化T细胞同时上调Fas和FasL，自身或相互诱导凋亡）、细胞因子剥夺（免疫应答消退后IL-2等生长因子减少触发"默认死亡"通路）和CTLA-4等抑制信号。而线粒体途径（内源性凋亡通路/Bcl-2家族调控的线粒体cytochrome c释放）虽然也参与T细胞凋亡，但在经典的AICD中不属于最主要的"启动"机制——AICD主要由死亡受体途径（Fas/FasL）主导。【排除】A.Fas/FasL途径是AICD最主要机制。C.穿孔素/颗粒酶为CTL杀伤靶细胞而非自身凋亡的主要途径。D.细胞因子剥夺是免疫消退期效应T细胞凋亡的重要机制。E.CTLA-4信号参与免疫负反馈。 
[题目] 514. 下列细胞因子中，对T细胞增殖分化没有作用的是
A. IL-2
B. IL-6
C. IL-8
D. IL-10
E. IL-12
[答案] C
[解析] 【正解C】IL-8（CXCL8）属于CXC趋化因子家族，主要功能是趋化中性粒细胞至感染/炎症部位，也对单核细胞和嗜碱性粒细胞有趋化活性。IL-8对T细胞增殖和分化没有直接的促进或调节作用——不作用于T细胞生长信号通路，不属于T细胞生长/分化调控因子。【排除】A.IL-2是T细胞增殖的关键生长因子。B.IL-6协同TGF-β促进Th17分化，也促进活化B细胞分化为浆细胞。D.IL-10抑制Th1和巨噬细胞但也可促进B细胞和Treg。E.IL-12促进Th1分化。注意IL-8对大鼠/小鼠的T细胞有微弱趋化作用，但总体上对T细胞增殖分化无直接重要作用。 
[题目] 515. 若缺乏共刺激信号，T细胞会处于何种状态?
A. 完全活化
B. 增殖加速
C. 失能(anergy)
D. 分化为记忆细胞
E. 分泌大量IL-2
[答案] C
[解析] 【正解C】若T细胞缺乏共刺激信号（即仅有TCR识别抗原肽-MHC的第一信号而无CD28-B7的第二信号），T细胞进入失能（anergy）状态——功能性无应答（functional unresponsiveness）。失能T细胞不能增殖、不产生IL-2等细胞因子、不能分化为效应细胞，且对后续完整双信号刺激也不应答或应答低下（耐受状态）。这是外周耐受的重要机制之一，防止针对自身抗原的T细胞活化。【排除】A.完全活化需要双信号。B.增殖依赖IL-2和共刺激信号，缺如则无能。D.分化为记忆细胞需先充分活化。E.分泌IL-2需CD28信号协同TCR信号。 
[题目] 516. 在下列黏附分子对中，可为T细胞活化提供最重要的协同刺激信号的是
A. CD28与B7
B. CTLA-4与B7
C. CD2与LFA-3
D. CD40与CD40L
E. ICOS与ICOSL
[答案] A
[解析] 【正解A】在所列黏附分子对中，可为T细胞活化提供最重要协同刺激信号（co-stimulatory signal）的是CD28（T细胞）与B7（CD80/CD86，APC）的相互作用。这是T细胞活化第二信号的最经典和最强来源，能协同TCR信号促进IL-2基因高水平转录和mRNA稳定化。【排除】B.CTLA-4与B7提供抑制信号（负调控）非协同刺激信号。C.CD2与LFA-3为黏附分子对，主要提供初始接触稳定而非强共刺激。D.CD40与CD40L为T-B协作关键活化信号，非初始T细胞活化所需的协同刺激。E.ICOS与ICOSL也提供共刺激信号但主要在Tfh分化和生发中心反应中，非初始T细胞活化最重要的协同刺激。 
[题目] 517. 下列哪个不是未成熟DC的优势分布部位
A. 皮肤
B. 黏膜
C. 淋巴结
D. 消化道
E. 呼吸道
[答案] C
[解析] 【正解C】未成熟DC（immature DC/iDC）的优势分布部位为外周非淋巴组织——皮肤（朗格汉斯细胞/LC）、黏膜、消化道、呼吸道和实质器官等，它们高表达模式识别受体（PRR）和FcR，具有极强的抗原摄取能力但低表达MHC-II和共刺激分子（CD80/CD86）。淋巴结主要是成熟DC（mature DC/mDC）迁移归巢后的分布部位——外周iDC捕获抗原后通过CCR7-CCL21/CCL19趋化迁移至引流淋巴结T细胞区成熟为mDC，发挥抗原提呈功能。【排除】A/B/D/E均为iDC优势分布部位。 
[题目] 518. 传递TCR识别抗原的信号的是
A. CD2
B. CD3
C. CD28
D. CD40
E. Igα/Igβ
[答案] B
[解析] 【正解B】CD3分子（γ、δ、ε、ζ链）是传递TCR识别抗原后产生活化信号的分子。TCR本身胞质区极短不具有信号转导功能，必须与CD3分子非共价结合形成TCR-CD3复合体——TCR识别抗原肽-MHC后，CD3链胞质区ITAM被Lck磷酸化，募集ZAP-70并启动下游信号级联反应。【排除】A.CD2为黏附分子，传递辅助信号非TCR信号转导。C.CD28为共刺激受体，传递第二信号。D.CD40表达于B细胞/APC，其配体CD40L在Th上。E.Igα/Igβ（CD79a/CD79b）是BCR（B细胞受体）的信号转导分子而非TCR。 
[题目] 519. T细胞表面的协同受体为
A. CD4和CD8
B. CD80和CD86
C. LFA-1和ICAM-1
D. CD2和LFA-3
E. MHC Ⅰ类分子和MHC Ⅱ类分子
[答案] A
[解析] 【正解A】T细胞表面的协同受体（co-receptor，亦称辅助受体）为CD4和CD8。CD4与MHC-II类分子β2结构域结合，CD8与MHC-I类分子α3结构域结合，两者均通过胞质区连接的Lck酪氨酸激酶增强TCR-CD3复合体的信号传导效率（约100倍），是T细胞识别抗原和活化的重要辅助分子。【排除】B.CD80和CD86（B7）是APC表面的共刺激配体，在T细胞上不表达。C.LFA-1为黏附分子，ICAM-1在APC表面。D.CD2和LFA-3（CD58）为黏附分子对。E.MHC分子在APC/靶细胞表面表达，非T细胞表面的协同受体。 
[题目] 520. 可分泌穿孔素和颗粒酶的细胞有
A. CTL细胞和
B. 细胞 B.CTL细胞和NK细胞
C. B细胞和NK细胞
D. CTL细胞和巨噬细胞
E. B淋巴细胞和巨噬细胞
[答案] B
[解析] 【正解B】CTL细胞（CD8+细胞毒性T细胞）和NK细胞均可分泌穿孔素（perforin）和颗粒酶（granzyme），通过颗粒胞吐途径杀伤靶细胞。两者胞浆内均含预存的溶细胞颗粒（含穿孔素、颗粒酶和颗粒溶解素），活化后通过免疫突触定向释放颗粒内容物至靶细胞——CTL为抗原特异性MHC-I限制性杀伤，NK为非特异性非MHC限制性杀伤，但效应机制共享颗粒胞吐这一核心通路。【排除】A.选项不完整。C.B细胞通过分泌抗体介导调理和补体活化杀伤，不分泌穿孔素/颗粒酶。D.巨噬细胞通过吞噬、活性氧、NO等杀伤。E.B细胞和巨噬细胞均无颗粒胞吐途径。 
[题目] 521. 下列细胞因子中，能诱导Th0细胞向Th2细胞分化的有
A. IL-2
B. IL-4
C. IL-12
D. TNF-α
E. IFN-γ
[答案] B
[解析] 【正解B】IL-4是诱导Th0细胞向Th2方向分化的最关键细胞因子。IL-4与Th0表面IL-4R结合后，通过STAT6信号通路诱导Th2主转录因子GATA-3的表达，启动Th2细胞因子基因簇（IL-4/IL-5/IL-13座位）的开放和转录，同时抑制IL-12Rβ2链表达（使Th0对IL-12不敏感）和抑制STAT4/T-bet通路，将分化程序锁定在Th2方向。【排除】A.IL-2促进所有T细胞亚群增殖无方向性。C.IL-12诱导Th1分化（与本题相反）。D.TNF-α无Th0方向性分化诱导作用。E.IFN-γ诱导Th1分化并抑制Th2（与本题相反——IFN-γ是Th2分化的拮抗因子）。 
[题目] 522. TCR识别抗原的特点是
A. TCR可识别天然的抗原或抗原肽-MHC分子复合物
B. TCR可识别游离的抗原肽
C. TCR只能识别抗原分子中的构象决定基
D. TCR只能识别抗原肽-MHC分子复合物
E. TCR只能识别天然的抗原
[答案] D
[解析] 【正解D】TCR（T细胞受体）只能识别由自身MHC分子提呈的抗原肽——即抗原肽-MHC分子复合物（pMHC），这是TCR抗原识别的核心特征（MHC限制性）。TCR既不能识别游离的可溶性抗原肽，也不能识别未经MHC提呈的天然蛋白质/构象表位抗原，这与BCR/mIg可直接识别游离的天然抗原构象表位形成根本区别。【排除】A.TCR不能识别天然抗原（仅识别pMHC复合物）。B.TCR不能识别游离抗原肽（需MHC提呈）。C.TCR不能识别构象决定基（BCR识别构象决定基，TCR识别降解后的线性肽-MHC复合物）。E.TCR不能识别天然抗原（错误）。 
[题目] 523. APC和T细胞间形成的免疫突触，错误的是
A. 是在细胞接触部位形成的特殊膜结构
B. 含多种跨膜分子
C. 中心区是TCR和抗原肽-MHC分子复合物
D. 可促进T细胞内信号转导
E. 在细胞相互作用前预先存在的膜结构
[答案] E
[解析] 【正解E】关于免疫突触（immunological synapse, IS）的错误描述是"在细胞相互作用前预先存在的膜结构"——免疫突触不是预先形成的静态结构，而是在T细胞与APC相互作用过程中动态形成（通过细胞骨架重组驱动膜分子有序重排）的特殊膜结构，形成过程包括初始接触（黏附分子主导）→中央区（cSMAC，TCR/pMHC和CD28/B7聚集）→外围区（pSMAC，LFA-1/ICAM-1黏附环）等阶段。【排除】A.IS是细胞接触部位的特殊膜结构（正确）。B.含多种跨膜分子（正确）。C.中心区为TCR/pMHC（正确）。D.促进T细胞内信号转导（正确，分子有序聚集有利于稳定信号复合体）。 
[题目] 524. CD8/CD4分别与MHCⅠ/Ⅱ类分子结合，可为T细胞活化
A. 提供第一信号
B. 加强第一信号
C. 提供第二信号
D. 加强第二信号
E. 提供抑制信号
[答案] B
[解析] 【正解B】CD8和CD4作为辅助受体（co-receptor）分别与MHC-I类和MHC-II类分子的非多态性区域结合（CD8与MHC-I α3结构域，CD4与MHC-II β2结构域），不能单独产生活化信号，但可以加强/增强第一信号（TCR识别抗原肽-MHC复合物产生的信号），因为CD4/CD8胞质区连接的Lck激酶被拉近至TCR-CD3复合体附近，高效磷酸化CD3链上的ITAM基序。【排除】A.第一信号由TCR识别pMHC提供，非CD4/CD8。C.第二信号由CD28-B7提供。D.加强第二信号的主要为CD28等共刺激受体的协同。E.CD4/CD8提供正向辅助信号而非抑制信号。 
[题目] 525. Th1细胞产生的对巨噬细胞活化起重要作用的细胞因子是
A. IFN-γ
B. TNF-α
C. IL-2
D. IL-3
E. GM-CSF
[答案] A
[解析] 【正解A】IFN-γ（干扰素-γ）是Th1细胞产生的对巨噬细胞活化起最重要作用的细胞因子。IFN-γ通过激活巨噬细胞内JAK-STAT1信号通路，增强巨噬细胞的杀菌/杀胞内病原体能力（诱导iNOS产生NO、诱导活性氧产生和吞噬溶酶体融合）、上调MHC-I和MHC-II类分子表达增强抗原提呈能力、促进IL-12和TNF-α分泌形成Th1正反馈环路——IFN-γ是经典的"巨噬细胞活化因子"（MAF）。【排除】B.TNF-α活化巨噬细胞但作用次于IFN-γ。C.IL-2主要促T/NK增殖。D.IL-3为造血生长因子。E.GM-CSF促髓系分化但非巨噬细胞活化的主要因子。 
[题目] 526. 关于Th1和Th2细胞所分泌的细胞因子，下列哪种说法是错误的
A. Th1细胞分泌的细胞因子包括IFN-γ和TNF-α
B. Th2细胞分泌的细胞因子包括IL-4、IL-10
C. Th1细胞分泌的细胞因子可引起巨噬细胞和NK细胞活化
D. Th2细胞分泌的细胞因子可活化CD8＋T细胞
E. Th1细胞分泌的细胞因子能抑制Th2细胞的活性
[答案] D
[解析] 【正解D】"Th2细胞分泌的细胞因子可活化CD8+T细胞"是错误的——Th2分泌的IL-4、IL-5、IL-10和IL-13主要辅助体液免疫应答（促进B细胞活化、增殖、类别转换和抗体产生），不能有效活化CD8+CTL。CTL的活化辅助主要由Th1细胞提供（分泌IL-2促进CTL增殖、分泌IFN-γ促进CTL效应功能）。【排除】A.Th1分泌IFN-γ和TNF-α属实（正确）。B.Th2分泌IL-4和IL-10属实（正确）。C.Th1分泌的IFN-γ确实可引起巨噬细胞和NK细胞活化（正确）。E.Th1分泌的IFN-γ确实能抑制Th2细胞活性（正确，Th1-Th2交叉拮抗）。 
[题目] 527. CTL细胞杀伤靶细胞的特点是
A. 可通过释放穿孔素、颗粒酶杀伤靶细胞
B. 受MHCⅡ类分子限制
C. 无抗原特异性
D. 可通过ADCC作用杀伤靶细胞
E. 可通过分泌IL-10杀伤靶细胞
[答案] A
[解析] 【正解A】CTL细胞杀伤靶细胞的特点包括：可通过释放穿孔素（在靶细胞膜聚合形成跨膜孔道）和颗粒酶（经孔道进入胞内裂解DNA诱导凋亡）特异性杀伤靶细胞（颗粒胞吐途径），此外还有FasL-Fas途径和TNF-α/TNF-β途径。CTL杀伤受MHC-I类分子严格限制且具有高度的抗原特异性（每个CTL仅识别一种特定的pMHC-I）。【排除】B.CTL受MHC-I类分子限制而非MHC-II类。C.CTL杀伤具有严格的抗原特异性（通过TCR特异性识别pMHC-I）。D.ADCC（抗体依赖细胞介导的细胞毒作用）由NK细胞和巨噬细胞等通过FcγR介导，CTL不通过ADCC杀伤。E.CTL不通过分泌IL-10杀伤（IL-10为抑制性因子）。 
[题目] 528. 特异性细胞免疫的效应细胞是
A. Th1细胞和Th0细胞
B. Th1细胞和CTL细胞
C. Th0细胞和Th2细胞
D. Th0细胞和CTL细胞
E. Th2细胞和Th17细胞
[答案] B
[解析] 【正解B】特异性细胞免疫的效应细胞是Th1细胞（CD4+辅助性T细胞）和CTL细胞（CD8+细胞毒性T细胞）。Th1细胞通过分泌IFN-γ等细胞因子活化巨噬细胞（经典巨噬细胞活化途径）和辅助CTL分化，介导DTH（迟发型超敏反应）；CTL细胞通过穿孔素/颗粒酶和FasL途径特异性杀伤靶细胞（病毒感染细胞和肿瘤细胞）。两者协同构成完整的特异性细胞免疫应答效应系统。【排除】A.Th0为未分化前体非效应细胞。C/D.Th2介导体液免疫非细胞免疫。E.Th17介导抗真菌和胞外菌及中性粒细胞炎症，非经典的细胞免疫效应细胞。 
[题目] 529. 下列叙述中不属于专职APC特点及功能的是
A. 携带抗原迁移
B. 释放穿孔素和颗粒酶
C. 表达MHC分子
D. 表达协同刺激分子
E. 处理抗原
[答案] B
[解析] 【正解B】"释放穿孔素和颗粒酶"不属于专职APC的特点和功能。专职APC（DC、巨噬细胞、活化B细胞）的特征包括：表达MHC-I和MHC-II类分子、表达共刺激分子（CD80/CD86）、具有摄取加工处理抗原的能力、携带抗原从外周组织迁移至引流淋巴结的能力。释放穿孔素和颗粒酶是CTL和NK细胞的杀伤效应功能，与专职APC的抗原提呈功能无关。【排除】A.携带抗原迁移——DC从外周组织迁移至淋巴结是APC的关键功能（正确）。C.表达MHC分子——APC高表达MHC-I和MHC-II（正确）。D.表达协同刺激分子——激活的专职APC高表达CD80/CD86（正确）。E.处理抗原——APC降解抗原为肽段并装到MHC上（正确）。 
[题目] 530. 参与T细胞与APC细胞非特异性结合的APC细胞表面分子有
A. LFA-1
B. CD2
C. CD28
D. CTLA-4
E. ICAM-1
[答案] E
[解析] 【正解E】题目问"参与T细胞与APC细胞非特异性结合的APC细胞表面分子"。ICAM-1（CD54，细胞间黏附分子-1）表达于APC表面，其配体为T细胞表面的LFA-1（CD11a/CD18），两者通过非特异性可逆结合介导T-APC初始黏附接触，为TCR扫描抗原肽-MHC复合物创造条件。【排除】A.LFA-1表达于T细胞表面（非APC表面）。B.CD2表达于T细胞表面（非APC表面）。C.CD28表达于T细胞表面（非APC表面）。D.CTLA-4表达于活化T细胞表面（非APC表面）。所有A/B/C/D均在T细胞表面表达，审题问的是"APC表面分子"。 
[题目] 531. T细胞活化所需的第二信号主要是
A. CD8与MHCⅠ类分子作用
B. CD4与MHCⅡ类分子作用
C. CD40与CD40L之间作用
D. CD28与B7分子之间的作用
E. CD152与B7分子之间的作用
[答案] D
[解析] 【正解D】T细胞活化所需的第二信号（共刺激信号）主要来自T细胞表面CD28与APC表面B7分子（CD80/CD86）之间的相互作用。CD28信号是T细胞从初始状态进入完全活化状态的"开关"，协同TCR信号促进IL-2高水平转录、稳定IL-2 mRNA、上调抗凋亡蛋白Bcl-xL表达，是T细胞增殖和效应分化的必需条件。【排除】A.CD8-MHC-I加固第一信号。B.CD4-MHC-II加固第一信号。C.CD40-CD40L是T-B协作中的关键活化信号（后期）。E.CD152（CTLA-4）-B7是抑制性信号（负调控活化）。 
[题目] 532. Th2细胞不分泌的细胞因子是
A. IL-4
B. IL-5
C. IL-10
D. IL-13
E. IFN-γ
[答案] E
[解析] 【正解E】Th2细胞不分泌IFN-γ（干扰素-γ），IFN-γ是Th1细胞的特征性细胞因子。Th2细胞的分泌谱为IL-4（诱导IgE类别转换、促进Th2分化）、IL-5（活化嗜酸性粒细胞）、IL-10（抑制Th1和巨噬细胞）和IL-13（促进黏液分泌和平滑肌收缩）。Th2基因座中IFN-γ位点被GATA-3介导的染色质沉默所关闭。【排除】A.IL-4是Th2的标志性细胞因子（正常分泌）。B.IL-5由Th2分泌促进嗜酸性粒细胞（正常分泌）。C.IL-10由Th2分泌抑制Th1（正常分泌）。D.IL-13由Th2分泌参与抗寄生虫和过敏（正常分泌）。 
[题目] 533. 关于T细胞，下列说法错误的是
A. Th1细胞和Th2细胞均是CD4＋ T细胞
B. Th2细胞介导细胞免疫
C. Th1细胞分泌IL-2
D. Th2细胞分泌IL-4
E. Th1细胞和Th2细胞均是辅助性T细胞，只是辅助对象不同
[答案] B
[解析] 【正解B】"Th2细胞介导细胞免疫"是错误的——Th2细胞主要介导体液免疫应答（辅助B细胞活化、增殖、类别转换和抗体产生，特别是IgE和IgG1），并参与抗寄生虫（蠕虫）免疫和过敏反应。细胞免疫主要由Th1细胞（活化巨噬细胞和DTH）和CTL（杀伤病毒感染细胞和肿瘤细胞）介导。【排除】A.Th1和Th2均为CD4+T细胞辅助性亚群（正确）。C.Th1细胞分泌IL-2属实（正确）。D.Th2细胞分泌IL-4属实（正确）。E.Th1和Th2均为辅助性T细胞但辅助对象不同——Th1辅助细胞免疫（CTL和巨噬细胞），Th2辅助体液免疫（B细胞）（正确）。 
[题目] 534. 下列哪种细胞因子可促进巨噬细胞杀灭其胞内寄生的结核杆菌
A. IL-1
B. IL-4
C. SCF
D. IFN-γ
E. G-CSF
[答案] D
[解析] 【正解D】IFN-γ（干扰素-γ）是活化巨噬细胞最强的细胞因子，可促进巨噬细胞杀灭其胞内寄生的结核杆菌（Mycobacterium tuberculosis）。IFN-γ激活巨噬细胞内NADPH氧化酶产生活性氧、诱导iNOS产生一氧化氮、促进吞噬溶酶体融合和酸化、增强抗原提呈能力，使巨噬细胞从静息状态转化为活化/经典活化（M1型）杀菌状态，是抗胞内菌（结核杆菌、李斯特菌等）免疫的关键效应机制。【排除】A.IL-1为促炎因子但非巨噬细胞活化的主要因子。B.IL-4反而诱导巨噬细胞替代活化（M2型/抑炎/修复表型）。C.SCF为干细胞因子。E.G-CSF为粒细胞集落刺激因子。 
[题目] 535. 位于免疫突触中央的分子对是
A. TCR/抗原肽-MHC分子复合物
B. CD2/LFA-3
C. CD28/B7
D. CD40L/CD40
E. LFA-1/ICAM-1
[答案] A
[解析] 【正解A】位于免疫突触（immunological synapse）中央区域——中央超分子活化簇（cSMAC，central supramolecular activation cluster）的分子对是TCR/抗原肽-MHC分子复合物。cSMAC是抗原识别和持续信号转导的核心区域，TCR-pMHC和CD28-B7等有序排列于此，确保高效和稳定的信号传导。【排除】B.CD2/LFA-3和E.LFA-1/ICAM-1主要分布于pSMAC（外围区域）形成黏附环。C.CD28/B7主要分布于cSMAC与TCR-pMHC相伴。D.CD40L/CD40在T-B突触中重要但在经典T-APC免疫突触中央区以TCR-pMHC为主。 
[题目] 536. Th细胞辅助B细胞活化的关键分子是?
A. FasL
B. CD40L
C. CTLA-4
D. PD-1
E. IL-17
[答案] B
[解析] 【正解B】Th细胞（滤泡辅助T/Tfh细胞）辅助B细胞活化的关键分子是CD40L（CD154），其在活化Th细胞表面诱导性表达，与B细胞表面组成性表达的CD40结合后，激活B细胞内TRAF-NF-κB信号通路，诱导B细胞增殖、生发中心形成、抗体类别转换（CSR）和体细胞高频突变（SHM），CD40L基因突变导致X连锁高IgM综合征（IgM升高但缺乏IgG/A/E，生发中心缺失）。【排除】A.FasL为CTL杀伤机制中的凋亡诱导分子。C.CTLA-4为抑制性受体。D.PD-1为耗竭T细胞标志/抑制性受体。E.IL-17为Th17细胞因子。 
[题目] 537. T细胞特异性活化的第一步是
A. APC对抗原的摄取
B. APC对抗原的加工和处理
C. 初始T细胞表面的TCR识别APC表面的抗原肽-MHC复合物
D. IL-2的分泌
E. CD3的表达
[答案] C
[解析] 【正解C】T细胞特异性活化的第一步是初始T细胞表面的TCR-CD3复合体特异性识别APC表面由MHC分子提呈的抗原肽（即抗原肽-MHC复合物/pMHC），从而提供第一信号。TCR-pMHC识别具有高度特异性和MHC限制性，是T细胞适应性免疫特异性的分子基础，必须先发生此识别事件才能启动后续活化级联（CD3-ITAM磷酸化→ZAP-70募集→下游信号通路激活）。【排除】A.APC对抗原的摄取为T细胞活化前的准备步骤。B.APC对抗原的加工处理也属准备步骤。D.IL-2分泌是T细胞活化后的结果而非第一步。E.CD3的表达在胸腺发育中已完成，非外周活化步骤。 
[题目] 538. 初始T细胞与APC的非特异性结合主要依赖哪种黏附分子?
A. CD28与B7
B. LFA-1与ICAM-1
C. CTLA-4与B7
D. CD40L与CD40
E. PD-1与PD-L1
[答案] B
[解析] 【正解B】初始T细胞与APC的非特异性可逆结合主要依赖LFA-1（CD11a/CD18，初始T细胞表面）与ICAM-1（CD54，APC表面）这对黏附分子的相互作用。LFA-1-ICAM-1介导的黏附亲和力较低但结合-解离快速，允许TCR在APC表面"扫描"大量pMHC复合物以寻找特异性抗原。此外CD2-LFA-3也参与此非特异性黏附。【排除】A.CD28-B7是特异性共刺激信号（第二信号）非初始非特异黏附。C.CTLA-4-B7是抑制信号，CTLA-4在初始T细胞上不表达。D.CD40L-CD40为活化后T-B相互作用。E.PD-1-PD-L1为抑制信号通路。 
[题目] 539. 免疫突触形成晚期，外围聚集的分子对是?
A. TCR-pMHC复合物
B. LFA-1与ICAM-1
C. CD28与B7
D. Fas与FasL
E. IL-2与IL-2R
[答案] B
[解析] 【正解B】免疫突触（immunological synapse）形成晚期，LFA-1（T细胞）与ICAM-1（APC/靶细胞）聚集在突触的外围区域——外周超分子活化簇（pSMAC，peripheral supramolecular activation cluster），形成环状的稳定黏附结构包裹中央区（cSMAC），维持细胞间紧密接触和突触结构的完整性。【排除】A.TCR-pMHC复合物分布于中央区（cSMAC）。C.CD28-B7主要分布于cSMAC与TCR-pMHC相邻。D.Fas-FasL参与CTL-靶突触的杀伤信号而非经典T-APC免疫突触的外围分子分布。E.IL-2-IL-2R为自分泌而非突触结构分子。 
[题目] 540. 以下哪种分子属于共抑制分子?
A. CD28
B. CTLA-4
C. CD40L
D. ICOS
E. 4-1BB
[答案] B
[解析] 【正解B】CTLA-4（CD152）属于经典的共抑制分子（co-inhibitory molecule/免疫检查点分子），其胞质区含ITIM基序，与B7分子结合后传递抑制信号，负调控T细胞活化程度。CTLA-4通过两种机制抑制：与CD28竞争B7配体（CTLA-4对B7的亲和力比CD28高约20倍）和通过ITIM传导抑制信号。【排除】A.CD28为共刺激分子（co-stimulatory）传递活化信号。C.CD40L为T细胞表面的活化辅助分子。D.ICOS（inducible co-stimulator）为CD28家族共刺激分子，促进Tfh分化。E.4-1BB（CD137）为TNF受体超家族共刺激分子，促进T细胞存活和记忆。 
[题目] 541. IL-2的主要作用是?
A. 抑制T细胞增殖
B. 促进T细胞存活和增殖
C. 诱导T细胞凋亡
D. 抑制巨噬细胞活化
E. 促进B细胞类别转换
[答案] B
[解析] 【正解B】IL-2的主要生物学作用是促进T细胞存活和增殖。IL-2由活化T细胞（主要为CD4+Th）产生，通过自分泌和旁分泌方式与高亲和力IL-2R（αβγ三链）结合，激活JAK1/JAK3-STAT5、PI3K-AKT和Ras-MAPK三条信号通路，驱动T细胞从G1期进入S期进行克隆扩增，同时上调抗凋亡蛋白Bcl-2促进T细胞存活。【排除】A.IL-2促进而非抑制T细胞增殖。C.IL-2促进存活，不诱导凋亡（凋亡由FasL和细胞因子剥夺介导）。D.IL-2对巨噬细胞无直接抑制作用。E.促进B细胞类别转换的主要是IL-4（IgE）、IFN-γ（IgG2a）、TGF-β（IgA/IgG2b）等，IL-2非主要类别转换因子。 
[题目] 542. 抗细胞内病原体免疫中,CD8⁺T细胞活化通常需要哪种辅助细胞的参与?
A. Th1细胞
B. Th2细胞
C. Th17细胞
D. Treg细胞
E. CD4⁺T细胞
[答案] A
[解析] 【正解A】抗细胞内病原体（如病毒、胞内菌）免疫中，CD8+T细胞的活化通常需要Th1细胞的辅助。Th1细胞识别同一APC（或同一DC经交叉提呈）表面MHC-II-抗原肽后被活化，分泌IL-2（促进CD8+T细胞增殖和分化为CTL）和IFN-γ（促进CTL效应功能和上调靶细胞MHC-I表达），这一Th1辅助CTL活化的模式称为"经典Th依赖性CTL活化途径"或"三细胞模型"。【排除】B.Th2辅助体液免疫和抗寄生虫免疫，不辅助CTL。C.Th17抗真菌和胞外菌免疫。D.Treg起免疫抑制作用。E.CD4+T细胞概念较宽泛——Th1是CD4+亚群之一，题干问"通常需哪种辅助细胞"，Th1细胞是最精确答案。 
[题目] 543. Th细胞非依赖性CD8⁺T细胞活化的条件是?
A. APC高表达共刺激分子
B. 需要IL-4分泌
C. 依赖Treg细胞的抑制
D. 需要FasL参与
E. 必须存在IL-10
[答案] A
[解析] 【正解A】Th细胞非依赖性CD8+T细胞活化（直接交叉提呈途径）的条件是APC（尤其是DC）必须自身活化并高表达共刺激分子（CD80/CD86）。活化的DC通过交叉提呈途径同时提呈MHC-I-抗原肽（给CD8+T细胞提供第一信号）和表达高水平B7分子（提供第二信号），可直接活化初始CD8+T细胞而无需Th细胞辅助。【排除】B.IL-4为Th2相关因子，非CTL活化所需。C.Treg细胞的抑制会阻碍CD8+T活化。D.FasL介导凋亡。E.IL-10为抑制因子。Th非依赖性途径的关键是DC自身被病原体PAMP活化（TLR信号）后高表达共刺激分子。 
[题目] 544. CD8⁺T细胞分化为CTL的关键细胞因子是?
A. IL-4
B. IL-10
C. IL-2
D. TGF-β
E. IFN-γ
[答案] C
[解析] 【正解C】IL-2是CD8+T细胞（初始CD8+T细胞→效应CTL）分化和克隆扩增的最关键细胞因子。初始CD8+T细胞经TCR和共刺激信号活化后上调IL-2Rα（CD25），IL-2通过自分泌（CD8+T自身分泌少量）和旁分泌（Th1来源大量）的方式驱动CD8+T细胞的克隆扩增和效应分子（穿孔素、颗粒酶、FasL）的转录表达，促进其分化为功能性CTL。【排除】A.IL-4诱导Th2分化和B细胞IgE类别转换，非CTL分化因子。B.IL-10为抑制因子。D.TGF-β抑制CTL分化和功能。E.IFN-γ促进CTL效应功能但非分化的最关键启动因子——IL-2是CTL增殖分化"不可替代"的生长因子。 
[题目] 545. Th1细胞分泌的主要细胞因子是?
A. IL-4
B. IL-5
C. IFN-γ
D. IL-17
E. IL-10
[答案] C
[解析] 【正解C】Th1细胞分泌的主要/特征性细胞因子是IFN-γ（干扰素-γ），此外还包括IL-2、TNF-α/TNF-β（LTα）和GM-CSF。IFN-γ是Th1细胞功能的主要效应介质——活化巨噬细胞（经典活化/M1型）、上调MHC分子表达、促进CTL分化、抑制Th2增殖，在抗胞内病原体（病毒、胞内菌如结核杆菌和李斯特菌）免疫和DTH中发挥核心作用。【排除】A.IL-4和B.IL-5为Th2特征性细胞因子。D.IL-17为Th17特征性细胞因子。E.IL-10为Tr1和Th2的抑制性因子。 
[题目] 546. Th2细胞的主要功能是?
A. 抗胞内病原体感染
B. 辅助体液免疫
C. 杀伤肿瘤细胞
D. 抑制免疫应答
E. 诱导中性粒细胞浸润
[答案] B
[解析] 【正解B】Th2细胞的主要功能是辅助体液免疫应答——通过分泌IL-4（促进B细胞类别转换为IgE和IgG1）、IL-5（活化嗜酸性粒细胞和促进B-1细胞增殖）、IL-13（促进黏液分泌和IgE产生）以及表达CD40L（与B细胞CD40结合提供活化信号），驱动B细胞活化、增殖、生发中心形成和高亲和力抗体产生，特别是IgE介导的抗寄生虫（蠕虫）免疫和过敏反应。【排除】A.抗胞内病原体感染是Th1细胞的功能。C.杀伤肿瘤细胞主要是CTL和NK细胞的功能。D.抑制免疫应答是Treg和Tr1/Th3的功能。E.诱导中性粒细胞浸润是Th17细胞的功能。 
[题目] 547. Th17细胞分泌的细胞因子包括?
A. IL-4和IL-5
B. IL-17和IL-22
C. IFN-γ和TNF-α
D. IL-10和TGF-β
E. IL-2和IL-12
[答案] B
[解析] 【正解B】Th17细胞分泌的细胞因子主要包括IL-17A（标志性细胞因子）、IL-17F、IL-22和IL-21等。IL-17作用于上皮细胞、成纤维细胞和巨噬细胞，诱导其产生趋化因子（CXCL8/IL-8、CXCL1等）和G-CSF，招募中性粒细胞至感染/炎症部位；IL-22增强上皮屏障功能和抗菌肽产生。Th17细胞在抗真菌（如念珠菌）、抗胞外菌感染和某些自身免疫性疾病（如银屑病、多发性硬化）中发挥重要作用。【排除】A.IL-4和IL-5为Th2分泌。C.IFN-γ和TNF-α为Th1分泌。D.IL-10和TGF-β主要由Treg和Th3分泌。E.IL-2和IL-12非Th17分泌（IL-2为Th1/T细胞生长因子，IL-12为DC/巨噬细胞来源的Th1诱导因子）。 
[题目] 548. CTL杀伤靶细胞的主要机制不包括?
A. 穿孔素/颗粒酶途径
B. Fas/FasL途径
C. 分泌IL-4
D. 释放TNF-α
E. 诱导靶细胞凋亡
[答案] C
[解析] 【正解C】CTL杀伤靶细胞的主要机制包括穿孔素/颗粒酶途径（颗粒胞吐——穿孔素在靶细胞膜形成孔道，颗粒酶进入胞内裂解DNA诱导凋亡）、Fas/FasL途径（CTL表面FasL与靶细胞Fas结合→FADD→Caspase-8→凋亡）和释放TNF-α/TNF-β诱导靶细胞凋亡。分泌IL-4不是CTL的杀伤机制——IL-4是Th2细胞分泌的细胞因子，主要诱导B细胞类别转换和促进Th2分化，CTL不分泌IL-4也不通过IL-4杀伤靶细胞。【排除】A.穿孔素/颗粒酶途径是CTL杀伤最主要机制（不选）。B.Fas/FasL途径是CTL杀伤重要机制（不选）。D.TNF-α参与CTL杀伤（不选）。E.诱导靶细胞凋亡是CTL杀伤的共同终点（不选）。 
[题目] 549. Treg细胞通过哪种机制抑制免疫应答?
A. 分泌IL-2
B. 表达CD28
C. 分泌IL-10和TGF-β
D. 促进Th1细胞分化
E. 增强CTL活性
[答案] C
[解析] 【正解C】Treg细胞（CD4+CD25+Foxp3+调节性T细胞/nTreg）主要通过分泌抑制性细胞因子IL-10和TGF-β负调控免疫应答——IL-10抑制APC（DC和巨噬细胞）功能、下调共刺激分子和IL-12的产生；TGF-β抑制T细胞增殖和效应功能、诱导Foxp3表达（促进iTreg分化）。此外Treg还通过CTLA-4竞争B7、高表达CD25消耗IL-2、通过颗粒酶/穿孔素杀伤效应细胞等机制发挥免疫抑制。【排除】A.Treg不分泌大量IL-2（反而消耗IL-2）。B.CD28为共刺激受体非抑制机制。D/E.Treg抑制而非促进Th1分化和CTL活性。 
[题目] 550. T细胞耗竭的典型特征是?
A. 高表达共抑制分子(如PD-1)
B. 分泌大量IL-2
C. 增强杀伤能力
D. 分化为记忆细胞
E. 低表达Fas
[答案] A
[解析] 【正解A】T细胞耗竭（T cell exhaustion）的典型特征是高表达多个共抑制分子/免疫检查点——最突出的是PD-1（程序性死亡受体-1），还包括TIM-3、LAG-3、CTLA-4、TIGIT和CD160等。这些抑制分子持续被配体（如PD-L1在肿瘤细胞/慢性感染APC上）刺激导致T细胞内抑制信号占优势，效应功能（细胞毒性、IFN-γ/TNF-α/IL-2分泌）进行性阶梯式丧失，从轻度耗竭（仅IL-2分泌减少）到严重耗竭（全部效应功能丧失甚至克隆删除）。【排除】B.耗竭T细胞IL-2分泌严重减少甚至丧失。C.杀伤能力减弱而非增强。D.分化为记忆细胞需先充分活化，耗竭T细胞功能丧失。E.耗竭T细胞表达Fas（参与凋亡敏感化），非低表达。 
[题目] 551. 效应T细胞完成免疫应答后，大部分会?
A. 分化为记忆细胞
B. 持续活化
C. 发生凋亡
D. 迁移至骨髓
E. 转化为B细胞
[答案] C
[解析] 【正解C】效应T细胞完成免疫应答（抗感染或免疫反应消退）后，大部分（约90-95%）通过凋亡（活化诱导的细胞死亡/AICD）被清除，仅少数（约5-10%）存活并分化为记忆T细胞提供长期免疫保护。AICD的主要机制包括：效应T细胞上调Fas和FasL表达导致Fas/FasL途径凋亡；免疫应答消退后细胞因子（尤其是IL-2和IL-7）减少触发"默认凋亡"（death by neglect）；CTLA-4信号诱导凋亡等。【排除】A.少数分化为记忆细胞（非大部分）。B.持续活化将导致免疫病理——AICD是免疫静息返回的重要机制。D.迁移至骨髓的是部分记忆T细胞和长寿浆细胞。E.T细胞不会转化为B细胞（不同谱系）。 
[题目] 552. TCR的α链和β链可变区均包含的结构是?
A. ITAM
B. CDR1、CDR2、CDR3
C. SH2结构域
D. 死亡结构域
E. 亮氨酸拉链
[答案] B
[解析] 【正解B】TCR的α链和β链（或γδ链）可变区（V区）均包含三个互补决定区——CDR1、CDR2和CDR3（complementarity-determining regions），也称为高变区（hypervariable regions）。六个CDR环（α链3个+β链3个）共同构成TCR的抗原结合位点，其中CDR3位于结合位点中央、序列可变性最高（由V(D)J重排连接区多样性产生），主要接触抗原肽中心残基（决定特异性）。【排除】A.ITAM在CD3链胞质区而非TCR V区。C.SH2结构域在信号蛋白（ZAP-70、Lck等）中不在TCR V区。D.死亡结构域在Fas、TNFR等凋亡相关分子中。E.亮氨酸拉链为转录因子二聚化结构域。 
[题目] 553. Th2细胞分泌的IL-5主要作用是?
A. 促进
B. 细胞增殖 B.活化嗜酸性粒细胞
C. 抑制巨噬细胞功能
D. 诱导Th1分化
E. 增强CTL活性
[答案] B
[解析] 【正解B】Th2细胞分泌的IL-5主要作用是活化嗜酸性粒细胞——促进嗜酸性粒细胞从骨髓前体细胞分化、增殖和活化（上调其Fc受体和粘附分子表达），在抗寄生虫（尤其是蠕虫）免疫中嗜酸性粒细胞被IL-5趋化至感染部位释放主要碱性蛋白（MBP）和嗜酸性阳离子蛋白杀伤寄生虫；在过敏性疾病中嗜酸性粒细胞活化导致组织损伤和慢性炎症。【排除】A.IL-5在人类中对B细胞增殖作用较弱（小鼠IL-5促进B-1细胞增殖和IgA产生）。C.抑制巨噬细胞功能为IL-10和IL-4的功能。D.诱导Th1分化为IL-12和IFN-γ，非IL-5。E.增强CTL活性为IL-2和IFN-γ的功能。 
[题目] 554. Th1细胞通过哪种细胞因子活化巨噬细胞?
A. IL-4
B. IFN-γ
C. IL-10
D. TGF-β
E. IL-5
[答案] B
[解析] 【正解B】Th1细胞通过分泌IFN-γ（干扰素-γ）活化巨噬细胞——IFN-γ与巨噬细胞表面IFN-γR结合后活化JAK-STAT1通路，诱导iNOS表达产生一氧化氮（NO）、NADPH氧化酶产生活性氧（ROS）、增强吞噬溶酶体融合和酸化杀灭胞内菌（如结核杆菌、李斯特菌），同时上调MHC-I和MHC-II类分子增强抗原提呈能力，促进IL-12和TNF-α分泌形成Th1正反馈。IFN-γ是经典的巨噬细胞活化因子（MAF/macrophage-activating factor）。【排除】A.IL-4诱导M2型巨噬细胞替代活化（促修复和抗炎）。C.IL-10抑制巨噬细胞功能（IL-10为抗炎因子）。D.TGF-β抑制巨噬细胞活化。E.IL-5活化嗜酸性粒细胞而非巨噬细胞。 
[题目] 555. Th2细胞分泌的IL-4主要作用是?
A. 促进CTL分化
B. 诱导B细胞产生IgE
C. 抑制炎症反应
D. 增强中性粒细胞功能
E. 激活NK细胞
[答案] B
[解析] 【正解B】Th2细胞分泌的IL-4主要作用是诱导B细胞进行抗体类别转换（class switch recombination）产生IgE。IL-4与B细胞表面IL-4R结合后通过STAT6信号通路激活IgE重链恒定区基因座（Cε）的GLT转录，在AID酶和CD40信号协同下完成类别转换为IgE。IgE是介导I型超敏反应的核心抗体并参与抗寄生虫（蠕虫）免疫。【排除】A.促进CTL分化主要由IL-2和IFN-γ（Th1细胞因子）承担。C.IL-4促进Th2分化促进炎症（过敏反应），非抑制炎症。D.增强中性粒细胞功能为IL-17和G-CSF。E.激活NK细胞为IL-12、IL-15和IFN-γ。 
[题目] 556. Th17细胞通过分泌IL-17招募的免疫细胞是?
A. 嗜酸性粒细胞
B. 中性粒细胞
C. 巨噬细胞
D. 树突状细胞
E. B细胞
[答案] B
[解析] 【正解B】Th17细胞通过分泌IL-17（IL-17A）作用于感染/炎症部位的上皮细胞、成纤维细胞和巨噬细胞，诱导这些细胞产生趋化因子（CXCL8/IL-8、CXCL1/GROα、CXCL2等）和G-CSF（粒细胞集落刺激因子），趋化和招募中性粒细胞至感染部位，促进粒细胞生成，在抗胞外细菌（如肺炎克雷伯菌）和真菌（如白色念珠菌）感染中发挥关键作用。【排除】A.嗜酸性粒细胞由IL-5招募和活化。C.巨噬细胞主要由CCL2/MCP-1招募。D.DC由CCL19/CCL21等趋化。E.B细胞由CXCL13等趋化至淋巴滤泡。 
[题目] 557. Treg细胞抑制DC功能的机制是?
A. 分泌IL-2
B. 表达CTLA-4竞争结合B7
C. 释放穿孔素
D. 促进IL-12分泌
E. 增强MHC表达
[答案] B
[解析] 【正解B】Treg细胞抑制DC功能的关键机制之一是高表达CTLA-4（CD152），通过与DC表面B7分子（CD80/CD86）以高亲和力竞争性结合，阻碍DC向初始T细胞提供CD28-B7共刺激信号；同时CTLA-4还可通过反式内吞作用（trans-endocytosis）从DC表面移除B7分子，降低DC对效应T细胞的共刺激能力。此外Treg还通过分泌IL-10和TGF-β抑制DC成熟和功能。【排除】A.分泌IL-2促进免疫而非抑制。C.释放穿孔素是CTL/NK杀伤机制，Treg虽可释放但非抑制DC功能的主要机制。D.IL-12促进Th1分化和DC功能增强。E.增强MHC表达会促进免疫而非抑制（Treg应抑制DC功能）。 
[题目] 558. Treg细胞功能缺陷最可能引发?
A. 肿瘤免疫逃逸
B. 自身免疫病
C. 慢性感染
D. 过敏反应减轻
E. 抗体类别转换增强
[答案] B
[解析] 【正解B】Treg细胞（CD4+CD25+Foxp3+）功能缺陷最可能引发自身免疫病。Treg是维持外周免疫耐受和免疫稳态的关键细胞——Foxp3基因突变导致IPEX综合征（免疫失调-多内分泌腺病-肠病-X连锁综合征），表现为新生儿期即发生多器官自身免疫（1型糖尿病、甲状腺炎、严重湿疹、顽固性腹泻等），证明了Treg在抑制自身免疫中不可替代的核心地位。【排除】A.肿瘤免疫逃逸与Treg功能增强有关（Treg过多抑制抗肿瘤免疫）。C.慢性感染中效应T细胞功能不足可因Treg过度抑制。D.过敏反应与Th2和Treg失衡有关（Treg功能不足可能加重过敏）。E.抗体类别转换增强与Th2/Tfh功能异常有关。 
[题目] 559. 穿孔素的结构类似于哪种补体成分?
A. C3
B. C4
C. C5a
D. C1q
E. MAC
[答案] E
[解析] 【正解E】穿孔素（perforin）的结构和功能类似于补体膜攻击复合物（MAC，即C5b-C6-C7-C8-C9n）。穿孔素单体含MACPF（MAC/perforin）结构域，在Ca2+存在下与靶细胞膜结合后发生构象改变并多聚化，形成跨膜管状孔道（内径约5-20nm），与MAC（C9多聚化孔道）的结构和形成机制高度同源，均导致靶细胞膜通透性增加——水和离子自由通过孔道导致渗透性溶解（坏死）。【排除】A.C3是补体活化级联枢纽。B.C4为经典/凝集素途径补体组分。C.C5a为过敏毒素趋化因子。D.C1q为经典途径识别分子。 
[题目] 560. CTL杀伤靶细胞时，穿孔素的功能是?
A. 直接诱导DNA断裂
B. 形成孔道使颗粒酶进入靶细胞
C. 激活Fas信号通路
D. 促进细胞因子分泌
E. 抑制MHC分子表达
[答案] B
[解析] 【正解B】CTL杀伤靶细胞时，穿孔素（perforin）的功能是在靶细胞膜上聚合形成跨膜孔道（pore），使颗粒酶（granzyme，尤其是颗粒酶B）得以通过孔道进入靶细胞胞质。穿孔素自身不诱导凋亡或裂解DNA——其核心功能是为颗粒酶进入胞内创造膜通透通路（类似于"通道/门户"），颗粒酶进入胞质后裂解caspase前体和ICAD等底物启动凋亡程序。【排除】A.直接诱导DNA断裂的是颗粒酶而非穿孔素。C.激活Fas信号通路的是FasL而非穿孔素。D.穿孔素为效应分子本身，不促进细胞因子分泌。E.穿孔素不抑制MHC表达。 
[题目] 561. Treg细胞通过哪种分子竞争性抑制IL-2?
A. CTLA-4
B. CD25
C. PD-1
D. FasL
E. CD28
[答案] B
